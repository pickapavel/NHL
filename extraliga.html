<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Extraliga - 2. sezóna</title>

<style>

*{box-sizing:border-box}

body{
    font-family:Arial;
    margin:0;
    background:#f2f2f2;
}

.wrapper{
    max-width:1200px;
    margin:auto;
    padding:20px;
    background:white;
}

h1{margin-top:0}

.tableWrap{
    overflow-x:auto;
    margin-bottom:30px;
}

table{
    width:100%;
    border-collapse:collapse;
    min-width:900px;
}

th,td{
    border:1px solid #999;
    padding:8px;
    text-align:center;
}

th{
    background:#2f9ec9;
    color:white;
}

td.team{text-align:left;}

.logo{
    width:28px;
    height:28px;
    object-fit:contain;
    vertical-align:middle;
}

/* ROZPIS */

.schedule{margin-top:20px;}

.matchRow{
    display:grid;
    grid-template-columns:1fr 70px 220px 70px 1fr;
    align-items:center;
    background:#e9ecef;
    padding:10px;
    margin-bottom:6px;
    border-radius:6px;
}

.teamBox{
    display:flex;
    align-items:center;
    gap:10px;
    font-weight:bold;
}

.teamRight{justify-content:flex-end;}

.scoreBox{
    background:#0b2a3c;
    color:white;
    font-size:22px;
    font-weight:bold;
    padding:8px 0;
    border-radius:6px;
}

.periods{text-align:center;font-size:14px;}

.otLabel{
    font-size:12px;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="wrapper">

<h1>Extraliga - 2. sezóna</h1>

<div class="tableWrap">
<table id="standings">
<thead>
<tr>
<th></th>
<th>#</th>
<th>Tým</th>
<th>B</th>
<th>Skóre</th>
<th>+/-</th>
<th>Z</th>
<th>V</th>
<th>P</th>
<th>VP</th>
<th>PP</th>
<th>VSN</th>
<th>PSN</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<h2>Rozpis zápasů</h2>
<div id="schedule" class="schedule"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, query, orderBy, onSnapshot } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig={
 apiKey:"AIzaSyD0jDnVNHZAs83g6FGwQT_nOpOCyT4NTNU",
 authDomain:"statistiky-6310a.firebaseapp.com",
 projectId:"statistiky-6310a"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

/* ===== TÝMY (STEJNÉ JAKO VE STATISTIKY.HTML) ===== */

const teams=[
"HC Sparta Praha (P)",
"HC Bílí Tygři Liberec (K)",
"HC Dynamo Pardubice (K)",
"HC Chemopetrol Litvínov (P)",
"HC Geus Okna Kladno (P)",
"HC Motor České Budějovice (K)",
"HC Energie Karlovy Vary (P)",
"HC Oceláři Třinec (K)"
];

const logos={
"HC Sparta Praha (P)":"sparta.png",
"HC Bílí Tygři Liberec (K)":"liberec.png",
"HC Dynamo Pardubice (K)":"pardubice.png",
"HC Chemopetrol Litvínov (P)":"litvinov.png",
"HC Geus Okna Kladno (P)":"kladno.png",
"HC Motor České Budějovice (K)":"budejovice.png",
"HC Energie Karlovy Vary (P)":"vary.png",
"HC Oceláři Třinec (K)":"trinec.png"
};

/* ===== TABULKA ===== */

function emptyStats(){
 return {B:0,GF:0,GA:0,Z:0,V:0,P:0,VP:0,PP:0,VSN:0,PSN:0};
}

function calculateScore(stats){
 let ag=Number(stats[6])+Number(stats[7])+Number(stats[8]);
 let hg=Number(stats[16])+Number(stats[17])+Number(stats[18]);

 if(stats[9]==="11") ag++;
 if(stats[19]==="11") hg++;

 let type="normal";
 if(stats[20]==="1"){hg++;type="sn";}
 else if(stats[20]==="2"){ag++;type="sn";}
 else if((stats[9]==="11"||stats[19]==="11")&&Math.abs(hg-ag)===1) type="ot";

 return {hg,ag,type};
}

function buildTable(matches){

 let table={};
 teams.forEach(t=>table[t]=emptyStats());

 matches.forEach(m=>{

  if(!table[m.homeTeam]||!table[m.awayTeam]) return;

  const s=calculateScore(m.stats);

  const home=table[m.homeTeam];
  const away=table[m.awayTeam];

  home.Z++; away.Z++;
  home.GF+=s.hg; home.GA+=s.ag;
  away.GF+=s.ag; away.GA+=s.hg;

  if(s.hg>s.ag){
   if(s.type==="normal"){home.B+=3;home.V++;}
   else if(s.type==="ot"){home.B+=2;home.VP++;away.B+=1;away.PP++;}
   else {home.B+=2;home.VSN++;away.B+=1;away.PSN++;}
  }else{
   if(s.type==="normal"){away.B+=3;away.V++;}
   else if(s.type==="ot"){away.B+=2;away.VP++;home.B+=1;home.PP++;}
   else {away.B+=2;away.VSN++;home.B+=1;home.PSN++;}
  }
 });

 return Object.entries(table)
 .map(([name,s])=>({name,...s,DIFF:s.GF-s.GA}))
 .sort((a,b)=>b.B-a.B||b.DIFF-a.DIFF||b.GF-a.GF);
}

function renderTable(data){

 const tbody=document.querySelector("#standings tbody");
 tbody.innerHTML="";

 data.forEach((t,i)=>{
  tbody.innerHTML+=`
  <tr>
   <td><img class="logo" src="./logos/${logos[t.name]}"></td>
   <td>${i+1}</td>
   <td class="team">${t.name}</td>
   <td>${t.B}</td>
   <td>${t.GF}:${t.GA}</td>
   <td>${t.DIFF}</td>
   <td>${t.Z}</td>
   <td>${t.V}</td>
   <td>${t.P}</td>
   <td>${t.VP}</td>
   <td>${t.PP}</td>
   <td>${t.VSN}</td>
   <td>${t.PSN}</td>
  </tr>`;
 });
}

/* ===== ROZPIS ===== */

function renderSchedule(matches){
 const c=document.getElementById("schedule");
 c.innerHTML="";

 matches.forEach(m=>{
  const s=calculateScore(m.stats);

  c.innerHTML+=`
  <div class="matchRow">
   <div class="teamBox"><img class="logo" src="./logos/${logos[m.homeTeam]}">${m.homeTeam}</div>
   <div class="scoreBox">${s.hg}</div>
   <div class="periods">
     ${s.type==="ot"?"<div class='otLabel'>OT</div>":""}
     ${s.type==="sn"?"<div class='otLabel'>SN</div>":""}
   </div>
   <div class="scoreBox">${s.ag}</div>
   <div class="teamBox teamRight">${m.awayTeam}<img class="logo" src="./logos/${logos[m.awayTeam]}"></div>
  </div>`;
 });
}

/* ===== LOAD ===== */

const q=query(collection(db,"zapasy"),orderBy("created","asc"));

onSnapshot(q,(snap)=>{
 let matches=[];
 snap.forEach(d=>{
  const m=d.data();
  if(m.season==="Sezóna 2" && m.category.startsWith("Extraliga"))
   matches.push(m);
 });

 renderTable(buildTable(matches));
 renderSchedule(matches);
});

</script>

</body>
</html>
