<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Statistiky zápasu</title>

<style>

*{box-sizing:border-box}

body{
    font-family:Arial;
    background:#f2f2f2;
    margin:0;
}

.wrapper{
    max-width:1200px;
    margin:auto;
    padding:20px;
    background:white;
}

.controls{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-bottom:20px;
}

.controls > *{
    flex:1;
    min-width:160px;
    padding:10px;
    font-size:16px;
}

.tableWrap{overflow-x:auto;}

table{
    border-collapse:collapse;
    width:100%;
    min-width:650px;
}

th,td{
    border:1px solid #999;
    padding:8px;
    text-align:left;
}

th{
    background:black;
    color:#ffff00;
    font-weight:bold;
}

.deleteBtn{
    background:#d9534f;
    color:white;
    border:none;
    padding:6px 10px;
    cursor:pointer;
}

.filterBar{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:10px;
}

</style>
</head>

<body>

<div class="wrapper">

<h1>Statistiky zápasu</h1>

<div class="controls">

<input type="file" id="fileInput" accept=".txt">

<select id="season">
<option value="Sezóna 1">Sezóna 1</option>
<option value="Sezóna 2" selected>Sezóna 2</option>
<option value="Sezóna 3">Sezóna 3</option>
<option value="Sezóna 4">Sezóna 4</option>
<option value="Sezóna 5">Sezóna 5</option>
</select>

<select id="category">
<option value="" selected disabled>Kategorie</option>
<option>Exhibice</option>
<option>Extraliga - základní část</option>
<option>Extraliga - předkolo</option>
<option>Extraliga - čtvrtfinále</option>
<option>Extraliga - semifinále</option>
<option>Extraliga - finále</option>
<option>OH - základní část</option>
<option>OH - Play OFF - předkolo</option>
<option>OH - čtvrtfinále</option>
<option>OH - semifinále</option>
<option>OH - finále</option>
<option>OH - o 3. místo</option>
</select>

<select id="homeTeam">
<option value="" selected disabled>Domácí tým</option>
</select>

<select id="awayTeam">
<option value="" selected disabled>Hostující tým</option>
</select>

<button onclick="saveMatch()">Uložit zápas</button>

</div>

<h2>Historie zápasů</h2>

<div class="tableWrap">
<table id="history">
<thead>
<tr>
<th>Datum</th>
<th>Sezóna</th>
<th>Kategorie</th>
<th>Domácí</th>
<th>Hosté</th>
<th>Skóre</th>
<th>Akce</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, query, orderBy } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyD0jDnVNHZAs83g6FGwQT_nOpOCyT4NTNU",
  authDomain: "statistiky-6310a.firebaseapp.com",
  projectId: "statistiky-6310a"
});

const db = getFirestore(app);

let loadedLines=[];
let allMatches=[];

/* ===== SAFE NUMBER ===== */
function n(v){
    return Number(v) || 0;
}

/* ===== SCORE ===== */

function calculateScore(stats){

    if(!stats) return {text:"0 : 0", type:"normal"};

    let awayGoals =
        n(stats[6])+n(stats[7])+n(stats[8]);

    let homeGoals =
        n(stats[16])+n(stats[17])+n(stats[18]);

    if(stats[9]==="11") awayGoals++;
    if(stats[19]==="11") homeGoals++;

    if(stats[20]==="1") homeGoals++;
    if(stats[20]==="2") awayGoals++;

    return { text: homeGoals+" : "+awayGoals, type:"normal" };
}

/* ===== LOAD ===== */

window.addEventListener("load", loadMatches);

async function loadMatches(){

    allMatches=[];
    const q=query(collection(db,"zapasy"),orderBy("created","desc"));
    const snapshot=await getDocs(q);

    snapshot.forEach(docSnap=>{
        const data=docSnap.data();
        if(!data.season) data.season="Sezóna 1";
        allMatches.push({id:docSnap.id,...data});
    });

    renderMatches();
}

/* ===== DELETE ===== */

window.deleteMatch = async function(id){
    await deleteDoc(doc(db,"zapasy",id));
    loadMatches();
}

/* ===== RENDER ===== */

function renderMatches(){

    const tbody=document.querySelector("#history tbody");
    tbody.innerHTML="";

    allMatches.forEach(m=>{

        const score=calculateScore(m.stats);

        const tr=document.createElement("tr");

        tr.innerHTML=`
        <td>${new Date(m.created).toLocaleDateString()}</td>
        <td>${m.season}</td>
        <td>${m.category}</td>
        <td>${m.homeTeam}</td>
        <td>${m.awayTeam}</td>
        <td>${score.text}</td>
        <td><button class="deleteBtn" onclick="deleteMatch('${m.id}')">Smazat</button></td>
        `;

        tbody.appendChild(tr);
    });
}

/* ===== SAVE ===== */

window.saveMatch = async function(){

    await addDoc(collection(db,"zapasy"),{
        season:season.value,
        category:category.value,
        homeTeam:homeTeam.value,
        awayTeam:awayTeam.value,
        stats:loadedLines || [],
        created:Date.now()
    });

    loadMatches();
}

</script>

</body>
</html>
