<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Extraliga - 2. sezóna</title>

<style>
*{box-sizing:border-box}

body{
 font-family:Arial;
 margin:0;
 background:#f2f2f2;
}

.wrapper{
 max-width:1200px;
 margin:auto;
 padding:20px;
 background:white;
}

/* ===== HLAVIČKA ===== */

.headerBar{
 display:flex;
 align-items:center;
 justify-content:space-between;
 background:#e9ecef;
 border-radius:12px;
 padding:18px;
 margin-bottom:25px;
 gap:20px;
}

.logoSection{
 display:flex;
 align-items:center;
 gap:18px;
}

.logoSection img{
 height:85px; /* menší než předtím, ale stále výrazné */
 object-fit:contain;
}

.seasonCard{
 background:#0b2a3c;
 color:white;
 font-size:24px;
 font-weight:bold;
 padding:12px 24px;
 border-radius:10px;
}

/* ===== MINI MATCH BOXES ===== */

.miniMatches{
 display:grid;
 grid-template-columns:repeat(2, 1fr);
 gap:8px;
}

.miniBox{
 background:white;
 border-radius:8px;
 padding:8px 10px;
 display:flex;
 align-items:center;
 justify-content:space-between;
 font-size:13px;
 font-weight:bold;
 box-shadow:0 2px 6px rgba(0,0,0,0.15);
 min-width:150px;
}

.miniScore{
 background:#0b2a3c;
 color:white;
 padding:4px 8px;
 border-radius:6px;
 min-width:28px;
 text-align:center;
}

/* ===== TABULKA ===== */

.standingsCard{
 display:flex;align-items:center;justify-content:space-between;
 background:#e9ecef;border-radius:10px;padding:14px 16px;margin-bottom:10px;
}

.rank{width:30px;font-weight:bold;font-size:18px;text-align:center;}
.teamBlock{display:flex;align-items:center;gap:14px;flex:1;}

.logo{
 width:40px;height:40px;object-fit:contain;
 filter:contrast(1.1) saturate(1.15);
 box-shadow:0 2px 6px rgba(0,0,0,0.25);
 border-radius:6px;background:white;padding:2px;
}

.teamInfo{display:flex;flex-direction:column;}
.teamName{font-weight:bold;font-size:16px;}
.teamStats{font-size:13px;color:#444;margin-top:2px;}

.pointsBox{
 background:#0b2a3c;color:white;font-size:20px;font-weight:bold;
 padding:10px 16px;border-radius:8px;min-width:60px;text-align:center;
}

.filterBar{
 display:flex;gap:10px;align-items:center;margin:15px 0;flex-wrap:wrap;
}

.filterBar select,
.filterBar button{
 padding:8px 10px;border-radius:6px;border:1px solid #ccc;font-weight:bold;
}

.filterActive{
 background:#2f9ec9;color:white;border-color:#2f9ec9;
}

.headToHeadPanel{
 display:none;
 background:#e3f2f9;
 padding:14px;
 border-radius:8px;
 margin-top:8px;
 border:2px solid #2f9ec9;
}

.headToHeadTitle{
 font-weight:bold;
 font-size:15px;
 margin-bottom:6px;
 color:#0b2a3c;
}

.matchRow{
 display:grid;
 grid-template-columns:1fr 70px 220px 70px 1fr 120px;
 align-items:center;background:#e9ecef;
 padding:10px;margin-bottom:6px;border-radius:6px;gap:8px;
}

.teamBox{display:flex;align-items:center;gap:10px;font-weight:bold;}
.teamRight{justify-content:flex-end;}

.scoreBox{
 background:#0b2a3c;color:white;font-size:22px;font-weight:bold;
 padding:8px 0;border-radius:6px;text-align:center;
}

.periods{text-align:center;font-size:14px}
.otLabel{font-weight:bold;font-size:13px;margin-bottom:2px}

.statsBtn{
 background:#2f9ec9;color:white;border:none;
 padding:8px 12px;border-radius:6px;cursor:pointer;
 font-weight:bold;width:100%;
}

@media(max-width:1000px){
 .headerBar{flex-direction:column;align-items:flex-start;}
 .miniMatches{grid-template-columns:1fr 1fr;}
}
</style>
</head>

<body>

<div class="wrapper">

<!-- ===== HLAVIČKA ===== -->
<div class="headerBar">

  <div class="logoSection">
    <img src="img/extraliga.jpg" alt="Extraliga">
    <div class="seasonCard">2. sezóna</div>
  </div>

  <div class="miniMatches" id="miniMatches"></div>

</div>

<div id="standingsBody"></div>

<h2>Rozpis zápasů</h2>

<div class="filterBar">

<select id="teamFilter">
<option value="all">Všechny týmy</option>
</select>

<button id="filterAll" class="filterActive">Všechny zápasy</button>
<button id="filterPlayed">Jen odehrané</button>

<select id="homeAwayFilter">
<option value="both">Domácí i venkovní</option>
<option value="home">Jen domácí</option>
<option value="away">Jen venkovní</option>
</select>

<select id="resultFilter">
<option value="all">Všechny výsledky</option>
<option value="win">Jen výhry</option>
<option value="loss">Jen prohry</option>
</select>

<button id="headToHeadBtn">Vzájemné zápasy</button>

</div>

<div id="headToHeadPanel" class="headToHeadPanel">
<div class="headToHeadTitle">Vyber soupeře:</div>
<select id="opponentFilter">
<option value="none">-- Vyber tým --</option>
</select>
</div>

<div id="schedule"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, query, orderBy, onSnapshot }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig={
 apiKey:"AIzaSyD0jDnVNHZAs83g6FGwQT_nOpOCyT4NTNU",
 authDomain:"statistiky-6310a.firebaseapp.com",
 projectId:"statistiky-6310a"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

const teamsData={
 "HC Sparta Praha (P)":"sparta.png",
 "HC Bílí Tygři Liberec (K)":"liberec.png",
 "HC Dynamo Pardubice (K)":"pardubice.png",
 "HC Chemopetrol Litvínov (P)":"litvinov.png",
 "HC Geus Okna Kladno (P)":"kladno.png",
 "HC Motor České Budějovice (K)":"budejovice.png",
 "HC Energie Karlovy Vary (P)":"vary.png",
 "HC Oceláři Třinec (K)":"trinec.png"
};

const teams=Object.keys(teamsData);
const logos=teamsData;

const scheduleIndex=[
 [0,1],[3,2],[5,4],[7,6],
 [2,0],[1,3],[6,5],[4,7],
 [0,5],[3,7],[1,4],[2,6],
 [7,0],[4,2],[6,1],[5,3],
 [1,0],[2,3],[4,5],[6,7],
 [0,2],[3,1],[5,6],[7,4],
 [5,0],[7,3],[4,1],[6,2],
 [0,7],[2,4],[1,6],[3,5]
];

const scheduleList=scheduleIndex.map(([h,a])=>[teams[h],teams[a]]);

let currentMatches=[];

function calc(stats){
 let ag=Number(stats[6])+Number(stats[7])+Number(stats[8]);
 let hg=Number(stats[16])+Number(stats[17])+Number(stats[18]);
 if(stats[9]==="11") ag++;
 if(stats[19]==="11") hg++;
 if(stats[20]==="1") hg++;
 if(stats[20]==="2") ag++;
 return {hg,ag};
}

/* ===== MINI MATCH LOGIKA ===== */

function renderMiniMatches(matches){

 const container=document.getElementById("miniMatches");
 container.innerHTML="";

 const played=scheduleList
   .map(p=>matches.find(m=>m.homeTeam===p[0]&&m.awayTeam===p[1]))
   .filter(Boolean);

 const next=scheduleList
   .filter(p=>!matches.find(m=>m.homeTeam===p[0]&&m.awayTeam===p[1]))
   .slice(0,2);

 const lastTwo=played.slice(-2);

 lastTwo.forEach(m=>{
   const s=calc(m.stats);
   container.innerHTML+=`
     <div class="miniBox">
       ${m.homeTeam.split(" ")[1]} 
       <div class="miniScore">${s.hg}:${s.ag}</div>
       ${m.awayTeam.split(" ")[1]}
     </div>`;
 });

 next.forEach(p=>{
   container.innerHTML+=`
     <div class="miniBox">
       ${p[0].split(" ")[1]}
       <div class="miniScore">-</div>
       ${p[1].split(" ")[1]}
     </div>`;
 });
}

/* ===== ZBYTEK PŮVODNÍ LOGIKY ===== */

function createEmpty(){
 let obj={};
 teams.forEach(t=>{
  obj[t]={team:t,b:0,z:0,v:0,p:0,vp:0,pp:0,vsn:0,psn:0,gf:0,ga:0};
 });
 return obj;
}

function calculateStandings(matches){
 let table=createEmpty();
 matches.forEach(m=>{
  if(!m.stats) return;
  const s=calc(m.stats);
  const h=table[m.homeTeam];
  const a=table[m.awayTeam];
  if(!h||!a) return;

  h.z++; a.z++;
  h.gf+=s.hg; h.ga+=s.ag;
  a.gf+=s.ag; a.ga+=s.hg;

  if(s.hg>s.ag){h.v++;h.b+=3;}
  else if(s.ag>s.hg){a.v++;a.b+=3;}
 });

 return Object.values(table).sort((a,b)=>b.b-a.b);
}

function renderStandings(arr){
 const body=document.getElementById("standingsBody");
 body.innerHTML="";
 arr.forEach((t,i)=>{
  body.innerHTML+=`
  <div class="standingsCard">
    <div class="rank">${i+1}</div>
    <div class="teamBlock">
      <img class="logo" src="./logos/${logos[t.team]}">
      <div class="teamInfo">
        <div class="teamName">${t.team}</div>
        <div class="teamStats">
          Skóre ${t.gf}:${t.ga}
        </div>
      </div>
    </div>
    <div class="pointsBox">${t.b}</div>
  </div>`;
 });
}

function renderSchedule(matches){
 currentMatches=matches;
 const cont=document.getElementById("schedule");
 cont.innerHTML="";

 scheduleList.forEach(p=>{
  const m=matches.find(x=>x.homeTeam===p[0]&&x.awayTeam===p[1]);
  let hg=0,ag=0;
  if(m){
   const s=calc(m.stats);
   hg=s.hg; ag=s.ag;
  }

  cont.innerHTML+=`
  <div class="matchRow">
   <div class="teamBox">${p[0]}</div>
   <div class="scoreBox">${hg}</div>
   <div></div>
   <div class="scoreBox">${ag}</div>
   <div class="teamBox teamRight">${p[1]}</div>
   <div></div>
  </div>`;
 });
}

const q=query(collection(db,"zapasy"),orderBy("created","asc"));

onSnapshot(q,(snap)=>{
 let matches=[];
 snap.forEach(d=>{
  const m=d.data();
  if(m.category?.startsWith("Extraliga") && m.season==="Sezóna 2"){
   matches.push(m);
  }
 });

 renderMiniMatches(matches);
 renderSchedule(matches);
 renderStandings(calculateStandings(matches));
});

</script>

</body>
</html>
