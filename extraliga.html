<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Extraliga - 2. sezóna</title>

<style>
*{box-sizing:border-box}

body{
    font-family:Arial;
    margin:0;
    background:#f2f2f2;
}

.wrapper{
    max-width:1200px;
    margin:auto;
    padding:20px;
    background:white;
}

h1{margin-top:0}

.tableWrap{
    overflow-x:auto;
    margin-bottom:30px;
}

table{
    width:100%;
    border-collapse:collapse;
    min-width:900px;
}

th,td{
    border:1px solid #999;
    padding:8px;
    text-align:center;
}

th{
    background:#2f9ec9;
    color:white;
    font-weight:bold;
}

.logo{
    width:28px;
    height:28px;
    object-fit:contain;
}

/* ROZPIS */

.schedule{margin-top:20px;}

.matchRow{
    display:grid;
    grid-template-columns:1fr 70px 220px 70px 1fr;
    align-items:center;
    background:#e9ecef;
    padding:10px;
    margin-bottom:6px;
    border-radius:6px;
}

.teamBox{
    display:flex;
    align-items:center;
    gap:10px;
    font-weight:bold;
}

.teamRight{justify-content:flex-end;}

.scoreBox{
    background:#0b2a3c;
    color:white;
    font-size:22px;
    font-weight:bold;
    padding:8px 0;
    border-radius:6px;
    text-align:center;
}

.periods{
    text-align:center;
    font-size:14px;
}

.resultType{
    font-weight:bold;
    margin-bottom:2px;
}
</style>
</head>

<body>

<div class="wrapper">

<h1>Extraliga - 2. sezóna</h1>

<div class="tableWrap">
<table id="standings">
<thead>
<tr>
<th></th>
<th>#</th>
<th>Tým</th>
<th>B</th>
<th>Skóre</th>
<th>+/-</th>
<th>Z</th>
<th>V</th>
<th>P</th>
<th>VP</th>
<th>PP</th>
<th>VSN</th>
<th>PSN</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<h2>Rozpis zápasů</h2>
<div id="schedule" class="schedule"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, query, orderBy, onSnapshot } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
 apiKey:"AIzaSyD0jDnVNHZAs83g6FGwQT_nOpOCyT4NTNU",
 authDomain:"statistiky-6310a.firebaseapp.com",
 projectId:"statistiky-6310a",
 storageBucket:"statistiky-6310a.appspot.com",
 messagingSenderId:"1023222901562",
 appId:"1:1023222901562:web:522ee763e27aa08a8b7e03"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

/* NORMALIZACE TÝMU */
function normalizeTeam(name){
    return name.replace(" (P)","").replace(" (K)","");
}

/* LOGA */
const teamLogos={
"HC Geus Okna Kladno":"kladno.png",
"HC Chemopetrol Litvínov":"litvinov.png",
"HC Dynamo Pardubice":"pardubice.png",
"HC Sparta Praha":"sparta.png",
"HC Energie Karlovy Vary":"vary.png",
"HC Bílí Tygři Liberec":"liberec.png",
"HC Motor České Budějovice":"budejovice.png",
"HC Oceláři Třinec":"trinec.png"
};

function logoHtml(team){
 const key=normalizeTeam(team);
 if(!teamLogos[key]) return "";
 return `<img class="logo" src="./logos/${teamLogos[key]}">`;
}

/* ROZPIS */
const scheduleList=[
["HC Geus Okna Kladno (P)","HC Dynamo Pardubice (K)"],
["HC Bílí Tygři Liberec (K)","HC Chemopetrol Litvínov (P)"],
["HC Sparta Praha (P)","HC Motor České Budějovice (K)"],
["HC Energie Karlovy Vary (P)","HC Oceláři Třinec (K)"]
];

/* SCORE + TŘETINY */
function calculateScore(stats){

 let a1=Number(stats[6]||0);
 let a2=Number(stats[7]||0);
 let a3=Number(stats[8]||0);

 let h1=Number(stats[16]||0);
 let h2=Number(stats[17]||0);
 let h3=Number(stats[18]||0);

 let awayGoals=a1+a2+a3;
 let homeGoals=h1+h2+h3;

 let resultType="";

 if(stats[9]==="11"){ awayGoals++; resultType="OT"; }
 if(stats[19]==="11"){ homeGoals++; resultType="OT"; }

 if(stats[20]==="1"){ homeGoals++; resultType="SN"; }
 if(stats[20]==="2"){ awayGoals++; resultType="SN"; }

 return{
  homeGoals,
  awayGoals,
  periods:`(${h1}:${a1}, ${h2}:${a2}, ${h3}:${a3})`,
  resultType
 };
}

/* RENDER ROZPISU */
function renderSchedule(matches){

 const container=document.getElementById("schedule");
 container.innerHTML="";

 scheduleList.forEach(pair=>{

  const match=matches.find(m=>
     normalizeTeam(m.homeTeam)===normalizeTeam(pair[0]) &&
     normalizeTeam(m.awayTeam)===normalizeTeam(pair[1])
  );

  let hg=0,ag=0,periods="(0:0, 0:0, 0:0)",type="";

  if(match){
    const s=calculateScore(match.stats);
    hg=s.homeGoals;
    ag=s.awayGoals;
    periods=s.periods;
    type=s.resultType;
  }

  container.innerHTML+=`
   <div class="matchRow">
     <div class="teamBox">${logoHtml(pair[0])}${pair[0]}</div>
     <div class="scoreBox">${hg}</div>
     <div class="periods">
       ${type?`<div class="resultType">${type}</div>`:""}
       ${periods}
     </div>
     <div class="scoreBox">${ag}</div>
     <div class="teamBox teamRight">${pair[1]}${logoHtml(pair[1])}</div>
   </div>`;
 });
}

/* LOAD */
function loadMatches(){

 const q=query(collection(db,"zapasy"),orderBy("created","asc"));

 onSnapshot(q,(snapshot)=>{

  let extraligaMatches=[];

  snapshot.forEach(docSnap=>{
   const m=docSnap.data();

   if(
     m.category &&
     m.category.startsWith("Extraliga") &&
     m.season==="Sezóna 2"
   ){
     extraligaMatches.push(m);
   }
  });

  renderSchedule(extraligaMatches);
 });
}

loadMatches();

</script>

</body>
</html>
