const teamLogos={
"HC Geus Okna Kladno (P)":"kladno.png",
"HC Chemopetrol Litvínov (P)":"litvinov.png",
"HC Dynamo Pardubice (K)":"pardubice.png",
"HC Sparta Praha (P)":"sparta.png",
"HC Energie Karlovy Vary (P)":"vary.png",
"HC Bílí Tygři Liberec (K)":"liberec.png",
"HC Mountfield České Budějovice (K)":"budejovice.png",
"HC Oceláři Třinec (K)":"trinec.png",
"HC Znojemští Orli (K)":"znojmo.png"
};

function num(v){
    return Number(v) || 0;
}

function calculateScore(stats){

    if(!stats) return {homeGoals:0,awayGoals:0};

    let awayGoals =
        num(stats[6])+num(stats[7])+num(stats[8]);

    let homeGoals =
        num(stats[16])+num(stats[17])+num(stats[18]);

    if(stats[9]==="11") awayGoals++;
    if(stats[19]==="11") homeGoals++;
    if(stats[20]==="1") homeGoals++;
    if(stats[20]==="2") awayGoals++;

    return {homeGoals,awayGoals};
}

function logoHtml(team){
    if(!teamLogos[team]) return "";
    return `<img class="logo" src="./logos/${teamLogos[team]}">`;
}

function renderSchedule(matches){

    const container=document.getElementById("schedule");
    container.innerHTML="";

    scheduleList.forEach(pair=>{

        const match=matches.find(m=>m.homeTeam===pair[0] && m.awayTeam===pair[1]);
        const score=calculateScore(match?.stats);

        container.innerHTML+=`
        <div class="matchRow">
            <div class="teamBox">${logoHtml(pair[0])}${pair[0]}</div>
            <div class="scoreBox">${score.homeGoals}</div>
            <div class="periods">(0:0, 0:0, 0:0)</div>
            <div class="scoreBox">${score.awayGoals}</div>
            <div class="teamBox teamRight">${pair[1]}${logoHtml(pair[1])}</div>
        </div>`;
    });
}

function loadMatches(){

    const q=query(collection(db,"zapasy"),orderBy("created","asc"));

    onSnapshot(q,(snapshot)=>{
        let extraligaMatches=[];

        snapshot.forEach(docSnap=>{
            const m=docSnap.data();

            if(
                m.category &&
                m.category.startsWith("Extraliga") &&
                m.season==="Sezóna 2"
            ){
                extraligaMatches.push(m);
            }
        });

        renderSchedule(extraligaMatches);
    });
}

loadMatches();
