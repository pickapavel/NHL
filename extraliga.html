<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Extraliga - 2. sezóna</title>

<style>

*{box-sizing:border-box}

body{
    font-family:Arial;
    margin:0;
    background:#f2f2f2;
}

.wrapper{
    max-width:1200px;
    margin:auto;
    padding:20px;
    background:white;
}

h1{margin-top:0}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    border:1px solid #999;
    padding:8px;
    text-align:center;
}

th{
    background:#2f9ec9;
    color:white;
}

.logo{
    width:26px;
    height:26px;
    object-fit:contain;
}

/* ROZPIS */

.schedule{margin-top:20px;}

.matchRow{
    display:grid;
    grid-template-columns:1fr 70px 220px 70px 1fr;
    align-items:center;
    background:#e9ecef;
    padding:10px;
    margin-bottom:6px;
    border-radius:6px;
}

.teamBox{
    display:flex;
    align-items:center;
    gap:10px;
    font-weight:bold;
}

.teamRight{justify-content:flex-end;}

.scoreBox{
    background:#0b2a3c;
    color:white;
    font-size:22px;
    font-weight:bold;
    padding:8px 0;
    border-radius:6px;
    text-align:center;
}

.periods{
    text-align:center;
    font-size:14px;
}

.resultType{
    font-weight:bold;
}

</style>
</head>

<body>

<div class="wrapper">

<h1>Extraliga - 2. sezóna</h1>

<table id="standings">
<thead>
<tr>
<th></th>
<th>#</th>
<th>Tým</th>
<th>B</th>
<th>Skóre</th>
<th>+/-</th>
<th>Z</th>
<th>V</th>
<th>P</th>
<th>VP</th>
<th>PP</th>
<th>VSN</th>
<th>PSN</th>
</tr>
</thead>
<tbody></tbody>
</table>

<h2>Rozpis zápasů</h2>
<div id="schedule" class="schedule"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, query, orderBy, onSnapshot }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig={
 apiKey:"AIzaSyD0jDnVNHZAs83g6FGwQT_nOpOCyT4NTNU",
 authDomain:"statistiky-6310a.firebaseapp.com",
 projectId:"statistiky-6310a",
 storageBucket:"statistiky-6310a.appspot.com",
 messagingSenderId:"1023222901562",
 appId:"1:1023222901562:web:522ee763e27aa08a8b7e03"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

/* ===================== TÝMY ===================== */

const teams=[
"HC Sparta Praha (P)",
"HC Bílí Tygři Liberec (K)",
"HC Dynamo Pardubice (K)",
"HC Chemopetrol Litvínov (P)",
"HC Geus Okna Kladno (P)",
"HC Motor České Budějovice (K)",
"HC Energie Karlovy Vary (P)",
"HC Oceláři Třinec (K)"
];

const logos={
"HC Sparta Praha":"sparta.png",
"HC Bílí Tygři Liberec":"liberec.png",
"HC Dynamo Pardubice":"pardubice.png",
"HC Chemopetrol Litvínov":"litvinov.png",
"HC Geus Okna Kladno":"kladno.png",
"HC Motor České Budějovice":"budejovice.png",
"HC Energie Karlovy Vary":"vary.png",
"HC Oceláři Třinec":"trinec.png"
};

function normalize(t){
 return t.replace(" (P)","").replace(" (K)","");
}

function logo(team){
 const key=normalize(team);
 if(!logos[key]) return "";
 return `<img class="logo" src="./logos/${logos[key]}">`;
}

/* ===================== ROZPIS ===================== */

const scheduleList=[
["HC Geus Okna Kladno (P)","HC Dynamo Pardubice (K)"],
["HC Bílí Tygři Liberec (K)","HC Chemopetrol Litvínov (P)"],
["HC Sparta Praha (P)","HC Motor České Budějovice (K)"],
["HC Energie Karlovy Vary (P)","HC Oceláři Třinec (K)"],
["HC Dynamo Pardubice (K)","HC Chemopetrol Litvínov (P)"],
["HC Geus Okna Kladno (P)","HC Motor České Budějovice (K)"],
["HC Sparta Praha (P)","HC Energie Karlovy Vary (P)"],
["HC Oceláři Třinec (K)","HC Bílí Tygři Liberec (K)"]
];

/* ===================== SCORE ===================== */

function calculateScore(stats){

 let a1=Number(stats?.[6]||0);
 let a2=Number(stats?.[7]||0);
 let a3=Number(stats?.[8]||0);

 let h1=Number(stats?.[16]||0);
 let h2=Number(stats?.[17]||0);
 let h3=Number(stats?.[18]||0);

 let away=a1+a2+a3;
 let home=h1+h2+h3;

 let type="";

 if(stats?.[9]==="11"){ away++; type="OT"; }
 if(stats?.[19]==="11"){ home++; type="OT"; }

 if(stats?.[20]==="1"){ home++; type="SN"; }
 if(stats?.[20]==="2"){ away++; type="SN"; }

 return{
   home,away,
   periods:`(${h1}:${a1}, ${h2}:${a2}, ${h3}:${a3})`,
   type
 };
}

/* ===================== TABULKA ===================== */

function createEmptyTable(){
 const obj={};
 teams.forEach(t=>{
  obj[t]={team:t,points:0,gf:0,ga:0,games:0};
 });
 return obj;
}

function renderTable(table){

 const tbody=document.querySelector("#standings tbody");
 tbody.innerHTML="";

 const arr=Object.values(table);

 arr.sort((a,b)=>b.points-a.points || (b.gf-b.ga)-(a.gf-a.ga));

 arr.forEach((t,i)=>{
   tbody.innerHTML+=`
   <tr>
     <td>${logo(t.team)}</td>
     <td>${i+1}</td>
     <td style="text-align:left">${t.team}</td>
     <td>${t.points}</td>
     <td>${t.gf}:${t.ga}</td>
     <td>${t.gf-t.ga}</td>
     <td>${t.games}</td>
     <td></td><td></td><td></td><td></td><td></td><td></td>
   </tr>`;
 });
}

/* ===================== ROZPIS ===================== */

function renderSchedule(matches){

 const div=document.getElementById("schedule");
 div.innerHTML="";

 scheduleList.forEach(pair=>{

  const m=matches.find(x=>
    normalize(x.homeTeam)===normalize(pair[0]) &&
    normalize(x.awayTeam)===normalize(pair[1])
  );

  let hg=0,ag=0,periods="(0:0, 0:0, 0:0)",type="";

  if(m){
    const s=calculateScore(m.stats);
    hg=s.home;
    ag=s.away;
    periods=s.periods;
    type=s.type;
  }

  div.innerHTML+=`
  <div class="matchRow">
    <div class="teamBox">${logo(pair[0])}${pair[0]}</div>
    <div class="scoreBox">${hg}</div>
    <div class="periods">
      ${type?`<div class="resultType">${type}</div>`:""}
      ${periods}
    </div>
    <div class="scoreBox">${ag}</div>
    <div class="teamBox teamRight">${pair[1]}${logo(pair[1])}</div>
  </div>`;
 });
}

/* ===================== LOAD ===================== */

const q=query(collection(db,"zapasy"),orderBy("created","asc"));

onSnapshot(q,(snap)=>{

 let matches=[];
 let table=createEmptyTable();

 snap.forEach(doc=>{
  const m=doc.data();

  if(
    m.category?.startsWith("Extraliga") &&
    m.season==="Sezóna 2"
  ){
    matches.push(m);

    const s=calculateScore(m.stats);

    table[m.homeTeam].gf+=s.home;
    table[m.homeTeam].ga+=s.away;
    table[m.homeTeam].games++;

    table[m.awayTeam].gf+=s.away;
    table[m.awayTeam].ga+=s.home;
    table[m.awayTeam].games++;
  }
 });

 renderTable(table);
 renderSchedule(matches);

});

</script>
</body>
</html>
