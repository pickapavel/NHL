<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Extraliga - 2. sezóna</title>

<style>
*{box-sizing:border-box}
body{font-family:Arial;margin:0;background:#f2f2f2;}
.wrapper{max-width:1200px;margin:auto;padding:20px;background:white;}
h1{margin-top:0}

/* ===== TABULKA ===== */

.standingsCard{
 display:flex;
 align-items:center;
 justify-content:space-between;
 background:#e9ecef;
 border-radius:10px;
 padding:14px 16px;
 margin-bottom:10px;
}

.rank{
 width:30px;
 font-weight:bold;
 font-size:18px;
 text-align:center;
}

.teamBlock{
 display:flex;
 align-items:center;
 gap:14px;
 flex:1;
}

.logo{
 width:40px;
 height:40px;
 object-fit:contain;
 filter:contrast(1.1) saturate(1.15);
 box-shadow:0 2px 6px rgba(0,0,0,0.25);
 border-radius:6px;
 background:white;
 padding:2px;
}

.teamInfo{
 display:flex;
 flex-direction:column;
}

.teamName{
 font-weight:bold;
 font-size:16px;
}

.teamStats{
 font-size:13px;
 color:#444;
 margin-top:2px;
}

.pointsBox{
 background:#0b2a3c;
 color:white;
 font-size:20px;
 font-weight:bold;
 padding:10px 16px;
 border-radius:8px;
 min-width:60px;
 text-align:center;
}

/* ===== FILTRY ===== */

.filterBar{
 display:flex;
 gap:10px;
 align-items:center;
 margin:15px 0;
 flex-wrap:wrap;
}

.filterBar select,
.filterBar button{
 padding:8px 10px;
 border-radius:6px;
 border:1px solid #ccc;
 font-weight:bold;
}

.filterActive{
 background:#2f9ec9;
 color:white;
 border-color:#2f9ec9;
}

/* ===== ROZPIS ===== */

.matchRow{
 display:grid;
 grid-template-columns:1fr 70px 220px 70px 1fr 120px;
 align-items:center;
 background:#e9ecef;
 padding:10px;
 margin-bottom:6px;
 border-radius:6px;
 gap:8px;
}

.teamBox{
 display:flex;
 align-items:center;
 gap:10px;
 font-weight:bold;
}

.teamRight{
 justify-content:flex-end;
}

.scoreBox{
 background:#0b2a3c;
 color:white;
 font-size:22px;
 font-weight:bold;
 padding:8px 0;
 border-radius:6px;
 text-align:center;
}

.periods{text-align:center;font-size:14px}
.otLabel{font-weight:bold;font-size:13px;margin-bottom:2px}

.statsBtn{
 background:#2f9ec9;
 color:white;
 border:none;
 padding:8px 12px;
 border-radius:6px;
 cursor:pointer;
 font-weight:bold;
 width:100%;
}

@media (max-width:900px){
 .matchRow{
  grid-template-columns:1fr auto;
  grid-template-rows:auto auto auto auto;
 }
 .teamBox,
 .scoreBox,
 .periods,
 .statsBtn{
  grid-column:1/3;
  justify-content:center;
  text-align:center;
 }
}
</style>
</head>

<body>
<div class="wrapper">

<h1>Extraliga - 2. sezóna</h1>

<div id="standingsBody"></div>

<h2>Rozpis zápasů</h2>

<div class="filterBar">

<select id="teamFilter">
<option value="all">Všechny týmy</option>
</select>

<select id="homeAwayFilter">
<option value="all">Domácí + Venkovní</option>
<option value="home">Jen domácí</option>
<option value="away">Jen venkovní</option>
</select>

<select id="resultFilter">
<option value="all">Výhry + Prohry</option>
<option value="win">Jen výhry</option>
<option value="loss">Jen prohry</option>
</select>

<select id="mutual1">
<option value="">Vzájemné – tým 1</option>
</select>

<select id="mutual2">
<option value="">Vzájemné – tým 2</option>
</select>

<button id="filterAll" class="filterActive">Všechny zápasy</button>
<button id="filterPlayed">Jen odehrané</button>

</div>

<div id="schedule"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, query, orderBy, onSnapshot }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig={
 apiKey:"AIzaSyD0jDnVNHZAs83g6FGwQT_nOpOCyT4NTNU",
 authDomain:"statistiky-6310a.firebaseapp.com",
 projectId:"statistiky-6310a"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

const teamsData={
 "HC Sparta Praha (P)":"sparta.png",
 "HC Bílí Tygři Liberec (K)":"liberec.png",
 "HC Dynamo Pardubice (K)":"pardubice.png",
 "HC Chemopetrol Litvínov (P)":"litvinov.png",
 "HC Geus Okna Kladno (P)":"kladno.png",
 "HC Motor České Budějovice (K)":"budejovice.png",
 "HC Energie Karlovy Vary (P)":"vary.png",
 "HC Oceláři Třinec (K)":"trinec.png"
};

const teams=Object.keys(teamsData);
const logos=teamsData;

teams.forEach(t=>{
 teamFilter.innerHTML+=`<option value="${t}">${t}</option>`;
 mutual1.innerHTML+=`<option value="${t}">${t}</option>`;
 mutual2.innerHTML+=`<option value="${t}">${t}</option>`;
});

let selectedTeam="all";
let homeAway="all";
let resultFilterValue="all";
let mutualTeam1="";
let mutualTeam2="";
let showPlayedOnly=false;
let currentMatches=[];

teamFilter.onchange=e=>{selectedTeam=e.target.value;renderSchedule(currentMatches);}
homeAwayFilter.onchange=e=>{homeAway=e.target.value;renderSchedule(currentMatches);}
resultFilter.onchange=e=>{resultFilterValue=e.target.value;renderSchedule(currentMatches);}
mutual1.onchange=e=>{mutualTeam1=e.target.value;renderSchedule(currentMatches);}
mutual2.onchange=e=>{mutualTeam2=e.target.value;renderSchedule(currentMatches);}

filterAll.onclick=()=>{
 showPlayedOnly=false;
 filterAll.classList.add("filterActive");
 filterPlayed.classList.remove("filterActive");
 renderSchedule(currentMatches);
}

filterPlayed.onclick=()=>{
 showPlayedOnly=true;
 filterPlayed.classList.add("filterActive");
 filterAll.classList.remove("filterActive");
 renderSchedule(currentMatches);
}

function calc(stats){
 let ag=Number(stats[6])+Number(stats[7])+Number(stats[8]);
 let hg=Number(stats[16])+Number(stats[17])+Number(stats[18]);
 if(stats[9]==="11") ag++;
 if(stats[19]==="11") hg++;
 if(stats[20]==="1") hg++;
 if(stats[20]==="2") ag++;
 return {hg,ag};
}

function renderSchedule(matches){
 currentMatches=matches;
 schedule.innerHTML="";

 scheduleList.forEach(p=>{

  const m=matches.find(x=>x.homeTeam===p[0]&&x.awayTeam===p[1]);

  if(selectedTeam!=="all" && p[0]!==selectedTeam && p[1]!==selectedTeam) return;

  if(homeAway==="home" && selectedTeam!=="all" && p[0]!==selectedTeam) return;
  if(homeAway==="away" && selectedTeam!=="all" && p[1]!==selectedTeam) return;

  if(mutualTeam1 && mutualTeam2){
   if(!((p[0]===mutualTeam1 && p[1]===mutualTeam2)||(p[0]===mutualTeam2 && p[1]===mutualTeam1))) return;
  }

  if(showPlayedOnly && !m) return;

  if(resultFilterValue!=="all"){
   if(!m || !m.stats) return;
   const s=calc(m.stats);

   if(resultFilterValue==="win"){
    if(selectedTeam===p[0] && s.hg<=s.ag) return;
    if(selectedTeam===p[1] && s.ag<=s.hg) return;
   }

   if(resultFilterValue==="loss"){
    if(selectedTeam===p[0] && s.hg>=s.ag) return;
    if(selectedTeam===p[1] && s.ag>=s.hg) return;
   }
  }

  let hg=0,ag=0,label="";
  if(m && m.stats){
   const s=calc(m.stats);
   hg=s.hg; ag=s.ag;
   if(m.stats[20]==="1"||m.stats[20]==="2") label="SN";
   else if(m.stats[9]==="11"||m.stats[19]==="11") label="OT";
  }

  schedule.innerHTML+=`
  <div class="matchRow">
   <div class="teamBox"><img class="logo" src="./logos/${logos[p[0]]}">${p[0]}</div>
   <div class="scoreBox">${hg}</div>
   <div class="periods"><div class="otLabel">${label}</div></div>
   <div class="scoreBox">${ag}</div>
   <div class="teamBox teamRight">${p[1]}<img class="logo" src="./logos/${logos[p[1]]}"></div>
   <div><button class="statsBtn">Statistiky</button></div>
  </div>`;
 });
}

const q=query(collection(db,"zapasy"),orderBy("created","asc"));

onSnapshot(q,(snap)=>{
 let matches=[];
 snap.forEach(d=>{
  const m=d.data();
  if(m.category?.startsWith("Extraliga") && m.season==="Sezóna 2"){
   matches.push(m);
  }
 });
 renderSchedule(matches);
});
</script>
</body>
</html>
