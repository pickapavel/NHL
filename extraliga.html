<script type="module">

import { getFirestore, collection, query, orderBy, onSnapshot } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD0jDnVNHZAs83g6FGwQT_nOpOCyT4NTNU",
  authDomain: "statistiky-6310a.firebaseapp.com",
  projectId: "statistiky-6310a",
  storageBucket: "statistiky-6310a.appspot.com",
  messagingSenderId: "1023222901562",
  appId: "1:1023222901562:web:522ee763e27aa08a8b7e03"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const seasonName="Sezóna 2";

const scheduleList=[
["HC Geus Okna Kladno","HC Dynamo Pardubice"],
["HC Bílí Tygři Liberec","HC Chemopetrol Litvínov"],
["HC Sparta Praha","HC Mountfield České Budějovice"],
["HC Znojemští Orli","HC Energie Karlovy Vary"],
["HC Dynamo Pardubice","HC Chemopetrol Litvínov"],
["HC Geus Okna Kladno","HC Mountfield České Budějovice"],
["HC Znojemští Orli","HC Sparta Praha"],
["HC Energie Karlovy Vary","HC Bílí Tygři Liberec"],
["HC Mountfield České Budějovice","HC Geus Okna Kladno"],
["HC Chemopetrol Litvínov","HC Znojemští Orli"],
["HC Dynamo Pardubice","HC Sparta Praha"],
["HC Bílí Tygři Liberec","HC Energie Karlovy Vary"],
["HC Geus Okna Kladno","HC Znojemští Orli"],
["HC Mountfield České Budějovice","HC Chemopetrol Litvínov"],
["HC Bílí Tygři Liberec","HC Sparta Praha"],
["HC Energie Karlovy Vary","HC Dynamo Pardubice"],
["HC Dynamo Pardubice","HC Geus Okna Kladno"],
["HC Chemopetrol Litvínov","HC Bílí Tygři Liberec"],
["HC Mountfield České Budějovice","HC Sparta Praha"],
["HC Energie Karlovy Vary","HC Znojemští Orli"],
["HC Chemopetrol Litvínov","HC Dynamo Pardubice"],
["HC Mountfield České Budějovice","HC Geus Okna Kladno"],
["HC Sparta Praha","HC Znojemští Orli"],
["HC Bílí Tygři Liberec","HC Energie Karlovy Vary"],
["HC Geus Okna Kladno","HC Bílí Tygři Liberec"],
["HC Znojemští Orli","HC Chemopetrol Litvínov"],
["HC Sparta Praha","HC Dynamo Pardubice"],
["HC Energie Karlovy Vary","HC Mountfield České Budějovice"],
["HC Bílí Tygři Liberec","HC Geus Okna Kladno"],
["HC Dynamo Pardubice","HC Chemopetrol Litvínov"],
["HC Mountfield České Budějovice","HC Energie Karlovy Vary"],
["HC Znojemští Orli","HC Sparta Praha"]
];

function calculateScore(stats){
    let awayGoals=Number(stats[6])+Number(stats[7])+Number(stats[8]);
    let homeGoals=Number(stats[16])+Number(stats[17])+Number(stats[18]);
    if(stats[9]==="11") awayGoals++;
    if(stats[19]==="11") homeGoals++;
    if(stats[20]==="1") homeGoals++;
    if(stats[20]==="2") awayGoals++;
    return {homeGoals,awayGoals};
}

function renderSchedule(matches){

    const container=document.getElementById("schedule");
    container.innerHTML="";

    scheduleList.forEach(pair=>{

        const match=matches.find(m=>m.homeTeam===pair[0] && m.awayTeam===pair[1]);
        let hg=0,ag=0;

        if(match){
            const s=calculateScore(match.stats);
            hg=s.homeGoals;
            ag=s.awayGoals;
        }

        container.innerHTML+=`
        <div class="matchRow">
            <div class="teamBox">${pair[0]}</div>
            <div class="scoreBox">${hg}</div>
            <div class="periods">(0:0, 0:0, 0:0)</div>
            <div class="scoreBox">${ag}</div>
            <div class="teamBox teamRight">${pair[1]}</div>
        </div>`;
    });
}

function loadMatches(){

    const q=query(collection(db,"zapasy"),orderBy("created","asc"));

    onSnapshot(q,(snapshot)=>{
        let extraligaMatches=[];

        snapshot.forEach(docSnap=>{
            const m=docSnap.data();
            if(m.category.startsWith("Extraliga") && m.season===seasonName){
                extraligaMatches.push(m);
            }
        });

        renderSchedule(extraligaMatches);
    });
}

loadMatches();

</script>
