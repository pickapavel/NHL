.resultType{

    font-weight:bold;

    height:16px;
}

</style>

<body>

<tr data-team="HC Energie Karlovy Vary (P)"><td><img class="logo" src="./logos/vary.png"></td><td>5</td><td class="team">HC Energie Karlovy Vary (P)</td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>

<h2>Rozpis zápasů</h2>
<div id="schedule" class="schedule"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, query, orderBy, onSnapshot } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD0jDnVNHZAs83g6FGwQT_nOpOCyT4NTNU",
  authDomain: "statistiky-6310a.firebaseapp.com",
  projectId: "statistiky-6310a",
  storageBucket: "statistiky-6310a.appspot.com",
  messagingSenderId: "1023222901562",
  appId: "1:1023222901562:web:522ee763e27aa08a8b7e03"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const teams=[
"HC Geus Okna Kladno (P)",
"HC Chemopetrol Litvínov (P)",
"HC Dynamo Pardubice (K)",
"HC Sparta Praha (P)",
"HC Energie Karlovy Vary (P)",
"HC Bílí Tygři Liberec (K)",
"HC Mountfield České Budějovice (K)",
"HC Oceláři Třinec (K)"
];

function safeNum(v){
    const n=Number(v);
    return isNaN(n)?0:n;
}

function calculateScore(stats){

    if(!stats) return {homeGoals:0,awayGoals:0,resultType:"",periods:"(0:0, 0:0, 0:0)"};

    let a1=safeNum(stats[6]);
    let a2=safeNum(stats[7]);
    let a3=safeNum(stats[8]);

    let h1=safeNum(stats[16]);
    let h2=safeNum(stats[17]);
    let h3=safeNum(stats[18]);

    let awayGoals=a1+a2+a3;
    let homeGoals=h1+h2+h3;

    let resultType="";

    if(stats[9]==="11") awayGoals++;
    if(stats[19]==="11") homeGoals++;

    if(stats[20]==="1"){
        homeGoals++;
        resultType="SN";
    }
    else if(stats[20]==="2"){
        awayGoals++;
        resultType="SN";
    }
    else if(
        (stats[9]==="11" || stats[19]==="11") &&
        Math.abs(homeGoals-awayGoals)===1
    ){
        resultType="OT";
    }

    return {
        homeGoals,
        awayGoals,
        resultType,
        periods:`(${h1}:${a1}, ${h2}:${a2}, ${h3}:${a3})`
    };
}

/* ===== TABULKA ===== */

function updateStandings(matches){

    const table={};

    teams.forEach(t=>{
        table[t]={
            pts:0,gf:0,ga:0,z:0,
            v:0,p:0,vp:0,pp:0,vsn:0,psn:0
        };
    });

    matches.forEach(m=>{

        const s=calculateScore(m.stats);
        const home=m.homeTeam;
        const away=m.awayTeam;

        if(!table[home] || !table[away]) return;

        table[home].z++;
        table[away].z++;

        table[home].gf+=s.homeGoals;
        table[home].ga+=s.awayGoals;
        table[away].gf+=s.awayGoals;
        table[away].ga+=s.homeGoals;

        if(s.homeGoals>s.awayGoals){

            if(s.resultType===""){
                table[home].pts+=3;
                table[home].v++;
                table[away].p++;
            }
            else if(s.resultType==="OT"){
                table[home].pts+=2;
                table[away].pts+=1;
                table[home].vp++;
                table[away].pp++;
            }
            else{
                table[home].pts+=2;
                table[away].pts+=1;
                table[home].vsn++;
                table[away].psn++;
            }

        }else{

            if(s.resultType===""){
                table[away].pts+=3;
                table[away].v++;
                table[home].p++;
            }
            else if(s.resultType==="OT"){
                table[away].pts+=2;
                table[home].pts+=1;
                table[away].vp++;
                table[home].pp++;
            }
            else{
                table[away].pts+=2;
                table[home].pts+=1;
                table[away].vsn++;
                table[home].psn++;
            }
        }

    });

    document.querySelectorAll("#standings tbody tr").forEach(tr=>{

        const team=tr.dataset.team;
        const d=table[team];

        if(!d) return;

        tr.children[3].textContent=d.pts;
        tr.children[4].textContent=`${d.gf}:${d.ga}`;
        tr.children[5].textContent=d.gf-d.ga;
        tr.children[6].textContent=d.z;
        tr.children[7].textContent=d.v;
        tr.children[8].textContent=d.p;
        tr.children[9].textContent=d.vp;
        tr.children[10].textContent=d.pp;
        tr.children[11].textContent=d.vsn;
        tr.children[12].textContent=d.psn;

    });

}

/* ===== ROZPIS ===== */

function renderSchedule(matches){

    const container=document.getElementById("schedule");
    container.innerHTML="";

    matches.forEach(m=>{
        const s=calculateScore(m.stats);

        container.innerHTML+=`
        <div class="matchRow">
            <div class="teamBox">${m.homeTeam}</div>
            <div class="scoreBox">${s.homeGoals}</div>
            <div>
                <div class="resultType">${s.resultType}</div>
                <div class="periods">${s.periods}</div>
            </div>
            <div class="scoreBox">${s.awayGoals}</div>
            <div class="teamBox teamRight">${m.awayTeam}</div>
        </div>`;
    });
}

function loadMatches(){

    const q=query(collection(db,"zapasy"),orderBy("created","asc"));

    onSnapshot(q,(snapshot)=>{

        let extraligaMatches=[];

        snapshot.forEach(docSnap=>{
            const m=docSnap.data();

            if(
                m.category &&
                m.category.startsWith("Extraliga") &&
                m.season==="Sezóna 2"
            ){
                extraligaMatches.push(m);
            }
        });

        renderSchedule(extraligaMatches);
        updateStandings(extraligaMatches);

    });
}

loadMatches();

</script>
