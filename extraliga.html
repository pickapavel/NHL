<h2>Rozpis zápasů</h2>
<div id="schedule" class="schedule"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, query, orderBy, onSnapshot }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app=initializeApp({
  apiKey:"AIzaSyD0jDnVNHZAs83g6FGwQT_nOpOCyT4NTNU",
  authDomain:"statistiky-6310a.firebaseapp.com",
  projectId:"statistiky-6310a"
});
const db=getFirestore(app);

const teamLogos={
"HC Geus Okna Kladno (P)":"kladno.png",
"HC Chemopetrol Litvínov (P)":"litvinov.png",
"HC Dynamo Pardubice (K)":"pardubice.png",
"HC Sparta Praha (P)":"sparta.png",
"HC Energie Karlovy Vary (P)":"vary.png",
"HC Bílí Tygři Liberec (K)":"liberec.png",
"HC Mountfield České Budějovice (K)":"budejovice.png",
"HC Oceláři Třinec (K)":"trinec.png",
"HC Znojemští Orli (K)":"znojmo.png"
};

function num(v){return isNaN(Number(v))?0:Number(v)}

function calculateScore(stats){
    let a=num(stats[6])+num(stats[7])+num(stats[8]);
    let h=num(stats[16])+num(stats[17])+num(stats[18]);
    let type="";
    if(stats[9]==="11") a++;
    if(stats[19]==="11") h++;
    if(stats[20]==="1"){h++;type="SN"}
    else if(stats[20]==="2"){a++;type="SN"}
    else if(Math.abs(h-a)===1&&(stats[9]==="11"||stats[19]==="11")) type="OT";
    return {h,a,type};
}

function updateStandings(matches){
    const teams={};
    document.querySelectorAll("#standings tbody tr").forEach(tr=>{
        teams[tr.dataset.team]={t:tr.dataset.team,p:0,gf:0,ga:0,z:0,v:0,pd:0,vp:0,pp:0,vsn:0,psn:0};
    });

    const mutual={};

    matches.forEach(m=>{
        const s=calculateScore(m.stats);
        const H=teams[m.homeTeam],A=teams[m.awayTeam];
        if(!H||!A) return;

        H.z++;A.z++;
        H.gf+=s.h;H.ga+=s.a;
        A.gf+=s.a;A.ga+=s.h;

        const key=[m.homeTeam,m.awayTeam].sort().join("|");
        if(!mutual[key]) mutual[key]={};

        if(s.type===""){
            if(s.h>s.a){H.p+=3;H.v++;A.pd++;mutual[key][H.t]=(mutual[key][H.t]||0)+3;}
            else{A.p+=3;A.v++;H.pd++;mutual[key][A.t]=(mutual[key][A.t]||0)+3;}
        }else if(s.type==="OT"){
            if(s.h>s.a){H.p+=2;A.p+=1;H.vp++;A.pp++;mutual[key][H.t]=(mutual[key][H.t]||0)+2;}
            else{A.p+=2;H.p+=1;A.vp++;H.pp++;mutual[key][A.t]=(mutual[key][A.t]||0)+2;}
        }else{
            if(s.h>s.a){H.p+=2;A.p+=1;H.vsn++;A.psn++;mutual[key][H.t]=(mutual[key][H.t]||0)+2;}
            else{A.p+=2;H.p+=1;A.vsn++;H.psn++;mutual[key][A.t]=(mutual[key][A.t]||0)+2;}
        }
    });

    const sorted=Object.values(teams).sort((a,b)=>{
        if(b.p!==a.p) return b.p-a.p;
        const k=[a.t,b.t].sort().join("|");
        if(mutual[k]){
            const ma=mutual[k][a.t]||0;
            const mb=mutual[k][b.t]||0;
            if(mb!==ma) return mb-ma;
        }
        const da=(a.gf-a.ga),db=(b.gf-b.ga);
        if(db!==da) return db-da;
        return b.gf-a.gf;
    });

    const tbody=document.querySelector("#standings tbody");
    sorted.forEach((t,i)=>{
        const tr=tbody.querySelector(`tr[data-team="${t.t}"]`).children;
        tr[1].innerText=i+1;
        tr[3].innerText=t.p;
        tr[4].innerText=`${t.gf}:${t.ga}`;
        tr[5].innerText=t.gf-t.ga;
        tr[6].innerText=t.z;
        tr[7].innerText=t.v;
        tr[8].innerText=t.pd;
        tr[9].innerText=t.vp;
        tr[10].innerText=t.pp;
        tr[11].innerText=t.vsn;
        tr[12].innerText=t.psn;
    });
}

const q=query(collection(db,"zapasy"),orderBy("created","asc"));
onSnapshot(q,snap=>{
    const matches=[];
    snap.forEach(d=>{
        const m=d.data();
        if(m.category?.startsWith("Extraliga")&&m.season==="Sezóna 2") matches.push(m);
    });
    updateStandings(matches);
});
</script>
</body>
