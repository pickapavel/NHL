<div class="wrapper">

<div class="tableWrap">

<script type="module">

  apiKey: "AIzaSyD0jDnVNHZAs83g6FGwQT_nOpOCyT4NTNU",

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ===== LOGA ===== */

const teamLogos={
"HC Sparta Praha (P)":"sparta.png",
"HC Bílí Tygři Liberec (K)":"liberec.png",

};

function logoHtml(team){
    return `<img class="logo" src="./logos/${teamLogos[team]}">`;
}

/* ===== KOMPLETNÍ ROZPIS 1–32 ===== */

const scheduleList=[
["HC Geus Okna Kladno (P)","HC Dynamo Pardubice (K)"],
["HC Bílí Tygři Liberec (K)","HC Chemopetrol Litvínov (P)"],
["HC Sparta Praha (P)","HC Motor České Budějovice (K)"],
["HC Energie Karlovy Vary (P)","HC Oceláři Třinec (K)"],

["HC Dynamo Pardubice (K)","HC Chemopetrol Litvínov (P)"],
["HC Geus Okna Kladno (P)","HC Motor České Budějovice (K)"],
["HC Oceláři Třinec (K)","HC Sparta Praha (P)"],
["HC Energie Karlovy Vary (P)","HC Bílí Tygři Liberec (K)"],

["HC Motor České Budějovice (K)","HC Geus Okna Kladno (P)"],
["HC Chemopetrol Litvínov (P)","HC Oceláři Třinec (K)"],
["HC Dynamo Pardubice (K)","HC Sparta Praha (P)"],
["HC Bílí Tygři Liberec (K)","HC Energie Karlovy Vary (P)"],

["HC Geus Okna Kladno (P)","HC Oceláři Třinec (K)"],
["HC Motor České Budějovice (K)","HC Chemopetrol Litvínov (P)"],
["HC Bílí Tygři Liberec (K)","HC Sparta Praha (P)"],
["HC Energie Karlovy Vary (P)","HC Dynamo Pardubice (K)"],

["HC Dynamo Pardubice (K)","HC Geus Okna Kladno (P)"],
["HC Chemopetrol Litvínov (P)","HC Bílí Tygři Liberec (K)"],
["HC Motor České Budějovice (K)","HC Sparta Praha (P)"],
["HC Energie Karlovy Vary (P)","HC Oceláři Třinec (K)"],

["HC Chemopetrol Litvínov (P)","HC Dynamo Pardubice (K)"],
["HC Motor České Budějovice (K)","HC Geus Okna Kladno (P)"],
["HC Sparta Praha (P)","HC Oceláři Třinec (K)"],
["HC Bílí Tygři Liberec (K)","HC Energie Karlovy Vary (P)"],

["HC Geus Okna Kladno (P)","HC Bílí Tygři Liberec (K)"],

["HC Sparta Praha (P)","HC Dynamo Pardubice (K)"],

["HC Bílí Tygři Liberec (K)","HC Geus Okna Kladno (P)"],
["HC Dynamo Pardubice (K)","HC Chemopetrol Litvínov (P)"],
["HC Motor České Budějovice (K)","HC Energie Karlovy Vary (P)"],
["HC Oceláři Třinec (K)","HC Sparta Praha (P)"]
];

/* ===== SKÓRE ===== */

function calculateScore(stats){

    if(!stats || stats.length<21)
        return {homeGoals:0,awayGoals:0,label:""};

    let awayGoals =
        Number(stats[6])+Number(stats[7])+Number(stats[8]);

    let homeGoals =
        Number(stats[16])+Number(stats[17])+Number(stats[18]);

    if(stats[9]==="11") awayGoals++;
    if(stats[19]==="11") homeGoals++;

    let label="";

    if(stats[20]==="1" || stats[20]==="2"){
        label="SN";
        if(stats[20]==="1") homeGoals++;
        if(stats[20]==="2") awayGoals++;
    }
    else if(stats[9]==="11" || stats[19]==="11"){
        label="OT";
    }

    return {homeGoals,awayGoals,label};
}

/* ===== ROZPIS ===== */

function renderSchedule(matches){

    const container=document.getElementById("schedule");
    container.innerHTML="";

    scheduleList.forEach(pair=>{

        const match=matches.find(m=>m.homeTeam===pair[0] && m.awayTeam===pair[1]);

        let hg=0,ag=0,label="";

        if(match){
            const s=calculateScore(match.stats);
            hg=s.homeGoals;
            ag=s.awayGoals;
            label=s.label;
        }

        container.innerHTML+=`
        <div class="matchRow">
            <div class="teamBox">${logoHtml(pair[0])}${pair[0]}</div>
            <div class="scoreBox">${hg}</div>
            <div class="periods">
                ${label?`<div class="otLabel">${label}</div>`:""}
                (0:0, 0:0, 0:0)
            </div>
            <div class="scoreBox">${ag}</div>
            <div class="teamBox teamRight">${pair[1]}${logoHtml(pair[1])}</div>
        </div>`;
    });
}

/* ===== LOAD ===== */

function loadMatches(){

    const q=query(collection(db,"zapasy"),orderBy("created","asc"));

    onSnapshot(q,(snapshot)=>{

        let extraligaMatches=[];

        snapshot.forEach(docSnap=>{
            const m=docSnap.data();

            if(
                m.category &&
                m.category.startsWith("Extraliga") &&
                m.season==="Sezóna 2"
            ){
                extraligaMatches.push(m);
            }
        });

        renderSchedule(extraligaMatches);
    });
}

loadMatches();

</script>
