<div class="tableWrap">

<thead>

<th>#</th>

<script type="module">

 storageBucket:"statistiky-6310a.appspot.com",
 messagingSenderId:"1023222901562",
 appId:"1:1023222901562:web:522ee763e27aa08a8b7e03"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

/* ===== LOGA ===== */

const teamLogos={
"HC Geus Okna Kladno (P)":"kladno.png",
"HC Chemopetrol Litvínov (P)":"litvinov.png",

"HC Znojemští Orli (K)":"znojmo.png"
};

const teams=Object.keys(teamLogos);

/* ===== ROZPIS ===== */

const scheduleList=[
["HC Geus Okna Kladno (P)","HC Dynamo Pardubice (K)"],
["HC Bílí Tygři Liberec (K)","HC Chemopetrol Litvínov (P)"],
["HC Sparta Praha (P)","HC Mountfield České Budějovice (K)"],
["HC Znojemští Orli (K)","HC Energie Karlovy Vary (P)"],
["HC Dynamo Pardubice (K)","HC Chemopetrol Litvínov (P)"],
["HC Geus Okna Kladno (P)","HC Mountfield České Budějovice (K)"],
["HC Znojemští Orli (K)","HC Sparta Praha (P)"],
["HC Energie Karlovy Vary (P)","HC Bílí Tygři Liberec (K)"],
["HC Mountfield České Budějovice (K)","HC Geus Okna Kladno (P)"],
["HC Chemopetrol Litvínov (P)","HC Znojemští Orli (K)"],
["HC Dynamo Pardubice (K)","HC Sparta Praha (P)"],
["HC Bílí Tygři Liberec (K)","HC Energie Karlovy Vary (P)"],
["HC Geus Okna Kladno (P)","HC Znojemští Orli (K)"],
["HC Mountfield České Budějovice (K)","HC Chemopetrol Litvínov (P)"],
["HC Bílí Tygři Liberec (K)","HC Sparta Praha (P)"],
["HC Energie Karlovy Vary (P)","HC Dynamo Pardubice (K)"],
["HC Dynamo Pardubice (K)","HC Geus Okna Kladno (P)"],
["HC Chemopetrol Litvínov (P)","HC Bílí Tygři Liberec (K)"],

["HC Chemopetrol Litvínov (P)","HC Dynamo Pardubice (K)"],
["HC Mountfield České Budějovice (K)","HC Geus Okna Kladno (P)"],
["HC Sparta Praha (P)","HC Znojemští Orli (K)"],
["HC Bílí Tygři Liberec (K)","HC Energie Karlovy Vary (P)"],

["HC Bílí Tygři Liberec (K)","HC Geus Okna Kladno (P)"],
["HC Dynamo Pardubice (K)","HC Chemopetrol Litvínov (P)"],
["HC Mountfield České Budějovice (K)","HC Energie Karlovy Vary (P)"],
["HC Znojemští Orli (K)","HC Sparta Praha (P)"]
];

/* ===== SAFE NUMBER ===== */

function num(v){
    const n=Number(v);
    return isNaN(n)?0:n;
}

/* ===== SCORE ===== */

function calculateScore(stats){

    if(!stats) return null;

    let away=
        num(stats[6])+num(stats[7])+num(stats[8]);

    let home=
        num(stats[16])+num(stats[17])+num(stats[18]);

    if(stats[9]==="11") away++;
    if(stats[19]==="11") home++;

    let type="normal";

    if(stats[20]==="1"){ home++; type="sn"; }
    if(stats[20]==="2"){ away++; type="sn"; }

    if(type==="normal" &&
      (stats[9]==="11"||stats[19]==="11"))
        type="ot";

    return{
        homeGoals:home,
        awayGoals:away,
        periods:`(${num(stats[16])}:${num(stats[6])}, ${num(stats[17])}:${num(stats[7])}, ${num(stats[18])}:${num(stats[8])})`,
        type
    };
}

/* ===== TABULKA ===== */

function createEmptyStats(){
    return {
        points:0, gf:0, ga:0,
        Z:0,V:0,P:0,VP:0,PP:0,VSN:0,PSN:0
    };
}

function buildStandings(matches){

    let table={};
    teams.forEach(t=>table[t]=createEmptyStats());

    matches.forEach(m=>{
        const s=calculateScore(m.stats);
        if(!s) return;

        const h=table[m.homeTeam];
        const a=table[m.awayTeam];

        h.Z++; a.Z++;

        h.gf+=s.homeGoals;
        h.ga+=s.awayGoals;
        a.gf+=s.awayGoals;
        a.ga+=s.homeGoals;

        if(s.type==="normal"){
            if(s.homeGoals>s.awayGoals){ h.points+=3; h.V++; a.P++; }
            else{ a.points+=3; a.V++; h.P++; }
        }
        else if(s.type==="ot"){
            if(s.homeGoals>s.awayGoals){ h.points+=2; h.VP++; a.points+=1; a.PP++; }
            else{ a.points+=2; a.VP++; h.points+=1; h.PP++; }
        }
        else{
            if(s.homeGoals>s.awayGoals){ h.points+=2; h.VSN++; a.points+=1; a.PSN++; }
            else{ a.points+=2; a.VSN++; h.points+=1; h.PSN++; }
        }
    });

    return Object.entries(table)
        .sort((a,b)=>{
            if(b[1].points!==a[1].points)
                return b[1].points-a[1].points;
            return (b[1].gf-b[1].ga)-(a[1].gf-a[1].ga);
        });
}

function renderStandings(matches){

    const tbody=document.querySelector("#standings tbody");
    tbody.innerHTML="";

    const sorted=buildStandings(matches);

    sorted.forEach((row,i)=>{
        const team=row[0];
        const s=row[1];

        tbody.innerHTML+=`
        <tr>
        <td><img class="logo" src="./logos/${teamLogos[team]}"></td>
        <td>${i+1}</td>
        <td class="team">${team}</td>
        <td>${s.points}</td>
        <td>${s.gf}:${s.ga}</td>
        <td>${s.gf-s.ga}</td>
        <td>${s.Z}</td>
        <td>${s.V}</td>
        <td>${s.P}</td>
        <td>${s.VP}</td>
        <td>${s.PP}</td>
        <td>${s.VSN}</td>
        <td>${s.PSN}</td>
        </tr>`;
    });
}

/* ===== ROZPIS ===== */

function logoHtml(team){
    return `<img class="logo" src="./logos/${teamLogos[team]}">`;
}

function renderSchedule(matches){

    const container=document.getElementById("schedule");
    container.innerHTML="";

    scheduleList.forEach(pair=>{

        const m=matches.find(x=>x.homeTeam===pair[0] && x.awayTeam===pair[1]);
        const s=m?calculateScore(m.stats):null;

        container.innerHTML+=`
        <div class="matchRow">
            <div class="teamBox">${logoHtml(pair[0])}${pair[0]}</div>
            <div class="scoreBox">${s?s.homeGoals:0}</div>
            <div class="periods">
                ${s && s.type!=="normal"?`<div class="otLabel">${s.type.toUpperCase()}</div>`:""}
                ${s?s.periods:"(0:0, 0:0, 0:0)"}
            </div>
            <div class="scoreBox">${s?s.awayGoals:0}</div>
            <div class="teamBox teamRight">${pair[1]}${logoHtml(pair[1])}</div>
        </div>`;
    });
}

/* ===== LOAD ===== */

function loadMatches(){

    const q=query(collection(db,"zapasy"),orderBy("created","asc"));

    onSnapshot(q,(snap)=>{

        let matches=[];

        snap.forEach(d=>{
            const m=d.data();
            if(
                m.category &&
                m.category.startsWith("Extraliga") &&
                m.season==="Sezóna 2"
            ){
                matches.push(m);
            }
        });

        renderStandings(matches);
        renderSchedule(matches);
    });
}

loadMatches();

</script>
