function updateElo(home,away,hg,ag){

 if(ratings[home]===undefined)ratings[home]=BASE_RATING
 if(ratings[away]===undefined)ratings[away]=BASE_RATING

 let ra=ratings[home]+HOME_ADV
 let rb=ratings[away]

 let ea=expected(ra,rb)
 let eb=expected(rb,ra)

 let sa=hg>ag?1:0
 let sb=ag>hg?1:0

 ratings[home]+=K*(sa-ea)
 ratings[away]+=K*(sb-eb)

}

 let ra=(ratings[home]||1000)+HOME_ADV
 let rb=(ratings[away]||1000)

 const diff = Math.abs(ra-rb)

 const pHome=1/(1+Math.pow(10,(rb-ra)/400))
 const pAway=1-pHome

 // čím vyrovnanější týmy, tím vyšší šance na remízu

/* ===== GÓLY ===== */

function calc(stats){

 let ag=Number(stats[6])+Number(stats[7])+Number(stats[8])
 let hg=Number(stats[16])+Number(stats[17])+Number(stats[18])

 if(stats[9]==="11") ag++
 if(stats[19]==="11") hg++
 if(stats[20]==="1") hg++
 if(stats[20]==="2") ag++

 return {hg,ag}

}

 function getMatchTip(stats){

 const s = calc(stats)

 const isSN = (stats[20]==="1" || stats[20]==="2")
 const isOT = (!isSN && (stats[9]==="11" || stats[19]==="11"))

 if(!isSN && !isOT){
  if(s.hg > s.ag) return 1
  if(s.ag > s.hg) return 5
 }

 if(isOT){
  if(s.hg > s.ag) return 2
  if(s.ag > s.hg) return 4
 }

 if(isSN){
  if(s.hg > s.ag) return 2
  if(s.ag > s.hg) return 4
 }

 return 3
}

/* ===== TABULKA ===== */

function createEmpty(){

 let obj={}

 teams.forEach(t=>{
  obj[t]={team:t,b:0,z:0,v:0,p:0,vp:0,pp:0,vsn:0,psn:0,gf:0,ga:0}
 })

 return obj
}

function calculateStandings(matches){

 let table=createEmpty()

 matches.forEach(m=>{

  if(!m.stats)return

  const s=calc(m.stats)
  const h=table[m.homeTeam]
  const a=table[m.awayTeam]

  h.z++;a.z++

  h.gf+=s.hg;h.ga+=s.ag
  a.gf+=s.ag;a.ga+=s.hg

  const isSN=(m.stats[20]==="1"||m.stats[20]==="2")
  const isOT=(!isSN&&(m.stats[9]==="11"||m.stats[19]==="11"))

  if(isSN){
   if(s.hg>s.ag){h.vsn++;h.b+=2;a.psn++;a.b+=1;}
   else{a.vsn++;a.b+=2;h.psn++;h.b+=1;}
  }
  else if(isOT){
   if(s.hg>s.ag){h.vp++;h.b+=2;a.pp++;a.b+=1;}
   else{a.vp++;a.b+=2;h.pp++;h.b+=1;}
  }
  else{
   if(s.hg>s.ag){h.v++;h.b+=3;a.p++;}
   else{a.v++;a.b+=3;h.p++;}
  }

 })

 return Object.values(table).sort((a,b)=>{
  if(b.b!==a.b)return b.b-a.b
  if((b.gf-b.ga)!==(a.gf-a.ga))return(b.gf-b.ga)-(a.gf-a.ga)
  return b.gf-a.gf
 })

}

  if(!match.stats) continue

  if(!savedTips[key]) continue

  await evaluateMatch(
   match.homeTeam,
   match.awayTeam,
   {...match.stats, matchId: match.id}
  )
 }
}

async function start(){

 await loadCredits()

 // načtení tipů
 const tipsQuery = query(collection(db,"tipy"))

 onSnapshot(tipsQuery,(snap)=>{

  savedTips={}

snap.forEach(d=>{
 const t=d.data()
 const key=t.homeTeam+"_"+t.awayTeam

 if(!savedTips[key]) savedTips[key]={}

savedTips[key].kLocked = t.kLocked || false
savedTips[key].pLocked = t.pLocked || false

 if(t.kTip) savedTips[key].kTip = t.kTip
 if(t.kBet) savedTips[key].kBet = t.kBet

 if(t.pTip) savedTips[key].pTip = t.pTip
 if(t.pBet) savedTips[key].pBet = t.pBet
})

// ✅ AŽ TADY:
applySeasonFilter()
tryEvaluateAll()
 
onSnapshot(q,(snap)=>{

 allMatches=[]

 snap.forEach(d=>{
  const match = {id:d.id,...d.data()}
  allMatches.push(match)
 })

 applySeasonFilter()
 tryEvaluateAll() // ✅ SEM to patří
})

 allMatches=[]

 snap.forEach(d=>{

const match = {id:d.id,...d.data()}

  allMatches.push(match)



 })

 applySeasonFilter()

})
}
start()



</script>
