/* ===== VÝPOČET SKÓRE ===== */

function score(stats){
if(!stats || stats.length<21) return null;

let ag=(+stats[6]||0)+(+stats[7]||0)+(+stats[8]||0);
let hg=(+stats[16]||0)+(+stats[17]||0)+(+stats[18]||0);

if(stats[9]==="11") ag++;
if(stats[19]==="11") hg++;
if(stats[20]==="1") hg++;
if(stats[20]==="2") ag++;

return {hg,ag};
}

/* ===== TABULKA ===== */

function renderTable(matches){

const data={};
teams.forEach(t=>{
data[t]={team:t,b:0,gs:0,ga:0,z:0,v:0,p:0,vsn:0,psn:0};
});

matches.forEach(m=>{
if(!m.stats || m.stats.length<21) return;

const s=score(m.stats);
if(!s) return;

const H=data[m.homeTeam];
const A=data[m.awayTeam];

H.z++; A.z++;
H.gs+=s.hg; H.ga+=s.ag;
A.gs+=s.ag; A.ga+=s.hg;

if(m.stats[20]==="1"){H.b+=2;A.b+=1;H.vsn++;A.psn++;}
else if(m.stats[20]==="2"){A.b+=2;H.b+=1;A.vsn++;H.psn++;}
else if(s.hg>s.ag){H.b+=3;H.v++;A.p++;}
else{A.b+=3;A.v++;H.p++;}
});

const arr=Object.values(data).sort((a,b)=>b.b-a.b);

const tb=document.querySelector("#standings tbody");
tb.innerHTML="";

arr.forEach((t,i)=>{
tb.innerHTML+=`
<tr>
<td><img class="logo" src="./logos/${logos[t.team]}"></td>
<td>${i+1}</td>
<td class="team">${t.team}</td>
<td>${t.b}</td>
<td>${t.gs}:${t.ga}</td>
<td>${t.gs-t.ga}</td>
<td>${t.z}</td>
<td>${t.v}</td>
<td>${t.p}</td>
<td>0</td>
<td>0</td>
<td>${t.vsn}</td>
<td>${t.psn}</td>
</tr>`;
});
}

/* ===== ROZPIS ===== */

function renderSchedule(matches){

const c=document.getElementById("schedule");
c.innerHTML="";

scheduleList.forEach(pair=>{

let hg=0,ag=0,label="";
const m=matches.find(x=>x.homeTeam===pair[0]&&x.awayTeam===pair[1]);

if(m && m.stats){
const s=score(m.stats);
if(s){hg=s.hg;ag=s.ag;}
if(m.stats[20]==="1"||m.stats[20]==="2") label="SN";
else if(m.stats[9]==="11"||m.stats[19]==="11") label="OT";
}

c.innerHTML+=`
<div class="matchRow">
<div class="teamBox"><img class="logo" src="./logos/${logos[pair[0]]}">${pair[0]}</div>
<div class="scoreBox">${hg}</div>
<div class="periods">${label?`<div class="otLabel">${label}</div>`:""}(0:0, 0:0, 0:0)</div>
<div class="scoreBox">${ag}</div>
<div class="teamBox teamRight">${pair[1]}<img class="logo" src="./logos/${logos[pair[1]]}"></div>
</div>`;
});
}

/* ===== LOAD ===== */

function load(){

const q=query(collection(db,"zapasy"),orderBy("created","asc"));

onSnapshot(q,(snap)=>{

let matches=[];

snap.forEach(d=>{
const m=d.data();
if(
m.category?.startsWith("Extraliga") &&
m.season==="Sezóna 2"
){
matches.push(m);
}
});

renderTable(matches);
renderSchedule(matches);

});
}

load();
