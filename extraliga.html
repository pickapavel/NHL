function updateElo(home,away,hg,ag){

 if(ratings[away]===undefined)ratings[away]=BASE_RATING

 let ra=ratings[home]+HOME_ADV
 let rb=ratings[away]

 let ea=expected(ra,rb)
 let eb=expected(rb,ra)

 let sa=hg>ag?1:0
 let sb=ag>hg?1:0

 ratings[home]+=K*(sa-ea)
 ratings[away]+=K*(sb-eb)

}

 const pAway=1-pHome

/* ===== GÓLY ===== */

function calc(stats){

 let ag=Number(stats[6])+Number(stats[7])+Number(stats[8])
 let hg=Number(stats[16])+Number(stats[17])+Number(stats[18])

 if(stats[9]==="11") ag++
 if(stats[19]==="11") hg++
 if(stats[20]==="1") hg++
 if(stats[20]==="2") ag++

 return {hg,ag}

}

 function getMatchTip(stats){

 const s = calc(stats)

 const isSN = (stats[20]==="1" || stats[20]==="2")
 const isOT = (!isSN && (stats[9]==="11" || stats[19]==="11"))

 if(!isSN && !isOT){
  if(s.hg > s.ag) return 1
  if(s.ag > s.hg) return 5
 }

 if(isOT){
  if(s.hg > s.ag) return 2
  if(s.ag > s.hg) return 4
 }

 if(isSN){
  if(s.hg > s.ag) return 2
  if(s.ag > s.hg) return 4
 }

 return 3
}

/* ===== TABULKA ===== */

function createEmpty(){

 let obj={}

 teams.forEach(t=>{
  obj[t]={team:t,b:0,z:0,v:0,p:0,vp:0,pp:0,vsn:0,psn:0,gf:0,ga:0}
 })

 return obj
}

function calculateStandings(matches){

 let table=createEmpty()

 matches.forEach(m=>{

  if(!m.stats)return

  const s=calc(m.stats)
  const h=table[m.homeTeam]
  const a=table[m.awayTeam]

  h.z++;a.z++

  h.gf+=s.hg;h.ga+=s.ag
  a.gf+=s.ag;a.ga+=s.hg

  const isSN=(m.stats[20]==="1"||m.stats[20]==="2")
  const isOT=(!isSN&&(m.stats[9]==="11"||m.stats[19]==="11"))

  if(isSN){
   if(s.hg>s.ag){h.vsn++;h.b+=2;a.psn++;a.b+=1;}
   else{a.vsn++;a.b+=2;h.psn++;h.b+=1;}
  }
  else if(isOT){
   if(s.hg>s.ag){h.vp++;h.b+=2;a.pp++;a.b+=1;}
   else{a.vp++;a.b+=2;h.pp++;h.b+=1;}
  }
  else{
   if(s.hg>s.ag){h.v++;h.b+=3;a.p++;}
   else{a.v++;a.b+=3;h.p++;}
  }

 })

 return Object.values(table).sort((a,b)=>{
  if(b.b!==a.b)return b.b-a.b
  if((b.gf-b.ga)!==(a.gf-a.ga))return(b.gf-b.ga)-(a.gf-a.ga)
  return b.gf-a.gf
 })

}

   const team=teamFilter.value

   if(homeAwayMode==="home" && p[0]!==team) return
   if(homeAwayMode==="away" && p[1]!==team) return

  }

  const m=matches.find(x=>x.homeTeam===p[0]&&x.awayTeam===p[1])

  const val = document.getElementById("matchFilter").value

if(val === "played" && (!m || !m.stats)) return
if(val === "unplayed" && (m && m.stats)) return

  if(resultMode!=="all"){

   if(!m || !m.stats) return

   const s=calc(m.stats)
   const team=teamFilter.value

   if(team!=="all"){

    let win=false

    if(m.homeTeam===team && s.hg>s.ag) win=true
    if(m.awayTeam===team && s.ag>s.hg) win=true

    if(resultMode==="win" && !win) return
    if(resultMode==="loss" && win) return

   }

  }

  let hg=0,ag=0
  let h1=0,h2=0,h3=0,a1=0,a2=0,a3=0

  if(m){

   const s=calc(m.stats)

   hg=s.hg
   ag=s.ag

   a1=Number(m.stats[6])||0
   a2=Number(m.stats[7])||0
   a3=Number(m.stats[8])||0

   h1=Number(m.stats[16])||0
   h2=Number(m.stats[17])||0
   h3=Number(m.stats[18])||0

  }

 const link=`statistiky-zapasu.html?id=${m?.id || ""}`
  const odds=calculateOdds(p[0],p[1])

  cont.innerHTML+=`

  <div class="matchRow">

  <div class="teamBox">
<img class="logo" src="./logos/${logos[p[0]]}">
<div>
${p[0]}
<div style="font-size:12px;color:#666;">
⭐ ${Math.round(ratings[p[0]]||1000)}
</div>
</div>
</div>

   <div class="scoreBox">${hg}</div>

   <div class="periods">
   (${h1}:${a1}, ${h2}:${a2}, ${h3}:${a3})
   </div>

   <div class="scoreBox">${ag}</div>

  <div class="teamBox teamRight">
<div style="text-align:right">
${p[1]}
<div style="font-size:12px;color:#666;">
⭐ ${Math.round(ratings[p[1]]||1000)}
</div>
</div>
<img class="logo" src="./logos/${logos[p[1]]}">
</div>

   <div>
   <button class="statsBtn" onclick="window.location.href='${link}'">
   Statistiky
   </button>
   </div>

  </div>
  
${!scheduleOnly ? `
<div class="oddsRow" id="odds_${p[0]}_${p[1]}">

<div class="odds">Výhra<br>${odds.o1}</div>
<div class="odds">Výhra (OT/SN)<br>${odds.o2}</div>
<div class="odds">Remíza<br>${odds.draw}</div>
<div class="odds">Výhra (OT/SN)<br>${odds.o4}</div>
<div class="odds">Výhra<br>${odds.o3}</div>

</div>
` : ``}

${!scheduleOnly ? `
<div class="predictionRow">

<input id="k_${p[0]}_${p[1]}" placeholder="K tip (1-5)" oninput="calcWin('${p[0]}','${p[1]}')" value="${savedTips[p[0]+'_'+p[1]]?.kTip || ''}"><input id="kbet_${p[0]}_${p[1]}" placeholder="Kč" oninput="calcWin('${p[0]}','${p[1]}')" value="${savedTips[p[0]+'_'+p[1]]?.kBet || ''}">
<input id="kwin_${p[0]}_${p[1]}" placeholder="Možná výhra" readonly>
<button onclick="saveTip('${p[0]}','${p[1]}','K')">Potvrdit</button>

<input id="p_${p[0]}_${p[1]}" placeholder="P tip (1-5)" oninput="calcWin('${p[0]}','${p[1]}')" value="${savedTips[p[0]+'_'+p[1]]?.pTip || ''}"><input id="pbet_${p[0]}_${p[1]}" placeholder="Kč" oninput="calcWin('${p[0]}','${p[1]}')" value="${savedTips[p[0]+'_'+p[1]]?.pBet || ''}">
<input id="pwin_${p[0]}_${p[1]}" placeholder="Možná výhra" readonly>
<button onclick="saveTip('${p[0]}','${p[1]}','P')">Potvrdit</button>

</div>
` : ``}

</div>
</div>

${!scheduleOnly ? `
<div style="margin-left:40px;font-weight:bold;">
Kubele: ${kreditK} Kč | Pici: ${kreditP} Kč
</div>
` : ``}

`
setTimeout(()=>calcWin(p[0],p[1]),50)
 })

}

/* ===== SEASON ===== */

function applySeasonFilter(){

 resetRatings()

 const extraliga=allMatches.filter(m=>m.category?.startsWith("Extraliga"))

 extraliga.sort((a,b)=>a.created-b.created)

 extraliga.forEach(m=>{
  if(!m.stats)return
  const s=calc(m.stats)
  updateElo(m.homeTeam,m.awayTeam,s.hg,s.ag)
 })

 const filtered=allMatches.filter(m=>
  m.category?.startsWith("Extraliga") &&
  m.season===selectedSeason
 )

 renderSchedule(filtered)
 renderStandings(calculateStandings(filtered))

}

document.getElementById("viewMode").onchange=(e)=>{
 scheduleOnly = (e.target.value === "schedule")
 applySeasonFilter()
}

document.getElementById("seasonFilter").onchange=(e)=>{
 selectedSeason=e.target.value
 applySeasonFilter()
}

const q=query(collection(db,"zapasy"),orderBy("created","asc"))

async function start(){

 await loadCredits()

 // načtení tipů
 const tipsQuery = query(collection(db,"tipy"))

 onSnapshot(tipsQuery,(snap)=>{

  savedTips={}

snap.forEach(d=>{
 const t=d.data()
 const key=t.homeTeam+"_"+t.awayTeam

 if(!savedTips[key]) savedTips[key]={}

 if(t.kTip) savedTips[key].kTip = t.kTip
 if(t.kBet) savedTips[key].kBet = t.kBet

 if(t.pTip) savedTips[key].pTip = t.pTip
 if(t.pBet) savedTips[key].pBet = t.pBet
})

  applySeasonFilter()
  tryEvaluateAll()

 })

 // načtení zápasů

async function tryEvaluateAll(){

 for(const match of allMatches){

  if(!match.stats) continue

  const key = match.homeTeam + "_" + match.awayTeam

  if(!savedTips[key]) continue

  await evaluateMatch(
   match.homeTeam,
   match.awayTeam,
   {...match.stats, matchId: match.id}
  )
 }
}

 
onSnapshot(q,(snap)=>{

 allMatches=[]

 snap.forEach(d=>{

const match = {id:d.id,...d.data()}

  allMatches.push(match)



 })

 applySeasonFilter()

})
}
start()



</script>
