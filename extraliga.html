<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Extraliga – zápasy</title>

<style>

*{box-sizing:border-box}

body{
    font-family:Arial;
    margin:0;
    background:#f2f2f2;
}

.wrapper{
    max-width:1200px;
    margin:auto;
    padding:20px;
    background:white;
}

h1{margin-top:0}

.filterBar{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:15px;
}

.filterBar > *{
    padding:8px;
    font-size:15px;
}

.tableWrap{
    overflow-x:auto;
}

table{
    border-collapse:collapse;
    width:100%;
    min-width:700px;
}

th,td{
    border:1px solid #999;
    padding:8px;
    text-align:left;
}

th{
    background:#2f9ec9;
    color:white;
}

@media (max-width:700px){
    .filterBar > *{flex:100%;}
}

</style>
</head>

<body>

<div class="wrapper">

<h1>Extraliga – zápasy</h1>

<div class="filterBar">

<select id="filterCategory">
<option value="">Všechny kategorie</option>
<option selected>Extraliga - základní část</option>
<option>Extraliga - předkolo</option>
<option>Extraliga - čtvrtfinále</option>
<option>Extraliga - semifinále</option>
<option>Extraliga - finále</option>
</select>

<select id="filterTeam">
<option value="">Všechny týmy</option>
</select>

<select id="filterResult">
<option value="">Všechny výsledky</option>
<option value="normal">Základní hrací doba</option>
<option value="ot">Prodloužení (OT)</option>
<option value="sn">Samostatné nájezdy (SN)</option>
</select>

<button onclick="applyFilter()">Filtrovat</button>
<button onclick="resetFilter()">Zobrazit vše</button>

</div>

<div class="tableWrap">
<table id="matches">
<thead>
<tr>
<th>Datum</th>
<th>Kategorie</th>
<th>Domácí</th>
<th>Hosté</th>
<th>Skóre</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, query, orderBy, onSnapshot } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD0jDnVNHZAs83g6FGwQT_nOpOCyT4NTNU",
  authDomain: "statistiky-6310a.firebaseapp.com",
  projectId: "statistiky-6310a",
  storageBucket: "statistiky-6310a.appspot.com",
  messagingSenderId: "1023222901562",
  appId: "1:1023222901562:web:522ee763e27aa08a8b7e03"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let allMatches=[];

/* ===== SCORE ===== */

function calculateScore(stats){

    let awayGoals =
        Number(stats[6])+Number(stats[7])+Number(stats[8]);

    let homeGoals =
        Number(stats[16])+Number(stats[17])+Number(stats[18]);

    if(stats[9]==="11") awayGoals++;
    if(stats[19]==="11") homeGoals++;

    let suffix="";
    let type="normal";

    if(stats[20]==="1"){
        homeGoals++;
        suffix=" SN";
        type="sn";
    }
    else if(stats[20]==="2"){
        awayGoals++;
        suffix=" SN";
        type="sn";
    }
    else if(
        (stats[9]==="11" || stats[19]==="11") &&
        Math.abs(homeGoals-awayGoals)===1
    ){
        suffix=" OT";
        type="ot";
    }

    return { text: homeGoals+" : "+awayGoals+suffix, type };
}

/* ===== LOAD REALTIME ===== */

function loadMatches(){

    const q=query(collection(db,"zapasy"),orderBy("created","desc"));

    onSnapshot(q,(snapshot)=>{
        allMatches=[];

        snapshot.forEach(docSnap=>{
            allMatches.push({id:docSnap.id,...docSnap.data()});
        });

        fillTeamFilter();
        applyFilter();
    });
}

/* ===== FILTER LIST ===== */

function fillTeamFilter(){

    const set=new Set();

    allMatches.forEach(m=>{
        set.add(m.homeTeam);
        set.add(m.awayTeam);
    });

    const sel=document.getElementById("filterTeam");
    const current=sel.value;

    sel.innerHTML='<option value="">Všechny týmy</option>';

    set.forEach(t=>{
        sel.innerHTML+=`<option value="${t}">${t}</option>`;
    });

    sel.value=current;
}

/* ===== FILTER ===== */

window.applyFilter=function(){

    const fc=filterCategory.value;
    const ft=filterTeam.value;
    const fr=filterResult.value;

    renderMatches(fc,ft,fr);
}

window.resetFilter=function(){
    filterCategory.value="Extraliga - základní část";
    filterTeam.value="";
    filterResult.value="";
    renderMatches(filterCategory.value);
}

/* ===== RENDER ===== */

function renderMatches(fc="",ft="",fr=""){

    const tbody=document.querySelector("#matches tbody");
    tbody.innerHTML="";

    allMatches.forEach(m=>{

        const score=calculateScore(m.stats);

        if(fc && m.category!==fc) return;
        if(ft && m.homeTeam!==ft && m.awayTeam!==ft) return;
        if(fr && score.type!==fr) return;

        const tr=document.createElement("tr");

        tr.innerHTML=`
        <td>${new Date(m.created).toLocaleDateString()}</td>
        <td>${m.category}</td>
        <td>${m.homeTeam}</td>
        <td>${m.awayTeam}</td>
        <td>${score.text}</td>
        `;

        tbody.appendChild(tr);
    });
}

loadMatches();

</script>

</body>
</html>
