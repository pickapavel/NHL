<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Extraliga - 2. sezóna</title>

<style>
*{box-sizing:border-box}

body{
 font-family:Arial;
 margin:0;
 background:#f2f2f2;
}

.wrapper{
 max-width:1200px;
 margin:auto;
 padding:20px;
 background:white;
}

/* ===== HLAVIČKA ===== */

.headerBar{
 display:flex;
 align-items:center;
 justify-content:space-between;
 background:#e9ecef;
 border-radius:12px;
 padding:20px;
 margin-bottom:25px;
}

.headerBar img{
 height:110px;
 object-fit:contain;
}

.seasonCard{
 background:#0b2a3c;
 color:white;
 font-size:26px;
 font-weight:bold;
 padding:14px 28px;
 border-radius:10px;
 box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

/* ===== TABULKA ===== */

.standingsCard{
 display:flex;align-items:center;justify-content:space-between;
 background:#e9ecef;border-radius:10px;padding:14px 16px;margin-bottom:10px;
}

.rank{width:30px;font-weight:bold;font-size:18px;text-align:center;}
.teamBlock{display:flex;align-items:center;gap:14px;flex:1;}

.logo{
 width:40px;height:40px;object-fit:contain;
 filter:contrast(1.1) saturate(1.15);
 box-shadow:0 2px 6px rgba(0,0,0,0.25);
 border-radius:6px;background:white;padding:2px;
}

.teamInfo{display:flex;flex-direction:column;}
.teamName{font-weight:bold;font-size:16px;}
.teamStats{font-size:13px;color:#444;margin-top:2px;}

.pointsBox{
 background:#0b2a3c;color:white;font-size:20px;font-weight:bold;
 padding:10px 16px;border-radius:8px;min-width:60px;text-align:center;
}

/* ===== FILTRY ===== */

.filterBar{
 display:flex;gap:10px;align-items:center;margin:15px 0;flex-wrap:wrap;
}

.filterBar select,
.filterBar button{
 padding:8px 10px;border-radius:6px;border:1px solid #ccc;font-weight:bold;
}

.filterActive{
 background:#2f9ec9;color:white;border-color:#2f9ec9;
}

.headToHeadPanel{
 display:none;
 background:#e3f2f9;
 padding:14px;
 border-radius:8px;
 margin-top:8px;
 border:2px solid #2f9ec9;
}

.headToHeadTitle{
 font-weight:bold;
 font-size:15px;
 margin-bottom:6px;
 color:#0b2a3c;
}

/* ===== ZÁPAS ===== */

.matchRow{
 display:grid;
 grid-template-columns:1fr 70px 220px 70px 1fr 120px;
 align-items:center;background:#e9ecef;
 padding:10px;margin-bottom:2px;border-radius:6px;gap:8px;
}

.teamBox{display:flex;align-items:center;gap:10px;font-weight:bold;}
.teamRight{justify-content:flex-end;}

.scoreBox{
 background:#0b2a3c;color:white;font-size:22px;font-weight:bold;
 padding:8px 0;border-radius:6px;text-align:center;
}

.periods{text-align:center;font-size:14px}
.otLabel{font-weight:bold;font-size:13px;margin-bottom:2px}

.statsBtn{
 background:#2f9ec9;color:white;border:none;
 padding:8px 12px;border-radius:6px;cursor:pointer;
 font-weight:bold;width:100%;
}

/* ===== TIPOVÁNÍ ===== */

.predictionRow{
 display:grid;
 grid-template-columns:120px 1fr 1fr 1fr 1fr 150px 120px;
 gap:8px;
 background:#f5f7f9;
 border:2px solid #e1e4e8;
 padding:10px;
 border-radius:6px;
 margin-bottom:10px;
 align-items:center;
}

.ratingBox{text-align:center;font-weight:bold;}

.odds{
 text-align:center;
 background:white;
 border:1px solid #ccc;
 padding:6px;
 border-radius:6px;
 font-weight:bold;
}

.tipInput input{
 width:100%;
 padding:6px;
 border-radius:6px;
 border:1px solid #ccc;
 text-align:center;
 font-weight:bold;
}
</style>
</head>

<body>

<div class="wrapper">

<div class="headerBar">
<img src="img/extraliga.jpg" alt="Extraliga">
<div class="seasonCard" id="seasonLabel">2. sezóna</div>
</div>

<div id="standingsBody"></div>

<h2>Rozpis zápasů</h2>

<button id="headToHeadBtn">Vzájemné zápasy</button>

<div id="headToHeadPanel" class="headToHeadPanel">
<div class="headToHeadTitle">Vyber soupeře:</div>
<select id="opponentFilter">

</select>
</div>

<div id="schedule"></div>

</div>

</html>
