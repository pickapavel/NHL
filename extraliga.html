<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Extraliga - 2. sezóna</title>

<style>
*{box-sizing:border-box}
body{font-family:Arial;margin:0;background:#f2f2f2;}
.wrapper{max-width:1200px;margin:auto;padding:20px;background:white;}
h1{margin-top:0}

.standingsCard{
 display:flex;align-items:center;justify-content:space-between;
 background:#e9ecef;border-radius:10px;padding:14px 16px;margin-bottom:10px;
}

.rank{width:30px;font-weight:bold;font-size:18px;text-align:center;}
.teamBlock{display:flex;align-items:center;gap:14px;flex:1;}

.logo{
 width:40px;height:40px;object-fit:contain;
 filter:contrast(1.1) saturate(1.15);
 box-shadow:0 2px 6px rgba(0,0,0,0.25);
 border-radius:6px;background:white;padding:2px;
}

.teamInfo{display:flex;flex-direction:column;}
.teamName{font-weight:bold;font-size:16px;}
.teamStats{font-size:13px;color:#444;margin-top:2px;}

.pointsBox{
 background:#0b2a3c;color:white;font-size:20px;font-weight:bold;
 padding:10px 16px;border-radius:8px;min-width:60px;text-align:center;
}

.filterBar{
 display:flex;gap:10px;align-items:center;margin:15px 0;flex-wrap:wrap;
}

.filterBar select,
.filterBar button{
 padding:8px 10px;border-radius:6px;border:1px solid #ccc;font-weight:bold;
}

.filterActive{
 background:#2f9ec9;color:white;border-color:#2f9ec9;
}

.headToHeadPanel{
 display:none;
 background:#e3f2f9;
 padding:14px;
 border-radius:8px;
 margin-top:8px;
 border:2px solid #2f9ec9;
}

.headToHeadTitle{
 font-weight:bold;
 font-size:15px;
 margin-bottom:6px;
 color:#0b2a3c;
}

.matchRow{
 display:grid;
 grid-template-columns:1fr 70px 220px 70px 1fr 120px;
 align-items:center;background:#e9ecef;
 padding:10px;margin-bottom:6px;border-radius:6px;gap:8px;
}

.teamBox{display:flex;align-items:center;gap:10px;font-weight:bold;}
.teamRight{justify-content:flex-end;}

.scoreBox{
 background:#0b2a3c;color:white;font-size:22px;font-weight:bold;
 padding:8px 0;border-radius:6px;text-align:center;
}

.periods{text-align:center;font-size:14px}
.otLabel{font-weight:bold;font-size:13px;margin-bottom:2px}

.statsBtn{
 background:#2f9ec9;color:white;border:none;
 padding:8px 12px;border-radius:6px;cursor:pointer;
 font-weight:bold;width:100%;
}

@media (max-width:900px){
 .matchRow{
  grid-template-columns:1fr auto;
  grid-template-rows:auto auto auto auto;
 }
 .teamBox,.scoreBox,.periods,.statsBtn{
  grid-column:1/3;justify-content:center;text-align:center;
 }
}
</style>
</head>

<body>
<div class="wrapper">

<h1>Extraliga - 2. sezóna</h1>

<div id="standingsBody"></div>

<h2>Rozpis zápasů</h2>

<div class="filterBar">

<select id="teamFilter">
<option value="all">Všechny týmy</option>
</select>

<button id="filterAll" class="filterActive">Všechny zápasy</button>
<button id="filterPlayed">Jen odehrané</button>

<select id="homeAwayFilter">
<option value="both">Domácí i venkovní</option>
<option value="home">Jen domácí</option>
<option value="away">Jen venkovní</option>
</select>

<select id="resultFilter">
<option value="all">Všechny výsledky</option>
<option value="win">Jen výhry</option>
<option value="loss">Jen prohry</option>
</select>

<button id="headToHeadBtn">Vzájemné zápasy</button>

</div>

<div id="headToHeadPanel" class="headToHeadPanel">
<div class="headToHeadTitle">Vyber soupeře:</div>
<select id="opponentFilter">
<option value="none">-- Vyber tým --</option>
</select>
</div>

<div id="schedule"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, query, orderBy, onSnapshot }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig={
 apiKey:"AIzaSyD0jDnVNHZAs83g6FGwQT_nOpOCyT4NTNU",
 authDomain:"statistiky-6310a.firebaseapp.com",
 projectId:"statistiky-6310a"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

const teamsData={
 "HC Sparta Praha (P)":"sparta.png",
 "HC Bílí Tygři Liberec (K)":"liberec.png",
 "HC Dynamo Pardubice (K)":"pardubice.png",
 "HC Chemopetrol Litvínov (P)":"litvinov.png",
 "HC Geus Okna Kladno (P)":"kladno.png",
 "HC Motor České Budějovice (K)":"budejovice.png",
 "HC Energie Karlovy Vary (P)":"vary.png",
 "HC Oceláři Třinec (K)":"trinec.png"
};

const teams=Object.keys(teamsData);
const logos=teamsData;

const scheduleIndex=[
 [0,1],[3,2],[5,4],[7,6],
 [2,0],[1,3],[6,5],[4,7],
 [0,5],[3,7],[1,4],[2,6],
 [7,0],[4,2],[6,1],[5,3],
 [1,0],[2,3],[4,5],[6,7],
 [0,2],[3,1],[5,6],[7,4],
 [5,0],[7,3],[4,1],[6,2],
 [0,7],[2,4],[1,6],[3,5]
];

const scheduleList=scheduleIndex.map(([h,a])=>[teams[h],teams[a]]);

let selectedTeam="all";
let showPlayedOnly=false;
let homeAwayMode="both";
let resultMode="all";
let opponentTeam="none";
let currentMatches=[];

const teamFilter=document.getElementById("teamFilter");
teams.forEach(t=>{
 const opt=document.createElement("option");
 opt.value=t;
 opt.textContent=t;
 teamFilter.appendChild(opt);
});

const opponentFilter=document.getElementById("opponentFilter");
teams.forEach(t=>{
 const opt=document.createElement("option");
 opt.value=t;
 opt.textContent=t;
 opponentFilter.appendChild(opt);
});

teamFilter.onchange=()=>{ selectedTeam=teamFilter.value; renderSchedule(currentMatches); };

document.getElementById("filterAll").onclick=()=>{
 showPlayedOnly=false;
 document.getElementById("filterAll").classList.add("filterActive");
 document.getElementById("filterPlayed").classList.remove("filterActive");
 renderSchedule(currentMatches);
};

document.getElementById("filterPlayed").onclick=()=>{
 showPlayedOnly=true;
 document.getElementById("filterPlayed").classList.add("filterActive");
 document.getElementById("filterAll").classList.remove("filterActive");
 renderSchedule(currentMatches);
};

document.getElementById("homeAwayFilter").onchange=e=>{
 homeAwayMode=e.target.value;
 renderSchedule(currentMatches);
};

document.getElementById("resultFilter").onchange=e=>{
 resultMode=e.target.value;
 renderSchedule(currentMatches);
};

document.getElementById("headToHeadBtn").onclick=()=>{
 const panel=document.getElementById("headToHeadPanel");
 panel.style.display=panel.style.display==="block"?"none":"block";
};

opponentFilter.onchange=e=>{
 opponentTeam=e.target.value;
 renderSchedule(currentMatches);
};

function calc(stats){
 let ag=Number(stats[6])+Number(stats[7])+Number(stats[8]);
 let hg=Number(stats[16])+Number(stats[17])+Number(stats[18]);
 if(stats[9]==="11") ag++;
 if(stats[19]==="11") hg++;
 if(stats[20]==="1") hg++;
 if(stats[20]==="2") ag++;
 return {hg,ag};
}

function renderSchedule(matches){
 currentMatches=matches;
 const cont=document.getElementById("schedule");
 cont.innerHTML="";

 scheduleList.forEach(p=>{

  const m=matches.find(x=>x.homeTeam===p[0]&&x.awayTeam===p[1]);

  if(selectedTeam!=="all" && p[0]!==selectedTeam && p[1]!==selectedTeam) return;
  if(showPlayedOnly && !m) return;
  if(resultMode!=="all" && !m) return;

  if(selectedTeam!=="all"){
   if(homeAwayMode==="home" && p[0]!==selectedTeam) return;
   if(homeAwayMode==="away" && p[1]!==selectedTeam) return;
  }

  if(opponentTeam!=="none" && selectedTeam!=="all"){
   if(!( (p[0]===selectedTeam && p[1]===opponentTeam) ||
         (p[1]===selectedTeam && p[0]===opponentTeam) )) return;
  }

  if(m && selectedTeam!=="all" && resultMode!=="all"){
   const s=calc(m.stats);
   const isHome = (p[0]===selectedTeam);
   const win = (isHome && s.hg>s.ag) || (!isHome && s.ag>s.hg);
   if(resultMode==="win" && !win) return;
   if(resultMode==="loss" && win) return;
  }

  let hg=0,ag=0,label="";
  let h1=0,h2=0,h3=0,a1=0,a2=0,a3=0;

  if(m){
   const s=calc(m.stats);
   hg=s.hg; ag=s.ag;
   a1=Number(m.stats[6])||0;
   a2=Number(m.stats[7])||0;
   a3=Number(m.stats[8])||0;
   h1=Number(m.stats[16])||0;
   h2=Number(m.stats[17])||0;
   h3=Number(m.stats[18])||0;

   if(m.stats[20]==="1"||m.stats[20]==="2") label="SN";
   else if(m.stats[9]==="11"||m.stats[19]==="11") label="OT";
  }

  const link=`statistiky-zapasu.html?home=${encodeURIComponent(p[0])}&away=${encodeURIComponent(p[1])}`;

  cont.innerHTML+=`
  <div class="matchRow">
   <div class="teamBox"><img class="logo" src="./logos/${logos[p[0]]}">${p[0]}</div>
   <div class="scoreBox">${hg}</div>
   <div class="periods">
     <div class="otLabel">${label}</div>
     (${h1}:${a1}, ${h2}:${a2}, ${h3}:${a3})
   </div>
   <div class="scoreBox">${ag}</div>
   <div class="teamBox teamRight">${p[1]}<img class="logo" src="./logos/${logos[p[1]]}"></div>
   <div><button class="statsBtn" onclick="window.location.href='${link}'">Statistiky</button></div>
  </div>`;
 });

}
</script>
</body>
</html>
