<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Extraliga - 2. sezóna</title>

<style>
*{box-sizing:border-box}

body{
 font-family:Arial;
 margin:0;
 background:#f2f2f2;
}

.wrapper{
 max-width:1200px;
 margin:auto;
 padding:20px;
 background:white;
}

/* ===== HLAVIČKA ===== */

.headerBar{
 display:flex;
 align-items:center;
 justify-content:space-between;
 background:#e9ecef;
 border-radius:12px;
 padding:20px;
 margin-bottom:25px;
}

.headerBar img{
 height:110px;
 object-fit:contain;
}

.seasonCard{
 background:#0b2a3c;
 color:white;
 font-size:26px;
 font-weight:bold;
 padding:14px 28px;
 border-radius:10px;
 box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

/* ===== TABULKA ===== */

.standingsCard{
 display:flex;
 align-items:center;
 justify-content:space-between;
 background:#e9ecef;
 border-radius:10px;
 padding:14px 16px;
 margin-bottom:10px;
}

.rank{width:30px;font-weight:bold;font-size:18px;text-align:center;}

.teamBlock{
 display:flex;
 align-items:center;
 gap:14px;
 flex:1;
}

.logo{
 width:40px;
 height:40px;
 object-fit:contain;
 filter:contrast(1.1) saturate(1.15);
 box-shadow:0 2px 6px rgba(0,0,0,0.25);
 border-radius:6px;
 background:white;
 padding:2px;
}

.teamInfo{display:flex;flex-direction:column;}

.teamName{font-weight:bold;font-size:16px;}

.teamStats{
 font-size:13px;
 color:#444;
 margin-top:2px;
}

.pointsBox{
 background:#0b2a3c;
 color:white;
 font-size:20px;
 font-weight:bold;
 padding:10px 16px;
 border-radius:8px;
 min-width:60px;
 text-align:center;
}

/* ===== FILTRY ===== */

.filterBar{
 display:flex;
 gap:10px;
 align-items:center;
 margin:15px 0;
 flex-wrap:wrap;
}

.filterBar select,
.filterBar button{
 padding:8px 10px;
 border-radius:6px;
 border:1px solid #ccc;
 font-weight:bold;
}

.filterActive{
 background:#2f9ec9;
 color:white;
 border-color:#2f9ec9;
}

/* ===== MATCH ROW ===== */

.matchRow{
 display:grid;
 grid-template-columns:1fr 70px 220px 70px 1fr 120px;
 align-items:center;
 background:#e9ecef;
 padding:10px;
 border-radius:6px;
 gap:8px;
}

.teamBox{
 display:flex;
 align-items:center;
 gap:10px;
 font-weight:bold;
}

.teamRight{justify-content:flex-end;}

.scoreBox{
 background:#0b2a3c;
 color:white;
 font-size:22px;
 font-weight:bold;
 padding:8px 0;
 border-radius:6px;
 text-align:center;
}

.periods{
 text-align:center;
 font-size:14px;
}

.otLabel{
 font-weight:bold;
 font-size:13px;
 margin-bottom:2px;
}

.statsBtn{
 background:#2f9ec9;
 color:white;
 border:none;
 padding:8px 12px;
 border-radius:6px;
 cursor:pointer;
 font-weight:bold;
 width:100%;
}

/* ===== TIPOVÁNÍ ===== */

.predictionRow{

 display:grid;
 grid-template-columns:140px 1fr 1fr 1fr 1fr 150px 120px;
 gap:8px;

 background:#f5f7f9;
 border:2px solid #e1e4e8;

 padding:10px;
 border-radius:6px;
 margin-bottom:10px;
 align-items:center;
}

.ratingBox{
 font-weight:bold;
 text-align:center;
 color:#0b2a3c;
}

.odds{
 text-align:center;
 background:white;
 padding:6px;
 border-radius:6px;
 border:1px solid #ccc;
 font-weight:bold;
}

.tipInput input{
 width:100%;
 padding:6px;
 border-radius:6px;
 border:1px solid #ccc;
 text-align:center;
 font-weight:bold;
}

/* ===== MOBILE ===== */

@media (max-width:900px){

.matchRow{
 grid-template-columns:1fr auto;
 grid-template-rows:auto auto auto auto;
}

.teamBox,
.scoreBox,
.periods,
.statsBtn{
 grid-column:1/3;
 justify-content:center;
 text-align:center;
}

.predictionRow{
 grid-template-columns:1fr;
}

.headerBar{
 flex-direction:column;
 gap:15px;
}

}

</style>
</head>

<body>

<div class="wrapper">

<div class="headerBar">
<img src="img/extraliga.jpg">
<div class="seasonCard" id="seasonLabel">2. sezóna</div>
</div>

<div id="standingsBody"></div>

<h2>Rozpis zápasů</h2>

<div class="filterBar">

<select id="seasonFilter">
<option value="Sezóna 1">Sezóna 1</option>
<option value="Sezóna 2" selected>Sezóna 2</option>
</select>

<select id="teamFilter">
<option value="all">Všechny týmy</option>
</select>

<button id="filterAll" class="filterActive">Všechny zápasy</button>
<button id="filterPlayed">Jen odehrané</button>

<select id="homeAwayFilter">
<option value="both">Domácí i venkovní</option>
<option value="home">Jen domácí</option>
<option value="away">Jen venkovní</option>
</select>

<select id="resultFilter">
<option value="all">Všechny výsledky</option>
<option value="win">Jen výhry</option>
<option value="loss">Jen prohry</option>
</select>

<button id="headToHeadBtn">Vzájemné zápasy</button>

</div>

<div id="schedule"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, query, orderBy, onSnapshot }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig={
 apiKey:"AIzaSyD0jDnVNHZAs83g6FGwQT_nOpOCyT4NTNU",
 authDomain:"statistiky-6310a.firebaseapp.com",
 projectId:"statistiky-6310a"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

let selectedSeason="Sezóna 2";
let allMatches=[];

/* ===== TÝMY ===== */

const teamsData={
 "HC Sparta Praha (P)":"sparta.png",
 "HC Bílí Tygři Liberec (K)":"liberec.png",
 "HC Dynamo Pardubice (K)":"pardubice.png",
 "HC Chemopetrol Litvínov (P)":"litvinov.png",
 "HC Geus Okna Kladno (P)":"kladno.png",
 "HC Motor České Budějovice (K)":"budejovice.png",
 "HC Energie Karlovy Vary (P)":"vary.png",
 "HC Oceláři Třinec (K)":"trinec.png"
};

const teams=Object.keys(teamsData);
const logos=teamsData;

/* ===== DEMO RATING ===== */

let ratings={};
teams.forEach(t=>ratings[t]=1000);

/* ===== ROZPIS ===== */

const scheduleIndex=[
 [0,1],[3,2],[5,4],[7,6],
 [2,0],[1,3],[6,5],[4,7],
 [0,5],[3,7],[1,4],[2,6],
 [7,0],[4,2],[6,1],[5,3],
 [1,0],[2,3],[4,5],[6,7],
 [0,2],[3,1],[5,6],[7,4],
 [5,0],[7,3],[4,1],[6,2],
 [0,7],[2,4],[1,6],[3,5]
];

const scheduleList=scheduleIndex.map(([h,a])=>[teams[h],teams[a]]);

let selectedTeam="all";
let showPlayedOnly=false;
let homeAwayMode="both";
let resultMode="all";
let opponentTeam="none";
let currentMatches=[];

/* ===== RENDER ===== */

function renderSchedule(matches){

const cont=document.getElementById("schedule");
cont.innerHTML="";

scheduleList.forEach(p=>{

const home=p[0];
const away=p[1];

const link=`statistiky-zapasu.html?home=${encodeURIComponent(home)}&away=${encodeURIComponent(away)}`;

cont.innerHTML+=`

<div class="matchRow">

<div class="teamBox">
<img class="logo" src="./logos/${logos[home]}">
${home}
</div>

<div class="scoreBox">0</div>

<div class="periods">(-:-,-:-,-:-)</div>

<div class="scoreBox">0</div>

<div class="teamBox teamRight">
${away}
<img class="logo" src="./logos/${logos[away]}">
</div>

<div>
<button class="statsBtn" onclick="window.location.href='${link}'">
Statistiky
</button>
</div>

</div>


<div class="predictionRow">

<div class="ratingBox">
${ratings[home]} ⭐
</div>

<div class="odds">V<br>1.85</div>

<div class="odds">OT<br>3.40</div>

<div class="odds">SN<br>4.10</div>

<div class="odds">P<br>2.20</div>

<div class="tipInput">
<input placeholder="Tvůj tip">
</div>

<div class="ratingBox">
⭐ ${ratings[away]}
</div>

</div>

`;

});

}

renderSchedule([]);

</script>

</body>
</html>
