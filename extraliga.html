<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ===== ROZPIS ===== */

const scheduleList=[ /* ... tvůj kompletní seznam 32 zápasů ... */ ];

function safeNum(v){
    const n=Number(v);
    return isNaN(n)?0:n;
}

function calculateScore(stats){

    if(!stats) return null;

    let a1=safeNum(stats[6]);
    let a2=safeNum(stats[7]);
    let a3=safeNum(stats[8]);

    let h1=safeNum(stats[16]);
    let h2=safeNum(stats[17]);
    let h3=safeNum(stats[18]);

    let awayGoals=a1+a2+a3;
    let homeGoals=h1+h2+h3;

    let resultType="";

    if(stats[9]==="11") awayGoals++;
    if(stats[19]==="11") homeGoals++;

    if(stats[20]==="1"){ homeGoals++; resultType="SN"; }
    else if(stats[20]==="2"){ awayGoals++; resultType="SN"; }
    else if((stats[9]==="11"||stats[19]==="11") && Math.abs(homeGoals-awayGoals)===1){
        resultType="OT";
    }

    return {
        homeGoals,
        awayGoals,
        resultType,
        periods:`(${h1}:${a1}, ${h2}:${a2}, ${h3}:${a3})`
    };
}

/* ===== TABULKA ===== */

function updateStandings(matches){

    const table={};

    document.querySelectorAll("#standings tbody tr").forEach(tr=>{
        const team=tr.dataset.team;
        table[team]={
            team,
            points:0,
            scored:0,
            conceded:0,
            games:0,
            wins:0,
            losses:0,
            otWins:0,
            otLosses:0,
            snWins:0,
            snLosses:0
        };
    });

    matches.forEach(m=>{
        const s=calculateScore(m.stats);
        if(!s) return;

        const H=table[m.homeTeam];
        const A=table[m.awayTeam];
        if(!H||!A) return;

        H.games++; A.games++;
        H.scored+=s.homeGoals;
        H.conceded+=s.awayGoals;
        A.scored+=s.awayGoals;
        A.conceded+=s.homeGoals;

        if(s.resultType===""){
            if(s.homeGoals>s.awayGoals){H.points+=3;H.wins++;A.losses++;}
            else{A.points+=3;A.wins++;H.losses++;}
        }
        else if(s.resultType==="OT"){
            if(s.homeGoals>s.awayGoals){H.points+=2;A.points+=1;H.otWins++;A.otLosses++;}
            else{A.points+=2;H.points+=1;A.otWins++;H.otLosses++;}
        }
        else{
            if(s.homeGoals>s.awayGoals){H.points+=2;A.points+=1;H.snWins++;A.snLosses++;}
            else{A.points+=2;H.points+=1;A.snWins++;H.snLosses++;}
        }
    });

    const sorted=Object.values(table).sort((a,b)=>b.points-a.points);

    const tbody=document.querySelector("#standings tbody");
    sorted.forEach((t,i)=>{
        const tr=tbody.querySelector(`tr[data-team="${t.team}"]`);
        const cells=tr.children;

        cells[1].innerText=i+1;
        cells[3].innerText=t.points;
        cells[4].innerText=`${t.scored}:${t.conceded}`;
        cells[5].innerText=t.scored-t.conceded;
        cells[6].innerText=t.games;
        cells[7].innerText=t.wins;
        cells[8].innerText=t.losses;
        cells[9].innerText=t.otWins;
        cells[10].innerText=t.otLosses;
        cells[11].innerText=t.snWins;
        cells[12].innerText=t.snLosses;
    });
}

/* ===== LOAD ===== */

function loadMatches(){

    const q=query(collection(db,"zapasy"),orderBy("created","asc"));

    onSnapshot(q,(snapshot)=>{

        let extraligaMatches=[];

        snapshot.forEach(docSnap=>{
            const m=docSnap.data();

            if(
                m.category &&
                m.category.startsWith("Extraliga") &&
                m.season==="Sezóna 2"
            ){
                extraligaMatches.push(m);
            }
        });

        renderSchedule(extraligaMatches);
        updateStandings(extraligaMatches);
    });
}

loadMatches();

</script>
