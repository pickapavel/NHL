<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Extraliga - 2. sezóna</title>

<style>
*{box-sizing:border-box}

body{
 font-family:Arial;
 margin:0;
 background:#f2f2f2;
}

.wrapper{
 max-width:1200px;
 margin:auto;
 padding:20px;
 background:white;
}

/* ===== HLAVIČKA ===== */

.headerBar{
 display:flex;
 align-items:center;
 justify-content:space-between;
 background:#e9ecef;
 border-radius:12px;
 padding:20px;
 margin-bottom:25px;
}

.headerBar img{
 height:110px;
 object-fit:contain;
}

.seasonCard{
 background:#0b2a3c;
 color:white;
 font-size:26px;
 font-weight:bold;
 padding:14px 28px;
 border-radius:10px;
 box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

/* ===== TABULKA ===== */

.standingsCard{
 display:flex;align-items:center;justify-content:space-between;
 background:#e9ecef;border-radius:10px;padding:14px 16px;margin-bottom:10px;
}

.rank{width:30px;font-weight:bold;font-size:18px;text-align:center;}
.teamBlock{display:flex;align-items:center;gap:14px;flex:1;}

.logo{
 width:40px;height:40px;object-fit:contain;
 box-shadow:0 2px 6px rgba(0,0,0,0.25);
 border-radius:6px;background:white;padding:2px;
}

.teamInfo{display:flex;flex-direction:column;}
.teamName{font-weight:bold;font-size:16px;}
.teamStats{font-size:13px;color:#444;margin-top:2px;}

.pointsBox{
 background:#0b2a3c;color:white;font-size:20px;font-weight:bold;
 padding:10px 16px;border-radius:8px;min-width:60px;text-align:center;
}

/* ===== FILTRY ===== */

.filterBar{
 display:flex;gap:10px;align-items:center;margin:15px 0;flex-wrap:wrap;
}

.filterBar select,
.filterBar button{
 padding:8px 10px;border-radius:6px;border:1px solid #ccc;font-weight:bold;
}

.filterActive{
 background:#2f9ec9;color:white;border-color:#2f9ec9;
}

/* ===== ZÁPAS ===== */

.matchRow{
 display:grid;
 grid-template-columns:1fr 70px 220px 70px 1fr 120px;
 align-items:center;background:#e9ecef;
 padding:10px;margin-bottom:2px;border-radius:6px;gap:8px;
}

.teamBox{display:flex;align-items:center;gap:10px;font-weight:bold;}
.teamRight{justify-content:flex-end;}

.scoreBox{
 background:#0b2a3c;color:white;font-size:22px;font-weight:bold;
 padding:8px 0;border-radius:6px;text-align:center;
}

.periods{text-align:center;font-size:14px}

.statsBtn{
 background:#2f9ec9;color:white;border:none;
 padding:8px 12px;border-radius:6px;cursor:pointer;
 font-weight:bold;width:100%;
}

/* ===== TIPOVÁNÍ ===== */

.predictionRow{
 display:grid;
 grid-template-columns:120px 1fr 1fr 1fr 1fr 150px 120px;
 gap:8px;
 background:#f5f7f9;
 border:2px solid #e1e4e8;
 padding:10px;
 border-radius:6px;
 margin-bottom:10px;
 align-items:center;
}

.ratingBox{text-align:center;font-weight:bold;}

.odds{
 text-align:center;
 background:white;
 border:1px solid #ccc;
 padding:6px;
 border-radius:6px;
 font-weight:bold;
}

.tipInput input{
 width:100%;
 padding:6px;
 border-radius:6px;
 border:1px solid #ccc;
 text-align:center;
 font-weight:bold;
}
</style>
</head>

<body>

<div class="wrapper">

<div class="headerBar">
<img src="img/extraliga.jpg">
<div class="seasonCard" id="seasonLabel">2. sezóna</div>
</div>

<div id="standingsBody"></div>

<h2>Rozpis zápasů</h2>

<div class="filterBar">

<select id="seasonFilter">
<option value="Sezóna 1">Sezóna 1</option>
<option value="Sezóna 2" selected>Sezóna 2</option>
</select>

<select id="teamFilter">
<option value="all">Všechny týmy</option>
</select>

<button id="filterAll" class="filterActive">Všechny zápasy</button>
<button id="filterPlayed">Jen odehrané</button>

<select id="homeAwayFilter">
<option value="both">Domácí i venkovní</option>
<option value="home">Jen domácí</option>
<option value="away">Jen venkovní</option>
</select>

<select id="resultFilter">
<option value="all">Všechny výsledky</option>
<option value="win">Jen výhry</option>
<option value="loss">Jen prohry</option>
</select>

<button id="headToHeadBtn">Vzájemné zápasy</button>

</div>

<div id="schedule"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, query, orderBy, onSnapshot }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig={
 apiKey:"AIzaSyD0jDnVNHZAs83g6FGwQT_nOpOCyT4NTNU",
 authDomain:"statistiky-6310a.firebaseapp.com",
 projectId:"statistiky-6310a"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

let selectedSeason="Sezóna 2";
let allMatches=[];

/* ===== TÝMY ===== */

const teamsData={
 "HC Sparta Praha (P)":"sparta.png",
 "HC Bílí Tygři Liberec (K)":"liberec.png",
 "HC Dynamo Pardubice (K)":"pardubice.png",
 "HC Chemopetrol Litvínov (P)":"litvinov.png",
 "HC Geus Okna Kladno (P)":"kladno.png",
 "HC Motor České Budějovice (K)":"budejovice.png",
 "HC Energie Karlovy Vary (P)":"vary.png",
 "HC Oceláři Třinec (K)":"trinec.png"
};

const teams=Object.keys(teamsData);
const logos=teamsData;

/* ===== ROZPIS ===== */

const scheduleIndex=[
 [0,1],[3,2],[5,4],[7,6],
 [2,0],[1,3],[6,5],[4,7],
 [0,5],[3,7],[1,4],[2,6],
 [7,0],[4,2],[6,1],[5,3],
 [1,0],[2,3],[4,5],[6,7],
 [0,2],[3,1],[5,6],[7,4],
 [5,0],[7,3],[4,1],[6,2],
 [0,7],[2,4],[1,6],[3,5]
];

const scheduleList=scheduleIndex.map(([h,a])=>[teams[h],teams[a]]);

/* ===== ELO ===== */

const BASE_RATING=1000;
const K=30;
const HOME_ADV=50;

let ratings={};

function resetRatings(){
 ratings={}
 teams.forEach(t=>ratings[t]=BASE_RATING)
}

function expected(ra,rb){
 return 1/(1+Math.pow(10,(rb-ra)/400))
}

function updateElo(home,away,hg,ag){

 if(ratings[home]===undefined)ratings[home]=BASE_RATING
 if(ratings[away]===undefined)ratings[away]=BASE_RATING

 let ra=ratings[home]+HOME_ADV
 let rb=ratings[away]

 let ea=expected(ra,rb)
 let eb=expected(rb,ra)

 let sa=hg>ag?1:0
 let sb=ag>hg?1:0

 ratings[home]+=K*(sa-ea)
 ratings[away]+=K*(sb-eb)

}

/* ===== GÓLY ===== */

function calc(stats){

 let ag=Number(stats[6])+Number(stats[7])+Number(stats[8])
 let hg=Number(stats[16])+Number(stats[17])+Number(stats[18])

 if(stats[9]==="11") ag++
 if(stats[19]==="11") hg++
 if(stats[20]==="1") hg++
 if(stats[20]==="2") ag++

 return {hg,ag}

}

/* ===== TABULKA ===== */

function createEmpty(){

 let obj={}

 teams.forEach(t=>{
  obj[t]={team:t,b:0,z:0,v:0,p:0,vp:0,pp:0,vsn:0,psn:0,gf:0,ga:0}
 })

 return obj
}

function calculateStandings(matches){

 let table=createEmpty()

 matches.forEach(m=>{

  if(!m.stats)return

  const s=calc(m.stats)
  const h=table[m.homeTeam]
  const a=table[m.awayTeam]

  h.z++;a.z++

  h.gf+=s.hg;h.ga+=s.ag
  a.gf+=s.ag;a.ga+=s.hg

  const isSN=(m.stats[20]==="1"||m.stats[20]==="2")
  const isOT=(!isSN&&(m.stats[9]==="11"||m.stats[19]==="11"))

  if(isSN){
   if(s.hg>s.ag){h.vsn++;h.b+=2;a.psn++;a.b+=1;}
   else{a.vsn++;a.b+=2;h.psn++;h.b+=1;}
  }
  else if(isOT){
   if(s.hg>s.ag){h.vp++;h.b+=2;a.pp++;a.b+=1;}
   else{a.vp++;a.b+=2;h.pp++;h.b+=1;}
  }
  else{
   if(s.hg>s.ag){h.v++;h.b+=3;a.p++;}
   else{a.v++;a.b+=3;h.p++;}
  }

 })

 return Object.values(table).sort((a,b)=>{
  if(b.b!==a.b)return b.b-a.b
  if((b.gf-b.ga)!==(a.gf-a.ga))return(b.gf-b.ga)-(a.gf-a.ga)
  return b.gf-a.gf
 })

}

function renderStandings(arr){

 const body=document.getElementById("standingsBody")
 body.innerHTML=""

 arr.forEach((t,i)=>{

  body.innerHTML+=`

  <div class="standingsCard">

   <div class="rank">${i+1}</div>

   <div class="teamBlock">

    <img class="logo" src="./logos/${logos[t.team]}">

    <div class="teamInfo">

     <div class="teamName">${t.team}</div>

     <div class="teamStats">

      Skóre ${t.gf}:${t.ga} | +/- ${t.gf-t.ga} |
      Z ${t.z} | V ${t.v} | P ${t.p} |
      VP ${t.vp} | PP ${t.pp} |
      VSN ${t.vsn} | PSN ${t.psn}

     </div>

    </div>

   </div>

   <div class="pointsBox">${t.b}</div>

  </div>

  `
 })

}

/* ===== ROZPIS ===== */

function renderSchedule(matches){

 const cont=document.getElementById("schedule")
 cont.innerHTML=""

 scheduleList.forEach(p=>{

  const m=matches.find(x=>x.homeTeam===p[0]&&x.awayTeam===p[1])

  let hg=0,ag=0,label=""
  let h1=0,h2=0,h3=0,a1=0,a2=0,a3=0

  if(m){

   const s=calc(m.stats)

   hg=s.hg
   ag=s.ag

   a1=Number(m.stats[6])||0
   a2=Number(m.stats[7])||0
   a3=Number(m.stats[8])||0

   h1=Number(m.stats[16])||0
   h2=Number(m.stats[17])||0
   h3=Number(m.stats[18])||0

  }

  const link=`statistiky-zapasu.html?home=${encodeURIComponent(p[0])}&away=${encodeURIComponent(p[1])}`

  cont.innerHTML+=`

  <div class="matchRow">

   <div class="teamBox">
   <img class="logo" src="./logos/${logos[p[0]]}">
   ${p[0]}
   </div>

   <div class="scoreBox">${hg}</div>

   <div class="periods">
   (${h1}:${a1}, ${h2}:${a2}, ${h3}:${a3})
   </div>

   <div class="scoreBox">${ag}</div>

   <div class="teamBox teamRight">
   ${p[1]}
   <img class="logo" src="./logos/${logos[p[1]]}">
   </div>

   <div>
   <button class="statsBtn" onclick="window.location.href='${link}'">
   Statistiky
   </button>
   </div>

  </div>

  <div class="predictionRow">

   <div class="ratingBox">${Math.round(ratings[p[0]]||BASE_RATING)} ⭐</div>

   <div class="odds">V<br>-</div>
   <div class="odds">OT<br>-</div>
   <div class="odds">SN<br>-</div>
   <div class="odds">P<br>-</div>

   <div class="tipInput">
   <input placeholder="Tvůj tip">
   </div>

   <div class="ratingBox">⭐ ${Math.round(ratings[p[1]]||BASE_RATING)}</div>

  </div>

  `

 })

}

/* ===== SEASON ===== */

function applySeasonFilter(){

 resetRatings()

 const extraliga=allMatches.filter(m=>m.category?.startsWith("Extraliga"))

 extraliga.sort((a,b)=>a.created-b.created)

 extraliga.forEach(m=>{
  if(!m.stats)return
  const s=calc(m.stats)
  updateElo(m.homeTeam,m.awayTeam,s.hg,s.ag)
 })

 const filtered=allMatches.filter(m=>
  m.category?.startsWith("Extraliga") &&
  m.season===selectedSeason
 )

 renderSchedule(filtered)
 renderStandings(calculateStandings(filtered))

}

document.getElementById("seasonFilter").onchange=(e)=>{
 selectedSeason=e.target.value
 applySeasonFilter()
}

const q=query(collection(db,"zapasy"),orderBy("created","asc"))

onSnapshot(q,(snap)=>{

 allMatches=[]

 snap.forEach(d=>{
  allMatches.push(d.data())
 })

 applySeasonFilter()

})

</script>

</body>
</html>
