<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Extraliga - 2. sezóna</title>

<style>
*{box-sizing:border-box}
body{font-family:Arial;margin:0;background:#f2f2f2;}
.wrapper{max-width:1200px;margin:auto;padding:20px;background:white;}
h1{margin-top:0}
.tableWrap{overflow-x:auto;margin-bottom:30px;}
table{width:100%;border-collapse:collapse;min-width:900px;}
th,td{border:1px solid #999;padding:8px;text-align:center;}
th{background:#2f9ec9;color:white;}
td.team{text-align:left;}
.logo{width:28px;height:28px;object-fit:contain;vertical-align:middle;}
.schedule{margin-top:20px;}
.matchRow{
display:grid;
grid-template-columns:1fr 70px 220px 70px 1fr;
align-items:center;
background:#e9ecef;
padding:10px;
margin-bottom:6px;
border-radius:6px;
}
.teamBox{display:flex;align-items:center;gap:10px;font-weight:bold;}
.teamRight{justify-content:flex-end;}
.scoreBox{
background:#0b2a3c;color:white;font-size:22px;
font-weight:bold;padding:8px 0;border-radius:6px;
}
.periods{text-align:center;font-size:14px;}
.otLabel{font-size:12px;font-weight:bold;}
</style>
</head>

<body>

<div class="wrapper">

<h1>Extraliga - 2. sezóna</h1>

<div class="tableWrap">
<table id="standings">
<thead>
<tr>
<th></th><th>#</th><th>Tým</th><th>B</th>
<th>Skóre</th><th>+/-</th>
<th>Z</th><th>V</th><th>P</th>
<th>VP</th><th>PP</th><th>VSN</th><th>PSN</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<h2>Rozpis zápasů</h2>
<div id="schedule" class="schedule"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, query, orderBy, onSnapshot } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app=initializeApp({
 apiKey:"AIzaSyD0jDnVNHZAs83g6FGwQT_nOpOCyT4NTNU",
 authDomain:"statistiky-6310a.firebaseapp.com",
 projectId:"statistiky-6310a"
});

const db=getFirestore(app);

/* ===== TÝMY ===== */

const teams=[
"HC Sparta Praha (P)",
"HC Bílí Tygři Liberec (K)",
"HC Dynamo Pardubice (K)",
"HC Chemopetrol Litvínov (P)",
"HC Geus Okna Kladno (P)",
"HC Motor České Budějovice (K)",
"HC Energie Karlovy Vary (P)",
"HC Oceláři Třinec (K)"
];

const logos={
"HC Sparta Praha (P)":"sparta.png",
"HC Bílí Tygři Liberec (K)":"liberec.png",
"HC Dynamo Pardubice (K)":"pardubice.png",
"HC Chemopetrol Litvínov (P)":"litvinov.png",
"HC Geus Okna Kladno (P)":"kladno.png",
"HC Motor České Budějovice (K)":"budejovice.png",
"HC Energie Karlovy Vary (P)":"vary.png",
"HC Oceláři Třinec (K)":"trinec.png"
};

const scheduleList=[
["HC Geus Okna Kladno (P)","HC Dynamo Pardubice (K)"],
["HC Bílí Tygři Liberec (K)","HC Chemopetrol Litvínov (P)"],
["HC Sparta Praha (P)","HC Motor České Budějovice (K)"],
["HC Energie Karlovy Vary (P)","HC Oceláři Třinec (K)"]
];

function calculateScore(stats){
let ag=Number(stats[6])+Number(stats[7])+Number(stats[8]);
let hg=Number(stats[16])+Number(stats[17])+Number(stats[18]);
if(stats[9]==="11") ag++;
if(stats[19]==="11") hg++;
if(stats[20]==="1") hg++;
if(stats[20]==="2") ag++;
return {hg,ag};
}

function emptyStats(){
return {B:0,GF:0,GA:0,Z:0,V:0,P:0,VP:0,PP:0,VSN:0,PSN:0};
}

function buildTable(matches){

let table={};
teams.forEach(t=>table[t]=emptyStats());

matches.forEach(m=>{
if(!m.stats) return;

const s=calculateScore(m.stats);
const home=table[m.homeTeam];
const away=table[m.awayTeam];
if(!home||!away) return;

home.Z++; away.Z++;
home.GF+=s.hg; home.GA+=s.ag;
away.GF+=s.ag; away.GA+=s.hg;

if(s.hg>s.ag){home.B+=3;home.V++;}
else{away.B+=3;away.V++;}
});

return Object.entries(table)
.map(([name,s])=>({name,...s,DIFF:s.GF-s.GA}))
.sort((a,b)=>b.B-a.B||b.DIFF-a.DIFF||b.GF-a.GF);
}

function renderTable(data){
const tbody=document.querySelector("#standings tbody");
tbody.innerHTML="";
data.forEach((t,i)=>{
tbody.innerHTML+=`
<tr>
<td><img class="logo" src="./logos/${logos[t.name]}"></td>
<td>${i+1}</td>
<td class="team">${t.name}</td>
<td>${t.B}</td>
<td>${t.GF}:${t.GA}</td>
<td>${t.DIFF}</td>
<td>${t.Z}</td>
<td>${t.V}</td>
<td>${t.P}</td>
<td>${t.VP}</td>
<td>${t.PP}</td>
<td>${t.VSN}</td>
<td>${t.PSN}</td>
</tr>`;
});
}

function renderSchedule(matches){

const container=document.getElementById("schedule");
container.innerHTML="";

scheduleList.forEach(pair=>{

const match=matches.find(m=>m.homeTeam===pair[0] && m.awayTeam===pair[1]);

let hg=0,ag=0;
if(match){
const s=calculateScore(match.stats);
hg=s.hg; ag=s.ag;
}

container.innerHTML+=`
<div class="matchRow">
<div class="teamBox">
<img class="logo" src="./logos/${logos[pair[0]]}">
${pair[0]}
</div>
<div class="scoreBox">${hg}</div>
<div class="periods">(0:0, 0:0, 0:0)</div>
<div class="scoreBox">${ag}</div>
<div class="teamBox teamRight">
${pair[1]}
<img class="logo" src="./logos/${logos[pair[1]]}">
</div>
</div>`;
});
}

const q=query(collection(db,"zapasy"),orderBy("created","asc"));

onSnapshot(q,(snap)=>{

let matches=[];

snap.forEach(d=>{
const m=d.data();

/* ===== OPRAVA FILTRU ===== */
if(
m.category &&
m.category.includes("Extraliga") &&
m.season &&
m.season.includes("Sezóna 2")
){
matches.push(m);
}
});

renderTable(buildTable(matches));
renderSchedule(matches);

});

</script>

</body>
</html>
