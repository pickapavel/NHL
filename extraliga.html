<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Extraliga - 2. sezóna</title>

<style>
*{box-sizing:border-box}
body{font-family:Arial;margin:0;background:#f2f2f2;}
.wrapper{max-width:1200px;margin:auto;padding:20px;background:white;}
h1{margin-top:0}

/* ===== TABULKA ===== */

.tableWrap{
 width:100%;
 overflow-x:auto;
 margin-bottom:30px;
}

.standingsTable{
 width:100%;
 border-collapse:collapse;
 min-width:900px;
}

.standingsTable thead th{
 background:#2f9ec9;
 color:white;
 padding:10px;
 font-weight:bold;
 border:none;
}

.standingsTable tbody td{
 padding:8px;
 text-align:center;
 border-bottom:1px solid #ddd;
}

.standingsTable tbody tr:nth-child(even){
 background:#f7f7f7;
}

.standingsTable tbody tr:hover{
 background:#e9ecef;
}

.teamCell{
 text-align:left;
 font-weight:bold;
}

.logo{
 width:24px;
 height:24px;
 object-fit:contain;
 vertical-align:middle;
 margin-right:6px;
}

/* ===== FILTR ===== */

.filterBar{
 display:flex;
 gap:10px;
 align-items:center;
 margin-bottom:15px;
 flex-wrap:wrap;
}

.filterBar select,
.filterBar button{
 padding:8px 10px;
 border-radius:6px;
 border:1px solid #ccc;
 font-weight:bold;
}

.filterActive{
 background:#2f9ec9;
 color:white;
 border-color:#2f9ec9;
}

/* ===== ROZPIS ===== */

.matchRow{
 display:grid;
 grid-template-columns:1fr 70px 220px 70px 1fr 120px;
 align-items:center;
 background:#e9ecef;
 padding:10px;
 margin-bottom:6px;
 border-radius:6px;
 gap:8px;
}

.teamBox{
 display:flex;
 align-items:center;
 gap:10px;
 font-weight:bold;
}

.teamRight{
 justify-content:flex-end;
}

.scoreBox{
 background:#0b2a3c;
 color:white;
 font-size:22px;
 font-weight:bold;
 padding:8px 0;
 border-radius:6px;
 text-align:center;
}

.periods{text-align:center;font-size:14px}
.otLabel{font-weight:bold;font-size:13px;margin-bottom:2px}

.statsBtn{
 background:#2f9ec9;
 color:white;
 border:none;
 padding:8px 12px;
 border-radius:6px;
 cursor:pointer;
 font-weight:bold;
 width:100%;
}

/* ===== MOBIL ===== */

@media (max-width:900px){

 .matchRow{
  grid-template-columns:1fr auto;
  grid-template-rows:auto auto auto auto;
 }

 .teamBox,
 .scoreBox,
 .periods,
 .statsBtn{
  grid-column:1/3;
  justify-content:center;
  text-align:center;
 }
}

</style>
</head>

<body>
<div class="wrapper">

<h1>Extraliga - 2. sezóna</h1>

<div class="tableWrap">
<table class="standingsTable">
<thead>
<tr>
<th>#</th>
<th style="text-align:left">Tým</th>
<th>B</th>
<th>Skóre</th>
<th>+/-</th>
<th>Z</th>
<th>V</th>
<th>P</th>
<th>VP</th>
<th>PP</th>
<th>VSN</th>
<th>PSN</th>
</tr>
</thead>
<tbody id="standingsBody"></tbody>
</table>
</div>

<h2>Rozpis zápasů</h2>

<div class="filterBar">
<select id="teamFilter">
<option value="all">Všechny týmy</option>
</select>

<button id="filterAll" class="filterActive">Všechny zápasy</button>
<button id="filterPlayed">Jen odehrané</button>
</div>

<div id="schedule"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, query, orderBy, onSnapshot }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig={
 apiKey:"AIzaSyD0jDnVNHZAs83g6FGwQT_nOpOCyT4NTNU",
 authDomain:"statistiky-6310a.firebaseapp.com",
 projectId:"statistiky-6310a"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

const teamsData={
 "HC Sparta Praha (P)":"sparta.png",
 "HC Bílí Tygři Liberec (K)":"liberec.png",
 "HC Dynamo Pardubice (K)":"pardubice.png",
 "HC Chemopetrol Litvínov (P)":"litvinov.png",
 "HC Geus Okna Kladno (P)":"kladno.png",
 "HC Motor České Budějovice (K)":"budejovice.png",
 "HC Energie Karlovy Vary (P)":"vary.png",
 "HC Oceláři Třinec (K)":"trinec.png"
};

const teams=Object.keys(teamsData);
const logos=teamsData;

const scheduleIndex=[
 [0,1],[3,2],[5,4],[7,6],
 [2,0],[1,3],[6,5],[4,7],
 [0,5],[3,7],[1,4],[2,6],
 [7,0],[4,2],[6,1],[5,3],
 [1,0],[2,3],[4,5],[6,7],
 [0,2],[3,1],[5,6],[7,4],
 [5,0],[7,3],[4,1],[6,2],
 [0,7],[2,4],[1,6],[3,5]
];

const scheduleList=scheduleIndex.map(
 ([h,a])=>[teams[h],teams[a]]
);

let selectedTeam="all";
let showPlayedOnly=false;
let currentMatches=[];

const teamFilter=document.getElementById("teamFilter");
teams.forEach(t=>{
 const opt=document.createElement("option");
 opt.value=t;
 opt.textContent=t;
 teamFilter.appendChild(opt);
});

teamFilter.onchange=()=>{
 selectedTeam=teamFilter.value;
 renderSchedule(currentMatches);
};

document.getElementById("filterAll").onclick=()=>{
 showPlayedOnly=false;
 document.getElementById("filterAll").classList.add("filterActive");
 document.getElementById("filterPlayed").classList.remove("filterActive");
 renderSchedule(currentMatches);
};

document.getElementById("filterPlayed").onclick=()=>{
 showPlayedOnly=true;
 document.getElementById("filterPlayed").classList.add("filterActive");
 document.getElementById("filterAll").classList.remove("filterActive");
 renderSchedule(currentMatches);
};

function calc(stats){
 let ag=Number(stats[6])+Number(stats[7])+Number(stats[8]);
 let hg=Number(stats[16])+Number(stats[17])+Number(stats[18]);
 if(stats[9]==="11") ag++;
 if(stats[19]==="11") hg++;
 if(stats[20]==="1") hg++;
 if(stats[20]==="2") ag++;
 return {hg,ag};
}

function createEmpty(){
 let obj={};
 teams.forEach(t=>{
  obj[t]={team:t,b:0,z:0,v:0,p:0,vp:0,pp:0,vsn:0,psn:0,gf:0,ga:0};
 });
 return obj;
}

function calculateStandings(matches){

 let table=createEmpty();

 matches.forEach(m=>{
  if(!m.stats) return;

  const s=calc(m.stats);
  const h=table[m.homeTeam];
  const a=table[m.awayTeam];
  if(!h||!a) return;

  h.z++; a.z++;
  h.gf+=s.hg; h.ga+=s.ag;
  a.gf+=s.ag; a.ga+=s.hg;

  const isSN=(m.stats[20]==="1"||m.stats[20]==="2");
  const isOT=(!isSN&&(m.stats[9]==="11"||m.stats[19]==="11"));

  if(isSN){
   if(s.hg>s.ag){h.vsn++;h.b+=2;a.psn++;a.b+=1;}
   else{a.vsn++;a.b+=2;h.psn++;h.b+=1;}
  }
  else if(isOT){
   if(s.hg>s.ag){h.vp++;h.b+=2;a.pp++;a.b+=1;}
   else{a.vp++;a.b+=2;h.pp++;h.b+=1;}
  }
  else{
   if(s.hg>s.ag){h.v++;h.b+=3;a.p++;}
   else{a.v++;a.b+=3;h.p++;}
  }
 });

 return Object.values(table).sort((a,b)=>{
  if(b.b!==a.b) return b.b-a.b;
  if((b.gf-b.ga)!==(a.gf-a.ga)) return (b.gf-b.ga)-(a.gf-a.ga);
  return b.gf-a.gf;
 });
}

function renderStandings(arr){
 const body=document.getElementById("standingsBody");
 body.innerHTML="";

 arr.forEach((t,i)=>{
  body.innerHTML+=`
   <tr>
     <td>${i+1}</td>
     <td class="teamCell">
       <img class="logo" src="./logos/${logos[t.team]}">
       ${t.team}
     </td>
     <td><b>${t.b}</b></td>
     <td>${t.gf}:${t.ga}</td>
     <td>${t.gf-t.ga}</td>
     <td>${t.z}</td>
     <td>${t.v}</td>
     <td>${t.p}</td>
     <td>${t.vp}</td>
     <td>${t.pp}</td>
     <td>${t.vsn}</td>
     <td>${t.psn}</td>
   </tr>
  `;
 });
}

function renderSchedule(matches){

 currentMatches=matches;

 const cont=document.getElementById("schedule");
 cont.innerHTML="";

 scheduleList.forEach(p=>{

  const m=matches.find(x=>x.homeTeam===p[0]&&x.awayTeam===p[1]);

  if(selectedTeam!=="all" && p[0]!==selectedTeam && p[1]!==selectedTeam) return;
  if(showPlayedOnly && !m) return;

  let hg=0,ag=0,label="";
  let h1=0,h2=0,h3=0,a1=0,a2=0,a3=0;

  if(m){
   const s=calc(m.stats);
   hg=s.hg; ag=s.ag;

   a1=Number(m.stats[6])||0;
   a2=Number(m.stats[7])||0;
   a3=Number(m.stats[8])||0;

   h1=Number(m.stats[16])||0;
   h2=Number(m.stats[17])||0;
   h3=Number(m.stats[18])||0;

   if(m.stats[20]==="1"||m.stats[20]==="2") label="SN";
   else if(m.stats[9]==="11"||m.stats[19]==="11") label="OT";
  }

  const link=`statistiky-zapasu.html?home=${encodeURIComponent(p[0])}&away=${encodeURIComponent(p[1])}`;

  cont.innerHTML+=`
  <div class="matchRow">
   <div class="teamBox"><img class="logo" src="./logos/${logos[p[0]]}">${p[0]}</div>
   <div class="scoreBox">${hg}</div>
   <div class="periods">
     <div class="otLabel">${label}</div>
     (${h1}:${a1}, ${h2}:${a2}, ${h3}:${a3})
   </div>
   <div class="scoreBox">${ag}</div>
   <div class="teamBox teamRight">${p[1]}<img class="logo" src="./logos/${logos[p[1]]}"></div>
   <div><button class="statsBtn" onclick="window.location.href='${link}'">Statistiky</button></div>
  </div>`;
 });
}

const q=query(collection(db,"zapasy"),orderBy("created","asc"));

onSnapshot(q,(snap)=>{
 let matches=[];
 snap.forEach(d=>{
  const m=d.data();
  if(m.category?.startsWith("Extraliga") && m.season==="Sezóna 2"){
   matches.push(m);
  }
 });

 renderSchedule(matches);
 renderStandings(calculateStandings(matches));
});

</script>
</body>
</html>
