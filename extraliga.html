<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, query, orderBy, onSnapshot } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD0jDnVNHZAs83g6FGwQT_nOpOCyT4NTNU",
  authDomain: "statistiky-6310a.firebaseapp.com",
  projectId: "statistiky-6310a"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ===== LOGA ===== */

const teamLogos={
"HC Geus Okna Kladno (P)":"kladno.png",
"HC Chemopetrol Litvínov (P)":"litvinov.png",
"HC Dynamo Pardubice (K)":"pardubice.png",
"HC Sparta Praha (P)":"sparta.png",
"HC Energie Karlovy Vary (P)":"vary.png",
"HC Bílí Tygři Liberec (K)":"liberec.png",
"HC Mountfield České Budějovice (K)":"budejovice.png",
"HC Oceláři Třinec (K)":"trinec.png",
"HC Znojemští Orli (K)":"znojmo.png"
};

function logoHtml(team){
    if(!teamLogos[team]) return "";
    return `<img class="logo" src="./logos/${teamLogos[team]}">`;
}

/* ===== ROZPIS ===== */

const scheduleList=[ /* nezměněný seznam */
["HC Geus Okna Kladno (P)","HC Dynamo Pardubice (K)"],
["HC Bílí Tygři Liberec (K)","HC Chemopetrol Litvínov (P)"],
["HC Sparta Praha (P)","HC Mountfield České Budějovice (K)"],
["HC Znojemští Orli (K)","HC Energie Karlovy Vary (P)"],
["HC Dynamo Pardubice (K)","HC Chemopetrol Litvínov (P)"],
["HC Geus Okna Kladno (P)","HC Mountfield České Budějovice (K)"],
["HC Znojemští Orli (K)","HC Sparta Praha (P)"],
["HC Energie Karlovy Vary (P)","HC Bílí Tygři Liberec (K)"],
["HC Mountfield České Budějovice (K)","HC Geus Okna Kladno (P)"],
["HC Chemopetrol Litvínov (P)","HC Znojemští Orli (K)"],
["HC Dynamo Pardubice (K)","HC Sparta Praha (P)"],
["HC Bílí Tygři Liberec (K)","HC Energie Karlovy Vary (P)"],
["HC Geus Okna Kladno (P)","HC Znojemští Orli (K)"],
["HC Mountfield České Budějovice (K)","HC Chemopetrol Litvínov (P)"],
["HC Bílí Tygři Liberec (K)","HC Sparta Praha (P)"],
["HC Energie Karlovy Vary (P)","HC Dynamo Pardubice (K)"],
["HC Dynamo Pardubice (K)","HC Geus Okna Kladno (P)"],
["HC Chemopetrol Litvínov (P)","HC Bílí Tygři Liberec (K)"],
["HC Mountfield České Budějovice (K)","HC Sparta Praha (P)"],
["HC Energie Karlovy Vary (P)","HC Znojemští Orli (K)"],
["HC Chemopetrol Litvínov (P)","HC Dynamo Pardubice (K)"],
["HC Mountfield České Budějovice (K)","HC Geus Okna Kladno (P)"],
["HC Sparta Praha (P)","HC Znojemští Orli (K)"],
["HC Bílí Tygři Liberec (K)","HC Energie Karlovy Vary (P)"],
["HC Geus Okna Kladno (P)","HC Bílí Tygři Liberec (K)"],
["HC Znojemští Orli (K)","HC Chemopetrol Litvínov (P)"],
["HC Sparta Praha (P)","HC Dynamo Pardubice (K)"],
["HC Energie Karlovy Vary (P)","HC Mountfield České Budějovice (K)"],
["HC Bílí Tygři Liberec (K)","HC Geus Okna Kladno (P)"],
["HC Dynamo Pardubice (K)","HC Chemopetrol Litvínov (P)"],
["HC Mountfield České Budějovice (K)","HC Energie Karlovy Vary (P)"],
["HC Znojemští Orli (K)","HC Sparta Praha (P)"]
];

/* ===== VÝPOČET ===== */

function num(v){ return isNaN(Number(v))?0:Number(v); }

function calculateScore(stats){
    if(!stats) return null;

    let a1=num(stats[6]), a2=num(stats[7]), a3=num(stats[8]);
    let h1=num(stats[16]), h2=num(stats[17]), h3=num(stats[18]);

    let away=a1+a2+a3;
    let home=h1+h2+h3;

    let type="";

    if(stats[9]==="11") away++;
    if(stats[19]==="11") home++;

    if(stats[20]==="1"){ home++; type="SN"; }
    else if(stats[20]==="2"){ away++; type="SN"; }
    else if(Math.abs(home-away)===1 && (stats[9]==="11"||stats[19]==="11"))
        type="OT";

    return {home,away,type,periods:`(${h1}:${a1}, ${h2}:${a2}, ${h3}:${a3})`};
}

/* ===== ROZPIS ===== */

function renderSchedule(matches){

    const wrap=document.getElementById("schedule");
    wrap.innerHTML="";

    scheduleList.forEach(pair=>{

        const m=matches.find(x=>x.homeTeam===pair[0] && x.awayTeam===pair[1]);
        const s=m?calculateScore(m.stats):null;

        wrap.innerHTML+=`
        <div class="matchRow">
            <div class="teamBox">${logoHtml(pair[0])}${pair[0]}</div>
            <div class="scoreBox">${s?s.home:0}</div>
            <div>
                <div class="resultType">${s?s.type:""}</div>
                <div class="periods">${s?s.periods:"(0:0, 0:0, 0:0)"}</div>
            </div>
            <div class="scoreBox">${s?s.away:0}</div>
            <div class="teamBox teamRight">${pair[1]}${logoHtml(pair[1])}</div>
        </div>`;
    });
}

/* ===== TABULKA + ŘAZENÍ (REÁLNÁ EXTRALIGA) ===== */

function updateStandings(matches){

    const teams={};

    document.querySelectorAll("#standings tbody tr").forEach(tr=>{
        const t=tr.dataset.team;
        teams[t]={team:t,pts:0,gf:0,ga:0,g:0,w:0,l:0,ow:0,ol:0,snw:0,snl:0};
    });

    const mutual={};

    matches.forEach(m=>{
        const s=calculateScore(m.stats);
        if(!s) return;

        const H=teams[m.homeTeam];
        const A=teams[m.awayTeam];
        if(!H || !A) return;

        H.g++; A.g++;
        H.gf+=s.home; H.ga+=s.away;
        A.gf+=s.away; A.ga+=s.home;

        const key=[m.homeTeam,m.awayTeam].sort().join("|");
        if(!mutual[key]) mutual[key]={};

        if(s.type===""){
            if(s.home>s.away){H.pts+=3;H.w++;A.l++; mutual[key][H.team]=(mutual[key][H.team]||0)+3;}
            else{A.pts+=3;A.w++;H.l++; mutual[key][A.team]=(mutual[key][A.team]||0)+3;}
        }
        else if(s.type==="OT"){
            if(s.home>s.away){H.pts+=2;A.pts+=1;H.ow++;A.ol++; mutual[key][H.team]=(mutual[key][H.team]||0)+2;}
            else{A.pts+=2;H.pts+=1;A.ow++;H.ol++; mutual[key][A.team]=(mutual[key][A.team]||0)+2;}
        }
        else{
            if(s.home>s.away){H.pts+=2;A.pts+=1;H.snw++;A.snl++; mutual[key][H.team]=(mutual[key][H.team]||0)+2;}
            else{A.pts+=2;H.pts+=1;A.snw++;H.snl++; mutual[key][A.team]=(mutual[key][A.team]||0)+2;}
        }
    });

    const sorted=Object.values(teams).sort((a,b)=>{

        if(b.pts!==a.pts) return b.pts-a.pts;

        const key=[a.team,b.team].sort().join("|");
        if(mutual[key]){
            const pa=mutual[key][a.team]||0;
            const pb=mutual[key][b.team]||0;
            if(pb!==pa) return pb-pa;
        }

        const diffA=a.gf-a.ga;
        const diffB=b.gf-b.ga;
        if(diffB!==diffA) return diffB-diffA;

        return b.gf-a.gf;
    });

    const tbody=document.querySelector("#standings tbody");

    sorted.forEach((t,i)=>{
        const tr=tbody.querySelector(`tr[data-team="${t.team}"]`);
        const c=tr.children;
        c[1].innerText=i+1;
        c[3].innerText=t.pts;
        c[4].innerText=`${t.gf}:${t.ga}`;
        c[5].innerText=t.gf-t.ga;
        c[6].innerText=t.g;
        c[7].innerText=t.w;
        c[8].innerText=t.l;
        c[9].innerText=t.ow;
        c[10].innerText=t.ol;
        c[11].innerText=t.snw;
        c[12].innerText=t.snl;
    });
}

/* ===== LOAD ===== */

const q=query(collection(db,"zapasy"),orderBy("created","asc"));

onSnapshot(q,(snap)=>{

    let matches=[];

    snap.forEach(d=>{
        const m=d.data();
        if(m.category?.startsWith("Extraliga") && m.season==="Sezóna 2")
            matches.push(m);
    });

    renderSchedule(matches);
    updateStandings(matches);
});

</script>
