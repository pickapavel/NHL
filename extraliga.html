<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Extraliga - 2. sezóna</title>

<style>
*{box-sizing:border-box}

body{
    font-family:Arial;
    margin:0;
    background:#f2f2f2;
}

.wrapper{
    max-width:1200px;
    margin:auto;
    padding:20px;
    background:white;
}

h1{margin-top:0}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    border:1px solid #999;
    padding:8px;
    text-align:center;
}

th{
    background:#2f9ec9;
    color:white;
}

.logo{
    width:26px;
    height:26px;
    object-fit:contain;
}

.schedule{margin-top:20px;}

.matchRow{
    display:grid;
    grid-template-columns:1fr 70px 220px 70px 1fr;
    align-items:center;
    background:#e9ecef;
    padding:10px;
    margin-bottom:6px;
    border-radius:6px;
}

.teamBox{
    display:flex;
    align-items:center;
    gap:10px;
    font-weight:bold;
}

.teamRight{justify-content:flex-end;}

.scoreBox{
    background:#0b2a3c;
    color:white;
    font-size:22px;
    font-weight:bold;
    padding:8px 0;
    border-radius:6px;
}

.periods{text-align:center;font-size:14px;}
.otLabel{font-weight:bold;font-size:13px;margin-bottom:2px;}
</style>
</head>

<body>

<div class="wrapper">

<h1>Extraliga - 2. sezóna</h1>

<table id="standings">
<thead>
<tr>
<th></th>
<th>#</th>
<th>Tým</th>
<th>B</th>
<th>Skóre</th>
<th>+/-</th>
<th>Z</th>
<th>V</th>
<th>P</th>
<th>VP</th>
<th>PP</th>
<th>VSN</th>
<th>PSN</th>
</tr>
</thead>
<tbody></tbody>
</table>

<h2>Rozpis zápasů</h2>
<div id="schedule" class="schedule"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, query, orderBy, onSnapshot }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig={
 apiKey:"AIzaSyD0jDnVNHZAs83g6FGwQT_nOpOCyT4NTNU",
 authDomain:"statistiky-6310a.firebaseapp.com",
 projectId:"statistiky-6310a"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

/* ===================== */
/* TEAMS */
/* ===================== */

const teams=[
"HC Geus Okna Kladno (P)",
"HC Chemopetrol Litvínov (P)",
"HC Dynamo Pardubice (K)",
"HC Sparta Praha (P)",
"HC Energie Karlovy Vary (P)",
"HC Bílí Tygři Liberec (K)",
"HC Mountfield České Budějovice (K)",
"HC Znojemští Orli (K)"
];

const teamLogos={
"HC Geus Okna Kladno (P)":"kladno.png",
"HC Chemopetrol Litvínov (P)":"litvinov.png",
"HC Dynamo Pardubice (K)":"pardubice.png",
"HC Sparta Praha (P)":"sparta.png",
"HC Energie Karlovy Vary (P)":"vary.png",
"HC Bílí Tygři Liberec (K)":"liberec.png",
"HC Mountfield České Budějovice (K)":"budejovice.png",
"HC Znojemští Orli (K)":"znojmo.png"
};

/* ===================== */
/* ROZPIS */
/* ===================== */

const scheduleList=[
["HC Geus Okna Kladno (P)","HC Dynamo Pardubice (K)"],
["HC Bílí Tygři Liberec (K)","HC Chemopetrol Litvínov (P)"],
["HC Sparta Praha (P)","HC Mountfield České Budějovice (K)"],
["HC Znojemští Orli (K)","HC Energie Karlovy Vary (P)"],
["HC Dynamo Pardubice (K)","HC Chemopetrol Litvínov (P)"],
["HC Geus Okna Kladno (P)","HC Mountfield České Budějovice (K)"],
["HC Znojemští Orli (K)","HC Sparta Praha (P)"],
["HC Energie Karlovy Vary (P)","HC Bílí Tygři Liberec (K)"],
["HC Mountfield České Budějovice (K)","HC Geus Okna Kladno (P)"],
["HC Chemopetrol Litvínov (P)","HC Znojemští Orli (K)"],
["HC Dynamo Pardubice (K)","HC Sparta Praha (P)"],
["HC Bílí Tygři Liberec (K)","HC Energie Karlovy Vary (P)"],
["HC Geus Okna Kladno (P)","HC Znojemští Orli (K)"],
["HC Mountfield České Budějovice (K)","HC Chemopetrol Litvínov (P)"],
["HC Bílí Tygři Liberec (K)","HC Sparta Praha (P)"],
["HC Energie Karlovy Vary (P)","HC Dynamo Pardubice (K)"],
["HC Dynamo Pardubice (K)","HC Geus Okna Kladno (P)"],
["HC Chemopetrol Litvínov (P)","HC Bílí Tygři Liberec (K)"],
["HC Mountfield České Budějovice (K)","HC Sparta Praha (P)"],
["HC Energie Karlovy Vary (P)","HC Znojemští Orli (K)"],
["HC Chemopetrol Litvínov (P)","HC Dynamo Pardubice (K)"],
["HC Mountfield České Budějovice (K)","HC Geus Okna Kladno (P)"],
["HC Sparta Praha (P)","HC Znojemští Orli (K)"],
["HC Bílí Tygři Liberec (K)","HC Energie Karlovy Vary (P)"],
["HC Geus Okna Kladno (P)","HC Bílí Tygři Liberec (K)"],
["HC Znojemští Orli (K)","HC Chemopetrol Litvínov (P)"],
["HC Sparta Praha (P)","HC Dynamo Pardubice (K)"],
["HC Energie Karlovy Vary (P)","HC Mountfield České Budějovice (K)"],
["HC Bílí Tygři Liberec (K)","HC Geus Okna Kladno (P)"],
["HC Dynamo Pardubice (K)","HC Chemopetrol Litvínov (P)"],
["HC Mountfield České Budějovice (K)","HC Energie Karlovy Vary (P)"],
["HC Znojemští Orli (K)","HC Sparta Praha (P)"]
];

/* ===================== */
/* SAFE NUMBER */
/* ===================== */

function num(v){
 const n=parseInt(v);
 return isNaN(n)?0:n;
}

/* ===================== */
/* SCORE */
/* ===================== */

function calculateScore(stats){
 if(!stats) return {hg:0,ag:0,label:"",periods:"(0:0, 0:0, 0:0)"};

 let ag=num(stats[6])+num(stats[7])+num(stats[8]);
 let hg=num(stats[16])+num(stats[17])+num(stats[18]);

 let label="";

 if(stats[9]==="11"){ ag++; label="OT"; }
 if(stats[19]==="11"){ hg++; label="OT"; }

 if(stats[20]==="1"){ hg++; label="SN"; }
 if(stats[20]==="2"){ ag++; label="SN"; }

 return {
   hg,ag,label,
   periods:`(${num(stats[16])}:${num(stats[6])}, ${num(stats[17])}:${num(stats[7])}, ${num(stats[18])}:${num(stats[8])})`
 };
}

/* ===================== */
/* TABLE + SCHEDULE */
/* ===================== */

function render(matches){

 const stats={};
 teams.forEach(t=>{
  stats[t]={team:t,pts:0,gf:0,ga:0,z:0,v:0,p:0,vp:0,pp:0,vsn:0,psn:0};
 });

 matches.forEach(m=>{
   const s=calculateScore(m.stats);
   const H=stats[m.homeTeam];
   const A=stats[m.awayTeam];
   if(!H||!A) return;

   H.gf+=s.hg; H.ga+=s.ag;
   A.gf+=s.ag; A.ga+=s.hg;
   H.z++; A.z++;

   if(s.label==="SN"){
     if(s.hg>s.ag){H.vsn++;H.pts+=2;A.psn++;A.pts+=1;}
     else{A.vsn++;A.pts+=2;H.psn++;H.pts+=1;}
   }else if(s.label==="OT"){
     if(s.hg>s.ag){H.vp++;H.pts+=2;A.pp++;A.pts+=1;}
     else{A.vp++;A.pts+=2;H.pp++;H.pts+=1;}
   }else{
     if(s.hg>s.ag){H.v++;H.pts+=3;A.p++;}
     else{A.v++;A.pts+=3;H.p++;}
   }
 });

 let arr=Object.values(stats);

 arr.sort((a,b)=>{
   if(b.pts!==a.pts) return b.pts-a.pts;
   let diffA=a.gf-a.ga;
   let diffB=b.gf-b.ga;
   if(diffB!==diffA) return diffB-diffA;
   return b.gf-a.gf;
 });

 const tbody=document.querySelector("#standings tbody");
 tbody.innerHTML="";

 arr.forEach((t,i)=>{
   tbody.innerHTML+=`
   <tr>
   <td><img class="logo" src="./logos/${teamLogos[t.team]}"></td>
   <td>${i+1}</td>
   <td style="text-align:left">${t.team}</td>
   <td>${t.pts}</td>
   <td>${t.gf}:${t.ga}</td>
   <td>${t.gf-t.ga}</td>
   <td>${t.z}</td>
   <td>${t.v}</td>
   <td>${t.p}</td>
   <td>${t.vp}</td>
   <td>${t.pp}</td>
   <td>${t.vsn}</td>
   <td>${t.psn}</td>
   </tr>`;
 });

 /* ROZPIS */

 const container=document.getElementById("schedule");
 container.innerHTML="";

 scheduleList.forEach(pair=>{
   const match=matches.find(m=>m.homeTeam===pair[0]&&m.awayTeam===pair[1]);
   const s=calculateScore(match?.stats);

   container.innerHTML+=`
   <div class="matchRow">
     <div class="teamBox"><img class="logo" src="./logos/${teamLogos[pair[0]]}">${pair[0]}</div>
     <div class="scoreBox">${s.hg}</div>
     <div class="periods">${s.label?`<div class="otLabel">${s.label}</div>`:""}${s.periods}</div>
     <div class="scoreBox">${s.ag}</div>
     <div class="teamBox teamRight">${pair[1]}<img class="logo" src="./logos/${teamLogos[pair[1]]}"></div>
   </div>`;
 });
}

/* ===================== */
/* LOAD */
/* ===================== */

const q=query(collection(db,"zapasy"),orderBy("created","asc"));

onSnapshot(q,(snap)=>{
 const matches=[];
 snap.forEach(d=>{
   const m=d.data();
   if(m.category?.startsWith("Extraliga") && m.season==="Sezóna 2"){
     matches.push(m);
   }
 });
 render(matches);
});

</script>
</body>
</html>
