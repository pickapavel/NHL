<body>

</div>

<h2>Rozpis zápasů</h2>
<div id="schedule" class="schedule"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, query, orderBy, onSnapshot } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
 apiKey:"AIzaSyD0jDnVNHZAs83g6FGwQT_nOpOCyT4NTNU",
 authDomain:"statistiky-6310a.firebaseapp.com",
 projectId:"statistiky-6310a"
});
const db=getFirestore(app);

const teamLogos={
"HC Geus Okna Kladno (P)":"kladno.png",
"HC Chemopetrol Litvínov (P)":"litvinov.png",
"HC Dynamo Pardubice (K)":"pardubice.png",
"HC Sparta Praha (P)":"sparta.png"
};

function logoHtml(t){
 return teamLogos[t]?`<img class="logo" src="./logos/${teamLogos[t]}">`:"";
}

function num(v){return isNaN(Number(v))?0:Number(v);}

function calculateScore(stats){
 if(!stats) return null;
 let a=num(stats[6])+num(stats[7])+num(stats[8]);
 let h=num(stats[16])+num(stats[17])+num(stats[18]);
 let type="";
 if(stats[9]==="11")a++;
 if(stats[19]==="11")h++;
 if(stats[20]==="1"){h++;type="SN";}
 else if(stats[20]==="2"){a++;type="SN";}
 else if(Math.abs(h-a)===1&&(stats[9]==="11"||stats[19]==="11"))type="OT";
 return{home:h,away:a,type};
}

/* ===== TABULKA ===== */

function updateStandings(matches){

 const teams={};

 document.querySelectorAll("#standings tbody tr").forEach(tr=>{
  const t=tr.dataset.team;
  teams[t]={team:t,pts:0,gf:0,ga:0,g:0,w:0,l:0,ow:0,ol:0,snw:0,snl:0};
 });

 matches.forEach(m=>{
  const s=calculateScore(m.stats);
  if(!s)return;
  const H=teams[m.homeTeam];
  const A=teams[m.awayTeam];

  H.g++;A.g++;
  H.gf+=s.home;H.ga+=s.away;
  A.gf+=s.away;A.ga+=s.home;

  if(s.type===""){
   if(s.home>s.away){H.pts+=3;H.w++;A.l++;}
   else{A.pts+=3;A.w++;H.l++;}
  }
  else if(s.type==="OT"){
   if(s.home>s.away){H.pts+=2;A.pts+=1;H.ow++;A.ol++;}
   else{A.pts+=2;H.pts+=1;A.ow++;H.ol++;}
  }
  else{
   if(s.home>s.away){H.pts+=2;A.pts+=1;H.snw++;A.snl++;}
   else{A.pts+=2;H.pts+=1;A.snw++;H.snl++;}
  }
 });

 const sorted=Object.values(teams).sort((a,b)=>{
  if(b.pts!==a.pts) return b.pts-a.pts;
  if((b.gf-b.ga)!==(a.gf-a.ga)) return (b.gf-b.ga)-(a.gf-a.ga);
  return b.gf-a.gf;
 });

 const tbody=document.querySelector("#standings tbody");

 sorted.forEach((t,i)=>{
  const tr=tbody.querySelector(`tr[data-team="${t.team}"]`);
  const c=tr.children;

  c[1].innerText=i+1;
  c[3].innerText=t.pts;
  c[4].innerText=`${t.gf}:${t.ga}`;
  c[5].innerText=t.gf-t.ga;
  c[6].innerText=t.g;
  c[7].innerText=t.w;
  c[8].innerText=t.l;
  c[9].innerText=t.ow;
  c[10].innerText=t.ol;
  c[11].innerText=t.snw;
  c[12].innerText=t.snl;

  tbody.appendChild(tr); // ← TADY je hlavní oprava
 });
}

const q=query(collection(db,"zapasy"),orderBy("created","asc"));

onSnapshot(q,(snap)=>{
 let matches=[];
 snap.forEach(d=>{
  const m=d.data();
  if(m.category?.startsWith("Extraliga") && m.season==="Sezóna 2")
   matches.push(m);
 });
 updateStandings(matches);
});

</script>

</body>
</html>
