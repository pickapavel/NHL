<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Extraliga - 2. sezóna</title>

<style>
*{box-sizing:border-box}
body{font-family:Arial;margin:0;background:#f2f2f2;}
.wrapper{max-width:1200px;margin:auto;padding:20px;background:white;}
h1{margin-top:0}

/* ===== TABULKA (KARTY) ===== */

.standingsCard{
 display:flex;
 align-items:center;
 justify-content:space-between;
 background:#e9ecef;
 border-radius:10px;
 padding:14px 16px;
 margin-bottom:10px;
}

.rank{
 width:30px;
 font-weight:bold;
 font-size:18px;
 text-align:center;
}

.teamBlock{
 display:flex;
 align-items:center;
 gap:14px;
 flex:1;
}

.logo{
 width:40px;
 height:40px;
 object-fit:contain;
 filter:contrast(1.1) saturate(1.15);
 box-shadow:0 2px 6px rgba(0,0,0,0.25);
 border-radius:6px;
 background:white;
 padding:2px;
}

.teamInfo{
 display:flex;
 flex-direction:column;
}

.teamName{
 font-weight:bold;
 font-size:16px;
}

.teamStats{
 font-size:13px;
 color:#444;
 margin-top:2px;
}

.pointsBox{
 background:#0b2a3c;
 color:white;
 font-size:20px;
 font-weight:bold;
 padding:10px 16px;
 border-radius:8px;
 min-width:60px;
 text-align:center;
}

/* ===== FILTRY ===== */

.filterBar{
 display:flex;
 gap:10px;
 align-items:center;
 margin:15px 0;
 flex-wrap:wrap;
}

.filterBar select,
.filterBar button{
 padding:8px 10px;
 border-radius:6px;
 border:1px solid #ccc;
 font-weight:bold;
}

.filterActive{
 background:#2f9ec9;
 color:white;
 border-color:#2f9ec9;
}

/* ===== ROZPIS ===== */

.matchRow{
 display:grid;
 grid-template-columns:1fr 70px 220px 70px 1fr 120px;
 align-items:center;
 background:#e9ecef;
 padding:10px;
 margin-bottom:6px;
 border-radius:6px;
 gap:8px;
}

.teamBox{
 display:flex;
 align-items:center;
 gap:10px;
 font-weight:bold;
}

.teamRight{
 justify-content:flex-end;
}

.scoreBox{
 background:#0b2a3c;
 color:white;
 font-size:22px;
 font-weight:bold;
 padding:8px 0;
 border-radius:6px;
 text-align:center;
}

.periods{text-align:center;font-size:14px}
.otLabel{font-weight:bold;font-size:13px;margin-bottom:2px}

.statsBtn{
 background:#2f9ec9;
 color:white;
 border:none;
 padding:8px 12px;
 border-radius:6px;
 cursor:pointer;
 font-weight:bold;
 width:100%;
}

/* ===== MOBIL ===== */

@media (max-width:900px){
 .matchRow{
  grid-template-columns:1fr auto;
  grid-template-rows:auto auto auto auto;
 }
 .teamBox,
 .scoreBox,
 .periods,
 .statsBtn{
  grid-column:1/3;
  justify-content:center;
  text-align:center;
 }
}

</style>
</head>

<body>
<div class="wrapper">

<h1>Extraliga - 2. sezóna</h1>

<div id="standingsBody"></div>

<h2>Rozpis zápasů</h2>

<div class="filterBar">

<select id="teamFilter">
<option value="all">Všechny týmy</option>
</select>

<select id="locationFilter">
<option value="all">Domácí + Venkovní</option>
<option value="home">Jen domácí</option>
<option value="away">Jen venkovní</option>
</select>

<select id="resultFilter">
<option value="all">Výhry + Prohry</option>
<option value="win">Jen výhry</option>
<option value="loss">Jen prohry</option>
</select>

<select id="mutualTeam1">
<option value="">Vzájemné – tým 1</option>
</select>

<select id="mutualTeam2">
<option value="">Vzájemné – tým 2</option>
</select>

<button id="filterAll" class="filterActive">Všechny zápasy</button>
<button id="filterPlayed">Jen odehrané</button>

</div>

<div id="schedule"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, query, orderBy, onSnapshot }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig={
 apiKey:"AIzaSyD0jDnVNHZAs83g6FGwQT_nOpOCyT4NTNU",
 authDomain:"statistiky-6310a.firebaseapp.com",
 projectId:"statistiky-6310a"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

const teamsData={
 "HC Sparta Praha (P)":"sparta.png",
 "HC Bílí Tygři Liberec (K)":"liberec.png",
 "HC Dynamo Pardubice (K)":"pardubice.png",
 "HC Chemopetrol Litvínov (P)":"litvinov.png",
 "HC Geus Okna Kladno (P)":"kladno.png",
 "HC Motor České Budějovice (K)":"budejovice.png",
 "HC Energie Karlovy Vary (P)":"vary.png",
 "HC Oceláři Třinec (K)":"trinec.png"
};

const teams=Object.keys(teamsData);
const logos=teamsData;

const scheduleIndex=[
 [0,1],[3,2],[5,4],[7,6],
 [2,0],[1,3],[6,5],[4,7],
 [0,5],[3,7],[1,4],[2,6],
 [7,0],[4,2],[6,1],[5,3],
 [1,0],[2,3],[4,5],[6,7],
 [0,2],[3,1],[5,6],[7,4],
 [5,0],[7,3],[4,1],[6,2],
 [0,7],[2,4],[1,6],[3,5]
];

const scheduleList=scheduleIndex.map(([h,a])=>[teams[h],teams[a]]);

let selectedTeam="all";
let showPlayedOnly=false;
let locationFilter="all";
let resultFilter="all";
let mutual1="";
let mutual2="";
let currentMatches=[];

const teamFilter=document.getElementById("teamFilter");
const locationSelect=document.getElementById("locationFilter");
const resultSelect=document.getElementById("resultFilter");
const mutualTeam1=document.getElementById("mutualTeam1");
const mutualTeam2=document.getElementById("mutualTeam2");

teams.forEach(t=>{
 let opt1=document.createElement("option");
 opt1.value=t;
 opt1.textContent=t;
 teamFilter.appendChild(opt1);

 let opt2=document.createElement("option");
 opt2.value=t;
 opt2.textContent=t;
 mutualTeam1.appendChild(opt2.cloneNode(true));
 mutualTeam2.appendChild(opt2);
});

teamFilter.onchange=()=>{selectedTeam=teamFilter.value;renderSchedule(currentMatches);}
locationSelect.onchange=()=>{locationFilter=locationSelect.value;renderSchedule(currentMatches);}
resultSelect.onchange=()=>{resultFilter=resultSelect.value;renderSchedule(currentMatches);}
mutualTeam1.onchange=()=>{mutual1=mutualTeam1.value;renderSchedule(currentMatches);}
mutualTeam2.onchange=()=>{mutual2=mutualTeam2.value;renderSchedule(currentMatches);}

document.getElementById("filterAll").onclick=()=>{
 showPlayedOnly=false;
 document.getElementById("filterAll").classList.add("filterActive");
 document.getElementById("filterPlayed").classList.remove("filterActive");
 renderSchedule(currentMatches);
};

document.getElementById("filterPlayed").onclick=()=>{
 showPlayedOnly=true;
 document.getElementById("filterPlayed").classList.add("filterActive");
 document.getElementById("filterAll").classList.remove("filterActive");
 renderSchedule(currentMatches);
};

function calc(stats){
 let ag=Number(stats[6])+Number(stats[7])+Number(stats[8]);
 let hg=Number(stats[16])+Number(stats[17])+Number(stats[18]);
 if(stats[9]==="11") ag++;
 if(stats[19]==="11") hg++;
 if(stats[20]==="1") hg++;
 if(stats[20]==="2") ag++;
 return {hg,ag};
}

function renderStandings(arr){
 const body=document.getElementById("standingsBody");
 body.innerHTML="";
 arr.forEach((t,i)=>{
  body.innerHTML+=`
  <div class="standingsCard">
    <div class="rank">${i+1}</div>
    <div class="teamBlock">
      <img class="logo" src="./logos/${logos[t.team]}">
      <div class="teamInfo">
        <div class="teamName">${t.team}</div>
        <div class="teamStats">
          Skóre ${t.gf}:${t.ga} | +/- ${t.gf-t.ga} |
          Z ${t.z} | V ${t.v} | P ${t.p} |
          VP ${t.vp} | PP ${t.pp} |
          VSN ${t.vsn} | PSN ${t.psn}
        </div>
      </div>
    </div>
    <div class="pointsBox">${t.b}</div>
  </div>`;
 });
}

function renderSchedule(matches){
 currentMatches=matches;
 const cont=document.getElementById("schedule");
 cont.innerHTML="";

 scheduleList.forEach(p=>{

  const m=matches.find(x=>x.homeTeam===p[0]&&x.awayTeam===p[1]);

  if(selectedTeam!=="all" && p[0]!==selectedTeam && p[1]!==selectedTeam) return;
  if(showPlayedOnly && !m) return;

  if(locationFilter==="home" && selectedTeam!=="all" && p[0]!==selectedTeam) return;
  if(locationFilter==="away" && selectedTeam!=="all" && p[1]!==selectedTeam) return;

  if(mutual1 && mutual2){
   if(!( (p[0]===mutual1 && p[1]===mutual2) || (p[0]===mutual2 && p[1]===mutual1) )) return;
  }

  let hg=0,ag=0,label="";
  let show=true;

  if(m){
   const s=calc(m.stats);
   hg=s.hg; ag=s.ag;

   if(resultFilter==="win" && selectedTeam!=="all"){
    if(selectedTeam===p[0] && hg<=ag) show=false;
    if(selectedTeam===p[1] && ag<=hg) show=false;
   }
   if(resultFilter==="loss" && selectedTeam!=="all"){
    if(selectedTeam===p[0] && hg>=ag) show=false;
    if(selectedTeam===p[1] && ag>=hg) show=false;
   }

   if(m.stats[20]==="1"||m.stats[20]==="2") label="SN";
   else if(m.stats[9]==="11"||m.stats[19]==="11") label="OT";
  }

  if(!show) return;

  const link=`statistiky-zapasu.html?home=${encodeURIComponent(p[0])}&away=${encodeURIComponent(p[1])}`;

  cont.innerHTML+=`
  <div class="matchRow">
   <div class="teamBox"><img class="logo" src="./logos/${logos[p[0]]}">${p[0]}</div>
   <div class="scoreBox">${hg}</div>
   <div class="periods">
     <div class="otLabel">${label}</div>
   </div>
   <div class="scoreBox">${ag}</div>
   <div class="teamBox teamRight">${p[1]}<img class="logo" src="./logos/${logos[p[1]]}"></div>
   <div><button class="statsBtn" onclick="window.location.href='${link}'">Statistiky</button></div>
  </div>`;
 });
}

const q=query(collection(db,"zapasy"),orderBy("created","asc"));

onSnapshot(q,(snap)=>{
 let matches=[];
 snap.forEach(d=>{
  const m=d.data();
  if(m.category?.startsWith("Extraliga") && m.season==="Sezóna 2"){
   matches.push(m);
  }
 });

 renderSchedule(matches);
 renderStandings(calculateStandings(matches));
});

function calculateStandings(matches){
 let table={};
 teams.forEach(t=>{
  table[t]={team:t,b:0,z:0,v:0,p:0,vp:0,pp:0,vsn:0,psn:0,gf:0,ga:0};
 });

 matches.forEach(m=>{
  if(!m.stats) return;
  const s=calc(m.stats);
  const h=table[m.homeTeam];
  const a=table[m.awayTeam];
  if(!h||!a) return;

  h.z++; a.z++;
  h.gf+=s.hg; h.ga+=s.ag;
  a.gf+=s.ag; a.ga+=s.hg;

  const isSN=(m.stats[20]==="1"||m.stats[20]==="2");
  const isOT=(!isSN&&(m.stats[9]==="11"||m.stats[19]==="11"));

  if(isSN){
   if(s.hg>s.ag){h.vsn++;h.b+=2;a.psn++;a.b+=1;}
   else{a.vsn++;a.b+=2;h.psn++;h.b+=1;}
  }
  else if(isOT){
   if(s.hg>s.ag){h.vp++;h.b+=2;a.pp++;a.b+=1;}
   else{a.vp++;a.b+=2;h.pp++;h.b+=1;}
  }
  else{
   if(s.hg>s.ag){h.v++;h.b+=3;a.p++;}
   else{a.v++;a.b+=3;h.p++;}
  }
 });

 return Object.values(table).sort((a,b)=>{
  if(b.b!==a.b) return b.b-a.b;
  if((b.gf-b.ga)!==(a.gf-a.ga)) return (b.gf-b.ga)-(a.gf-a.ga);
  return b.gf-a.gf;
 });
}

</script>
</body>
</html>
