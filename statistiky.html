<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Statistiky</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:#eef2f7;min-height:100vh;}

.header{background:linear-gradient(135deg,#0b2a3c 0%,#1a5276 100%);padding:20px 30px;display:flex;align-items:center;gap:16px;margin-bottom:0;}
.header-logo{width:56px;height:56px;object-fit:contain;mix-blend-mode:lighten;}
.header-title{font-size:22px;font-weight:800;color:white;letter-spacing:-.3px;}
.header-sub{font-size:12px;color:#7ab0cc;font-weight:500;margin-top:3px;text-transform:uppercase;letter-spacing:.06em;}

.nav-tabs{background:#0b2a3c;padding:0 30px;display:flex;gap:0;border-bottom:2px solid #1a3a5c;justify-content:center;}
.nav-tab{padding:14px 24px;font-size:13px;font-weight:700;color:#7ab0cc;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .15s;white-space:nowrap;}
.nav-tab:hover{color:white;}
.nav-tab.active{color:white;border-bottom-color:#f0c040;}

.wrapper{max-width:1300px;margin:0 auto;padding:28px 20px 60px;}

.section{display:none;}
.section.active{display:block;}

.filter-row{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;align-items:center;justify-content:center;}
.filter-row-2{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center;justify-content:center;}

.filter-select{padding:8px 14px;border-radius:20px;border:2px solid #c8d8e8;background:white;font-family:'Inter',sans-serif;font-size:13px;font-weight:700;color:#1a3a5c;cursor:pointer;min-width:200px;}
.filter-select:focus{outline:none;border-color:#2f9ec9;}
.search-input{padding:8px 14px;border-radius:20px;border:2px solid #c8d8e8;background:white;font-family:'Inter',sans-serif;font-size:13px;color:#1a3a5c;min-width:220px;}
.search-input:focus{outline:none;border-color:#2f9ec9;}

.seg-btn{padding:7px 16px;border-radius:20px;border:2px solid #c8d8e8;background:white;font-family:'Inter',sans-serif;font-size:12px;font-weight:700;cursor:pointer;color:#1a3a5c;transition:all .15s;}
.seg-btn:hover{background:#dce8f5;border-color:#2f9ec9;}
.seg-btn.active{background:#0b2a3c;color:white;border-color:#0b2a3c;}
.seg-btn.active-kubele{background:#0b5394;color:white;border-color:#0b5394;}
.seg-btn.active-pici{background:#7c1a5a;color:white;border-color:#7c1a5a;}

.filter-divider{width:1px;height:28px;background:#c8d8e8;margin:0 4px;}

.table-wrap{overflow-x:auto;border-radius:12px;box-shadow:0 2px 12px rgba(26,58,92,.08);}
table{width:100%;border-collapse:collapse;font-size:13px;background:white;}
thead tr{background:#0b2a3c;}
thead th{padding:11px 10px;text-align:center;font-size:11px;font-weight:700;color:#7ab0cc;letter-spacing:.05em;text-transform:uppercase;white-space:nowrap;cursor:pointer;user-select:none;}
thead th:hover{color:white;}
thead th.th-left{text-align:left;padding-left:14px;}
tbody tr{border-bottom:1px solid #f0f0f0;transition:background .1s;}
tbody tr:hover{background:#f0f6fc;}
tbody tr:nth-child(even){background:#f7fbff;}
tbody tr:nth-child(even):hover{background:#e8f2fb;}
tbody td{padding:9px 10px;text-align:center;color:#1a2a3c;vertical-align:middle;}
tbody td.td-left{text-align:left;padding-left:14px;}
tbody td.td-rank{font-weight:800;color:#0b2a3c;width:44px;}
tbody td.td-name{font-weight:700;color:#0b2a3c;}
tbody td.td-highlight{font-weight:800;color:#0b2a3c;background:#fff8e0;}
tbody tr:nth-child(even) td.td-highlight{background:#fff3cc;}
.rank-1 td.td-rank{color:#f0b800;}
.rank-2 td.td-rank{color:#888;}
.rank-3 td.td-rank{color:#b87333;}

.team-badge{display:inline-block;background:#e8f0f8;color:#1a5276;font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;}
.pos-badge{display:inline-block;font-size:11px;font-weight:700;padding:2px 7px;border-radius:8px;}
.pos-F{background:#dcfce7;color:#166534;}
.pos-G{background:#fef9c3;color:#854d0e;}
.team-cell{display:flex;align-items:center;gap:8px;}
.team-logo-sm{width:22px;height:22px;object-fit:contain;border-radius:3px;flex-shrink:0;}

.player-link{color:#0b2a3c;text-decoration:none;font-weight:700;border-bottom:1px dotted #7ab0cc;cursor:pointer;}
.player-link:hover{color:#2f9ec9;border-bottom-color:#2f9ec9;}

.loading{padding:60px;text-align:center;color:#7ab0cc;font-size:14px;}
.empty{padding:40px;text-align:center;color:#aaa;font-size:14px;}

.section-title{font-size:16px;font-weight:700;color:#0b2a3c;margin:0 0 14px;display:flex;align-items:center;gap:8px;}
.section-title::after{content:'';flex:1;height:2px;background:linear-gradient(90deg,#2f9ec9,transparent);border-radius:2px;}

.legend{margin-top:16px;background:white;border-radius:10px;padding:14px 18px;border:1px solid #e0ecf8;font-size:12px;}
.legend-title{font-weight:700;color:#0b2a3c;margin-bottom:8px;font-size:13px;}
.legend-grid{display:flex;flex-wrap:wrap;gap:5px 20px;}
.legend-item{display:flex;align-items:center;gap:5px;}
.legend-key{font-weight:800;color:#0b2a3c;min-width:40px;}
</style>
</head>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
const { createClient } = supabase
const db = createClient(
 "https://qaocbodrflsaerxntfui.supabase.co",
 "sb_publishable_eIeO9MihyuQDuNHy60Ubrw_8ZuSKPFU"
)

const PLAYER_IDS = {
  kubele: "a5b84a2d-58e6-4bf6-877f-be814a993db6",
  pici:   "38dd6159-1b85-4e87-9176-6a494597216f",
}

const COMP_IDS = {
  extraliga:        "5cc76adb-b3e0-404b-9095-7dd4a41edb4e",
  ms:               "f0375c91-5b76-475e-afab-3d867b6b02d1",
  olympiada:        "c85830b0-612f-4390-88de-0b8775430460",
  pohar:            "254d4b5e-cb32-4c44-8b00-3010f895359c",
  exhibice:         "bccbc59c-86c0-4374-9243-60f84785dcc1",
}

// Mapování zkratek → logo + plný název
const TEAM_MAP = {
  CAN: { name:"Kanada (K)",                        logo:"kanada.png" },
  CEB: { name:"HC Motor České Budějovice (K)",     logo:"motor.png" },
  CZE: { name:"Česká Republika (K)",               logo:"cesko.png" },
  FIN: { name:"Finsko (P)",                        logo:"finsko.png" },
  FRA: { name:"Francie (P)",                       logo:"francie.png" },
  GBR: { name:"Velká Británie (K)",                logo:"velkabritanie.png" },
  JPN: { name:"Japonsko (P)",                      logo:"japonsko.png" },
  KLA: { name:"HC Rytíři Kladno (P)",              logo:"kladno.png" },
  KVA: { name:"HC Energie Karlovy Vary (P)",       logo:"vary.png" },
  LIB: { name:"HC Bílý Tygři Liberec (K)",         logo:"liberec.png" },
  LIT: { name:"HC Chemopetrol Litvínov (P)",       logo:"litvinov.png" },
  PCE: { name:"HC Dynamo Pardubice (K)",           logo:"pardubice.png" },
  RUS: { name:"Rusko (P)",                         logo:"rusko.png" },
  SPA: { name:"HC Sparta Praha (P)",               logo:"sparta.png" },
  TRI: { name:"HC Oceláři Třinec (K)",             logo:"trinec.png" },
  USA: { name:"USA (K)",                           logo:"usa.png" },
  ZNO: { name:"HC Orli Znojmo (K)",                logo:"znojmo.png" },
}
function teamName(a){ return TEAM_MAP[a]?.name||a||'—' }
function teamLogo(a){ return TEAM_MAP[a]?.logo?`./logos/${TEAM_MAP[a].logo}`:null }
function logoImg(a){
  const l=teamLogo(a)
  return l?`<img src="${l}" class="team-logo-sm" onerror="this.style.display='none'">`:''}

// Globální data
let rawStats = []         // surová data player_match_stats obohacená o season info
let allTeamsDb = []       // teams z DB (pro owner filtr)
let seasonCompMap = {}    // season_id → competition_id
let seasonStageMap = {}   // season_id → [{stage_id, stage_name, parent_stage_id}]
let allMatches = []       // všechny zápasy (pro brankářské výhry)

let allStats = []         // agregované po filtraci
let playersSortCol = 'points'
let playersSortDir = 'desc'
let posFilter = 'all'
let ownerFilter = 'all'
let loadedSections = new Set(['players'])

function switchTab(tab, el){
 document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'))
 document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'))
 el.classList.add('active')
 document.getElementById('section-'+tab).classList.add('active')
 if(!loadedSections.has(tab)){
  loadedSections.add(tab)
  if(tab==='teams')   renderTeams()
  if(tab==='records') renderRecords()
  if(tab==='betting') loadBetting()
 }
}

function setPosFilter(val, btn){
 posFilter=val
 document.querySelectorAll('.filter-row-2 .seg-btn').forEach(b=>b.classList.remove('active'))
 btn.classList.add('active')
 renderPlayers()
}

function setOwner(val, btn){
 ownerFilter=val
 document.querySelectorAll('#ob-all,#ob-kubele,#ob-pici').forEach(b=>{
  b.classList.remove('active','active-kubele','active-pici')
 })
 if(val==='all')    btn.classList.add('active')
 if(val==='kubele') btn.classList.add('active-kubele')
 if(val==='pici')   btn.classList.add('active-pici')
 renderPlayers()
}

function onFilterChange(){ renderPlayers() }

function toiToSec(t){
 if(!t||t==='00:00') return 0
 const p=t.split(':'); return (parseInt(p[0])||0)*60+(parseInt(p[1])||0)
}
function secToToi(s){
 const m=Math.floor(s/60),ss=s%60; return `${m}:${ss.toString().padStart(2,'0')}`
}

async function fetchAll(table){
 let data=[],from=0,ps=1000
 while(true){
  const {data:pg,error}=await db.from(table).select('*').range(from,from+ps-1)
  if(error||!pg||!pg.length) break
  data=data.concat(pg)
  if(pg.length<ps) break
  from+=ps
 }
 return data
}

// =====================================================
// INIT — načti vše
// =====================================================
async function init(){
 // Paralelně načti vše potřebné
 const [statsRaw, teamsRaw, seasonsRaw, stagesRaw, matchesRaw] = await Promise.all([
  fetchAll('player_match_stats'),
  db.from('teams').select('id,name,owner_id,in_extraliga,in_reprezentace,in_olympiada'),
  db.from('seasons').select('id,competition_id'),
  db.from('stages').select('id,season_id,name,parent_stage_id'),
  db.from('matches').select('id,season_id,stage_id,home_team,away_team,home_score,away_score,result_type'),
 ])

 allTeamsDb = teamsRaw.data || []
 allMatches = matchesRaw.data || []

 // Sestav mapy
 ;(seasonsRaw.data||[]).forEach(s=>{ seasonCompMap[s.id]=s.competition_id })

 const stageMap = {}
 ;(stagesRaw.data||[]).forEach(s=>{ stageMap[s.id]=s })

 // Obohať každý stat řádek o competition_id a stage info
 rawStats = (statsRaw||[]).map(r=>{
  const match = allMatches.find(m=>m.id===r.match_id)
  const compId = match ? (seasonCompMap[match.season_id]||'') : ''
  const stage = match ? stageMap[match.stage_id] : null
  const isPlayoff = stage ? (stage.name?.toLowerCase().includes('play')||stage.name?.toLowerCase().includes('final')||stage.name?.toLowerCase().includes('semifin')||stage.name?.toLowerCase().includes('čtvrt')) : false
  return { ...r, competition_id:compId, is_playoff:isPlayoff, match_obj:match }
 })

 // Sestav mapu tým → owner
 const teamOwnerMap = {}
 allTeamsDb.forEach(t=>{ teamOwnerMap[t.name]=t.owner_id })

 // Přidej owner_id k stats přes team_abbr → teams
 // Použijeme přímou vazbu přes matches → home_team/away_team
 const matchTeamMap = {}
 allMatches.forEach(m=>{
  matchTeamMap[m.home_team]=m.home_team
  matchTeamMap[m.away_team]=m.away_team
 })

 // Sestav dropdown týmů
 const teams=[...new Set(rawStats.map(p=>p.team_abbr).filter(Boolean))].sort()
 const sel=document.getElementById('teamFilterPlayers')
 sel.innerHTML='<option value="">Všechny týmy</option>'
 teams.forEach(t=>{
  const o=document.createElement('option')
  o.value=t; o.textContent=teamName(t)
  sel.appendChild(o)
 })

 // Sestav owner mapu přes team_abbr
 // Zkratky vs. in_extraliga/reprezentace — použijeme (K)/(P) heuristiku
 rawStats.forEach(r=>{
  if(!r.team_abbr) return
  // Zkusíme najít tým v allTeamsDb jehož short_name nebo name obsahuje zkratku
  // Jako fallback použijeme (K)/(P) suffix
 })

 buildAggregated()
 renderPlayers()
}

// Sestav agregovaná data dle aktuálních filtrů
function buildAggregated(){
 const compFilter = document.getElementById('compFilter').value
 const teamF      = document.getElementById('teamFilterPlayers').value
 const search     = document.getElementById('searchPlayers').value.toLowerCase()

 // Filtruj raw řádky
 let filtered = rawStats.filter(r=>{
  // Filtr soutěže
  if(compFilter){
   if(compFilter==='extraliga-playoff'){
    if(r.competition_id!==COMP_IDS.extraliga||!r.is_playoff) return false
   } else if(compFilter===COMP_IDS.extraliga){
    if(r.competition_id!==COMP_IDS.extraliga||r.is_playoff) return false
   } else {
    if(r.competition_id!==compFilter) return false
   }
  }
  // Filtr vlastníka přes (K)/(P) suffix v team_abbr nebo jménu
  if(ownerFilter!=='all'){
   // Zkusíme najít tým v DB podle zkratky
   const teamDbEntry = allTeamsDb.find(t=>{
    // Porovnej zkratku s názvem
    const abbr=(r.team_abbr||'').toUpperCase()
    const nm=(t.name||'').toUpperCase()
    const sn=(t.short_name||'').toUpperCase()
    return nm.includes(abbr)||sn.includes(abbr)||abbr===nm.slice(0,abbr.length)
   })
   const ownerId = teamDbEntry?.owner_id || null
   if(ownerFilter==='kubele'&&ownerId!==PLAYER_IDS.kubele) return false
   if(ownerFilter==='pici'  &&ownerId!==PLAYER_IDS.pici)   return false
  }
  return true
 })

 // Agreguj
 const map={}
 filtered.forEach(r=>{
  const key=r.player_id?String(r.player_id):r.player_name
  if(!map[key]){
   map[key]={
    player_id:r.player_id, player_name:r.player_name,
    team_abbr:r.team_abbr, is_goalie:r.is_goalie||false,
    gp:0,goals:0,assists:0,points:0,
    plus_minus:0,ppg:0,shg:0,shots:0,pim:0,hits:0,toi_sec:0,
    goalie_sa:0,goalie_ga:0,
    gw:0,gl:0,got_w:0,got_l:0,gsn_w:0,gsn_l:0,
   }
  }
  const p=map[key]
  p.gp++
  p.goals      +=r.goals||0
  p.assists    +=r.assists||0
  p.points     +=r.points||0
  p.plus_minus +=r.plus_minus||0
  p.ppg        +=r.ppg||0
  p.shg        +=r.shg||0
  p.shots      +=r.shots||0
  p.pim        +=r.pim||0
  p.hits       +=r.hits||0
  p.toi_sec    +=toiToSec(r.toi)
  p.goalie_sa  +=r.goalie_sa||0
  p.goalie_ga  +=r.goalie_ga||0
  p.team_abbr  =r.team_abbr||p.team_abbr
  if(r.is_goalie) p.is_goalie=true

  // Výhry/prohry brankáře
  if(r.is_goalie&&r.match_obj&&r.match_obj.home_score!=null){
   const m=r.match_obj
   const isHome=m.home_team===r.match_obj.home_team  // vždy true — potřebujeme vědět čí tým
   // Zjistíme výsledek: porovnáme team_abbr s domácím/hostujícím
   const rt=m.result_type||'REG'
   const hg=Number(m.home_score), ag=Number(m.away_score)
   const homeWin=hg>ag, awayWin=ag>hg
   // Nevíme přesně jestli brankář hrál za home nebo away — použijeme toi
   // Pokud goalie_sa odpovídá střelám, lze odvodit — ale jako proxy:
   // Označíme výsledek jako neznámý — TODO po propojení
  }
 })

 allStats=Object.values(map)

 // Filtruj ještě podle týmu a jména
 if(teamF) allStats=allStats.filter(p=>p.team_abbr===teamF)
 if(search) allStats=allStats.filter(p=>p.player_name.toLowerCase().includes(search))
}

function sortPlayers(col){
 if(playersSortCol===col) playersSortDir=playersSortDir==='desc'?'asc':'desc'
 else{ playersSortCol=col; playersSortDir='desc' }
 renderPlayers()
}

function renderPlayers(){
 buildAggregated()

 const isGoalieView=posFilter==='Goalie'
 let data=allStats.filter(p=>{
  if(posFilter==='Player'&&p.is_goalie) return false
  if(posFilter==='Goalie'&&!p.is_goalie) return false
  return true
 })

 data=data.map(p=>({
  ...p,
  sv_pct: p.goalie_sa>0?((p.goalie_sa-p.goalie_ga)/p.goalie_sa*100):0,
  gaa:    p.gp>0?p.goalie_ga/p.gp:0,
 }))

 // Brankáři bez zákroků jdou dolů
 if(isGoalieView){
  data.sort((a,b)=>{
   if(a.goalie_sa===0&&b.goalie_sa>0) return 1
   if(b.goalie_sa===0&&a.goalie_sa>0) return -1
   if(playersSortCol==='sv_pct'||(!['player_name','team_abbr'].includes(playersSortCol)&&playersSortCol)){
    const av=a[playersSortCol]??0, bv=b[playersSortCol]??0
    return playersSortDir==='asc'?av-bv:bv-av
   }
   return b.sv_pct-a.sv_pct
  })
 } else {
  data.sort((a,b)=>{
   let av=a[playersSortCol]??0, bv=b[playersSortCol]??0
   if(typeof av==='string') return playersSortDir==='asc'?av.localeCompare(bv):bv.localeCompare(av)
   return playersSortDir==='asc'?av-bv:bv-av
  })
 }

 const si=(col)=>playersSortCol===col?(playersSortDir==='desc'?' ↓':' ↑'):''
 const head=document.getElementById('playersHead')

function renderTeams(){
 const map={}
 rawStats.forEach(r=>{
  const t=r.team_abbr||'?'
  if(!map[t]) map[t]={team:t,matches:new Set(),goals:0,shots:0,hits:0,pim:0,ppg:0,players:new Set()}
  const m=map[t]
  m.matches.add(r.match_id)
  m.goals +=r.goals||0
  m.shots +=r.shots||0
  m.hits  +=r.hits||0
  m.pim   +=r.pim||0
  m.ppg   +=r.ppg||0
  m.players.add(r.player_name)
 })

 const teams=Object.values(map).map(t=>({
  ...t,
  gp:t.matches.size,
  players:t.players.size,
  gpg:t.matches.size>0?(t.goals/t.matches.size).toFixed(2):'—',
  spg:t.matches.size>0?(t.shots/t.matches.size).toFixed(1):'—',
 })).sort((a,b)=>b.goals-a.goals)

// REKORDY

function renderRecords(){
 const map={}, pgMap={}
 rawStats.forEach(r=>{
  const key=r.player_id?String(r.player_id):r.player_name
  if(!map[key]) map[key]={name:r.player_name,team:r.team_abbr,gp:0,goals:0,assists:0,points:0,pim:0,hits:0,shots:0,ppg:0,plus_minus:0,player_id:r.player_id}
  const p=map[key]
  p.gp++;p.goals+=r.goals||0;p.assists+=r.assists||0;p.points+=r.points||0
  p.pim+=r.pim||0;p.hits+=r.hits||0;p.shots+=r.shots||0;p.ppg+=r.ppg||0
  p.plus_minus+=r.plus_minus||0;p.team=r.team_abbr||p.team

  if(!pgMap[key]) pgMap[key]={name:r.player_name,team:r.team_abbr,max_goals:0,max_assists:0,max_points:0,max_hits:0,max_pim:0,player_id:r.player_id}
  const pg=pgMap[key]
  pg.max_goals  =Math.max(pg.max_goals,  r.goals||0)
  pg.max_assists=Math.max(pg.max_assists,r.assists||0)
  pg.max_points =Math.max(pg.max_points, r.points||0)
  pg.max_hits   =Math.max(pg.max_hits,   r.hits||0)
  pg.max_pim    =Math.max(pg.max_pim,    r.pim||0)
 })

 const players=Object.values(map).filter(p=>p.gp>0)
 const pg=Object.values(pgMap)

 const profileUrl=(p)=>{
  const param=p.player_id?`id=${p.player_id}`:`name=${encodeURIComponent(p.name)}`
  return `hrac-profil.html?${param}`
 }

 function top3(arr,field,label,icon){
  const sorted=[...arr].filter(p=>p[field]>0).sort((a,b)=>b[field]-a[field]).slice(0,3)
  if(!sorted.length) return ''
  return `
   <div class="section-title">${icon} ${label}</div>
   <div class="table-wrap" style="margin-bottom:20px;">
    <table>
     <thead><tr>
      <th class="th-left">#</th><th class="th-left">Hráč</th><th>Tým</th><th>${label}</th>
     </tr></thead>
     <tbody>
      ${sorted.map((p,i)=>`
       <tr class="${i===0?'rank-1':i===1?'rank-2':'rank-3'}">
        <td class="td-rank td-left">${i===0?'🥇':i===1?'🥈':'🥉'}</td>
        <td class="td-name td-left"><a class="player-link" href="${profileUrl(p)}">${p.name}</a></td>
        <td><div class="team-cell">${logoImg(p.team)}<span class="team-badge">${p.team||'—'}</span></div></td>
        <td class="td-highlight">${p[field]}</td>
       </tr>`).join('')}
     </tbody>
    </table>
   </div>`
 }

 document.getElementById('recordsContent').innerHTML=`
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;">
   <div>
    <div class="section-title" style="margin-bottom:16px;">📊 Kariérní rekordy</div>
    ${top3(players,'points','Kanadské body','🏅')}
    ${top3(players,'goals','Góly','⚽')}
    ${top3(players,'assists','Asistence','🎯')}
    ${top3(players,'ppg','PP góly','⚡')}

   </div>

    ${top3(pg,'max_goals','Góly v zápase','⚽')}
    ${top3(pg,'max_assists','Asistence v zápase','🎯')}
    ${top3(pg,'max_points','Body v zápase','🏅')}
    ${top3(pg,'max_hits','Hity v zápase','💪')}
    ${top3(pg,'max_pim','TM v zápase','🟥')}

    <div class="legend-item"><span class="legend-key">G</span><span>Góly</span></div>

// =====================================================
// STATISTIKY TIPOVÁNÍ
// =====================================================
async function loadBetting(){
 const [bets,players]=await Promise.all([fetchAll('bets'),fetchAll('players')])
 if(!bets.length){
  document.getElementById('bettingContent').innerHTML='<div class="empty">Žádné sázky.</div>'
  return
 }
 const map={}
 players.forEach(p=>{ map[p.id]={name:p.name,credit:p.credit,total_bet:0,total_won:0,bets:0,won:0,lost:0,pending:0} })
 bets.forEach(b=>{
  if(!map[b.player_id]) return
  const p=map[b.player_id]
  p.bets++
  p.total_bet+=Number(b.amount)||0
  if(b.status==='won'){p.won++;p.total_won+=Number(b.potential_win)||0}
  else if(b.status==='lost') p.lost++
  else p.pending++
 })
 const stats=Object.values(map).filter(p=>p.bets>0)
  .map(p=>({...p,profit:p.total_won-p.total_bet,winrate:p.bets>0?((p.won/p.bets)*100).toFixed(1):0}))
  .sort((a,b)=>b.profit-a.profit)

 document.getElementById('bettingContent').innerHTML=`
  <div class="table-wrap">
   <table>
    <thead><tr>
     <th class="th-left">#</th><th class="th-left">Hráč</th><th>Kredit</th>
     <th>Sázek</th><th>Výher</th><th>Proher</th><th>Čekající</th>
     <th>Vsazeno</th><th>Vyhráno</th><th>Zisk/Ztráta</th><th>Win%</th>
    </tr></thead>
    <tbody>
     ${stats.map((p,i)=>`
      <tr class="${i===0?'rank-1':i===1?'rank-2':''}">
       <td class="td-rank td-left">${i+1}</td>
       <td class="td-name td-left">${p.name}</td>
       <td style="font-weight:700;">💰 ${Math.round(p.credit)} Kč</td>
       <td>${p.bets}</td>
       <td style="color:#16a34a;font-weight:700;">${p.won}</td>
       <td style="color:#dc2626;font-weight:700;">${p.lost}</td>
       <td style="color:#888;">${p.pending}</td>
       <td>${Math.round(p.total_bet)} Kč</td>
       <td>${Math.round(p.total_won)} Kč</td>
       <td class="td-highlight" style="color:${p.profit>=0?'#16a34a':'#dc2626'};font-weight:800;">${p.profit>=0?'+':''}${Math.round(p.profit)} Kč</td>
       <td style="font-weight:700;">${p.winrate}%</td>
      </tr>`).join('')}
    </tbody>
   </table>
  </div>
  <div class="legend" style="margin-top:16px;">
   <div class="legend-title">Legenda — Statistiky tipování</div>
   <div class="legend-grid">
    <div class="legend-item"><span class="legend-key">Kredit</span><span>Aktuální zůstatek</span></div>
    <div class="legend-item"><span class="legend-key">Vsazeno</span><span>Celková vsazená částka</span></div>
    <div class="legend-item"><span class="legend-key">Vyhráno</span><span>Celkové výhry</span></div>
    <div class="legend-item"><span class="legend-key">Zisk/Ztráta</span><span>Vyhráno minus vsazeno</span></div>
    <div class="legend-item"><span class="legend-key">Win%</span><span>Procento úspěšných sázek</span></div>
   </div>
  </div>`
}

init()
</script>
