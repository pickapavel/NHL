<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Statistiky zápasu</title>

<style>

*{box-sizing:border-box}

body{
    font-family:Arial;
    background:#f2f2f2;
    margin:0;
}

.wrapper{
    max-width:1200px;
    margin:auto;
    padding:20px;
    background:white;
}

.controls{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-bottom:20px;
}

.controls > *{
    flex:1;
    min-width:160px;
    padding:10px;
    font-size:16px;
}

.tableWrap{overflow-x:auto;}

table{
    border-collapse:collapse;
    width:100%;
    min-width:650px;
}

th,td{
    border:1px solid #999;
    padding:8px;
    text-align:left;
}

th{
    background:black;
    color:#ffff00;
    font-weight:bold;
}

.deleteBtn{
    background:#d9534f;
    color:white;
    border:none;
    padding:6px 10px;
    cursor:pointer;
}

.filterBar{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:10px;
}

@media (max-width:700px){
    .controls > *,
    .filterBar > *{flex:100%;}
}

</style>
</head>

<body>

<div class="wrapper">

<h1>Statistiky zápasu</h1>

<div class="controls">

<input type="file" id="fileInput" accept=".txt">

<select id="season">
<option value="Sezóna 1">Sezóna 1</option>
<option value="Sezóna 2" selected>Sezóna 2</option>
<option value="Sezóna 3">Sezóna 3</option>
<option value="Sezóna 4">Sezóna 4</option>
<option value="Sezóna 5">Sezóna 5</option>
</select>

<select id="category">
<option value="" selected disabled>Kategorie</option>

<option>Exhibice</option>

<option>Extraliga - základní část</option>
<option>Extraliga - předkolo</option>
<option>Extraliga - čtvrtfinále</option>
<option>Extraliga - semifinále</option>
<option>Extraliga - finále</option>

<option>OH - základní část</option>
<option>OH - Play OFF - předkolo</option>
<option>OH - čtvrtfinále</option>
<option>OH - semifinále</option>
<option>OH - finále</option>
<option>OH - o 3. místo</option>
</select>

<select id="homeTeam">
<option value="" selected disabled>Domácí tým</option>
</select>

<select id="awayTeam">
<option value="" selected disabled>Hostující tým</option>
</select>

<button onclick="saveMatch()">Uložit zápas</button>

</div>

<h2>Historie zápasů</h2>

<div class="filterBar">

<select id="filterCategory">
<option value="">Všechny kategorie</option>
</select>

<select id="filterTeam">
<option value="">Všechny týmy</option>
</select>

<select id="filterResult">
<option value="">Všechny výsledky</option>
<option value="normal">Základní hrací doba</option>
<option value="ot">Prodloužení (OT)</option>
<option value="sn">Samostatné nájezdy (SN)</option>
</select>

<button onclick="applyFilter()">Filtrovat</button>
<button onclick="resetFilter()">Zobrazit vše</button>

</div>

<div class="tableWrap">
<table id="history">
<thead>
<tr>
<th>Datum</th>
<th>Sezóna</th>
<th>Kategorie</th>
<th>Domácí</th>
<th>Hosté</th>
<th>Skóre</th>
<th>Akce</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, query, orderBy } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD0jDnVNHZAs83g6FGwQT_nOpOCyT4NTNU",
  authDomain: "statistiky-6310a.firebaseapp.com",
  projectId: "statistiky-6310a",
  storageBucket: "statistiky-6310a.appspot.com",
  messagingSenderId: "1023222901562",
  appId: "1:1023222901562:web:522ee763e27aa08a8b7e03"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let loadedLines=[];
let allMatches=[];

const clubTeams=[
"HC Sparta Praha",
"HC Bílí Tygři Liberec",
"HC Dynamo Pardubice",
"HC Chemopetrol Litvínov",
"HC Geus Okna Kladno",
"HC Motor České Budějovice",
"HC Energie Karlovy Vary",
"HC Oceláři Třinec"
];

const nationalTeams=[
"Česká Republika",
"Rusko",
"Finsko",
"Švédsko",
"Kanada",
"Itálie",
"Francie",
"Kazachstán",
"Japonsko",
"Velká Británie",
"Polsko",
"USA"
];

/* ===== NAČTENÍ TXT ===== */

document.getElementById("fileInput").addEventListener("change",function(e){

    const file=e.target.files[0];
    if(!file) return;

    const reader=new FileReader();

    reader.onload=function(ev){

        loadedLines = ev.target.result
            .split(/\r?\n/)
            .map(l=>l.trim())
            .filter(l=>l!== "");

        while(loadedLines.length < 21){
            loadedLines.push("0");
        }
    };

    reader.readAsText(file,"utf-8");
});

/* ===== TÝMY PODLE KATEGORIE ===== */

document.getElementById("category").addEventListener("change",fillTeamSelects);
document.getElementById("filterCategory").addEventListener("change",updateFilterTeams);

function fillTeamSelects(){

    const cat=document.getElementById("category").value;
    const isOH = cat.startsWith("OH");

    const list = isOH ? nationalTeams : clubTeams;

    const home=document.getElementById("homeTeam");
    const away=document.getElementById("awayTeam");

    home.innerHTML='<option disabled selected>Domácí tým</option>';
    away.innerHTML='<option disabled selected>Hostující tým</option>';

    list.forEach(t=>{
        home.innerHTML+=`<option value="${t} (P)">${t} (P)</option>`;
        home.innerHTML+=`<option value="${t} (K)">${t} (K)</option>`;
        away.innerHTML+=`<option value="${t} (P)">${t} (P)</option>`;
        away.innerHTML+=`<option value="${t} (K)">${t} (K)</option>`;
    });
}

function updateFilterTeams(){

    const fc=document.getElementById("filterCategory").value;
    const teamSel=document.getElementById("filterTeam");

    teamSel.innerHTML='<option value="">Všechny týmy</option>';

    if(!fc){
        const set=new Set();
        allMatches.forEach(m=>{
            set.add(m.homeTeam);
            set.add(m.awayTeam);
        });
        set.forEach(t=>{
            teamSel.innerHTML+=`<option value="${t}">${t}</option>`;
        });
        return;
    }

    const isOH = fc.startsWith("OH");
    const list = isOH ? nationalTeams : clubTeams;

    list.forEach(t=>{
        teamSel.innerHTML+=`<option value="${t} (P)">${t} (P)</option>`;
        teamSel.innerHTML+=`<option value="${t} (K)">${t} (K)</option>`;
    });
}

/* ===== SCORE ===== */

function calculateScore(stats){

    let awayGoals =
        Number(stats[6])+Number(stats[7])+Number(stats[8]);

    let homeGoals =
        Number(stats[16])+Number(stats[17])+Number(stats[18]);

    if(stats[9]==="11") awayGoals++;
    if(stats[19]==="11") homeGoals++;

    let suffix="";
    let type="normal";

    if(stats[20]==="1"){
        homeGoals++;
        suffix=" SN";
        type="sn";
    }
    else if(stats[20]==="2"){
        awayGoals++;
        suffix=" SN";
        type="sn";
    }
    else if(
        (stats[9]==="11" || stats[19]==="11") &&
        Math.abs(homeGoals-awayGoals)===1
    ){
        suffix=" OT";
        type="ot";
    }

    return { text: homeGoals+" : "+awayGoals+suffix, type };
}

/* ===== LOAD ===== */

window.addEventListener("load", loadMatches);

async function loadMatches(){

    allMatches=[];
    const q=query(collection(db,"zapasy"),orderBy("created","desc"));
    const snapshot=await getDocs(q);

    snapshot.forEach(docSnap=>{
        const data=docSnap.data();
        if(!data.season) data.season="Sezóna 1";
        allMatches.push({id:docSnap.id,...data});
    });

    fillFilterLists();
    renderMatches();
}

/* ===== DELETE ===== */

window.deleteMatch = async function(id){
    if(!confirm("Opravdu smazat zápas?")) return;
    await deleteDoc(doc(db,"zapasy",id));
    loadMatches();
};

/* ===== FILTRY ===== */

function fillFilterLists(){

    const catSet=new Set();

    allMatches.forEach(m=>{
        catSet.add(m.category);
    });

    const catSel=document.getElementById("filterCategory");

    catSel.innerHTML='<option value="">Všechny kategorie</option>';

    catSet.forEach(c=>{
        catSel.innerHTML+=`<option value="${c}">${c}</option>`;
    });

    updateFilterTeams();
}

window.applyFilter=function(){
    renderMatches(filterCategory.value,filterTeam.value,filterResult.value);
}

window.resetFilter=function(){
    filterCategory.value="";
    filterTeam.value="";
    filterResult.value="";
    updateFilterTeams();
    renderMatches();
}

/* ===== RENDER ===== */

function renderMatches(fc="",ft="",fr=""){

    const tbody=document.querySelector("#history tbody");
    tbody.innerHTML="";

    allMatches.forEach(m=>{

        const score=calculateScore(m.stats);

        if(fc && m.category!==fc) return;
        if(ft && m.homeTeam!==ft && m.awayTeam!==ft) return;
        if(fr && score.type!==fr) return;

        const tr=document.createElement("tr");

        tr.innerHTML=`
        <td>${new Date(m.created).toLocaleDateString()}</td>
        <td>${m.season}</td>
        <td>${m.category}</td>
        <td>${m.homeTeam}</td>
        <td>${m.awayTeam}</td>
        <td>${score.text}</td>
        <td><button class="deleteBtn" onclick="deleteMatch('${m.id}')">Smazat</button></td>
        `;

        tbody.appendChild(tr);
    });
}

/* ===== SAVE ===== */

window.saveMatch = async function(){

    if(!category.value || !homeTeam.value || !awayTeam.value){
        alert("Vyber kategorii a oba týmy.");
        return;
    }

    await addDoc(collection(db,"zapasy"),{
        season:document.getElementById("season").value,
        category:category.value,
        homeTeam:homeTeam.value,
        awayTeam:awayTeam.value,
        stats:loadedLines,
        created:Date.now()
    });

    loadMatches();
}

</script>

</body>
</html>
