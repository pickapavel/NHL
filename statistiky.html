<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Statistiky zápasu</title>

<style>

*{box-sizing:border-box}

body{
    font-family:Arial;
    background:#f2f2f2;
    margin:0;
}

.wrapper{
    max-width:1200px;
    margin:auto;
    padding:20px;
    background:white;
}

.controls{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-bottom:20px;
}

.controls > *{
    flex:1;
    min-width:160px;
    padding:10px;
    font-size:16px;
}

.tableWrap{overflow-x:auto;}

table{
    border-collapse:collapse;
    width:100%;
    min-width:650px;
}

th,td{
    border:1px solid #999;
    padding:8px;
    text-align:left;
}

th{
    background:black;
    color:#ffff00;
    font-weight:bold;
}

.deleteBtn{
    background:#d9534f;
    color:white;
    border:none;
    padding:6px 10px;
    cursor:pointer;
}

.editBtn{
    background:#0275d8;
    color:white;
    border:none;
    padding:6px 10px;
    cursor:pointer;
    margin-right:5px;
}

.activeMatch{
    background:#d3d3d3 !important;
}

.filterBar{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:10px;
}

@media (max-width:700px){
    .controls > *,
    .filterBar > *{flex:100%;}
}

</style>
</head>

<body>

<div class="wrapper">

<h1>Statistiky zápasu</h1>

<div class="controls">

<input type="file" id="fileInput" accept=".txt">

<select id="category">
<option value="" selected disabled>Kategorie</option>

<option>Exhibice</option>

<option>Extraliga - základní část</option>
<option>Extraliga - předkolo</option>
<option>Extraliga - čtvrtfinále</option>
<option>Extraliga - semifinále</option>
<option>Extraliga - finále</option>
<option>Extraliga - Play off</option>

<option>OH - základní část</option>
<option>OH - Play OFF - předkolo</option>
<option>OH - čtvrtfinále</option>
<option>OH - semifinále</option>
<option>OH - finále</option>
<option>OH - o 3. místo</option>

</select>

<select id="homeTeam">
<option value="" selected disabled>Domácí tým</option>
</select>

<select id="awayTeam">
<option value="" selected disabled>Hostující tým</option>
</select>

<button onclick="saveMatch()">Uložit zápas</button>

</div>

<h2>Historie zápasů</h2>

<div class="filterBar">

<select id="filterCategory">
<option value="">Všechny kategorie</option>
</select>

<select id="filterTeam">
<option value="">Všechny týmy</option>
</select>

<select id="filterResult">
<option value="">Všechny výsledky</option>
<option value="normal">Základní hrací doba</option>
<option value="ot">Prodloužení (OT)</option>
<option value="sn">Samostatné nájezdy (SN)</option>
</select>

<button onclick="applyFilter()">Filtrovat</button>
<button onclick="resetFilter()">Zobrazit vše</button>

</div>

<div class="tableWrap">
<table id="history">
<thead>
<tr>
<th>Datum</th>
<th>Kategorie</th>
<th>Domácí</th>
<th>Hosté</th>
<th>Skóre</th>
<th>Akce</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, query, orderBy, updateDoc } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD0jDnVNHZAs83g6FGwQT_nOpOCyT4NTNU",
  authDomain: "statistiky-6310a.firebaseapp.com",
  projectId: "statistiky-6310a",
  storageBucket: "statistiky-6310a.appspot.com",
  messagingSenderId: "1023222901562",
  appId: "1:1023222901562:web:522ee763e27aa08a8b7e03"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let loadedLines=[];
let allMatches=[];
let activeFilterCategory="";
let activeFilterResult="";
let activeFilterTeam="";

/* ================= SCORE ================= */

function calculateScore(stats){

    let awayGoals =
        Number(stats[6])+Number(stats[7])+Number(stats[8]);

    let homeGoals =
        Number(stats[16])+Number(stats[17])+Number(stats[18]);

    if(stats[9]==="11") awayGoals++;
    if(stats[19]==="11") homeGoals++;

    let suffix="";

    if(stats[20]==="1"){
        homeGoals++;
        suffix=" SN";
    }
    else if(stats[20]==="2"){
        awayGoals++;
        suffix=" SN";
    }
    else if(
        (stats[9]==="11" || stats[19]==="11") &&
        Math.abs(homeGoals-awayGoals)===1
    ){
        suffix=" OT";
    }

    return {
        text: homeGoals+" : "+awayGoals+suffix,
        type: suffix===" SN" ? "sn" : suffix===" OT" ? "ot" : "normal"
    };
}

/* ================= FIREBASE ================= */

window.addEventListener("load", loadMatches);

async function loadMatches(){

    allMatches=[];

    const q=query(collection(db,"zapasy"),orderBy("created","desc"));
    const snapshot=await getDocs(q);

    snapshot.forEach(docSnap=>{
        allMatches.push({id:docSnap.id,...docSnap.data()});
    });

    fillFilters();
    renderMatches();
}

/* ================= FILTER LISTS ================= */

function fillFilters(){

    const catSet=new Set();
    const teamSet=new Set();

    allMatches.forEach(m=>{
        catSet.add(m.category);
        teamSet.add(m.homeTeam);
        teamSet.add(m.awayTeam);
    });

    const catSelect=document.getElementById("filterCategory");
    catSelect.innerHTML='<option value="">Všechny kategorie</option>';
    catSet.forEach(c=>{
        catSelect.innerHTML+=`<option value="${c}">${c}</option>`;
    });

    const teamSelect=document.getElementById("filterTeam");
    teamSelect.innerHTML='<option value="">Všechny týmy</option>';
    teamSet.forEach(t=>{
        teamSelect.innerHTML+=`<option value="${t}">${t}</option>`;
    });
}

/* ================= FILTER ================= */

window.applyFilter=function(){
    activeFilterCategory=document.getElementById("filterCategory").value;
    activeFilterResult=document.getElementById("filterResult").value;
    activeFilterTeam=document.getElementById("filterTeam").value;
    renderMatches();
}

window.resetFilter=function(){
    activeFilterCategory="";
    activeFilterResult="";
    activeFilterTeam="";
    filterCategory.value="";
    filterResult.value="";
    filterTeam.value="";
    renderMatches();
}

/* ================= RENDER ================= */

function renderMatches(){

    const tbody=document.querySelector("#history tbody");
    tbody.innerHTML="";

    allMatches.forEach(m=>{

        if(activeFilterCategory && m.category!==activeFilterCategory) return;

        if(activeFilterTeam &&
            m.homeTeam!==activeFilterTeam &&
            m.awayTeam!==activeFilterTeam) return;

        const score=calculateScore(m.stats);

        if(activeFilterResult && score.type!==activeFilterResult) return;

        const tr=document.createElement("tr");

        tr.innerHTML=`
        <td>${new Date(m.created).toLocaleDateString()}</td>
        <td>${m.category}</td>
        <td>${m.homeTeam}</td>
        <td>${m.awayTeam}</td>
        <td>${score.text}</td>
        <td>
            <button class="editBtn" onclick="openCategorySelect('${m.id}')">Změnit</button>
            <button class="deleteBtn" onclick="deleteMatch('${m.id}')">Smazat</button>
        </td>
        `;

        tbody.appendChild(tr);
    });
}

/* ================= CHANGE CATEGORY ================= */

window.openCategorySelect = async function(id){

    const categories=[
        "Exhibice",
        "Extraliga - základní část",
        "Extraliga - předkolo",
        "Extraliga - čtvrtfinále",
        "Extraliga - semifinále",
        "Extraliga - finále",
        "Extraliga - Play off",
        "OH - základní část",
        "OH - Play OFF - předkolo",
        "OH - čtvrtfinále",
        "OH - semifinále",
        "OH - finále",
        "OH - o 3. místo"
    ];

    let html="Vyber novou kategorii:\n\n";
    categories.forEach((c,i)=>html+=(i+1)+": "+c+"\n");

    const choice=prompt(html);
    if(!choice) return;

    const index=parseInt(choice)-1;
    if(index<0 || index>=categories.length) return;

    await updateDoc(doc(db,"zapasy",id),{
        category:categories[index]
    });

    loadMatches();
}

/* ================= SAVE / DELETE ================= */

window.saveMatch = async function(){

    if(!category.value || !homeTeam.value || !awayTeam.value){
        alert("Vyber kategorii a oba týmy.");
        return;
    }

    if(loadedLines.length<20){
        alert("Nahraj zapas.txt");
        return;
    }

    await addDoc(collection(db,"zapasy"),{
        category:category.value,
        homeTeam:homeTeam.value,
        awayTeam:awayTeam.value,
        stats:loadedLines,
        created:Date.now()
    });

    loadMatches();
}

window.deleteMatch = async function(id){

    const password=prompt("Zadej heslo:");
    if(password!=="Lokomotiva") return;

    await deleteDoc(doc(db,"zapasy",id));
    loadMatches();
}

</script>

</body>
</html>
