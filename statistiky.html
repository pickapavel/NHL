<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Statistiky zápasu</title>

<style>

*{box-sizing:border-box}

body{
    font-family:Arial;
    background:#f2f2f2;
    margin:0;
}

.wrapper{
    max-width:1200px;
    margin:auto;
    padding:20px;
    background:white;
}

.controls{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-bottom:20px;
}

.controls > *{
    flex:1;
    min-width:160px;
    padding:10px;
    font-size:16px;
}

.tableWrap{overflow-x:auto;}

table{
    border-collapse:collapse;
    width:100%;
    min-width:650px;
}

th,td{
    border:1px solid #999;
    padding:8px;
    text-align:left;
}

th{
    background:black;
    color:#ffff00;
    font-weight:bold;
}

.deleteBtn{
    background:#d9534f;
    color:white;
    border:none;
    padding:6px 10px;
    cursor:pointer;
}

.activeMatch{
    background:#d3d3d3 !important;
}

@media (max-width:700px){
    .controls > *{flex:100%;}
}

</style>
</head>

<body>

<div class="wrapper">

<h1>Statistiky zápasu</h1>

<div class="controls">

<input type="file" id="fileInput" accept=".txt">

<select id="category">
<option value="" selected disabled>Kategorie</option>

<option>Exhibice</option>

<option>Extraliga - základní část</option>
<option>Extraliga - předkolo</option>
<option>Extraliga - čtvrtfinále</option>
<option>Extraliga - semifinále</option>
<option>Extraliga - finále</option>
<option>Extraliga - Play off</option>

<option>OH - základní část</option>
<option>OH - Play OFF - předkolo</option>
<option>OH - čtvrtfinále</option>
<option>OH - semifinále</option>
<option>OH - finále</option>
<option>OH - o 3. místo</option>

</select>

<select id="homeTeam">
<option value="" selected disabled>Domácí tým</option>
</select>

<select id="awayTeam">
<option value="" selected disabled>Hostující tým</option>
</select>

<button onclick="saveMatch()">Uložit zápas</button>

</div>

<h2>Historie zápasů</h2>

<div class="tableWrap">
<table id="history">
<thead>
<tr>
<th>Datum</th>
<th>Kategorie</th>
<th>Domácí</th>
<th>Hosté</th>
<th>Skóre</th>
<th>Smazat</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, query, orderBy } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD0jDnVNHZAs83g6FGwQT_nOpOCyT4NTNU",
  authDomain: "statistiky-6310a.firebaseapp.com",
  projectId: "statistiky-6310a",
  storageBucket: "statistiky-6310a.appspot.com",
  messagingSenderId: "1023222901562",
  appId: "1:1023222901562:web:522ee763e27aa08a8b7e03"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let loadedLines=[];
let allMatches=[];

/* ================= TEAM LIST ================= */

const extraligaTeams = [
"HC Sparta Praha (P)","HC Sparta Praha (K)",
"HC Bílí Tygři Liberec (P)","HC Bílí Tygři Liberec (K)",
"HC Dynamo Pardubice (P)","HC Dynamo Pardubice (K)",
"HC Chemopetrol Litvínov (P)","HC Chemopetrol Litvínov (K)",
"HC Geus Okna Kladno (P)","HC Geus Okna Kladno (K)",
"HC Motor České Budějovice (P)","HC Motor České Budějovice (K)",
"HC Energie Karlovy Vary (P)","HC Energie Karlovy Vary (K)",
"HC Oceláři Třinec (P)","HC Oceláři Třinec (K)"
];

const ohTeamsBase = [
"Česká Republika",
"Rusko",
"Finsko",
"Švédsko",
"Kanada",
"Itálie",
"Francie",
"Kazachstán",
"Japonsko",
"Velká Británie",
"Polsko",
"USA"
];

const ohTeams=[];
ohTeamsBase.forEach(t=>{
    ohTeams.push(t+" (P)");
    ohTeams.push(t+" (K)");
});

function fillTeams(){

    const cat=document.getElementById("category").value;
    const home=document.getElementById("homeTeam");
    const away=document.getElementById("awayTeam");

    home.innerHTML='<option disabled selected>Domácí tým</option>';
    away.innerHTML='<option disabled selected>Hostující tým</option>';

    const list = cat.startsWith("OH") ? ohTeams : extraligaTeams;

    list.forEach(t=>{
        const bold = t.endsWith("(P)") ? "font-weight:bold;" : "";
        home.innerHTML+=`<option value="${t}" style="${bold}">${t}</option>`;
        away.innerHTML+=`<option value="${t}" style="${bold}">${t}</option>`;
    });
}

document.getElementById("category").addEventListener("change", fillTeams);

/* ================= TXT LOAD ================= */

document.getElementById("fileInput").addEventListener("change", e=>{
    const reader=new FileReader();
    reader.onload=ev=>{
        setTimeout(()=>{
            loadedLines = ev.target.result
                .split(/\r?\n/)
                .map(l=>l.trim())
                .filter(l=>l!=="");
        },0);
    };
    reader.readAsText(e.target.files[0]);
});

/* ================= SCORE ================= */

function calculateScore(stats){

    let awayGoals =
        Number(stats[6])+Number(stats[7])+Number(stats[8]);

    let homeGoals =
        Number(stats[16])+Number(stats[17])+Number(stats[18]);

    if(stats[9]==="11") awayGoals++;
    if(stats[19]==="11") homeGoals++;

    let suffix="";

    if(stats[20]==="1"){
        homeGoals++;
        suffix=" SN";
    }
    else if(stats[20]==="2"){
        awayGoals++;
        suffix=" SN";
    }
    else if(
        (stats[9]==="11" || stats[19]==="11") &&
        Math.abs(homeGoals-awayGoals)===1
    ){
        suffix=" OT";
    }

    return homeGoals+" : "+awayGoals+suffix;
}

/* ================= FIREBASE ================= */

window.addEventListener("load", loadMatches);

async function loadMatches(){

    allMatches=[];

    const q=query(collection(db,"zapasy"),orderBy("created","desc"));
    const snapshot=await getDocs(q);

    snapshot.forEach(docSnap=>{
        allMatches.push({id:docSnap.id,...docSnap.data()});
    });

    requestAnimationFrame(renderMatches);
}

/* ================= FAST RENDER ================= */

function renderMatches(){

    const tbody=document.querySelector("#history tbody");
    tbody.innerHTML="";

    let i=0;

    function drawChunk(){

        for(let c=0;c<10 && i<allMatches.length;c++,i++){

            const m=allMatches[i];

            const tr=document.createElement("tr");

            tr.innerHTML=`
            <td>${new Date(m.created).toLocaleDateString()}</td>
            <td>${m.category}</td>
            <td>${m.homeTeam}</td>
            <td>${m.awayTeam}</td>
            <td>${calculateScore(m.stats)}</td>
            <td><button class="deleteBtn" onclick="deleteMatch('${m.id}')">Smazat</button></td>
            `;

            tbody.appendChild(tr);
        }

        if(i<allMatches.length){
            requestAnimationFrame(drawChunk);
        }
    }

    drawChunk();
}

/* ================= SAVE / DELETE ================= */

async function saveMatch(){

    if(!category.value || !homeTeam.value || !awayTeam.value){
        alert("Vyber kategorii a oba týmy.");
        return;
    }

    if(loadedLines.length<20){
        alert("Nahraj zapas.txt");
        return;
    }

    await addDoc(collection(db,"zapasy"),{
        category:category.value,
        homeTeam:homeTeam.value,
        awayTeam:awayTeam.value,
        stats:loadedLines,
        created:Date.now()
    });

    loadMatches();
}

async function deleteMatch(id){

    const password=prompt("Zadej heslo:");
    if(password!=="Lokomotiva") return;

    await deleteDoc(doc(db,"zapasy",id));
    loadMatches();
}

window.saveMatch = saveMatch;
window.deleteMatch = deleteMatch;

</script>

</body>
</html>
