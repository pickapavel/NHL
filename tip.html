<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Kalkulačka sázek</title>

  <style>

    *{
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      margin:0;
      background:#111827;
      color:white;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      padding:20px;
    }

    .container{
      width:100%;
      max-width:900px;
      background:#1f2937;
      padding:30px;
      border-radius:18px;
    }

    h1{
      text-align:center;
      margin-bottom:30px;
    }

    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:20px;
    }

    .box{
      background:#374151;
      padding:20px;
      border-radius:12px;
    }

    label{
      display:block;
      margin-bottom:8px;
      color:#d1d5db;
    }

    input{
      width:100%;
      padding:12px;
      border:none;
      border-radius:10px;
      margin-bottom:18px;
      font-size:16px;
    }

    .result{
      margin-top:15px;
      background:#4b5563;
      padding:15px;
      border-radius:10px;
    }

    .green{
      color:#22c55e;
      font-weight:bold;
    }

    .red{
      color:#ef4444;
      font-weight:bold;
    }

    .hedge{
      margin-top:30px;
      background:#374151;
      padding:25px;
      border-radius:12px;
    }

    @media(max-width:700px){

      .grid{
        grid-template-columns:1fr;
      }

    }

  </style>

</head>
<body>

  <div class="container">

    <h1>Kalkulačka sázek</h1>

    <div class="grid">

      <!-- TEAM 1 -->

      <div class="box">

        <h2>Tým 1</h2>

        <label>Název týmu</label>
        <input type="text" id="team1Name" placeholder="Např. Sparta">

        <label>Kurz</label>
        <input type="number" id="team1Odds" step="0.01" placeholder="1.10">

        <label>Vsazená částka</label>
        <input type="number" id="team1Stake" placeholder="1000">

        <div class="result">

          <p>
            Možná výhra:
            <strong id="team1Win">0 Kč</strong>
          </p>

          <p>
            Čistý zisk:
            <span class="green" id="team1Profit">0 Kč</span>
          </p>

        </div>

      </div>

      <!-- TEAM 2 -->

      <div class="box">

        <h2>Tým 2 (LIVE záchrana)</h2>

        <label>Název týmu</label>
        <input type="text" id="team2Name" placeholder="Např. Slavia">

        <label>Aktuální LIVE kurz</label>
        <input type="number" id="liveOdds" step="0.01" placeholder="3.50">

        <div class="result">

          <p>
            Potřebná záchranná sázka:
            <strong id="neededBet">0 Kč</strong>
          </p>

          <p>
            Výsledek po dorovnání:
            <span class="green" id="finalResult">0 Kč</span>
          </p>

        </div>

      </div>

    </div>

  </div>

  <script>

    const inputs = document.querySelectorAll("input");

    inputs.forEach(input => {
      input.addEventListener("input", calculate);
    });

    function calculate(){

      // TEAM 1

      const team1Odds =
        parseFloat(document.getElementById("team1Odds").value) || 0;

      const team1Stake =
        parseFloat(document.getElementById("team1Stake").value) || 0;

      const possibleWin =
        team1Stake * team1Odds;

      const possibleProfit =
        possibleWin - team1Stake;

      document.getElementById("team1Win").innerText =
        possibleWin.toFixed(2) + " Kč";

      document.getElementById("team1Profit").innerText =
        possibleProfit.toFixed(2) + " Kč";

      // LIVE KURZ

      const liveOdds =
        parseFloat(document.getElementById("liveOdds").value) || 0;

      let neededBet = 0;

      // hlavní správný výpočet
      if(liveOdds > 1){

        neededBet =
          team1Stake / (liveOdds - 1);

      }

      // kolik vrátí live sázka
      const liveReturn =
        neededBet * liveOdds;

      // čistý výsledek
      const finalProfit =
        liveReturn - neededBet - team1Stake;

      document.getElementById("neededBet").innerText =
        neededBet.toFixed(2) + " Kč";

      const finalResult =
        document.getElementById("finalResult");

      finalResult.innerText =
        finalProfit.toFixed(2) + " Kč";

      if(finalProfit >= 0){

        finalResult.classList.remove("red");
        finalResult.classList.add("green");

      }else{

        finalResult.classList.remove("green");
        finalResult.classList.add("red");

      }

    }

  </script>

</body>
</html>
