<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kalkulačka sázek</title>

  <style>
    *{
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      margin:0;
      background:#111827;
      color:white;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      padding:20px;
    }

    .container{
      width:100%;
      max-width:700px;
      background:#1f2937;
      padding:30px;
      border-radius:18px;
      box-shadow:0 0 25px rgba(0,0,0,0.4);
    }

    h1{
      text-align:center;
      margin-bottom:30px;
    }

    .teams{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:20px;
      margin-bottom:25px;
    }

    .team-box{
      background:#374151;
      padding:20px;
      border-radius:12px;
    }

    .team-box h2{
      margin-top:0;
      margin-bottom:15px;
      font-size:22px;
    }

    label{
      display:block;
      margin-bottom:8px;
      color:#d1d5db;
    }

    input{
      width:100%;
      padding:12px;
      border:none;
      border-radius:10px;
      margin-bottom:15px;
      font-size:16px;
    }

    .stake-box{
      margin-top:10px;
      background:#374151;
      padding:20px;
      border-radius:12px;
    }

    .results{
      margin-top:25px;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:20px;
    }

    .result-card{
      background:#4b5563;
      padding:20px;
      border-radius:12px;
    }

    .result-card h3{
      margin-top:0;
    }

    .profit{
      color:#22c55e;
      font-weight:bold;
    }

    @media(max-width:700px){
      .teams,
      .results{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Kalkulačka sázek</h1>

    <div class="teams">

      <div class="team-box">
        <h2>Tým 1</h2>

        <label>Název týmu</label>
        <input type="text" id="team1Name" placeholder="Např. Sparta">

        <label>Kurz</label>
        <input type="number" id="team1Odds" step="0.01" placeholder="Např. 1.85">
      </div>

      <div class="team-box">
        <h2>Tým 2</h2>

        <label>Název týmu</label>
        <input type="text" id="team2Name" placeholder="Např. Slavia">

        <label>Kurz</label>
        <input type="number" id="team2Odds" step="0.01" placeholder="Např. 2.10">
      </div>

    </div>

    <div class="stake-box">
      <label>Vsazená částka</label>
      <input type="number" id="stake" placeholder="Např. 1000">
    </div>

    <div class="results">

      <div class="result-card">
        <h3 id="resultTeam1">Tým 1</h3>

        <p>Možná výhra: <strong id="team1Win">0 Kč</strong></p>
        <p>Čistý zisk: <span class="profit" id="team1Profit">0 Kč</span></p>
      </div>

      <div class="result-card">
        <h3 id="resultTeam2">Tým 2</h3>

        <p>Možná výhra: <strong id="team2Win">0 Kč</strong></p>
        <p>Čistý zisk: <span class="profit" id="team2Profit">0 Kč</span></p>
      </div>

    </div>
  </div>

  <script>
    const inputs = document.querySelectorAll("input");

    inputs.forEach(input => {
      input.addEventListener("input", calculate);
    });

    function calculate() {
      const team1Name = document.getElementById("team1Name").value || "Tým 1";
      const team2Name = document.getElementById("team2Name").value || "Tým 2";

      const team1Odds = parseFloat(document.getElementById("team1Odds").value) || 0;
      const team2Odds = parseFloat(document.getElementById("team2Odds").value) || 0;

      const stake = parseFloat(document.getElementById("stake").value) || 0;

      // Výpočty
      const team1Win = stake * team1Odds;
      const team2Win = stake * team2Odds;

      const team1Profit = team1Win - stake;
      const team2Profit = team2Win - stake;

      // Zobrazení názvů
      document.getElementById("resultTeam1").innerText = team1Name;
      document.getElementById("resultTeam2").innerText = team2Name;

      // Zobrazení výsledků
      document.getElementById("team1Win").innerText =
        team1Win.toFixed(2) + " Kč";

      document.getElementById("team2Win").innerText =
        team2Win.toFixed(2) + " Kč";

      document.getElementById("team1Profit").innerText =
        team1Profit.toFixed(2) + " Kč";

      document.getElementById("team2Profit").innerText =
        team2Profit.toFixed(2) + " Kč";
    }
  </script>

</body>
</html>
