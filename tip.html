<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kalkulačka sázek</title>

  <style>
    *{
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      margin:0;
      background:#111827;
      color:white;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      padding:20px;
    }

    .container{
      width:100%;
      max-width:1000px;
      background:#1f2937;
      padding:30px;
      border-radius:18px;
      box-shadow:0 0 25px rgba(0,0,0,0.4);
    }

    h1{
      text-align:center;
      margin-bottom:30px;
    }

    .teams{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:20px;
    }

    .team-box{
      background:#374151;
      padding:20px;
      border-radius:12px;
    }

    .team-box h2{
      margin-top:0;
      margin-bottom:20px;
    }

    label{
      display:block;
      margin-bottom:8px;
      color:#d1d5db;
    }

    input{
      width:100%;
      padding:12px;
      border:none;
      border-radius:10px;
      margin-bottom:18px;
      font-size:16px;
    }

    .results{
      margin-top:15px;
      background:#4b5563;
      padding:15px;
      border-radius:10px;
    }

    .results p{
      margin:10px 0;
      font-size:18px;
    }

    .profit{
      color:#22c55e;
      font-weight:bold;
    }

    .loss{
      color:#ef4444;
      font-weight:bold;
    }

    .hedge-box{
      margin-top:30px;
      background:#374151;
      padding:25px;
      border-radius:12px;
    }

    .hedge-title{
      margin-top:0;
      margin-bottom:20px;
    }

    @media(max-width:700px){
      .teams{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>
<body>

  <div class="container">

    <h1>Kalkulačka sázek</h1>

    <div class="teams">

      <!-- Tým 1 -->
      <div class="team-box">

        <h2>Tým 1</h2>

        <label>Název týmu</label>
        <input type="text" id="team1Name" placeholder="Např. Sparta">

        <label>Kurz</label>
        <input type="number" id="team1Odds" step="0.01" placeholder="Např. 1.85">

        <label>Vsazená částka</label>
        <input type="number" id="team1Stake" placeholder="Např. 1000">

        <div class="results">

          <p><strong id="resultTeam1">Tým 1</strong></p>

          <p>
            Možná výhra:
            <strong id="team1Win">0 Kč</strong>
          </p>

          <p>
            Čistý zisk:
            <span class="profit" id="team1Profit">0 Kč</span>
          </p>

        </div>

      </div>

      <!-- Tým 2 -->
      <div class="team-box">

        <h2>Tým 2</h2>

        <label>Název týmu</label>
        <input type="text" id="team2Name" placeholder="Např. Slavia">

        <label>Kurz</label>
        <input type="number" id="team2Odds" step="0.01" placeholder="Např. 2.10">

        <label>Vsazená částka</label>
        <input type="number" id="team2Stake" placeholder="Např. 1000">

        <div class="results">

          <p><strong id="resultTeam2">Tým 2</strong></p>

          <p>
            Možná výhra:
            <strong id="team2Win">0 Kč</strong>
          </p>

          <p>
            Čistý zisk:
            <span class="profit" id="team2Profit">0 Kč</span>
          </p>

        </div>

      </div>

    </div>

    <!-- HEDGE SEKCE -->
    <div class="hedge-box">

      <h2 class="hedge-title">
        Dorovnání sázky (aby ses dostal minimálně na nulu)
      </h2>

      <label>
        Aktuální kurz soupeře
      </label>

      <input
        type="number"
        id="liveOdds"
        step="0.01"
        placeholder="Např. 3.20"
      >

      <div class="results">

        <p>
          Kolik vsadit:
          <strong id="hedgeBet">0 Kč</strong>
        </p>

        <p>
          Výsledek při výhře soupeře:
          <span class="profit" id="hedgeResult">0 Kč</span>
        </p>

      </div>

    </div>

  </div>

  <script>

    const inputs = document.querySelectorAll("input");

    inputs.forEach(input => {
      input.addEventListener("input", calculate);
    });

    function calculate() {

      // =========================
      // TEAM 1
      // =========================

      const team1Name =
        document.getElementById("team1Name").value || "Tým 1";

      const team1Odds =
        parseFloat(document.getElementById("team1Odds").value) || 0;

      const team1Stake =
        parseFloat(document.getElementById("team1Stake").value) || 0;

      const team1Win = team1Stake * team1Odds;

      const team1Profit = team1Win - team1Stake;

      // =========================
      // TEAM 2
      // =========================

      const team2Name =
        document.getElementById("team2Name").value || "Tým 2";

      const team2Odds =
        parseFloat(document.getElementById("team2Odds").value) || 0;

      const team2Stake =
        parseFloat(document.getElementById("team2Stake").value) || 0;

      const team2Win = team2Stake * team2Odds;

      const team2Profit = team2Win - team2Stake;

      // =========================
      // VÝPIS TEAM 1
      // =========================

      document.getElementById("resultTeam1").innerText =
        team1Name;

      document.getElementById("team1Win").innerText =
        team1Win.toFixed(2) + " Kč";

      document.getElementById("team1Profit").innerText =
        team1Profit.toFixed(2) + " Kč";

      // =========================
      // VÝPIS TEAM 2
      // =========================

      document.getElementById("resultTeam2").innerText =
        team2Name;

      document.getElementById("team2Win").innerText =
        team2Win.toFixed(2) + " Kč";

      document.getElementById("team2Profit").innerText =
        team2Profit.toFixed(2) + " Kč";

      // =========================
      // HEDGE / DOROVNÁNÍ
      // =========================

      const liveOdds =
        parseFloat(document.getElementById("liveOdds").value) || 0;

      let hedgeBet = 0;

      // výpočet dorovnávací sázky
      if(liveOdds > 1){

        hedgeBet = team1Win / liveOdds;

      }

      // kolik vrátí soupeř
      const hedgeReturn =
        hedgeBet * liveOdds;

      // čistý výsledek
      const hedgeProfit =
        hedgeReturn - hedgeBet - team1Stake;

      // výpis
      document.getElementById("hedgeBet").innerText =
        hedgeBet.toFixed(2) + " Kč";

      const hedgeResult =
        document.getElementById("hedgeResult");

      hedgeResult.innerText =
        hedgeProfit.toFixed(2) + " Kč";

      // barva podle výsledku
      if(hedgeProfit >= 0){

        hedgeResult.classList.remove("loss");
        hedgeResult.classList.add("profit");

      }else{

        hedgeResult.classList.remove("profit");
        hedgeResult.classList.add("loss");

      }

    }

  </script>

</body>
</html>
