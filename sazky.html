<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Sázky</title>

<style>
body{font-family:Arial;background:#f2f2f2;margin:0;}
.wrapper{max-width:1200px;margin:auto;padding:20px;background:white;}

.block{border:1px solid #ccc;margin-bottom:15px;}
.block-header{background:black;color:yellow;padding:10px;cursor:pointer;}
.block-content{display:none;padding:10px;}

.header-row{
 display:flex;
 font-weight:bold;
 border-bottom:2px solid black;
 padding-bottom:5px;
 margin-bottom:10px;
}

.team-row{
 display:flex;
 align-items:center;
 border-bottom:1px solid #ddd;
 padding:8px 0;
}

.col-name{width:250px;}
.col-rating{width:100px;text-align:center;}
.col-odds{width:100px;text-align:center;font-weight:bold;}
.col-input{width:120px;}
.col-btn{width:100px;}

input{padding:5px;width:80px;}
button{padding:5px 10px;cursor:pointer;}
</style>
</head>

<body>

<div class="wrapper">
<h1>Sázky</h1>
<div id="betsContainer"></div>
</div>

<script type="module">

import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient(
  "https://qaocbodrflsaerxntfui.supabase.co",
  "sb_publishable_eIeO9MihyuQDuNHy60Ubrw_8ZuSKPFU"
)

let teams = []
let player = null

// ===== LOAD =====
async function load(){

 const { data: p } = await supabase
  .from("players")
  .select("*")
  .limit(1)
  .single()

 player = p

 const { data: t } = await supabase
  .from("teams")
  .select("*")

 teams = t

 render()
}

// ===== ODDS (Z rating_form) =====
function calculateOddsAll(){

 // použijeme rating_form přímo
 const strengths = teams.map(t => Number(t.rating_form || 1000))

 const total = strengths.reduce((a,b)=>a+b,0)

 const margin = 1.1
 const oddsMap = {}

 teams.forEach((team, i)=>{

  const prob = strengths[i] / total

  const odds = margin / prob

  oddsMap[team.id] = odds.toFixed(2)
 })

 return oddsMap
}

// ===== RENDER =====
function render(){

 const oddsMap = calculateOddsAll()

 const cont = document.getElementById("betsContainer")
 cont.innerHTML = ""

 cont.innerHTML += `
 <div class="block">
  <div class="block-header" onclick="toggleBlock(this)">
   Vítěz základní části
  </div>

  <div class="block-content" id="winnerBlock">

    <div class="header-row">
      <div class="col-name">Tým</div>
      <div class="col-rating">Forma</div>
      <div class="col-odds">Kurz</div>
      <div class="col-input"></div>
      <div class="col-btn"></div>
    </div>

  </div>
 </div>
 `

 const block = document.getElementById("winnerBlock")

 teams.forEach(team=>{

  const odds = oddsMap[team.id]

  block.innerHTML += `
   <div class="team-row">
     <div class="col-name">${team.name}</div>
     <div class="col-rating">${team.rating_form}</div>
     <div class="col-odds">${odds}</div>

     <div class="col-input">
       <input type="number" id="amount_${team.id}" placeholder="Kč">
     </div>

     <div class="col-btn">
       <button onclick="placeBet('${team.id}', ${odds}, 'winner_regular_season')">
         Vsadit
       </button>
     </div>
   </div>
  `
 })
}

// ===== TOGGLE =====
window.toggleBlock = function(el){
 const content = el.nextElementSibling
 content.style.display =
  content.style.display === "block" ? "none" : "block"
}

// ===== BET =====
window.placeBet = async function(teamId, odds, type){

 const amount = Number(document.getElementById(`amount_${teamId}`).value)

 if(!amount || amount <= 0){
  alert("Zadej částku")
  return
 }

 if(player.credit < amount){
  alert("Nedostatek kreditu")
  return
 }

 const potential = amount * odds

 // odečtení kreditu
 await supabase
  .from("players")
  .update({
   credit: player.credit - amount
  })
  .eq("id", player.id)

 // uložení
 await supabase
  .from("bets_special")
  .insert({
   player_id: player.id,
   type: type,
   target_id: teamId,
   odds: odds,
   amount: amount,
   potential_win: potential,
   status: "pending"
  })

 alert("Vsazeno 👍")

 load()
}

load()

</script>

</body>
</html>
