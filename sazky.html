<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sázky</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}

body{
 font-family:'Inter', sans-serif;
 margin:0;
 background:#f2f2f2;
}

.wrapper{max-width:1200px;margin:auto;padding:15px;background:white;}

h1{margin-bottom:15px}

/* ACCORDION */
.section{margin-bottom:10px;border-radius:10px;overflow:hidden;}

.sectionHeader{
 display:flex;align-items:center;gap:10px;
 background:#0b2a3c;color:white;
 padding:12px 15px;cursor:pointer;font-size:18px;
}

.arrow{transition:0.3s;}
.section.open .arrow{transform:rotate(90deg);}

.blockContent{
 max-height:0;overflow:hidden;
 transition:max-height 0.3s ease;
 background:#f9f9f9;
}

.section.open .blockContent{
 max-height:3000px;
 padding:10px;
}

/* PLAYER */
.playerCard{
 background:#e9ecef;border-radius:10px;
 padding:12px;margin-bottom:15px;
}

.credit{font-weight:600;margin-bottom:10px;}

/* GRID */
.grid{
 display:grid;
 grid-template-columns: 2fr 1fr 1fr 1.2fr 1.2fr 1fr;
 gap:10px;align-items:center;
}

.headerRow{
 font-weight:600;border-bottom:2px solid #aaa;
 padding:8px 0;
}

.row{
 padding:8px 0;border-bottom:1px solid #ccc;
}

.teamBlock{display:flex;align-items:center;gap:10px;}

.logo{
 width:40px;height:40px;object-fit:contain;
 background:white;border-radius:6px;padding:2px;
}

input{width:80px;padding:5px;}

button{
 background:#27ae60;color:white;
 border:none;border-radius:6px;
 padding:6px 10px;cursor:pointer;
 font-weight:600;
}

.locked{font-size:13px;color:#333;}

/* MOBILE */
@media(max-width:768px){
.grid{grid-template-columns:1fr;}
.headerRow{display:none;}
.row{display:flex;flex-direction:column;gap:6px;}
button{width:100%;}
.row div[data-label]::before{
 content: attr(data-label);
 font-weight:600;
 font-size:12px;
 color:#555;
 display:block;
 margin-bottom:2px;
}
}
</style>
</head>

<body>

<div class="wrapper">

<h1>Sázky</h1>

<!-- VÍTĚZ -->
<div class="section" id="sec1">
  <div class="sectionHeader" onclick="toggleSection('sec1')">
    <span class="arrow">▶</span>
    <span>Vítěz základní části</span>
  </div>
  <div class="blockContent" id="section"></div>
</div>

<!-- POSLEDNÍ -->
<div class="section" id="sec2">
  <div class="sectionHeader" onclick="toggleSection('sec2')">
    <span class="arrow">▶</span>
    <span>Poslední celek základní části</span>
  </div>
  <div class="blockContent" id="section_last"></div>
</div>

</div>

<script type="module">

import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient(
 "https://qaocbodrflsaerxntfui.supabase.co",
 "sb_publishable_eIeO9MihyuQDuNHy60Ubrw_8ZuSKPFU"
)

const START_RATING = 1000
const K_FORM = 120

let teams = []
let players = {}
let bets = []
let formRatings = {}

/* ===== STEJNÝ VÝPOČET JAKO RATING ===== */

function getScore(match, teamId){

 const hg = Number(match.home_score)
 const ag = Number(match.away_score)

 let stats = null
 try{ stats = match.stats ? JSON.parse(match.stats) : null }catch(e){}

 const isSN = stats && (stats[20] === "1" || stats[20] === "2")
 const isOT = stats && !isSN && (stats[9] === "11" || stats[19] === "11")

 const isHome = match.home_team === teamId

 const teamGoals = isHome ? hg : ag
 const oppGoals = isHome ? ag : hg

 if(teamGoals > oppGoals){
  return (isSN || isOT) ? 0.75 : 1
 }else{
  return (isSN || isOT) ? 0.25 : 0
 }
}

function calculateFormRatings(matches, teams){

 const ratings = {}
 const formHistory = {}
 const formRatings = {}

 teams.forEach(t=>{
  ratings[t.id] = START_RATING
  formHistory[t.id] = []
  formRatings[t.id] = START_RATING
 })

 matches.forEach(m=>{

  const h = m.home_team
  const a = m.away_team

  const sH = getScore(m, h)
  const sA = getScore(m, a)

  function updateForm(teamId, opponentId, score){

    const current = formRatings[teamId]
    const oppRating = formRatings[opponentId]

    const expected = 1 / (1 + Math.pow(10, (oppRating - current)/400))
    const change = K_FORM * (score - expected)

    formHistory[teamId].push(change)

    if(formHistory[teamId].length > 5){
      formHistory[teamId].shift()
    }

    const newRating =
      START_RATING +
      formHistory[teamId].reduce((a,b)=>a+Math.round(b),0)

    formRatings[teamId] = Math.round(newRating)
  }

  updateForm(h, a, sH)
  updateForm(a, h, sA)

  const rH = ratings[h]
  const rA = ratings[a]

  const cH = K_FORM * (sH - (1 / (1 + Math.pow(10, (rA - rH)/400))))
  const cA = K_FORM * (sA - (1 / (1 + Math.pow(10, (rH - rA)/400))))

  ratings[h] = Math.round(rH + cH)
  ratings[a] = Math.round(rA + cA)
 })

 return formRatings
}

/* ===== LOAD ===== */

async function load(){

 const { data: t } = await supabase
  .from("teams")
  .select("*")
  .eq("competition","extraliga")

 teams = t

 const { data: matches } = await supabase
  .from("matches")
  .select("*")
  .not("home_score","is",null)
  .not("away_score","is",null)
  .order("round", { ascending:true })

 formRatings = calculateFormRatings(matches, teams)

 const { data: p } = await supabase
  .from("players")
  .select("*")
  .in("name",["Kubele","Pici"])

 p.forEach(pl=> players[pl.name]=pl)

 const { data: b } = await supabase
  .from("bets_special")
  .select("*")
  .eq("status","pending")

 bets = b

 render()
}

/* ===== KURZY ===== */

function calculateOdds(){

 const strengths = teams.map(t =>
  Math.pow(Number(formRatings[t.id] || 1000),6)
 )

 const total = strengths.reduce((a,b)=>a+b,0)

 const margin = 2.2
 const map = {}

 teams.forEach((t,i)=>{
  const prob = strengths[i]/total
  map[t.id]=(margin/prob)
 })

 return map
}

function calculateLastOdds(){

 const strengths = teams.map(t =>
  Math.pow(1/(Number(formRatings[t.id] || 1000)),6)
 )

 const total = strengths.reduce((a,b)=>a+b,0)

 const margin = 2.2
 const map = {}

 teams.forEach((t,i)=>{
  const prob = strengths[i]/total
  map[t.id]=(margin/prob)
 })

 return map
}

/* ===== BET ===== */

window.bet = async function(playerName,teamId,odds,type){

 const player = players[playerName]
 const val = Number(document.getElementById(`a_${playerName}_${teamId}_${type}`).value)

 if(!val||val<=0) return alert("Zadej částku")
 if(player.credit<val) return alert("Nedostatek kreditu")

 await supabase.from("players")
  .update({credit:player.credit-val})
  .eq("id",player.id)

 await supabase.from("bets_special").insert({
  player_id:player.id,
  type:type,
  target_id:teamId,
  odds:odds,
  amount:val,
  potential_win:val*odds,
  status:"pending"
 })

 load()
}

/* ===== UI ===== */

function playerBlock(name,oddsMap,type){

 const p = players[name]
 const sorted = [...teams].sort((a,b)=> oddsMap[b.id]-oddsMap[a.id])

 let html=`
 <div class="playerCard">

  <div class="credit">${name} — 💰 ${Math.round(p.credit)} Kč</div>

  <div class="grid headerRow">
    <div>Tým</div>
    <div>Forma</div>
    <div>Kurz</div>
    <div>Vsazená částka</div>
    <div>Výhra</div>
    <div></div>
  </div>
 `

 sorted.forEach(t=>{

  const o = oddsMap[t.id]
  const form = formRatings[t.id] || 1000

  html+=`<div class="grid row">`

  html+=`
    <div class="teamBlock" data-label="Tým">
      <img class="logo" src="./logos/${t.logo}">
      <div>${t.name}</div>
    </div>

    <div data-label="Forma">${form}</div>
    <div data-label="Kurz"><b>${o.toFixed(2)}</b></div>

    <div data-label="Vsadit">
      <input id="a_${name}_${t.id}_${type}" type="number"
        oninput="updateWin('${name}','${t.id}_${type}',${o})">
    </div>

    <div data-label="Výhra" id="w_${name}_${t.id}_${type}">-</div>

    <button onclick="bet('${name}','${t.id}',${o},'${type}')">Vsadit</button>
  `

  html+=`</div>`
 })

 html+=`</div>`

 return html
}

function render(){

 const winOdds = calculateOdds()
 const lastOdds = calculateLastOdds()

 document.getElementById("section").innerHTML =
  playerBlock("Kubele",winOdds,"winner_regular_season") +
  playerBlock("Pici",winOdds,"winner_regular_season")

 document.getElementById("section_last").innerHTML =
  playerBlock("Kubele",lastOdds,"last_regular_season") +
  playerBlock("Pici",lastOdds,"last_regular_season")
}

window.toggleSection = function(id){
 const sec = document.getElementById(id)
 sec.classList.toggle("open")
}

load()

</script>

</body>
</html>
