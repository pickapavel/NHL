<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sázky</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}

body{
 font-family:'Inter', sans-serif;
 margin:0;
 background:#f2f2f2;
}

.wrapper{max-width:1200px;margin:auto;padding:15px;background:white;}

h1{margin-bottom:15px}

.section{margin-bottom:10px;border-radius:10px;overflow:hidden;}

.sectionHeader{
 display:flex;align-items:center;gap:10px;
 background:#0b2a3c;color:white;
 padding:12px 15px;cursor:pointer;font-size:18px;
}

.arrow{transition:0.3s;}
.section.open .arrow{transform:rotate(90deg);}

.blockContent{
 max-height:0;overflow:hidden;
 transition:max-height 0.3s ease;
 background:#f9f9f9;
}

.section.open .blockContent{
 max-height:3000px;
 padding:10px;
}

.playerCard{
 background:#e9ecef;border-radius:10px;
 padding:12px;margin-bottom:15px;
}

.credit{font-weight:600;margin-bottom:10px;}

.grid{
 display:grid;
 grid-template-columns: 2fr 1fr 1fr 1.2fr 1.2fr 1fr;
 gap:10px;align-items:center;
}

.headerRow{
 font-weight:600;border-bottom:2px solid #aaa;
 padding:8px 0;
}

.row{
 padding:8px 0;border-bottom:1px solid #ccc;
}

.teamBlock{display:flex;align-items:center;gap:10px;}

.logo{
 width:40px;height:40px;object-fit:contain;
 background:white;border-radius:6px;padding:2px;
}

input{width:80px;padding:5px;}

button{
 background:#27ae60;color:white;
 border:none;border-radius:6px;
 padding:6px 10px;cursor:pointer;
 font-weight:600;
}

.locked{font-size:13px;color:#333;}

.goalsRow{
 display:grid;
 grid-template-columns: 2fr 3fr 130px 100px;
 gap:10px;
 align-items:center;
 padding:8px 0;
 border-bottom:1px solid #ccc;
}

.goalsHeaderRow{
 font-weight:600;border-bottom:2px solid #aaa;
 padding:8px 0;
 display:grid;
 grid-template-columns: 2fr 3fr 130px 100px;
 gap:10px;
}

.goalBtns{
 display:flex;gap:6px;
}

.goalBtn{
 flex:1;
 background:#1a5276;color:white;
 border:none;border-radius:8px;
 padding:8px 4px;cursor:pointer;
 font-weight:600;font-size:13px;
 display:flex;flex-direction:column;
 align-items:center;gap:2px;
 transition:background 0.2s, box-shadow 0.2s;
}

.goalBtn:hover{background:#21618c;}

.goalBtn.selected{
 background:#f39c12;
 box-shadow:0 0 0 3px #f1c40f;
}

.goalBtnLabel{font-size:14px;font-weight:700;}
.goalBtnOdds{font-size:11px;opacity:0.9;}

.goalInputWrap{
 display:flex;flex-direction:column;gap:3px;
}

.goalInputWrap input{width:100%;}

.goalWin{font-size:13px;color:#1a5276;font-weight:600;}

@media(max-width:768px){

 .grid{
  display:flex;flex-direction:column;gap:8px;
 }

 .headerRow{display:none;}

 .row{
  display:flex;flex-direction:column;gap:8px;
 }

 .row div[data-label]{
  display:flex;justify-content:space-between;align-items:center;gap:10px;
 }

 .row div[data-label]::before{
  content: attr(data-label);
  font-weight:600;font-size:12px;color:#555;
 }

 button{width:100%;}

 .goalsHeaderRow{display:none;}

 .goalsRow{
  display:flex;
  flex-direction:column;
  gap:8px;
  padding:12px 0;
 }

 .goalBtns{
  display:flex;
  flex-direction:row;
  gap:8px;
  width:100%;
 }

 .goalBtn{
  flex:1;
  padding:10px 4px;
  min-width:0;
 }

 .goalInputWrap input{width:100%;}
}
</style>
</head>

<body>

<div class="wrapper">

<h1>Sázky</h1>

<div class="section" id="sec1">
  <div class="sectionHeader" onclick="toggleSection('sec1')">
    <span class="arrow">▶</span>
    <span>Vítěz základní části</span>
  </div>
  <div class="blockContent" id="section"></div>
</div>

<div class="section" id="sec2">
  <div class="sectionHeader" onclick="toggleSection('sec2')">
    <span class="arrow">▶</span>
    <span>Poslední celek základní části</span>
  </div>
  <div class="blockContent" id="section_last"></div>
</div>

<div class="section" id="sec3">
  <div class="sectionHeader" onclick="toggleSection('sec3')">
    <span class="arrow">▶</span>
    <span>Počet vstřelených gólů v základní části</span>
  </div>
  <div class="blockContent" id="section_goals"></div>
</div>

</div>

<script type="module">

import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient(
 "https://qaocbodrflsaerxntfui.supabase.co",
 "sb_publishable_eIeO9MihyuQDuNHy60Ubrw_8ZuSKPFU"
)

const START_RATING = 1000
const K_FORM = 120

const selectedGoal = {}

function getGoalsOdds(teamName){
 const n = teamName.toLowerCase()
 if(n.includes("sparta"))                            return { "25": 3.20, "30": 5.00, "35": 7.50 }
 if(n.includes("litvínov")||n.includes("litvinov")) return { "25": 3.40, "30": 5.40, "35": 8.20 }
 if(n.includes("motor"))                            return { "25": 3.60, "30": 5.80, "35": 9.00 }
 if(n.includes("kladno"))                           return { "25": 3.90, "30": 6.50, "35": 10.5 }
 if(n.includes("vary"))                             return { "25": 4.20, "30": 7.20, "35": 12.0 }
 if(n.includes("liberec"))                          return { "25": 4.60, "30": 8.20, "35": 14.5 }
 if(n.includes("pardubice"))                        return { "25": 5.20, "30": 9.50, "35": 17.0 }
 if(n.includes("třinec")||n.includes("trinec"))     return { "25": 6.00, "30": 11.0, "35": 20.0 }
 return null
}

let teams = []
let players = {}
let bets = []
let formRatings = {}

function getScore(match, teamId){
 const hg = Number(match.home_score)
 const ag = Number(match.away_score)
 let stats = null
 try{ stats = match.stats ? JSON.parse(match.stats) : null }catch(e){}
 const isSN = stats && (stats[20] === "1" || stats[20] === "2")
 const isOT = stats && !isSN && (stats[9] === "11" || stats[19] === "11")
 const isHome = match.home_team === teamId
 const teamGoals = isHome ? hg : ag
 const oppGoals = isHome ? ag : hg
 if(teamGoals > oppGoals) return (isSN || isOT) ? 0.75 : 1
 else return (isSN || isOT) ? 0.25 : 0
}

function calculateFormRatings(matches, teams){
 const ratings = {}
 const formHistory = {}
 const formRatings = {}
 teams.forEach(t=>{
  ratings[t.id] = START_RATING
  formHistory[t.id] = []
  formRatings[t.id] = START_RATING
 })
 matches.forEach(m=>{
  const h = m.home_team
  const a = m.away_team
  const sH = getScore(m, h)
  const sA = getScore(m, a)
  function updateForm(teamId, opponentId, score){
   const current = formRatings[teamId]
   const oppRating = formRatings[opponentId]
   const expected = 1 / (1 + Math.pow(10, (oppRating - current)/400))
   const change = K_FORM * (score - expected)
   formHistory[teamId].push(change)
   if(formHistory[teamId].length > 5) formHistory[teamId].shift()
   formRatings[teamId] = Math.round(START_RATING + formHistory[teamId].reduce((a,b)=>a+Math.round(b),0))
  }
  updateForm(h, a, sH)
  updateForm(a, h, sA)
  const rH = ratings[h], rA = ratings[a]
  ratings[h] = Math.round(rH + K_FORM * (sH - (1 / (1 + Math.pow(10, (rA - rH)/400)))))
  ratings[a] = Math.round(rA + K_FORM * (sA - (1 / (1 + Math.pow(10, (rH - rA)/400)))))
 })
 return formRatings
}

async function load(){
 const { data: t } = await supabase.from("teams").select("*").eq("competition","extraliga")
 teams = t

 const { data: matches } = await supabase.from("matches").select("*")
  .not("home_score","is",null).not("away_score","is",null)
  .order("round", { ascending:true })

 formRatings = calculateFormRatings(matches, teams)

 const { data: p } = await supabase.from("players").select("*").in("name",["Kubele","Pici"])
 p.forEach(pl=> players[pl.name]=pl)

 const { data: b } = await supabase.from("bets_special").select("*").eq("status","pending")
 bets = b

 render()
}

function calculateOdds(){
 const strengths = teams.map(t => Math.pow(Number(formRatings[t.id] || 1000),6))
 const total = strengths.reduce((a,b)=>a+b,0)
 const map = {}
 teams.forEach((t,i)=>{ map[t.id]=(2.2/(strengths[i]/total)) })
 return map
}

function calculateLastOdds(){
 const strengths = teams.map(t => Math.pow(1/(Number(formRatings[t.id] || 1000)),6))
 const total = strengths.reduce((a,b)=>a+b,0)
 const map = {}
 teams.forEach((t,i)=>{ map[t.id]=(2.2/(strengths[i]/total)) })
 return map
}

window.updateWin = function(player,team,odds){
 const val = Number(document.getElementById(`a_${player}_${team}`).value)
 const box = document.getElementById(`w_${player}_${team}`)
 if(!val){ box.innerText="-"; return }
 box.innerText = Math.round(val*odds)+" Kč"
}

window.selectGoal = function(playerName, teamId, thr){
 if(!selectedGoal[playerName]) selectedGoal[playerName] = {}
 selectedGoal[playerName][teamId] = selectedGoal[playerName][teamId] === thr ? null : thr
 ;["25","30","35"].forEach(t => {
  const btn = document.getElementById(`gbtn_${playerName}_${teamId}_${t}`)
  if(btn) btn.classList.toggle("selected", selectedGoal[playerName][teamId] === t)
 })
 updateGoalWin(playerName, teamId)
}

window.updateGoalWin = function(playerName, teamId){
 const sel = selectedGoal[playerName]?.[teamId]
 const winEl = document.getElementById(`gw_${playerName}_${teamId}`)
 const inputEl = document.getElementById(`gi_${playerName}_${teamId}`)
 const val = inputEl ? Number(inputEl.value) : 0
 if(!sel || !val){ if(winEl) winEl.innerText="-"; return }
 const team = teams.find(t=>t.id===teamId)
 const odds = getGoalsOdds(team?.name||"")
 if(!odds || !winEl) return
 winEl.innerText = Math.round(val * odds[sel]) + " Kč"
}

window.betGoals = async function(playerName, teamId){
 const sel = selectedGoal[playerName]?.[teamId]
 if(!sel) return alert("Vyber počet gólů (25+, 30+ nebo 35+)")
 const player = players[playerName]
 const val = Number(document.getElementById(`gi_${playerName}_${teamId}`).value)
 if(!val||val<=0) return alert("Zadej částku")
 if(player.credit<val) return alert("Nedostatek kreditu")
 const team = teams.find(t=>t.id===teamId)
 const odds = getGoalsOdds(team?.name||"")
 const o = odds[sel]
 const type = `goals_${sel}_regular_season`
 await supabase.from("players").update({credit:player.credit-val}).eq("id",player.id)
 await supabase.from("bets_special").insert({
  player_id:player.id, type, target_id:teamId,
  odds:o, amount:val, potential_win:val*o, status:"pending"
 })
 load()
}

window.bet = async function(playerName,teamId,odds,type="winner_regular_season"){
 const player = players[playerName]
 const val = Number(document.getElementById(`a_${playerName}_${teamId}_${type}`).value)
 if(!val||val<=0) return alert("Zadej částku")
 if(player.credit<val) return alert("Nedostatek kreditu")
 await supabase.from("players").update({credit:player.credit-val}).eq("id",player.id)
 await supabase.from("bets_special").insert({
  player_id:player.id, type, target_id:teamId,
  odds, amount:val, potential_win:val*odds, status:"pending"
 })
 load()
}

function getBet(playerId, teamId, type){
 return bets.find(b => b.player_id===playerId && b.target_id===teamId && b.type===type)
}

function getExistingGoalBet(playerId, teamId){
 return bets.find(b => b.player_id===playerId && b.target_id===teamId && b.type?.startsWith("goals_"))
}

function playerBlock(name,oddsMap,type){
 const p = players[name]
 const sorted = [...teams].sort((a,b)=> oddsMap[b.id]-oddsMap[a.id])
 let html=`
 <div class="playerCard">
  <div class="credit">${name} — 💰 ${Math.round(p.credit)} Kč</div>
  <div class="grid headerRow">
   <div>Tým</div><div>Forma</div><div>Kurz</div>
   <div>Vsazená částka</div><div>Výhra</div><div></div>
  </div>`
 sorted.forEach(t=>{
  const o = oddsMap[t.id]
  const existing = getBet(p.id, t.id, type)
  const form = formRatings[t.id] || 1000
  const id = `${name}_${t.id}_${type}`
  html+=`<div class="grid row">
   <div class="teamBlock" data-label="Tým">
    <img class="logo" src="./logos/${t.logo}">
    <div>${t.name}</div>
   </div>
   <div data-label="Forma">${form}</div>
   <div data-label="Kurz"><b>${o.toFixed(2)}</b></div>`
  if(existing){
   html+=`
    <div data-label="Vsazeno">${existing.amount} Kč</div>
    <div data-label="Výhra">${Math.round(existing.potential_win)} Kč</div>
    <div class="locked">Již vsazeno!</div>`
  } else {
   html+=`
    <div data-label="Vsadit">
     <input id="a_${id}" type="number" oninput="updateWin('${name}','${t.id}_${type}',${o})">
    </div>
    <div data-label="Výhra" id="w_${id}">-</div>
    <button onclick="bet('${name}','${t.id}',${o},'${type}')">Vsadit</button>`
  }
  html+=`</div>`
 })
 html+=`</div>`
 return html
}

function goalsPlayerBlock(playerName){
 const p = players[playerName]
 const goalsTeams = teams.filter(t => getGoalsOdds(t.name))

 let html = `
 <div class="playerCard">
  <div class="credit">${playerName} — 💰 ${Math.round(p.credit)} Kč</div>
  <div class="goalsHeaderRow">
   <div>Tým</div><div>Vyber tip</div><div>Částka / Výhra</div><div></div>
  </div>`

 goalsTeams.forEach(t => {
  const odds = getGoalsOdds(t.name)
  const existing = getExistingGoalBet(p.id, t.id)

  html += `<div class="goalsRow">`

  html += `
   <div class="teamBlock" data-label="Tým">
    <img class="logo" src="./logos/${t.logo}">
    <div>${t.name}</div>
   </div>`

  if(existing){
   const thr = existing.type.split("_")[1]
   html += `
    <div>
     <div style="font-weight:700;font-size:14px;">${thr}+ gólů · kurz ${existing.odds}</div>
    </div>
    <div>
     <div style="font-size:13px;">Vsazeno: ${existing.amount} Kč</div>
     <div style="font-size:13px;">Výhra: ${Math.round(existing.potential_win)} Kč</div>
    </div>
    <div class="locked">Již vsazeno!</div>`
  } else {
   html += `
    <div class="goalBtns">
     ${["25","30","35"].map(thr => `
      <button class="goalBtn" id="gbtn_${playerName}_${t.id}_${thr}"
       onclick="selectGoal('${playerName}','${t.id}','${thr}')">
       <span class="goalBtnLabel">${thr}+</span>
       <span class="goalBtnOdds">${odds[thr]}</span>
      </button>`).join("")}
    </div>
    <div class="goalInputWrap">
     <input id="gi_${playerName}_${t.id}" type="number" placeholder="Kč"
      oninput="updateGoalWin('${playerName}','${t.id}')">
     <div id="gw_${playerName}_${t.id}" class="goalWin">-</div>
    </div>
    <button onclick="betGoals('${playerName}','${t.id}')">Vsadit</button>`
  }

  html += `</div>`
 })

 html += `</div>`
 return html
}

function render(){
 const odds = calculateOdds()
 const lastOdds = calculateLastOdds()
 document.getElementById("section").innerHTML =
  playerBlock("Kubele",odds,"winner_regular_season") +
  playerBlock("Pici",odds,"winner_regular_season")
 document.getElementById("section_last").innerHTML =
  playerBlock("Kubele",lastOdds,"last_regular_season") +
  playerBlock("Pici",lastOdds,"last_regular_season")
 document.getElementById("section_goals").innerHTML =
  goalsPlayerBlock("Kubele") +
  goalsPlayerBlock("Pici")
}

window.toggleSection = function(id){
 document.getElementById(id).classList.toggle("open")
}

load()

</script>
</body>
</html>
