<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Sázky</title>

<style>
*{box-sizing:border-box}

body{font-family:Arial;margin:0;background:#f2f2f2;}
.wrapper{max-width:1200px;margin:auto;padding:15px;background:white;}

h1{margin-bottom:15px}

/* HEADER */
.sectionHeader{
 background:#0b2a3c;
 color:white;
 padding:12px;
 border-radius:10px;
 cursor:pointer;
 font-size:18px;
 margin-bottom:10px;
}

/* BLOCK */
.blockContent{
 display:none;
 margin-bottom:20px;
}

/* PLAYER */
.playerCard{
 background:#e9ecef;
 border-radius:10px;
 padding:12px;
 margin-bottom:15px;
}

.credit{
 font-weight:bold;
 margin-bottom:10px;
}

/* ROW */
.row{
 display:flex;
 align-items:center;
 justify-content:space-between;
 padding:10px;
 border-bottom:1px solid #ccc;
}

.teamBlock{
 display:flex;
 align-items:center;
 gap:10px;
 width:260px;
}

.logo{
 width:40px;
 height:40px;
 object-fit:contain;
 background:white;
 border-radius:6px;
 padding:2px;
}

.rating{width:80px;text-align:center;font-size:13px;}
.odds{width:80px;text-align:center;font-weight:bold;}

input{
 width:80px;
 padding:5px;
}

.win{width:120px;text-align:center;}

button{
 background:#27ae60;
 color:white;
 border:none;
 border-radius:6px;
 padding:6px 10px;
 cursor:pointer;
}

/* HEADER ROW */
.headerRow{
 display:flex;
 font-weight:bold;
 padding:10px;
}

.headerRow div{flex:1;text-align:center}
.headerRow .teamBlock{flex:2;text-align:left}
</style>
</head>

<body>

<div class="wrapper">

<h1>Sázky</h1>

<div class="sectionHeader" onclick="toggleSection()">
 Vítěz základní části
</div>

<div id="section" class="blockContent"></div>

</div>

<script type="module">

import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient(
 "https://qaocbodrflsaerxntfui.supabase.co",
 "sb_publishable_eIeO9MihyuQDuNHy60Ubrw_8ZuSKPFU"
)

let teams = []
let players = {}

// ===== LOAD =====
async function load(){

 const { data: t } = await supabase
  .from("teams")
  .select("*")
  .eq("competition","extraliga")

 teams = t

 const { data: p } = await supabase
  .from("players")
  .select("*")
  .in("name",["Kubele","Pici"])

 p.forEach(pl=> players[pl.name]=pl)

 render()
}

// ===== ODDS (ZVÝŠENÉ) =====
function calculateOdds(){

 const strengths = teams.map(t =>
  Math.pow(Number(t.rating_form||1000),6)
 )

 const total = strengths.reduce((a,b)=>a+b,0)

 const margin = 2.2 // 🔥 zvýšení kurzů

 const map = {}

 teams.forEach((t,i)=>{
  const prob = strengths[i]/total
  map[t.id]=(margin/prob).toFixed(2)
 })

 return map
}

// ===== LIVE =====
window.updateWin = function(player,team,odds){

 const val = Number(document.getElementById(`a_${player}_${team}`).value)
 const box = document.getElementById(`w_${player}_${team}`)

 if(!val){ box.innerText="-"; return }

 box.innerText = Math.round(val*odds)+" Kč"
}

// ===== BET =====
window.bet = async function(playerName,teamId,odds){

 const player = players[playerName]
 const val = Number(document.getElementById(`a_${playerName}_${teamId}`).value)

 if(!val||val<=0) return alert("Zadej částku")
 if(player.credit<val) return alert("Nedostatek kreditu")

 await supabase.from("players")
  .update({credit:player.credit-val})
  .eq("id",player.id)

 await supabase.from("bets_special").insert({
  player_id:player.id,
  type:"winner_regular_season",
  target_id:teamId,
  odds:odds,
  amount:val,
  potential_win:val*odds,
  status:"pending"
 })

 alert("Vsazeno 👍")
 load()
}

// ===== PLAYER BLOCK =====
function playerBlock(name,oddsMap){

 const p = players[name]

 let html=`
 <div class="playerCard">

  <div class="credit">${name} — 💰 ${p.credit} Kč</div>

  <div class="headerRow">
    <div class="teamBlock">Tým</div>
    <div>Forma</div>
    <div>Kurz</div>
    <div>Sázka</div>
    <div>Výhra</div>
    <div></div>
  </div>
 `

 teams.forEach(t=>{

  const o = oddsMap[t.id]

  html+=`
  <div class="row">

    <div class="teamBlock">
      <img class="logo" src="./logos/${t.logo}">
      <div>${t.name}</div>
    </div>

    <div class="rating">${t.rating_form}</div>
    <div class="odds">${o}</div>

    <input id="a_${name}_${t.id}" type="number"
      oninput="updateWin('${name}','${t.id}',${o})">

    <div class="win" id="w_${name}_${t.id}">-</div>

    <button onclick="bet('${name}','${t.id}',${o})">Vsadit</button>

  </div>
  `
 })

 html+=`</div>`

 return html
}

// ===== RENDER =====
function render(){

 const odds = calculateOdds()

 const sec = document.getElementById("section")

 sec.innerHTML =
  playerBlock("Kubele",odds) +
  playerBlock("Pici",odds)
}

// ===== TOGGLE =====
window.toggleSection = function(){
 const s = document.getElementById("section")
 s.style.display = s.style.display==="block"?"none":"block"
}

load()

</script>

</body>
</html>
