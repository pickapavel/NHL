<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sázky – Extraliga</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0b2a3c;
  --navy2:#1a5276;
  --gold:#f0c040;
  --green:#27ae60;
  --bg:#f0f4f8;
  --white:#fff;
  --muted:#6b7a8d;
  --border:#e2e8f0;
  --text:#1a2a3c;
  --radius:10px;
  --radius-lg:14px;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

.site-header{background:var(--navy);padding:16px 24px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:100;border-bottom:2px solid rgba(240,192,64,.25)}
.header-logo{font-size:20px;font-weight:700;color:#fff;letter-spacing:.3px}
.header-logo span{color:var(--gold)}

.phase-bar{background:var(--white);border-bottom:1px solid var(--border);padding:0 24px;display:flex;gap:4px;overflow-x:auto;justify-content:center;}
.phase-tab{padding:10px 16px;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2.5px solid transparent;transition:all .15s;white-space:nowrap;background:none;border-top:none;border-left:none;border-right:none;font-family:'Inter',sans-serif}
.phase-tab:hover{color:var(--text)}
.phase-tab.active{color:var(--navy);border-bottom-color:var(--navy2)}

.wrapper{max-width:1240px;margin:0 auto;padding:24px 20px 60px}

.players-grid{display:grid;grid-template-columns:1fr;gap:16px;}

.player-card{background:var(--white);border-radius:var(--radius-lg);border:1px solid var(--border);overflow:hidden}
.player-card-header{background:var(--navy);padding:14px 18px;display:flex;align-items:center;justify-content:space-between}
.player-name{font-size:15px;font-weight:700;color:#fff}
.player-credit{font-size:13px;font-weight:600;color:var(--gold);background:rgba(240,192,64,.12);padding:4px 10px;border-radius:20px}

.bet-table{width:100%;border-collapse:collapse}
.bet-table thead tr{background:#f7fafc}
.bet-table th{padding:9px 12px;text-align:left;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--border)}
.bet-table th.tc{text-align:center}
.bet-table tbody td{padding:10px 12px;border-bottom:1px solid #f0f4f8;vertical-align:middle;font-size:13px;white-space:nowrap}
.bet-table tbody td:first-child{white-space:normal}
.bet-table tbody tr:last-child td{border-bottom:none}
.bet-table tbody tr:hover td{background:#f7fafc}

.team-cell{display:flex;align-items:center;gap:8px}
.logo{width:28px;height:28px;object-fit:contain;background:#fff;border-radius:5px;padding:2px;border:1px solid var(--border);flex-shrink:0}
.team-info-wrap{display:flex;flex-direction:column;gap:3px;min-width:0}
.team-name{font-weight:600;font-size:13px;white-space:nowrap}
.team-meta{display:flex;gap:4px;flex-wrap:wrap;align-items:center;margin-top:1px}
.team-meta-tag{font-size:10px;font-weight:600;padding:1px 5px;border-radius:4px;white-space:nowrap;flex-shrink:0}
.tag-pos{background:#e8f0fe;color:#1a4fa0}
.tag-elo{background:#eef2f7;color:var(--navy)}
.tag-forma{background:#e8f7ef;color:#166634;display:inline-flex;align-items:center;gap:3px}

.odds-badge{display:inline-block;background:#eef2f7;border-radius:6px;padding:3px 9px;font-weight:700;font-size:13px;color:var(--navy);min-width:44px;text-align:center}
.bet-input{width:80px;padding:6px 8px;border:1px solid var(--border);border-radius:7px;font-size:13px;font-family:'Inter',sans-serif;transition:border-color .15s}
.bet-input:focus{outline:none;border-color:var(--navy2)}
.win-display{font-size:13px;font-weight:600;color:var(--green);min-width:70px;text-align:right}
.bet-btn{background:var(--green);color:#fff;border:none;border-radius:7px;padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;white-space:nowrap;transition:background .15s}
.bet-btn:hover{background:#219a52}
.locked-badge{font-size:11px;font-weight:600;color:#27ae60;background:#eafaf1;border-radius:6px;padding:4px 10px;white-space:nowrap}
.closed-badge{font-size:11px;font-weight:600;color:#721c24;background:#f8d7da;border-radius:6px;padding:4px 10px;white-space:nowrap}

.goals-player-card{background:var(--white);border-radius:var(--radius-lg);border:1px solid var(--border);overflow:hidden;margin-bottom:16px}
.goals-team-row{display:grid;grid-template-columns:180px 1fr 160px 90px;gap:12px;align-items:center;padding:12px 16px;border-bottom:1px solid #f0f4f8}
.goals-team-row:last-child{border-bottom:none}
.goals-header-row{display:grid;grid-template-columns:180px 1fr 160px 90px;gap:12px;padding:9px 16px;background:#f7fafc;border-bottom:1px solid var(--border)}
.goals-header-row span{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
.goal-btns{display:flex;gap:6px}
.goal-btn{flex:1;padding:8px 4px;background:#eef2f7;border:1.5px solid var(--border);border-radius:8px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;transition:all .15s;font-family:'Inter',sans-serif}
.goal-btn:hover{background:#e2e8f0;border-color:#b0c4d8}
.goal-btn.selected{background:var(--navy);border-color:var(--navy)}
.goal-btn.selected .goal-btn-label,.goal-btn.selected .goal-btn-odds{color:#fff}
.goal-btn-label{font-size:13px;font-weight:700;color:var(--text)}
.goal-btn-odds{font-size:10px;color:var(--muted)}
.goal-input-wrap{display:flex;flex-direction:column;gap:4px}
.goal-win{font-size:12px;font-weight:600;color:var(--green)}

.section-label-wrap{margin:32px 0 16px;display:flex;align-items:center;gap:0;}
.section-label-text{background:var(--navy);color:#fff;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;padding:7px 18px;border-radius:8px 0 0 8px;white-space:nowrap;}
.section-label-line{flex:1;height:3px;background:linear-gradient(90deg,var(--navy2),transparent);border-radius:0 2px 2px 0;}

.serie-accordion{margin-bottom:16px;border-radius:var(--radius-lg);border:1px solid var(--border);overflow:hidden;box-shadow:0 2px 8px rgba(11,42,60,.06);}
.serie-header{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 18px;background:var(--white);cursor:pointer;transition:background .15s;user-select:none;}
.serie-header:hover{background:#f7fafc;}
.serie-header.open{background:#f0f4f8;}
.serie-header-left{display:flex;align-items:center;gap:12px;}
.serie-logos{display:flex;align-items:center;gap:4px;}
.serie-logo{width:30px;height:30px;object-fit:contain;background:#fff;border-radius:6px;padding:2px;border:1px solid var(--border);}
.serie-title{font-size:14px;font-weight:700;color:var(--navy);}
.serie-subtitle{font-size:11px;color:var(--muted);margin-top:2px;}
.serie-header-right{display:flex;align-items:center;gap:10px;}
.serie-score-badge{font-size:12px;font-weight:700;background:#eef2f7;color:var(--navy);padding:3px 10px;border-radius:20px;white-space:nowrap;}
.serie-arrow{font-size:12px;color:var(--muted);transition:transform .2s;}
.serie-header.open .serie-arrow{transform:rotate(180deg);}
.serie-body{display:none;border-top:1px solid var(--border);background:var(--bg);}
.serie-body.open{display:block;}

.serie-tips-section{padding:0;border-bottom:3px solid var(--border);margin-bottom:0;}
.serie-tips-title{font-size:13px;font-weight:700;color:#fff;text-transform:uppercase;letter-spacing:.08em;padding:10px 18px;background:linear-gradient(135deg,var(--navy),var(--navy2));margin-bottom:0;}
.serie-tips-players{display:grid;grid-template-columns:1fr 1fr;gap:0;}
.serie-tips-player{padding:14px 16px;border-right:1px solid var(--border);background:var(--white);}
.serie-tips-player:last-child{border-right:none;}
.serie-tips-player-name{font-size:13px;font-weight:700;color:var(--navy);margin-bottom:2px;}
.serie-tips-player-credit{font-size:11px;color:var(--muted);margin-bottom:10px;}

.tip-block{margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid #eef2f7;}
.tip-block:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0;}
.tip-block-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;}

.winner-btns{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px;}
.winner-btn{padding:8px 6px;background:#eef2f7;border:1.5px solid var(--border);border-radius:8px;cursor:pointer;font-family:'Inter',sans-serif;text-align:center;transition:all .15s;}
.winner-btn:hover{background:#e2e8f0;border-color:#b0c4d8;}
.winner-btn.selected{background:var(--navy);border-color:var(--navy);color:#fff;}
.winner-btn.selected .wb-odds{color:#7ab0cc;}
.wb-name{font-size:11px;font-weight:700;display:block;line-height:1.3;}
.wb-odds{font-size:11px;color:var(--muted);display:block;margin-top:2px;}

.games-btns{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px;}
.games-btn{padding:6px 12px;background:#eef2f7;border:1.5px solid var(--border);border-radius:8px;cursor:pointer;font-family:'Inter',sans-serif;font-size:12px;font-weight:700;color:var(--navy);transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:1px;}
.games-btn:hover{background:#e2e8f0;border-color:#b0c4d8;}
.games-btn.selected{background:var(--navy);border-color:var(--navy);color:#fff;}
.games-btn.selected .gb-odds{color:#7ab0cc;}
.gb-num{font-size:12px;font-weight:700;}
.gb-odds{font-size:10px;color:var(--muted);}
.games-btn-na{font-size:11px;color:var(--muted);font-style:italic;padding:6px 0;}

.tip-amount-row{display:flex;align-items:center;gap:8px;margin-top:6px;}
.tip-amount-label{font-size:11px;color:var(--muted);white-space:nowrap;}
.tip-summary{font-size:12px;margin:6px 0 8px;min-height:18px;display:flex;justify-content:space-between;}
.tip-summary .win-amount{font-weight:700;color:var(--green);}
.tip-summary .odds-val{font-weight:700;color:var(--navy2);}

/* Zápas karta — s odsazením a stínem pro oddělení */
.match-wrap{margin:16px 0;border-radius:var(--radius-lg);overflow:hidden;border:1px solid var(--border);box-shadow:0 2px 10px rgba(11,42,60,.08);}
.match-wrap:first-child{margin-top:12px;}

.match-card{background:var(--white);overflow:hidden;}
.match-header{background:linear-gradient(135deg,var(--navy),var(--navy2));padding:9px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px;}
.match-header-title{font-size:13px;font-weight:700;color:#fff;}
.match-header-num{font-size:11px;color:rgba(255,255,255,.7);font-weight:600;background:rgba(255,255,255,.12);padding:3px 10px;border-radius:20px;}
.match-teams{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:12px;padding:14px 18px;border-bottom:1px solid var(--border);}
.match-team{display:flex;flex-direction:column;align-items:center;gap:4px;text-align:center;}
.match-team-logo{width:38px;height:38px;object-fit:cover;background:#fff;border-radius:8px;padding:0px;border:1px solid var(--border);}.match-team-name{font-size:12px;font-weight:700;color:var(--text);}
.match-team-info{font-size:10px;color:var(--muted);}
.match-score{text-align:center;}
.match-score-main{font-size:24px;font-weight:800;color:var(--navy);line-height:1;}
.match-score-vs{font-size:15px;font-weight:700;color:var(--muted);}
.match-h2h{padding:7px 16px;background:#f7fafc;border-bottom:1px solid var(--border);}
.match-h2h-title{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px;}
.match-h2h-list{display:flex;flex-direction:column;gap:3px;}
.h2h-row{display:flex;align-items:center;gap:8px;font-size:11px;background:var(--white);border-radius:6px;padding:3px 8px;border:1px solid var(--border);}
.h2h-teams{flex:1;font-size:11px;color:var(--muted);}
.h2h-winner{color:#166534;font-weight:700;}
.h2h-loser{color:#991b1b;}
.h2h-score{font-weight:800;color:var(--text);background:#eef2f7;padding:2px 6px;border-radius:5px;font-size:11px;flex-shrink:0;}
.h2h-tag{font-size:9px;font-weight:700;background:#2f9ec9;color:#fff;padding:1px 5px;border-radius:4px;flex-shrink:0;}
.h2h-empty{font-size:12px;color:var(--muted);font-style:italic;}
.match-players{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(--border);}
.match-player{padding:12px 16px;border-right:1px solid var(--border);}
.match-player:last-child{border-right:none;}
.match-player-name{font-size:13px;font-weight:700;color:var(--navy);margin-bottom:2px;}
.match-player-credit{font-size:11px;color:var(--muted);margin-bottom:8px;}
.match-odds-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin-bottom:8px;}
.match-odd-btn{background:#f0f4f8;color:var(--navy);border:2px solid #e0ecf8;border-radius:8px;padding:7px 4px;text-align:center;cursor:pointer;transition:all .15s;font-family:'Inter',sans-serif;}
.match-odd-btn:hover{background:#dce8f5;border-color:#2f9ec9;}
.match-odd-btn.active{background:var(--navy);color:#fff;border-color:var(--navy);}
.match-odd-btn.placeholder{background:transparent;border-color:transparent;cursor:default;pointer-events:none;}
.mob-type{font-size:10px;font-weight:800;display:block;line-height:1.3;}
.mob-val{font-size:10px;font-weight:600;color:#666;display:block;margin-top:2px;}
.match-odd-btn.active .mob-val{color:#7ab0cc;}
.match-amount-label{font-size:11px;color:#aaa;font-weight:600;margin-bottom:4px;}
.match-amount-input{width:100%;padding:7px 10px;border:2px solid #e0ecf8;border-radius:8px;font-family:'Inter',sans-serif;font-size:13px;font-weight:600;color:var(--navy);background:#f7f9fc;transition:border .15s;}
.match-amount-input:focus{outline:none;border-color:var(--navy2);background:#fff;}
.match-summary{display:flex;justify-content:space-between;font-size:12px;color:#666;margin:6px 0 8px;background:#f7f9fc;border-radius:8px;padding:6px 10px;min-height:30px;align-items:center;}
.match-summary .win-amount{font-weight:800;color:#16a34a;font-size:13px;}
.match-summary .odds-val{font-weight:700;color:var(--navy2);}
.match-vsadit-btn{width:100%;padding:9px;border:none;border-radius:8px;background:var(--green);color:#fff;font-family:'Inter',sans-serif;font-size:13px;font-weight:800;cursor:pointer;transition:background .15s;}
.match-vsadit-btn:hover{background:#219a52;}

/* Oddělovač před gólovou sekcí */
.goals-divider{display:flex;align-items:center;gap:12px;padding:10px 16px;background:var(--bg);border-top:2px solid var(--border);}
.goals-divider-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;white-space:nowrap;}
.goals-divider-line{flex:1;height:1px;background:var(--border);}

/* Accordion pro góly v zápasech */
.match-goals-accordion{border-top:1px solid var(--border);background:var(--white);}
.mga-header{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;cursor:pointer;background:#f7fafc;user-select:none;transition:background .15s;}
.mga-header:hover{background:#eef2f7;}
.mga-header.open{background:#edf2f7;}
.mga-title{font-size:12px;font-weight:700;color:var(--navy);display:flex;align-items:center;}.mga-arrow{font-size:11px;color:var(--muted);transition:transform .2s;}
.mga-header.open .mga-arrow{transform:rotate(180deg);}
.mga-body{display:none;border-top:1px solid var(--border);}
.mga-body.open{display:block;}
.mga-players{display:grid;grid-template-columns:1fr 1fr;}
.mga-player{padding:12px 16px;border-right:1px solid var(--border);}
.mga-player:last-child{border-right:none;}
.mga-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin-bottom:8px;}
.mga-btn{background:#f0f4f8;color:var(--navy);border:2px solid #e0ecf8;border-radius:8px;padding:7px 4px;text-align:center;cursor:pointer;transition:all .15s;font-family:'Inter',sans-serif;}
.mga-btn:hover{background:#dce8f5;border-color:#2f9ec9;}
.mga-btn.active{background:var(--navy);color:#fff;border-color:var(--navy);}
.mga-btn-label{font-size:10px;font-weight:800;display:block;line-height:1.3;}
.mga-btn-odds{font-size:10px;font-weight:600;color:#666;display:block;margin-top:2px;}
.mga-btn.active .mga-btn-odds{color:#7ab0cc;}

.no-phase{text-align:center;padding:60px 20px;color:var(--muted);font-size:14px}
.coming-soon{background:var(--white);border-radius:var(--radius-lg);border:1px solid var(--border);padding:48px 24px;text-align:center;}
.coming-soon-icon{font-size:36px;margin-bottom:12px;}
.coming-soon-title{font-size:16px;font-weight:700;color:var(--navy);margin-bottom:6px;}
.coming-soon-sub{font-size:13px;color:var(--muted);}

@media(max-width:700px){
  .goals-header-row,.goals-team-row{grid-template-columns:1fr}
  .goals-header-row{display:none}
  .goals-team-row{border:1px solid var(--border);border-radius:var(--radius);margin:8px 16px;padding:12px}
  .match-players,.serie-tips-players,.mga-players{grid-template-columns:1fr}
  .match-player,.serie-tips-player,.mga-player{border-right:none;border-top:1px solid var(--border);}
  .match-player:first-child,.serie-tips-player:first-child,.mga-player:first-child{border-top:none;}
  .match-teams{gap:8px;}
}
@media(max-width:500px){
  .phase-bar{padding:0 12px;justify-content:flex-start;}
  .wrapper{padding:16px 12px 60px}
  .bet-table thead{display:none}
  .bet-table td{display:flex;justify-content:space-between;align-items:center;padding:8px 12px}
  .bet-table td::before{content:attr(data-label);font-size:11px;font-weight:600;color:var(--muted)}
}
</style>
</head>

let teams=[], players={}, bets=[], specialBets=[], formRatings={}, locks={}

function poissonProb(lambda,k){
  let p=Math.exp(-lambda)
  for(let i=0;i<k;i++) p*=lambda/(i+1)
  return p
}
function poissonCumulative(lambda,upTo){
  let s=0;for(let k=0;k<=upTo;k++) s+=poissonProb(lambda,k);return s
}

function calcAvgGoals(matches,teamId,asHome){
  const filtered=matches.filter(m=>asHome?m.home_team===teamId:m.away_team===teamId).slice(-20)
  if(!filtered.length) return 2.5
  return filtered.reduce((s,m)=>s+(asHome?Number(m.home_score):Number(m.away_score)),0)/filtered.length
}

function calcMatchGoalsOdds(homeId,awayId){
  const lH=calcAvgGoals(allPlayedMatches,homeId,true)
  const lA=calcAvgGoals(allPlayedMatches,awayId,false)
  const lT=lH+lA
  const M=GOALS_BET_MARGIN
  const total={}
  ;[3,4,5,6,7].forEach(t=>{
    const pO=1-poissonCumulative(lT,t)
    const pU=poissonCumulative(lT,t)
    if(pO>0.02&&pO<0.98){
      total[`over_${t}`]={label:`Přes ${t}.5`,odds:Math.round((M/pO)*100)/100}
      total[`under_${t}`]={label:`Méně než ${t+1}`,odds:Math.round((M/pU)*100)/100}
    }
  })
  function teamGoals(lambda){
    const r={}
    ;[{k:"0",l:"0 gólů",p:poissonProb(lambda,0)},
      {k:"1",l:"1 gól",p:poissonProb(lambda,1)},
      {k:"2",l:"2 góly",p:poissonProb(lambda,2)},
      {k:"3",l:"3 góly",p:poissonProb(lambda,3)},
      {k:"4p",l:"4+ góly",p:1-poissonCumulative(lambda,3)}
    ].forEach(({k,l,p})=>{ if(p>0.02) r[k]={label:l,odds:Math.round((M/p)*100)/100} })
    return r
  }
  const maxG=15,diffProbs={}
  for(let h=0;h<=maxG;h++) for(let a=0;a<=maxG;a++){
    const p=poissonProb(lH,h)*poissonProb(lA,a)
    const d=h-a;diffProbs[d]=(diffProbs[d]||0)+p
  }
  const diff={}
  ;[
    {k:"home_3p",l:"Dom. o 3+",p:(diffProbs[3]||0)+(diffProbs[4]||0)+(diffProbs[5]||0)+(diffProbs[6]||0)+(diffProbs[7]||0)},
    {k:"home_2", l:"Dom. o 2", p:diffProbs[2]||0},
    {k:"home_1", l:"Dom. o 1", p:diffProbs[1]||0},
    {k:"draw",   l:"Remíza",   p:diffProbs[0]||0},
    {k:"away_1", l:"Hosté o 1",p:diffProbs[-1]||0},
    {k:"away_2", l:"Hosté o 2",p:diffProbs[-2]||0},
    {k:"away_3p",l:"Hosté o 3+",p:(diffProbs[-3]||0)+(diffProbs[-4]||0)+(diffProbs[-5]||0)+(diffProbs[-6]||0)+(diffProbs[-7]||0)},
  ].forEach(({k,l,p})=>{ if(p>0.02) diff[k]={label:l,odds:Math.round((M/p)*100)/100} })
  return{total,home:teamGoals(lH),away:teamGoals(lA),diff}
}

function checkGoalsTip(match,category,key){
  if(!key) return false
  const hg=Number(match.home_score),ag=Number(match.away_score)
  const total=hg+ag,diff=hg-ag
  if(category==="total"){
    const n=Number(key.split("_")[1])
    return key.startsWith("over_")?total>n:total<=n
  }
  if(category==="home"){ if(key==="4p") return hg>=4; return hg===Number(key) }
  if(category==="away"){ if(key==="4p") return ag>=4; return ag===Number(key) }
  if(category==="diff"){
    switch(key){
      case "home_3p": return diff>=3
      case "home_2":  return diff===2
      case "home_1":  return diff===1
      case "draw":    return diff===0
      case "away_1":  return diff===-1
      case "away_2":  return diff===-2
      case "away_3p": return diff<=-3
    }
  }
  return false
}

function getScore(match,teamId){
  const hg=Number(match.home_score),ag=Number(match.away_score)
  let s=null;try{s=match.stats?JSON.parse(match.stats):null}catch(e){}
  const isSN=s&&(s[20]==="1"||s[20]==="2")
  const isOT=s&&!isSN&&(s[9]==="11"||s[19]==="11")
  const isHome=match.home_team===teamId
  const tg=isHome?hg:ag
  if(tg>(isHome?ag:hg)) return(isSN||isOT)?0.75:1
  return(isSN||isOT)?0.25:0
}

function calculateFormRatings(matches){
  const ratings={},fh={},fr={}
  teams.forEach(t=>{ratings[t.id]=START_RATING;fh[t.id]=[];fr[t.id]=START_RATING})
  matches.forEach(m=>{
    const h=m.home_team,a=m.away_team
    if(!fr[h]||!fr[a]) return
    const sH=getScore(m,h),sA=getScore(m,a)
    function upd(tid,oid,score){
      const cur=fr[tid],opp=fr[oid]
      const exp=1/(1+Math.pow(10,(opp-cur)/400))
      const ch=K_FORM*(score-exp)
      fh[tid].push(ch);if(fh[tid].length>5)fh[tid].shift()
      fr[tid]=Math.round(START_RATING+fh[tid].reduce((a,b)=>a+Math.round(b),0))
    }
    upd(h,a,sH);upd(a,h,sA)
    const rH=ratings[h],rA=ratings[a]
    ratings[h]=Math.round(rH+K_FORM*(sH-(1/(1+Math.pow(10,(rA-rH)/400)))))
    ratings[a]=Math.round(rA+K_FORM*(sA-(1/(1+Math.pow(10,(rH-rA)/400)))))
  })
  return{elo:ratings,forma:fr}
}

function calculateStandings(basicMatches){
  const table={}
  teams.forEach(t=>{table[t.id]={id:t.id,name:t.name,logo:t.logo,b:0,z:0,gf:0,ga:0}})
  basicMatches.forEach(m=>{
    const h=table[m.home_team],a=table[m.away_team]
    if(!h||!a) return
    const hg=Number(m.home_score),ag=Number(m.away_score)
    let s=null;try{s=m.stats?JSON.parse(m.stats):null}catch(e){}
    const isSN=s&&(s[20]==="1"||s[20]==="2")
    const isOT=s&&!isSN&&(s[9]==="11"||s[19]==="11")
    const ots=isSN||isOT
    h.z++;a.z++;h.gf+=hg;h.ga+=ag;a.gf+=ag;a.ga+=hg
    if(hg>ag){if(ots){h.b+=2;a.b+=1}else h.b+=3}
    else{if(ots){a.b+=2;h.b+=1}else a.b+=3}
  })
  return Object.values(table).filter(t=>t.z>0)
    .sort((a,b)=>b.b!==a.b?b.b-a.b:(b.gf-b.ga)-(a.gf-a.ga))
}

function goalsOddsFromAvg(avg,totalGames){
  const projected=avg*totalGames
  function probOver(t){return 1/(1+Math.exp(-(projected-t)*0.3))}
  return{
    "25":Math.round((1/Math.max(0.05,Math.min(0.95,probOver(25))))*GOALS_MARGIN*100)/100,
    "30":Math.round((1/Math.max(0.05,Math.min(0.95,probOver(30))))*GOALS_MARGIN*100)/100,
    "35":Math.round((1/Math.max(0.05,Math.min(0.95,probOver(35))))*GOALS_MARGIN*100)/100,
  }
}

function calculateGoalsOdds(curMatches,prevMatches,totalGames){
  const cG={},cM={},pG={},pM={}
  curMatches.forEach(m=>{
    cG[m.home_team]=(cG[m.home_team]||0)+Number(m.home_score)
    cG[m.away_team]=(cG[m.away_team]||0)+Number(m.away_score)
    cM[m.home_team]=(cM[m.home_team]||0)+1
    cM[m.away_team]=(cM[m.away_team]||0)+1
  })
  prevMatches.forEach(m=>{
    pG[m.home_team]=(pG[m.home_team]||0)+Number(m.home_score)
    pG[m.away_team]=(pG[m.away_team]||0)+Number(m.away_score)
    pM[m.home_team]=(pM[m.home_team]||0)+1
    pM[m.away_team]=(pM[m.away_team]||0)+1
  })
  const prevAvgs=Object.keys(pG).map(id=>pM[id]>0?pG[id]/pM[id]:0)
  const globalAvg=prevAvgs.length?prevAvgs.reduce((a,b)=>a+b,0)/prevAvgs.length:2.5
  const result={}
  currentTeamIds.forEach(id=>{
    const avg=pM[id]>0?pG[id]/pM[id]:globalAvg
    result[id]=goalsOddsFromAvg(avg,totalGames)
  })
  return result
}

function calculateWinnerOdds(){
  const ct=teams.filter(t=>currentTeamIds.has(t.id))
  const s=ct.map(t=>Math.pow(Number(formRatings.elo[t.id]||1000),6))
  const total=s.reduce((a,b)=>a+b,0)
  const map={};ct.forEach((t,i)=>{map[t.id]=MARGIN/(s[i]/total)});return map
}
function calculateNonWinnerOdds(){
  const sorted=teams.filter(t=>currentTeamIds.has(t.id)).sort((a,b)=>(formRatings.elo[a.id]||1000)-(formRatings.elo[b.id]||1000))
  const map={}
  sorted.forEach((t,i)=>{
    const ratio=sorted.length>1?i/(sorted.length-1):0
    map[t.id]=1.10+Math.pow(ratio,3)*(3.00-1.10)
  })
  return map
}
function calculateLastOdds(){
  const ct=teams.filter(t=>currentTeamIds.has(t.id))
  const s=ct.map(t=>Math.pow(1/(Number(formRatings.elo[t.id]||1000)),6))
  const total=s.reduce((a,b)=>a+b,0)
  const map={};ct.forEach((t,i)=>{map[t.id]=MARGIN/(s[i]/total)});return map
}
function calculateEqualOdds(f=2.5){
  const map={};teams.filter(t=>currentTeamIds.has(t.id)).forEach(t=>{map[t.id]=f});return map
}

function calcOverallPlayoffOdds(dbType){
  const playoffTeamIds=new Set()
  Object.values(playoffMatchesByPhase).flat().forEach(m=>{
    playoffTeamIds.add(m.home_team);playoffTeamIds.add(m.away_team)
  })
  const teamPool=playoffTeamIds.size>0?standings.filter(t=>playoffTeamIds.has(t.id)):standings
  if(!teamPool.length) return {}
  const n=teamPool.length
  const strengths=teamPool.map((t,i)=>Math.pow((n-i)/n,3))
  const total=strengths.reduce((a,b)=>a+b,0)
  const map={}
  teamPool.forEach((t,i)=>{
    const baseOdds=Math.min(180,Math.round((OVERALL_MARGIN/(strengths[i]/total))*100)/100)
    if(dbType==="winner_playoff_overall") map[t.id]=baseOdds
    else if(dbType==="second_playoff_overall") map[t.id]=Math.round(baseOdds*0.7*100)/100
    else map[t.id]=Math.round(baseOdds*0.5*100)/100
  })
  return map
}

function getLastH2H(homeId,awayId){
  const h2h=allPlayedMatches.filter(m=>
    (m.home_team===homeId&&m.away_team===awayId)||(m.home_team===awayId&&m.away_team===homeId))
  return h2h.length?h2h[h2h.length-1]:null
}

function calcSeriesOdds(homeId,awayId){
  const n=standings.length
  const hp=standings.findIndex(t=>t.id===homeId)
  const ap=standings.findIndex(t=>t.id===awayId)
  const hPos=hp>=0?(n-hp)/n:0.5
  const aPos=ap>=0?(n-ap)/n:0.5
  const hForm=(formRatings.elo[homeId]||1000)/2000
  const aForm=(formRatings.elo[awayId]||1000)/2000
  const hStr=(hPos+hForm)/2,aStr=(aPos+aForm)/2
  let probH=hStr/(hStr+aStr)
  const h2h=getLastH2H(homeId,awayId)
  let h2hText="Žádný vzájemný zápas v ZČ"
  if(h2h){
    const hg=Number(h2h.home_score),ag=Number(h2h.away_score)
    const homeWon=h2h.home_team===homeId?hg>ag:ag>hg
    probH=Math.max(0.05,Math.min(0.95,probH+(homeWon?0.04:-0.04)))
    const wName=homeWon?teams.find(t=>t.id===homeId)?.name:teams.find(t=>t.id===awayId)?.name
    h2hText=`Poslední vzájemný: ${hg}:${ag} → vyhrál ${wName} (${homeWon?"+":"-"}4%)`
  }
  const probA=1-probH
  return{
    home:Math.round((1/probH)*PLAYOFF_MARGIN*100)/100,
    away:Math.round((1/probA)*PLAYOFF_MARGIN*100)/100,
    probHome:Math.round(probH*100),probAway:Math.round(probA*100),
    homePos:hp+1,awayPos:ap+1,h2hText,
  }
}

function calcGamesOdds(homeId,awayId,winsNeeded,initHome=0,initAway=0){
  const n=standings.length
  const hp=standings.findIndex(t=>t.id===homeId)
  const ap=standings.findIndex(t=>t.id===awayId)
  const hStr=hp>=0?(n-hp)/n:0.5
  const aStr=ap>=0?(n-ap)/n:0.5
  const probH=hStr/(hStr+aStr),probA=1-probH
  const hNeeded=winsNeeded-initHome
  const aNeeded=winsNeeded-initAway
  const maxGames=hNeeded+aNeeded-1
  const initTotal=initHome+initAway
  function binom(n,r){
    if(r>n) return 0
    let res=1;for(let i=0;i<r;i++) res=res*(n-i)/(i+1);return Math.round(res)
  }
  function seriesProb(k){
    if(k<winsNeeded||k>maxGames) return 0
    const losses=k-winsNeeded
    const coef=binom(k-1,winsNeeded-1)
    return coef*(Math.pow(probH,winsNeeded)*Math.pow(probA,losses)+Math.pow(probA,winsNeeded)*Math.pow(probH,losses))
  }
  const probs={},odds={}
  let total=0
for(let k=winsNeeded;k<=maxGames;k++){
    const totalGames=k+initTotal
    odds[totalGames]=Math.round((1.12/(probs[k]/total))*100)/100
  }
  return odds
}

function calcMatchOdds(homeRating,awayRating){
  const HOME_ADV=80,homeAdj=homeRating+HOME_ADV
  const diff=Math.abs(homeAdj-awayRating)
  let drawProb=Math.max(0.10,Math.min(0.30,0.25*Math.exp(-diff/400)))
  const probHomeRaw=1/(1+Math.pow(10,(awayRating-homeAdj)/400))
  const probAwayRaw=1-probHomeRaw
  const probHome=probHomeRaw*(1-drawProb),probAway=probAwayRaw*(1-drawProb)
  const probHomeOT=drawProb*probHomeRaw,probAwayOT=drawProb*probAwayRaw
  return{
    "1":1/probHome,"0":1/drawProb,"2":1/probAway,
    "11":1/(1-probAway),"no_draw":1/(probHome+probAway),"22":1/(1-probHome),
    "vdr_home":1/(probHome+probHomeOT),"vdr_away":1/(probAway+probAwayOT),
  }
}

function renderTeamMeta(t){
  const pos=standings.findIndex(s=>s.id===t.id)
  const eloVal=formRatings.elo?.[t.id]||1000
  const formaVal=formRatings.forma?.[t.id]||1000
  const teamMatches=allPlayedMatches.filter(m=>m.home_team===t.id||m.away_team===t.id).slice(-5)
  const dots=teamMatches.map(m=>{
    const isHome=m.home_team===t.id
    const tw=isHome?Number(m.home_score)>Number(m.away_score):Number(m.away_score)>Number(m.home_score)
    return `<span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${tw?'#27ae60':'#e74c3c'};flex-shrink:0;"></span>`
  }).join("")
  const posTag=pos>=0?`<span class="team-meta-tag tag-pos">${pos+1}. ZČ</span>`:''
  return `${posTag}<span class="team-meta-tag tag-elo">ELO ${eloVal}</span><span class="team-meta-tag tag-forma">Forma ${formaVal} ${dots}</span>`
}

window.toggleMGA=function(matchId,category){
  const body=document.getElementById(`mga-body-${matchId}-${category}`)
  const header=document.getElementById(`mga-header-${matchId}-${category}`)
  if(!body||!header) return
  body.classList.toggle("open")

}

window.selectMGABtn=function(matchId,category,playerKey,key){
  const prev=matchGoalsState[`${matchId}-${category}-${playerKey}`]
  matchGoalsState[`${matchId}-${category}-${playerKey}`]=prev===key?null:key
  document.querySelectorAll(`.mga-btn[data-match="${matchId}"][data-cat="${category}"][data-player="${playerKey}"]`).forEach(btn=>{
    btn.classList.toggle("active",btn.dataset.key===matchGoalsState[`${matchId}-${category}-${playerKey}`])
  })
  updateMGASummary(matchId,category,playerKey)
}

function updateMGASummary(matchId,category,playerKey){
  const sel=matchGoalsState[`${matchId}-${category}-${playerKey}`]
  const summaryEl=document.getElementById(`mga-summary-${matchId}-${category}-${playerKey}`)
  const amountEl=document.getElementById(`mga-amount-${matchId}-${category}-${playerKey}`)
  if(!summaryEl||!amountEl) return
  const amount=Number(amountEl.value)
  if(!sel){ summaryEl.innerHTML='<span style="color:#aaa;">Vyber tip a částku</span>'; return }
  const goalsO=calcMatchGoalsOdds(
    document.getElementById(`mga-body-${matchId}-${category}`)?.dataset.home,
    document.getElementById(`mga-body-${matchId}-${category}`)?.dataset.away
  )
  const o=goalsO[category]?.[sel]?.odds||1
  summaryEl.innerHTML=amount
    ?`<span class="odds-val">Kurz: ${o.toFixed(2)}</span><span class="win-amount">Výhra: ${Math.round(amount*o)} Kč</span>`
    :`<span class="odds-val">Kurz: ${o.toFixed(2)}</span><span style="color:#aaa;">Zadej částku</span>`
}

window.placeMGABet=async function(matchId,category,playerKey){
  const sel=matchGoalsState[`${matchId}-${category}-${playerKey}`]
  const amountEl=document.getElementById(`mga-amount-${matchId}-${category}-${playerKey}`)
  if(!sel||!amountEl) return alert("Vyber tip a zadej částku")
  const amount=Number(amountEl.value)
  if(!amount||amount<=0) return alert("Zadej částku")
  const player=players[playerKey==="kubele"?"Kubele":"Pici"]
  if(player.credit<amount) return alert("Nedostatek kreditu")
  const homeId=document.getElementById(`mga-body-${matchId}-${category}`)?.dataset.home
  const awayId=document.getElementById(`mga-body-${matchId}-${category}`)?.dataset.away
  const goalsO=calcMatchGoalsOdds(homeId,awayId)
  const o=goalsO[category]?.[sel]?.odds||1
  const label=goalsO[category]?.[sel]?.label||sel
  const newCredit=player.credit-amount
  await supabase.from("players").update({credit:newCredit}).eq("id",player.id)
  const{data:betData}=await supabase.from("bets_special").insert({
    match_id:matchId,player_id:player.id,
    type:`match_goals_${category}`,target_id:sel,
    odds:o,amount,potential_win:amount*o,status:"pending"
  }).select().single()
  const homeTeam=teams.find(t=>t.id===homeId)
  const awayTeam=teams.find(t=>t.id===awayId)
  await supabase.from("credit_history").insert({
    player_id:player.id,type:"bet",
    description:`Sázka na góly (${category}) — ${homeTeam?.name||"?"} vs ${awayTeam?.name||"?"} — tip: ${label}`,
    amount:-amount,credit_before:player.credit,credit_after:newCredit,
    bet_id:betData?.id||null,source:"bets_special"
  })
  load()
}

async function load(){
  const{data:t}=await supabase.from("teams").select("*").eq("competition","extraliga")
  teams=t||[]
  const{data:seasons}=await supabase.from("seasons").select("*")
    .eq("competition_id",EXTRALIGA_COMPETITION_ID).order("created_at",{ascending:false})
  const currentSeason=seasons?.[0],prevSeason=seasons?.[1]
  if(!currentSeason){document.getElementById("mainContent").innerHTML=renderComingSoon();return}
  const{data:stages}=await supabase.from("stages").select("*").eq("season_id",currentSeason.id)
  const zakladniStageIds=(stages||[]).filter(s=>s.name==="Základní část").map(s=>s.id)
  playoffStagesByPhase={}
  ;(stages||[]).forEach(s=>{
    const phase=STAGE_NAME_TO_PHASE[s.name]
    if(phase){
      if(!playoffStagesByPhase[phase]) playoffStagesByPhase[phase]=[]
playoffStagesByPhase[phase].push({id:s.id,name:s.name,wins_needed:s.wins_needed||4,initial_wins_home:s.initial_wins_home||0,initial_wins_away:s.initial_wins_away||0})    }
  })
  let prevZakladniStageIds=[]
  if(prevSeason){
    const{data:ps}=await supabase.from("stages").select("*").eq("season_id",prevSeason.id)
    prevZakladniStageIds=(ps||[]).filter(s=>s.name==="Základní část").map(s=>s.id)
  }
  const{data:allPlayed}=await supabase.from("matches").select("*")
    .not("home_score","is",null).not("away_score","is",null).order("round",{ascending:true})
  allPlayedMatches=allPlayed||[]
  const curBasic=allPlayedMatches.filter(m=>zakladniStageIds.includes(m.stage_id))
  currentTeamIds=new Set()
  if(curBasic.length){
    curBasic.forEach(m=>{currentTeamIds.add(m.home_team);currentTeamIds.add(m.away_team)})
  } else {
    const{data:ab}=await supabase.from("matches").select("home_team,away_team")
      .in("stage_id",zakladniStageIds.length?zakladniStageIds:["none"])
    ;(ab||[]).forEach(m=>{currentTeamIds.add(m.home_team);currentTeamIds.add(m.away_team)})
  }
  const prevBasic=prevZakladniStageIds.length
    ?allPlayedMatches.filter(m=>prevZakladniStageIds.includes(m.stage_id)):[]
  const teamCount=currentTeamIds.size||10
  formRatings=calculateFormRatings(curBasic)
  standings=calculateStandings(curBasic)
  goalsOddsMap=calculateGoalsOdds(curBasic,prevBasic,(teamCount-1)*2)
  const allPoStageIds=Object.values(playoffStagesByPhase).flat().map(s=>s.id)
  const{data:poAll}=allPoStageIds.length
    ?await supabase.from("matches").select("*").in("stage_id",allPoStageIds).order("round",{ascending:true})
    :{data:[]}
  playoffMatchesByPhase={}
  Object.entries(playoffStagesByPhase).forEach(([phase,phaseStages])=>{
    const ids=phaseStages.map(s=>s.id)
    playoffMatchesByPhase[phase]=(poAll||[]).filter(m=>ids.includes(m.stage_id))
  })
  const{data:p}=await supabase.from("players").select("*").in("name",["Kubele","Pici"])
  ;(p||[]).forEach(pl=>players[pl.name]=pl)
  const{data:b}=await supabase.from("bets_special").select("*").eq("status","pending")
  specialBets=b||[]
  const allPoMatchIds=(poAll||[]).map(m=>m.id)
  if(allPoMatchIds.length){
    const{data:mb}=await supabase.from("bets").select("*").in("match_id",allPoMatchIds)
    window._matchBets={}
    ;(mb||[]).forEach(b=>{
      if(!window._matchBets[b.match_id]) window._matchBets[b.match_id]=[]
      window._matchBets[b.match_id].push(b)
    })
    const{data:mgb}=await supabase.from("bets_special").select("*")
      .in("match_id",allPoMatchIds).like("type","match_goals_%")
    window._matchGoalsBets={}
    ;(mgb||[]).forEach(b=>{
      if(!window._matchGoalsBets[b.match_id]) window._matchGoalsBets[b.match_id]=[]
      window._matchGoalsBets[b.match_id].push(b)
    })
  } else {
    window._matchBets={}
    window._matchGoalsBets={}
  }
  await loadLocks()
  const matchPhase=PHASES.find(p=>p.id===urlPhase&&(p.type==="matches"||p.type==="playoff"))
  if(matchPhase) currentPhase=urlPhase
  render()
}

function checkTip(match,tip){
  const type=match.result_type
  const hg=Number(match.home_score),ag=Number(match.away_score)
  const hw=hg>ag,aw=ag>hg,isOTorSN=(type==="OT"||type==="SN")
  switch(tip){
    case "1": return hw&&type==="REG"
    case "0": return isOTorSN
    case "2": return aw&&type==="REG"
    case "11": return!(aw&&type==="REG")
    case "no_draw": return type==="REG"
    case "22": return!(hw&&type==="REG")
    case "vdr_home": return hw
    case "vdr_away": return aw
  }
  return false
}

function getH2H(homeId,awayId){
  return allPlayedMatches
    .filter(m=>(m.home_team===homeId&&m.away_team===awayId)||(m.home_team===awayId&&m.away_team===homeId))
    .slice(-5).reverse()
}
function renderH2HHtml(homeId,awayId){
  const h2h=getH2H(homeId,awayId)
  if(!h2h.length) return `<div class="h2h-empty">Žádné vzájemné zápasy</div>`
  return h2h.map(m=>{
    const home=teams.find(t=>t.id===m.home_team),away=teams.find(t=>t.id===m.away_team)
    if(!home||!away) return ""
    const hg=Number(m.home_score),ag=Number(m.away_score),homeWin=hg>ag
    let s=null;try{s=m.stats?JSON.parse(m.stats):null}catch(e){}
    const isSN=s&&(s[20]==="1"||s[20]==="2")
    const isOT=s&&!isSN&&(s[9]==="11"||s[19]==="11")
    const tag=isSN?"SN":isOT?"OT":""
    return `<div class="h2h-row">
      <span class="h2h-teams">
        <span class="${homeWin?"h2h-winner":"h2h-loser"}">${home.name.replace(/\(.\)$/,'').trim()}</span>
        vs
        <span class="${homeWin?"h2h-loser":"h2h-winner"}">${away.name.replace(/\(.\)$/,'').trim()}</span>
      </span>
      <span class="h2h-score">${hg} : ${ag}</span>
      ${tag?`<span class="h2h-tag">${tag}</span>`:""}
    </div>`
  }).join("")
}

    const o=oddsMap[t.id];if(!o) return ""

    const teamCell=`<div class="team-cell">
      <img class="logo" src="./logos/${t.logo}" onerror="this.style.display='none'">

    if(locked) return `<tr>

      <td class="tc"><span class="odds-badge">${o.toFixed(2)}</span></td>
      <td colspan="3"><span class="closed-badge">🔒 Uzavřeno</span></td>
    </tr>`
    return `<tr>
      <td data-label="Tým">${teamCell}</td>
      <td class="tc"><span class="odds-badge">${o.toFixed(2)}</span></td>
      <td><input class="bet-input" id="a_${id}" type="number" min="1" placeholder="Kč" oninput="updateWin('${playerName}','${t.id}','${dbType}',${o})"></td>

  }).join("")
  return `<div class="player-card">
    <div class="player-card-header"><span class="player-name">${playerName}</span><span class="player-credit">💰 ${Math.round(p.credit)} Kč</span></div>
    <table class="bet-table">
      <thead><tr><th>Tým</th><th class="tc" style="white-space:nowrap;width:60px">Kurz</th><th style="white-space:nowrap;width:90px">Vsadit</th><th style="white-space:nowrap;width:80px">Výhra</th><th style="width:80px"></th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`
}

function renderMatchesPhase(phase){
  const phaseStages=playoffStagesByPhase[phase]||[]
  const allMatches=playoffMatchesByPhase[phase]||[]
  if(!allMatches.length) return renderComingSoon()
  const byStage={}
  allMatches.forEach(m=>{
    if(!byStage[m.stage_id]) byStage[m.stage_id]=[]
    byStage[m.stage_id].push(m)
  })
  let html=""
  phaseStages.forEach(stage=>{
    const matches=byStage[stage.id]||[]
    if(!matches.length) return
    const firstMatch=matches[0]
    const home=teams.find(t=>t.id===firstMatch.home_team)
    const away=teams.find(t=>t.id===firstMatch.away_team)
    if(!home||!away) return
    const winsNeeded=stage.wins_needed||4
    const seriesOdds=calcSeriesOdds(home.id,away.id)
const stageData=playoffStagesByPhase[currentPhase]?.find(s=>s.id===stage.id)||{}
    const initHome=stageData.initial_wins_home||0
    const initAway=stageData.initial_wins_away||0
    const gamesOdds=calcGamesOdds(home.id,away.id,winsNeeded,initHome,initAway)
    ;["kubele","pici"].forEach(pk=>{
      winnerState[`sw_odds_${stage.id}_${pk}`]={[home.id]:seriesOdds.home,[away.id]:seriesOdds.away}
      gamesState[`sg_odds_${stage.id}_${pk}`]=gamesOdds
    })
    let wHome=0,wAway=0
    matches.forEach(m=>{
      if(!m.played||m.home_score==null) return
      if(Number(m.home_score)>Number(m.away_score)) wHome++
      else wAway++
    })
    const playedCount=matches.filter(m=>m.played&&m.home_score!=null).length
    const scoreStr=playedCount>0?`${wHome} : ${wAway}`:"Nezačalo"
    const kubele=players["Kubele"],pici=players["Pici"]
    html+=`
    <div class="serie-accordion" id="serie-${stage.id}">
      <div class="serie-header" id="serie-header-${stage.id}" onclick="toggleSerie('${stage.id}')">
        <div class="serie-header-left">
          <div class="serie-logos">
            <img class="serie-logo" src="./logos/${home.logo}" onerror="this.style.display='none'">
            <img class="serie-logo" src="./logos/${away.logo}" onerror="this.style.display='none'">
          </div>
          <div>
            <div class="serie-title">${home.name} vs ${away.name}</div>
            <div class="serie-subtitle">Na ${winsNeeded} vítězné · ${playedCount} odehráno</div>
          </div>
        </div>
        <div class="serie-header-right">
          <span class="serie-score-badge">Série: ${scoreStr}</span>
          <span class="serie-arrow">▼</span>
        </div>
      </div>
      <div class="serie-body" id="serie-body-${stage.id}">
        <div class="serie-tips-section">
          <div class="serie-tips-title">🎲 Tipy na sérii</div>
          <div class="serie-tips-players">
            ${renderSeriePlayerTips(stage.id,"kubele",kubele,home,away,seriesOdds,gamesOdds,winsNeeded)}
            ${renderSeriePlayerTips(stage.id,"pici",  pici,  home,away,seriesOdds,gamesOdds,winsNeeded)}
          </div>
        </div>
        <div style="padding:16px 18px 8px;background:var(--bg);">
          <div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;">🏒 Jednotlivé zápasy</div>
        </div>
${matches.slice().sort((a,b)=>Number(a.round)-Number(b.round))
          .map((m,idx)=>renderMatchCard(m,idx+1,stage.name)).join("")}
      </div>
    </div>`
  })
  if(urlStage&&byStage[urlStage]){
    setTimeout(()=>{
      const body=document.getElementById(`serie-body-${urlStage}`)
      const header=document.getElementById(`serie-header-${urlStage}`)
      if(body&&header){
        body.classList.add("open");header.classList.add("open")
        document.getElementById(`serie-${urlStage}`)?.scrollIntoView({behavior:"smooth",block:"start"})
      }
    },150)
  }
  return html||renderComingSoon()
}

function renderSeriePlayerTips(stageId,playerKey,player,home,away,seriesOdds,gamesOdds,winsNeeded){
  if(!player) return ""
  const kubeName=playerKey==="kubele"?"Kubele":"Pici"
  const existingWinner=getSerieWinnerBet(player.id,stageId)
  const existingGames=getSerieGamesBet(player.id,stageId)
  let winnerBlock=""
  if(existingWinner){
    const team=teams.find(t=>t.id===existingWinner.target_id)
    winnerBlock=`<div class="tip-block">
      <div class="tip-block-label">Kdo postoupí?</div>
      <span class="locked-badge">✓ ${team?.name||"?"} · kurz ${existingWinner.odds} · ${existingWinner.amount} Kč → ${Math.round(existingWinner.potential_win)} Kč</span>
    </div>`
  } else {
    winnerBlock=`<div class="tip-block">
      <div class="tip-block-label">Kdo postoupí?</div>
      <div class="winner-btns">
        <div class="winner-btn" data-stage="${stageId}" data-player="${playerKey}" data-team="${home.id}"
          onclick="serieSelectWinner('${stageId}','${playerKey}','${home.id}')">
          <span class="wb-name">${home.name}</span>
          <span class="wb-odds">${seriesOdds.home.toFixed(2)} · ${seriesOdds.probHome}%</span>
        </div>
        <div class="winner-btn" data-stage="${stageId}" data-player="${playerKey}" data-team="${away.id}"
          onclick="serieSelectWinner('${stageId}','${playerKey}','${away.id}')">
          <span class="wb-name">${away.name}</span>
          <span class="wb-odds">${seriesOdds.away.toFixed(2)} · ${seriesOdds.probAway}%</span>
        </div>
      </div>
      <div class="tip-amount-row">
        <span class="tip-amount-label">Částka:</span>
        <input class="bet-input" id="winner_amount_${stageId}_${playerKey}" type="number" min="1" placeholder="Kč"
          oninput="updateWinnerAmount('${stageId}','${playerKey}')">
      </div>
      <div class="tip-summary" id="winner_summary_${stageId}_${playerKey}"><span style="color:#aaa;">Vyber tým</span></div>
      <button class="bet-btn" style="width:100%;padding:8px;" onclick="placeWinnerBet('${stageId}','${playerKey}')">🎲 Vsadit — postup</button>
    </div>`
  }
  let gamesBlock=""
  if(existingGames){
    gamesBlock=`<div class="tip-block">
      <div class="tip-block-label">Na kolik zápasů?</div>
      <span class="locked-badge">✓ ${existingGames.odds}× za ${existingGames.amount} Kč → ${Math.round(existingGames.potential_win)} Kč</span>
    </div>`
  } else if(!winsNeeded||winsNeeded<1){
    gamesBlock=`<div class="tip-block">
      <div class="tip-block-label">Na kolik zápasů?</div>
      <div class="games-btn-na">Čeká se na nastavení formátu série</div>
    </div>`
  } else {
    const gamesBtnsHtml=Object.entries(gamesOdds).map(([k,o])=>`
      <button class="games-btn" data-stage="${stageId}" data-player="${playerKey}" data-games="${k}"
        onclick="serieSelectGames('${stageId}','${playerKey}',${k})">
        <span class="gb-num">${k} zápasů</span>
        <span class="gb-odds">${o.toFixed(2)}</span>
      </button>`).join("")
    gamesBlock=`<div class="tip-block">
      <div class="tip-block-label">Na kolik zápasů?</div>
      <div class="games-btns">${gamesBtnsHtml}</div>
      <div class="tip-amount-row">
        <span class="tip-amount-label">Částka:</span>
        <input class="bet-input" id="games_amount_${stageId}_${playerKey}" type="number" min="1" placeholder="Kč"
          oninput="updateGamesAmount('${stageId}','${playerKey}')">
      </div>
      <div class="tip-summary" id="games_summary_${stageId}_${playerKey}"><span style="color:#aaa;">Vyber počet zápasů</span></div>
      <button class="bet-btn" style="width:100%;padding:8px;" onclick="placeGamesBet('${stageId}','${playerKey}')">🎲 Vsadit — počet zápasů</button>
    </div>`
  }
  return `<div class="serie-tips-player">
    <div class="serie-tips-player-name">${kubeName}</div>
    <div class="serie-tips-player-credit">💰 ${Math.round(player.credit)} Kč</div>
    ${winnerBlock}
    ${gamesBlock}
  </div>`
}

function renderMatchCard(m,gameNumber,phaseName){
  const home=teams.find(t=>t.id===m.home_team),away=teams.find(t=>t.id===m.away_team)
  if(!home||!away) return ""
  const homeShort=home.short_name||home.name,awayShort=away.short_name||away.name
  const tips=getTips(homeShort,awayShort)
  const matchOdds=calcMatchOdds(formRatings.elo[home.id]||1000,formRatings.elo[away.id]||1000)
  const homeForm=formRatings.forma[home.id]||1000,awayForm=formRatings.forma[away.id]||1000
  const played=m.played&&m.home_score!=null
  const seriesOdds=calcSeriesOdds(home.id,away.id)
  ;["kubele","pici"].forEach(pk=>{
    const key=`${m.id}_${pk}`
    if(!matchState[key]) matchState[key]={selected:[],oddsMap:matchOdds}
    else matchState[key].oddsMap=matchOdds
  })
  const kubele=players["Kubele"],pici=players["Pici"]
  const matchBets=(window._matchBets||{})[m.id]||[]
  const matchGoalsBets=(window._matchGoalsBets||{})[m.id]||[]
  const mgo=calcMatchGoalsOdds(home.id,away.id)
  const goalsSections=[
    {category:"total", title:`🏒 Počet gólů celkem`,                              oddsMap:mgo.total},
    {category:"home",  title:`<img src="./logos/${home.logo}" style="width:16px;height:16px;object-fit:contain;vertical-align:middle;border-radius:3px;margin-right:4px;" onerror="this.style.display='none'"> Góly — ${home.name.replace(/\(.\)$/,'').trim()}`, oddsMap:mgo.home},
    {category:"away",  title:`<img src="./logos/${away.logo}" style="width:16px;height:16px;object-fit:contain;vertical-align:middle;border-radius:3px;margin-right:4px;" onerror="this.style.display='none'"> Góly — ${away.name.replace(/\(.\)$/,'').trim()}`, oddsMap:mgo.away},
    {category:"diff",  title:"📊 Rozdíl gólů",                                    oddsMap:mgo.diff},
  ]

  return `
  <div class="match-wrap">
    <div class="match-card">
      <div class="match-header">
        <span class="match-header-title">${home.name} — ${away.name}</span>
        <span class="match-header-num">${gameNumber}. zápas · ${phaseName}</span>
      </div>
      <div class="match-teams">
        <div class="match-team">
          <img class="match-team-logo" src="./logos/${home.logo}" onerror="this.style.display='none'">
          <div class="match-team-name">${home.name}</div>
          <div class="match-team-info">${seriesOdds.homePos>0?seriesOdds.homePos+". místo ZČ":"—"} · Forma: ${homeForm}</div>
        </div>
        <div class="match-score">
          ${played?`<div class="match-score-main">${m.home_score} : ${m.away_score}</div>`:`<div class="match-score-vs">vs</div>`}
        </div>
        <div class="match-team">
          <img class="match-team-logo" src="./logos/${away.logo}" onerror="this.style.display='none'">
          <div class="match-team-name">${away.name}</div>
          <div class="match-team-info">${seriesOdds.awayPos>0?seriesOdds.awayPos+". místo ZČ":"—"} · Forma: ${awayForm}</div>
        </div>
      </div>
      <div class="match-h2h">
        <div class="match-h2h-title">⚔️ Posledních 5 vzájemných zápasů</div>
        <div class="match-h2h-list">${renderH2HHtml(home.id,away.id)}</div>
      </div>
      <div class="match-players">
        ${renderMatchPlayerBlock(m,kubele,"kubele",tips,matchOdds,matchBets,played)}
        ${renderMatchPlayerBlock(m,pici,  "pici",  tips,matchOdds,matchBets,played)}
      </div>
      <div class="goals-divider">
        <div class="goals-divider-line"></div>
        <span class="goals-divider-label">Tipování gólů</span>
        <div class="goals-divider-line"></div>
      </div>
      ${goalsSections.map(s=>renderMGASection(m.id,s.category,s.title,s.oddsMap,home.id,away.id,matchGoalsBets,m,played)).join("")}
    </div>
  </div>`
}

function renderMatchPlayerBlock(m,player,playerKey,tips,oddsMap,matchBets,played){
  if(!player) return ""
  const existing=matchBets.find(b=>b.player_id===player.id)||null
  if(existing){
    const tips_arr=existing.tip.split(",")
    let resultHtml=""
    if(played){
      const won=tips_arr.every(t=>checkTip(m,t))
      resultHtml=won
        ?`<div style="color:#16a34a;font-weight:800;font-size:13px;">🎉 Výhra ${Math.round(existing.potential_win)} Kč!</div>`
        :`<div style="color:#dc2626;font-weight:700;font-size:12px;">❌ Prohra (${existing.amount} Kč)</div>`
    } else {
      resultHtml=`<div style="font-size:12px;color:var(--muted);">Kurz: ${existing.odds.toFixed(2)} · Možná výhra: <b>${Math.round(existing.potential_win)} Kč</b></div>`
    }
    return `<div class="match-player">
      <div class="match-player-name">${player.name}</div>
      <div class="match-player-credit">💰 ${Math.round(player.credit)} Kč</div>
      <span class="locked-badge" style="margin-bottom:6px;">✓ ${tips_arr.join(" + ")} · ${existing.amount} Kč</span>
      <div style="margin-top:6px;">${resultHtml}</div>
    </div>`
  }
  if(played){
    return `<div class="match-player">
      <div class="match-player-name">${player.name}</div>
      <div class="match-player-credit">💰 ${Math.round(player.credit)} Kč</div>
      <div style="font-size:12px;color:var(--muted);font-style:italic;">Zápas již byl odehrán.</div>
    </div>`
  }
  const tipsHtml=tips.map(({type,label})=>{
    if(type==="__empty") return `<div class="match-odd-btn placeholder"></div>`
    const o=oddsMap[type];if(!o) return `<div class="match-odd-btn placeholder"></div>`
    return `<div class="match-odd-btn" data-match="${m.id}" data-player="${playerKey}" data-type="${type}"
      onclick="matchSelectTip('${m.id}','${playerKey}','${type}')">
      <span class="mob-type">${label}</span>
      <span class="mob-val">${o.toFixed(2)}</span>
    </div>`
  }).join("")
  return `<div class="match-player">
    <div class="match-player-name">${player.name}</div>
    <div class="match-player-credit">💰 ${Math.round(player.credit)} Kč</div>
    <div class="match-odds-grid">${tipsHtml}</div>
    <div class="match-amount-label">Částka (Kč)</div>
    <input class="match-amount-input" id="match_amount_${m.id}_${playerKey}" type="number" min="1" placeholder="0 Kč"
      oninput="updateMatchAmount('${m.id}','${playerKey}')">
    <div class="match-summary" id="match_summary_${m.id}_${playerKey}"><span style="color:#aaa;">Vyber tip a částku</span></div>
    <button class="match-vsadit-btn" onclick="placeMatchBet('${m.id}','${playerKey}')">🎲 Vsadit</button>
  </div>`
}

function playerBetTable(playerName,oddsMap,dbType){
  const p=players[playerName];if(!p) return ""
  const ct=teams.filter(t=>currentTeamIds.has(t.id))
  const sorted=ct.slice().sort((a,b)=>(oddsMap[a.id]||99)-(oddsMap[b.id]||99))
  let rows=sorted.map(t=>{
    const o=oddsMap[t.id];if(!o) return ""
    const existing=getSpecialBet(p.id,t.id,dbType)
    const locked=isLocked(dbType,t.id)
    const id=`${playerName}_${t.id}_${dbType}`
    const teamCell=`<div class="team-cell">
      <img class="logo" src="./logos/${t.logo}" onerror="this.style.display='none'">
      <div class="team-info-wrap">
        <span class="team-name">${t.name}</span>
        <div class="team-meta">${renderTeamMeta(t)}</div>
      </div>
    </div>`
    if(existing) return `<tr>
      <td data-label="Tým">${teamCell}</td>
      <td class="tc"><span class="odds-badge">${o.toFixed(2)}</span></td>
      <td>${existing.amount} Kč</td>
      <td>${Math.round(existing.potential_win)} Kč</td>
      <td><span class="locked-badge">✓ Vsazeno</span></td>
    </tr>`
    if(locked) return `<tr>
      <td data-label="Tým">${teamCell}</td>
      <td class="tc"><span class="odds-badge">${o.toFixed(2)}</span></td>
      <td colspan="3"><span class="closed-badge">🔒 Uzavřeno</span></td>
    </tr>`
    return `<tr>
      <td data-label="Tým">${teamCell}</td>
      <td class="tc"><span class="odds-badge">${o.toFixed(2)}</span></td>
      <td><input class="bet-input" id="a_${id}" type="number" min="1" placeholder="Kč" oninput="updateWin('${playerName}','${t.id}','${dbType}',${o})"></td>
      <td><span class="win-display" id="w_${id}">—</span></td>
      <td><button class="bet-btn" onclick="bet('${playerName}','${t.id}',${o},'${dbType}')">Vsadit</button></td>
    </tr>`
  }).join("")
  return `<div class="player-card">
    <div class="player-card-header"><span class="player-name">${playerName}</span><span class="player-credit">💰 ${Math.round(p.credit)} Kč</span></div>
    <table class="bet-table">
      <thead><tr><th>Tým</th><th class="tc" style="white-space:nowrap;width:60px">Kurz</th><th style="white-space:nowrap;width:90px">Vsadit</th><th style="white-space:nowrap;width:80px">Výhra</th><th style="width:80px"></th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`
}

function goalsPlayerBlock(playerName){
  const p=players[playerName];if(!p) return ""
  const currentTeams=teams.filter(t=>currentTeamIds.has(t.id)&&goalsOddsMap[t.id])
  if(!currentTeams.length) return ""
  const rows=currentTeams.map(t=>{
    const odds=goalsOddsMap[t.id];if(!odds) return ""
    const existing=getExistingGoalBet(p.id,t.id)
    const locked=isLocked("goals_regular_season",t.id)
    if(existing){
      const thr=existing.type.split("_")[1]
      return `<div class="goals-team-row">
        <div class="team-cell"><img class="logo" src="./logos/${t.logo}" onerror="this.style.display='none'"><span class="team-name">${t.name}</span></div>
        <div style="font-size:13px;font-weight:600">${thr}+ gólů · kurz ${existing.odds}</div>
        <div style="font-size:13px">${existing.amount} Kč → <b>${Math.round(existing.potential_win)} Kč</b></div>
        <div><span class="locked-badge">✓ Vsazeno</span></div>
      </div>`
    }
    if(locked) return `<div class="goals-team-row">
      <div class="team-cell"><img class="logo" src="./logos/${t.logo}" onerror="this.style.display='none'"><span class="team-name">${t.name}</span></div>
      <div style="font-size:13px;color:var(--muted)">${["25","30","35"].map(thr=>`${thr}+: ${odds[thr]}`).join(" · ")}</div>
      <div><span class="closed-badge">🔒 Uzavřeno</span></div><div></div>
    </div>`
    return `<div class="goals-team-row">
      <div class="team-cell"><img class="logo" src="./logos/${t.logo}" onerror="this.style.display='none'"><span class="team-name">${t.name}</span></div>
      <div class="goal-btns">
        ${["25","30","35"].map(thr=>`
          <button class="goal-btn" id="gbtn_${playerName}_${t.id}_${thr}" onclick="selectGoal('${playerName}','${t.id}','${thr}')">
            <span class="goal-btn-label">${thr}+</span>
            <span class="goal-btn-odds">${odds[thr]}</span>
          </button>`).join("")}
      </div>
      <div class="goal-input-wrap">
        <input class="bet-input" id="gi_${playerName}_${t.id}" type="number" min="1" placeholder="Kč" oninput="updateGoalWin('${playerName}','${t.id}')">
        <span class="goal-win" id="gw_${playerName}_${t.id}">—</span>
      </div>
      <button class="bet-btn" onclick="betGoals('${playerName}','${t.id}')">Vsadit</button>
    </div>`
  }).join("")
  return `<div class="goals-player-card">
    <div class="player-card-header"><span class="player-name">${playerName}</span><span class="player-credit">💰 ${Math.round(p.credit)} Kč</span></div>
    <div class="goals-header-row"><span>Tým</span><span>Vyber tip</span><span>Částka / Výhra</span><span></span></div>
    ${rows}
  </div>`
}

function renderComingSoon(){
  return `<div class="coming-soon">
    <div class="coming-soon-icon">🏒</div>
    <div class="coming-soon-title">Zatím žádné zápasy</div>
    <div class="coming-soon-sub">Sázky se zobrazí jakmile budou přidány zápasy do této fáze.</div>
  </div>`
}

function renderSection(section){
  const wo=calculateWinnerOdds(),nwo=calculateNonWinnerOdds(),lo=calculateLastOdds(),eo=calculateEqualOdds()
  let html=`<div class="section-label-wrap">
    <div class="section-label-text">${section.title}</div>
    <div class="section-label-line"></div>
  </div>`
  if(section.type==="goals"){html+=goalsPlayerBlock("Kubele")+goalsPlayerBlock("Pici");return html}
  const oddsMap=section.type==="winner"?wo:section.type==="nonwinner"?nwo:section.type==="last"?lo:eo
  html+=`<div class="players-grid">${playerBetTable("Kubele",oddsMap,section.dbType)}${playerBetTable("Pici",oddsMap,section.dbType)}</div>`
  return html
}

async function render(){
  const phase=PHASES.find(p=>p.id===currentPhase)
  const content=document.getElementById("mainContent")
  if(phase?.type==="playoff") content.innerHTML=renderPlayoffOverall()
  else if(phase?.type==="matches") content.innerHTML=renderMatchesPhase(currentPhase)
  else if(phase?.type==="special") content.innerHTML=SPECIAL_SECTIONS.map(renderSection).join("")
  else content.innerHTML=renderComingSoon()
}

renderPhaseTabs()
load()
