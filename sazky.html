<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sázky – Extraliga</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0b2a3c;
  --navy2:#1a5276;
  --gold:#f0c040;
  --green:#27ae60;
  --bg:#f0f4f8;
  --white:#fff;
  --muted:#6b7a8d;
  --border:#e2e8f0;
  --text:#1a2a3c;
  --radius:10px;
  --radius-lg:14px;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

.site-header{background:var(--navy);padding:16px 24px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:100;border-bottom:2px solid rgba(240,192,64,.25)}
.header-logo{font-size:20px;font-weight:700;color:#fff;letter-spacing:.3px}
.header-logo span{color:var(--gold)}

.phase-bar{background:var(--white);border-bottom:1px solid var(--border);padding:0 24px;display:flex;gap:4px;overflow-x:auto;justify-content:center;}
.phase-tab{padding:10px 16px;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2.5px solid transparent;transition:all .15s;white-space:nowrap;background:none;border-top:none;border-left:none;border-right:none;font-family:'Inter',sans-serif}
.phase-tab:hover{color:var(--text)}
.phase-tab.active{color:var(--navy);border-bottom-color:var(--navy2)}

.wrapper{max-width:1240px;margin:0 auto;padding:24px 20px 60px}

.players-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
@media(max-width:800px){.players-grid{grid-template-columns:1fr}}

.player-card{background:var(--white);border-radius:var(--radius-lg);border:1px solid var(--border);overflow:hidden}
.player-card-header{background:var(--navy);padding:14px 18px;display:flex;align-items:center;justify-content:space-between}
.player-name{font-size:15px;font-weight:700;color:#fff}
.player-credit{font-size:13px;font-weight:600;color:var(--gold);background:rgba(240,192,64,.12);padding:4px 10px;border-radius:20px}

.bet-table{width:100%;border-collapse:collapse}
.bet-table thead tr{background:#f7fafc}
.bet-table th{padding:9px 12px;text-align:left;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--border)}
.bet-table th.tc{text-align:center}
.bet-table tbody td{padding:10px 12px;border-bottom:1px solid #f0f4f8;vertical-align:middle;font-size:13px}
.bet-table tbody tr:last-child td{border-bottom:none}
.bet-table tbody tr:hover td{background:#f7fafc}

.team-cell{display:flex;align-items:center;gap:8px}
.logo{width:28px;height:28px;object-fit:contain;background:#fff;border-radius:5px;padding:2px;border:1px solid var(--border);flex-shrink:0}
.team-name{font-weight:600;font-size:13px}
.odds-badge{display:inline-block;background:#eef2f7;border-radius:6px;padding:3px 9px;font-weight:700;font-size:13px;color:var(--navy);min-width:44px;text-align:center}
.form-val{font-size:12px;color:var(--muted);font-weight:500}
.bet-input{width:80px;padding:6px 8px;border:1px solid var(--border);border-radius:7px;font-size:13px;font-family:'Inter',sans-serif;transition:border-color .15s}
.bet-input:focus{outline:none;border-color:var(--navy2)}
.win-display{font-size:13px;font-weight:600;color:var(--green);min-width:70px;text-align:right}
.bet-btn{background:var(--green);color:#fff;border:none;border-radius:7px;padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;white-space:nowrap;transition:background .15s}
.bet-btn:hover{background:#219a52}
.bet-btn:disabled{background:#aaa;cursor:not-allowed}
.locked-badge{font-size:11px;font-weight:600;color:#27ae60;background:#eafaf1;border-radius:6px;padding:4px 10px;white-space:nowrap}
.closed-badge{font-size:11px;font-weight:600;color:#721c24;background:#f8d7da;border-radius:6px;padding:4px 10px;white-space:nowrap}

.goals-player-card{background:var(--white);border-radius:var(--radius-lg);border:1px solid var(--border);overflow:hidden;margin-bottom:16px}
.goals-team-row{display:grid;grid-template-columns:180px 1fr 160px 90px;gap:12px;align-items:center;padding:12px 16px;border-bottom:1px solid #f0f4f8}
.goals-team-row:last-child{border-bottom:none}
.goals-header-row{display:grid;grid-template-columns:180px 1fr 160px 90px;gap:12px;padding:9px 16px;background:#f7fafc;border-bottom:1px solid var(--border)}
.goals-header-row span{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
.goal-btns{display:flex;gap:6px}
.goal-btn{flex:1;padding:8px 4px;background:#eef2f7;border:1.5px solid var(--border);border-radius:8px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;transition:all .15s;font-family:'Inter',sans-serif}
.goal-btn:hover{background:#e2e8f0;border-color:#b0c4d8}
.goal-btn.selected{background:var(--navy);border-color:var(--navy)}
.goal-btn.selected .goal-btn-label{color:#fff}
.goal-btn.selected .goal-btn-odds{color:rgba(255,255,255,.8)}
.goal-btn-label{font-size:13px;font-weight:700;color:var(--text)}
.goal-btn-odds{font-size:10px;color:var(--muted)}
.goal-input-wrap{display:flex;flex-direction:column;gap:4px}
.goal-win{font-size:12px;font-weight:600;color:var(--green)}

.section-label-wrap{margin:32px 0 16px;display:flex;align-items:center;gap:0;}
.section-label-text{background:var(--navy);color:#fff;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;padding:7px 18px;border-radius:8px 0 0 8px;white-space:nowrap;}
.section-label-line{flex:1;height:3px;background:linear-gradient(90deg,var(--navy2),transparent);border-radius:0 2px 2px 0;}

/* ── PLAY OFF VNITŘNÍ NAVIGACE ── */
.playoff-subnav{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px;}
.playoff-subbtn{padding:8px 18px;border-radius:20px;border:2px solid var(--border);background:var(--white);font-family:'Inter',sans-serif;font-size:13px;font-weight:600;cursor:pointer;color:var(--muted);transition:all .15s;white-space:nowrap;}
.playoff-subbtn:hover{border-color:var(--navy2);color:var(--navy);}
.playoff-subbtn.active{background:var(--navy);color:#fff;border-color:var(--navy);}

/* ── PLAY OFF CELKOVÉ TIPY ── */
.playoff-overall-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:24px;}
@media(max-width:900px){.playoff-overall-grid{grid-template-columns:1fr 1fr;}}
@media(max-width:600px){.playoff-overall-grid{grid-template-columns:1fr;}}

.playoff-overall-card{background:var(--white);border-radius:var(--radius-lg);border:1px solid var(--border);overflow:hidden;}
.playoff-overall-header{background:linear-gradient(135deg,var(--navy),var(--navy2));padding:10px 16px;}
.playoff-overall-title{font-size:13px;font-weight:700;color:#fff;}
.playoff-overall-sub{font-size:11px;color:rgba(255,255,255,.6);margin-top:2px;}

/* ── SÉRIE SÁZKY ── */
.serie-bet-card{background:var(--white);border-radius:var(--radius-lg);border:1px solid var(--border);overflow:hidden;margin-bottom:16px;}
.serie-bet-header{background:linear-gradient(135deg,var(--navy),var(--navy2));padding:12px 18px;display:flex;align-items:center;justify-content:space-between;gap:10px;}
.serie-bet-title{font-size:14px;font-weight:700;color:#fff;}
.serie-bet-format{font-size:11px;color:var(--gold);font-weight:600;background:rgba(240,192,64,.15);padding:3px 10px;border-radius:20px;white-space:nowrap;}
.serie-bet-teams{display:flex;align-items:center;gap:10px;padding:12px 18px;border-bottom:1px solid var(--border);background:#f7fafc;}
.serie-bet-team{display:flex;align-items:center;gap:8px;}
.serie-bet-logo{width:28px;height:28px;object-fit:contain;background:#fff;border-radius:5px;padding:2px;border:1px solid var(--border);}
.serie-bet-teamname{font-size:13px;font-weight:700;color:var(--text);}
.serie-bet-pos{font-size:11px;color:var(--muted);}
.serie-bet-vs{font-size:13px;font-weight:700;color:var(--muted);padding:0 6px;}

.serie-sections{padding:16px 18px;display:flex;flex-direction:column;gap:20px;}
.serie-section-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;}

/* Tlačítka pro počet zápasů */
.games-btns{display:flex;gap:6px;flex-wrap:wrap;}
.games-btn{padding:7px 14px;background:#eef2f7;border:1.5px solid var(--border);border-radius:8px;cursor:pointer;font-family:'Inter',sans-serif;font-size:12px;font-weight:700;color:var(--navy);transition:all .15s;}
.games-btn:hover{background:#e2e8f0;border-color:#b0c4d8;}
.games-btn.selected{background:var(--navy);border-color:var(--navy);color:#fff;}

/* Hráčské sekce v sérii */
.serie-players{display:grid;grid-template-columns:1fr 1fr;gap:0;border-top:1px solid var(--border);}
.serie-player{padding:14px 18px;border-right:1px solid var(--border);}
.serie-player:last-child{border-right:none;}
.serie-player-name{font-size:13px;font-weight:700;color:var(--navy);margin-bottom:2px;}
.serie-player-credit{font-size:11px;color:var(--muted);margin-bottom:10px;}

.serie-tip-section{margin-bottom:14px;}
.serie-tip-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;}
.serie-winner-btns{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px;}
.serie-winner-btn{padding:8px;background:#eef2f7;border:1.5px solid var(--border);border-radius:8px;cursor:pointer;font-family:'Inter',sans-serif;text-align:center;transition:all .15s;}
.serie-winner-btn:hover{background:#e2e8f0;border-color:#b0c4d8;}
.serie-winner-btn.selected{background:var(--navy);border-color:var(--navy);color:#fff;}
.serie-winner-btn.selected .swb-odds{color:#7ab0cc;}
.swb-name{font-size:11px;font-weight:700;display:block;line-height:1.3;}
.swb-odds{font-size:11px;color:var(--muted);display:block;margin-top:2px;}

.serie-amount-row{display:flex;align-items:center;gap:8px;margin-top:8px;}
.serie-amount-label{font-size:11px;color:var(--muted);white-space:nowrap;}
.serie-summary{font-size:12px;color:var(--muted);margin:6px 0 8px;min-height:18px;}
.serie-summary .win-amount{font-weight:700;color:var(--green);}
.serie-summary .odds-val{font-weight:700;color:var(--navy2);}

.po-card{background:var(--white);border-bottom:1px solid var(--border);overflow:hidden;}
.po-card:last-child{border-bottom:none;}
.po-header{background:linear-gradient(135deg,var(--navy),var(--navy2));padding:10px 18px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;}
.po-header-title{font-size:13px;font-weight:700;color:#fff;}
.po-header-right{display:flex;align-items:center;gap:8px;}
.po-header-game{font-size:11px;color:rgba(255,255,255,.7);font-weight:600;background:rgba(255,255,255,.12);padding:3px 10px;border-radius:20px;}
.po-header-phase{font-size:11px;color:var(--gold);font-weight:600;background:rgba(240,192,64,.15);padding:3px 10px;border-radius:20px;}
.po-teams{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:16px;padding:16px 20px;border-bottom:1px solid var(--border);}
.po-team{display:flex;flex-direction:column;align-items:center;gap:5px;text-align:center;}
.po-team-logo{width:44px;height:44px;object-fit:contain;background:#fff;border-radius:8px;padding:3px;border:1px solid var(--border);}
.po-team-name{font-size:13px;font-weight:700;color:var(--text);}
.po-team-meta{display:flex;flex-direction:column;gap:1px;align-items:center;}
.po-team-pos{font-size:11px;color:var(--muted);}
.po-team-rating{font-size:11px;color:var(--muted);}
.po-score{text-align:center;}
.po-score-main{font-size:26px;font-weight:800;color:var(--navy);line-height:1;}
.po-score-vs{font-size:16px;font-weight:700;color:var(--muted);}
.po-odds-strip{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(--border);}
.po-odd{padding:10px 18px;border-right:1px solid var(--border);}
.po-odd:last-child{border-right:none;}
.po-odd-label{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px;}
.po-odd-sublabel{font-size:10px;color:var(--muted);margin-bottom:3px;font-style:italic;}
.po-odd-val{font-size:20px;font-weight:800;color:var(--navy);}
.po-odd-prob{font-size:11px;color:var(--muted);margin-top:1px;}
.po-h2h{padding:8px 18px;background:#f7fafc;border-bottom:1px solid var(--border);}
.po-h2h-title{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;}
.po-h2h-list{display:flex;flex-direction:column;gap:3px;}
.po-h2h-row{display:flex;align-items:center;gap:8px;font-size:12px;background:var(--white);border-radius:6px;padding:4px 10px;border:1px solid var(--border);}
.po-h2h-teams{flex:1;font-size:11px;color:var(--muted);}
.po-h2h-winner{color:#166534;font-weight:700;}
.po-h2h-loser{color:#991b1b;}
.po-h2h-score{font-weight:800;color:var(--text);background:#eef2f7;padding:2px 8px;border-radius:5px;font-size:12px;flex-shrink:0;}
.po-h2h-tag{font-size:9px;font-weight:700;background:#2f9ec9;color:#fff;padding:1px 5px;border-radius:4px;flex-shrink:0;}
.po-h2h-empty{font-size:12px;color:var(--muted);font-style:italic;}
.po-h2h-note{font-size:11px;color:var(--muted);margin-top:5px;display:flex;align-items:center;gap:5px;}
.po-players{display:grid;grid-template-columns:1fr 1fr;}
.po-player{padding:14px 18px;border-right:1px solid var(--border);}
.po-player:last-child{border-right:none;}
.po-player-name{font-size:13px;font-weight:700;color:var(--navy);margin-bottom:2px;}
.po-player-credit{font-size:11px;color:var(--muted);margin-bottom:10px;}
.po-odds-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:10px;}
.po-odd-btn{background:#f0f4f8;color:var(--navy);border:2px solid #e0ecf8;border-radius:8px;padding:8px 4px;text-align:center;cursor:pointer;transition:all .15s;font-family:'Inter',sans-serif;}
.po-odd-btn:hover{background:#dce8f5;border-color:#2f9ec9;}
.po-odd-btn.active{background:var(--navy);color:#fff;border-color:var(--navy);}
.po-odd-btn.placeholder{background:transparent;border-color:transparent;cursor:default;pointer-events:none;}
.po-odd-type{font-size:10px;font-weight:800;display:block;line-height:1.3;}
.po-odd-val{font-size:10px;font-weight:600;color:#666;display:block;margin-top:2px;}
.po-odd-btn.active .po-odd-val{color:#7ab0cc;}
.po-amount-label{font-size:11px;color:#aaa;font-weight:600;margin-bottom:4px;}
.po-amount-input{width:100%;padding:8px 10px;border:2px solid #e0ecf8;border-radius:8px;font-family:'Inter',sans-serif;font-size:13px;font-weight:600;color:var(--navy);background:#f7f9fc;transition:border .15s;}
.po-amount-input:focus{outline:none;border-color:var(--navy2);background:#fff;}
.po-summary{display:flex;justify-content:space-between;font-size:12px;color:#666;margin:8px 0 10px;background:#f7f9fc;border-radius:8px;padding:7px 10px;min-height:32px;align-items:center;}
.po-summary .win-amount{font-weight:800;color:#16a34a;font-size:13px;}
.po-summary .odds-val{font-weight:700;color:var(--navy2);}
.po-vsadit-btn{width:100%;padding:10px;border:none;border-radius:8px;background:var(--green);color:#fff;font-family:'Inter',sans-serif;font-size:13px;font-weight:800;cursor:pointer;transition:background .15s;}
.po-vsadit-btn:hover{background:#219a52;}

.serie-accordion{margin-bottom:12px;border-radius:var(--radius-lg);border:1px solid var(--border);overflow:hidden;}
.serie-header{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 18px;background:var(--white);cursor:pointer;transition:background .15s;user-select:none;}
.serie-header:hover{background:#f7fafc;}
.serie-header.open{background:#f0f4f8;}
.serie-header-left{display:flex;align-items:center;gap:12px;}
.serie-logos{display:flex;align-items:center;gap:4px;}
.serie-logo{width:30px;height:30px;object-fit:contain;background:#fff;border-radius:6px;padding:2px;border:1px solid var(--border);}
.serie-title{font-size:14px;font-weight:700;color:var(--navy);}
.serie-subtitle{font-size:11px;color:var(--muted);margin-top:2px;}
.serie-header-right{display:flex;align-items:center;gap:10px;}
.serie-score-badge{font-size:12px;font-weight:700;background:#eef2f7;color:var(--navy);padding:3px 10px;border-radius:20px;white-space:nowrap;}
.serie-arrow{font-size:12px;color:var(--muted);transition:transform .2s;}
.serie-header.open .serie-arrow{transform:rotate(180deg);}
.serie-body{display:none;border-top:1px solid var(--border);}
.serie-body.open{display:block;}

.no-phase{text-align:center;padding:60px 20px;color:var(--muted);font-size:14px}
.coming-soon{background:var(--white);border-radius:var(--radius-lg);border:1px solid var(--border);padding:48px 24px;text-align:center;}
.coming-soon-icon{font-size:36px;margin-bottom:12px;}
.coming-soon-title{font-size:16px;font-weight:700;color:var(--navy);margin-bottom:6px;}
.coming-soon-sub{font-size:13px;color:var(--muted);}

@media(max-width:700px){
  .goals-header-row,.goals-team-row{grid-template-columns:1fr}
  .goals-header-row{display:none}
  .goals-team-row{border:1px solid var(--border);border-radius:var(--radius);margin:8px 16px;padding:12px}
  .po-players,.serie-players{grid-template-columns:1fr}
  .po-player,.serie-player{border-right:none;border-top:1px solid var(--border);}
  .po-player:first-child,.serie-player:first-child{border-top:none;}
  .po-teams{gap:8px;}
}
@media(max-width:500px){
  .phase-bar{padding:0 12px;justify-content:flex-start;}
  .wrapper{padding:16px 12px 60px}
  .bet-table thead{display:none}
  .bet-table td{display:flex;justify-content:space-between;align-items:center;padding:8px 12px}
  .bet-table td::before{content:attr(data-label);font-size:11px;font-weight:600;color:var(--muted)}
}
</style>
</head>

// ── FORM RATING ──
function getScore(match,teamId){
  const hg=Number(match.home_score),ag=Number(match.away_score)
  let s=null;try{s=match.stats?JSON.parse(match.stats):null}catch(e){}
  const isSN=s&&(s[20]==="1"||s[20]==="2")
  const isOT=s&&!isSN&&(s[9]==="11"||s[19]==="11")
  const isHome=match.home_team===teamId
  const tg=isHome?hg:ag
  if(tg>(isHome?ag:hg)) return(isSN||isOT)?0.75:1
  return(isSN||isOT)?0.25:0
}

function calculateFormRatings(matches){
  const ratings={},fh={},fr={}
  teams.forEach(t=>{ratings[t.id]=START_RATING;fh[t.id]=[];fr[t.id]=START_RATING})
  matches.forEach(m=>{
    const h=m.home_team,a=m.away_team
    if(!fr[h]||!fr[a]) return
    const sH=getScore(m,h),sA=getScore(m,a)
    function upd(tid,oid,score){
      const cur=fr[tid],opp=fr[oid]
      const exp=1/(1+Math.pow(10,(opp-cur)/400))
      const ch=K_FORM*(score-exp)
      fh[tid].push(ch);if(fh[tid].length>5)fh[tid].shift()
      fr[tid]=Math.round(START_RATING+fh[tid].reduce((a,b)=>a+Math.round(b),0))
    }
    upd(h,a,sH);upd(a,h,sA)
    const rH=ratings[h],rA=ratings[a]
    ratings[h]=Math.round(rH+K_FORM*(sH-(1/(1+Math.pow(10,(rA-rH)/400)))))
    ratings[a]=Math.round(rA+K_FORM*(sA-(1/(1+Math.pow(10,(rH-rA)/400)))))
  })
  return fr
}

function calculateStandings(basicMatches){
  const table={}
  teams.forEach(t=>{table[t.id]={id:t.id,name:t.name,logo:t.logo,b:0,z:0,gf:0,ga:0}})
  basicMatches.forEach(m=>{
    const h=table[m.home_team],a=table[m.away_team]
    if(!h||!a) return
    const hg=Number(m.home_score),ag=Number(m.away_score)
    let s=null;try{s=m.stats?JSON.parse(m.stats):null}catch(e){}
    const isSN=s&&(s[20]==="1"||s[20]==="2")
    const isOT=s&&!isSN&&(s[9]==="11"||s[19]==="11")
    const ots=isSN||isOT
    h.z++;a.z++;h.gf+=hg;h.ga+=ag;a.gf+=ag;a.ga+=hg
    if(hg>ag){if(ots){h.b+=2;a.b+=1}else h.b+=3}
    else{if(ots){a.b+=2;h.b+=1}else a.b+=3}
  })
  return Object.values(table).filter(t=>t.z>0)
    .sort((a,b)=>b.b!==a.b?b.b-a.b:(b.gf-b.ga)-(a.gf-a.ga))
}

// ── GOALS ODDS ──
function goalsOddsFromAvg(avgGoalsPerGame,totalGames){
  const projected=avgGoalsPerGame*totalGames
  function probOver(threshold){ return 1/(1+Math.exp(-(projected-threshold)*0.3)) }
  const p25=Math.max(0.05,Math.min(0.95,probOver(25)))
  const p30=Math.max(0.05,Math.min(0.95,probOver(30)))
  const p35=Math.max(0.05,Math.min(0.95,probOver(35)))
  return{
    "25":Math.round((1/p25)*GOALS_MARGIN*100)/100,
    "30":Math.round((1/p30)*GOALS_MARGIN*100)/100,
    "35":Math.round((1/p35)*GOALS_MARGIN*100)/100,
  }
}

function calculateGoalsOdds(currentBasicMatches,prevBasicMatches,totalGamesPerTeam){
  const result={}
  const currentGoals={},currentGames={}
  currentBasicMatches.forEach(m=>{
    const hg=Number(m.home_score),ag=Number(m.away_score)
    currentGoals[m.home_team]=(currentGoals[m.home_team]||0)+hg
    currentGoals[m.away_team]=(currentGoals[m.away_team]||0)+ag
    currentGames[m.home_team]=(currentGames[m.home_team]||0)+1
    currentGames[m.away_team]=(currentGames[m.away_team]||0)+1
  })
  const prevGoals={},prevGames={}
  prevBasicMatches.forEach(m=>{
    const hg=Number(m.home_score),ag=Number(m.away_score)
    prevGoals[m.home_team]=(prevGoals[m.home_team]||0)+hg
    prevGoals[m.away_team]=(prevGoals[m.away_team]||0)+ag
    prevGames[m.home_team]=(prevGames[m.home_team]||0)+1
    prevGames[m.away_team]=(prevGames[m.away_team]||0)+1
  })
  const prevAvgs=Object.keys(prevGoals).map(id=>prevGames[id]>0?prevGoals[id]/prevGames[id]:0)
  const globalAvg=prevAvgs.length>0?prevAvgs.reduce((a,b)=>a+b,0)/prevAvgs.length:2.5
  currentTeamIds.forEach(teamId=>{
    let avg=prevGames[teamId]>0?prevGoals[teamId]/prevGames[teamId]:globalAvg
    result[teamId]=goalsOddsFromAvg(avg,totalGamesPerTeam)
  })
  return result
}

// ── ZČ ODDS ──
function calculateWinnerOdds(){
  const ct=teams.filter(t=>currentTeamIds.has(t.id))
  const s=ct.map(t=>Math.pow(Number(formRatings[t.id]||1000),6))
  const total=s.reduce((a,b)=>a+b,0)
  const map={};ct.forEach((t,i)=>{map[t.id]=MARGIN/(s[i]/total)});return map
}
function calculateNonWinnerOdds(){
  const sorted=teams.filter(t=>currentTeamIds.has(t.id)).sort((a,b)=>(formRatings[a.id]||1000)-(formRatings[b.id]||1000))
  const map={}
  sorted.forEach((t,i)=>{
    const ratio=sorted.length>1?i/(sorted.length-1):0
    map[t.id]=1.10+Math.pow(ratio,3)*(3.00-1.10)
  })
  return map
}
function calculateLastOdds(){
  const ct=teams.filter(t=>currentTeamIds.has(t.id))
  const s=ct.map(t=>Math.pow(1/(Number(formRatings[t.id]||1000)),6))
  const total=s.reduce((a,b)=>a+b,0)
  const map={};ct.forEach((t,i)=>{map[t.id]=MARGIN/(s[i]/total)});return map
}
function calculateEqualOdds(f=2.5){
  const map={};teams.filter(t=>currentTeamIds.has(t.id)).forEach(t=>{map[t.id]=f});return map
}

// ── PLAY OFF CELKOVÉ ODDS (čistě z pozice v ZČ) ──
function calcOverallPlayoffOdds(dbType){
  // Vezmi jen týmy co jsou v play off (mají zápasy v play off stages)
  const playoffTeamIds=new Set()
  Object.values(playoffMatchesByPhase).flat().forEach(m=>{
    playoffTeamIds.add(m.home_team)
    playoffTeamIds.add(m.away_team)
  })

  // Pokud ještě nejsou play off zápasy, vezmi všechny týmy ZČ
  const teamPool=playoffTeamIds.size>0
    ?standings.filter(t=>playoffTeamIds.has(t.id))
    :standings

  if(!teamPool.length) return {}

  const n=teamPool.length
  // Síla = inverzní pozice (1. místo = nejvyšší síla)
  const strengths=teamPool.map((t,i)=>Math.pow(n-i,3))
  const total=strengths.reduce((a,b)=>a+b,0)
  const map={}
  teamPool.forEach((t,i)=>{
map[t.id]=Math.min(180, Math.round((OVERALL_MARGIN/(strengths[i]/total))*100)/100)  })
  return map
}

// ── PLAYOFF SÉRIE ODDS ──
function getLastH2H(homeId,awayId){
  const h2h=allPlayedMatches.filter(m=>
    (m.home_team===homeId&&m.away_team===awayId)||
    (m.home_team===awayId&&m.away_team===homeId)
  )
  return h2h.length?h2h[h2h.length-1]:null
}

function calcSeriesOdds(homeId,awayId){
  const n=standings.length
  const hp=standings.findIndex(t=>t.id===homeId)
  const ap=standings.findIndex(t=>t.id===awayId)

  // Kombinace pozice v ZČ + forma
  const hPos=hp>=0?(n-hp)/n:0.5
  const aPos=ap>=0?(n-ap)/n:0.5
  const hForm=(formRatings[homeId]||1000)/2000
  const aForm=(formRatings[awayId]||1000)/2000
  const hStr=(hPos+hForm)/2
  const aStr=(aPos+aForm)/2

  let probH=hStr/(hStr+aStr)

  const h2h=getLastH2H(homeId,awayId)
  let h2hText="Žádný vzájemný zápas v ZČ"
  if(h2h){
    const hg=Number(h2h.home_score),ag=Number(h2h.away_score)
    const homeWon=h2h.home_team===homeId?hg>ag:ag>hg
    probH=Math.max(0.05,Math.min(0.95,probH+(homeWon?0.04:-0.04)))
    const wName=homeWon?teams.find(t=>t.id===homeId)?.name:teams.find(t=>t.id===awayId)?.name
    h2hText=`Poslední vzájemný: ${hg}:${ag} → vyhrál ${wName} (${homeWon?"+":"-"}4%)`
  }
  const probA=1-probH
  return{
    home:Math.round((1/probH)*PLAYOFF_MARGIN*100)/100,
    away:Math.round((1/probA)*PLAYOFF_MARGIN*100)/100,
    probHome:Math.round(probH*100),
    probAway:Math.round(probA*100),
    homePos:hp+1,
    awayPos:ap+1,
    h2hText,
  }
}

// ── KURZY NA POČET ZÁPASŮ SÉRIE ──
function calcGamesOdds(homeId,awayId,winsNeeded){
  const n=standings.length
  const hp=standings.findIndex(t=>t.id===homeId)
  const ap=standings.findIndex(t=>t.id===awayId)
  const hStr=hp>=0?(n-hp)/n:0.5
  const aStr=ap>=0?(n-ap)/n:0.5
  const probH=hStr/(hStr+aStr)
  const probA=1-probH

  // Maximální počet zápasů v sérii
  const maxGames=winsNeeded*2-1

  // Pravděpodobnost že série skončí na k zápasů
  // P(série na k zápasů) = P(jeden tým vyhraje k-tý zápas) * C(k-1, winsNeeded-1) * p^(winsNeeded) * (1-p)^(k-winsNeeded)
  function seriesLengthProb(k){
    if(k<winsNeeded||k>maxGames) return 0
    const losses=k-winsNeeded
    // Binomial coefficient C(k-1, winsNeeded-1)
    function binom(n,r){
      if(r>n) return 0
      let result=1
      for(let i=0;i<r;i++) result=result*(n-i)/(i+1)
      return Math.round(result)
    }
    const coef=binom(k-1,winsNeeded-1)
    // Home vyhraje nebo Away vyhraje na k zápasů
    const pHome=coef*Math.pow(probH,winsNeeded)*Math.pow(probA,losses)
    const pAway=coef*Math.pow(probA,winsNeeded)*Math.pow(probH,losses)
    return pHome+pAway
  }

  const probs={}
  let total=0
  for(let k=winsNeeded;k<=maxGames;k++){
    probs[k]=seriesLengthProb(k)
    total+=probs[k]
  }

  // Normalizuj a vypočítej kurzy
  const odds={}
  for(let k=winsNeeded;k<=maxGames;k++){
    const p=probs[k]/total
    odds[k]=Math.round((1.12/p)*100)/100
  }
  return odds
}

function calcMatchOdds(homeRating,awayRating){
  const HOME_ADV=80,homeAdj=homeRating+HOME_ADV
  const diff=Math.abs(homeAdj-awayRating)
  let drawProb=0.25*Math.exp(-diff/400)
  drawProb=Math.max(0.10,Math.min(0.30,drawProb))
  const probHomeRaw=1/(1+Math.pow(10,(awayRating-homeAdj)/400))
  const probAwayRaw=1-probHomeRaw
  const probHome=probHomeRaw*(1-drawProb)
  const probAway=probAwayRaw*(1-drawProb)
  const probHomeOT=drawProb*probHomeRaw
  const probAwayOT=drawProb*probAwayRaw
  return{
    "1":1/probHome,"0":1/drawProb,"2":1/probAway,
    "11":1/(1-probAway),"no_draw":1/(probHome+probAway),"22":1/(1-probHome),
    "vdr_home":1/(probHome+probHomeOT),"vdr_away":1/(probAway+probAwayOT),
  }
}

// ── LOAD ──
async function load(){
  const{data:t}=await supabase.from("teams").select("*").eq("competition","extraliga")
  teams=t||[]

  const{data:seasons}=await supabase.from("seasons").select("*")
    .eq("competition_id",EXTRALIGA_COMPETITION_ID)
    .order("created_at",{ascending:false})
  const currentSeason=seasons?.[0]
  const prevSeason=seasons?.[1]

  if(!currentSeason){
    document.getElementById("mainContent").innerHTML=renderComingSoon()
    return
  }

  const{data:stages}=await supabase.from("stages").select("*")
    .eq("season_id",currentSeason.id)

  const zakladniStageIds=(stages||[]).filter(s=>s.name==="Základní část").map(s=>s.id)

  // Playoff stages seskupené podle phase + uložit wins_needed
  playoffStagesByPhase={}
  ;(stages||[]).forEach(s=>{
    const phase=STAGE_NAME_TO_PHASE[s.name]
    if(phase){
      if(!playoffStagesByPhase[phase]) playoffStagesByPhase[phase]=[]
      playoffStagesByPhase[phase].push({id:s.id, name:s.name, wins_needed:s.wins_needed||4})
    }
  })

  let prevZakladniStageIds=[]
  if(prevSeason){
    const{data:prevStages}=await supabase.from("stages").select("*").eq("season_id",prevSeason.id)
    prevZakladniStageIds=(prevStages||[]).filter(s=>s.name==="Základní část").map(s=>s.id)
  }

  const{data:allPlayed}=await supabase.from("matches").select("*")
    .not("home_score","is",null).not("away_score","is",null)
    .order("round",{ascending:true})
  allPlayedMatches=allPlayed||[]

  const currentBasicMatches=allPlayedMatches.filter(m=>zakladniStageIds.includes(m.stage_id))

  currentTeamIds=new Set()
  if(currentBasicMatches.length>0){
    currentBasicMatches.forEach(m=>{currentTeamIds.add(m.home_team);currentTeamIds.add(m.away_team)})
  } else {
    const{data:allCurrentBasic}=await supabase.from("matches").select("home_team,away_team")
      .in("stage_id",zakladniStageIds.length?zakladniStageIds:["none"])
    ;(allCurrentBasic||[]).forEach(m=>{currentTeamIds.add(m.home_team);currentTeamIds.add(m.away_team)})
  }

  const prevBasicMatches=prevZakladniStageIds.length
    ?allPlayedMatches.filter(m=>prevZakladniStageIds.includes(m.stage_id)):[]

  const teamCount=currentTeamIds.size||10
  const totalGamesPerTeam=(teamCount-1)*2

  formRatings=calculateFormRatings(currentBasicMatches)
  standings=calculateStandings(currentBasicMatches)
  goalsOddsMap=calculateGoalsOdds(currentBasicMatches,prevBasicMatches,totalGamesPerTeam)

  const allPoStageIds=Object.values(playoffStagesByPhase).flat().map(s=>s.id)
  const{data:poAll}=allPoStageIds.length
    ?await supabase.from("matches").select("*").in("stage_id",allPoStageIds).order("round",{ascending:true})
    :{data:[]}

  playoffMatchesByPhase={}
  Object.entries(playoffStagesByPhase).forEach(([phase,phaseStages])=>{
    const stageIds=phaseStages.map(s=>s.id)
    playoffMatchesByPhase[phase]=(poAll||[]).filter(m=>stageIds.includes(m.stage_id))
  })

  const{data:p}=await supabase.from("players").select("*").in("name",["Kubele","Pici"])
  ;(p||[]).forEach(pl=>players[pl.name]=pl)

  const{data:b}=await supabase.from("bets_special").select("*").eq("status","pending")
  bets=b||[]

  await loadLocks()

  const matchPhase=PHASES.find(p=>p.id===urlPhase&&p.type==="matches")
  if(matchPhase) currentPhase=urlPhase

  render()
}

  const box=document.getElementById(`w_${player}_${teamId}_${type}`)
  if(box) box.textContent=val?Math.round(val*odds)+" Kč":"—"

window.bet=async function(playerName,teamId,odds,type){
  if(isLocked(type,teamId)) return alert("Tato sázka je uzavřena pro tipování.")
  const player=players[playerName]
  const val=Number(document.getElementById(`a_${playerName}_${teamId}_${type}`).value)
  if(!val||val<=0) return alert("Zadej částku")
  if(player.credit<val) return alert("Nedostatek kreditu")
  await supabase.from("players").update({credit:player.credit-val}).eq("id",player.id)
  await supabase.from("bets_special").insert({player_id:player.id,type,target_id:teamId,odds,amount:val,potential_win:val*odds,status:"pending"})
  load()
}
window.selectGoal=function(playerName,teamId,thr){
  if(!selectedGoal[playerName]) selectedGoal[playerName]={}
  selectedGoal[playerName][teamId]=selectedGoal[playerName][teamId]===thr?null:thr
  ;["25","30","35"].forEach(t=>{
    const btn=document.getElementById(`gbtn_${playerName}_${teamId}_${t}`)
    if(btn) btn.classList.toggle("selected",selectedGoal[playerName][teamId]===t)
  })
  updateGoalWin(playerName,teamId)
}
window.updateGoalWin=function(playerName,teamId){
  const sel=selectedGoal[playerName]?.[teamId]
  const winEl=document.getElementById(`gw_${playerName}_${teamId}`)
  const inputEl=document.getElementById(`gi_${playerName}_${teamId}`)
  const val=inputEl?Number(inputEl.value):0
  if(!sel||!val){if(winEl)winEl.textContent="—";return}
  const odds=goalsOddsMap[teamId]
  if(!odds||!winEl) return
  winEl.textContent=Math.round(val*odds[sel])+" Kč"
}
window.betGoals=async function(playerName,teamId){
  const type="goals_regular_season"
  if(isLocked(type,teamId)) return alert("Tato sázka je uzavřena pro tipování.")
  const sel=selectedGoal[playerName]?.[teamId]
  if(!sel) return alert("Vyber počet gólů (25+, 30+ nebo 35+)")
  const player=players[playerName]
  const val=Number(document.getElementById(`gi_${playerName}_${teamId}`).value)
  if(!val||val<=0) return alert("Zadej částku")
  if(player.credit<val) return alert("Nedostatek kreditu")
  const odds=goalsOddsMap[teamId]
  const o=odds[sel]
  const dbType=`goals_${sel}_regular_season`
  await supabase.from("players").update({credit:player.credit-val}).eq("id",player.id)
  await supabase.from("bets_special").insert({player_id:player.id,type:dbType,target_id:teamId,odds:o,amount:val,potential_win:val*o,status:"pending"})
  load()
}

  const sel=poState[key].selected

  document.querySelectorAll(`.po-odd-btn[data-match="${matchId}"][data-player="${playerKey}"]`).forEach(btn=>{
    btn.classList.toggle("active",poState[key].selected.includes(btn.dataset.type))
  })
  poUpdateSummary(matchId,playerKey)
}
window.poUpdateAmount=function(matchId,playerKey){poUpdateSummary(matchId,playerKey)}
function poUpdateSummary(matchId,playerKey){
  const key=`${matchId}_${playerKey}`
  const sel=poState[key]?.selected||[]
  const summaryEl=document.getElementById(`po_summary_${matchId}_${playerKey}`)
  const amountEl=document.getElementById(`po_amount_${matchId}_${playerKey}`)
  if(!summaryEl||!amountEl) return
  const amount=Number(amountEl.value)
  const oddsMap=poState[key]?.oddsMap||{}
  if(!sel.length){summaryEl.innerHTML='<span style="color:#aaa;">Vyber tip a částku</span>';return}
  let combinedOdds=1
  sel.forEach(t=>{if(oddsMap[t])combinedOdds*=oddsMap[t]})
  summaryEl.innerHTML=amount

}

function updateSerieSummary(stageId,playerKey){

  const winnerOddsKey=`serie_wodds_${stageId}_${playerKey}`
  const gamesOddsKey=`serie_godds_${stageId}_${playerKey}`
  const summaryEl=document.getElementById(`serie_summary_${stageId}_${playerKey}`)
  const amountEl=document.getElementById(`serie_amount_${stageId}_${playerKey}`)
  if(!summaryEl||!amountEl) return
  const amount=Number(amountEl.value)
  const selectedWinner=serieState[winnerKey]
  const selectedGames=serieState[gamesKey]
  const winnerOdds=serieState[winnerOddsKey]||{}
  const gamesOdds=serieState[gamesOddsKey]||{}
  if(!selectedWinner&&!selectedGames){
    summaryEl.innerHTML='<span style="color:#aaa;">Vyber tip a částku</span>';return

  if(selectedWinner&&winnerOdds[selectedWinner]) combinedOdds*=winnerOdds[selectedWinner]
  if(selectedGames&&gamesOdds[selectedGames]) combinedOdds*=gamesOdds[selectedGames]
  summaryEl.innerHTML=amount
    ?`<span class="odds-val">Kurz: ${combinedOdds.toFixed(2)}</span><span class="win-amount">Výhra: ${Math.round(amount*combinedOdds)} Kč</span>`
    :`<span class="odds-val">Kurz: ${combinedOdds.toFixed(2)}</span><span style="color:#aaa;">Zadej částku</span>`
}

window.placeSerieBet=async function(stageId,playerKey){
  const winnerKey=`serie_winner_${stageId}_${playerKey}`
  const gamesKey=`serie_games_${stageId}_${playerKey}`
  const winnerOddsKey=`serie_wodds_${stageId}_${playerKey}`
  const gamesOddsKey=`serie_godds_${stageId}_${playerKey}`
  const player=players[playerKey==="kubele"?"Kubele":"Pici"]
  const amountEl=document.getElementById(`serie_amount_${stageId}_${playerKey}`)
  const amount=Number(amountEl?.value||0)
  const selectedWinner=serieState[winnerKey]
  const selectedGames=serieState[gamesKey]
  const winnerOdds=serieState[winnerOddsKey]||{}
  const gamesOdds=serieState[gamesOddsKey]||{}

  if(!selectedWinner&&!selectedGames) return alert("Vyber alespoň jeden tip (vítěz nebo počet zápasů)")
  if(!amount||amount<=0) return alert("Zadej částku")
  if(player.credit<amount) return alert("Nedostatek kreditu")

  let combinedOdds=1
  const tips=[]
  if(selectedWinner&&winnerOdds[selectedWinner]){
    combinedOdds*=winnerOdds[selectedWinner]
    tips.push(`winner:${selectedWinner}`)
  }
  if(selectedGames&&gamesOdds[selectedGames]){
    combinedOdds*=gamesOdds[selectedGames]
    tips.push(`games:${selectedGames}`)
  }

  const dbType=`serie_tip_${stageId}`
  await supabase.from("players").update({credit:player.credit-amount}).eq("id",player.id)
  await supabase.from("bets_special").insert({
    player_id:player.id, type:dbType, target_id:stageId,
    odds:combinedOdds, amount, potential_win:amount*combinedOdds, status:"pending"
  })
  load()
}

// ── H2H ──
function getH2H(homeId,awayId){
  return allPlayedMatches
    .filter(m=>(m.home_team===homeId&&m.away_team===awayId)||(m.home_team===awayId&&m.away_team===homeId))
    .slice(-5).reverse()
}
function renderH2HHtml(homeId,awayId){
  const h2h=getH2H(homeId,awayId)
  if(!h2h.length) return `<div class="po-h2h-empty">Žádné vzájemné zápasy</div>`
  return h2h.map(m=>{
    const home=teams.find(t=>t.id===m.home_team)
    const away=teams.find(t=>t.id===m.away_team)
    if(!home||!away) return ""
    const hg=Number(m.home_score),ag=Number(m.away_score)
    const homeWin=hg>ag
    let s=null;try{s=m.stats?JSON.parse(m.stats):null}catch(e){}
    const isSN=s&&(s[20]==="1"||s[20]==="2")
    const isOT=s&&!isSN&&(s[9]==="11"||s[19]==="11")
    const tag=isSN?"SN":isOT?"OT":""
    return `<div class="po-h2h-row">
      <span class="po-h2h-teams">
        <span class="${homeWin?"po-h2h-winner":"po-h2h-loser"}">${home.name.replace(/\(.\)$/,'').trim()}</span>
        vs
        <span class="${homeWin?"po-h2h-loser":"po-h2h-winner"}">${away.name.replace(/\(.\)$/,'').trim()}</span>
      </span>
      <span class="po-h2h-score">${hg} : ${ag}</span>
      ${tag?`<span class="po-h2h-tag">${tag}</span>`:""}
    </div>`
  }).join("")
}

function renderOverallPlayerTable(playerName,oddsMap,dbType,teamPool){
  const p=players[playerName]
  if(!p) return ""
  const sorted=teamPool.slice().sort((a,b)=>(oddsMap[a.id]||99)-(oddsMap[b.id]||99))
  let rows=sorted.map(t=>{
    const o=oddsMap[t.id]
    if(!o) return ""
    const existing=getBet(p.id,t.id,dbType)
    const locked=isLocked(dbType,t.id)
    const id=`${playerName}_${t.id}_${dbType}`
    if(existing) return `<tr>
      <td data-label="Tým"><div class="team-cell"><img class="logo" src="./logos/${t.logo}" onerror="this.style.display='none'"><span class="team-name">${t.name}</span></div></td>
      <td class="tc"><span class="odds-badge">${o.toFixed(2)}</span></td>
      <td data-label="Vsazeno">${existing.amount} Kč</td>
      <td data-label="Výhra">${Math.round(existing.potential_win)} Kč</td>
      <td><span class="locked-badge">✓ Vsazeno</span></td>
    </tr>`
    if(locked) return `<tr>
      <td data-label="Tým"><div class="team-cell"><img class="logo" src="./logos/${t.logo}" onerror="this.style.display='none'"><span class="team-name">${t.name}</span></div></td>
      <td class="tc"><span class="odds-badge">${o.toFixed(2)}</span></td>
      <td colspan="3"><span class="closed-badge">🔒 Uzavřeno</span></td>
    </tr>`
    return `<tr>
      <td data-label="Tým"><div class="team-cell"><img class="logo" src="./logos/${t.logo}" onerror="this.style.display='none'"><span class="team-name">${t.name}</span></div></td>
      <td class="tc"><span class="odds-badge">${o.toFixed(2)}</span></td>
      <td data-label="Vsadit"><input class="bet-input" id="a_${id}" type="number" min="1" placeholder="Kč" oninput="updateOverallWin('${playerName}','${t.id}','${dbType}',${o})"></td>
      <td data-label="Výhra"><span class="win-display" id="w_${id}">—</span></td>
      <td><button class="bet-btn" onclick="bet('${playerName}','${t.id}',${o},'${dbType}')">Vsadit</button></td>
    </tr>`
  }).join("")
  return `<div class="player-card">
    <div class="player-card-header">
      <span class="player-name">${playerName}</span>
      <span class="player-credit">💰 ${Math.round(p.credit)} Kč</span>

    <table class="bet-table">
      <thead><tr><th>Tým</th><th class="tc">Kurz</th><th>Vsadit</th><th>Výhra</th><th></th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`
}

// ── SÉRIE FÁZE (ČF, SF, Finále) ──
function renderPlayoffSeriePhase(phase){
  const phaseStages=playoffStagesByPhase[phase]||[]
  if(!phaseStages.length) return renderComingSoon()

  const phaseMatches=playoffMatchesByPhase[phase]||[]
  if(!phaseMatches.length) return renderComingSoon()

  // Seskup zápasy podle stage_id
  const matchesByStage={}
  phaseMatches.forEach(m=>{
    if(!matchesByStage[m.stage_id]) matchesByStage[m.stage_id]=[]
    matchesByStage[m.stage_id].push(m)
  })

  let html=""
  phaseStages.forEach(stage=>{
    const matches=matchesByStage[stage.id]||[]
    if(!matches.length) return

    const firstMatch=matches[0]
    const home=teams.find(t=>t.id===firstMatch.home_team)
    const away=teams.find(t=>t.id===firstMatch.away_team)
    if(!home||!away) return

    const winsNeeded=stage.wins_needed||4
    const maxGames=winsNeeded*2-1
    const seriesOdds=calcSeriesOdds(home.id,away.id)
    const gamesOdds=calcGamesOdds(home.id,away.id,winsNeeded)

    // Uložit odds do serieState pro použití při vsazení
    ;["kubele","pici"].forEach(pk=>{
      serieState[`serie_wodds_${stage.id}_${pk}`]={
        [home.id]:seriesOdds.home,
        [away.id]:seriesOdds.away,
      }
      serieState[`serie_godds_${stage.id}_${pk}`]=gamesOdds
    })

    // Skóre série
    let wHome=0,wAway=0
    matches.forEach(m=>{
      if(!m.played||m.home_score==null) return
      if(Number(m.home_score)>Number(m.away_score)) wHome++
      else wAway++
    })
    const playedCount=matches.filter(m=>m.played&&m.home_score!=null).length
    const serieScore=playedCount>0?`${wHome} : ${wAway}`:"Nezačalo"

    // Existující série sázky
    const kubele=players["Kubele"]
    const pici=players["Pici"]

    html+=`
    <div class="serie-bet-card">
      <div class="serie-bet-header">
        <span class="serie-bet-title">${home.name} vs ${away.name}</span>
        <span class="serie-bet-format">Na ${winsNeeded} vítězné · max ${maxGames} zápasů · ${serieScore}</span>
      </div>

      <div class="serie-bet-teams">
        <div class="serie-bet-team">
          <img class="serie-bet-logo" src="./logos/${home.logo}" onerror="this.style.display='none'">
          <div>
            <div class="serie-bet-teamname">${home.name}</div>
            <div class="serie-bet-pos">${seriesOdds.homePos>0?seriesOdds.homePos+". místo ZČ":"—"}</div>
          </div>
        </div>
        <span class="serie-bet-vs">vs</span>
        <div class="serie-bet-team">
          <img class="serie-bet-logo" src="./logos/${away.logo}" onerror="this.style.display='none'">
          <div>
            <div class="serie-bet-teamname">${away.name}</div>
            <div class="serie-bet-pos">${seriesOdds.awayPos>0?seriesOdds.awayPos+". místo ZČ":"—"}</div>
          </div>
        </div>
      </div>

      <div class="serie-players">
        ${renderSeriePlayerBlock(stage.id,"kubele",kubele,home,away,seriesOdds,gamesOdds,maxGames,winsNeeded)}
        ${renderSeriePlayerBlock(stage.id,"pici",  pici,  home,away,seriesOdds,gamesOdds,maxGames,winsNeeded)}
      </div>

      <!-- Zápasy v sérii jako accordion -->
      <div style="border-top:1px solid var(--border);">
        <div class="serie-accordion" id="serie-${stage.id}" style="margin:0;border-radius:0;border:none;">
          <div class="serie-header" id="serie-header-${stage.id}" onclick="toggleSerie('${stage.id}')">
            <div class="serie-header-left">
              <div>
                <div class="serie-title" style="font-size:13px;">Zápasy série</div>
                <div class="serie-subtitle">${playedCount} odehráno z ${matches.length}</div>
              </div>
            </div>
            <div class="serie-header-right">
              <span class="serie-arrow">▼</span>
            </div>
          </div>
          <div class="serie-body" id="serie-body-${stage.id}">
            ${matches.slice().reverse().map((m,idx)=>renderMatchCard(m,matches.length-idx,stage.name)).join("")}
          </div>
        </div>
      </div>
    </div>`
  })

  return html||renderComingSoon()
}

  // Zkontroluj existující sázku

      <input class="bet-input" id="serie_amount_${stageId}_${playerKey}" type="number" min="1" placeholder="Kč"
        oninput="updateSerieAmount('${stageId}','${playerKey}')">

    <button class="bet-btn" style="width:100%;padding:10px;" onclick="placeSerieBet('${stageId}','${playerKey}')">🎲 Vsadit</button>
  </div>`
}

  </div>`
}

function renderPoPlayerBlock(m,player,playerKey,tips,oddsMap,matchBets){
  if(!player) return ""
  const existing=matchBets.find(b=>b.player_id===player.id)||null
  const played=m.played&&m.home_score!=null
  if(existing){
    const tips_arr=existing.tip.split(",")
    let resultHtml=""
    if(played){
      const won=tips_arr.every(t=>checkTip(m,t))
      resultHtml=won
        ?`<div style="color:#16a34a;font-weight:800;font-size:13px;">🎉 Výhra ${Math.round(existing.potential_win)} Kč!</div>`
        :`<div style="color:#dc2626;font-weight:700;font-size:12px;">❌ Prohra (${existing.amount} Kč)</div>`
    } else {
      resultHtml=`<div style="font-size:12px;color:var(--muted);">Kurz: ${existing.odds.toFixed(2)} · Možná výhra: <b>${Math.round(existing.potential_win)} Kč</b></div>`
    }
    return `<div class="po-player">
      <div class="po-player-name">${player.name}</div>
      <div class="po-player-credit">💰 ${Math.round(player.credit)} Kč</div>
      <span class="locked-badge" style="margin-bottom:6px;">✓ ${existing.tip} · ${existing.amount} Kč</span>
      <div style="margin-top:6px;">${resultHtml}</div>
    </div>`
  }
  if(played){
    return `<div class="po-player">
      <div class="po-player-name">${player.name}</div>
      <div class="po-player-credit">💰 ${Math.round(player.credit)} Kč</div>
      <div style="font-size:12px;color:var(--muted);font-style:italic;">Zápas již byl odehrán.</div>
    </div>`
  }
  const tipsHtml=tips.map(({type,label})=>{
    if(type==="__empty") return `<div class="po-odd-btn placeholder"></div>`
    const o=oddsMap[type]
    if(!o) return `<div class="po-odd-btn placeholder"></div>`
    return `<div class="po-odd-btn" data-match="${m.id}" data-player="${playerKey}" data-type="${type}" onclick="poSelectTip('${m.id}','${playerKey}','${type}')">
      <span class="po-odd-type">${label}</span>
      <span class="po-odd-val">${o.toFixed(2)}</span>
    </div>`
  }).join("")
  return `<div class="po-player">
    <div class="po-player-name">${player.name}</div>
    <div class="po-player-credit">💰 ${Math.round(player.credit)} Kč</div>
    <div class="po-odds-grid">${tipsHtml}</div>
    <div class="po-amount-label">Částka (Kč)</div>
    <input class="po-amount-input" id="po_amount_${m.id}_${playerKey}" type="number" min="1" placeholder="0 Kč" oninput="poUpdateAmount('${m.id}','${playerKey}')">
    <div class="po-summary" id="po_summary_${m.id}_${playerKey}"><span style="color:#aaa;">Vyber tip a částku</span></div>
    <button class="po-vsadit-btn" onclick="poPlaceBet('${m.id}','${playerKey}')">🎲 Vsadit</button>
  </div>`
}

function checkTip(match,tip){
  const type=match.result_type
  const hg=Number(match.home_score),ag=Number(match.away_score)
  const hw=hg>ag,aw=ag>hg
  const isOTorSN=(type==="OT"||type==="SN")
  switch(tip){
    case "1": return hw&&type==="REG"
    case "0": return isOTorSN
    case "2": return aw&&type==="REG"
    case "11": return!(aw&&type==="REG")
    case "no_draw": return type==="REG"
    case "22": return!(hw&&type==="REG")
    case "vdr_home": return hw
    case "vdr_away": return aw
  }
  return false
}

// ── RENDER OSTATNÍCH FÁZÍ (ČF, SF atd jako accordion) ──
function renderPlayoffMatches(phase){
  const allMatches=playoffMatchesByPhase[phase]||[]
  if(allMatches.length===0) return renderComingSoon()
  const phaseLabel=PHASES.find(p=>p.id===phase)?.label||""
  const byStage={}
  allMatches.forEach(m=>{
    if(!byStage[m.stage_id]) byStage[m.stage_id]=[]
    byStage[m.stage_id].push(m)
  })
  Object.keys(byStage).forEach(sid=>{
    byStage[sid].sort((a,b)=>Number(b.round)-Number(a.round))
  })
  let html=""
  Object.entries(byStage).forEach(([stageId,matches])=>{
    const home=teams.find(t=>t.id===matches[0]?.home_team)
    const away=teams.find(t=>t.id===matches[0]?.away_team)
    if(!home||!away) return
    let wHome=0,wAway=0
    matches.forEach(m=>{
      if(!m.played||m.home_score==null) return
      if(Number(m.home_score)>Number(m.away_score)) wHome++
      else wAway++
    })
    const played=matches.filter(m=>m.played&&m.home_score!=null).length
    const scoreStr=played>0?`${wHome} : ${wAway}`:"Nezačalo"
    html+=`
    <div class="serie-accordion" id="serie-${stageId}">
      <div class="serie-header" id="serie-header-${stageId}" onclick="toggleSerie('${stageId}')">
        <div class="serie-header-left">
          <div class="serie-logos">
            <img class="serie-logo" src="./logos/${home.logo}" onerror="this.style.display='none'">
            <img class="serie-logo" src="./logos/${away.logo}" onerror="this.style.display='none'">
          </div>
          <div>
            <div class="serie-title">${home.name} vs ${away.name}</div>
            <div class="serie-subtitle">${matches.length} zápasů · ${phaseLabel}</div>
          </div>
        </div>
        <div class="serie-header-right">
          <span class="serie-score-badge">Série: ${scoreStr}</span>
          <span class="serie-arrow">▼</span>
        </div>
      </div>
      <div class="serie-body" id="serie-body-${stageId}">
        ${matches.map((m,idx)=>renderMatchCard(m,matches.length-idx,phaseLabel)).join("")}
      </div>
    </div>`
  })
  if(urlStage&&byStage[urlStage]){
    setTimeout(()=>{
      const body=document.getElementById(`serie-body-${urlStage}`)
      const header=document.getElementById(`serie-header-${urlStage}`)
      if(body&&header){
        body.classList.add("open")
        header.classList.add("open")
        document.getElementById(`serie-${urlStage}`)?.scrollIntoView({behavior:"smooth",block:"start"})
      }
    },100)
  }
  return html
}

// ── ZČ RENDER ──
function playerBetTable(playerName,oddsMap,dbType){
  const p=players[playerName]
  if(!p) return ""
  const ct=teams.filter(t=>currentTeamIds.has(t.id))
  const sorted=ct.slice().sort((a,b)=>(oddsMap[a.id]||99)-(oddsMap[b.id]||99))
  let rows=sorted.map(t=>{
    const o=oddsMap[t.id]
    if(!o) return ""
    const existing=getBet(p.id,t.id,dbType)
    const form=formRatings[t.id]||1000
    const locked=isLocked(dbType,t.id)
    const id=`${playerName}_${t.id}_${dbType}`
    if(existing) return `<tr>
      <td data-label="Tým"><div class="team-cell"><img class="logo" src="./logos/${t.logo}" onerror="this.style.display='none'"><span class="team-name">${t.name}</span></div></td>
      <td class="tc"><span class="form-val">${form}</span></td>
      <td class="tc"><span class="odds-badge">${o.toFixed(2)}</span></td>
      <td>${existing.amount} Kč</td>
      <td>${Math.round(existing.potential_win)} Kč</td>
      <td><span class="locked-badge">✓ Vsazeno</span></td>
    </tr>`
    if(locked) return `<tr>
      <td data-label="Tým"><div class="team-cell"><img class="logo" src="./logos/${t.logo}" onerror="this.style.display='none'"><span class="team-name">${t.name}</span></div></td>
      <td class="tc"><span class="form-val">${form}</span></td>
      <td class="tc"><span class="odds-badge">${o.toFixed(2)}</span></td>
      <td colspan="3"><span class="closed-badge">🔒 Uzavřeno</span></td>
    </tr>`
    return `<tr>
      <td data-label="Tým"><div class="team-cell"><img class="logo" src="./logos/${t.logo}" onerror="this.style.display='none'"><span class="team-name">${t.name}</span></div></td>
      <td class="tc"><span class="form-val">${form}</span></td>
      <td class="tc"><span class="odds-badge">${o.toFixed(2)}</span></td>
      <td><input class="bet-input" id="a_${id}" type="number" min="1" placeholder="Kč" oninput="updateWin('${playerName}','${t.id}','${dbType}',${o})"></td>
      <td><span class="win-display" id="w_${id}">—</span></td>
      <td><button class="bet-btn" onclick="bet('${playerName}','${t.id}',${o},'${dbType}')">Vsadit</button></td>
    </tr>`
  }).join("")
  return `<div class="player-card">
    <div class="player-card-header">
      <span class="player-name">${playerName}</span>
      <span class="player-credit">💰 ${Math.round(p.credit)} Kč</span>
    </div>
    <table class="bet-table">
      <thead><tr><th>Tým</th><th class="tc">Forma</th><th class="tc">Kurz</th><th>Vsadit</th><th>Výhra</th><th></th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`
}

function goalsPlayerBlock(playerName){
  const p=players[playerName]
  if(!p) return ""
  const currentTeams=teams.filter(t=>currentTeamIds.has(t.id)&&goalsOddsMap[t.id])
  if(!currentTeams.length) return ""
  const rows=currentTeams.map(t=>{
    const odds=goalsOddsMap[t.id]
    if(!odds) return ""
    const existing=getExistingGoalBet(p.id,t.id)
    const locked=isLocked("goals_regular_season",t.id)
    if(existing){
      const thr=existing.type.split("_")[1]
      return `<div class="goals-team-row">
        <div class="team-cell"><img class="logo" src="./logos/${t.logo}" onerror="this.style.display='none'"><span class="team-name">${t.name}</span></div>
        <div style="font-size:13px;font-weight:600">${thr}+ gólů · kurz ${existing.odds}</div>
        <div style="font-size:13px">${existing.amount} Kč → <b>${Math.round(existing.potential_win)} Kč</b></div>
        <div><span class="locked-badge">✓ Vsazeno</span></div>
      </div>`
    }
    if(locked){
      return `<div class="goals-team-row">
        <div class="team-cell"><img class="logo" src="./logos/${t.logo}" onerror="this.style.display='none'"><span class="team-name">${t.name}</span></div>
        <div style="font-size:13px;color:var(--muted)">${["25","30","35"].map(thr=>`${thr}+: ${odds[thr]}`).join(" · ")}</div>
        <div><span class="closed-badge">🔒 Uzavřeno</span></div>
        <div></div>
      </div>`
    }
    return `<div class="goals-team-row">
      <div class="team-cell"><img class="logo" src="./logos/${t.logo}" onerror="this.style.display='none'"><span class="team-name">${t.name}</span></div>
      <div class="goal-btns">
        ${["25","30","35"].map(thr=>`
          <button class="goal-btn" id="gbtn_${playerName}_${t.id}_${thr}" onclick="selectGoal('${playerName}','${t.id}','${thr}')">
            <span class="goal-btn-label">${thr}+</span>
            <span class="goal-btn-odds">${odds[thr]}</span>
          </button>`).join("")}
      </div>
      <div class="goal-input-wrap">
        <input class="bet-input" id="gi_${playerName}_${t.id}" type="number" min="1" placeholder="Kč" oninput="updateGoalWin('${playerName}','${t.id}')">
        <span class="goal-win" id="gw_${playerName}_${t.id}">—</span>
      </div>
      <button class="bet-btn" onclick="betGoals('${playerName}','${t.id}')">Vsadit</button>
    </div>`
  }).join("")
  return `<div class="goals-player-card">
    <div class="player-card-header">
      <span class="player-name">${playerName}</span>
      <span class="player-credit">💰 ${Math.round(p.credit)} Kč</span>
    </div>
    <div class="goals-header-row">
      <span>Tým</span><span>Vyber tip</span><span>Částka / Výhra</span><span></span>
    </div>
    ${rows}
  </div>`
}

function renderComingSoon(){
  return `<div class="coming-soon">
    <div class="coming-soon-icon">🏒</div>
    <div class="coming-soon-title">Zatím žádné zápasy</div>
    <div class="coming-soon-sub">Sázky se zobrazí jakmile budou přidány zápasy do této fáze.</div>
  </div>`
}

function renderSection(section){
  const wo=calculateWinnerOdds(),nwo=calculateNonWinnerOdds(),lo=calculateLastOdds(),eo=calculateEqualOdds()
  let html=`<div class="section-label-wrap">
    <div class="section-label-text">${section.title}</div>
    <div class="section-label-line"></div>
  </div>`
  if(section.type==="goals"){
    html+=goalsPlayerBlock("Kubele")+goalsPlayerBlock("Pici")
    return html
  }
  const oddsMap=section.type==="winner"?wo:section.type==="nonwinner"?nwo:section.type==="last"?lo:eo
  html+=`<div class="players-grid">
    ${playerBetTable("Kubele",oddsMap,section.dbType)}
    ${playerBetTable("Pici",  oddsMap,section.dbType)}
  </div>`
  return html
}

async function render(){
  const phase=PHASES.find(p=>p.id===currentPhase)
  const content=document.getElementById("mainContent")

  if(phase?.type==="playoff"){
    // Načti match bets
    const allPoMatches=Object.values(playoffMatchesByPhase).flat()
    const matchIds=allPoMatches.map(m=>m.id)
    if(matchIds.length){
      const{data:matchBetsData}=await supabase.from("bets").select("*").in("match_id",matchIds)
      window._matchBets={}
      ;(matchBetsData||[]).forEach(b=>{
        if(!window._matchBets[b.match_id]) window._matchBets[b.match_id]=[]
        window._matchBets[b.match_id].push(b)
      })
    } else {
      window._matchBets={}
    }
    content.innerHTML=renderPlayoffSection()
    return
  }

  if(phase?.type==="matches"){
    const allPoMatches=Object.values(playoffMatchesByPhase).flat()
    const matchIds=allPoMatches.map(m=>m.id)
    if(matchIds.length){
      const{data:matchBetsData}=await supabase.from("bets").select("*").in("match_id",matchIds)
      window._matchBets={}
      ;(matchBetsData||[]).forEach(b=>{
        if(!window._matchBets[b.match_id]) window._matchBets[b.match_id]=[]
        window._matchBets[b.match_id].push(b)
      })
    } else {
      window._matchBets={}
    }
    content.innerHTML=renderPlayoffMatches(currentPhase)
    return
  }

  if(phase?.type==="special"){
    content.innerHTML=SPECIAL_SECTIONS.map(renderSection).join("")
    return
  }

  content.innerHTML=renderComingSoon()
}

renderPhaseTabs()
load()
