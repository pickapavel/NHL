<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sázky</title>

<style>
*{box-sizing:border-box}

body{font-family:Arial;margin:0;background:#f2f2f2;}
.wrapper{max-width:1200px;margin:auto;padding:15px;background:white;}

h1{margin-bottom:15px}

/* 🔥 ACCORDION */
.section{
 margin-bottom:10px;
 border-radius:10px;
 overflow:hidden;
}

.sectionHeader{
 display:flex;
 justify-content:space-between;
 align-items:center;
 background:#0b2a3c;
 color:white;
 padding:12px 15px;
 cursor:pointer;
 font-size:18px;
 transition:0.2s;
}

.sectionHeader:hover{
 background:#14435c;
}

.arrow{
 transition:0.3s;
 font-size:18px;
}

.section.open .arrow{
 transform:rotate(90deg);
}

.blockContent{
 max-height:0;
 overflow:hidden;
 transition:max-height 0.3s ease;
 background:#f9f9f9;
}

.section.open .blockContent{
 max-height:2000px;
 padding:10px;
}

/* PLAYER */
.playerCard{
 background:#e9ecef;
 border-radius:10px;
 padding:12px;
 margin-bottom:15px;
}

/* GRID */
.grid{
 display:grid;
 grid-template-columns: 2fr 1fr 1fr 1.2fr 1.2fr 1fr;
 gap:10px;
 align-items:center;
}

.headerRow{
 font-weight:bold;
 border-bottom:2px solid #aaa;
 padding:8px 0;
}

.row{
 padding:8px 0;
 border-bottom:1px solid #ccc;
}

.teamBlock{
 display:flex;
 align-items:center;
 gap:10px;
}

.logo{
 width:40px;
 height:40px;
 object-fit:contain;
 background:white;
 border-radius:6px;
 padding:2px;
}

input{
 width:80px;
 padding:5px;
}

button{
 background:#27ae60;
 color:white;
 border:none;
 border-radius:6px;
 padding:6px 10px;
 cursor:pointer;
}

.credit{
 font-weight:bold;
 margin-bottom:10px;
}

.locked{
 font-size:13px;
 color:#333;
}

/* 📱 MOBILE */
@media(max-width:768px){

.grid{
 grid-template-columns:1fr;
}

.headerRow{
 display:none;
}

.row{
 display:flex;
 flex-direction:column;
 gap:5px;
}

button{
 width:100%;
}

}
</style>
</head>

<body>

<div class="wrapper">

<h1>Sázky</h1>

<!-- 🔥 ACCORDION SEKCE -->
<div class="section" id="sec1">

  <div class="sectionHeader" onclick="toggleSection('sec1')">
    <span>Vítěz základní části</span>
    <span class="arrow">▶</span>
  </div>

  <div class="blockContent" id="section"></div>

</div>

</div>

<script type="module">

import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient(
 "https://qaocbodrflsaerxntfui.supabase.co",
 "sb_publishable_eIeO9MihyuQDuNHy60Ubrw_8ZuSKPFU"
)

let teams = []
let players = {}
let bets = []

// ===== LOAD =====
async function load(){

 const { data: t } = await supabase
  .from("teams")
  .select("*")
  .eq("competition","extraliga")

 teams = t

 const { data: p } = await supabase
  .from("players")
  .select("*")
  .in("name",["Kubele","Pici"])

 p.forEach(pl=> players[pl.name]=pl)

 const { data: b } = await supabase
  .from("bets_special")
  .select("*")
  .eq("status","pending")

 bets = b

 render()
}

// ===== ODDS =====
function calculateOdds(){

 const strengths = teams.map(t =>
  Math.pow(Number(t.rating_form||1000),6)
 )

 const total = strengths.reduce((a,b)=>a+b,0)

 const margin = 2.2
 const map = {}

 teams.forEach((t,i)=>{
  const prob = strengths[i]/total
  map[t.id]=(margin/prob)
 })

 return map
}

// ===== LIVE =====
window.updateWin = function(player,team,odds){

 const val = Number(document.getElementById(`a_${player}_${team}`).value)
 const box = document.getElementById(`w_${player}_${team}`)

 if(!val){ box.innerText="-"; return }

 box.innerText = Math.round(val*odds)+" Kč"
}

// ===== BET =====
window.bet = async function(playerName,teamId,odds){

 const player = players[playerName]
 const val = Number(document.getElementById(`a_${playerName}_${teamId}`).value)

 if(!val||val<=0) return alert("Zadej částku")
 if(player.credit<val) return alert("Nedostatek kreditu")

 await supabase.from("players")
  .update({credit:player.credit-val})
  .eq("id",player.id)

 await supabase.from("bets_special").insert({
  player_id:player.id,
  type:"winner_regular_season",
  target_id:teamId,
  odds:odds,
  amount:val,
  potential_win:val*odds,
  status:"pending"
 })

 load()
}

// ===== BET CHECK =====
function getBet(playerId, teamId){
 return bets.find(b =>
  b.player_id===playerId &&
  b.target_id===teamId &&
  b.type==="winner_regular_season"
 )
}

// ===== PLAYER =====
function playerBlock(name,oddsMap){

 const p = players[name]

 const sorted = [...teams].sort((a,b)=> oddsMap[b.id]-oddsMap[a.id])

 let html=`
 <div class="playerCard">

  <div class="credit">${name} — 💰 ${Math.round(p.credit)} Kč</div>

  <div class="grid headerRow">
    <div>Tým</div>
    <div>Forma</div>
    <div>Kurz</div>
    <div>Vsazená částka</div>
    <div>Výhra</div>
    <div></div>
  </div>
 `

 sorted.forEach(t=>{

  const o = oddsMap[t.id]
  const existing = getBet(p.id, t.id)

  html+=`<div class="grid row">`

  html+=`
    <div class="teamBlock">
      <img class="logo" src="./logos/${t.logo}">
      <div>${t.name}</div>
    </div>

    <div>${t.rating_form}</div>
    <div><b>${o.toFixed(2)}</b></div>
  `

  if(existing){

    html+=`
      <div>${existing.amount} Kč</div>
      <div>${Math.round(existing.potential_win)} Kč</div>
      <div class="locked">Již vsazeno!</div>
    `

  } else {

    html+=`
      <input id="a_${name}_${t.id}" type="number"
        oninput="updateWin('${name}','${t.id}',${o})">

      <div id="w_${name}_${t.id}">-</div>

      <button onclick="bet('${name}','${t.id}',${o})">Vsadit</button>
    `
  }

  html+=`</div>`
 })

 html+=`</div>`

 return html
}

// ===== RENDER =====
function render(){

 const odds = calculateOdds()

 document.getElementById("section").innerHTML =
  playerBlock("Kubele",odds) +
  playerBlock("Pici",odds)
}

// ===== TOGGLE =====
window.toggleSection = function(id){

 const sec = document.getElementById(id)
 sec.classList.toggle("open")

}

load()

</script>

</body>
</html>
