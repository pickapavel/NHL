<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sázky</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0b2a3c;
  --navy2:#1a5276;
  --gold:#f0c040;
  --green:#27ae60;
  --bg:#f0f4f8;
  --white:#fff;
  --muted:#6b7a8d;
  --border:#e2e8f0;
  --text:#1a2a3c;
  --radius:10px;
  --radius-lg:14px;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

.site-header{background:var(--navy);padding:16px 24px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:100;border-bottom:2px solid rgba(240,192,64,.25)}
.header-logo{font-size:20px;font-weight:700;color:#fff;letter-spacing:.3px}
.header-logo span{color:var(--gold)}

.comp-tabs{background:var(--navy);border-bottom:1px solid rgba(255,255,255,.08);padding:0 24px;display:flex;gap:4px;overflow-x:auto;justify-content:center;}
.comp-tab{padding:12px 20px;font-size:13px;font-weight:600;color:rgba(255,255,255,.55);cursor:pointer;border-bottom:3px solid transparent;transition:all .15s;white-space:nowrap;background:none;border-top:none;border-left:none;border-right:none;font-family:'Inter',sans-serif}
.comp-tab:hover{color:rgba(255,255,255,.85)}
.comp-tab.active{color:#fff;border-bottom-color:var(--gold)}

.phase-bar{background:var(--white);border-bottom:1px solid var(--border);padding:0 24px;display:flex;gap:4px;overflow-x:auto;justify-content:center;}
.phase-tab{padding:10px 16px;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2.5px solid transparent;transition:all .15s;white-space:nowrap;background:none;border-top:none;border-left:none;border-right:none;font-family:'Inter',sans-serif}
.phase-tab:hover{color:var(--text)}
.phase-tab.active{color:var(--navy);border-bottom-color:var(--navy2)}

.wrapper{max-width:1240px;margin:0 auto;padding:24px 20px 60px}

.players-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
@media(max-width:800px){.players-grid{grid-template-columns:1fr}}

.player-card{background:var(--white);border-radius:var(--radius-lg);border:1px solid var(--border);overflow:hidden}
.player-card-header{background:var(--navy);padding:14px 18px;display:flex;align-items:center;justify-content:space-between}
.player-name{font-size:15px;font-weight:700;color:#fff}
.player-credit{font-size:13px;font-weight:600;color:var(--gold);background:rgba(240,192,64,.12);padding:4px 10px;border-radius:20px}

.bet-table{width:100%;border-collapse:collapse}
.bet-table thead tr{background:#f7fafc}
.bet-table th{padding:9px 12px;text-align:left;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--border)}
.bet-table th.tc{text-align:center}
.bet-table tbody td{padding:10px 12px;border-bottom:1px solid #f0f4f8;vertical-align:middle;font-size:13px}
.bet-table tbody tr:last-child td{border-bottom:none}
.bet-table tbody tr:hover td{background:#f7fafc}

.team-cell{display:flex;align-items:center;gap:8px}
.logo{width:28px;height:28px;object-fit:contain;background:#fff;border-radius:5px;padding:2px;border:1px solid var(--border);flex-shrink:0}
.team-name{font-weight:600;font-size:13px}

.odds-badge{display:inline-block;background:#eef2f7;border-radius:6px;padding:3px 9px;font-weight:700;font-size:13px;color:var(--navy);min-width:44px;text-align:center}
.form-val{font-size:12px;color:var(--muted);font-weight:500}

.bet-input{width:80px;padding:6px 8px;border:1px solid var(--border);border-radius:7px;font-size:13px;font-family:'Inter',sans-serif;transition:border-color .15s}
.bet-input:focus{outline:none;border-color:var(--navy2)}

.win-display{font-size:13px;font-weight:600;color:var(--green);min-width:70px;text-align:right}

.bet-btn{background:var(--green);color:#fff;border:none;border-radius:7px;padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;white-space:nowrap;transition:background .15s}
.bet-btn:hover{background:#219a52}
.bet-btn:disabled{background:#aaa;cursor:not-allowed}

.locked-badge{font-size:11px;font-weight:600;color:#27ae60;background:#eafaf1;border-radius:6px;padding:4px 10px;white-space:nowrap}
.closed-badge{font-size:11px;font-weight:600;color:#721c24;background:#f8d7da;border-radius:6px;padding:4px 10px;white-space:nowrap}

.goals-player-card{background:var(--white);border-radius:var(--radius-lg);border:1px solid var(--border);overflow:hidden;margin-bottom:16px}
.goals-team-row{display:grid;grid-template-columns:180px 1fr 160px 90px;gap:12px;align-items:center;padding:12px 16px;border-bottom:1px solid #f0f4f8}
.goals-team-row:last-child{border-bottom:none}
.goals-header-row{display:grid;grid-template-columns:180px 1fr 160px 90px;gap:12px;padding:9px 16px;background:#f7fafc;border-bottom:1px solid var(--border)}
.goals-header-row span{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
.goal-btns{display:flex;gap:6px}
.goal-btn{flex:1;padding:8px 4px;background:#eef2f7;border:1.5px solid var(--border);border-radius:8px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;transition:all .15s;font-family:'Inter',sans-serif}
.goal-btn:hover{background:#e2e8f0;border-color:#b0c4d8}
.goal-btn.selected{background:var(--navy);border-color:var(--navy)}
.goal-btn.selected .goal-btn-label{color:#fff}
.goal-btn.selected .goal-btn-odds{color:rgba(255,255,255,.8)}
.goal-btn-label{font-size:13px;font-weight:700;color:var(--text)}
.goal-btn-odds{font-size:10px;color:var(--muted)}
.goal-input-wrap{display:flex;flex-direction:column;gap:4px}
.goal-win{font-size:12px;font-weight:600;color:var(--green)}

.section-label-wrap{margin:32px 0 16px;display:flex;align-items:center;gap:0;}
.section-label-text{background:var(--navy);color:#fff;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;padding:7px 18px;border-radius:8px 0 0 8px;white-space:nowrap;}
.section-label-line{flex:1;height:3px;background:linear-gradient(90deg,var(--navy2),transparent);border-radius:0 2px 2px 0;}

/* ── ACCORDION SÉRIE ── */
.serie-accordion{margin-bottom:12px;border-radius:var(--radius-lg);border:1px solid var(--border);overflow:hidden;}
.serie-header{
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  padding:14px 18px;background:var(--white);cursor:pointer;
  transition:background .15s;user-select:none;
}
.serie-header:hover{background:#f7fafc;}
.serie-header.open{background:#f0f4f8;}
.serie-header-left{display:flex;align-items:center;gap:12px;}
.serie-logos{display:flex;align-items:center;gap:4px;}
.serie-logo{width:30px;height:30px;object-fit:contain;background:#fff;border-radius:6px;padding:2px;border:1px solid var(--border);}
.serie-title{font-size:14px;font-weight:700;color:var(--navy);}
.serie-subtitle{font-size:11px;color:var(--muted);margin-top:2px;}
.serie-header-right{display:flex;align-items:center;gap:10px;}
.serie-score-badge{font-size:12px;font-weight:700;background:#eef2f7;color:var(--navy);padding:3px 10px;border-radius:20px;white-space:nowrap;}
.serie-arrow{font-size:12px;color:var(--muted);transition:transform .2s;}
.serie-header.open .serie-arrow{transform:rotate(180deg);}
.serie-body{display:none;border-top:1px solid var(--border);}
.serie-body.open{display:block;}

/* ── PLAYOFF MATCH CARD ── */
.po-card{background:var(--white);border-bottom:1px solid var(--border);overflow:hidden;}
.po-card:last-child{border-bottom:none;}
.po-header{background:linear-gradient(135deg,var(--navy),var(--navy2));padding:10px 18px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;}
.po-header-title{font-size:13px;font-weight:700;color:#fff;}
.po-header-right{display:flex;align-items:center;gap:8px;}
.po-header-game{font-size:11px;color:rgba(255,255,255,.7);font-weight:600;background:rgba(255,255,255,.12);padding:3px 10px;border-radius:20px;}
.po-header-phase{font-size:11px;color:var(--gold);font-weight:600;background:rgba(240,192,64,.15);padding:3px 10px;border-radius:20px;}
.po-teams{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:16px;padding:16px 20px;border-bottom:1px solid var(--border);}
.po-team{display:flex;flex-direction:column;align-items:center;gap:5px;text-align:center;}
.po-team-logo{width:44px;height:44px;object-fit:contain;background:#fff;border-radius:8px;padding:3px;border:1px solid var(--border);}
.po-team-name{font-size:13px;font-weight:700;color:var(--text);}
.po-team-meta{display:flex;flex-direction:column;gap:1px;align-items:center;}
.po-team-pos{font-size:11px;color:var(--muted);}
.po-team-rating{font-size:11px;color:var(--muted);}
.po-score{text-align:center;}
.po-score-main{font-size:26px;font-weight:800;color:var(--navy);line-height:1;}
.po-score-vs{font-size:16px;font-weight:700;color:var(--muted);}
.po-odds-strip{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(--border);}
.po-odd{padding:10px 18px;border-right:1px solid var(--border);}
.po-odd:last-child{border-right:none;}
.po-odd-label{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px;}
.po-odd-sublabel{font-size:10px;color:var(--muted);margin-bottom:3px;font-style:italic;}
.po-odd-val{font-size:20px;font-weight:800;color:var(--navy);}
.po-odd-prob{font-size:11px;color:var(--muted);margin-top:1px;}
.po-h2h{padding:8px 18px;background:#f7fafc;border-bottom:1px solid var(--border);}
.po-h2h-title{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;}
.po-h2h-list{display:flex;flex-direction:column;gap:3px;}
.po-h2h-row{display:flex;align-items:center;gap:8px;font-size:12px;background:var(--white);border-radius:6px;padding:4px 10px;border:1px solid var(--border);}
.po-h2h-teams{flex:1;font-size:11px;color:var(--muted);}
.po-h2h-winner{color:#166534;font-weight:700;}
.po-h2h-loser{color:#991b1b;}
.po-h2h-score{font-weight:800;color:var(--text);background:#eef2f7;padding:2px 8px;border-radius:5px;font-size:12px;flex-shrink:0;}
.po-h2h-tag{font-size:9px;font-weight:700;background:#2f9ec9;color:#fff;padding:1px 5px;border-radius:4px;flex-shrink:0;}
.po-h2h-empty{font-size:12px;color:var(--muted);font-style:italic;}
.po-h2h-note{font-size:11px;color:var(--muted);margin-top:5px;display:flex;align-items:center;gap:5px;}
.po-players{display:grid;grid-template-columns:1fr 1fr;}
.po-player{padding:14px 18px;border-right:1px solid var(--border);}
.po-player:last-child{border-right:none;}
.po-player-name{font-size:13px;font-weight:700;color:var(--navy);margin-bottom:2px;}
.po-player-credit{font-size:11px;color:var(--muted);margin-bottom:10px;}
.po-odds-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:10px;}
.po-odd-btn{background:#f0f4f8;color:var(--navy);border:2px solid #e0ecf8;border-radius:8px;padding:8px 4px;text-align:center;cursor:pointer;transition:all .15s;font-family:'Inter',sans-serif;}
.po-odd-btn:hover{background:#dce8f5;border-color:#2f9ec9;}
.po-odd-btn.active{background:var(--navy);color:#fff;border-color:var(--navy);}
.po-odd-btn.placeholder{background:transparent;border-color:transparent;cursor:default;pointer-events:none;}
.po-odd-type{font-size:10px;font-weight:800;display:block;line-height:1.3;}
.po-odd-val{font-size:10px;font-weight:600;color:#666;display:block;margin-top:2px;}
.po-odd-btn.active .po-odd-val{color:#7ab0cc;}
.po-amount-label{font-size:11px;color:#aaa;font-weight:600;margin-bottom:4px;}
.po-amount-input{width:100%;padding:8px 10px;border:2px solid #e0ecf8;border-radius:8px;font-family:'Inter',sans-serif;font-size:13px;font-weight:600;color:var(--navy);background:#f7f9fc;transition:border .15s;}
.po-amount-input:focus{outline:none;border-color:var(--navy2);background:#fff;}
.po-summary{display:flex;justify-content:space-between;font-size:12px;color:#666;margin:8px 0 10px;background:#f7f9fc;border-radius:8px;padding:7px 10px;min-height:32px;align-items:center;}
.po-summary .win-amount{font-weight:800;color:#16a34a;font-size:13px;}
.po-summary .odds-val{font-weight:700;color:var(--navy2);}
.po-vsadit-btn{width:100%;padding:10px;border:none;border-radius:8px;background:var(--green);color:#fff;font-family:'Inter',sans-serif;font-size:13px;font-weight:800;cursor:pointer;transition:background .15s;}
.po-vsadit-btn:hover{background:#219a52;}

.no-phase{text-align:center;padding:60px 20px;color:var(--muted);font-size:14px}
.coming-soon{background:var(--white);border-radius:var(--radius-lg);border:1px solid var(--border);padding:48px 24px;text-align:center;}
.coming-soon-icon{font-size:36px;margin-bottom:12px;}
.coming-soon-title{font-size:16px;font-weight:700;color:var(--navy);margin-bottom:6px;}
.coming-soon-sub{font-size:13px;color:var(--muted);}

@media(max-width:700px){
  .goals-header-row,.goals-team-row{grid-template-columns:1fr}
  .goals-header-row{display:none}
  .goals-team-row{border:1px solid var(--border);border-radius:var(--radius);margin:8px 16px;padding:12px}
  .po-players{grid-template-columns:1fr}
  .po-player{border-right:none;border-top:1px solid var(--border);}
  .po-player:first-child{border-top:none;}
  .po-teams{gap:8px;}
}
@media(max-width:500px){
  .comp-tabs{padding:0 12px;justify-content:flex-start;}
  .phase-bar{padding:0 12px;justify-content:flex-start;}
  .wrapper{padding:16px 12px 60px}
  .bet-table thead{display:none}
  .bet-table td{display:flex;justify-content:space-between;align-items:center;padding:8px 12px}
  .bet-table td::before{content:attr(data-label);font-size:11px;font-weight:600;color:var(--muted)}
}
</style>
</head>

function getGoalsOdds(teamName){
  const n=(teamName||"").toLowerCase()
  if(n.includes("sparta"))                           return {"25":3.20,"30":5.00,"35":7.50}
  if(n.includes("litvínov")||n.includes("litvinov")) return {"25":3.40,"30":5.40,"35":8.20}
  if(n.includes("motor"))                            return {"25":3.60,"30":5.80,"35":9.00}
  if(n.includes("kladno"))                           return {"25":3.90,"30":6.50,"35":10.5}
  if(n.includes("vary"))                             return {"25":4.20,"30":7.20,"35":12.0}
  if(n.includes("liberec"))                          return {"25":4.60,"30":8.20,"35":14.5}
  if(n.includes("pardubice"))                        return {"25":5.20,"30":9.50,"35":17.0}
  if(n.includes("třinec")||n.includes("trinec"))     return {"25":6.00,"30":11.0,"35":20.0}
  return null
}

function getScore(match,teamId){
  const hg=Number(match.home_score),ag=Number(match.away_score)
  let s=null;try{s=match.stats?JSON.parse(match.stats):null}catch(e){}
  const isSN=s&&(s[20]==="1"||s[20]==="2")
  const isOT=s&&!isSN&&(s[9]==="11"||s[19]==="11")
  const isHome=match.home_team===teamId
  const tg=isHome?hg:ag
  if(tg>(isHome?ag:hg)) return(isSN||isOT)?0.75:1
  return(isSN||isOT)?0.25:0
}

function calculateFormRatings(matches){
  const ratings={},fh={},fr={}
  teams.forEach(t=>{ratings[t.id]=START_RATING;fh[t.id]=[];fr[t.id]=START_RATING})
  matches.forEach(m=>{
    const h=m.home_team,a=m.away_team
    if(!fr[h]||!fr[a]) return
    const sH=getScore(m,h),sA=getScore(m,a)
    function upd(tid,oid,score){
      const cur=fr[tid],opp=fr[oid]
      const exp=1/(1+Math.pow(10,(opp-cur)/400))
      const ch=K_FORM*(score-exp)
      fh[tid].push(ch);if(fh[tid].length>5)fh[tid].shift()
      fr[tid]=Math.round(START_RATING+fh[tid].reduce((a,b)=>a+Math.round(b),0))
    }
    upd(h,a,sH);upd(a,h,sA)
    const rH=ratings[h],rA=ratings[a]
    ratings[h]=Math.round(rH+K_FORM*(sH-(1/(1+Math.pow(10,(rA-rH)/400)))))
    ratings[a]=Math.round(rA+K_FORM*(sA-(1/(1+Math.pow(10,(rH-rA)/400)))))
  })
  return fr
}

function calculateStandings(basicMatches){
  const table={}
  teams.forEach(t=>{table[t.id]={id:t.id,name:t.name,logo:t.logo,b:0,z:0,gf:0,ga:0}})
  basicMatches.forEach(m=>{
    const h=table[m.home_team],a=table[m.away_team]
    if(!h||!a) return
    const hg=Number(m.home_score),ag=Number(m.away_score)
    let s=null;try{s=m.stats?JSON.parse(m.stats):null}catch(e){}
    const isSN=s&&(s[20]==="1"||s[20]==="2")
    const isOT=s&&!isSN&&(s[9]==="11"||s[19]==="11")
    const ots=isSN||isOT
    h.z++;a.z++;h.gf+=hg;h.ga+=ag;a.gf+=ag;a.ga+=hg
    if(hg>ag){if(ots){h.b+=2;a.b+=1}else h.b+=3}
    else{if(ots){a.b+=2;h.b+=1}else a.b+=3}
  })
  return Object.values(table).filter(t=>t.z>0)
    .sort((a,b)=>b.b!==a.b?b.b-a.b:(b.gf-b.ga)-(a.gf-a.ga))
}

function getH2H(homeId,awayId){
  return allPlayedMatches
    .filter(m=>(m.home_team===homeId&&m.away_team===awayId)||(m.home_team===awayId&&m.away_team===homeId))
    .slice(-5).reverse()
}

function renderH2HHtml(homeId,awayId){
  const h2h=getH2H(homeId,awayId)
  if(!h2h.length) return `<div class="po-h2h-empty">Žádné vzájemné zápasy</div>`
  return h2h.map(m=>{
    const home=teams.find(t=>t.id===m.home_team)
    const away=teams.find(t=>t.id===m.away_team)
    if(!home||!away) return ""
    const hg=Number(m.home_score),ag=Number(m.away_score)
    const homeWin=hg>ag
    let s=null;try{s=m.stats?JSON.parse(m.stats):null}catch(e){}
    const isSN=s&&(s[20]==="1"||s[20]==="2")
    const isOT=s&&!isSN&&(s[9]==="11"||s[19]==="11")
    const tag=isSN?"SN":isOT?"OT":""
    return `<div class="po-h2h-row">
      <span class="po-h2h-teams">
        <span class="${homeWin?"po-h2h-winner":"po-h2h-loser"}">${home.name.replace(/\(.\)$/,'').trim()}</span>
        vs
        <span class="${homeWin?"po-h2h-loser":"po-h2h-winner"}">${away.name.replace(/\(.\)$/,'').trim()}</span>
      </span>
      <span class="po-h2h-score">${hg} : ${ag}</span>
      ${tag?`<span class="po-h2h-tag">${tag}</span>`:""}
    </div>`
  }).join("")
}

function getLastH2H(homeId,awayId){
  const h2h=allPlayedMatches.filter(m=>
    (m.home_team===homeId&&m.away_team===awayId)||
    (m.home_team===awayId&&m.away_team===homeId)
  )
  return h2h.length?h2h[h2h.length-1]:null
}

function calcPlayoffOdds(homeId,awayId){
  const n=standings.length
  const hp=standings.findIndex(t=>t.id===homeId)
  const ap=standings.findIndex(t=>t.id===awayId)
  const hs=hp>=0?(n-hp)/n:0.5
  const as_=ap>=0?(n-ap)/n:0.5
  let probH=hs/(hs+as_)
  const h2h=getLastH2H(homeId,awayId)
  let h2hText="Žádný vzájemný zápas v ZČ"
  if(h2h){
    const hg=Number(h2h.home_score),ag=Number(h2h.away_score)
    const homeWon=h2h.home_team===homeId?hg>ag:ag>hg
    probH=Math.max(0.05,Math.min(0.95,probH+(homeWon?0.04:-0.04)))
    const wName=homeWon?teams.find(t=>t.id===homeId)?.name:teams.find(t=>t.id===awayId)?.name
    h2hText=`Poslední vzájemný: ${hg}:${ag} → vyhrál ${wName} (${homeWon?"+":"-"}4%)`
  }
  const probA=1-probH
  return{
    home:(1/probH)*PLAYOFF_MARGIN,
    away:(1/probA)*PLAYOFF_MARGIN,
    probHome:Math.round(probH*100),
    probAway:Math.round(probA*100),
    homePos:hp+1,
    awayPos:ap+1,
    h2hText,
  }
}

function calcMatchOdds(homeRating,awayRating){
  const HOME_ADV=80,homeAdj=homeRating+HOME_ADV
  const diff=Math.abs(homeAdj-awayRating)
  let drawProb=0.25*Math.exp(-diff/400)
  drawProb=Math.max(0.10,Math.min(0.30,drawProb))
  const probHomeRaw=1/(1+Math.pow(10,(awayRating-homeAdj)/400))
  const probAwayRaw=1-probHomeRaw
  const probHome=probHomeRaw*(1-drawProb)
  const probAway=probAwayRaw*(1-drawProb)
  const probHomeOT=drawProb*probHomeRaw
  const probAwayOT=drawProb*probAwayRaw
  return{
    "1":       1/probHome,
    "0":       1/drawProb,
    "2":       1/probAway,
    "11":      1/(1-probAway),
    "no_draw": 1/(probHome+probAway),
    "22":      1/(1-probHome),
    "vdr_home":1/(probHome+probHomeOT),
    "vdr_away":1/(probAway+probAwayOT),
  }
}

function calculateWinnerOdds(){
  const s=teams.map(t=>Math.pow(Number(formRatings[t.id]||1000),6))
  const total=s.reduce((a,b)=>a+b,0)
  const map={};teams.forEach((t,i)=>{map[t.id]=MARGIN/(s[i]/total)});return map
}
function calculateNonWinnerOdds(){
  const sorted=[...teams].sort((a,b)=>(formRatings[a.id]||1000)-(formRatings[b.id]||1000))
  const map={}
  sorted.forEach((t,i)=>{
    const ratio=sorted.length>1?i/(sorted.length-1):0
    map[t.id]=1.10+Math.pow(ratio,3)*(3.00-1.10)
  })
  return map
}
function calculateLastOdds(){
  const s=teams.map(t=>Math.pow(1/(Number(formRatings[t.id]||1000)),6))
  const total=s.reduce((a,b)=>a+b,0)
  const map={};teams.forEach((t,i)=>{map[t.id]=MARGIN/(s[i]/total)});return map
}
function calculateEqualOdds(f=2.5){
  const map={};teams.forEach(t=>{map[t.id]=f});return map
}

async function load(){
  const{data:t}=await supabase.from("teams").select("*").eq("competition","extraliga")
  teams=t||[]

  const{data:seasons}=await supabase.from("seasons").select("*")
    .eq("competition_id",EXTRALIGA_COMPETITION_ID)
    .order("created_at",{ascending:false})
  const currentSeason=seasons?.[0]
  if(!currentSeason){
    document.getElementById("mainContent").innerHTML=renderComingSoon()
    return
  }

  const{data:stages}=await supabase.from("stages").select("*")
    .eq("season_id",currentSeason.id)

  const zakladniStageIds=(stages||[])
    .filter(s=>s.name==="Základní část")
    .map(s=>s.id)

  const playoffStageMap={
    ctvrtfinale:(stages||[]).filter(s=>s.name.startsWith("Čtvrtfinále")).map(s=>s.id),
    semifinale: (stages||[]).filter(s=>s.name.startsWith("Semifinále")).map(s=>s.id),
    finale:     (stages||[]).filter(s=>s.name==="Finále").map(s=>s.id),
  }

  // Uložíme stage map globálně pro deep link
  window._playoffStageMap=playoffStageMap

  const{data:allPlayed}=await supabase.from("matches").select("*")
    .not("home_score","is",null).not("away_score","is",null)
    .order("round",{ascending:true})
  allPlayedMatches=allPlayed||[]

  const basicMatches=allPlayedMatches.filter(m=>zakladniStageIds.includes(m.stage_id))
  formRatings=calculateFormRatings(basicMatches)
  standings=calculateStandings(basicMatches)

  const allPoStageIds=[
    ...playoffStageMap.ctvrtfinale,
    ...playoffStageMap.semifinale,
    ...playoffStageMap.finale,
  ]
  const{data:poAll}=allPoStageIds.length
    ?await supabase.from("matches").select("*")
        .in("stage_id",allPoStageIds)
        .order("round",{ascending:true})
    :{data:[]}

  playoffMatchesByPhase={
    ctvrtfinale:(poAll||[]).filter(m=>playoffStageMap.ctvrtfinale.includes(m.stage_id)),
    semifinale: (poAll||[]).filter(m=>playoffStageMap.semifinale.includes(m.stage_id)),
    finale:     (poAll||[]).filter(m=>playoffStageMap.finale.includes(m.stage_id)),
  }

  const{data:p}=await supabase.from("players").select("*").in("name",["Kubele","Pici"])
  ;(p||[]).forEach(pl=>players[pl.name]=pl)

  const{data:b}=await supabase.from("bets_special").select("*").eq("status","pending")
  bets=b||[]

  await loadLocks()

  // Zpracuj URL parametry — přepni na správnou fázi
  if(urlPhase && COMP_CONFIG.extraliga.betSections[urlPhase]==="matches"){
    currentPhase=urlPhase
  }

  render()
}

function poUpdateSummary(matchId,playerKey){
  const key=`${matchId}_${playerKey}`

  const summaryEl=document.getElementById(`po_summary_${matchId}_${playerKey}`)
  const amountEl=document.getElementById(`po_amount_${matchId}_${playerKey}`)

  } else {
    summaryEl.innerHTML=`<span class="odds-val">Kurz: ${combinedOdds.toFixed(2)}</span><span style="color:#aaa;">Zadej částku</span>`
  }
}

  await supabase.from("bets").insert({
    match_id:matchId, player_id:player.id,
    tip:sel.join(","), amount,
    odds:combinedOdds, potential_win:amount*combinedOdds, status:"pending"

function checkTip(match,tip){
  const type=match.result_type
  const hg=Number(match.home_score),ag=Number(match.away_score)
  const hw=hg>ag,aw=ag>hg
  const isOTorSN=(type==="OT"||type==="SN")
  switch(tip){
    case "1":        return hw&&type==="REG"
    case "0":        return isOTorSN
    case "2":        return aw&&type==="REG"
    case "11":       return!(aw&&type==="REG")
    case "no_draw":  return type==="REG"
    case "22":       return!(hw&&type==="REG")
    case "vdr_home": return hw
    case "vdr_away": return aw
  }
  return false
}

        <div class="po-odd-label">Kurz na vítěze série</div>
        <div class="po-odd-sublabel">${home.name}</div>
        <div class="po-odd-val">${poOdds.home.toFixed(2)}</div>
        <div class="po-odd-prob">${poOdds.probHome}% pravděpodobnost</div>
      </div>
      <div class="po-odd">
        <div class="po-odd-label">Kurz na vítěze série</div>
        <div class="po-odd-sublabel">${away.name}</div>
        <div class="po-odd-val">${poOdds.away.toFixed(2)}</div>

      <div class="po-h2h-note">ℹ️ ${poOdds.h2hText}</div>

    <div class="po-players">
      ${renderPoPlayerBlock(m,kubele,"kubele",tips,matchOdds,matchBets)}

function renderPoPlayerBlock(m,player,playerKey,tips,oddsMap,matchBets){
  if(!player) return ""
  const existing=matchBets.find(b=>b.player_id===player.id)||null
  const played=m.played&&m.home_score!=null

  if(existing){
    const tips_arr=existing.tip.split(",")
    let resultHtml=""
    if(played){
      const won=tips_arr.every(t=>checkTip(m,t))
      resultHtml=won
        ?`<div style="color:#16a34a;font-weight:800;font-size:13px;">🎉 Výhra ${Math.round(existing.potential_win)} Kč!</div>`
        :`<div style="color:#dc2626;font-weight:700;font-size:12px;">❌ Prohra (${existing.amount} Kč)</div>`
    } else {
      resultHtml=`<div style="font-size:12px;color:var(--muted);">Kurz: ${existing.odds.toFixed(2)} · Možná výhra: <b>${Math.round(existing.potential_win)} Kč</b></div>`
    }
    return `<div class="po-player">
      <div class="po-player-name">${player.name}</div>
      <div class="po-player-credit">💰 ${Math.round(player.credit)} Kč</div>
      <span class="locked-badge" style="margin-bottom:6px;">✓ Vsazeno: ${tips_arr.join(" + ")} · ${existing.amount} Kč</span>
      <div style="margin-top:6px;">${resultHtml}</div>
    </div>`
  }

  if(played){
    return `<div class="po-player">
      <div class="po-player-name">${player.name}</div>
      <div class="po-player-credit">💰 ${Math.round(player.credit)} Kč</div>
      <div style="font-size:12px;color:var(--muted);font-style:italic;">Zápas již byl odehrán.</div>
    </div>`
  }

  const tipsHtml=tips.map(({type,label})=>{
    if(type==="__empty") return `<div class="po-odd-btn placeholder"></div>`
    const o=oddsMap[type]
    if(!o) return `<div class="po-odd-btn placeholder"></div>`
    return `<div class="po-odd-btn"
      data-match="${m.id}" data-player="${playerKey}" data-type="${type}"
      onclick="poSelectTip('${m.id}','${playerKey}','${type}')">
      <span class="po-odd-type">${label}</span>
      <span class="po-odd-val">${o.toFixed(2)}</span>
    </div>`
  }).join("")

  return `<div class="po-player">
    <div class="po-player-name">${player.name}</div>
    <div class="po-player-credit">💰 ${Math.round(player.credit)} Kč</div>
    <div class="po-odds-grid">${tipsHtml}</div>
    <div class="po-amount-label">Částka (Kč)</div>
    <input class="po-amount-input" id="po_amount_${m.id}_${playerKey}" type="number" min="1" placeholder="0 Kč"
      oninput="poUpdateAmount('${m.id}','${playerKey}')">
    <div class="po-summary" id="po_summary_${m.id}_${playerKey}"><span style="color:#aaa;">Vyber tip a částku</span></div>
    <button class="po-vsadit-btn" onclick="poPlaceBet('${m.id}','${playerKey}')">🎲 Vsadit</button>
  </div>`
}

// ── RENDER PLAYOFF PHASE ──
function renderPlayoffMatches(phase){
  const allMatches=playoffMatchesByPhase[phase]||[]
  if(allMatches.length===0) return renderComingSoon()

  const phaseLabel={ctvrtfinale:"Čtvrtfinále",semifinale:"Semifinále",finale:"Finále"}[phase]||""

  // Seskup podle stage_id (každý stage = jedna série)
  const byStage={}
  allMatches.forEach(m=>{
    if(!byStage[m.stage_id]) byStage[m.stage_id]=[]
    byStage[m.stage_id].push(m)
  })

  // Seřaď zápasy uvnitř série — nejnovější nahoře
  Object.keys(byStage).forEach(sid=>{
    byStage[sid].sort((a,b)=>Number(b.round)-Number(a.round))
  })

  let html=""
  Object.entries(byStage).forEach(([stageId, matches])=>{
    html+=renderSerieHeader(stageId, matches, phaseLabel)
  })

  // Po renderu — otevři správnou sérii pokud přišel deep link
  if(urlStage && byStage[urlStage]){
    setTimeout(()=>{
      const body=document.getElementById(`serie-body-${urlStage}`)
      const header=document.getElementById(`serie-header-${urlStage}`)
      if(body&&header){
        body.classList.add("open")
        header.classList.add("open")
        document.getElementById(`serie-${urlStage}`)?.scrollIntoView({behavior:"smooth",block:"start"})
      }
    },100)
  }

  return html
}

function playerBetTable(playerName,oddsMap,dbType){
  const p=players[playerName]
  if(!p) return ""
  const sorted=[...teams].sort((a,b)=>oddsMap[a.id]-oddsMap[b.id])
  let rows=sorted.map(t=>{
    const o=oddsMap[t.id]
    const existing=getBet(p.id,t.id,dbType)
    const form=formRatings[t.id]||1000
    const locked=isLocked(dbType,t.id)
    const id=`${playerName}_${t.id}_${dbType}`
    if(existing) return `<tr>
      <td data-label="Tým"><div class="team-cell"><img class="logo" src="./logos/${t.logo}" onerror="this.style.display='none'"><span class="team-name">${t.name}</span></div></td>
      <td class="tc" data-label="Forma"><span class="form-val">${form}</span></td>
      <td class="tc" data-label="Kurz"><span class="odds-badge">${o.toFixed(2)}</span></td>
      <td data-label="Vsazeno">${existing.amount} Kč</td>
      <td data-label="Výhra">${Math.round(existing.potential_win)} Kč</td>
      <td><span class="locked-badge">✓ Vsazeno</span></td>
    </tr>`
    if(locked) return `<tr>
      <td data-label="Tým"><div class="team-cell"><img class="logo" src="./logos/${t.logo}" onerror="this.style.display='none'"><span class="team-name">${t.name}</span></div></td>
      <td class="tc" data-label="Forma"><span class="form-val">${form}</span></td>
      <td class="tc" data-label="Kurz"><span class="odds-badge">${o.toFixed(2)}</span></td>
      <td colspan="3"><span class="closed-badge">🔒 Uzavřeno pro tipování</span></td>
    </tr>`
    return `<tr>
      <td data-label="Tým"><div class="team-cell"><img class="logo" src="./logos/${t.logo}" onerror="this.style.display='none'"><span class="team-name">${t.name}</span></div></td>
      <td class="tc" data-label="Forma"><span class="form-val">${form}</span></td>
      <td class="tc" data-label="Kurz"><span class="odds-badge">${o.toFixed(2)}</span></td>
      <td data-label="Vsadit"><input class="bet-input" id="a_${id}" type="number" min="1" placeholder="Kč" oninput="updateWin('${playerName}','${t.id}','${dbType}',${o})"></td>
      <td data-label="Výhra"><span class="win-display" id="w_${id}">—</span></td>
      <td><button class="bet-btn" onclick="bet('${playerName}','${t.id}',${o},'${dbType}')">Vsadit</button></td>
    </tr>`
  }).join("")
  return `<div class="player-card">
    <div class="player-card-header">
      <span class="player-name">${playerName}</span>
      <span class="player-credit">💰 ${Math.round(p.credit)} Kč</span>
    </div>
    <table class="bet-table">
      <thead><tr>
        <th>Tým</th><th class="tc">Forma</th><th class="tc">Kurz</th>
        <th>Vsadit</th><th>Výhra</th><th></th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`
}

function goalsPlayerBlock(playerName){
  const p=players[playerName]
  if(!p) return ""
  const goalsTeams=teams.filter(t=>getGoalsOdds(t.name))
  const rows=goalsTeams.map(t=>{
    const odds=getGoalsOdds(t.name)
    const existing=getExistingGoalBet(p.id,t.id)
    const locked=isLocked("goals_regular_season",t.id)
    if(existing){
      const thr=existing.type.split("_")[1]
      return `<div class="goals-team-row">
        <div class="team-cell"><img class="logo" src="./logos/${t.logo}" onerror="this.style.display='none'"><span class="team-name">${t.name}</span></div>
        <div style="font-size:13px;font-weight:600">${thr}+ gólů · kurz ${existing.odds}</div>
        <div style="font-size:13px">${existing.amount} Kč → <b>${Math.round(existing.potential_win)} Kč</b></div>
        <div><span class="locked-badge">✓ Vsazeno</span></div>
      </div>`
    }
    if(locked){
      return `<div class="goals-team-row">
        <div class="team-cell"><img class="logo" src="./logos/${t.logo}" onerror="this.style.display='none'"><span class="team-name">${t.name}</span></div>
        <div style="font-size:13px;color:var(--muted)">${["25","30","35"].map(thr=>`${thr}+: ${odds[thr]}`).join(" · ")}</div>
        <div><span class="closed-badge">🔒 Uzavřeno</span></div>
        <div></div>
      </div>`
    }
    return `<div class="goals-team-row">
      <div class="team-cell"><img class="logo" src="./logos/${t.logo}" onerror="this.style.display='none'"><span class="team-name">${t.name}</span></div>
      <div class="goal-btns">
        ${["25","30","35"].map(thr=>`
          <button class="goal-btn" id="gbtn_${playerName}_${t.id}_${thr}" onclick="selectGoal('${playerName}','${t.id}','${thr}')">
            <span class="goal-btn-label">${thr}+</span>
            <span class="goal-btn-odds">${odds[thr]}</span>
          </button>`).join("")}
      </div>
      <div class="goal-input-wrap">
        <input class="bet-input" id="gi_${playerName}_${t.id}" type="number" min="1" placeholder="Kč" oninput="updateGoalWin('${playerName}','${t.id}')">
        <span class="goal-win" id="gw_${playerName}_${t.id}">—</span>
      </div>
      <button class="bet-btn" onclick="betGoals('${playerName}','${t.id}')">Vsadit</button>
    </div>`
  }).join("")
  return `<div class="goals-player-card">
    <div class="player-card-header">
      <span class="player-name">${playerName}</span>
      <span class="player-credit">💰 ${Math.round(p.credit)} Kč</span>
    </div>
    <div class="goals-header-row">
      <span>Tým</span><span>Vyber tip</span><span>Částka / Výhra</span><span></span>
    </div>
    ${rows}
  </div>`
}

function renderComingSoon(){
  return `<div class="coming-soon">
    <div class="coming-soon-icon">🏒</div>
    <div class="coming-soon-title">Zatím žádné zápasy</div>
    <div class="coming-soon-sub">Sázky se zobrazí jakmile budou přidány zápasy do této fáze.</div>
  </div>`
}

function renderSection(section){
  const wo=calculateWinnerOdds(),nwo=calculateNonWinnerOdds(),lo=calculateLastOdds(),eo=calculateEqualOdds()
  let html=`<div class="section-label-wrap">
    <div class="section-label-text">${section.title}</div>
    <div class="section-label-line"></div>
  </div>`
  if(section.type==="goals"){
    html+=goalsPlayerBlock("Kubele")+goalsPlayerBlock("Pici")
    return html
  }
  const oddsMap=section.type==="winner"?wo:section.type==="nonwinner"?nwo:section.type==="last"?lo:eo
  html+=`<div class="players-grid">
    ${playerBetTable("Kubele",oddsMap,section.dbType)}
    ${playerBetTable("Pici",  oddsMap,section.dbType)}
  </div>`
  return html
}

async function render(){
  const cfg=COMP_CONFIG[currentComp]
  const sections=cfg.betSections[currentPhase]
  const content=document.getElementById("mainContent")

  if(sections==="matches"){
    const matchIds=[
      ...(playoffMatchesByPhase["ctvrtfinale"]||[]),
      ...(playoffMatchesByPhase["semifinale"]||[]),
      ...(playoffMatchesByPhase["finale"]||[]),
    ].map(m=>m.id)

    if(matchIds.length){
      const{data:matchBetsData}=await supabase.from("bets").select("*")
        .in("match_id",matchIds)
      window._matchBets={}
      ;(matchBetsData||[]).forEach(b=>{
        if(!window._matchBets[b.match_id]) window._matchBets[b.match_id]=[]
        window._matchBets[b.match_id].push(b)
      })
    } else {
      window._matchBets={}
    }

    content.innerHTML=renderPlayoffMatches(currentPhase)
    return
  }

  if(!sections||sections.length===0){
    content.innerHTML=renderComingSoon()
    return
  }

  content.innerHTML=sections.map(renderSection).join("")
}

renderPhaseTabs()
load()
</script>
