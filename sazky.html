<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Sázky</title>

<style>
body{font-family:Arial;background:#f2f2f2;margin:0;}
.wrapper{max-width:1300px;margin:auto;padding:20px;background:white;}

h2{margin-top:40px;}

.credit{
 font-size:18px;
 margin-bottom:10px;
 padding:10px;
 background:#eee;
}

.block{border:1px solid #ccc;margin-bottom:20px;}
.block-header{background:black;color:yellow;padding:10px;cursor:pointer;}
.block-content{display:none;padding:10px;}

.header-row{
 display:flex;
 font-weight:bold;
 border-bottom:2px solid black;
 padding-bottom:5px;
 margin-bottom:10px;
}

.team-row{
 display:flex;
 align-items:center;
 border-bottom:1px solid #ddd;
 padding:8px 0;
}

.col-name{width:250px;}
.col-rating{width:90px;text-align:center;}
.col-odds{width:90px;text-align:center;font-weight:bold;}
.col-input{width:100px;}
.col-win{width:120px;text-align:center;}
.col-btn{width:100px;}

input{padding:5px;width:80px;}
button{padding:5px 10px;cursor:pointer;}
</style>
</head>

<body>

<div class="wrapper">

<h1>Sázky</h1>

<div id="app"></div>

</div>

<script type="module">

import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient(
  "https://qaocbodrflsaerxntfui.supabase.co",
  "sb_publishable_eIeO9MihyuQDuNHy60Ubrw_8ZuSKPFU"
)

let teams = []
let players = {}

// ===== LOAD =====
async function load(){

 const { data: t } = await supabase
  .from("teams")
  .select("*")
  .eq("competition", "extraliga")

 teams = t

 // 🔥 NAJDI KONKRÉTNÍ HRÁČE
 const { data: p } = await supabase
  .from("players")
  .select("*")
  .in("name", ["Kubele", "Pici"])

 p.forEach(pl => players[pl.name] = pl)

 render()
}

// ===== ODDS (🔥 VÝRAZNÉ ROZDÍLY) =====
function calculateOddsAll(){

 const strengths = teams.map(t => 
  Math.pow(Number(t.rating_form || 1000), 6)
 )

 const total = strengths.reduce((a,b)=>a+b,0)

 const margin = 1.15
 const oddsMap = {}

 teams.forEach((team, i)=>{

  const prob = strengths[i] / total
  const odds = margin / prob

  oddsMap[team.id] = odds.toFixed(2)
 })

 return oddsMap
}

// ===== LIVE VÝHRA =====
window.updateWin = function(teamId, odds, playerName){

 const amount = Number(document.getElementById(`amount_${playerName}_${teamId}`).value)
 const winBox = document.getElementById(`win_${playerName}_${teamId}`)

 if(!amount){
  winBox.innerText = "-"
  return
 }

 winBox.innerText = Math.round(amount * odds) + " Kč"
}

// ===== RENDER JEDNOHO HRÁČE =====
function renderPlayer(playerName){

 const player = players[playerName]
 const oddsMap = calculateOddsAll()

 let html = `
  <h2>${playerName}</h2>
  <div class="credit">💰 Kredit: <b>${player.credit} Kč</b></div>

  <div class="block">
    <div class="block-header" onclick="toggleBlock(this)">
      Vítěz základní části
    </div>

    <div class="block-content">

      <div class="header-row">
        <div class="col-name">Tým</div>
        <div class="col-rating">Forma</div>
        <div class="col-odds">Kurz</div>
        <div class="col-input">Sázka</div>
        <div class="col-win">Možná výhra</div>
        <div class="col-btn"></div>
      </div>
  `

 teams.forEach(team=>{

  const odds = oddsMap[team.id]

  html += `
   <div class="team-row">
     <div class="col-name">${team.name}</div>
     <div class="col-rating">${team.rating_form}</div>
     <div class="col-odds">${odds}</div>

     <div class="col-input">
       <input 
         type="number"
         id="amount_${playerName}_${team.id}"
         oninput="updateWin('${team.id}', ${odds}, '${playerName}')"
         placeholder="Kč">
     </div>

     <div class="col-win" id="win_${playerName}_${team.id}">-</div>

     <div class="col-btn">
       <button onclick="placeBet('${player.id}', '${team.id}', ${odds}, '${playerName}')">
         Vsadit
       </button>
     </div>
   </div>
  `
 })

 html += `</div></div>`

 return html
}

// ===== RENDER =====
function render(){

 const app = document.getElementById("app")

 app.innerHTML =
  renderPlayer("Kubele") +
  renderPlayer("Pici")
}

// ===== TOGGLE =====
window.toggleBlock = function(el){
 const c = el.nextElementSibling
 c.style.display = c.style.display === "block" ? "none" : "block"
}

// ===== BET =====
window.placeBet = async function(playerId, teamId, odds, playerName){

 const amount = Number(document.getElementById(`amount_${playerName}_${teamId}`).value)

 if(!amount || amount <= 0){
  alert("Zadej částku")
  return
 }

 const player = players[playerName]

 if(player.credit < amount){
  alert("Nedostatek kreditu")
  return
 }

 const potential = amount * odds

 await supabase
  .from("players")
  .update({
   credit: player.credit - amount
  })
  .eq("id", playerId)

 await supabase
  .from("bets_special")
  .insert({
   player_id: playerId,
   type: "winner_regular_season",
   target_id: teamId,
   odds: odds,
   amount: amount,
   potential_win: potential,
   status: "pending"
  })

 alert("Vsazeno 👍")

 load()
}

load()

</script>

</body>
</html>
