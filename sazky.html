<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sázky</title>

<style>
*{box-sizing:border-box}

body{font-family:Arial;margin:0;background:#f2f2f2;}
.wrapper{max-width:1200px;margin:auto;padding:15px;background:white;}

.sectionHeader{
 background:#0b2a3c;color:white;padding:12px;border-radius:10px;
 cursor:pointer;font-size:18px;margin-bottom:10px;
}

.blockContent{display:none;}

.playerCard{
 background:#e9ecef;border-radius:10px;padding:12px;margin-bottom:15px;
}

.betList{
 margin-top:10px;
 background:white;
 padding:10px;
 border-radius:8px;
}

.betRow{
 display:flex;
 justify-content:space-between;
 padding:6px 0;
 border-bottom:1px solid #ddd;
 font-size:13px;
}

.row{
 display:flex;align-items:center;justify-content:space-between;
 padding:10px;border-bottom:1px solid #ccc;flex-wrap:wrap;
}

.teamBlock{display:flex;align-items:center;gap:10px;width:220px;}
.logo{width:40px;height:40px;background:white;border-radius:6px;padding:2px;}

.rating{width:70px;text-align:center;}
.odds{width:70px;text-align:center;font-weight:bold;}
.win{width:100px;text-align:center;}

input{width:70px;padding:5px;}

button{
 background:#27ae60;color:white;border:none;border-radius:6px;
 padding:6px 10px;cursor:pointer;
}

.credit{font-weight:bold;margin-bottom:10px;}

@media(max-width:768px){
 .row{flex-direction:column;align-items:flex-start;gap:6px}
 button{width:100%}
}
</style>
</head>

<body>

<div class="wrapper">

<h1>Sázky</h1>

<div class="sectionHeader" onclick="toggleSection()">
 Vítěz základní části
</div>

<div id="section" class="blockContent"></div>

</div>

<script type="module">

import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient(
 "https://qaocbodrflsaerxntfui.supabase.co",
 "sb_publishable_eIeO9MihyuQDuNHy60Ubrw_8ZuSKPFU"
)

let teams = []
let players = {}
let bets = []

// ===== LOAD =====
async function load(){

 const { data: t } = await supabase
  .from("teams")
  .select("*")
  .eq("competition","extraliga")

 teams = t

 const { data: p } = await supabase
  .from("players")
  .select("*")
  .in("name",["Kubele","Pici"])

 p.forEach(pl=> players[pl.name]=pl)

 const { data: b } = await supabase
  .from("bets_special")
  .select("*")

 bets = b

 render()
}

// ===== ODDS =====
function calculateOdds(){

 const strengths = teams.map(t =>
  Math.pow(Number(t.rating_form||1000),6)
 )

 const total = strengths.reduce((a,b)=>a+b,0)

 const margin = 2.2
 const map = {}

 teams.forEach((t,i)=>{
  const prob = strengths[i]/total
  map[t.id]=(margin/prob)
 })

 return map
}

// ===== LIVE =====
window.updateWin = function(player,team,odds){

 const val = Number(document.getElementById(`a_${player}_${team}`).value)
 const box = document.getElementById(`w_${player}_${team}`)

 if(!val){ box.innerText="-"; return }

 box.innerText = Math.round(val*odds)+" Kč"
}

// ===== BET =====
window.bet = async function(playerName,teamId,odds){

 const player = players[playerName]
 const val = Number(document.getElementById(`a_${playerName}_${teamId}`).value)

 if(!val||val<=0) return alert("Zadej částku")
 if(player.credit<val) return alert("Nedostatek kreditu")

 await supabase.from("players")
  .update({credit:player.credit-val})
  .eq("id",player.id)

 await supabase.from("bets_special").insert({
  player_id:player.id,
  type:"winner_regular_season",
  target_id:teamId,
  odds:odds,
  amount:val,
  potential_win:val*odds,
  status:"pending"
 })

 alert("Vsazeno 👍")
 load()
}

// ===== BET LIST =====
function renderBets(playerName){

 const player = players[playerName]

 const myBets = bets.filter(b => b.player_id === player.id)

 if(!myBets.length) return "<div>Žádné sázky</div>"

 return myBets.map(b=>{

  const team = teams.find(t=>t.id===b.target_id)

  return `
   <div class="betRow">
     <div>${team?.name || "?"}</div>
     <div>${b.amount} Kč</div>
     <div>kurz ${Number(b.odds).toFixed(2)}</div>
     <div>${Math.round(b.potential_win)} Kč</div>
     <div>${b.status}</div>
   </div>
  `
 }).join("")
}

// ===== PLAYER BLOCK =====
function playerBlock(name,oddsMap){

 const p = players[name]

 const sorted = [...teams].sort((a,b)=> oddsMap[b.id]-oddsMap[a.id])

 let html=`
 <div class="playerCard">

  <div class="credit">${name} — 💰 ${Math.round(p.credit)} Kč</div>
 `

 sorted.forEach(t=>{

  const o = oddsMap[t.id]

  html+=`
  <div class="row">

    <div class="teamBlock">
      <img class="logo" src="./logos/${t.logo}">
      <div>${t.name}</div>
    </div>

    <div class="rating">${t.rating_form}</div>
    <div class="odds">${o.toFixed(2)}</div>

    <input id="a_${name}_${t.id}" type="number"
      oninput="updateWin('${name}','${t.id}',${o})">

    <div class="win" id="w_${name}_${t.id}">-</div>

    <button onclick="bet('${name}','${t.id}',${o})">Vsadit</button>

  </div>
  `
 })

 // 🔥 BET LIST
 html+=`
  <div class="betList">
    <b>Moje sázky:</b>
    ${renderBets(name)}
  </div>
 `

 html+=`</div>`

 return html
}

// ===== RENDER =====
function render(){

 const odds = calculateOdds()

 document.getElementById("section").innerHTML =
  playerBlock("Kubele",odds) +
  playerBlock("Pici",odds)
}

// ===== TOGGLE =====
window.toggleSection = function(){
 const s = document.getElementById("section")
 s.style.display = s.style.display==="block"?"none":"block"
}

load()

</script>

</body>
</html>
