<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rating týmů</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:#eef2f7;min-height:100vh;}

.header{background:linear-gradient(135deg,#0b2a3c 0%,#1a5276 100%);padding:20px 30px;display:flex;align-items:center;gap:16px;margin-bottom:32px;}
.header-logo{width:56px;height:56px;object-fit:contain;mix-blend-mode:lighten;}
.header-title{font-size:22px;font-weight:800;color:white;letter-spacing:-.3px;}
.header-sub{font-size:12px;color:#7ab0cc;font-weight:500;margin-top:3px;text-transform:uppercase;letter-spacing:.06em;}

.wrapper{max-width:1100px;margin:0 auto;padding:0 20px 40px;}
.section-title{font-size:17px;font-weight:700;color:#0b2a3c;margin:0 0 16px;display:flex;align-items:center;gap:8px;}
.section-title::after{content:'';flex:1;height:2px;background:linear-gradient(90deg,#2f9ec9,transparent);border-radius:2px;}

.filter-bar{display:flex;gap:10px;margin-bottom:24px;flex-wrap:wrap;}
.filter-btn{padding:8px 18px;border-radius:20px;border:2px solid #c8d8e8;background:white;font-family:'Inter',sans-serif;font-size:13px;font-weight:700;cursor:pointer;color:#1a3a5c;transition:all .15s;}
.filter-btn:hover{background:#dce8f5;border-color:#2f9ec9;}
.filter-btn.active{background:#0b2a3c;color:white;border-color:#0b2a3c;}

.team-card{background:white;border-radius:14px;overflow:hidden;border:1px solid #c8d8e8;box-shadow:0 2px 8px rgba(26,58,92,.07);margin-bottom:20px;}
.team-header{background:#0b2a3c;padding:14px 16px;display:flex;align-items:center;gap:12px;}
.team-logo{width:40px;height:40px;object-fit:contain;background:white;border-radius:8px;padding:3px;border:1px solid #e0e0e0;flex-shrink:0;}
.team-logo-placeholder{width:40px;height:40px;border-radius:8px;background:#1a3a5c;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;color:#7ab0cc;font-weight:700;}
.team-name-wrap{flex:1;}
.team-name{font-size:15px;font-weight:800;color:white;}
.ratings-wrap{display:flex;gap:16px;align-items:center;}
.rating-box{text-align:center;}
.rating-val{font-size:20px;font-weight:800;color:white;}
.rating-label{font-size:10px;font-weight:700;color:#7ab0cc;text-transform:uppercase;letter-spacing:.05em;}
.rating-form{color:#ffd166;}

.matches-table{width:100%;border-collapse:collapse;font-size:12px;}
.matches-table th{background:#f0f6fc;padding:8px 10px;text-align:left;font-size:11px;font-weight:700;color:#3a6a9c;letter-spacing:.05em;text-transform:uppercase;border-bottom:2px solid #e0ecf8;}
.matches-table th.center{text-align:center;}
.matches-table td{padding:8px 10px;border-bottom:1px solid #f0f0f0;vertical-align:middle;}
.matches-table tr:last-child td{border-bottom:none;}
.matches-table tr:hover td{background:#f7fbff;}

.badge-win{background:#dcfce7;color:#166534;font-weight:700;padding:2px 8px;border-radius:20px;font-size:11px;}
.badge-loss{background:#fee2e2;color:#991b1b;font-weight:700;padding:2px 8px;border-radius:20px;font-size:11px;}
.badge-ot{background:#fef9c3;color:#854d0e;font-weight:700;padding:2px 8px;border-radius:20px;font-size:11px;}
.score-cell{font-weight:800;font-size:13px;color:#0b2a3c;text-align:center;}
.change-pos{color:#16a34a;font-weight:700;}
.change-neg{color:#dc2626;font-weight:700;}
.change-neu{color:#888;font-weight:700;}
.season-badge{font-size:10px;font-weight:700;background:#e8f0f8;color:#1a5276;padding:2px 7px;border-radius:10px;white-space:nowrap;}

.form-dots{display:flex;gap:3px;justify-content:center;align-items:center;}
.form-dot{width:10px;height:10px;border-radius:50%;}
.form-dot-win{background:#22c55e;}
.form-dot-loss{background:#f87171;}
.form-dot-ot{background:#fbbf24;}
.form-dot-empty{background:#e2eaf0;}
.form-dot.active{width:12px;height:12px;box-shadow:0 0 0 2px #0b2a3c;}
.in-form{background:#fff8e1 !important;}
.no-matches{padding:20px;text-align:center;color:#aaa;font-size:13px;}
.loading{padding:60px;text-align:center;color:#7ab0cc;font-size:14px;}
</style>
</head>
<body>
<script src="./ticker.js"></script>
<script src="./menu.js"></script>

<div class="header">
 <img class="header-logo" src="./logos/lokomotiva.png" alt="logo">
 <div>
  <div class="header-title">Extraliga U dvou Blbounů</div>
  <div class="header-sub">Rating týmů</div>
 </div>
</div>

<div class="wrapper">
<div class="section-title">Žebříček a historie</div>

<div class="filter-bar">
 <button class="filter-btn active" onclick="setFilter('extraliga',this)">Extraliga</button>
 <button class="filter-btn" onclick="setFilter('reprezentace',this)">Reprezentace</button>
 <button class="filter-btn" onclick="setFilter('all',this)">Všechny</button>
</div>

<div id="content"><div class="loading">Načítám...</div></div>
</div>

<script type="module">

import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient(
 "https://qaocbodrflsaerxntfui.supabase.co",
 "sb_publishable_eIeO9MihyuQDuNHy60Ubrw_8ZuSKPFU"
)

const START_RATING = 1000
const K_FORM = 120
const FORM_WINDOW = 5

let allTeams = []
let teamMap = {}
let seasonMap = {}
let seasonOrder = {}
let historyMap = {}
let formSnapshotMap = {}
let currentFilter = "extraliga"

function getScore(match, teamId){
 const hg=Number(match.home_score), ag=Number(match.away_score)
 let stats=null
 try{stats=match.stats?JSON.parse(match.stats):null}catch(e){}
 const isSN=stats&&(stats[20]==="1"||stats[20]==="2")
 const isOT=stats&&!isSN&&(stats[9]==="11"||stats[19]==="11")
 const isHome=match.home_team===teamId
 const tg=isHome?hg:ag, og=isHome?ag:hg
 if(tg>og) return (isSN||isOT)?0.75:1
 return (isSN||isOT)?0.25:0
}

function getResultType(match, teamId){
 let stats=null
 try{stats=match.stats?JSON.parse(match.stats):null}catch(e){}
 const isSN=stats&&(stats[20]==="1"||stats[20]==="2")
 const isOT=stats&&!isSN&&(stats[9]==="11"||stats[19]==="11")
 if(isSN||isOT) return "ot"
 const isHome=match.home_team===teamId
 const hg=Number(match.home_score), ag=Number(match.away_score)
 const tg=isHome?hg:ag, og=isHome?ag:hg
 return tg>og?"win":"loss"
}

async function load(){
 const [teamsRes, matchesRes, seasonsRes] = await Promise.all([
  supabase.from("teams").select("*"),
  supabase.from("matches").select("*").not("home_score","is",null).not("away_score","is",null),
  supabase.from("seasons").select("*").order("created_at",{ascending:true}),
 ])

 allTeams = teamsRes.data || []
 const matches = matchesRes.data || []
 const seasons = seasonsRes.data || []

 seasons.forEach((s,i)=>{ seasonMap[s.id]=s.name; seasonOrder[s.id]=i })
 allTeams.forEach(t=>{ teamMap[t.id]=t; historyMap[t.id]=[]; })

 // Seřaď zápasy chronologicky
 matches.sort((a,b)=>{
  const sA=seasonOrder[a.season_id]??999, sB=seasonOrder[b.season_id]??999
  if(sA!==sB) return sA-sB
  return Number(a.round)-Number(b.round)
 })

 // Počítej POUZE formu (pro zobrazení history) – ELO bereme z DB
 const formRatings = {}
 const formHistory = {}
 allTeams.forEach(t=>{ formRatings[t.id]=START_RATING; formHistory[t.id]=[] })

 matches.forEach(m=>{
  const h=m.home_team, a=m.away_team
  if(formRatings[h]===undefined||formRatings[a]===undefined) return
  const sH=getScore(m,h), sA=getScore(m,a)

  function updateForm(teamId, opponentId, score){
   const cur=formRatings[teamId], opp=formRatings[opponentId]
   const exp=1/(1+Math.pow(10,(opp-cur)/400))
   const ch=K_FORM*(score-exp)
   formHistory[teamId].push(ch)
   if(formHistory[teamId].length>FORM_WINDOW) formHistory[teamId].shift()
   const newForm=Math.round(START_RATING+formHistory[teamId].reduce((a,b)=>a+Math.round(b),0))
   const before=formRatings[teamId]
   formRatings[teamId]=newForm
   return {before, after:newForm, change:Math.round(ch)}
  }

  const fH=updateForm(h,a,sH)
  const fA=updateForm(a,h,sA)

  historyMap[h].push({
   match:m, formBefore:fH.before, formAfter:fH.after, formChange:fH.change,
   resultType:getResultType(m,h), formSnapshot:[...formHistory[h]]
  })
  historyMap[a].push({
   match:m, formBefore:fA.before, formAfter:fA.after, formChange:fA.change,
   resultType:getResultType(m,a), formSnapshot:[...formHistory[a]]
  })
 })

 render()
}

function setFilter(val, btn){
 currentFilter=val
 document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"))
 btn.classList.add("active")
 render()
}
window.setFilter=setFilter

function render(){
 const cont=document.getElementById("content")
 cont.innerHTML=""

 let filtered=allTeams
 if(currentFilter!=="all") filtered=allTeams.filter(t=>(t.competition||"").toLowerCase()===currentFilter)

 // Řaď podle rating_overall z DB
 const sorted=filtered
  .map(t=>({...t, elo:t.rating_overall||START_RATING, form:t.rating_form||START_RATING}))
  .sort((a,b)=>b.elo-a.elo)

 sorted.forEach((team,idx)=>{
  const teamHistory=(historyMap[team.id]||[]).slice().reverse()
  const lastFiveIds=new Set((historyMap[team.id]||[]).slice(-FORM_WINDOW).map(h=>h.match.id))

  let matchRows=""
  if(!teamHistory.length){
   matchRows=`<tr><td colspan="6" class="no-matches">Žádné odehrané zápasy</td></tr>`
  } else {
   teamHistory.forEach(h=>{
    const m=h.match
    const home=teamMap[m.home_team], away=teamMap[m.away_team]
    const isHome=m.home_team===team.id
    const opp=isHome?away:home
    const seasonName=seasonMap[m.season_id]||"—"
    const inForm=lastFiveIds.has(m.id)

    const resultLabel=h.resultType==="win"?"Výhra":h.resultType==="loss"?"Prohra":"OT/SN"
    const resultClass=h.resultType==="win"?"badge-win":h.resultType==="loss"?"badge-loss":"badge-ot"
    const formStr=`${h.formChange>=0?"+":""}${h.formChange}`
    const formClass=h.formChange>0?"change-pos":h.formChange<0?"change-neg":"change-neu"

    let formDots='<div class="form-dots">'
    for(let d=0;d<FORM_WINDOW;d++){
     const val=h.formSnapshot[d]
     if(val===undefined) formDots+=`<div class="form-dot form-dot-empty"></div>`
     else {
      const isLast=d===h.formSnapshot.length-1
      const dotType=val>0?"form-dot-win":val<0?"form-dot-loss":"form-dot-ot"
      formDots+=`<div class="form-dot ${dotType}${isLast?" active":""}"></div>`
     }
    }
    formDots+='</div>'

    matchRows+=`
     <tr${inForm?' class="in-form"':''}>
      <td><span class="season-badge">${seasonName}</span></td>
      <td>
       <div style="display:flex;align-items:center;gap:6px;">
        ${opp?.logo?`<img src="./logos/${opp.logo}" style="width:20px;height:20px;object-fit:contain;border-radius:4px;background:white;padding:1px;border:1px solid #e0e0e0;">`:''}
        <span style="font-weight:600;color:#1a2a3c;font-size:12px;">${opp?.name||"?"}</span>
        <span style="font-size:10px;color:#aaa;">${isHome?"(D)":"(H)"}</span>
       </div>
      </td>
      <td class="score-cell">${m.home_score} : ${m.away_score}</td>
      <td style="text-align:center;"><span class="${resultClass}">${resultLabel}</span></td>
      <td style="text-align:center;">
       <div style="font-size:11px;color:#666;">${h.formBefore} → ${h.formAfter}</div>
       <div class="${formClass}" style="font-size:12px;">${formStr}</div>
      </td>
      <td style="text-align:center;">${formDots}</td>
     </tr>`
   })
  }

  cont.innerHTML+=`
   <div class="team-card">
    <div class="team-header">
     <div style="font-size:15px;font-weight:800;color:#7ab0cc;min-width:28px;">#${idx+1}</div>
     ${team.logo?`<img class="team-logo" src="./logos/${team.logo}" onerror="this.style.display='none'">`:`<div class="team-logo-placeholder">?</div>`}
     <div class="team-name-wrap"><div class="team-name">${team.name}</div></div>
     <div class="ratings-wrap">
      <div class="rating-box">
       <div class="rating-val">⭐ ${team.elo}</div>
       <div class="rating-label">ELO rating</div>
      </div>
      <div class="rating-box">
       <div class="rating-val rating-form">🔥 ${team.form}</div>
       <div class="rating-label">Forma (5 zápasů)</div>
      </div>
     </div>
    </div>
    <div style="overflow-x:auto;">
     <table class="matches-table">
      <thead>
       <tr>
        <th>Sezóna</th><th>Soupeř</th>
        <th class="center">Skóre</th><th class="center">Výsledek</th>
        <th class="center">Forma změna</th><th class="center">Forma okno</th>
       </tr>
      </thead>
      <tbody>${matchRows}</tbody>
     </table>
    </div>
   </div>`
 })
}

load()
</script>
</body>
</html>
