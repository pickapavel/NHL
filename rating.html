<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rating týmů</title>

<style>
body{
 font-family:Arial;
 background:#0c2a38;
 margin:0;
 color:white;
}

.wrapper{
 max-width:700px;
 margin:auto;
 padding:20px;
}

h1{
 text-align:center;
 margin-bottom:20px;
}

.team{
 background:#16394d;
 padding:15px;
 border-radius:12px;
 margin-bottom:20px;
}

.header{
 display:flex;
 justify-content:space-between;
 align-items:center;
 margin-bottom:10px;
}

.left{
 display:flex;
 align-items:center;
 gap:10px;
}

.left img{
 width:40px;
 height:40px;
 background:white;
 border-radius:6px;
 padding:3px;
}

.rating{
 font-size:18px;
 font-weight:bold;
}

.match{
 font-size:13px;
 padding:6px;
 border-bottom:1px solid #2a4c5f;
}

.win{color:#2ecc71;}
.loss{color:#e74c3c;}
.ot{color:#f1c40f;}
</style>
</head>

<body>

<div class="wrapper">

<h1>Rating týmů</h1>

<div id="content"></div>

</div>

<script type="module">

import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient(
 "https://qaocbodrflsaerxntfui.supabase.co",
 "sb_publishable_eIeO9MihyuQDuNHy60Ubrw_8ZuSKPFU"
)

// 🔥 body ze zápasu
function getPoints(match, teamId){

 const hg = Number(match.home_score)
 const ag = Number(match.away_score)

 let stats = null
 try{ stats = match.stats ? JSON.parse(match.stats) : null }catch(e){}

 const isSN = stats && (stats[20] === "1" || stats[20] === "2")
 const isOT = stats && !isSN && (stats[9] === "11" || stats[19] === "11")

 const isHome = match.home_team === teamId

 const teamGoals = isHome ? hg : ag
 const oppGoals = isHome ? ag : hg

 if(isSN || isOT){
  return teamGoals > oppGoals ? 2 : 1
 }else{
  return teamGoals > oppGoals ? 3 : 0
 }
}

// 🔥 render historie
function renderHistory(team, matches, teamMap){

 let rating = 1000
 let html = ""

 matches.forEach(m=>{

  const before = rating

  const points = getPoints(m, team.id)
  const change = points * 20

  rating += change

  const after = rating

  const isHome = m.home_team === team.id
  const opponent = teamMap[isHome ? m.away_team : m.home_team]

  const resultClass =
    points === 3 ? "win" :
    points === 0 ? "loss" : "ot"

  html += `
   <div class="match ${resultClass}">
    ${isHome ? "vs" : "@"} ${opponent.name}
    (${m.home_score}:${m.away_score})
    | ${before} → ${after}
    (${change >=0 ? "+" : ""}${change})
   </div>
  `
 })

 return html
}

// LOAD
async function load(){

 const { data: teams } = await supabase.from("teams").select("*")

 const { data: matches } = await supabase
  .from("matches")
  .select("*")
  .not("home_score","is",null)
  .not("away_score","is",null)

 const teamMap = {}
 teams.forEach(t=> teamMap[t.id] = t)

 const cont = document.getElementById("content")

 const teamsWithRating = []

 teams.forEach(team=>{

  const teamMatches = matches
   .filter(m=> m.home_team === team.id || m.away_team === team.id)
   .sort((a,b)=> new Date(a.created_at) - new Date(b.created_at))

  let rating = 1000

  teamMatches.forEach(m=>{
   const points = getPoints(m, team.id)
   rating += points * 20
  })

  teamsWithRating.push({ ...team, rating, matches: teamMatches })
 })

 // seřadit podle ratingu
 teamsWithRating.sort((a,b)=> b.rating - a.rating)

 teamsWithRating.forEach(team=>{

  cont.innerHTML += `
   <div class="team">
    <div class="header">
     <div class="left">
      <img src="./logos/${team.logo}">
      <div>${team.name}</div>
     </div>
     <div class="rating">${team.rating}</div>
    </div>

    ${renderHistory(team, team.matches, teamMap)}

   </div>
  `
 })
}

load()

</script>

</body>
</html>
