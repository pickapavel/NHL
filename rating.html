<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Historie ratingu</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
margin:0;
}

.wrapper{
max-width:900px;
margin:auto;
background:white;
padding:20px;
}

h2{
margin-top:0;
}

.row{
display:grid;
grid-template-columns:1fr 80px 120px 120px;
grid-template-rows:auto auto;
align-items:center;
background:#e9ecef;
padding:10px;
border-radius:6px;
margin-top:6px;
font-weight:bold;
row-gap:4px;
}

.sub{
grid-column:1/5;
font-size:13px;
font-weight:normal;
color:#555;
margin-top:2px;
}

.plus{
color:green;
font-weight:bold;
}

.minus{
color:red;
font-weight:bold;
}

</style>
</head>

<body>

<div class="wrapper">

<h2>Historie ratingu</h2>

<div id="ratingList"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, query, orderBy, onSnapshot }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyD0jDnVNHZAs83g6FGwQT_nOpOCyT4NTNU",
authDomain:"statistiky-6310a.firebaseapp.com",
projectId:"statistiky-6310a"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

const BASE_RATING=1000;
const K=30;
const HOME_ADV=50;

let ratings={}

function expected(ra,rb){
return 1/(1+Math.pow(10,(rb-ra)/400))
}

function calc(stats){

let ag=Number(stats[6])+Number(stats[7])+Number(stats[8])
let hg=Number(stats[16])+Number(stats[17])+Number(stats[18])

if(stats[9]==="11") ag++
if(stats[19]==="11") hg++
if(stats[20]==="1") hg++
if(stats[20]==="2") ag++

return {hg,ag}

}

function render(matches){

ratings={}

const list=document.getElementById("ratingList")
list.innerHTML=""

matches.forEach(m=>{

if(!m.stats) return

if(!ratings[m.homeTeam]) ratings[m.homeTeam]=BASE_RATING
if(!ratings[m.awayTeam]) ratings[m.awayTeam]=BASE_RATING

const beforeHome=ratings[m.homeTeam]
const beforeAway=ratings[m.awayTeam]

const s=calc(m.stats)

let ra=beforeHome+HOME_ADV
let rb=beforeAway

let ea=expected(ra,rb)
let eb=expected(rb,ra)

let sa=s.hg>s.ag?1:0
let sb=s.ag>s.hg?1:0

ratings[m.homeTeam]+=K*(sa-ea)
ratings[m.awayTeam]+=K*(sb-eb)

const afterHome=Math.round(ratings[m.homeTeam])
const afterAway=Math.round(ratings[m.awayTeam])

const diffHome=Math.round(afterHome-beforeHome)
const diffAway=Math.round(afterAway-beforeAway)

const signHome=diffHome>=0?`<span class="plus">+${diffHome}</span>`:`<span class="minus">${diffHome}</span>`
const signAway=diffAway>=0?`<span class="plus">+${diffAway}</span>`:`<span class="minus">${diffAway}</span>`

list.innerHTML+=`

<div class="row">

<div>${m.homeTeam} ${s.hg}</div>

<div>${signHome}</div>

<div>${Math.round(beforeHome)}</div>

<div>${afterHome}</div>

<div class="sub">vs ${m.awayTeam} ${s.ag}</div>

</div>

<div class="row">

<div>${m.awayTeam} ${s.ag}</div>

<div>${signAway}</div>

<div>${Math.round(beforeAway)}</div>

<div>${afterAway}</div>

<div class="sub">vs ${m.homeTeam} ${s.hg}</div>

</div>

`

})

}

const q=query(collection(db,"zapasy"),orderBy("created","asc"))

onSnapshot(q,(snap)=>{

let arr=[]

snap.forEach(d=>{
arr.push(d.data())
})

render(arr)

})

</script>

</body>
</html>
