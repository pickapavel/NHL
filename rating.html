<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rating týmů</title>

<style>
body{
 font-family:Arial;
 background:#0c2a38;
 margin:0;
 color:white;
}

.wrapper{
 max-width:600px;
 margin:auto;
 padding:20px;
}

h1{
 text-align:center;
 margin-bottom:20px;
}

.team{
 display:flex;
 align-items:center;
 justify-content:space-between;
 background:#16394d;
 padding:12px;
 border-radius:10px;
 margin-bottom:10px;
}

.left{
 display:flex;
 align-items:center;
 gap:10px;
}

.left img{
 width:40px;
 height:40px;
 background:white;
 border-radius:6px;
 padding:3px;
}

.rating{
 font-size:16px;
 font-weight:bold;
}
</style>
</head>

<body>

<div class="wrapper">

<h1>Rating týmů</h1>

<div id="content"></div>

</div>

<script type="module">

import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient(
 "https://qaocbodrflsaerxntfui.supabase.co",
 "sb_publishable_eIeO9MihyuQDuNHy60Ubrw_8ZuSKPFU"
)

async function load(){

 const { data: teams } = await supabase
  .from("teams")
  .select("*")
  .order("rating_form", { ascending:false })

 const cont = document.getElementById("content")

 teams.forEach(team=>{

  cont.innerHTML += `
   <div class="team">
    <div class="left">
     <img src="./logos/${team.logo}">
     <div>${team.name}</div>
    </div>
    <div class="rating">${Math.round(team.rating_form)}</div>
   </div>
  `
 })
}

load()

</script>

</body>
</html>
