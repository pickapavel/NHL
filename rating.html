<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rating týmů</title>

<style>
body{
 font-family:Arial;
 background:#0c2a38;
 margin:0;
 color:white;
}

.wrapper{
 max-width:700px;
 margin:auto;
 padding:20px;
}

h1{
 text-align:center;
 margin-bottom:20px;
}

select{
 width:100%;
 padding:10px;
 border-radius:8px;
 margin-bottom:20px;
 border:none;
}

.team{
 background:#16394d;
 padding:15px;
 border-radius:12px;
 margin-bottom:20px;
}

.header{
 display:flex;
 justify-content:space-between;
 align-items:center;
 margin-bottom:10px;
}

.left{
 display:flex;
 align-items:center;
 gap:10px;
}

.left img{
 width:40px;
 height:40px;
 background:white;
 border-radius:6px;
 padding:3px;
}

.ratings{
 text-align:right;
}

.elo{ font-size:18px; font-weight:bold; }
.form{ font-size:13px; color:#ffd166; }

.match{
 font-size:13px;
 padding:6px;
 border-bottom:1px solid #2a4c5f;
}

.win{ color:#2ecc71; }
.loss{ color:#e74c3c; }
.ot{ color:#f1c40f; }
</style>
</head>

<body>

<div class="wrapper">
<h1>Rating týmů</h1>

<select id="filter">
 <option value="extraliga">Extraligové týmy</option>
 <option value="reprezentace">Reprezentační týmy</option>
 <option value="all">Všechny</option>
</select>

<div id="content"></div>
</div>

<script type="module">

import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient(
 "https://qaocbodrflsaerxntfui.supabase.co",
 "sb_publishable_eIeO9MihyuQDuNHy60Ubrw_8ZuSKPFU"
)

const START_RATING = 1000
const K_OVERALL = 80
const K_FORM = 120

function getEloChange(teamRating, oppRating, score){
 const expected = 1 / (1 + Math.pow(10, (oppRating - teamRating)/400))
 return K_OVERALL * (score - expected)
}

function getScore(match, teamId){

 const hg = Number(match.home_score)
 const ag = Number(match.away_score)

 let stats = null
 try{ stats = match.stats ? JSON.parse(match.stats) : null }catch(e){}

 const isSN = stats && (stats[20] === "1" || stats[20] === "2")
 const isOT = stats && !isSN && (stats[9] === "11" || stats[19] === "11")

 const isHome = match.home_team === teamId

 const teamGoals = isHome ? hg : ag
 const oppGoals = isHome ? ag : hg

 if(teamGoals > oppGoals){
  return (isSN || isOT) ? 0.75 : 1
 }else{
  return (isSN || isOT) ? 0.25 : 0
 }
}

function getResultClass(match, teamId){

 const hg = Number(match.home_score)
 const ag = Number(match.away_score)

 let stats = null
 try{ stats = match.stats ? JSON.parse(match.stats) : null }catch(e){}

 const isSN = stats && (stats[20] === "1" || stats[20] === "2")
 const isOT = stats && !isSN && (stats[9] === "11" || stats[19] === "11")

 if(isSN || isOT) return "ot"

 const isHome = match.home_team === teamId
 const teamGoals = isHome ? hg : ag
 const oppGoals = isHome ? ag : hg

 return teamGoals > oppGoals ? "win" : "loss"
}

async function load(){

 const { data: teams } = await supabase.from("teams").select("*")

 const { data: matches } = await supabase
  .from("matches")
  .select("*")
  .not("home_score","is",null)
  .not("away_score","is",null)
  .order("created_at", { ascending:false }) // 🔥 změna

 const ratings = {}
 const history = {}
 const formHistory = {}
 const formRatings = {}
 const teamMap = {}

 teams.forEach(t=>{
  ratings[t.id] = START_RATING
  history[t.id] = []

  formHistory[t.id] = []
  formRatings[t.id] = START_RATING

  teamMap[t.id] = t
 })

 matches.forEach(m=>{

  const h = m.home_team
  const a = m.away_team

  const rH = ratings[h]
  const rA = ratings[a]

  const sH = getScore(m, h)
  const sA = getScore(m, a)

  const cH = getEloChange(rH, rA, sH)
  const cA = getEloChange(rA, rH, sA)

  const nH = Math.round(rH + cH)
  const nA = Math.round(rA + cA)

  history[h].push({
    match:m,
    before:rH,
    after:nH,
    change:Math.round(cH)
  })

  history[a].push({
    match:m,
    before:rA,
    after:nA,
    change:Math.round(cA)
  })

  ratings[h] = nH
  ratings[a] = nA

  function updateForm(teamId, opponentId, score){

    const current = formRatings[teamId]
    const oppRating = formRatings[opponentId]

    const expected = 1 / (1 + Math.pow(10, (oppRating - current)/400))
    const change = K_FORM * (score - expected)

    formHistory[teamId].push(change)

    if(formHistory[teamId].length > 5){
      formHistory[teamId].shift()
    }

    const newRating =
      START_RATING +
      formHistory[teamId].reduce((a,b)=>a+Math.round(b),0)

    const before = current

    formRatings[teamId] = Math.round(newRating)

    return {
      before,
      after: formRatings[teamId],
      change: Math.round(change)
    }
  }

  const formH = updateForm(h, a, sH)
  const formA = updateForm(a, h, sA)

  history[h][history[h].length-1].form = formH
  history[a][history[a].length-1].form = formA

 })

 const filter = document.getElementById("filter")
 const cont = document.getElementById("content")

 function render(){

  cont.innerHTML = ""

  let filtered = teams

  if(filter.value !== "all"){
   filtered = teams.filter(t => (t.competition || "").toLowerCase() === filter.value)
  }

  const sorted = filtered
   .map(t=> ({
    ...t,
    elo: ratings[t.id],
    form: formRatings[t.id]
   }))
   .sort((a,b)=> b.elo - a.elo)

  sorted.forEach(team=>{

   let html = `
    <div class="team">
     <div class="header">
      <div class="left">
       <img src="./logos/${team.logo}">
       <div>${team.name}</div>
      </div>
      <div class="ratings">
       <div class="elo">${team.elo}</div>
       <div class="form">forma: ${team.form}</div>
      </div>
     </div>
   `

   const teamHistory = history[team.id] || []

   teamHistory.forEach(h=>{ // 🔥 změna

    const m = h.match
    const cls = getResultClass(m, team.id)

    const home = teamMap[m.home_team]
    const away = teamMap[m.away_team]

    html += `
     <div class="match ${cls}">
      ${home.name} vs ${away.name} (${m.home_score}:${m.away_score})
      <br>
      ELO: ${h.before} → ${h.after}
      (${h.change >=0 ? "+" : ""}${h.change})
      <br>
      FORMA: ${h.form.before} → ${h.form.after}
      (${h.form.change >=0 ? "+" : ""}${h.form.change})
     </div>
    `
   })

   html += "</div>"
   cont.innerHTML += html
  })
 }

 filter.onchange = render
 render()
}

load()

</script>

</body>
</html>
