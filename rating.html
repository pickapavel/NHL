<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rating týmů</title>

<style>
body{
 font-family:Arial;
 background:#0c2a38;
 margin:0;
 color:white;
}

.wrapper{
 max-width:700px;
 margin:auto;
 padding:20px;
}

h1{
 text-align:center;
 margin-bottom:20px;
}

.team{
 background:#16394d;
 padding:15px;
 border-radius:12px;
 margin-bottom:20px;
}

.header{
 display:flex;
 justify-content:space-between;
 align-items:center;
 margin-bottom:10px;
}

.left{
 display:flex;
 align-items:center;
 gap:10px;
}

.left img{
 width:40px;
 height:40px;
 background:white;
 border-radius:6px;
 padding:3px;
}

.rating{
 font-size:18px;
 font-weight:bold;
}

.match{
 font-size:13px;
 padding:6px;
 border-bottom:1px solid #2a4c5f;
}
</style>
</head>

<body>

<div class="wrapper">

<h1>Rating týmů (ELO)</h1>

<div id="content"></div>

</div>

<script type="module">

import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient(
 "https://qaocbodrflsaerxntfui.supabase.co",
 "sb_publishable_eIeO9MihyuQDuNHy60Ubrw_8ZuSKPFU"
)

const START_RATING = 1000
const K = 40

// 🔥 ELO změna
function getEloChange(teamRating, oppRating, score){
 const expected = 1 / (1 + Math.pow(10, (oppRating - teamRating)/400))
 return K * (score - expected)
}

// 🔥 určení score
function getScore(match, teamId){

 const hg = Number(match.home_score)
 const ag = Number(match.away_score)

 let stats = null
 try{ stats = match.stats ? JSON.parse(match.stats) : null }catch(e){}

 const isSN = stats && (stats[20] === "1" || stats[20] === "2")
 const isOT = stats && !isSN && (stats[9] === "11" || stats[19] === "11")

 const isHome = match.home_team === teamId

 const teamGoals = isHome ? hg : ag
 const oppGoals = isHome ? ag : hg

 if(teamGoals > oppGoals){
  return (isSN || isOT) ? 0.75 : 1
 }else{
  return (isSN || isOT) ? 0.25 : 0
 }
}

// LOAD
async function load(){

 const { data: teams } = await supabase.from("teams").select("*")

 const { data: matches } = await supabase
  .from("matches")
  .select("*")
  .not("home_score","is",null)
  .not("away_score","is",null)
  .order("created_at", { ascending:true })

 const ratings = {}
 const history = {}

 // start rating
 teams.forEach(t=>{
  ratings[t.id] = START_RATING
  history[t.id] = []
 })

 // 🔥 projdeme zápasy postupně
 matches.forEach(m=>{

  const homeId = m.home_team
  const awayId = m.away_team

  const homeRating = ratings[homeId]
  const awayRating = ratings[awayId]

  const homeScore = getScore(m, homeId)
  const awayScore = getScore(m, awayId)

  const changeHome = getEloChange(homeRating, awayRating, homeScore)
  const changeAway = getEloChange(awayRating, homeRating, awayScore)

  const newHome = Math.round(homeRating + changeHome)
  const newAway = Math.round(awayRating + changeAway)

  // uložit historii
  history[homeId].push({
   match: m,
   before: homeRating,
   after: newHome,
   change: Math.round(changeHome)
  })

  history[awayId].push({
   match: m,
   before: awayRating,
   after: newAway,
   change: Math.round(changeAway)
  })

  // update ratingů
  ratings[homeId] = newHome
  ratings[awayId] = newAway
 })

 // 🔥 uložit do DB
 for(const teamId in ratings){
  await supabase
   .from("teams")
   .update({ rating_form: ratings[teamId] })
   .eq("id", teamId)
 }

 const teamMap = {}
 teams.forEach(t=> teamMap[t.id] = t)

 const cont = document.getElementById("content")

 const teamsSorted = teams
  .map(t=> ({...t, rating: ratings[t.id]}))
  .sort((a,b)=> b.rating - a.rating)

 // render
 teamsSorted.forEach(team=>{

  let html = `
   <div class="team">
    <div class="header">
     <div class="left">
      <img src="./logos/${team.logo}">
      <div>${team.name}</div>
     </div>
     <div class="rating">${team.rating}</div>
    </div>
  `

  history[team.id].forEach(h=>{

   const m = h.match
   const isHome = m.home_team === team.id
   const opponent = teamMap[isHome ? m.away_team : m.home_team]

   html += `
    <div class="match">
     ${isHome ? "vs" : "@"} ${opponent.name}
     (${m.home_score}:${m.away_score})
     | ${h.before} → ${h.after}
     (${h.change >=0 ? "+" : ""}${h.change})
    </div>
   `
  })

  html += "</div>"

  cont.innerHTML += html
 })
}

load()

</script>

</body>
</html>
