<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Historie ratingu</title>

<style>
body{font-family:Arial;background:#f2f2f2;margin:0;}
.wrapper{max-width:1000px;margin:auto;background:white;padding:20px;}

.ratingRow{
display:flex;justify-content:space-between;align-items:center;
background:#e9ecef;padding:10px;border-radius:8px;margin-bottom:6px;
}

.teamBlockRating{
display:flex;align-items:center;gap:10px;font-weight:bold;
}

.logoSmall{
width:32px;height:32px;background:white;border-radius:6px;padding:3px;
}

.row{
display:grid;
grid-template-columns:300px 80px 100px 120px 120px;
background:#e9ecef;
padding:10px;border-radius:6px;margin:4px 0;
}

.score{text-align:center;font-weight:bold;}
.rating{text-align:center;}

.plus{color:green;font-weight:bold;}
.minus{color:red;font-weight:bold;}
</style>
</head>

<body>

<div class="wrapper">

<h2>Celkový rating týmů</h2>
<div id="ratingSummary"></div>

<h2>Historie ratingu</h2>
<div id="ratingList"></div>

</div>

<script type="module">

import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient(
  "https://qacobodrfsaerxntfui.supabase.co",
  "TVŮJ_PUBLISHABLE_KEY"
)

// ===== ELO =====
const BASE = 1000
const K = 30
const HOME_ADV = 50

let ratings = {}

// ===== LOAD =====
async function load(){

 // teams
 const { data: teams } = await supabase
  .from("teams")
  .select("*")

 const teamMap = {}
 teams.forEach(t=>{
  teamMap[t.id] = t
  ratings[t.id] = BASE
 })

 // matches
 const { data: matches } = await supabase
  .from("matches")
  .select("*")
  .order("created_at", { ascending: true })

 render(matches, teamMap)
}

// ===== ELO =====
function expected(ra, rb){
 return 1/(1+Math.pow(10,(rb-ra)/400))
}

// ===== RENDER =====
function render(matches, teamMap){

 const list = document.getElementById("ratingList")
 const summary = document.getElementById("ratingSummary")

 list.innerHTML=""
 summary.innerHTML=""

 matches.forEach(m=>{

  if(!m.played) return

  const home = m.home_team
  const away = m.away_team

  const beforeHome = ratings[home]
  const beforeAway = ratings[away]

  let ra = beforeHome + HOME_ADV
  let rb = beforeAway

  let ea = expected(ra, rb)
  let eb = expected(rb, ra)

  let sa = m.home_score > m.away_score ? 1 : 0
  let sb = m.away_score > m.home_score ? 1 : 0

  ratings[home] += K * (sa - ea)
  ratings[away] += K * (sb - eb)

  const afterHome = Math.round(ratings[home])
  const afterAway = Math.round(ratings[away])

  const diffHome = Math.round(afterHome - beforeHome)
  const diffAway = Math.round(afterAway - beforeAway)

  const signHome = diffHome >= 0 ? `<span class="plus">+${diffHome}</span>` : `<span class="minus">${diffHome}</span>`
  const signAway = diffAway >= 0 ? `<span class="plus">+${diffAway}</span>` : `<span class="minus">${diffAway}</span>`

  list.innerHTML += `
    <div class="row">
      <div>${teamMap[home].name}</div>
      <div class="score">${m.home_score}</div>
      <div class="rating">${Math.round(beforeHome)}</div>
      <div class="rating">${signHome}</div>
      <div class="rating">${afterHome}</div>
    </div>

    <div class="row">
      <div>${teamMap[away].name}</div>
      <div class="score">${m.away_score}</div>
      <div class="rating">${Math.round(beforeAway)}</div>
      <div class="rating">${signAway}</div>
      <div class="rating">${afterAway}</div>
    </div>
  `

 })

 // SUMMARY
 Object.entries(ratings)
 .sort((a,b)=>b[1]-a[1])
 .forEach(([id, val])=>{

  summary.innerHTML += `
  <div class="ratingRow">
    <div class="teamBlockRating">
      <img src="./logos/${teamMap[id].logo}" class="logoSmall">
      ${teamMap[id].name}
    </div>
    <div>${Math.round(val)}</div>
  </div>
  `
 })
}

load()

</script>

</body>
</html>
