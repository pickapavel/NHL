<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rating týmů</title>

<style>
body{
 font-family:Arial;
 background:#0c2a38;
 margin:0;
 color:white;
}

.wrapper{
 max-width:600px;
 margin:auto;
 padding:20px;
}

h1{
 text-align:center;
 margin-bottom:20px;
}

.team{
 display:flex;
 align-items:center;
 justify-content:space-between;
 background:#16394d;
 padding:12px;
 border-radius:10px;
 margin-bottom:10px;
}

.left{
 display:flex;
 align-items:center;
 gap:10px;
}

.left img{
 width:40px;
 height:40px;
 background:white;
 border-radius:6px;
 padding:3px;
}

.rating{
 font-size:16px;
 font-weight:bold;
}
</style>
</head>

<body>

<div class="wrapper">

<h1>Rating týmů</h1>

<div id="content"></div>

</div>

<script type="module">

import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient(
 "https://qaocbodrflsaerxntfui.supabase.co",
 "sb_publishable_eIeO9MihyuQDuNHy60Ubrw_8ZuSKPFU"
)

// 🔥 výpočet ratingu
function calculateRating(matches, teamId){

 let points = 0

 matches.forEach(m=>{

  const hg = Number(m.home_score)
  const ag = Number(m.away_score)

  let stats = null
  try{ stats = m.stats ? JSON.parse(m.stats) : null }catch(e){}

  const isSN = stats && (stats[20] === "1" || stats[20] === "2")
  const isOT = stats && !isSN && (stats[9] === "11" || stats[19] === "11")

  const isHome = m.home_team === teamId

  const teamGoals = isHome ? hg : ag
  const oppGoals = isHome ? ag : hg

  if(isSN || isOT){
   if(teamGoals > oppGoals) points += 2
   else points += 1
  }else{
   if(teamGoals > oppGoals) points += 3
   else points += 0
  }
 })

 return 1000 + (points * 20)
}

// 🔥 update do DB
async function updateRating(teamId, rating){
 await supabase
  .from("teams")
  .update({ rating_form: rating })
  .eq("id", teamId)
}

// LOAD
async function load(){

 const { data: teams } = await supabase
  .from("teams")
  .select("*")

 const { data: matches } = await supabase
  .from("matches")
  .select("*")
  .not("home_score","is",null)
  .not("away_score","is",null)

 const cont = document.getElementById("content")

 const teamsWithRating = []

 for(const team of teams){

  const teamMatches = matches
   .filter(m=> m.home_team === team.id || m.away_team === team.id)
   .sort((a,b)=> new Date(b.created_at) - new Date(a.created_at))
   .slice(0,5)

  const rating = calculateRating(teamMatches, team.id)

  // 👉 uložíme do DB
  await updateRating(team.id, rating)

  teamsWithRating.push({ ...team, rating })
 }

 // seřazení
 teamsWithRating.sort((a,b)=> b.rating - a.rating)

 // render
 teamsWithRating.forEach(team=>{
  cont.innerHTML += `
   <div class="team">
    <div class="left">
     <img src="./logos/${team.logo}">
     <div>${team.name}</div>
    </div>
    <div class="rating">${Math.round(team.rating)}</div>
   </div>
  `
 })
}

load()

</script>

</body>
</html>
