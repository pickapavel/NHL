<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Historie ratingu</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
margin:0;
}

.wrapper{
max-width:1000px;
margin:auto;
background:white;
padding:20px;
}

h2{
margin-top:0;
}

/* ===== TABULKA CELKOVÝ RATING ===== */

.ratingTable{
display:grid;
grid-template-columns:1fr 120px;
background:#e9ecef;
padding:10px;
border-radius:6px;
margin-bottom:6px;
font-weight:bold;
}

.ratingRow{
display:grid;
grid-template-columns:1fr 120px;
background:#f4f4f4;
padding:8px 10px;
border-radius:6px;
margin-bottom:4px;
}

/* ===== HLAVIČKA HISTORIE ===== */

.header{
display:grid;
grid-template-columns:90px 1fr 60px 120px 120px;
font-weight:bold;
padding:10px;
border-bottom:2px solid #ccc;
margin-bottom:10px;
}

/* ===== ZÁPAS ===== */

.match{
background:#f7f7f7;
border:1px solid #ddd;
border-radius:8px;
padding:6px;
margin-bottom:12px;
}

.matchInfo{
font-size:13px;
color:#555;
padding:4px 8px;
font-weight:bold;
}

.row{
display:grid;
grid-template-columns:90px 1fr 60px 120px 120px;
align-items:center;
background:#e9ecef;
padding:10px;
border-radius:6px;
margin:4px 0;
}

.team{
font-weight:bold;
}

.score{
font-weight:bold;
text-align:center;
font-size:18px;
}

.rating{
text-align:center;
font-weight:bold;
}

.plus{
color:green;
font-weight:bold;
}

.minus{
color:red;
font-weight:bold;
}

</style>
</head>

<body>

<div class="wrapper">

<h2>Celkový rating týmů</h2>

<div id="ratingSummary"></div>

<h2>Historie ratingu</h2>

<div class="header">
<div>Původní rating</div>
<div>Tým</div>
<div>Výsledek</div>
<div>Rating</div>
<div>Nový rating</div>
</div>

<div id="ratingList"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, query, orderBy, onSnapshot }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyD0jDnVNHZAs83g6FGwQT_nOpOCyT4NTNU",
authDomain:"statistiky-6310a.firebaseapp.com",
projectId:"statistiky-6310a"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

/* ===== ELO ===== */

const BASE_RATING=1000;
const K=30;
const HOME_ADV=50;

let ratings={}

/* ===== OČEKÁVANÝ VÝSLEDEK ===== */

function expected(ra,rb){
return 1/(1+Math.pow(10,(rb-ra)/400))
}

/* ===== VÝPOČET GÓLŮ ===== */

function calc(stats){

let ag=Number(stats[6])+Number(stats[7])+Number(stats[8])
let hg=Number(stats[16])+Number(stats[17])+Number(stats[18])

if(stats[9]==="11") ag++
if(stats[19]==="11") hg++
if(stats[20]==="1") hg++
if(stats[20]==="2") ag++

return {hg,ag}

}

/* ===== RENDER ===== */

function render(matches){

ratings={}

const list=document.getElementById("ratingList")
const summary=document.getElementById("ratingSummary")

list.innerHTML=""
summary.innerHTML=""

/* pouze extraliga */

const extraliga=matches.filter(m=>m.category?.startsWith("Extraliga"))

extraliga.forEach(m=>{

if(!m.stats) return

if(!ratings[m.homeTeam]) ratings[m.homeTeam]=BASE_RATING
if(!ratings[m.awayTeam]) ratings[m.awayTeam]=BASE_RATING

const beforeHome=ratings[m.homeTeam]
const beforeAway=ratings[m.awayTeam]

const s=calc(m.stats)

let ra=beforeHome+HOME_ADV
let rb=beforeAway

let ea=expected(ra,rb)
let eb=expected(rb,ra)

let sa=s.hg>s.ag?1:0
let sb=s.ag>s.hg?1:0

ratings[m.homeTeam]+=K*(sa-ea)
ratings[m.awayTeam]+=K*(sb-eb)

const afterHome=Math.round(ratings[m.homeTeam])
const afterAway=Math.round(ratings[m.awayTeam])

const diffHome=Math.round(afterHome-beforeHome)
const diffAway=Math.round(afterAway-beforeAway)

const signHome=diffHome>=0?`<span class="plus">+${diffHome}</span>`:`<span class="minus">${diffHome}</span>`
const signAway=diffAway>=0?`<span class="plus">+${diffAway}</span>`:`<span class="minus">${diffAway}</span>`

list.innerHTML+=`

<div class="match">

<div class="matchInfo">
${m.category || ""} – ${m.season || ""}
</div>

<div class="row">

<div class="rating">${Math.round(beforeHome)}</div>

<div class="team">${m.homeTeam}</div>

<div class="score">${s.hg}</div>

<div class="rating">${signHome}</div>

<div class="rating">${afterHome}</div>

</div>

<div class="row">

<div class="rating">${Math.round(beforeAway)}</div>

<div class="team">${m.awayTeam}</div>

<div class="score">${s.ag}</div>

<div class="rating">${signAway}</div>

<div class="rating">${afterAway}</div>

</div>

</div>

`

})

/* ===== CELKOVÝ RATING ===== */

Object.entries(ratings)
.sort((a,b)=>b[1]-a[1])
.forEach(t=>{

summary.innerHTML+=`

<div class="ratingRow">

<div>${t[0]}</div>

<div>${Math.round(t[1])}</div>

</div>

`

})

}

/* ===== FIREBASE ===== */

const q=query(collection(db,"zapasy"),orderBy("created","asc"))

onSnapshot(q,(snap)=>{

let arr=[]

snap.forEach(d=>{
arr.push(d.data())
})

render(arr)

})

</script>

</body>
</html>
