<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Přehled sázek</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --kubele:#fef08a;
  --kubele-dark:#854d0e;
  --pici:#1e3a8a;
  --pici-text:#fff;
}

body{font-family:'Inter',sans-serif;background:#eef2f7;min-height:100vh;}

.header{background:linear-gradient(135deg,#0b2a3c,#1a5276);padding:16px 24px;display:flex;align-items:center;gap:14px;border-bottom:2px solid rgba(240,192,64,.2);position:sticky;top:0;z-index:100;}
.header-title{font-size:18px;font-weight:700;color:white;}
.header-title span{color:#f0c040;}

.credit-bar{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:16px 24px;background:white;border-bottom:1px solid #e2e8f0;}
.credit-card{border-radius:12px;padding:14px 18px;display:flex;align-items:center;gap:14px;}
.credit-card.kubele{background:#fef9c3;border:1px solid #fde047;}
.credit-card.pici{background:#1e3a8a;border:1px solid #1e40af;}
.credit-avatar{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;flex-shrink:0;}
.credit-card.kubele .credit-avatar{background:#fde047;color:#854d0e;}
.credit-card.pici .credit-avatar{background:#1e40af;color:white;}
.credit-name{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px;}
.credit-card.kubele .credit-name{color:#854d0e;}
.credit-card.pici .credit-name{color:rgba(255,255,255,.7);}
.credit-amount{font-size:22px;font-weight:800;line-height:1;}
.credit-card.kubele .credit-amount{color:#0b2a3c;}
.credit-card.pici .credit-amount{color:white;}
.credit-diff{font-size:12px;font-weight:700;margin-top:2px;}
.credit-card.kubele .diff-pos{color:#16a34a;}
.credit-card.kubele .diff-neg{color:#dc2626;}
.credit-card.pici .diff-pos{color:#86efac;}
.credit-card.pici .diff-neg{color:#fca5a5;}
.credit-in-bets{font-size:11px;margin-top:3px;}
.credit-card.kubele .credit-in-bets{color:#92400e;}
.credit-card.pici .credit-in-bets{color:rgba(255,255,255,.55);}

.tabs{display:flex;gap:6px;padding:14px 24px;background:white;border-bottom:1px solid #e2e8f0;flex-wrap:wrap;}
.tab-btn{padding:7px 16px;border-radius:20px;border:2px solid #c8d8e8;background:white;font-family:'Inter',sans-serif;font-size:12px;font-weight:700;cursor:pointer;color:#1a3a5c;transition:all .15s;}
.tab-btn:hover{background:#dce8f5;border-color:#2f9ec9;}
.tab-btn.active{background:#0b2a3c;color:white;border-color:#0b2a3c;}

.wrapper{padding:20px 24px 60px;max-width:1400px;margin:0 auto;}
.section-label{font-size:12px;font-weight:700;color:#7ab0cc;text-transform:uppercase;letter-spacing:.08em;margin-bottom:14px;}

.notes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;}

.note{border-radius:12px;overflow:hidden;box-shadow:0 2px 10px rgba(26,58,92,.1);border:1px solid rgba(0,0,0,.08);animation:noteIn .3s ease both;}
.note.kubele{background:#fef9c3;border-color:#fde047;}
.note.pici{background:#1e3a8a;border-color:#1e40af;}
@keyframes noteIn{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}

.note-top{padding:10px 14px 8px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(0,0,0,.08);}
.note.pici .note-top{border-bottom-color:rgba(255,255,255,.1);}
.note-player{font-size:14px;font-weight:800;}
.note.kubele .note-player{color:#854d0e;}
.note.pici .note-player{color:white;}

.note-status{font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:.05em;}
.status-pending{background:rgba(0,0,0,.1);color:rgba(0,0,0,.5);}
.note.pici .status-pending{background:rgba(255,255,255,.15);color:rgba(255,255,255,.6);}
.status-won{background:#16a34a;color:white;}
.status-lost{background:#dc2626;color:white;}

.note-teams{padding:10px 14px;display:flex;align-items:center;justify-content:space-between;gap:6px;}
.note-team{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1;}
.note-team-logo{width:36px;height:36px;object-fit:contain;background:rgba(255,255,255,.7);border-radius:8px;padding:3px;}
.note-team-name{font-size:9px;font-weight:700;text-align:center;line-height:1.2;max-width:70px;}
.note.kubele .note-team-name{color:#92400e;}
.note.pici .note-team-name{color:rgba(255,255,255,.7);}
.note-score{font-size:20px;font-weight:800;text-align:center;flex-shrink:0;background:rgba(255,255,255,.5);border-radius:8px;padding:4px 10px;min-width:60px;}
.note.kubele .note-score{color:#0b2a3c;}
.note.pici .note-score{background:rgba(255,255,255,.15);color:white;}

.note-body{padding:8px 14px 12px;}
.note-tip{font-size:13px;font-weight:600;margin-bottom:8px;line-height:1.4;}
.note.kubele .note-tip{color:#1c1917;}
.note.pici .note-tip{color:white;}
.note-amounts{display:flex;gap:8px;flex-wrap:wrap;}
.note-amount-item{font-size:11px;font-weight:600;}
.note.kubele .note-amount-item{color:#78350f;}
.note.pici .note-amount-item{color:rgba(255,255,255,.6);}
.note.kubele .note-amount-item span{color:#0b2a3c;font-weight:700;}
.note.pici .note-amount-item span{color:white;font-weight:700;}
.note.kubele .win-amount span{color:#16a34a;}
.note.pici .win-amount span{color:#86efac;}

.note-date{font-size:10px;padding:0 14px 10px;font-style:italic;}
.note.kubele .note-date{color:rgba(0,0,0,.35);}
.note.pici .note-date{color:rgba(255,255,255,.35);}

.loading{padding:60px;text-align:center;color:#7ab0cc;font-size:14px;}
.empty-notes{padding:60px;text-align:center;color:#aaa;font-size:14px;}

@media(max-width:700px){
  .credit-bar{grid-template-columns:1fr;}
  .tabs{padding:10px 12px;gap:5px;}
  .tab-btn{padding:6px 12px;font-size:11px;}
  .wrapper{padding:12px 10px 60px;}
  .notes-grid{grid-template-columns:1fr;}
  .note-top{flex-wrap:nowrap;gap:6px;}
  .note-player{font-size:13px;flex-shrink:0;}
  .note-status{font-size:9px;padding:2px 6px;white-space:nowrap;flex-shrink:0;}
  .note-amounts{flex-direction:column;gap:4px;}
  .note-amount-item{font-size:12px;}
  .note-tip{font-size:14px;}
  .note-score{font-size:18px;min-width:52px;padding:3px 8px;}
  .note-team-logo{width:30px;height:30px;}
  .credit-amount{font-size:20px;}
  .section-label{text-align:center;}
}
</style>
</head>
<body>
<script src="./ticker.js"></script>
<script src="./menu.js"></script>

<div class="header">
  <div class="header-title">🗒️ Přehled <span>sázek</span></div>
</div>

<div class="credit-bar" id="creditBar">
  <div class="credit-card kubele"><div class="credit-avatar">K</div><div><div class="credit-name">Kubele</div><div class="credit-amount">—</div></div></div>
  <div class="credit-card pici"><div class="credit-avatar">P</div><div><div class="credit-name">Pici</div><div class="credit-amount">—</div></div></div>
</div>

<div class="tabs">
  <button class="tab-btn active" onclick="setTab('all',this)">Všechny</button>
  <button class="tab-btn" onclick="setTab('pending',this)">⏳ Čekající</button>
  <button class="tab-btn" onclick="setTab('won',this)">✅ Výhry</button>
  <button class="tab-btn" onclick="setTab('lost',this)">❌ Prohry</button>
  <button class="tab-btn" onclick="setTab('kubele',this)">🟡 Kubele</button>
  <button class="tab-btn" onclick="setTab('pici',this)">🔵 Pici</button>
</div>

<div class="wrapper">
  <div id="notesContainer" class="loading">Načítám...</div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
const supabase = createClient(
  "https://qaocbodrflsaerxntfui.supabase.co",
  "sb_publishable_eIeO9MihyuQDuNHy60Ubrw_8ZuSKPFU"
)

const KUBELE_ID = "a5b84a2d-58e6-4bf6-877f-be814a993db6"
const PICI_ID   = "38dd6159-1b85-4e87-9176-6a494597216f"
const START_CREDIT = 10000

let allBets = []
let players = {}
let teamsMap = {}
let matchesMap = {}
let currentTab = "all"

function tipLabel(tip){
  if(!tip) return "—"
  const map = {
    "1":"Výhra domácích","2":"Výhra hostů","0":"Remíza / OT / SN",
    "11":"Neprohra domácích","22":"Neprohra hostů","no_draw":"Nebude remíza",
    "vdr_home":"Výhra domácích (vč. OT/SN)","vdr_away":"Výhra hostů (vč. OT/SN)",
  }
  return tip.split(",").map(t=>map[t]||t).join(" + ")
}

function goalsTipLabel(type, tipKey){
  if(!tipKey) return "—"
  const cat = (type||"").replace("match_goals_","")
  const goalMap = {
    "over_3":"Přes 3.5","under_4":"Méně než 4","over_4":"Přes 4.5","under_5":"Méně než 5",
    "over_5":"Přes 5.5","under_6":"Méně než 6","over_6":"Přes 6.5","under_7":"Méně než 7",
    "over_7":"Přes 7.5","under_8":"Méně než 8",
    "0":"0 gólů","1":"1 gól","2":"2 góly","3":"3 góly","4p":"4+ góly",
    "home_1":"Dom. o 1","home_2":"Dom. o 2","home_3p":"Dom. o 3+",
    "draw":"Remíza","away_1":"Hosté o 1","away_2":"Hosté o 2","away_3p":"Hosté o 3+",
  }
  const catLabels={total:"Góly celkem",home:"Góly domácích",away:"Góly hostů",diff:"Rozdíl gólů"}
  return `${catLabels[cat]||cat}: ${goalMap[tipKey]||tipKey}`
}

function seriesTipLabel(type, targetId){
  const team = teamsMap[targetId]?.name || targetId || "?"
  if(type?.startsWith("serie_winner_")) return `Postup ze série: ${team}`
  if(type?.startsWith("serie_games_")) return `Délka série: ${team} zápasů`
  if(type==="winner_playoff_overall") return `🏆 Vítěz playoff: ${team}`
  if(type==="second_playoff_overall") return `🥈 2. místo playoff: ${team}`
  if(type==="third_playoff_overall")  return `🥉 3. místo playoff: ${team}`
  if(type==="winner_regular_season")  return `🥇 Vítěz základní části: ${team}`
  if(type==="nonwinner_regular_season") return `Nevítěz ZČ: ${team}`
  if(type==="last_regular_season")    return `Poslední ZČ: ${team}`
  return type||"—"
}

function formatDate(str){
  if(!str) return ""
  const d = new Date(str)
  return d.toLocaleDateString("cs-CZ",{day:"2-digit",month:"2-digit"}) + " " + d.toLocaleTimeString("cs-CZ",{hour:"2-digit",minute:"2-digit"})
}

function logoImg(teamId){
  const t = teamsMap[teamId]
  if(!t?.logo) return `<div style="width:36px;height:36px;background:rgba(255,255,255,.3);border-radius:8px;"></div>`
  return `<img class="note-team-logo" src="./logos/${t.logo}" onerror="this.style.display='none'">`
}

function shortName(teamId){
  const t = teamsMap[teamId]
  if(!t) return "?"
  return t.short_name || t.name?.replace(/HC\s*/i,"").replace(/\s*\(.\)\s*$/,"").trim() || t.name
}

function renderNote(bet, idx){
  const isKubele = bet.player_id === KUBELE_ID
  const playerClass = isKubele ? "kubele" : "pici"
  const playerName = isKubele ? "Kubele" : "Pici"

  const match = bet.match_id ? matchesMap[bet.match_id] : null
  const isGoalsBet = bet.type?.startsWith("match_goals_")
const isSeriesBet = bet.type?.startsWith("serie_") || ["winner_playoff_overall","second_playoff_overall","third_playoff_overall","winner_regular_season","nonwinner_regular_season","last_regular_season"].includes(bet.type)
let teamsHtml = ""
  if(match){
    const played = match.home_score != null
    const hg = played ? match.home_score : "–"
    const ag = played ? match.away_score : "–"
    const suffix = match.result_type==="SN"?" SN":match.result_type==="OT"?" OT":""
    teamsHtml = `
      <div class="note-teams">
        <div class="note-team">${logoImg(match.home_team)}<div class="note-team-name">${shortName(match.home_team)}</div></div>
        <div class="note-score">${hg} : ${ag}${suffix}</div>
        <div class="note-team">${logoImg(match.away_team)}<div class="note-team-name">${shortName(match.away_team)}</div></div>
      </div>`
  } else if(isSeriesBet){
    const teamObj = teamsMap[bet.target_id]
    teamsHtml = `
      <div class="note-teams" style="justify-content:center;gap:10px;">
        ${teamObj?.logo?`<img class="note-team-logo" style="width:36px;height:36px;" src="./logos/${teamObj.logo}">`:""}
        <div class="note-team-name" style="font-size:11px;max-width:none;">${teamObj?.name||"—"}</div>
      </div>`
  }

  let tipText = "—"
  if(isGoalsBet) tipText = goalsTipLabel(bet.type, bet.tip_key||bet.target_id)
  else if(isSeriesBet) tipText = seriesTipLabel(bet.type, bet.target_id)
  else if(bet.tip) tipText = tipLabel(bet.tip)

  const statusMap={pending:"⏳ Čeká",won:"✅ Výhra",lost:"❌ Prohra"}
  const statusClass={pending:"status-pending",won:"status-won",lost:"status-lost"}

const winAmountHtml = bet.status==="won"
    ? `<div class="note-amount-item win-amount">Výhra: <span>${bet.potential_win ? Math.round(bet.potential_win) : "—"} Kč</span></div>`
    : `<div class="note-amount-item">Možná výhra: <span>${bet.potential_win ? Math.round(bet.potential_win) : "—"} Kč</span></div>`

  return `
    <div class="note ${playerClass} ${bet.status}" style="animation-delay:${idx*0.03}s">
      <div class="note-top">
        <div class="note-player">${playerName}</div>
        <div class="note-status ${statusClass[bet.status]||'status-pending'}">${statusMap[bet.status]||bet.status}</div>
      </div>
      ${teamsHtml}
      <div class="note-body">
        <div class="note-tip">${tipText}</div>
        <div class="note-amounts">
          <div class="note-amount-item">Vsazeno: <span>${Math.round(bet.amount)} Kč</span></div>
<div class="note-amount-item">Kurz: <span>${bet.odds ? Number(bet.odds).toFixed(2) : "—"}</span></div>          ${winAmountHtml}
        </div>
      </div>
      <div class="note-date">${formatDate(bet.created_at)}</div>
    </div>`
}

function getFiltered(){
  return allBets.filter(b=>{
    if(currentTab==="pending") return b.status==="pending"
    if(currentTab==="won")     return b.status==="won"
    if(currentTab==="lost")    return b.status==="lost"
    if(currentTab==="kubele")  return b.player_id===KUBELE_ID
    if(currentTab==="pici")    return b.player_id===PICI_ID
    return true
  })
}

function render(){
  const cont = document.getElementById("notesContainer")
  const filtered = getFiltered()
  if(!filtered.length){ cont.innerHTML='<div class="empty-notes">Žádné sázky.</div>'; return }
  cont.innerHTML = `<div class="section-label">${filtered.length} sázek</div><div class="notes-grid">${filtered.map((b,i)=>renderNote(b,i)).join("")}</div>`
}

function renderCreditBar(){
  const bar = document.getElementById("creditBar")
  const pending = {}
  allBets.filter(b=>b.status==="pending").forEach(b=>{
    pending[b.player_id]=(pending[b.player_id]||0)+Number(b.amount)
  })
  bar.innerHTML = Object.values(players).map(pl=>{
    const isKubele = pl.id===KUBELE_ID
    const cls = isKubele?"kubele":"pici"
    const initial = isKubele?"K":"P"
    const diff = pl.credit-START_CREDIT
    const diffStr = (diff>=0?"+":"")+Math.round(diff).toLocaleString("cs-CZ")+" Kč"
    const diffCls = diff>=0?"diff-pos":"diff-neg"
    const inBets = pending[pl.id]||0
    return `<div class="credit-card ${cls}">
      <div class="credit-avatar">${initial}</div>
      <div>
        <div class="credit-name">${pl.name}</div>
        <div class="credit-amount">${Math.round(pl.credit).toLocaleString("cs-CZ")} Kč</div>
        <div class="credit-diff ${diffCls}">${diffStr}</div>
        ${inBets>0?`<div class="credit-in-bets">V sázkách: ${Math.round(inBets).toLocaleString("cs-CZ")} Kč</div>`:""}
      </div>
    </div>`
  }).join("")
}

window.setTab = function(tab, btn){
  currentTab=tab
  document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"))
  btn.classList.add("active")
  render()
}

async function load(){
  const [playersRes,teamsRes,matchesRes,betsRes,specialRes] = await Promise.all([
    supabase.from("players").select("*"),
    supabase.from("teams").select("*"),
    supabase.from("matches").select("id,home_team,away_team,home_score,away_score,result_type"),
    supabase.from("bets").select("*").order("created_at",{ascending:false}),
    supabase.from("bets_special").select("*").order("created_at",{ascending:false}),
  ])
  ;(playersRes.data||[]).forEach(p=>players[p.id]=p)
  ;(teamsRes.data||[]).forEach(t=>teamsMap[t.id]=t)
  ;(matchesRes.data||[]).forEach(m=>matchesMap[m.id]=m)
  const bets=(betsRes.data||[]).map(b=>({...b,_source:"bets"}))
  const special=(specialRes.data||[]).map(b=>({...b,_source:"special"}))
allBets=[...bets,...special].sort((a,b)=>{
    if(!a.created_at && !b.created_at) return 0
    if(!a.created_at) return 1
    if(!b.created_at) return -1
    return new Date(b.created_at)-new Date(a.created_at)
  })
  renderCreditBar()
  render()
}

load()
</script>
</body>
</html>
