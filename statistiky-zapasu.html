<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Match centrum</title>

<style>
*{box-sizing:border-box}

body{
 margin:0;
 font-family:Arial;
 background:#0b2a3c;
 color:white;
}

.wrapper{
 max-width:1100px;
 margin:auto;
 padding:25px;
}

.header{
 display:flex;
 justify-content:space-between;
 align-items:center;
 margin-bottom:30px;
 flex-wrap:wrap;
 gap:20px;
}

.teamBlock{
 display:flex;
 align-items:center;
 gap:15px;
 font-size:22px;
 font-weight:bold;
}

.teamBlock img{
 width:75px;
 height:75px;
 object-fit:contain;
 background:white;
 padding:6px;
 border-radius:10px;
}

.scoreBig{
 font-size:60px;
 font-weight:bold;
 text-align:center;
}

.otLabel{
 text-align:center;
 font-weight:bold;
 margin-top:5px;
 color:#2f9ec9;
}

.periodInfo{
 text-align:center;
 margin-bottom:25px;
 opacity:0.9;
}

.sectionTitle{
 font-size:22px;
 font-weight:bold;
 margin:30px 0 15px 0;
 border-bottom:2px solid #2f9ec9;
 padding-bottom:6px;
}

.statRow{
 margin-bottom:20px;
}

.statLabel{
 text-align:center;
 margin-bottom:6px;
 font-weight:bold;
}

.barWrap{
 display:flex;
 align-items:center;
 gap:10px;
}

.sideVal{
 width:70px;
 text-align:center;
 font-weight:bold;
}

.barTrack{
 flex:1;
 height:22px;
 background:#1e3c4f;
 border-radius:12px;
 overflow:hidden;
 display:flex;
}

.barHome{
 background:#2f9ec9;
}

.barAway{
 background:#e74c3c;
}

.backBtn{
 margin-top:40px;
 text-align:center;
}

.backBtn a{
 background:#2f9ec9;
 padding:10px 18px;
 border-radius:6px;
 text-decoration:none;
 color:white;
 font-weight:bold;
}

@media(max-width:700px){
 .header{flex-direction:column;}
 .scoreBig{font-size:42px;}
}
</style>
</head>

<body>

<div class="wrapper">

<div class="header">
 <div id="homeTeam" class="teamBlock"></div>
 <div>
   <div id="score" class="scoreBig">- : -</div>
   <div id="otLabel" class="otLabel"></div>
 </div>
 <div id="awayTeam" class="teamBlock"></div>
</div>

<div id="periodInfo" class="periodInfo"></div>

<div class="sectionTitle">Detailní statistiky zápasu</div>
<div id="statsContainer"></div>

<div class="backBtn">
 <a href="extraliga.html">← Zpět na rozpis</a>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig={
 apiKey:"AIzaSyD0jDnVNHZAs83g6FGwQT_nOpOCyT4NTNU",
 authDomain:"statistiky-6310a.firebaseapp.com",
 projectId:"statistiky-6310a"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

const teamsData={
 "HC Sparta Praha (P)":"sparta.png",
 "HC Bílí Tygři Liberec (K)":"liberec.png",
 "HC Dynamo Pardubice (K)":"pardubice.png",
 "HC Chemopetrol Litvínov (P)":"litvinov.png",
 "HC Geus Okna Kladno (P)":"kladno.png",
 "HC Motor České Budějovice (K)":"budejovice.png",
 "HC Energie Karlovy Vary (P)":"vary.png",
 "HC Oceláři Třinec (K)":"trinec.png"
};



/* STEJNÁ FUNKCE JAKO V EXTRALIGA.HTML */
function calc(stats){
 let ag=Number(stats[6])+Number(stats[7])+Number(stats[8]);
 let hg=Number(stats[16])+Number(stats[17])+Number(stats[18]);

 if(stats[9]==="11") ag++;
 if(stats[19]==="11") hg++;

 if(stats[20]==="1") hg++;
 if(stats[20]==="2") ag++;

 return {hg,ag};
}

function parsePK(value){
 if(!value || !value.includes("/")) return {ga:0,pk:0};
 const p=value.split("/");
 return {ga:Number(p[0]),pk:Number(p[1])};
}

function renderBar(label,homeVal,awayVal){
 const max=Math.max(homeVal,awayVal,1);
 const homePerc=(homeVal/max)*100;
 const awayPerc=(awayVal/max)*100;

 return `
 <div class="statRow">
   <div class="statLabel">${label}</div>
   <div class="barWrap">
     <div class="sideVal">${homeVal}</div>
     <div class="barTrack">
       <div class="barHome" style="width:${homePerc}%"></div>
       <div class="barAway" style="width:${awayPerc}%"></div>
     </div>
     <div class="sideVal">${awayVal}</div>
   </div>
 </div>
 `;
}

async function loadMatch(){

 const params=new URLSearchParams(window.location.search);
 const matchId=params.get("id");

 const snap=await getDoc(doc(db,"zapasy",matchId));
 if(!snap.exists()) return;

 const m=snap.data();
 const stats=m.stats;

 const home=m.homeTeam;
 const away=m.awayTeam;

 const s=calc(stats);

 document.getElementById("homeTeam").innerHTML=
 `<img src="./logos/${teamsData[home]}">${home}`;

 document.getElementById("awayTeam").innerHTML=
 `${away}<img src="./logos/${teamsData[away]}">`;

 document.getElementById("score").innerText=
 `${s.hg} : ${s.ag}`;

 /* OT / SN label */
 if(stats[20]==="1"||stats[20]==="2"){
   document.getElementById("otLabel").innerText="SN";
 }
 else if(stats[9]==="11"||stats[19]==="11"){
   document.getElementById("otLabel").innerText="OT";
 }

 document.getElementById("periodInfo").innerText=
 `Třetiny: (${stats[16]}:${stats[6]}, ${stats[17]}:${stats[7]}, ${stats[18]}:${stats[8]})`;

 const homeShots=Number(stats[10]);
 const awayShots=Number(stats[0]);

 const homeHits=Number(stats[11]);
 const awayHits=Number(stats[1]);

 const homeFaceoffs=Number(stats[12]);
 const awayFaceoffs=Number(stats[2]);

 const homePP=Number(stats[14]);
 const awayPP=Number(stats[4]);

 const homePK=parsePK(stats[15]);
 const awayPK=parsePK(stats[5]);

 let html="";
 html+=renderBar("Střely",homeShots,awayShots);
 html+=renderBar("Hity",homeHits,awayHits);
 html+=renderBar("Vhazování",homeFaceoffs,awayFaceoffs);
 html+=renderBar("Přesilovky",homePP,awayPP);
 html+=renderBar("Oslabení (GA/PK)",
   homePK.ga+"/"+homePK.pk,
   awayPK.ga+"/"+awayPK.pk
 );

 document.getElementById("statsContainer").innerHTML=html;
}

loadMatch();

</script>

</body>
</html>
