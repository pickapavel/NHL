<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vsaď si</title>

<style>
body{margin:0;font-family:Arial;background:#0b2a3c;color:white;}
.wrapper{max-width:900px;margin:auto;padding:20px;}

.matchHeader{
 display:grid;
 grid-template-columns:1fr auto 1fr;
 align-items:center;
 margin-bottom:15px;
}

.team{display:flex;flex-direction:column;align-items:center;}
.team img{width:60px;background:white;padding:6px;border-radius:10px;}

.scoreBig{font-size:40px;font-weight:bold;text-align:center;}

.betBox{background:#112f44;padding:20px;border-radius:12px;}

.oddsRow{
 display:grid;
 grid-template-columns:repeat(5,1fr);
 gap:8px;margin-bottom:15px;
}

.odds{
 background:white;color:black;
 text-align:center;padding:8px;
 border-radius:8px;font-weight:bold;
}

.betRow{
 background:#0b2a3c;
 padding:12px;
 border-radius:10px;
 margin-top:10px;
}

input{
 width:100%;
 padding:10px;
 border-radius:8px;
 border:none;
 text-align:center;
 margin-top:8px;
}

.info{
 display:flex;
 justify-content:space-between;
 margin-top:8px;
}

.btn{
 width:100%;
 padding:10px;
 margin-top:8px;
 border:none;
 border-radius:8px;
 font-weight:bold;
 cursor:pointer;
}

.k{background:#2f9ec9;color:white;}
.p{background:#e67e22;color:white;}

.creditBox{
 margin-top:15px;
 padding:10px;
 background:#0b2a3c;
 border-radius:10px;
 text-align:center;
 font-weight:bold;
}
</style>
</head>

<body>

<div class="wrapper">

<div class="matchHeader">
 <div class="team" id="homeTeam"></div>
 <div class="scoreBig">- : -</div>
 <div class="team" id="awayTeam"></div>
</div>

<div class="betBox">

<div class="oddsRow">
 <div class="odds">1<br><span id="o1"></span></div>
 <div class="odds">10<br><span id="o2"></span></div>
 <div class="odds">0<br><span id="o3"></span></div>
 <div class="odds">02<br><span id="o4"></span></div>
 <div class="odds">2<br><span id="o5"></span></div>
</div>

<!-- KUBELE -->
<div class="betRow">
<b>Kubele</b>
<input id="kTip" placeholder="Tip (1-5)">
<input id="kBet" placeholder="Kč" type="number">
<div class="info">
<span id="kOdds">Kurz: 0</span>
<span id="kWin">Výhra: 0 Kč</span>
</div>
<button class="btn k" onclick="saveBet('K')">Vsadit</button>
</div>

<!-- PICI -->
<div class="betRow">
<b>Pici</b>
<input id="pTip" placeholder="Tip (1-5)">
<input id="pBet" placeholder="Kč" type="number">
<div class="info">
<span id="pOdds">Kurz: 0</span>
<span id="pWin">Výhra: 0 Kč</span>
</div>
<button class="btn p" onclick="saveBet('P')">Vsadit</button>
</div>

<div id="creditBox" class="creditBox"></div>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs, doc, getDoc, setDoc }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app=initializeApp({
 apiKey:"AIzaSyD0jDnVNHZAs83g6FGwQT_nOpOCyT4NTNU",
 authDomain:"statistiky-6310a.firebaseapp.com",
 projectId:"statistiky-6310a"
});
const db=getFirestore(app);

let home,away,ratings={},currentOdds={};

const BASE=1000,K=30,HOME=50;

function expected(a,b){return 1/(1+Math.pow(10,(b-a)/400))}

function updateElo(h,a,hg,ag){
 let ra=ratings[h]+HOME, rb=ratings[a];
 let ea=expected(ra,rb), sa=hg>ag?1:0;
 ratings[h]+=K*(sa-ea);
 ratings[a]+=K*((1-sa)-(1-ea));
}

function calc(s){
 let ag=+s[6]+ +s[7]+ +s[8];
 let hg=+s[16]+ +s[17]+ +s[18];
 if(s[9]==="11")ag++; if(s[19]==="11")hg++;
 if(s[20]==="1")hg++; if(s[20]==="2")ag++;
 return {hg,ag}
}

function odds(h,a){
 let ra=(ratings[h]||1000)+HOME;
 let rb=(ratings[a]||1000);
 let diff=Math.abs(ra-rb);
 let pH=1/(1+Math.pow(10,(rb-ra)/400));
 let pA=1-pH;
 let pD=Math.max(0.12,0.28-diff/4000);

 return {
 1:(1/(pH*0.6)).toFixed(2),
 2:(1/(pH*0.18)).toFixed(2),
 3:(1/pD).toFixed(2),
 4:(1/(pA*0.18)).toFixed(2),
 5:(1/(pA*0.6)).toFixed(2)
 }
}

async function load(){

 const params=new URLSearchParams(location.search);
 home=params.get("home");
 away=params.get("away");

 const snap=await getDocs(collection(db,"zapasy"));
 let matches=[];
 snap.forEach(d=>matches.push({id:d.id,...d.data()}));

 Object.keys(matches).forEach(()=>{})

 matches
 .filter(m=>m.category?.startsWith("Extraliga"))
 .sort((a,b)=>a.created-b.created)
 .forEach(m=>{
  if(!m.stats)return;
  const s=calc(m.stats);
  updateElo(m.homeTeam,m.awayTeam,s.hg,s.ag);
 });

 homeTeam.innerHTML=`<img src="./logos/${home}.png">${home}<br>⭐ ${Math.round(ratings[home])}`;
 awayTeam.innerHTML=`<img src="./logos/${away}.png">${away}<br>⭐ ${Math.round(ratings[away])}`;

 currentOdds=odds(home,away);

 o1.innerText=currentOdds[1];
 o2.innerText=currentOdds[2];
 o3.innerText=currentOdds[3];
 o4.innerText=currentOdds[4];
 o5.innerText=currentOdds[5];

 loadCredits();
 loadSaved();
}

load();

/* ===== LIVE UPDATE ===== */

kTip.oninput=kBet.oninput=()=>calcWin("K");
pTip.oninput=pBet.oninput=()=>calcWin("P");

function calcWin(player){

 const tip=player==="K"?kTip.value:pTip.value;
 const bet=Number(player==="K"?kBet.value:pBet.value);

 const oddsVal=Number(currentOdds[tip]||0);

 if(player==="K"){
  kOdds.innerText="Kurz: "+oddsVal;
  kWin.innerText="Výhra: "+(bet&&oddsVal?Math.round(bet*oddsVal):0)+" Kč";
 }else{
  pOdds.innerText="Kurz: "+oddsVal;
  pWin.innerText="Výhra: "+(bet&&oddsVal?Math.round(bet*oddsVal):0)+" Kč";
 }
}

/* ===== SAVE ===== */

window.saveBet=async function(player){

 const tip=player==="K"?kTip.value:pTip.value;
 const bet=Number(player==="K"?kBet.value:pBet.value);

 if(!tip||!bet)return alert("Vyplň vše");

 const oddsVal=Number(currentOdds[tip]);
 const win=Math.round(bet*oddsVal);

 const ref=doc(db,"tipy",home+"_"+away);

 let data={homeTeam:home,awayTeam:away};

 if(player==="K"){
  data.kTip=tip;
  data.kBet=bet;
  data.kOdds=oddsVal;
  data.kWin=win;
 }

 if(player==="P"){
  data.pTip=tip;
  data.pBet=bet;
  data.pOdds=oddsVal;
  data.pWin=win;
 }

 await setDoc(ref,data,{merge:true});

 alert("Uloženo");
 loadSaved();
}

/* ===== LOAD SAVED ===== */

async function loadSaved(){

 const snap=await getDoc(doc(db,"tipy",home+"_"+away));
 if(!snap.exists())return;

 const d=snap.data();

 if(d.kTip){
  kTip.value=d.kTip;
  kBet.value=d.kBet;
  calcWin("K");
 }

 if(d.pTip){
  pTip.value=d.pTip;
  pBet.value=d.pBet;
  calcWin("P");
 }
}

/* ===== CREDIT ===== */

async function loadCredits(){
 const k=await getDoc(doc(db,"hraci","KTip"));
 const p=await getDoc(doc(db,"hraci","PTip"));
 creditBox.innerText=`Kubele: ${k.data().kredit} Kč | Pici: ${p.data().kredit} Kč`;
}

</script>

</body>
</html>
