<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vsaď si</title>

<style>
body{margin:0;font-family:Arial;background:#0b2a3c;color:white;}
.wrapper{max-width:900px;margin:auto;padding:20px;}

.matchHeader{
 display:flex;
 justify-content:space-between;
 align-items:center;
 margin-bottom:20px;
}

.team{
 display:flex;
 align-items:center;
 gap:10px;
 font-weight:bold;
}

.team img{
 width:50px;height:50px;
 background:white;
 padding:6px;
 border-radius:10px;
}

.teamRight{
 flex-direction:row-reverse;
 text-align:right;
}

.scoreBig{
 font-size:36px;
 font-weight:bold;
}

/* ===== BET ===== */

.betBox{
 background:#112f44;
 padding:20px;
 border-radius:12px;
}

.section{margin-top:20px;}

.title{font-weight:bold;margin-bottom:10px;}

.oddsRow{
 display:grid;
 grid-template-columns:repeat(7,1fr);
 gap:6px;
}

.odds{
 background:white;
 color:black;
 text-align:center;
 padding:8px;
 border-radius:8px;
 cursor:pointer;
 font-weight:bold;
}

.odds.active{
 background:#27ae60;
 color:white;
}

input{
 width:100%;
 padding:10px;
 border-radius:8px;
 border:none;
 text-align:center;
 margin:10px 0;
}

.betInfo{
 background:#0b2a3c;
 padding:10px;
 border-radius:10px;
 display:flex;
 justify-content:space-between;
}

.betBtn{
 width:100%;
 padding:12px;
 background:#27ae60;
 border:none;
 border-radius:8px;
 color:white;
 font-weight:bold;
 margin-top:10px;
}

.creditBox{
 margin-top:15px;
 padding:10px;
 background:#0b2a3c;
 border-radius:10px;
 text-align:center;
 font-weight:bold;
}
</style>
</head>

<body>

<div class="wrapper">

<div class="matchHeader">
 <div class="team" id="homeTeam"></div>
 <div class="scoreBig">- : -</div>
 <div class="team teamRight" id="awayTeam"></div>
</div>

<div class="betBox">

<!-- KUBELE -->
<div class="section">
<div class="title">Kubele</div>

<div class="oddsRow" id="kOddsRow">
 <div class="odds" data-tip="1">1<br><span id="ko1"></span></div>
 <div class="odds" data-tip="2">10<br><span id="ko2"></span></div>
 <div class="odds" data-tip="6">11<br><span id="ko6"></span></div>
 <div class="odds" data-tip="3">0<br><span id="ko3"></span></div>
 <div class="odds" data-tip="7">22<br><span id="ko7"></span></div>
 <div class="odds" data-tip="4">02<br><span id="ko4"></span></div>
 <div class="odds" data-tip="5">2<br><span id="ko5"></span></div>
</div>

<input id="kBet" placeholder="Vklad (Kč)" type="number">

<div class="betInfo">
 <div>Kurz: <span id="kFinalOdds">0</span></div>
 <div>Výhra: <span id="kWin">0 Kč</span></div>
</div>

<button class="betBtn" onclick="placeBet('K')">VSADIT</button>
</div>

<!-- PICI -->
<div class="section">
<div class="title">Pici</div>

<div class="oddsRow" id="pOddsRow">
 <div class="odds" data-tip="1">1<br><span id="po1"></span></div>
 <div class="odds" data-tip="2">10<br><span id="po2"></span></div>
 <div class="odds" data-tip="6">11<br><span id="po6"></span></div>
 <div class="odds" data-tip="3">0<br><span id="po3"></span></div>
 <div class="odds" data-tip="7">22<br><span id="po7"></span></div>
 <div class="odds" data-tip="4">02<br><span id="po4"></span></div>
 <div class="odds" data-tip="5">2<br><span id="po5"></span></div>
</div>

<input id="pBet" placeholder="Vklad (Kč)" type="number">

<div class="betInfo">
 <div>Kurz: <span id="pFinalOdds">0</span></div>
 <div>Výhra: <span id="pWin">0 Kč</span></div>
</div>

<button class="betBtn" onclick="placeBet('P')">VSADIT</button>
</div>

<div id="creditBox" class="creditBox"></div>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs, doc, getDoc, setDoc }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app=initializeApp({
 apiKey:"AIzaSyD0jDnVNHZAs83g6FGwQT_nOpOCyT4NTNU",
 authDomain:"statistiky-6310a.firebaseapp.com",
 projectId:"statistiky-6310a"
});
const db=getFirestore(app);

const teamsData={
 "HC Sparta Praha (P)":"sparta.png",
 "HC Bílí Tygři Liberec (K)":"liberec.png",
 "HC Dynamo Pardubice (K)":"pardubice.png",
 "HC Chemopetrol Litvínov (P)":"litvinov.png",
 "HC Geus Okna Kladno (P)":"kladno.png",
 "HC Motor České Budějovice (K)":"budejovice.png",
 "HC Energie Karlovy Vary (P)":"vary.png",
 "HC Oceláři Třinec (K)":"trinec.png"
};

let home,away,currentOdds={},kTip=null,pTip=null;

/* ===== ODDS ===== */

function calculateOdds(){
 return {
 1:2.9,
 2:9.7,
 6:2.2,
 3:5.0,
 7:2.9,
 4:12.9,
 5:3.8
 }
}

/* ===== LOAD ===== */

async function load(){

 const params=new URLSearchParams(location.search);
 home=params.get("home");
 away=params.get("away");

 homeTeam.innerHTML=`<img src="./logos/${teamsData[home]}">${home}`;
 awayTeam.innerHTML=`${away}<img src="./logos/${teamsData[away]}">`;

 currentOdds=calculateOdds();

 for(const key in currentOdds){
  if(document.getElementById("ko"+key))
   document.getElementById("ko"+key).innerText=currentOdds[key];
  if(document.getElementById("po"+key))
   document.getElementById("po"+key).innerText=currentOdds[key];
 }

 loadCredits();
}

load();

/* ===== CLICK ===== */

document.querySelectorAll("#kOddsRow .odds").forEach(el=>{
 el.onclick=()=>{
  document.querySelectorAll("#kOddsRow .odds").forEach(o=>o.classList.remove("active"));
  el.classList.add("active");
  kTip=el.dataset.tip;
  calcWin("K");
 }
});

document.querySelectorAll("#pOddsRow .odds").forEach(el=>{
 el.onclick=()=>{
  document.querySelectorAll("#pOddsRow .odds").forEach(o=>o.classList.remove("active"));
  el.classList.add("active");
  pTip=el.dataset.tip;
  calcWin("P");
 }
});

/* ===== CALC ===== */

function calcWin(player){
 const tip=player==="K"?kTip:pTip;
 const bet=Number(player==="K"?kBet.value:pBet.value);
 const o=Number(currentOdds[tip]||0);

 if(player==="K"){
  kFinalOdds.innerText=o;
  kWin.innerText=bet&&o?Math.round(bet*o)+" Kč":"0 Kč";
 }else{
  pFinalOdds.innerText=o;
  pWin.innerText=bet&&o?Math.round(bet*o)+" Kč":"0 Kč";
 }
}

kBet.oninput=()=>calcWin("K");
pBet.oninput=()=>calcWin("P");

/* ===== SAVE ===== */

window.placeBet=async function(player){

 const tip=player==="K"?kTip:pTip;
 const bet=Number(player==="K"?kBet.value:pBet.value);

 if(!tip||!bet)return alert("Vyplň vše");

 await setDoc(doc(db,"tipy",home+"_"+away),{
  [player==="K"?"kTip":"pTip"]:tip,
  [player==="K"?"kBet":"pBet"]:bet
 },{merge:true});

 alert("Uloženo");
}

/* ===== CREDIT ===== */

async function loadCredits(){
 const k=await getDoc(doc(db,"hraci","KTip"));
 const p=await getDoc(doc(db,"hraci","PTip"));
 creditBox.innerText=`Kubele: ${k.data().kredit} Kč | Pici: ${p.data().kredit} Kč`;
}

</script>

</body>
</html>
