<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vsaď si</title>

<style>
body{
 font-family:Arial;
 background:#0c2a38;
 margin:0;
 color:white;
}

.wrapper{
 max-width:500px;
 margin:auto;
 padding:20px;
}

/* MATCH */

.matchBox{text-align:center;margin-bottom:20px;}

.teams{
 display:flex;
 justify-content:space-between;
 align-items:center;
}

.team{
 width:40%;
 text-align:center;
}

.team img{
 width:70px;height:70px;
 background:white;
 border-radius:10px;
 padding:5px;
}

.score{
 font-size:40px;
 font-weight:bold;
}

.periods{margin-top:10px;color:#ccc;}

/* BET */

.betBox{
 background:#16394d;
 padding:20px;
 border-radius:15px;
}

.odds{
 display:grid;
 grid-template-columns:repeat(5,1fr);
 gap:10px;
 margin-bottom:15px;
}

.odd{
 background:#eee;
 color:black;
 padding:12px;
 border-radius:8px;
 text-align:center;
 cursor:pointer;
 font-weight:bold;
}

.odd.active{
 background:#27ae60;
 color:white;
}

input{
 width:100%;
 padding:10px;
 border-radius:8px;
 border:none;
 margin-bottom:10px;
}

.info{
 display:flex;
 justify-content:space-between;
 margin-bottom:15px;
}

.betBtn{
 width:100%;
 padding:15px;
 background:#27ae60;
 border:none;
 border-radius:10px;
 color:white;
 font-size:18px;
 cursor:pointer;
}

.back{
 margin-top:20px;
 text-align:center;
}

.back button{
 padding:10px 20px;
 border:none;
 border-radius:8px;
 background:#2f9ec9;
 color:white;
 cursor:pointer;
}
</style>
</head>

<body>

<div class="wrapper">

<div class="matchBox">

<div class="teams">

<div class="team">
<img id="homeLogo">
<div id="homeName">...</div>
</div>

<div class="score" id="score">- : -</div>

<div class="team">
<img id="awayLogo">
<div id="awayName">...</div>
</div>

</div>

<div class="periods">Třetiny: (-:-, -:-, -:-)</div>

</div>

<div class="betBox">

<h3>Vyber výsledek</h3>

<div class="odds">
<div class="odd">1</div>
<div class="odd">10</div>
<div class="odd">0</div>
<div class="odd">02</div>
<div class="odd">2</div>
</div>

<input placeholder="Částka (Kč)">

<div class="info">
<div>Kurz: -</div>
<div>Výhra: -</div>
</div>

<button class="betBtn">VSADIT</button>

</div>

<div class="back">
<button onclick="history.back()">← Zpět</button>
</div>

</div>

<script type="module">

import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient(
 "https://qacobodrfsaerxntfui.supabase.co",
 "sb_publishable_eIeO9MihyuQDuNHy60Ubrw_8ZuSKPFU"
)

const params = new URLSearchParams(window.location.search)
const matchId = params.get("id")

let teamMap = {}

// LOAD
async function load(){

 // TEAMS
 const { data: teams, error: tErr } = await supabase
  .from("teams")
  .select("*")

 if(tErr){
  console.error("TEAMS ERROR:", tErr)
  return
 }

 console.log("TEAMS:", teams)

 teams.forEach(t=>{
  teamMap[t.id] = t
 })

 // MATCH
 const { data: match, error: mErr } = await supabase
  .from("matches")
  .select("*")
  .eq("id", matchId)
  .single()

 if(mErr){
  console.error("MATCH ERROR:", mErr)
  return
 }

 console.log("MATCH:", match)

 render(match)
}

// RENDER
function render(m){

 const home = teamMap[m.home_team]
 const away = teamMap[m.away_team]

 if(!home || !away){
  console.error("CHYBA TEAM:", m)
  return
 }

 document.getElementById("homeName").innerText = home.name
 document.getElementById("awayName").innerText = away.name

 document.getElementById("homeLogo").src = "./logos/" + home.logo
 document.getElementById("awayLogo").src = "./logos/" + away.logo

 if(m.played){
  document.getElementById("score").innerText =
   m.home_score + " : " + m.away_score
 }
}

// klikání na tip
document.querySelectorAll(".odd").forEach(btn=>{
 btn.onclick = ()=>{
  document.querySelectorAll(".odd").forEach(b=>b.classList.remove("active"))
  btn.classList.add("active")
 }
})

load()

</script>

</body>
</html>
