<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vsaď si</title>

<style>
body{
 margin:0;
 font-family:Arial;
 background:#0b2a3c;
 color:white;
}

.wrapper{
 max-width:900px;
 margin:auto;
 padding:20px;
}

/* HEADER */
.matchHeader{
 display:grid;
 grid-template-columns:1fr auto 1fr;
 align-items:center;
 gap:10px;
 margin-bottom:15px;
}

.team{
 display:flex;
 flex-direction:column;
 align-items:center;
 text-align:center;
 gap:6px;
}

.team img{
 width:60px;
 height:60px;
 object-fit:contain;
 background:white;
 padding:6px;
 border-radius:10px;
}

.teamName{
 font-size:14px;
 font-weight:bold;
}

.scoreWrap{
 text-align:center;
}

.scoreBig{
 font-size:40px;
 font-weight:bold;
}

.periodInfo{
 text-align:center;
 margin-bottom:25px;
 opacity:0.8;
 font-size:14px;
}

/* SAZENÍ */
.betBox{
 background:#112f44;
 padding:20px;
 border-radius:12px;
 box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

.betTitle{
 font-size:20px;
 font-weight:bold;
 margin-bottom:15px;
}

.oddsRow{
 display:grid;
 grid-template-columns:repeat(5,1fr);
 gap:8px;
 margin-bottom:15px;
}

.odds{
 background:white;
 color:black;
 text-align:center;
 padding:8px;
 border-radius:8px;
 cursor:pointer;
 font-weight:bold;
 font-size:14px;
}

.odds.active{
 background:#27ae60;
 color:white;
}

.betControls input{
 width:100%;
 padding:10px;
 border-radius:8px;
 border:none;
 font-size:16px;
 text-align:center;
 margin-bottom:15px;
}

.betInfo{
 background:#0b2a3c;
 padding:12px;
 border-radius:10px;
 display:flex;
 justify-content:space-between;
 font-size:14px;
}

.betBtn{
 margin-top:15px;
 width:100%;
 padding:12px;
 font-size:16px;
 background:#27ae60;
 border:none;
 border-radius:8px;
 color:white;
 font-weight:bold;
}

.backBtn{
 margin-top:25px;
 text-align:center;
}

.backBtn a{
 background:#2f9ec9;
 padding:10px 18px;
 border-radius:6px;
 text-decoration:none;
 color:white;
 font-weight:bold;
}
</style>
</head>

<body>

<div class="wrapper">

<div class="matchHeader">
 <div class="team" id="homeTeam"></div>

 <div class="scoreWrap">
   <div id="score" class="scoreBig">- : -</div>
 </div>

 <div class="team" id="awayTeam"></div>
</div>

<div id="periodInfo" class="periodInfo"></div>

<div class="betBox">
<div class="betTitle">Vyber výsledek</div>

<div class="oddsRow">
 <div class="odds" data-tip="1">1<br><span id="o1"></span></div>
 <div class="odds" data-tip="2">10<br><span id="o2"></span></div>
 <div class="odds" data-tip="3">0<br><span id="o3"></span></div>
 <div class="odds" data-tip="4">02<br><span id="o4"></span></div>
 <div class="odds" data-tip="5">2<br><span id="o5"></span></div>
</div>

<input id="betAmount" placeholder="Vklad (Kč)" type="number">

<div class="betInfo">
 <div>Kurz: <span id="finalOdds">0</span></div>
 <div>Výhra: <span id="winAmount">0 Kč</span></div>
</div>

<button class="betBtn" onclick="placeBet()">VSADIT</button>
</div>

<div class="backBtn">
 <a href="extraliga.html">← Zpět</a>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig={
 apiKey:"AIzaSyD0jDnVNHZAs83g6FGwQT_nOpOCyT4NTNU",
 authDomain:"statistiky-6310a.firebaseapp.com",
 projectId:"statistiky-6310a"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

const teamsData={
 "HC Sparta Praha (P)":"sparta.png",
 "HC Bílí Tygři Liberec (K)":"liberec.png",
 "HC Dynamo Pardubice (K)":"pardubice.png",
 "HC Chemopetrol Litvínov (P)":"litvinov.png",
 "HC Geus Okna Kladno (P)":"kladno.png",
 "HC Motor České Budějovice (K)":"budejovice.png",
 "HC Energie Karlovy Vary (P)":"vary.png",
 "HC Oceláři Třinec (K)":"trinec.png"
};

let selectedTip=null;
let currentOdds={};

function calc(stats){
 let ag=Number(stats[6])+Number(stats[7])+Number(stats[8]);
 let hg=Number(stats[16])+Number(stats[17])+Number(stats[18]);

 if(stats[9]==="11") ag++;
 if(stats[19]==="11") hg++;
 if(stats[20]==="1") hg++;
 if(stats[20]==="2") ag++;

 return {hg,ag};
}

function calculateOdds(){
 return {
  1:(Math.random()*1.5+1.5).toFixed(2),
  2:(Math.random()*2+2).toFixed(2),
  3:(Math.random()*3+3).toFixed(2),
  4:(Math.random()*2+2).toFixed(2),
  5:(Math.random()*1.5+1.5).toFixed(2)
 };
}

async function loadMatch(){

 const params=new URLSearchParams(window.location.search);
 const matchId=params.get("id");

 const snap=await getDoc(doc(db,"zapasy",matchId));
 if(!snap.exists()) return;

 const m=snap.data();
 const stats=m.stats;

 const home=m.homeTeam;
 const away=m.awayTeam;

 const s=calc(stats);

 document.getElementById("homeTeam").innerHTML=
 `<img src="./logos/${teamsData[home]}"><div class="teamName">${home}</div>`;

 document.getElementById("awayTeam").innerHTML=
 `<img src="./logos/${teamsData[away]}"><div class="teamName">${away}</div>`;

 document.getElementById("score").innerText=
 `${s.hg} : ${s.ag}`;

 document.getElementById("periodInfo").innerText=
 `Třetiny: (${stats[16]}:${stats[6]}, ${stats[17]}:${stats[7]}, ${stats[18]}:${stats[8]})`;

 currentOdds=calculateOdds();

 o1.innerText=currentOdds[1];
 o2.innerText=currentOdds[2];
 o3.innerText=currentOdds[3];
 o4.innerText=currentOdds[4];
 o5.innerText=currentOdds[5];
}

loadMatch();

document.querySelectorAll(".odds").forEach(el=>{
 el.onclick=()=>{
  document.querySelectorAll(".odds").forEach(o=>o.classList.remove("active"));
  el.classList.add("active");
  selectedTip=el.dataset.tip;
  updateWin();
 }
});

document.getElementById("betAmount").oninput=updateWin;

function updateWin(){
 const amount=Number(document.getElementById("betAmount").value);
 const odds=Number(currentOdds[selectedTip]||0);

 document.getElementById("finalOdds").innerText=odds||0;

 if(amount&&odds){
  document.getElementById("winAmount").innerText=
   Math.round(amount*odds)+" Kč";
 }else{
  document.getElementById("winAmount").innerText="0 Kč";
 }
}

window.placeBet=function(){
 if(!selectedTip)return alert("Vyber tip");
 const amount=Number(document.getElementById("betAmount").value);
 if(!amount)return alert("Zadej částku");

 alert("Sázka přijata ✅");
}

</script>

</body>
</html>
