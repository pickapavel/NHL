<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vsaď si</title>

<style>
body{
 font-family:Arial;
 background:#0c2a38;
 margin:0;
 color:white;
}

.wrapper{
 max-width:500px;
 margin:auto;
 padding:20px;
}

.matchBox{text-align:center;margin-bottom:20px;}

.teams{
 display:flex;
 justify-content:space-between;
 align-items:center;
}

.team{
 width:40%;
 text-align:center;
}

.team img{
 width:70px;height:70px;
 background:white;
 border-radius:10px;
 padding:5px;
}

.score{
 font-size:40px;
 font-weight:bold;
}

.betBox{
 background:#16394d;
 padding:20px;
 border-radius:15px;
}

.odds{
 display:grid;
 grid-template-columns:repeat(7,1fr);
 gap:6px;
 margin-bottom:15px;
}

.odd{
 background:#eee;
 color:black;
 padding:10px;
 border-radius:8px;
 text-align:center;
 cursor:pointer;
 font-weight:bold;
 font-size:12px;
}

.odd.active{
 background:#27ae60;
 color:white;
}

input{
 width:100%;
 padding:10px;
 border-radius:8px;
 border:none;
 margin-bottom:10px;
}

.info{
 display:flex;
 justify-content:space-between;
 margin-bottom:15px;
}

.betBtn{
 width:100%;
 height:45px;
 background:#27ae60;
 border:none;
 border-radius:10px;
 color:white;
 font-size:16px;
 cursor:pointer;
}

.betInfo{
 margin-top:15px;
 background:#0b2a3c;
 padding:10px;
 border-radius:8px;
 display:none;
}

.back{
 margin-top:20px;
 text-align:center;
}

.back button{
 padding:10px 20px;
 border:none;
 border-radius:8px;
 background:#2f9ec9;
 color:white;
 cursor:pointer;
}
</style>
</head>

<body>

<div class="wrapper">

<div class="matchBox">
<div class="teams">

<div class="team">
<img id="homeLogo">
<div id="homeName"></div>
</div>

<div class="score">- : -</div>

<div class="team">
<img id="awayLogo">
<div id="awayName"></div>
</div>

</div>
</div>

<div class="betBox">

<h3>Vyber výsledek</h3>

<div class="odds">
<div class="odd" data-type="1">1</div>
<div class="odd" data-type="10">10</div>
<div class="odd" data-type="11">11</div>
<div class="odd" data-type="0">0</div>
<div class="odd" data-type="22">22</div>
<div class="odd" data-type="02">02</div>
<div class="odd" data-type="2">2</div>
</div>

<input id="amount" placeholder="Částka (Kč)">

<div class="info">
<div id="kurs">Kurz: -</div>
<div id="vyhra">Výhra: -</div>
</div>

<button class="betBtn">VSADIT</button>

<div id="betInfo" class="betInfo">
 <span id="betText"></span>
</div>

</div>

<div class="back">
<button onclick="history.back()">← Zpět</button>
</div>

</div>

<script type="module">

import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient(
  "https://qaocbodrflsaerxntfui.supabase.co",
  "sb_publishable_eIeO9MihyuQDuNHy60Ubrw_8ZuSKPFU"
)

const params = new URLSearchParams(window.location.search)
const matchId = params.get("id")

let selectedOdds = null
let selectedType = null

// 🔥 UPDATE RATING
async function updateTeamFormRating(teamId){

 const { data: matches } = await supabase
  .from("matches")
  .select("*")
  .or(`home_team.eq.${teamId},away_team.eq.${teamId}`)
  .not("home_score","is",null)
  .not("away_score","is",null)
  .order("created_at", { ascending:false })
  .limit(5)

 if(!matches || matches.length === 0) return

 let points = 0

 for(const m of matches){

  const hg = Number(m.home_score)
  const ag = Number(m.away_score)

  let stats = null
  try{ stats = m.stats ? JSON.parse(m.stats) : null }catch(e){}

  const isSN = stats && (stats[20] === "1" || stats[20] === "2")
  const isOT = stats && !isSN && (stats[9] === "11" || stats[19] === "11")

  const isHome = m.home_team === teamId

  const teamGoals = isHome ? hg : ag
  const oppGoals = isHome ? ag : hg

  if(isSN || isOT){
   if(teamGoals > oppGoals) points += 2
   else points += 1
  }else{
   if(teamGoals > oppGoals) points += 3
   else points += 0
  }
 }

 const rating = 800 + (points * 20)

 await supabase
  .from("teams")
  .update({ rating_form: rating })
  .eq("id", teamId)
}

// kurzy
function calculateOdds(homeRating, awayRating){

 const HOME_ADVANTAGE = 80
 const DRAW_PROB = 0.20

 const homeAdj = homeRating + HOME_ADVANTAGE

 let probHomeRaw = 1 / (1 + Math.pow(10, (awayRating - homeAdj)/400))
 let probAwayRaw = 1 - probHomeRaw

 const probHomeTotal = probHomeRaw * (1 - DRAW_PROB)
 const probAwayTotal = probAwayRaw * (1 - DRAW_PROB)
 const probDraw = DRAW_PROB

 const probHomeOT = probDraw * probHomeRaw
 const probAwayOT = probDraw * probAwayRaw

 return {
  "1": (1/probHomeTotal),
  "0": (1/probDraw),
  "2": (1/probAwayTotal),
  "10": (1/probHomeOT),
  "02": (1/probAwayOT),
  "11": (1/(probHomeTotal + probHomeOT)),
  "22": (1/(probAwayTotal + probAwayOT))
 }
}

// LOAD
async function load(){

 const { data: match } = await supabase
  .from("matches")
  .select("*")
  .eq("id", matchId)
  .single()

 await updateTeamFormRating(match.home_team)
 await updateTeamFormRating(match.away_team)

 const { data: teams } = await supabase
  .from("teams")
  .select("*")
  .in("id", [match.home_team, match.away_team])

 const home = teams.find(t=>t.id === match.home_team)
 const away = teams.find(t=>t.id === match.away_team)

 document.getElementById("homeName").innerText =
  `${home.name} (${Math.round(home.rating_form)})`

 document.getElementById("awayName").innerText =
  `${away.name} (${Math.round(away.rating_form)})`

 document.getElementById("homeLogo").src = "./logos/" + home.logo
 document.getElementById("awayLogo").src = "./logos/" + away.logo

 const odds = calculateOdds(home.rating_form, away.rating_form)

 document.querySelectorAll(".odd").forEach(btn=>{
  const type = btn.dataset.type
  const o = odds[type]

  btn.innerText = type + " (" + o.toFixed(2) + ")"

  btn.onclick = ()=>{
   selectedOdds = o
   selectedType = type

   document.querySelectorAll(".odd").forEach(b=>b.classList.remove("active"))
   btn.classList.add("active")

   document.getElementById("kurs").innerText = "Kurz: " + o.toFixed(2)
   updateWin()
  }
 })

 await loadExistingBet()
}

// EXISTUJÍCÍ SÁZKA
async function loadExistingBet(){

 const { data: bet } = await supabase
  .from("bets")
  .select("*")
  .eq("match_id", matchId)
  .limit(1)
  .maybeSingle()

 if(!bet) return

 selectedOdds = bet.odds
 selectedType = bet.tip

 document.getElementById("betInfo").style.display = "block"
 document.getElementById("betText").innerText =
  `Vsazeno ${bet.amount} Kč na ${bet.tip} (kurz ${bet.odds.toFixed(2)})`

 document.getElementById("kurs").innerText = "Kurz: " + bet.odds.toFixed(2)
 document.getElementById("vyhra").innerText =
  "Výhra: " + bet.potential_win.toFixed(0) + " Kč"

 document.querySelectorAll(".odd").forEach(btn=>{
  if(btn.dataset.type === bet.tip){
   btn.classList.add("active")
  }
 })

 document.querySelectorAll(".odd").forEach(b=>b.style.pointerEvents = "none")
 document.getElementById("amount").value = bet.amount
 document.getElementById("amount").disabled = true
 document.querySelector(".betBtn").disabled = true
}

document.getElementById("amount").oninput = updateWin

function updateWin(){
 const amount = Number(document.getElementById("amount").value)
 if(!amount || !selectedOdds) return

 document.getElementById("vyhra").innerText =
  "Výhra: " + (amount * selectedOdds).toFixed(0) + " Kč"
}

// ULOŽENÍ
document.querySelector(".betBtn").onclick = async () => {

 const amount = Number(document.getElementById("amount").value)

 if(!amount || !selectedOdds || !selectedType){
  alert("Vyber sázku a zadej částku")
  return
 }

 const potentialWin = amount * selectedOdds

 const { error } = await supabase
  .from("bets")
  .insert({
    match_id: matchId,
    tip: selectedType,
    amount: amount,
    odds: selectedOdds,
    potential_win: potentialWin,
    status: "pending"
  })

 if(error){
  alert("Chyba při ukládání")
  console.log(error)
  return
 }

 location.reload()
}

load()

</script>

</body>
</html>
