<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sázky na zápas</title>

<style>
body{
 font-family:Arial;
 background:#f2f2f2;
 margin:0;
}

.wrapper{
 max-width:800px;
 margin:auto;
 background:white;
 padding:20px;
 border-radius:10px;
 margin-top:40px;
}

.matchBox{
 background:#e9ecef;
 padding:20px;
 border-radius:10px;
 text-align:center;
 margin-bottom:20px;
}

.score{
 font-size:30px;
 font-weight:bold;
 margin:10px 0;
}
</style>
</head>

<body>

<div class="wrapper">
<h2>Detail zápasu</h2>
<div id="match"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig={
 apiKey:"AIzaSyD0jDnVNHZAs83g6FGwQT_nOpOCyT4NTNU",
 authDomain:"statistiky-6310a.firebaseapp.com",
 projectId:"statistiky-6310a"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// PARAMETRY
const params = new URLSearchParams(window.location.search)

const matchId = params.get("id")
const home = params.get("home")
const away = params.get("away")

const container = document.getElementById("match")

function calc(stats){
 let ag = Number(stats[6]) + Number(stats[7]) + Number(stats[8])
 let hg = Number(stats[16]) + Number(stats[17]) + Number(stats[18])

 if(stats[9]==="11") ag++
 if(stats[19]==="11") hg++
 if(stats[20]==="1") hg++
 if(stats[20]==="2") ag++

 return {hg,ag}
}

// 🔍 NAJDI ZÁPAS
async function loadMatch(){

 let data = null

 // 1️⃣ pokud máme ID → načti přímo
 if(matchId){
  const ref = doc(db,"zapasy",matchId)
  const snap = await getDoc(ref)

  if(snap.exists()){
   data = snap.data()
  }
 }

 // 2️⃣ fallback → hledej podle týmů
 if(!data && home && away){

  const snap = await getDocs(collection(db,"zapasy"))

  snap.forEach(d=>{
   const m = d.data()

   if(m.homeTeam === home && m.awayTeam === away){
    data = m
   }
  })
 }

 // 3️⃣ výsledek
 if(!data){
  container.innerHTML = "<b>Zápas zatím neexistuje (ještě nebyl vytvořen ve Firebase)</b>"
  return
 }

 let scoreHTML = "Zápas ještě nebyl odehrán"

 if(data.stats){
  const s = calc(data.stats)
  scoreHTML = `<div class="score">${s.hg} : ${s.ag}</div>`
 }

 container.innerHTML = `
 <div class="matchBox">
  <h3>${home} vs ${away}</h3>
  ${scoreHTML}
 </div>
 `
}

loadMatch()

</script>

</body>
</html>
