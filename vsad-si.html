<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Tipsport</title>

<style>
body{font-family:Arial;background:#0b2a3c;color:white;margin:0}
.wrapper{max-width:700px;margin:auto;padding:20px}
.box{background:#112f44;padding:15px;border-radius:10px;margin-bottom:15px}
h2{text-align:center;margin-top:0}
.oddsRow{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
.odds{background:white;color:black;padding:8px;border-radius:6px;text-align:center;cursor:pointer;font-weight:bold}
.active{background:#27ae60;color:white}
input{width:100%;padding:10px;margin-top:10px;border-radius:6px;border:none;text-align:center}
button{width:100%;padding:12px;margin-top:10px;background:#27ae60;color:white;border:none;border-radius:6px;font-weight:bold}
.info{text-align:center;margin-top:10px}
</style>
</head>

<body>

<div class="wrapper">

<h2 id="matchTitle"></h2>
<div class="box info" id="score">- : -</div>

<div class="box">
<div class="oddsRow" id="oddsRow"></div>

<input id="betAmount" placeholder="Vklad Kč" type="number">

<div class="info">
Kurz: <span id="finalOdds">0</span><br>
Možná výhra: <span id="win">0 Kč</span>
</div>

<button onclick="placeBet()">VSADIT</button>
</div>

<div class="box info" id="betInfo"></div>
<div class="box info" id="credit"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, updateDoc }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig={
 apiKey:"AIzaSyD0jDnVNHZAs83g6FGwQT_nOpOCyT4NTNU",
 authDomain:"statistiky-6310a.firebaseapp.com",
 projectId:"statistiky-6310a"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

const params=new URLSearchParams(window.location.search);
const home=params.get("home");
const away=params.get("away");

matchTitle.innerText=home+" vs "+away;

let selected=null;
let odds={};

const BASE=1000;
const HOME_ADV=50;

/* ===== ELO ZJISTENÍ ===== */

async function getRatings(){

 const snap=await getDoc(doc(db,"ratings","global"))

 if(!snap.exists()) return {}

 return snap.data()
}

/* ===== VÝPOČET KURZŮ ===== */

function calcOdds(rh,ra){

 let raH=rh+HOME_ADV
 let raA=ra

 const pH=1/(1+Math.pow(10,(raA-raH)/400))
 const pA=1-pH

 const pDraw=0.2

 return {
  1:(1/(pH*0.6)).toFixed(2),
  2:(1/(pH*0.2)).toFixed(2),
  3:(1/pDraw).toFixed(2),
  4:(1/(pA*0.2)).toFixed(2),
  5:(1/(pA*0.6)).toFixed(2)
 }
}

/* ===== NAČTENÍ / ULOŽENÍ KURZŮ ===== */

async function loadOdds(){

 const ref=doc(db,"odds",home+"_"+away)
 const snap=await getDoc(ref)

 if(snap.exists()){
  odds=snap.data()
 }else{

  const ratings=await getRatings()

  const rh=ratings[home]||BASE
  const ra=ratings[away]||BASE

  odds=calcOdds(rh,ra)

  await setDoc(ref,odds)
 }

 renderOdds()
}

/* ===== UI ===== */

function renderOdds(){

 oddsRow.innerHTML=""

 Object.entries(odds).forEach(([k,v])=>{

  oddsRow.innerHTML+=`
  <div class="odds" data-tip="${k}">
  ${k}<br>${v}
  </div>`
 })

 document.querySelectorAll(".odds").forEach(o=>{
  o.onclick=()=>{
   document.querySelectorAll(".odds").forEach(x=>x.classList.remove("active"))
   o.classList.add("active")
   selected=o.dataset.tip
   updateWin()
  }
 })
}

betAmount.oninput=updateWin

function updateWin(){
 const a=Number(betAmount.value)
 const o=Number(odds[selected]||0)

 finalOdds.innerText=o
 win.innerText=a&&o?Math.round(a*o)+" Kč":"0 Kč"
}

/* ===== KREDIT ===== */

async function loadCredit(){

 const snap=await getDoc(doc(db,"hraci","KTip"))
 const k=snap.exists()?snap.data().kredit:0

 credit.innerText="Kredit: "+k+" Kč"
}

/* ===== SCORE ===== */

async function loadScore(){

 const snap=await getDoc(doc(db,"zapasy",home+"_"+away))

 if(!snap.exists()) return

 const s=snap.data().stats
 if(!s) return

 let hg=Number(s[16])+Number(s[17])+Number(s[18])
 let ag=Number(s[6])+Number(s[7])+Number(s[8])

 score.innerText=hg+" : "+ag

 evaluate(hg,ag)
}

/* ===== SÁZKA ===== */

async function placeBet(){

 if(!selected)return alert("Vyber tip")

 const bet=Number(betAmount.value)

 const pRef=doc(db,"hraci","KTip")
 const snap=await getDoc(pRef)

 const kredit=snap.data().kredit||0

 if(bet>kredit)return alert("Nemáš kredit")

 const o=Number(odds[selected])
 const win=Math.round(bet*o)

 await updateDoc(pRef,{kredit:kredit-bet})

 await setDoc(doc(db,"bets","KTip_"+home+"_"+away),{
  tip:selected,
  bet,
  odds:o,
  win,
  evaluated:false
 })

 loadCredit()

 alert("Vsazeno")
}

/* ===== VYHODNOCENÍ ===== */

async function evaluate(hg,ag){

 const ref=doc(db,"bets","KTip_"+home+"_"+away)
 const snap=await getDoc(ref)

 if(!snap.exists())return
 if(snap.data().evaluated)return

 let result=3

 if(hg>ag) result=1
 if(ag>hg) result=5

 const data=snap.data()

 if(Number(data.tip)===result){

  const win=data.win

  const pRef=doc(db,"hraci","KTip")
  const pSnap=await getDoc(pRef)

  await updateDoc(pRef,{
   kredit:(pSnap.data().kredit||0)+win
  })
 }

 await updateDoc(ref,{evaluated:true})

 showBet()
}

/* ===== INFO ===== */

async function showBet(){

 const snap=await getDoc(doc(db,"bets","KTip_"+home+"_"+away))
 if(!snap.exists())return

 const d=snap.data()

 betInfo.innerHTML=`
 Tip: ${d.tip}<br>
 Vklad: ${d.bet} Kč<br>
 Kurz: ${d.odds}<br>
 Výhra: ${d.win} Kč
 `
}

/* ===== INIT ===== */

await loadOdds()
await loadCredit()
await loadScore()
await showBet()

</script>

</body>
</html>
