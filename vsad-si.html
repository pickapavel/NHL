<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vsaď si</title>

<style>
body{
 font-family:Arial;
 background:#0c2a38;
 margin:0;
 color:white;
}

.wrapper{
 max-width:500px;
 margin:auto;
 padding:20px;
}

.matchBox{text-align:center;margin-bottom:20px;}

.teams{
 display:flex;
 justify-content:space-between;
 align-items:center;
}

.team{
 width:40%;
 text-align:center;
}

.team img{
 width:70px;height:70px;
 background:white;
 border-radius:10px;
 padding:5px;
}

.score{
 font-size:40px;
 font-weight:bold;
}

.betBox{
 background:#16394d;
 padding:20px;
 border-radius:15px;
}

.odds{
 display:grid;
 grid-template-columns:repeat(7,1fr);
 gap:6px;
 margin-bottom:15px;
}

.odd{
 background:#eee;
 color:black;
 padding:10px;
 border-radius:8px;
 text-align:center;
 cursor:pointer;
 font-weight:bold;
 font-size:12px;
}

.odd.active{
 background:#27ae60;
 color:white;
}

input{
 width:100%;
 padding:10px;
 border-radius:8px;
 border:none;
 margin-bottom:10px;
}

.info{
 display:flex;
 justify-content:space-between;
 margin-bottom:15px;
}

.betBtn{
 width:100%;
 height:45px;
 background:#27ae60;
 border:none;
 border-radius:10px;
 color:white;
 font-size:16px;
 cursor:pointer;
}

.back{
 margin-top:20px;
 text-align:center;
}

.back button{
 padding:10px 20px;
 border:none;
 border-radius:8px;
 background:#2f9ec9;
 color:white;
 cursor:pointer;
}
</style>
</head>

<body>

<div class="wrapper">

<div class="matchBox">
<div class="teams">

<div class="team">
<img id="homeLogo">
<div id="homeName"></div>
</div>

<div class="score">- : -</div>

<div class="team">
<img id="awayLogo">
<div id="awayName"></div>
</div>

</div>
</div>

<div class="betBox">

<h3>Vyber výsledek</h3>

<div class="odds">
<div class="odd" data-type="1">1</div>
<div class="odd" data-type="10">10</div>
<div class="odd" data-type="11">11</div>
<div class="odd" data-type="0">0</div>
<div class="odd" data-type="22">22</div>
<div class="odd" data-type="02">02</div>
<div class="odd" data-type="2">2</div>
</div>

<input id="amount" placeholder="Částka (Kč)">

<div class="info">
<div id="kurs">Kurz: -</div>
<div id="vyhra">Výhra: -</div>
</div>

<button class="betBtn">VSADIT</button>

</div>

<div class="back">
<button onclick="history.back()">← Zpět</button>
</div>

</div>

<script type="module">

import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient(
  "https://qaocbodrflsaerxntfui.supabase.co",
  "sb_publishable_eIeO9MihyuQDuNHy60Ubrw_8ZuSKPFU"
)

const params = new URLSearchParams(window.location.search)
const matchId = params.get("id")

let selectedOdds = null
let selectedType = null

// 🔥 VÝPOČET KURZŮ
function calculateOdds(homeRating, awayRating){

 const HOME_ADVANTAGE = 80
 const DRAW_PROB = 0.20 // 🔥 sníženo

 const homeAdj = homeRating + HOME_ADVANTAGE

 let probHomeRaw = 1 / (1 + Math.pow(10, (awayRating - homeAdj)/400))
 let probAwayRaw = 1 - probHomeRaw

 // rozdělení mimo remízu
 const probHomeTotal = probHomeRaw * (1 - DRAW_PROB)
 const probAwayTotal = probAwayRaw * (1 - DRAW_PROB)
 const probDraw = DRAW_PROB

 // 🔥 OT/SN podle síly týmů (NE 50/50!)
 const probHomeOT = probDraw * probHomeRaw
 const probAwayOT = probDraw * probAwayRaw

 const probHome60 = probHomeTotal
 const probAway60 = probAwayTotal

 return {
  "1": (1/probHome60),
  "0": (1/probDraw),
  "2": (1/probAway60),

  "10": (1/probHomeOT),
  "02": (1/probAwayOT),

  "11": (1/(probHome60 + probHomeOT)),
  "22": (1/(probAway60 + probAwayOT))
 }
}

// LOAD
async function load(){

 const { data: match } = await supabase
  .from("matches")
  .select("*")
  .eq("id", matchId)
  .single()

 const { data: teams } = await supabase
  .from("teams")
  .select("*")
  .in("id", [match.home_team, match.away_team])

 const home = teams.find(t=>t.id === match.home_team)
 const away = teams.find(t=>t.id === match.away_team)

 document.getElementById("homeName").innerText = home.name
 document.getElementById("awayName").innerText = away.name

 document.getElementById("homeLogo").src = "./logos/" + home.logo
 document.getElementById("awayLogo").src = "./logos/" + away.logo

 const odds = calculateOdds(home.rating_form, away.rating_form)

 // naplnění UI
 document.querySelectorAll(".odd").forEach(btn=>{
  const type = btn.dataset.type
  btn.innerText = type + " (" + odds[type].toFixed(2) + ")"

  btn.onclick = ()=>{
   selectedOdds = odds[type]
   selectedType = type

   document.querySelectorAll(".odd").forEach(b=>b.classList.remove("active"))
   btn.classList.add("active")

   document.getElementById("kurs").innerText = "Kurz: " + odds[type].toFixed(2)
   updateWin()
  }
 })
}

document.getElementById("amount").oninput = updateWin

function updateWin(){
 const amount = Number(document.getElementById("amount").value)
 if(!amount || !selectedOdds) return

 document.getElementById("vyhra").innerText =
  "Výhra: " + (amount * selectedOdds).toFixed(0) + " Kč"
}

load()

</script>

</body>
</html>
