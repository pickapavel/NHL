<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vsaď si</title>

<style>
body{
 font-family:Arial;
 background:#0c2a38;
 margin:0;
 color:white;
}

.wrapper{
 max-width:500px;
 margin:auto;
 padding:20px;
}

/* MATCH */

.matchBox{text-align:center;margin-bottom:20px;}

.teams{
 display:flex;
 justify-content:space-between;
 align-items:center;
}

.team{
 width:40%;
 text-align:center;
}

.team img{
 width:70px;height:70px;
 background:white;
 border-radius:10px;
 padding:5px;
}

.score{
 font-size:40px;
 font-weight:bold;
}

.periods{margin-top:10px;color:#ccc;}

/* BET */

.betBox{
 background:#16394d;
 padding:20px;
 border-radius:15px;
}

.odds{
 display:grid;
 grid-template-columns:repeat(5,1fr);
 gap:10px;
 margin-bottom:15px;
}

.odd{
 background:#eee;
 color:black;
 padding:12px;
 border-radius:8px;
 text-align:center;
 cursor:pointer;
 font-weight:bold;
}

.odd.active{
 background:#27ae60;
 color:white;
}

input{
 width:100%;
 padding:10px;
 border-radius:8px;
 border:none;
 margin-bottom:10px;
}

.info{
 display:flex;
 justify-content:space-between;
 margin-bottom:15px;
}

.betBtn{
 width:100%;
 padding:15px;
 background:#27ae60;
 border:none;
 border-radius:10px;
 color:white;
 font-size:18px;
 cursor:pointer;
}

.back{
 margin-top:20px;
 text-align:center;
}

.back button{
 padding:10px 20px;
 border:none;
 border-radius:8px;
 background:#2f9ec9;
 color:white;
 cursor:pointer;
}
</style>
</head>

<body>

<div class="wrapper">

<div class="matchBox">

<div class="teams">

<div class="team">
<img id="homeLogo">
<div id="homeName"></div>
</div>

<div class="score">- : -</div>

<div class="team">
<img id="awayLogo">
<div id="awayName"></div>
</div>

</div>

<div class="periods">Třetiny: (-:-, -:-, -:-)</div>

</div>

<div class="betBox">

<h3>Vyber výsledek</h3>

<div class="odds">
<div class="odd">1</div>
<div class="odd">10</div>
<div class="odd">0</div>
<div class="odd">02</div>
<div class="odd">2</div>
</div>

<input placeholder="Částka (Kč)">

<div class="info">
<div>Kurz: -</div>
<div>Výhra: -</div>
</div>

<button class="betBtn">VSADIT</button>

</div>

<div class="back">
<button onclick="history.back()">← Zpět</button>
</div>

</div>

<script>

// ===== NAČTENÍ Z URL =====
const params = new URLSearchParams(window.location.search)

const home = params.get("home")
const away = params.get("away")
const hlogo = params.get("hlogo")
const alogo = params.get("alogo")

// ===== VYKRESLENÍ =====
document.getElementById("homeName").innerText = home || "Domácí"
document.getElementById("awayName").innerText = away || "Hosté"

if(hlogo){
 document.getElementById("homeLogo").src = "./logos/" + hlogo
}

if(alogo){
 document.getElementById("awayLogo").src = "./logos/" + alogo
}

// klikání
document.querySelectorAll(".odd").forEach(btn=>{
 btn.onclick = ()=>{
  document.querySelectorAll(".odd").forEach(b=>b.classList.remove("active"))
  btn.classList.add("active")
 }
})

</script>

</body>
</html>
