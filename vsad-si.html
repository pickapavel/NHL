<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vsaď si</title>

<style>
body{
 font-family:Arial;
 background:#0c2a38;
 margin:0;
 color:white;
}

.wrapper{
 max-width:500px;
 margin:auto;
 padding:20px;
}

/* ===== ZÁPAS ===== */

.matchBox{
 text-align:center;
 margin-bottom:20px;
}

.teams{
 display:flex;
 justify-content:space-between;
 align-items:center;
}

.team{
 width:40%;
 text-align:center;
}

.team img{
 width:70px;
 height:70px;
 background:white;
 border-radius:10px;
 padding:5px;
}

.score{
 font-size:40px;
 font-weight:bold;
}

.periods{
 margin-top:10px;
 color:#ccc;
}

/* ===== SÁZKY ===== */

.betBox{
 background:#16394d;
 padding:20px;
 border-radius:15px;
}

.betBox h3{
 margin-top:0;
}

.odds{
 display:grid;
 grid-template-columns:repeat(5,1fr);
 gap:10px;
 margin-bottom:15px;
}

.odd{
 background:#eee;
 color:black;
 text-align:center;
 padding:12px;
 border-radius:8px;
 cursor:pointer;
 font-weight:bold;
}

.odd.active{
 background:#27ae60;
 color:white;
}

input{
 width:100%;
 padding:10px;
 border-radius:8px;
 border:none;
 margin-bottom:10px;
 font-size:16px;
}

.info{
 display:flex;
 justify-content:space-between;
 margin-bottom:15px;
}

/* ===== BUTTONY ===== */

.betBtn{
 width:100%;
 padding:15px;
 background:#27ae60;
 border:none;
 border-radius:10px;
 color:white;
 font-size:18px;
 font-weight:bold;
 cursor:pointer;
}

.back{
 margin-top:20px;
 text-align:center;
}

.back button{
 padding:10px 20px;
 border:none;
 border-radius:8px;
 background:#2f9ec9;
 color:white;
 cursor:pointer;
}
</style>
</head>

<body>

<div class="wrapper">

<!-- ===== ZÁPAS ===== -->

<div class="matchBox">

<div class="teams">

<div class="team">
<img src="">
<div id="homeName">Domácí tým</div>
</div>

<div class="score" id="score">- : -</div>

<div class="team">
<img src="">
<div id="awayName">Hosté</div>
</div>

</div>

<div class="periods" id="periods">
Třetiny: (-:-, -:-, -:-)
</div>

</div>

<!-- ===== SÁZKY ===== -->

<div class="betBox">

<h3>Vyber výsledek</h3>

<div class="odds">

<div class="odd" data-type="1">1</div>
<div class="odd" data-type="2">10</div>
<div class="odd" data-type="3">0</div>
<div class="odd" data-type="4">02</div>
<div class="odd" data-type="5">2</div>

</div>

<input type="number" id="bet" placeholder="Částka (Kč)">

<div class="info">
<div>Kurz: <span id="kurz">-</span></div>
<div>Výhra: <span id="vyhra">-</span></div>
</div>

<button class="betBtn">VSADIT</button>

</div>

<!-- ===== ZPĚT ===== -->

<div class="back">
<button onclick="history.back()">← Zpět</button>
</div>

</div>

<script>

// pouze UI výběr (žádná logika kurzů zatím)

let selected = null

document.querySelectorAll(".odd").forEach(btn=>{
 btn.onclick = ()=>{
  document.querySelectorAll(".odd").forEach(b=>b.classList.remove("active"))
  btn.classList.add("active")
  selected = btn.dataset.type
 }
})

</script>

</body>
</html>
