<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vsaď si</title>

<style>
body{margin:0;font-family:Arial;background:#0b2a3c;color:white;}
.wrapper{max-width:900px;margin:auto;padding:20px;}

.matchHeader{
 display:grid;
 grid-template-columns:1fr auto 1fr;
 align-items:center;
 margin-bottom:15px;
}

.team{display:flex;flex-direction:column;align-items:center;text-align:center;}
.team img{width:60px;background:white;padding:6px;border-radius:10px;}

.scoreBig{font-size:40px;font-weight:bold;text-align:center;}

.betBox{background:#112f44;padding:20px;border-radius:12px;}

.oddsRow{
 display:grid;
 grid-template-columns:repeat(5,1fr);
 gap:8px;margin-bottom:10px;
}

.odds{
 background:white;color:black;text-align:center;
 padding:8px;border-radius:8px;cursor:pointer;font-weight:bold;
}

.odds.active{background:#27ae60;color:white;}

input{
 width:100%;padding:10px;border-radius:8px;
 border:none;text-align:center;margin:8px 0;
}

.betInfo{
 background:#0b2a3c;padding:10px;border-radius:10px;
 display:flex;justify-content:space-between;
}

.betBtn{
 width:100%;padding:12px;background:#27ae60;
 border:none;border-radius:8px;color:white;
 font-weight:bold;margin-top:10px;cursor:pointer;
}

.section{margin-top:20px;}
.title{font-weight:bold;margin-bottom:5px;}

.creditBox{
 margin-top:15px;padding:10px;
 background:#0b2a3c;border-radius:10px;
 text-align:center;font-weight:bold;
}
</style>
</head>

<body>

<div class="wrapper">

<div class="matchHeader">
 <div class="team" id="homeTeam"></div>
 <div class="scoreBig">- : -</div>
 <div class="team" id="awayTeam"></div>
</div>

<div class="betBox">

<div class="section">
<div class="title">Kubele</div>

<div class="oddsRow" id="kOddsRow">
 <div class="odds" data-tip="1">1<br><span id="ko1"></span></div>
 <div class="odds" data-tip="2">10<br><span id="ko2"></span></div>
 <div class="odds" data-tip="3">0<br><span id="ko3"></span></div>
 <div class="odds" data-tip="4">02<br><span id="ko4"></span></div>
 <div class="odds" data-tip="5">2<br><span id="ko5"></span></div>
</div>

<input id="kBet" placeholder="Vklad (Kč)" type="number">

<div class="betInfo">
 <div>Kurz: <span id="kFinalOdds">0</span></div>
 <div>Výhra: <span id="kWin">0 Kč</span></div>
</div>

<button class="betBtn" onclick="placeBet('K')">VSADIT</button>
</div>

<div class="section">
<div class="title">Pici</div>

<div class="oddsRow" id="pOddsRow">
 <div class="odds" data-tip="1">1<br><span id="po1"></span></div>
 <div class="odds" data-tip="2">10<br><span id="po2"></span></div>
 <div class="odds" data-tip="3">0<br><span id="po3"></span></div>
 <div class="odds" data-tip="4">02<br><span id="po4"></span></div>
 <div class="odds" data-tip="5">2<br><span id="po5"></span></div>
</div>

<input id="pBet" placeholder="Vklad (Kč)" type="number">

<div class="betInfo">
 <div>Kurz: <span id="pFinalOdds">0</span></div>
 <div>Výhra: <span id="pWin">0 Kč</span></div>
</div>

<button class="betBtn" onclick="placeBet('P')">VSADIT</button>
</div>

<div id="creditBox" class="creditBox"></div>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs, doc, getDoc, setDoc, updateDoc }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app=initializeApp({
 apiKey:"AIzaSyD0jDnVNHZAs83g6FGwQT_nOpOCyT4NTNU",
 authDomain:"statistiky-6310a.firebaseapp.com",
 projectId:"statistiky-6310a"
});
const db=getFirestore(app);

/* ===== TÝMY ===== */

const teamsData={
 "HC Sparta Praha (P)":"sparta.png",
 "HC Bílí Tygři Liberec (K)":"liberec.png",
 "HC Dynamo Pardubice (K)":"pardubice.png",
 "HC Chemopetrol Litvínov (P)":"litvinov.png",
 "HC Geus Okna Kladno (P)":"kladno.png",
 "HC Motor České Budějovice (K)":"budejovice.png",
 "HC Energie Karlovy Vary (P)":"vary.png",
 "HC Oceláři Třinec (K)":"trinec.png"
};

const BASE=1000,K=30,HOME=50;
let ratings={},currentOdds={},home,away,kTip=null,pTip=null;

/* ===== ELO ===== */

function ensure(t){ if(typeof ratings[t]!=="number")ratings[t]=BASE; }

function expected(a,b){return 1/(1+Math.pow(10,(b-a)/400))}

function updateElo(h,a,hg,ag){
 ensure(h);ensure(a);
 let ra=ratings[h]+HOME, rb=ratings[a];
 let ea=expected(ra,rb), sa=hg>ag?1:0;
 ratings[h]+=K*(sa-ea);
 ratings[a]+=K*((1-sa)-(1-ea));
}

function calc(s){
 let ag=(+s[6]||0)+(+s[7]||0)+(+s[8]||0);
 let hg=(+s[16]||0)+(+s[17]||0)+(+s[18]||0);
 return {hg,ag}
}

function odds(h,a){
 ensure(h);ensure(a);
 let ra=ratings[h]+HOME;
 let rb=ratings[a];
 let pH=1/(1+Math.pow(10,(rb-ra)/400));
 let pA=1-pH;
 let pD=0.2;

 return {
 1:(1/(pH*0.6)).toFixed(2),
 2:(1/(pH*0.18)).toFixed(2),
 3:(1/pD).toFixed(2),
 4:(1/(pA*0.18)).toFixed(2),
 5:(1/(pA*0.6)).toFixed(2)
 }
}

/* ===== LOAD ===== */

async function load(){

 const params=new URLSearchParams(location.search);
 home=params.get("home");
 away=params.get("away");

 const snap=await getDocs(collection(db,"zapasy"));

 snap.forEach(d=>{
  const m=d.data();
  if(!m.stats)return;
  const s=calc(m.stats);
  updateElo(m.homeTeam,m.awayTeam,s.hg,s.ag);
 });

 ensure(home);ensure(away);

 homeTeam.innerHTML=`<img src="./logos/${teamsData[home]}">${home}<br>⭐ ${Math.round(ratings[home])}`;
 awayTeam.innerHTML=`<img src="./logos/${teamsData[away]}">${away}<br>⭐ ${Math.round(ratings[away])}`;

 currentOdds=odds(home,away);

 for(let i=1;i<=5;i++){
  document.getElementById("ko"+i).innerText=currentOdds[i];
  document.getElementById("po"+i).innerText=currentOdds[i];
 }

 loadCredits();
 loadSaved();
}

load();

/* ===== CLICK ===== */

document.querySelectorAll("#kOddsRow .odds").forEach(el=>{
 el.onclick=()=>{
  document.querySelectorAll("#kOddsRow .odds").forEach(o=>o.classList.remove("active"));
  el.classList.add("active");
  kTip=el.dataset.tip;
  calcWin("K");
 }
});

document.querySelectorAll("#pOddsRow .odds").forEach(el=>{
 el.onclick=()=>{
  document.querySelectorAll("#pOddsRow .odds").forEach(o=>o.classList.remove("active"));
  el.classList.add("active");
  pTip=el.dataset.tip;
  calcWin("P");
 }
});

kBet.oninput=()=>calcWin("K");
pBet.oninput=()=>calcWin("P");

/* ===== CALC ===== */

function calcWin(player){
 const tip=player==="K"?kTip:pTip;
 const bet=Number(player==="K"?kBet.value:pBet.value);
 const o=Number(currentOdds[tip]||0);

 if(player==="K"){
  kFinalOdds.innerText=o||0;
  kWin.innerText=bet&&o?Math.round(bet*o)+" Kč":"0 Kč";
 }else{
  pFinalOdds.innerText=o||0;
  pWin.innerText=bet&&o?Math.round(bet*o)+" Kč":"0 Kč";
 }
}

/* ===== BET ===== */

window.placeBet=async function(player){

 const tip=player==="K"?kTip:pTip;
 const bet=Number(player==="K"?kBet.value:pBet.value);

 if(!tip||!bet)return alert("Vyplň vše");

 const o=Number(currentOdds[tip]);
 const win=Math.round(bet*o);

 const ref=doc(db,"tipy",home+"_"+away);

 let data={};

 if(player==="K"){
  data.kTip=tip;
  data.kBet=bet;
  data.kOdds=o;
  data.kWin=win;

  const refK=doc(db,"hraci","KTip");
  const snap=await getDoc(refK);
  await updateDoc(refK,{kredit:snap.data().kredit - bet});
 }

 if(player==="P"){
  data.pTip=tip;
  data.pBet=bet;
  data.pOdds=o;
  data.pWin=win;

  const refP=doc(db,"hraci","PTip");
  const snap=await getDoc(refP);
  await updateDoc(refP,{kredit:snap.data().kredit - bet});
 }

 await setDoc(ref,data,{merge:true});
 alert("Uloženo");
 loadSaved();
 loadCredits();
}

/* ===== LOAD SAVED ===== */

async function loadSaved(){
 const snap=await getDoc(doc(db,"tipy",home+"_"+away));
 if(!snap.exists())return;

 const d=snap.data();

 if(d.kTip){
  kTip=d.kTip;
  kBet.value=d.kBet;
  kFinalOdds.innerText=d.kOdds;
  kWin.innerText=d.kWin+" Kč";
 }

 if(d.pTip){
  pTip=d.pTip;
  pBet.value=d.pBet;
  pFinalOdds.innerText=d.pOdds;
  pWin.innerText=d.pWin+" Kč";
 }
}

/* ===== CREDIT ===== */

async function loadCredits(){
 const k=await getDoc(doc(db,"hraci","KTip"));
 const p=await getDoc(doc(db,"hraci","PTip"));
 creditBox.innerText=`Kubele: ${k.data().kredit} Kč | Pici: ${p.data().kredit} Kč`;
}

</script>

</body>
</html>
