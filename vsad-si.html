<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vsaď si</title>

<style>
body{margin:0;font-family:Arial;background:#0b2a3c;color:white;}
.wrapper{max-width:900px;margin:auto;padding:20px;}

.matchHeader{
 display:grid;
 grid-template-columns:1fr auto 1fr;
 align-items:center;
 margin-bottom:15px;
}

.team{display:flex;flex-direction:column;align-items:center;}
.team img{width:60px;background:white;padding:6px;border-radius:10px;}

.scoreBig{font-size:40px;font-weight:bold;text-align:center;}

.betBox{background:#112f44;padding:20px;border-radius:12px;}

.oddsRow{
 display:grid;
 grid-template-columns:repeat(5,1fr);
 gap:8px;margin-bottom:15px;
}

.odds{
 background:white;color:black;
 text-align:center;padding:8px;
 border-radius:8px;cursor:pointer;
 font-weight:bold;
}

.odds.active{background:#27ae60;color:white;}

input{
 width:100%;padding:10px;border-radius:8px;
 border:none;text-align:center;margin-bottom:15px;
}

.betInfo{
 background:#0b2a3c;padding:10px;border-radius:10px;
 display:flex;justify-content:space-between;
}

.betBtn{
 width:100%;padding:12px;background:#27ae60;
 border:none;border-radius:8px;color:white;
 font-weight:bold;margin-top:10px;
}

.creditBox{
 margin-top:15px;padding:10px;
 background:#0b2a3c;border-radius:10px;
 text-align:center;font-weight:bold;
}
</style>
</head>

<body>

<div class="wrapper">

<div class="matchHeader">
 <div class="team" id="homeTeam"></div>
 <div class="scoreBig">- : -</div>
 <div class="team" id="awayTeam"></div>
</div>

<div class="betBox">

<div class="oddsRow">
 <div class="odds" data-tip="1">1<br><span id="o1"></span></div>
 <div class="odds" data-tip="2">10<br><span id="o2"></span></div>
 <div class="odds" data-tip="3">0<br><span id="o3"></span></div>
 <div class="odds" data-tip="4">02<br><span id="o4"></span></div>
 <div class="odds" data-tip="5">2<br><span id="o5"></span></div>
</div>

<input id="betAmount" placeholder="Vklad (Kč)" type="number">

<div class="betInfo">
 <div>Kurz: <span id="finalOdds">0</span></div>
 <div>Výhra: <span id="winAmount">0 Kč</span></div>
</div>

<button class="betBtn" onclick="placeBet()">VSADIT</button>

<div id="creditBox" class="creditBox"></div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs, doc, getDoc, setDoc }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app=initializeApp({
 apiKey:"AIzaSyD0jDnVNHZAs83g6FGwQT_nOpOCyT4NTNU",
 authDomain:"statistiky-6310a.firebaseapp.com",
 projectId:"statistiky-6310a"
});
const db=getFirestore(app);

const teamsData={
 "HC Sparta Praha (P)":"sparta.png",
 "HC Bílí Tygři Liberec (K)":"liberec.png",
 "HC Dynamo Pardubice (K)":"pardubice.png",
 "HC Chemopetrol Litvínov (P)":"litvinov.png",
 "HC Geus Okna Kladno (P)":"kladno.png",
 "HC Motor České Budějovice (K)":"budejovice.png",
 "HC Energie Karlovy Vary (P)":"vary.png",
 "HC Oceláři Třinec (K)":"trinec.png"
};

const BASE_RATING=1000, K=30, HOME_ADV=50;
let ratings={}, selectedTip=null, currentOdds={};

function resetRatings(){
 ratings={}; Object.keys(teamsData).forEach(t=>ratings[t]=BASE_RATING);
}

function expected(ra,rb){return 1/(1+Math.pow(10,(rb-ra)/400))}

function updateElo(home,away,hg,ag){
 let ra=ratings[home]+HOME_ADV, rb=ratings[away];
 let ea=expected(ra,rb), sa=hg>ag?1:0;
 ratings[home]+=K*(sa-ea);
 ratings[away]+=K*((1-sa)-(1-ea));
}

function calc(s){
 let ag=+s[6]+ +s[7]+ +s[8];
 let hg=+s[16]+ +s[17]+ +s[18];
 if(s[9]==="11")ag++; if(s[19]==="11")hg++;
 if(s[20]==="1")hg++; if(s[20]==="2")ag++;
 return {hg,ag}
}

function calculateOdds(home,away){
 let ra=(ratings[home]||1000)+HOME_ADV;
 let rb=(ratings[away]||1000);
 const diff=Math.abs(ra-rb);
 const pH=1/(1+Math.pow(10,(rb-ra)/400));
 const pA=1-pH;
 const pD=Math.max(0.12,0.28-diff/4000);
 return {
  1:(1/(pH*0.6)).toFixed(2),
  2:(1/(pH*0.18)).toFixed(2),
  3:(1/pD).toFixed(2),
  4:(1/(pA*0.18)).toFixed(2),
  5:(1/(pA*0.6)).toFixed(2)
 }
}

/* ===== LOAD ===== */

let home,away;

async function load(){

 const params=new URLSearchParams(location.search);
 home=params.get("home");
 away=params.get("away");

 resetRatings();

 const snap=await getDocs(collection(db,"zapasy"));
 let matches=[];
 snap.forEach(d=>matches.push({id:d.id,...d.data()}));

 matches
 .filter(m=>m.category?.startsWith("Extraliga"))
 .sort((a,b)=>a.created-b.created)
 .forEach(m=>{
  if(!m.stats)return;
  const s=calc(m.stats);
  updateElo(m.homeTeam,m.awayTeam,s.hg,s.ag);
 });

 homeTeam.innerHTML=`<img src="./logos/${teamsData[home]}">${home}<br>⭐ ${Math.round(ratings[home])}`;
 awayTeam.innerHTML=`<img src="./logos/${teamsData[away]}">${away}<br>⭐ ${Math.round(ratings[away])}`;

 currentOdds=calculateOdds(home,away);

 o1.innerText=currentOdds[1];
 o2.innerText=currentOdds[2];
 o3.innerText=currentOdds[3];
 o4.innerText=currentOdds[4];
 o5.innerText=currentOdds[5];

 loadCredits();
 loadSavedBet();
}

load();

/* ===== LOAD SAVED TIP ===== */

async function loadSavedBet(){

 const ref=doc(db,"tipy",home+"_"+away);
 const snap=await getDoc(ref);

 if(!snap.exists()) return;

 const data=snap.data();

 selectedTip=data.tip;
 betAmount.value=data.bet;

 document.querySelectorAll(".odds").forEach(el=>{
  if(el.dataset.tip===data.tip){
   el.classList.add("active");
  }
 });

 updateWin();
}

/* ===== CREDIT ===== */

async function loadCredits(){
 const k=await getDoc(doc(db,"hraci","KTip"));
 const p=await getDoc(doc(db,"hraci","PTip"));
 creditBox.innerText=`Kubele: ${k.data().kredit} Kč | Pici: ${p.data().kredit} Kč`;
}

/* ===== UI ===== */

document.querySelectorAll(".odds").forEach(el=>{
 el.onclick=()=>{
  document.querySelectorAll(".odds").forEach(o=>o.classList.remove("active"));
  el.classList.add("active");
  selectedTip=el.dataset.tip;
  updateWin();
 }
});

betAmount.oninput=updateWin;

function updateWin(){
 const a=+betAmount.value;
 const o=+currentOdds[selectedTip]||0;
 finalOdds.innerText=o;
 winAmount.innerText=a&&o?Math.round(a*o)+" Kč":"0 Kč";
}

/* ===== SAVE ===== */

window.placeBet=async function(){

 if(!selectedTip)return alert("Vyber tip");
 if(!betAmount.value)return alert("Zadej částku");

 const bet=+betAmount.value;
 const odds=+currentOdds[selectedTip];
 const win=Math.round(bet*odds);

 await setDoc(doc(db,"tipy",home+"_"+away),{
  homeTeam:home,
  awayTeam:away,
  tip:selectedTip,
  bet:bet,
  odds:odds,
  possibleWin:win,
  created:Date.now()
 },{merge:true});

 alert("Uloženo ✅");
}

</script>

</body>
</html>
