<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vsaď si</title>

<style>
body{
 font-family:Arial;
 background:#0c2a38;
 margin:0;
 color:white;
}

.wrapper{
 max-width:500px;
 margin:auto;
 padding:20px;
}

.matchBox{text-align:center;margin-bottom:20px;}

.teams{
 display:flex;
 justify-content:space-between;
 align-items:center;
}

.team{
 width:40%;
 text-align:center;
}

.team img{
 width:70px;height:70px;
 background:white;
 border-radius:10px;
 padding:5px;
}

.score{
 font-size:40px;
 font-weight:bold;
}

.betBox{
 background:#16394d;
 padding:20px;
 border-radius:15px;
}

.odds{
 display:grid;
 grid-template-columns:repeat(2,1fr);
 gap:10px;
 margin-bottom:15px;
}

.odd{
 background:#eee;
 color:black;
 padding:12px;
 border-radius:8px;
 text-align:center;
 cursor:pointer;
 font-weight:bold;
}

.odd.active{
 background:#27ae60;
 color:white;
}

input{
 width:100%;
 padding:10px;
 border-radius:8px;
 border:none;
 margin-bottom:10px;
}

.info{
 display:flex;
 justify-content:space-between;
 margin-bottom:15px;
}

.betBtn{
 width:100%;
 height:45px;
 background:#27ae60;
 border:none;
 border-radius:10px;
 color:white;
 font-size:16px;
 cursor:pointer;
}

.back{
 margin-top:20px;
 text-align:center;
}

.back button{
 padding:10px 20px;
 border:none;
 border-radius:8px;
 background:#2f9ec9;
 color:white;
 cursor:pointer;
}
</style>
</head>

<body>

<div class="wrapper">

<div class="matchBox">

<div class="teams">

<div class="team">
<img id="homeLogo">
<div id="homeName"></div>
</div>

<div class="score">- : -</div>

<div class="team">
<img id="awayLogo">
<div id="awayName"></div>
</div>

</div>

</div>

<div class="betBox">

<h3>Vyber výsledek</h3>

<div class="odds">
<div class="odd" id="oddHome">1</div>
<div class="odd" id="oddAway">2</div>
</div>

<input id="amount" placeholder="Částka (Kč)">

<div class="info">
<div id="kurs">Kurz: -</div>
<div id="vyhra">Výhra: -</div>
</div>

<button class="betBtn">VSADIT</button>

</div>

<div class="back">
<button onclick="history.back()">← Zpět</button>
</div>

</div>

<script type="module">

import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient(
  "https://qaocbodrflsaerxntfui.supabase.co",
  "sb_publishable_eIeO9MihyuQDuNHy60Ubrw_8ZuSKPFU"
)

// ===== URL =====
const params = new URLSearchParams(window.location.search)
const matchId = params.get("id")

let selectedOdds = null

// ===== výpočet kurzů =====
function calculateOdds(homeRating, awayRating){

 const HOME_ADVANTAGE = 80

 const homeAdj = homeRating + HOME_ADVANTAGE

 const probHome = 1 / (1 + Math.pow(10, (awayRating - homeAdj)/400))
 const probAway = 1 - probHome

 return {
  home: Number((1/probHome).toFixed(2)),
  away: Number((1/probAway).toFixed(2))
 }
}

// ===== load =====
async function load(){

 const { data: match } = await supabase
  .from("matches")
  .select("*")
  .eq("id", matchId)
  .single()

 const { data: teams } = await supabase
  .from("teams")
  .select("*")
  .in("id", [match.home_team, match.away_team])

 const home = teams.find(t=>t.id === match.home_team)
 const away = teams.find(t=>t.id === match.away_team)

 // UI
 document.getElementById("homeName").innerText = home.name
 document.getElementById("awayName").innerText = away.name

 document.getElementById("homeLogo").src = "./logos/" + home.logo
 document.getElementById("awayLogo").src = "./logos/" + away.logo

 // kurzy
 const odds = calculateOdds(home.rating_form, away.rating_form)

 document.getElementById("oddHome").innerText = "1 (" + odds.home + ")"
 document.getElementById("oddAway").innerText = "2 (" + odds.away + ")"

 // klikání
 document.getElementById("oddHome").onclick = ()=> selectOdd(odds.home)
 document.getElementById("oddAway").onclick = ()=> selectOdd(odds.away)
}

function selectOdd(o){
 selectedOdds = o

 document.querySelectorAll(".odd").forEach(b=>b.classList.remove("active"))
 event.target.classList.add("active")

 document.getElementById("kurs").innerText = "Kurz: " + o
 updateWin()
}

document.getElementById("amount").oninput = updateWin

function updateWin(){
 const amount = Number(document.getElementById("amount").value)
 if(!amount || !selectedOdds) return

 document.getElementById("vyhra").innerText =
  "Výhra: " + (amount * selectedOdds).toFixed(0) + " Kč"
}

load()

</script>

</body>
</html>
