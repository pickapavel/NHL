<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vsaď si</title>

<style>
body{
 margin:0;
 font-family:Arial;
 background:#0b2a3c;
 color:white;
}

.wrapper{
 max-width:900px;
 margin:auto;
 padding:20px;
}

.matchHeader{
 display:grid;
 grid-template-columns:1fr auto 1fr;
 align-items:center;
 gap:10px;
 margin-bottom:15px;
}

.team{
 display:flex;
 flex-direction:column;
 align-items:center;
 gap:6px;
 text-align:center;
}

.team img{
 width:60px;
 height:60px;
 object-fit:contain;
 background:white;
 padding:6px;
 border-radius:10px;
}

.teamName{
 font-size:14px;
 font-weight:bold;
}

.scoreBig{
 font-size:40px;
 font-weight:bold;
 text-align:center;
}

.periodInfo{
 text-align:center;
 margin-bottom:25px;
 opacity:0.8;
}

.betBox{
 background:#112f44;
 padding:20px;
 border-radius:12px;
}

.oddsRow{
 display:grid;
 grid-template-columns:repeat(5,1fr);
 gap:8px;
 margin-bottom:15px;
}

.odds{
 background:white;
 color:black;
 text-align:center;
 padding:8px;
 border-radius:8px;
 cursor:pointer;
 font-weight:bold;
}

.odds.active{
 background:#27ae60;
 color:white;
}

input{
 width:100%;
 padding:10px;
 border-radius:8px;
 border:none;
 text-align:center;
 margin-bottom:15px;
}

.betInfo{
 background:#0b2a3c;
 padding:10px;
 border-radius:10px;
 display:flex;
 justify-content:space-between;
}

.betBtn{
 width:100%;
 padding:12px;
 background:#27ae60;
 border:none;
 border-radius:8px;
 color:white;
 font-weight:bold;
 margin-top:10px;
}
</style>
</head>

<body>

<div class="wrapper">

<div class="matchHeader">
 <div class="team" id="homeTeam"></div>
 <div class="scoreBig" id="score">- : -</div>
 <div class="team" id="awayTeam"></div>
</div>

<div id="periodInfo" class="periodInfo"></div>

<div class="betBox">

<div class="oddsRow">
 <div class="odds" data-tip="1">1<br><span id="o1"></span></div>
 <div class="odds" data-tip="2">10<br><span id="o2"></span></div>
 <div class="odds" data-tip="3">0<br><span id="o3"></span></div>
 <div class="odds" data-tip="4">02<br><span id="o4"></span></div>
 <div class="odds" data-tip="5">2<br><span id="o5"></span></div>
</div>

<input id="betAmount" placeholder="Vklad (Kč)" type="number">

<div class="betInfo">
 <div>Kurz: <span id="finalOdds">0</span></div>
 <div>Výhra: <span id="winAmount">0 Kč</span></div>
</div>

<button class="betBtn" onclick="placeBet()">VSADIT</button>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig={
 apiKey:"AIzaSyD0jDnVNHZAs83g6FGwQT_nOpOCyT4NTNU",
 authDomain:"statistiky-6310a.firebaseapp.com",
 projectId:"statistiky-6310a"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

const teamsData={
 "HC Sparta Praha (P)":"sparta.png",
 "HC Bílí Tygři Liberec (K)":"liberec.png",
 "HC Dynamo Pardubice (K)":"pardubice.png",
 "HC Chemopetrol Litvínov (P)":"litvinov.png",
 "HC Geus Okna Kladno (P)":"kladno.png",
 "HC Motor České Budějovice (K)":"budejovice.png",
 "HC Energie Karlovy Vary (P)":"vary.png",
 "HC Oceláři Třinec (K)":"trinec.png"
};

let selectedTip=null;
let currentOdds={};

/* ===== GÓLY ===== */

function calc(stats){
 let ag=Number(stats[6])+Number(stats[7])+Number(stats[8]);
 let hg=Number(stats[16])+Number(stats[17])+Number(stats[18]);

 if(stats[9]==="11") ag++;
 if(stats[19]==="11") hg++;
 if(stats[20]==="1") hg++;
 if(stats[20]==="2") ag++;

 return {hg,ag};
}

/* ===== KURZY ===== */

const HOME_ADV=50;

function calculateOdds(homeRating,awayRating){

 let ra=homeRating + HOME_ADV;
 let rb=awayRating;

 const diff=Math.abs(ra-rb);

 const pHome=1/(1+Math.pow(10,(rb-ra)/400));
 const pAway=1-pHome;

 const pDraw=Math.max(0.12,0.28-diff/4000);

 const pHomeReg=pHome*0.60;
 const pHomeOT=pHome*0.18;
 const pAwayReg=pAway*0.60;
 const pAwayOT=pAway*0.18;

 return {
  1:(1/pHomeReg).toFixed(2),
  2:(1/pHomeOT).toFixed(2),
  3:(1/pDraw).toFixed(2),
  4:(1/pAwayOT).toFixed(2),
  5:(1/pAwayReg).toFixed(2)
 };
}

/* ===== LOAD ===== */

async function loadMatch(){

 const params=new URLSearchParams(window.location.search);
 const matchId=params.get("id");

 const matchSnap=await getDoc(doc(db,"zapasy",matchId));
 if(!matchSnap.exists()) return;

 const match=matchSnap.data();

 const home=match.homeTeam;
 const away=match.awayTeam;

 const stats = match.stats;

 let hg = "-";
 let ag = "-";
 let periods = "";

 if(stats){
  const s = calc(stats);
  hg = s.hg;
  ag = s.ag;

  periods = `Třetiny: (${stats[16]}:${stats[6]}, ${stats[17]}:${stats[7]}, ${stats[18]}:${stats[8]})`;
 }

 /* ratingy */
 const homeDoc=await getDoc(doc(db,"ratings",home));
 const awayDoc=await getDoc(doc(db,"ratings",away));

 const homeRating = homeDoc.exists() ? Number(homeDoc.data().rating) : 1000;
 const awayRating = awayDoc.exists() ? Number(awayDoc.data().rating) : 1000;

 /* UI */
 document.getElementById("homeTeam").innerHTML=
 `<img src="./logos/${teamsData[home]}"><div class="teamName">${home} ⭐ ${homeRating}</div>`;

 document.getElementById("awayTeam").innerHTML=
 `<img src="./logos/${teamsData[away]}"><div class="teamName">${away} ⭐ ${awayRating}</div>`;

 document.getElementById("score").innerText=`${hg} : ${ag}`;
 document.getElementById("periodInfo").innerText=periods;

 /* kurzy */
 currentOdds = calculateOdds(homeRating,awayRating);

 o1.innerText=currentOdds[1];
 o2.innerText=currentOdds[2];
 o3.innerText=currentOdds[3];
 o4.innerText=currentOdds[4];
 o5.innerText=currentOdds[5];
}

loadMatch();

/* UI */

document.querySelectorAll(".odds").forEach(el=>{
 el.onclick=()=>{
  document.querySelectorAll(".odds").forEach(o=>o.classList.remove("active"));
  el.classList.add("active");
  selectedTip=el.dataset.tip;
  updateWin();
 }
});

betAmount.oninput=updateWin;

function updateWin(){
 const amount=Number(betAmount.value);
 const odds=Number(currentOdds[selectedTip]||0);

 finalOdds.innerText=odds||0;

 if(amount&&odds){
  winAmount.innerText=Math.round(amount*odds)+" Kč";
 }else{
  winAmount.innerText="0 Kč";
 }
}

window.placeBet=function(){
 if(!selectedTip)return alert("Vyber tip");
 if(!betAmount.value)return alert("Zadej částku");

 alert("Sázka OK");
}

</script>

</body>
</html>
