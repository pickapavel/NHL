<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vsaď si</title>

<style>
body{
 font-family:Arial;
 background:#f2f2f2;
 margin:0;
}

.wrapper{
 max-width:600px;
 margin:auto;
 background:white;
 padding:20px;
 border-radius:10px;
 margin-top:40px;
}

.matchBox{
 background:#e9ecef;
 padding:20px;
 border-radius:10px;
 text-align:center;
 margin-bottom:20px;
}

.teams{
 font-size:20px;
 font-weight:bold;
 margin-bottom:10px;
}

input, select{
 width:100%;
 padding:10px;
 margin:10px 0;
 border-radius:6px;
 border:1px solid #ccc;
}

button{
 width:100%;
 padding:12px;
 background:#27ae60;
 color:white;
 border:none;
 border-radius:6px;
 font-weight:bold;
 cursor:pointer;
}

</style>
</head>

<body>

<div class="wrapper">

<h2>Vsaď si na zápas</h2>

<div id="match"></div>

<select id="tip">
 <option value="">Vyber tip</option>
 <option value="1">Domácí výhra</option>
 <option value="2">Výhra po prodl.</option>
 <option value="3">Remíza</option>
 <option value="4">Výhra hosté prodl.</option>
 <option value="5">Hosté výhra</option>
</select>

<input type="number" id="amount" placeholder="Částka (Kč)">

<button onclick="saveBet()">Potvrdit sázku</button>

</div>

<script type="module">

import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient(
  "https://qacobodrfsaerxntfui.supabase.co",
  "TVŮJ_PUBLISHABLE_KEY"
)

// PARAMETR
const params = new URLSearchParams(window.location.search)
const matchId = params.get("id")

const container = document.getElementById("match")

let currentMatch = null
let teamMap = {}

// LOAD
async function load(){

 // týmy
 const { data: teams } = await supabase.from("teams").select("*")

 teams.forEach(t=>{
  teamMap[t.id] = t
 })

 // zápas
 const { data: match } = await supabase
  .from("matches")
  .select("*")
  .eq("id", matchId)
  .single()

 currentMatch = match

 render()
}

// RENDER
function render(){

 const home = teamMap[currentMatch.home_team]
 const away = teamMap[currentMatch.away_team]

 container.innerHTML = `
  <div class="matchBox">
   <div class="teams">
    ${home.name} vs ${away.name}
   </div>
  </div>
 `
}

// SAVE
async function saveBet(){

 const tip = document.getElementById("tip").value
 const amount = Number(document.getElementById("amount").value)

 if(!tip || !amount){
  alert("Vyplň tip i částku")
  return
 }

 await supabase.from("bets").insert([{
  match_id: matchId,
  tip: tip,
  amount: amount
 }])

 alert("Sázka uložena")

}

load()

</script>

</body>
</html>
