<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vsaď si</title>

<style>
body{font-family:Arial;background:#0c2a38;margin:0;color:white;}
.wrapper{max-width:500px;margin:auto;padding:20px;}
.matchBox{text-align:center;margin-bottom:20px;}
.teams{display:flex;justify-content:space-between;align-items:center;}
.team{width:40%;text-align:center;}
.team img{width:70px;height:70px;background:white;border-radius:10px;padding:5px;}
.score{font-size:40px;font-weight:bold;}
.betBox{background:#16394d;padding:20px;border-radius:15px;}
.odds{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:15px;}
.odd{background:#eee;color:black;padding:10px;border-radius:8px;text-align:center;cursor:pointer;font-weight:bold;font-size:12px;}
.odd.active{background:#27ae60;color:white;}
input, select{width:100%;padding:10px;border-radius:8px;border:none;margin-bottom:10px;}
.info{display:flex;justify-content:space-between;margin-bottom:15px;}
.betBtn{width:100%;height:45px;background:#27ae60;border:none;border-radius:10px;color:white;font-size:16px;cursor:pointer;}
.credit{margin-bottom:10px;font-size:14px;}
</style>
</head>

<body>

<div class="wrapper">

<div class="matchBox">
<div class="teams">

<div class="team">
<img id="homeLogo">
<div id="homeName"></div>
</div>

<div class="score" id="score">- : -</div>

<div class="team">
<img id="awayLogo">
<div id="awayName"></div>
</div>

</div>
</div>

<div class="betBox">

<h3>Hráč</h3>
<select id="playerSelect"></select>

<div class="credit" id="creditInfo">Kredit: -</div>

<h3>Vyber výsledek</h3>

<div class="odds">
<div class="odd" data-type="1">1</div>
<div class="odd" data-type="10">10</div>
<div class="odd" data-type="11">11</div>
<div class="odd" data-type="0">0</div>
<div class="odd" data-type="22">22</div>
<div class="odd" data-type="02">02</div>
<div class="odd" data-type="2">2</div>
</div>

<input id="amount" placeholder="Částka (Kč)">

<div class="info">
<div id="kurs">Kurz: -</div>
<div id="vyhra">Možná výhra: -</div>
</div>

<button class="betBtn">VSADIT</button>

</div>

</div>

<script type="module">

import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient(
  "https://qaocbodrflsaerxntfui.supabase.co",
  "sb_publishable_eIeO9MihyuQDuNHy60Ubrw_8ZuSKPFU"
)

const params = new URLSearchParams(window.location.search)
const matchId = params.get("id")

let selectedOdds = null
let selectedType = null
let currentPlayer = null

// ===== ODDS =====
function calculateOdds(homeRating, awayRating){

 const HOME_ADV = 80
 const homeAdj = homeRating + HOME_ADV
 const diff = Math.abs(homeAdj - awayRating)

 let drawProb = 0.25 * Math.exp(-diff / 400)
 drawProb = Math.max(0.10, Math.min(0.30, drawProb))

 const probHomeRaw = 1 / (1 + Math.pow(10, (awayRating - homeAdj)/400))
 const probAwayRaw = 1 - probHomeRaw

 const probHome = probHomeRaw * (1 - drawProb)
 const probAway = probAwayRaw * (1 - drawProb)

 const probHomeOT = drawProb * probHomeRaw
 const probAwayOT = drawProb * probAwayRaw

 return {
  "1": 1/probHome,
  "0": 1/drawProb,
  "2": 1/probAway,
  "10": 1/probHomeOT,
  "02": 1/probAwayOT,
  "11": 1/(probHome + probHomeOT),
  "22": 1/(probAway + probAwayOT)
 }
}

// ===== LOAD PLAYERS =====
async function loadPlayers(){

 const { data: players } = await supabase.from("players").select("*")

 const select = document.getElementById("playerSelect")
 select.innerHTML = ""

 players.forEach(p=>{
  const opt = document.createElement("option")
  opt.value = p.id
  opt.textContent = p.name
  select.appendChild(opt)
 })

 select.onchange = ()=>{
  const id = select.value
  currentPlayer = players.find(p=>p.id === id)
  updateCredit()
 }

 currentPlayer = players[0]
 select.value = currentPlayer.id
 updateCredit()
}

function updateCredit(){
 document.getElementById("creditInfo").innerText =
  "Kredit: " + currentPlayer.credit + " Kč"
}

// ===== LOAD MATCH =====
async function load(){

 await loadPlayers()

 const { data: match } = await supabase
  .from("matches")
  .select("*")
  .eq("id", matchId)
  .single()

 const { data: teams } = await supabase
  .from("teams")
  .select("*")
  .in("id", [match.home_team, match.away_team])

 const home = teams.find(t=>t.id === match.home_team)
 const away = teams.find(t=>t.id === match.away_team)

 document.getElementById("homeName").innerText = home.name
 document.getElementById("awayName").innerText = away.name

 document.getElementById("homeLogo").src = "./logos/" + home.logo
 document.getElementById("awayLogo").src = "./logos/" + away.logo

 const odds = calculateOdds(home.rating_form, away.rating_form)

 document.querySelectorAll(".odd").forEach(btn=>{
  const type = btn.dataset.type
  const o = odds[type]

  btn.innerText = type + " (" + o.toFixed(2) + ")"

  btn.onclick = ()=>{
   selectedOdds = o
   selectedType = type

   document.querySelectorAll(".odd").forEach(b=>b.classList.remove("active"))
   btn.classList.add("active")

   document.getElementById("kurs").innerText = "Kurz: " + o.toFixed(2)
   updateWin()
  }
 })
}

// ===== WIN =====
function updateWin(){
 const amount = Number(document.getElementById("amount").value)
 if(!amount || !selectedOdds) return

 document.getElementById("vyhra").innerText =
  "Možná výhra: " + (amount * selectedOdds).toFixed(0) + " Kč"
}

document.getElementById("amount").oninput = updateWin

// ===== BET =====
document.querySelector(".betBtn").onclick = async () => {

 const amount = Number(document.getElementById("amount").value)

 if(!amount || !selectedOdds || !selectedType){
  alert("Vyber sázku a částku")
  return
 }

 if(currentPlayer.credit < amount){
  alert("Nedostatek kreditu!")
  return
 }

 // odečtení kreditu
 await supabase
  .from("players")
  .update({
   credit: currentPlayer.credit - amount
  })
  .eq("id", currentPlayer.id)

 // uložení sázky
 await supabase.from("bets").insert({
  match_id: matchId,
  player_id: currentPlayer.id,
  tip: selectedType,
  amount: amount,
  odds: selectedOdds,
  potential_win: amount * selectedOdds,
  status: "pending"
 })

 alert("Vsazeno 👍")
 location.reload()
}

load()

</script>

</body>
</html>
