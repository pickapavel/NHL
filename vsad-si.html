<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vsaď si</title>

<style>
body{
 margin:0;
 font-family:Arial;
 background:#0b2a3c;
 color:white;
}

.wrapper{
 max-width:900px;
 margin:auto;
 padding:20px;
}

.matchHeader{
 display:grid;
 grid-template-columns:1fr auto 1fr;
 align-items:center;
 gap:10px;
 margin-bottom:15px;
}

.team{
 display:flex;
 flex-direction:column;
 align-items:center;
 gap:6px;
 text-align:center;
}

.team img{
 width:60px;
 height:60px;
 object-fit:contain;
 background:white;
 padding:6px;
 border-radius:10px;
}

.teamName{
 font-size:14px;
 font-weight:bold;
}

.scoreBig{
 font-size:40px;
 font-weight:bold;
 text-align:center;
}

.betBox{
 background:#112f44;
 padding:20px;
 border-radius:12px;
}

.oddsRow{
 display:grid;
 grid-template-columns:repeat(5,1fr);
 gap:8px;
 margin-bottom:15px;
}

.odds{
 background:white;
 color:black;
 text-align:center;
 padding:8px;
 border-radius:8px;
 cursor:pointer;
 font-weight:bold;
}

.odds.active{
 background:#27ae60;
 color:white;
}

input, select{
 width:100%;
 padding:10px;
 border-radius:8px;
 border:none;
 text-align:center;
 margin-bottom:10px;
}

.betInfo{
 background:#0b2a3c;
 padding:10px;
 border-radius:10px;
 display:flex;
 justify-content:space-between;
}

.betBtn{
 width:100%;
 padding:12px;
 background:#27ae60;
 border:none;
 border-radius:8px;
 color:white;
 font-weight:bold;
 margin-top:10px;
}

.creditBox{
 margin-top:15px;
 padding:10px;
 background:#0b2a3c;
 border-radius:10px;
 text-align:center;
 font-weight:bold;
}
</style>
</head>

<body>

<div class="wrapper">

<div class="matchHeader">
 <div class="team" id="homeTeam"></div>
 <div class="scoreBig">- : -</div>
 <div class="team" id="awayTeam"></div>
</div>

<div class="betBox">

<select id="player">
 <option value="KTip">Kubele</option>
 <option value="PTip">Pici</option>
</select>

<div class="oddsRow">
 <div class="odds" data-tip="1">1<br><span id="o1"></span></div>
 <div class="odds" data-tip="2">10<br><span id="o2"></span></div>
 <div class="odds" data-tip="3">0<br><span id="o3"></span></div>
 <div class="odds" data-tip="4">02<br><span id="o4"></span></div>
 <div class="odds" data-tip="5">2<br><span id="o5"></span></div>
</div>

<input id="betAmount" placeholder="Vklad (Kč)" type="number">

<div class="betInfo">
 <div>Kurz: <span id="finalOdds">0</span></div>
 <div>Výhra: <span id="winAmount">0 Kč</span></div>
</div>

<button class="betBtn" onclick="placeBet()">VSADIT</button>

<div id="creditBox" class="creditBox"></div>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs, doc, getDoc, setDoc, updateDoc }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig={
 apiKey:"AIzaSyD0jDnVNHZAs83g6FGwQT_nOpOCyT4NTNU",
 authDomain:"statistiky-6310a.firebaseapp.com",
 projectId:"statistiky-6310a"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

/* ===== DATA ===== */

let selectedTip=null;
let currentOdds={};

/* ===== LOAD ===== */

async function load(){

 const params=new URLSearchParams(window.location.search);
 const home=params.get("home");
 const away=params.get("away");

 homeTeam.innerHTML=home
 awayTeam.innerHTML=away

 currentOdds={
  1:1.8,
  2:4.5,
  3:3.2,
  4:4.5,
  5:1.9
 }

 o1.innerText=currentOdds[1]
 o2.innerText=currentOdds[2]
 o3.innerText=currentOdds[3]
 o4.innerText=currentOdds[4]
 o5.innerText=currentOdds[5]

 await loadCredits()
 await loadExistingBet()
}

load()

/* ===== KREDIT ===== */

async function loadCredits(){

 const kDoc=await getDoc(doc(db,"hraci","KTip"))
 const pDoc=await getDoc(doc(db,"hraci","PTip"))

 const k=kDoc.exists()?kDoc.data().kredit:0
 const p=pDoc.exists()?pDoc.data().kredit:0

 creditBox.innerText=`Kubele: ${k} Kč | Pici: ${p} Kč`
}

/* ===== LOAD BET ===== */

async function loadExistingBet(){

 const params=new URLSearchParams(window.location.search);
 const home=params.get("home");
 const away=params.get("away");

 const snap=await getDocs(collection(db,"tipy"))

 snap.forEach(d=>{
  const data=d.data()

  if(data.homeTeam===home && data.awayTeam===away){

   player.value=data.player
   selectedTip=data.tip
   betAmount.value=data.bet

   document.querySelectorAll(".odds").forEach(o=>{
    if(o.dataset.tip===selectedTip){
     o.classList.add("active")
    }
   })

   updateWin()
  }
 })
}

/* ===== UI ===== */

document.querySelectorAll(".odds").forEach(el=>{
 el.onclick=()=>{
  document.querySelectorAll(".odds").forEach(o=>o.classList.remove("active"))
  el.classList.add("active")
  selectedTip=el.dataset.tip
  updateWin()
 }
})

betAmount.oninput=updateWin

function updateWin(){
 const amount=Number(betAmount.value)
 const odds=Number(currentOdds[selectedTip]||0)

 finalOdds.innerText=odds||0
 winAmount.innerText=amount&&odds?Math.round(amount*odds)+" Kč":"0 Kč"
}

/* ===== BET ===== */

window.placeBet=async function(){

 const params=new URLSearchParams(window.location.search);
 const home=params.get("home");
 const away=params.get("away");
 const playerId=player.value

 if(!selectedTip)return alert("Vyber tip")
 if(!betAmount.value)return alert("Zadej částku")

 const bet=Number(betAmount.value)

 const playerRef=doc(db,"hraci",playerId)
 const playerSnap=await getDoc(playerRef)

 const kredit=playerSnap.data().kredit||0

 if(bet>kredit)return alert("Nedostatek kreditu")

 const odds=Number(currentOdds[selectedTip])
 const win=Math.round(bet*odds)

 /* odečtení kreditu */
 await updateDoc(playerRef,{
  kredit:kredit-bet
 })

 /* uložení tipu */
 const ref=doc(db,"tipy",playerId+"_"+home+"_"+away)

 await setDoc(ref,{
  player:playerId,
  homeTeam:home,
  awayTeam:away,
  tip:selectedTip,
  bet:bet,
  odds:odds,
  possibleWin:win,
  created:Date.now()
 })

 await loadCredits()

 alert("Sázka uložena ✅")
}

</script>

</body>
</html>
