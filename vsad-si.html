<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zápis výsledku</title>

<style>
body{
 font-family:Arial;
 background:#0c2a38;
 margin:0;
 color:white;
}

.wrapper{
 max-width:500px;
 margin:auto;
 padding:20px;
}

input{
 width:100%;
 padding:10px;
 border-radius:8px;
 border:none;
 margin-bottom:10px;
}

button{
 width:100%;
 height:45px;
 background:#27ae60;
 border:none;
 border-radius:10px;
 color:white;
 font-size:16px;
 cursor:pointer;
}
</style>
</head>

<body>

<div class="wrapper">

<h2>Zápis výsledku</h2>

<input id="matchId" placeholder="ID zápasu">
<input id="homeScore" placeholder="Domácí góly">
<input id="awayScore" placeholder="Hosté góly">

<button onclick="save()">ULOŽIT</button>

</div>

<script type="module">

import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient(
 "https://qaocbodrflsaerxntfui.supabase.co",
 "sb_publishable_eIeO9MihyuQDuNHy60Ubrw_8ZuSKPFU"
)

// 🔥 NOVÁ FUNKCE – vyhodnocení sázek
async function evaluateBets(match){

 const { data: bets } = await supabase
  .from("bets")
  .select("*")
  .eq("match_id", match.id)

 for(const bet of bets){

  const hg = Number(match.home_score)
  const ag = Number(match.away_score)

  let result = null

  if(hg > ag) result = "1"
  else if(hg < ag) result = "2"
  else result = "0"

  let status = "lost"

  // základ
  if(bet.tip === result) status = "won"

  // rozšířené tipy
  if(bet.tip === "11" && result === "1") status = "won"
  if(bet.tip === "22" && result === "2") status = "won"
  if(bet.tip === "10" && (result === "1" || result === "0")) status = "won"
  if(bet.tip === "02" && (result === "0" || result === "2")) status = "won"

  await supabase
   .from("bets")
   .update({ status })
   .eq("id", bet.id)
 }
}

// 🔥 PŮVODNÍ SAVE + DOPLNĚNÍ
window.save = async () => {

 const matchId = document.getElementById("matchId").value
 const homeScore = Number(document.getElementById("homeScore").value)
 const awayScore = Number(document.getElementById("awayScore").value)

 if(!matchId){
  alert("Zadej ID zápasu")
  return
 }

 const { data: match, error } = await supabase
  .from("matches")
  .update({
    home_score: homeScore,
    away_score: awayScore,
    played: true
  })
  .eq("id", matchId)
  .select()
  .single()

 if(error){
  alert("Chyba při ukládání")
  console.log(error)
  return
 }

 // 🔥 NOVÉ – vyhodnocení sázek
 await evaluateBets(match)

 alert("Výsledek uložen a sázky vyhodnoceny")
}

</script>

</body>
</html>
