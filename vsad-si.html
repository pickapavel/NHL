<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vsaď si</title>

<style>
body{font-family:Arial;background:#0c2a38;margin:0;color:white;}
.wrapper{max-width:1000px;margin:auto;padding:20px;}

.matchBox{text-align:center;margin-bottom:20px;}

.teams{
 display:grid;
 grid-template-columns:1fr 200px 1fr;
 align-items:center;
}

.team{text-align:center;}
.team img{
 width:70px;height:70px;background:white;
 border-radius:10px;padding:5px;
}

.rating{
 font-size:13px;
 color:#ffd166;
 margin-top:3px;
}

.score{font-size:40px;font-weight:bold;}

.middleBox{
 display:flex;
 flex-direction:column;
 align-items:center;
 gap:5px;
}

.periods{
 font-size:14px;
 color:#ccc;
}

.winTag{
 font-size:12px;
 font-weight:bold;
 background:#2f9ec9;
 padding:4px 10px;
 border-radius:10px;
}

.betBox{background:#16394d;padding:20px;border-radius:15px;margin-bottom:25px;}

.betHeader{
 display:flex;
 justify-content:space-between;
 align-items:center;
 margin-bottom:10px;
}

.playerTitle{font-size:18px;font-weight:bold;}
.credit{font-size:14px;color:#ddd;}

.odds{
 display:grid;
 grid-template-columns:repeat(auto-fit,minmax(70px,1fr));
 gap:6px;
 margin-bottom:15px;
}

.odd{
 background:#eee;
 color:black;
 padding:8px;
 border-radius:8px;
 text-align:center;
 cursor:pointer;
 font-weight:bold;
 font-size:12px;
 display:flex;
 flex-direction:column;
 line-height:1.2;
}

.odd span{
 font-size:11px;
 font-weight:normal;
 color:#333;
}

.odd.active{
 background:#27ae60;
 color:white;
}

.odd.active span{
 color:#eaffea;
}

input{
 width:100%;padding:10px;border-radius:8px;
 border:none;margin-bottom:10px;
}

.info{
 display:flex;
 justify-content:space-between;
 margin-bottom:15px;
}

.betBtn{
 width:100%;height:45px;
 background:#27ae60;border:none;
 border-radius:10px;color:white;
 font-size:16px;cursor:pointer;
}

.backBtn{
 width:100%;
 height:45px;
 background:#2f9ec9;
 border:none;
 border-radius:10px;
 color:white;
 font-size:16px;
 cursor:pointer;
}
</style>
</head>

<body>
<script src="./menu.js"></script>

<div class="wrapper">

<div class="matchBox">
<div class="teams">

<div class="team">
<img id="homeLogo">
<div id="homeName"></div>
<div id="homeRating" class="rating"></div>
</div>

<div class="middleBox">
<div class="score" id="score">- : -</div>
<div class="periods" id="periods"></div>
<div class="winTag" id="tag"></div>
</div>

<div class="team">
<img id="awayLogo">
<div id="awayName"></div>
<div id="awayRating" class="rating"></div>
</div>

</div>
</div>

<!-- KUBELE -->
<div class="betBox">

<div class="betHeader">
<div class="playerTitle">Kubele</div>
<div class="credit" id="credit_kubele"></div>
</div>

<div class="odds" id="odds_kubele"></div>
<input id="amount_kubele">

<div class="info">
<div id="kurs_kubele"></div>
<div id="vyhra_kubele"></div>
</div>

<button class="betBtn" onclick="placeBet('kubele')">VSADIT</button>
</div>

<!-- PICI -->
<div class="betBox">

<div class="betHeader">
<div class="playerTitle">Pici</div>
<div class="credit" id="credit_pici"></div>
</div>

<div class="odds" id="odds_pici"></div>
<input id="amount_pici">

<div class="info">
<div id="kurs_pici"></div>
<div id="vyhra_pici"></div>
</div>

<button class="betBtn" onclick="placeBet('pici')">VSADIT</button>
</div>

<button class="backBtn" onclick="window.location.href='elh.html'">
Zpět na rozpis
</button>

</div>

<script type="module">

import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient(
  "https://qaocbodrflsaerxntfui.supabase.co",
  "sb_publishable_eIeO9MihyuQDuNHy60Ubrw_8ZuSKPFU"
)

const START_RATING = 1000
const K = 120

const matchId = new URLSearchParams(window.location.search).get("id")

let players = {}
let oddsGlobal = {}
let state = {
 kubele:{selected:[]},
 pici:{selected:[]}
}

/* ===== ELO ===== */

function getEloChange(teamRating, oppRating, score){
 const expected = 1 / (1 + Math.pow(10, (oppRating - teamRating)/400))
 return K * (score - expected)
}

function getScore(match, teamId){

 const hg = Number(match.home_score)
 const ag = Number(match.away_score)

 let stats = null
 try{ stats = match.stats ? JSON.parse(match.stats) : null }catch(e){}

 const isSN = stats && (stats[20] === "1" || stats[20] === "2")
 const isOT = stats && !isSN && (stats[9] === "11" || stats[19] === "11")

 const isHome = match.home_team === teamId

 const teamGoals = isHome ? hg : ag
 const oppGoals = isHome ? ag : hg

 if(teamGoals > oppGoals){
  return (isSN || isOT) ? 0.75 : 1
 }else{
  return (isSN || isOT) ? 0.25 : 0
 }
}

/* ===== NOVÉ: FORM výpočet (STEJNÝ jako rating.html) ===== */

function calculateFormRatings(matches, teams){

 const ratings = {}
 const formHistory = {}
 const formRatings = {}

 teams.forEach(t=>{
  ratings[t.id] = START_RATING
  formHistory[t.id] = []
  formRatings[t.id] = START_RATING
 })

 matches.forEach(m=>{

  const h = m.home_team
  const a = m.away_team

  const sH = getScore(m, h)
  const sA = getScore(m, a)

  function updateForm(teamId, opponentId, score){

    const current = formRatings[teamId]

    // 🔥 FIX
    const oppRating = formRatings[opponentId]

    const change = getEloChange(current, oppRating, score)

    formHistory[teamId].push(change)

    if(formHistory[teamId].length > 5){
      formHistory[teamId].shift()
    }

    const newRating =
      START_RATING +
      formHistory[teamId].reduce((a,b)=>a+Math.round(b),0)

    formRatings[teamId] = Math.round(newRating)
  }

  updateForm(h, a, sH)
  updateForm(a, h, sA)

  const rH = ratings[h]
  const rA = ratings[a]

  const cH = getEloChange(rH, rA, sH)
  const cA = getEloChange(rA, rH, sA)

  ratings[h] = Math.round(rH + cH)
  ratings[a] = Math.round(rA + cA)
 })

 return formRatings
}

/* ===== ODDS ===== */

function calculateOdds(homeRating, awayRating){
 const HOME_ADV = 80
 const homeAdj = homeRating + HOME_ADV
 const diff = Math.abs(homeAdj - awayRating)

 let drawProb = 0.25 * Math.exp(-diff / 400)
 drawProb = Math.max(0.10, Math.min(0.30, drawProb))

 const probHomeRaw = 1 / (1 + Math.pow(10, (awayRating - homeAdj)/400))
 const probAwayRaw = 1 - probHomeRaw

 const probHome = probHomeRaw * (1 - drawProb)
 const probAway = probAwayRaw * (1 - drawProb)

 const probHomeOT = drawProb * probHomeRaw
 const probAwayOT = drawProb * probAwayRaw

 return {
  "1": 1/probHome,
  "0": 1/drawProb,
  "2": 1/probAway,
  "10": 1/probHomeOT,
  "02": 1/probAwayOT,
  "11": 1/(probHome + probHomeOT),
  "22": 1/(probAway + probAwayOT)
 }
}

/* ===== LOAD ===== */

async function load(){

 const { data: match } = await supabase.from("matches").select("*").eq("id", matchId).single()
 const { data: teams } = await supabase.from("teams").select("*")

 const { data: matches } = await supabase
  .from("matches")
  .select("*")
  .not("home_score","is",null)
  .not("away_score","is",null)
  .order("round", { ascending:true })

 const formRatings = calculateFormRatings(matches, teams)

 const home = teams.find(t=>t.id === match.home_team)
 const away = teams.find(t=>t.id === match.away_team)

 const homeForm = formRatings[home.id]
 const awayForm = formRatings[away.id]

 document.getElementById("homeName").innerText = home.name
 document.getElementById("awayName").innerText = away.name
 document.getElementById("homeLogo").src = "./logos/" + home.logo
 document.getElementById("awayLogo").src = "./logos/" + away.logo

 document.getElementById("homeRating").innerText = "⭐ " + homeForm
 document.getElementById("awayRating").innerText = "⭐ " + awayForm

 if(match.played){

  document.getElementById("score").innerText =
   `${match.home_score} : ${match.away_score}`

  if(match.stats){
    const s = JSON.parse(match.stats)

    document.getElementById("periods").innerText =
     `(${s[16]||0}:${s[6]||0}, ${s[17]||0}:${s[7]||0}, ${s[18]||0}:${s[8]||0})`
  }

  if(match.result_type){
    document.getElementById("tag").innerText = match.result_type
  }
 }

 oddsGlobal = calculateOdds(homeForm, awayForm)

 renderOdds("kubele")
 renderOdds("pici")

 await loadPlayers()
 await loadExistingBets(match)
}

/* ===== ZBYTEK TVŮJ ORIGINÁL ===== */

async function loadPlayers(){
 const { data } = await supabase.from("players").select("*")

 players.kubele = data.find(p=>p.name==="Kubele")
 players.pici = data.find(p=>p.name==="Pici")

 document.getElementById("credit_kubele").innerText =
  "Kredit: " + Math.round(players.kubele.credit) + " Kč"

 document.getElementById("credit_pici").innerText =
  "Kredit: " + Math.round(players.pici.credit) + " Kč"
}

function renderOdds(playerKey){

 const cont = document.getElementById("odds_"+playerKey)
 cont.innerHTML=""

 Object.entries(oddsGlobal).forEach(([type, o])=>{

  const div = document.createElement("div")
  div.className="odd"
  div.dataset.type = type

  div.innerHTML = `
    ${type}
    <span>(${o.toFixed(2)})</span>
  `

  div.onclick = ()=>{
   const selected = state[playerKey].selected

   if(selected.includes(type)){
    state[playerKey].selected = selected.filter(t=>t!==type)
    div.classList.remove("active")
   }else{
    if(selected.length >= 2) return
    selected.push(type)
    div.classList.add("active")
   }

   updateSummary(playerKey)
  }

  cont.appendChild(div)
 })
}

function updateSummary(playerKey){

 const amount = Number(document.getElementById("amount_"+playerKey).value)
 const selected = state[playerKey].selected

 if(selected.length === 0) return

 let combinedOdds = 1
 selected.forEach(t=> combinedOdds *= oddsGlobal[t])

 document.getElementById("kurs_"+playerKey).innerText =
  "Kurz: " + combinedOdds.toFixed(2)

 if(amount){
  document.getElementById("vyhra_"+playerKey).innerText =
   "Možná výhra: " + Math.round(amount * combinedOdds) + " Kč"
 }
}

document.getElementById("amount_kubele").oninput = ()=>updateSummary("kubele")
document.getElementById("amount_pici").oninput = ()=>updateSummary("pici")

async function loadExistingBets(match){

 const { data: bets } = await supabase
  .from("bets")
  .select("*")
  .eq("match_id", matchId)

 bets.forEach(bet=>{

  const playerKey = bet.player_id === players.kubele.id ? "kubele" : "pici"

  const tips = bet.tip.split(",")
  state[playerKey].selected = tips

  const cont = document.getElementById("odds_"+playerKey)

  cont.querySelectorAll(".odd").forEach(btn=>{
    if(tips.includes(btn.dataset.type)){
      btn.classList.add("active")
      btn.style.pointerEvents = "none"
    }
  })

  document.getElementById("amount_"+playerKey).value = bet.amount
  document.getElementById("amount_"+playerKey).disabled = true

  document.getElementById("kurs_"+playerKey).innerText =
    "Kurz: " + bet.odds.toFixed(2)

  if(match.played){
    document.getElementById("vyhra_"+playerKey).innerText =
      bet.status === "won"
      ? `Vyhrál jsi ${Math.round(bet.potential_win)} Kč!`
      : `Prohrál jsi (${bet.amount} Kč)`
  }else{
    document.getElementById("vyhra_"+playerKey).innerText =
      `Možná výhra: ${Math.round(bet.potential_win)} Kč`
  }
 })
}

window.placeBet = async function(playerKey){

 const amount = Number(document.getElementById("amount_"+playerKey).value)
 const selected = state[playerKey].selected
 const player = players[playerKey]

 if(!amount || selected.length === 0){
  alert("Vyber sázku")
  return
 }

 if(player.credit < amount){
  alert("Nedostatek kreditu")
  return
 }

 let combinedOdds = 1
 selected.forEach(t=> combinedOdds *= oddsGlobal[t])

 await supabase.from("players")
  .update({ credit: player.credit - amount })
  .eq("id", player.id)

 await supabase.from("bets").insert({
  match_id: matchId,
  player_id: player.id,
  tip: selected.join(","),
  amount: amount,
  odds: combinedOdds,
  potential_win: amount * combinedOdds,
  status: "pending"
 })

 location.reload()
}

load()

</script>

</body>
</html>
