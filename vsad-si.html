<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs, doc, getDoc, setDoc, updateDoc }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app=initializeApp({
 apiKey:"AIzaSyD0jDnVNHZAs83g6FGwQT_nOpOCyT4NTNU",
 authDomain:"statistiky-6310a.firebaseapp.com",
 projectId:"statistiky-6310a"
});
const db=getFirestore(app);
 const homeTeam = document.getElementById("homeTeam");
const awayTeam = document.getElementById("awayTeam");
const kBet = document.getElementById("kBet");
const pBet = document.getElementById("pBet");
const kFinalOdds = document.getElementById("kFinalOdds");
const pFinalOdds = document.getElementById("pFinalOdds");
const kWin = document.getElementById("kWin");
const pWin = document.getElementById("pWin");
const creditBox = document.getElementById("creditBox");

const BASE=1000,K=30,HOME=50;
let ratings={},currentOdds={},home,away,kTip=null,pTip=null;

function ensure(t){ if(typeof ratings[t]!=="number")ratings[t]=BASE; }
function expected(a,b){return 1/(1+Math.pow(10,(b-a)/400))}

function updateElo(h,a,hg,ag){
 ensure(h);ensure(a);
 let ra=ratings[h]+HOME, rb=ratings[a];
 let ea=expected(ra,rb), sa=hg>ag?1:0;
 ratings[h]+=K*(sa-ea);
 ratings[a]+=K*((1-sa)-(1-ea));
}

function calc(s){
 let ag=(+s[6]||0)+(+s[7]||0)+(+s[8]||0);
 let hg=(+s[16]||0)+(+s[17]||0)+(+s[18]||0);
 return {hg,ag}
}

function odds(h,a){
 ensure(h);ensure(a);
 let ra=ratings[h]+HOME;
 let rb=ratings[a];
 let pH=1/(1+Math.pow(10,(rb-ra)/400));
 let pA=1-pH;
 let pD=0.2;

 return {
 1:(1/(pH*0.6)).toFixed(2),
 2:(1/(pH*0.18)).toFixed(2),
 3:(1/pD).toFixed(2),
 4:(1/(pA*0.18)).toFixed(2),
 5:(1/(pA*0.6)).toFixed(2)
 }
}

async function load(){

 const params=new URLSearchParams(location.search);
 home=params.get("home");
 away=params.get("away");

 if(!home || !away){
  alert("Chybí home/away v URL");
  return;
 }

 const snap=await getDocs(collection(db,"zapasy"));

 snap.forEach(d=>{
  const m=d.data();
  if(!m.stats)return;
  const s=calc(m.stats);
  updateElo(m.homeTeam,m.awayTeam,s.hg,s.ag);
 });

 ensure(home);ensure(away);

 homeTeam.innerHTML=`${home}<br>⭐ ${Math.round(ratings[home])}`;
 awayTeam.innerHTML=`${away}<br>⭐ ${Math.round(ratings[away])}`;

 currentOdds=odds(home,away);

 for(let i=1;i<=5;i++){
  document.getElementById("ko"+i).innerText=currentOdds[i];
  document.getElementById("po"+i).innerText=currentOdds[i];
 }

 await loadCredits();
 await loadSaved();
 await checkResult(); // 🔥 důležité
}

load();

function mapResult(r){
 if(r.hg>r.ag) return "HOME";
 if(r.hg<r.ag) return "AWAY";
 return "DRAW";
}

function isWin(tip,type){
 if(type==="HOME") return tip==="1"||tip==="2";
 if(type==="DRAW") return tip==="3";
 if(type==="AWAY") return tip==="4"||tip==="5";
 return false;
}

async function checkResult(){

 const zapasy=await getDocs(collection(db,"zapasy"));

 let match=null;

 zapasy.forEach(d=>{
  const m=d.data();
  if(m.homeTeam===home && m.awayTeam===away){
   match=m;
  }
 });

 if(!match || !match.stats) return;

 const res=calc(match.stats);
 const type=mapResult(res);

 const ref=doc(db,"tipy",home+"_"+away);
 const snap=await getDoc(ref);

 if(!snap.exists()) return;

 const d=snap.data();

 if(d.done) return;

 // 🔥 KUBELE
 if(d.kTip && isWin(d.kTip,type)){
  const r=doc(db,"hraci","KTip");
  const s=await getDoc(r);
  await updateDoc(r,{
   kredit:s.data().kredit + d.kWin
  });
 }

 // 🔥 PICI
 if(d.pTip && isWin(d.pTip,type)){
  const r=doc(db,"hraci","PTip");
  const s=await getDoc(r);
  await updateDoc(r,{
   kredit:s.data().kredit + d.pWin
  });
 }

 // označit jako hotovo
 await updateDoc(ref,{done:true});

 await loadCredits();
}

document.querySelectorAll("#kOddsRow .odds").forEach(el=>{
 el.onclick=()=>{
  document.querySelectorAll("#kOddsRow .odds").forEach(o=>o.classList.remove("active"));
  el.classList.add("active");
  kTip=el.dataset.tip;
  calcWin("K");
 }
});

document.querySelectorAll("#pOddsRow .odds").forEach(el=>{
 el.onclick=()=>{
  document.querySelectorAll("#pOddsRow .odds").forEach(o=>o.classList.remove("active"));
  el.classList.add("active");
  pTip=el.dataset.tip;
  calcWin("P");
 }
});

kBet.oninput=()=>calcWin("K");
pBet.oninput=()=>calcWin("P");

function calcWin(player){
 const tip=player==="K"?kTip:pTip;
 const bet=Number(player==="K"?kBet.value:pBet.value);
 const o=Number(currentOdds[tip]||0);

 if(player==="K"){
  kFinalOdds.innerText=o||0;
  kWin.innerText=bet&&o?Math.round(bet*o)+" Kč":"0 Kč";
 }else{
  pFinalOdds.innerText=o||0;
  pWin.innerText=bet&&o?Math.round(bet*o)+" Kč":"0 Kč";
 }
}

window.placeBet=async function(player){

 const tip=player==="K"?kTip:pTip;
 const bet=Number(player==="K"?kBet.value:pBet.value);

 if(!tip||!bet)return alert("Vyplň vše");

 const o=Number(currentOdds[tip]);
 const win=Math.round(bet*o);

 const ref=doc(db,"tipy",home+"_"+away);

 let data={};

 if(player==="K"){
  data.kTip=tip; data.kBet=bet; data.kOdds=o; data.kWin=win;
  const r=doc(db,"hraci","KTip");const s=await getDoc(r);
  await updateDoc(r,{kredit:s.data().kredit-bet});
 }

 if(player==="P"){
  data.pTip=tip; data.pBet=bet; data.pOdds=o; data.pWin=win;
  const r=doc(db,"hraci","PTip");const s=await getDoc(r);
  await updateDoc(r,{kredit:s.data().kredit-bet});
 }

 await setDoc(ref,data,{merge:true});
 alert("Uloženo");
 await loadSaved();
 await loadCredits();
}

async function loadSaved(){
 const snap=await getDoc(doc(db,"tipy",home+"_"+away));
 if(!snap.exists())return;
 const d=snap.data();

 if(d.kTip){
  kTip=d.kTip;
  kBet.value=d.kBet;
  kFinalOdds.innerText=d.kOdds;
  kWin.innerText=d.kWin+" Kč";
 }

 if(d.pTip){
  pTip=d.pTip;
  pBet.value=d.pBet;
  pFinalOdds.innerText=d.pOdds;
  pWin.innerText=d.pWin+" Kč";
 }
}

async function loadCredits(){
 const k=await getDoc(doc(db,"hraci","KTip"));
 const p=await getDoc(doc(db,"hraci","PTip"));
 creditBox.innerText=`Kubele: ${k.data().kredit} Kč | Pici: ${p.data().kredit} Kč`;
}

</script>
