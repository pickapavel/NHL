<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Statistiky zápasu</title>

<style>
body{font-family:Arial;background:#f2f2f2;margin:0;}
.wrapper{max-width:1200px;margin:auto;padding:20px;background:white;}
.controls{display:flex;gap:10px;flex-wrap:wrap;}
.controls>*{flex:1;min-width:150px;padding:10px;}

table{
 width:100%;
 border-collapse:collapse;
 margin-top:20px;
}

th,td{
 border:1px solid #ccc;
 padding:8px;
 text-align:center;
}

th{
 background:black;
 color:yellow;
}
</style>
</head>

<body>

<div class="wrapper">

<h1>Statistiky zápasu</h1>

<div class="controls">
<input type="file" id="fileInput">

<select id="competition"></select>
<select id="season"></select>
<select id="stage"></select>

<select id="homeTeam"></select>
<select id="awayTeam"></select>

<button onclick="saveMatch()">Uložit zápas</button>
</div>

<h2>Odehrané zápasy</h2>

<table>
<thead>
<tr>
<th>Domácí</th>
<th>Hosté</th>
<th>Skóre</th>
</tr>
</thead>
<tbody id="matchesTable"></tbody>
</table>

</div>

<script type="module">

import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient(
  "https://qaocbodrflsaerxntfui.supabase.co",
  "sb_publishable_eIeO9MihyuQDuNHy60Ubrw_8ZuSKPFU"
)

let loadedLines=[]

// ===== TXT =====
fileInput.onchange = e=>{
 const reader=new FileReader()
 reader.onload=ev=>{
  loadedLines = ev.target.result.split(/\r?\n/)
 }
 reader.readAsText(e.target.files[0])
}

// ===== LOAD =====
async function load(){

 const { data: teams } = await supabase.from("teams").select("*")
 const { data: comps } = await supabase.from("competitions").select("*")
 const { data: seasons } = await supabase.from("seasons").select("*")
 const { data: stages } = await supabase.from("stages").select("*")

 competition.innerHTML="<option>Vyber soutěž</option>"
 season.innerHTML="<option>Vyber sezónu</option>"
 stage.innerHTML="<option>Fáze</option>"
 homeTeam.innerHTML="<option>Domácí tým</option>"
 awayTeam.innerHTML="<option>Hostující tým</option>"

 comps?.forEach(c=>{
  competition.innerHTML+=`<option value="${c.id}">${c.name}</option>`
 })

 seasons?.forEach(s=>{
  season.innerHTML+=`<option value="${s.id}">${s.name}</option>`
 })

 stages?.forEach(s=>{
  stage.innerHTML+=`<option value="${s.id}">${s.name}</option>`
 })

 teams?.forEach(t=>{
  homeTeam.innerHTML+=`<option value="${t.id}">${t.name}</option>`
  awayTeam.innerHTML+=`<option value="${t.id}">${t.name}</option>`
 })

 loadMatches()
}

window.onload = load

// ===== SAVE =====
window.saveMatch = async function(){

 const hg = Number(loadedLines[16]) + Number(loadedLines[17]) + Number(loadedLines[18])
 const ag = Number(loadedLines[6]) + Number(loadedLines[7]) + Number(loadedLines[8])

 const { error } = await supabase.from("matches").insert([{
  competition_id: competition.value,
  season_id: season.value,
  stage_id: stage.value,
  home_team: homeTeam.value,
  away_team: awayTeam.value,
  home_score: hg,
  away_score: ag,
  played: true,
  round: 1,
  stats: JSON.stringify(loadedLines)
 }])

 if(error){
  console.log("INSERT ERROR:", error)
  alert("Chyba ❌")
 }else{
  alert("Uloženo 👍")
  loadMatches()
 }
}

// ===== LOAD MATCHES =====
async function loadMatches(){

 const { data, error } = await supabase
  .from("matches")
  .select("*")
  .order("id", { ascending:false })

 console.log("MATCHES:", data, error)

 matchesTable.innerHTML=""

 if(!data) return

 data.forEach(m=>{
  matchesTable.innerHTML += `
  <tr>
    <td>${m.home_team}</td>
    <td>${m.away_team}</td>
    <td>${m.home_score ?? "-"} : ${m.away_score ?? "-"}</td>
  </tr>
  `
 })

}

</script>

</body>
</html>
