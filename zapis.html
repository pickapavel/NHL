<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Statistiky zápasu</title>

<style>
body{font-family:Arial;background:#f2f2f2;margin:0;}
.wrapper{max-width:1200px;margin:auto;padding:20px;background:white;}
.controls{display:flex;gap:10px;flex-wrap:wrap;}
.controls>*{flex:1;min-width:150px;padding:10px;}
</style>
</head>

<body>

<div class="wrapper">

<h1>Statistiky zápasu</h1>

<div class="controls">
<input type="file" id="fileInput">

<select id="competition"></select>
<select id="season"></select>
<select id="homeTeam"></select>
<select id="awayTeam"></select>

<button onclick="saveMatch()">Uložit zápas</button>
</div>

</div>

<script type="module">

import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient(
  "https://qacobodrfsaerxntfui.supabase.co",
  "TVŮJ_PUBLISHABLE_KEY"
)

let loadedLines=[]

// ===== TXT =====
fileInput.onchange = e=>{
 const reader=new FileReader()
 reader.onload=ev=>{
  loadedLines = ev.target.result.split(/\r?\n/)
 }
 reader.readAsText(e.target.files[0])
}

// ===== LOAD =====
async function load(){

  console.log("LOAD START")

 const res1 = await supabase.from("teams").select("*")
 console.log("TEAMS RAW:", res1)

 const res2 = await supabase.from("competitions").select("*")
 console.log("COMP RAW:", res2)

 const res3 = await supabase.from("seasons").select("*")
 console.log("SEASONS RAW:", res3)

 console.log("LOADING DATA...")

 // TEAMS
 const { data: teams, error: tErr } = await supabase.from("teams").select("*")
 console.log("TEAMS:", teams, tErr)

 // COMPETITIONS
 const { data: comps, error: cErr } = await supabase.from("competitions").select("*")
 console.log("COMP:", comps, cErr)

 // SEASONS
 const { data: seasons, error: sErr } = await supabase.from("seasons").select("*")
 console.log("SEASONS:", seasons, sErr)

 // ===== NAPLNĚNÍ SELECTŮ =====

 const compSel = document.getElementById("competition")
 const seasonSel = document.getElementById("season")
 const homeSel = document.getElementById("homeTeam")
 const awaySel = document.getElementById("awayTeam")

 compSel.innerHTML = "<option>Vyber soutěž</option>"
 seasonSel.innerHTML = "<option>Vyber sezónu</option>"
 homeSel.innerHTML = "<option>Domácí tým</option>"
 awaySel.innerHTML = "<option>Hostující tým</option>"

 // competitions
 if(comps){
  comps.forEach(c=>{
   compSel.innerHTML += `<option value="${c.id}">${c.name}</option>`
  })
 }

 // seasons
 if(seasons){
  seasons.forEach(s=>{
   seasonSel.innerHTML += `<option value="${s.id}">${s.name}</option>`
  })
 }

 // teams
 if(teams){
  teams.forEach(t=>{
   homeSel.innerHTML += `<option value="${t.id}">${t.name}</option>`
   awaySel.innerHTML += `<option value="${t.id}">${t.name}</option>`
  })
 }

}

window.addEventListener("load", load)

// ===== SAVE =====
window.saveMatch = async function(){

 if(!loadedLines.length){
  alert("Nahraj TXT")
  return
 }

 const hg = Number(loadedLines[16]) + Number(loadedLines[17]) + Number(loadedLines[18])
 const ag = Number(loadedLines[6]) + Number(loadedLines[7]) + Number(loadedLines[8])

 const res = await supabase.from("matches").insert([{
  competition_id: competition.value,
  season_id: season.value,
  home_team: homeTeam.value,
  away_team: awayTeam.value,
  home_score: hg,
  away_score: ag,
  played: true,
  stats: loadedLines
 }])

 console.log("INSERT:", res)

 alert("Uloženo 👍")
}

</script>

</body>
</html>
