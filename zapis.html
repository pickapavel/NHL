<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Zápisy zápasů</title>

<style>
body{font-family:Arial;background:#f2f2f2;margin:0;}
.wrapper{max-width:1400px;margin:auto;padding:20px;background:white;}

table{
 width:100%;
 border-collapse:collapse;
 margin-top:20px;
}

th,td{
 border:1px solid #ccc;
 padding:8px;
 text-align:center;
}

td:nth-child(5),
td:nth-child(6){
 text-align:left;
}

th{
 background:black;
 color:yellow;
}

button{
 padding:6px 10px;
 margin:2px;
 cursor:pointer;
}
</style>
</head>

<body>

<div class="wrapper">

<h1>Zápisy zápasů</h1>

<table>
<thead>
<tr>
<th>Kolo</th>
<th>Soutěž</th>
<th>Sezóna</th>
<th>Fáze</th>
<th>Domácí</th>
<th>Hosté</th>
<th>Skóre</th>
<th>Soubor</th>
<th>Akce</th>
</tr>
</thead>
<tbody id="matchesTable"></tbody>
</table>

</div>

<script type="module">

import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient(
  "https://qaocbodrflsaerxntfui.supabase.co",
  "sb_publishable_eIeO9MihyuQDuNHy60Ubrw_8ZuSKPFU"
)

let teamsMap = {}
let compsMap = {}
let seasonsMap = {}
let stagesMap = {}
let filesMap = {}

// ===== LOAD =====
async function load(){

 const { data: teams } = await supabase.from("teams").select("*")
 const { data: comps } = await supabase.from("competitions").select("*")
 const { data: seasons } = await supabase.from("seasons").select("*")
 const { data: stages } = await supabase.from("stages").select("*")
 const { data: matches } = await supabase
  .from("matches")
  .select("*")
  .order("round", { ascending:true })

 teams.forEach(t=> teamsMap[t.id] = t.name)
 comps.forEach(c=> compsMap[c.id] = c.name)
 seasons.forEach(s=> seasonsMap[s.id] = s.name)
 stages.forEach(s=> stagesMap[s.id] = s.name)

 render(matches)
}

// ===== RENDER =====
function render(matches){

 const cont = document.getElementById("matchesTable")
 cont.innerHTML=""

 matches.forEach(m=>{

  cont.innerHTML += `
  <tr>
    <td>${m.round ?? "-"}</td>
    <td>${compsMap[m.competition_id] || "-"}</td>
    <td>${seasonsMap[m.season_id] || "-"}</td>
    <td>${stagesMap[m.stage_id] || "-"}</td>
    <td>${teamsMap[m.home_team]}</td>
    <td>${teamsMap[m.away_team]}</td>
    <td>${m.home_score ?? "-"} : ${m.away_score ?? "-"}</td>

    <td>
      <input type="file" onchange="handleFile(event,'${m.id}')">
    </td>

    <td>
      <button onclick="saveMatch('${m.id}')">Uložit</button>
      <button onclick="resetMatch('${m.id}')">Zrušit</button>
    </td>
  </tr>
  `
 })
}

// ===== FILE LOAD =====
window.handleFile = function(e, matchId){

 const reader = new FileReader()

 reader.onload = ev=>{
  filesMap[matchId] = ev.target.result.split(/\r?\n/)
 }

 reader.readAsText(e.target.files[0])
}

// ===== VÝPOČET SKÓRE =====
function calculateScore(lines){

 let ag =
  Number(lines[6]||0) +
  Number(lines[7]||0) +
  Number(lines[8]||0)

 let hg =
  Number(lines[16]||0) +
  Number(lines[17]||0) +
  Number(lines[18]||0)

 const otHome = lines[9]   // řádek 10
 const otAway = lines[19]  // řádek 20
 const shootout = lines[20]

 // 🟡 PRODLOUŽENÍ
 if(otHome === "11") hg++
 if(otAway === "11") ag++

 // 🟡 NÁJEZDY
 if(shootout === "1") hg++
 if(shootout === "2") ag++

 return {hg, ag}
}

// ===== SAVE =====
window.saveMatch = async function(matchId){

 const lines = filesMap[matchId]

 if(!lines){
  alert("Nahraj soubor ❌")
  return
 }

 const score = calculateScore(lines)

 const { error } = await supabase
  .from("matches")
  .update({
   home_score: score.hg,
   away_score: score.ag,
   played: true,
   stats: JSON.stringify(lines)
  })
  .eq("id", matchId)

 if(error){
  console.error(error)
  alert("Chyba ❌")
 }else{
  alert("Uloženo 👍")
  load()
 }
}

// ===== RESET (ANULACE) =====
window.resetMatch = async function(matchId){

 if(!confirm("Opravdu zrušit zápas?")) return

 const { error } = await supabase
  .from("matches")
  .update({
   home_score: null,
   away_score: null,
   played: false,
   stats: null
  })
  .eq("id", matchId)

 if(error){
  console.error(error)
  alert("Chyba ❌")
 }else{
  alert("Zápas zrušen 👍")
  load()
 }
}

load()

</script>

</body>
</html>
