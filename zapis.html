<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Statistiky zápasu</title>

<style>
body{font-family:Arial;background:#f2f2f2;margin:0;}
.wrapper{max-width:1400px;margin:auto;padding:20px;background:white;}
.controls{display:flex;gap:10px;flex-wrap:wrap;}
.controls>*{flex:1;min-width:150px;padding:10px;}

table{
 width:100%;
 border-collapse:collapse;
 margin-top:20px;
}

th,td{
 border:1px solid #ccc;
 padding:8px;
 text-align:center;
}

td:nth-child(5),
td:nth-child(6){
 text-align:left;
}

th{
 background:black;
 color:yellow;
}
</style>
</head>

<body>

<div class="wrapper">

<h1>Statistiky zápasu</h1>

<div class="controls">
<input type="file" id="fileInput">

<select id="competition"></select>
<select id="season"></select>
<select id="stage"></select>

<select id="homeTeam"></select>
<select id="awayTeam"></select>

<button onclick="saveMatch()">Uložit zápas</button>
</div>

<h2>Odehrané zápasy</h2>

<table>
<thead>
<tr>
<th>Kolo</th>
<th>Soutěž</th>
<th>Sezóna</th>
<th>Fáze</th>
<th>Domácí</th>
<th>Hosté</th>
<th>Skóre</th>
</tr>
</thead>
<tbody id="matchesTable"></tbody>
</table>

</div>

<script type="module">

import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient(
  "https://qaocbodrflsaerxntfui.supabase.co",
  "sb_publishable_eIeO9MihyuQDuNHy60Ubrw_8ZuSKPFU"
)

let loadedLines=[]

let teamsMap = {}
let compsMap = {}
let seasonsMap = {}
let stagesMap = {}

// ===== TXT =====
fileInput.onchange = e=>{
 const reader=new FileReader()
 reader.onload=ev=>{
  loadedLines = ev.target.result.split(/\r?\n/)
 }
 reader.readAsText(e.target.files[0])
}

// ===== LOAD =====
async function load(){

 const { data: teams } = await supabase.from("teams").select("*")
 const { data: comps } = await supabase.from("competitions").select("*")
 const { data: seasons } = await supabase.from("seasons").select("*")
 const { data: stages } = await supabase.from("stages").select("*")

 teams?.forEach(t=> teamsMap[t.id] = t.name)
 comps?.forEach(c=> compsMap[c.id] = c.name)
 seasons?.forEach(s=> seasonsMap[s.id] = s.name)
 stages?.forEach(s=> stagesMap[s.id] = s.name)

 competition.innerHTML="<option value=''>Vyber soutěž</option>"
 season.innerHTML="<option value=''>Vyber sezónu</option>"
 stage.innerHTML="<option value=''>Fáze</option>"
 homeTeam.innerHTML="<option value=''>Domácí tým</option>"
 awayTeam.innerHTML="<option value=''>Hostující tým</option>"

 comps?.forEach(c=>{
  competition.innerHTML+=`<option value="${c.id}">${c.name}</option>`
 })

 seasons?.forEach(s=>{
  season.innerHTML+=`<option value="${s.id}">${s.name}</option>`
 })

 stages?.forEach(s=>{
  stage.innerHTML+=`<option value="${s.id}">${s.name}</option>`
 })

 teams?.forEach(t=>{
  homeTeam.innerHTML+=`<option value="${t.id}">${t.name}</option>`
  awayTeam.innerHTML+=`<option value="${t.id}">${t.name}</option>`
 })

 loadMatches()
}

window.onload = load

// ===== SAVE (UPDATE místo INSERT) =====
window.saveMatch = async function(){

 if(!loadedLines.length){
  alert("Nahraj TXT soubor")
  return
 }

 const params = new URLSearchParams(window.location.search)
 const matchId = params.get("id")

 if(!matchId){
  alert("Chybí ID zápasu ❌")
  return
 }

 const hg =
  Number(loadedLines[16]||0) +
  Number(loadedLines[17]||0) +
  Number(loadedLines[18]||0)

 const ag =
  Number(loadedLines[6]||0) +
  Number(loadedLines[7]||0) +
  Number(loadedLines[8]||0)

 const { error } = await supabase
  .from("matches")
  .update({
   home_score: hg,
   away_score: ag,
   played: true,
   stats: JSON.stringify(loadedLines)
  })
  .eq("id", matchId)

 if(error){
  console.error(error)
  alert("Chyba ❌")
 }else{
  alert("Uloženo 👍")
  loadMatches()
 }
}

// ===== LOAD MATCHES =====
async function loadMatches(){

 const { data } = await supabase
  .from("matches")
  .select("*")
  .order("round", { ascending:true })

 matchesTable.innerHTML=""

 data?.forEach(m=>{

  const homeName = teamsMap[m.home_team] || m.home_team
  const awayName = teamsMap[m.away_team] || m.away_team

  const compName = compsMap[m.competition_id] || "-"
  const seasonName = seasonsMap[m.season_id] || "-"
  const stageName = stagesMap[m.stage_id] || "-"

  matchesTable.innerHTML += `
  <tr>
    <td>${m.round ?? "-"}</td>
    <td>${compName}</td>
    <td>${seasonName}</td>
    <td>${stageName}</td>
    <td>${homeName}</td>
    <td>${awayName}</td>
    <td>${m.home_score ?? "-"} : ${m.away_score ?? "-"}</td>
  </tr>
  `
 })

}

</script>

</body>
</html>
