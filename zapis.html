<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Zápis zápasu</title>

<style>
body{
 font-family:Arial;
 background:#f2f2f2;
 margin:0;
}
.wrapper{
 max-width:600px;
 margin:auto;
 background:white;
 padding:20px;
 margin-top:40px;
 border-radius:10px;
}
select, input, button{
 width:100%;
 padding:10px;
 margin-bottom:10px;
 font-size:16px;
}
button{
 background:#2f9ec9;
 color:white;
 border:none;
 cursor:pointer;
}
button:hover{
 background:#2789ad;
}
</style>
</head>

<body>

<div class="wrapper">

<h2>Zápis zápasu</h2>

<select id="competition"></select>
<select id="season"></select>
<select id="stage"></select>

<select id="homeTeam"></select>
<select id="awayTeam"></select>

<input type="number" id="homeScore" placeholder="Góly domácí">
<input type="number" id="awayScore" placeholder="Góly hosté">

<button onclick="save()">Uložit</button>

</div>

<script type="module">

import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient(
  "https://qaocbodrfsaerxntfui.supabase.co",
  "sb_publishable_eIeO9MihyuQDuNHy60Ubrw_8ZuSKPFU"
)

// ===== LOAD =====
async function load(){

 competition.innerHTML = "<option>Soutěž</option>"
 season.innerHTML = "<option>Sezóna</option>"
 stage.innerHTML = "<option>Fáze</option>"
 homeTeam.innerHTML = "<option>Domácí</option>"
 awayTeam.innerHTML = "<option>Hosté</option>"

 // každá tabulka zvlášť (aby to nespadlo)
 try{
  const { data } = await supabase.from("competitions").select("*")
  data?.forEach(c=>{
   competition.innerHTML += `<option value="${c.id}">${c.name}</option>`
  })
 }catch{}

 try{
  const { data } = await supabase.from("seasons").select("*")
  data?.forEach(s=>{
   season.innerHTML += `<option value="${s.id}">${s.name}</option>`
  })
 }catch{}

 try{
  const { data } = await supabase.from("stages").select("*")
  data?.forEach(s=>{
   stage.innerHTML += `<option value="${s.id}">${s.name}</option>`
  })
 }catch{}

 try{
  const { data } = await supabase.from("teams").select("*")
  data?.forEach(t=>{
   homeTeam.innerHTML += `<option value="${t.id}">${t.name}</option>`
   awayTeam.innerHTML += `<option value="${t.id}">${t.name}</option>`
  })
 }catch{}

}

window.onload = load

// ===== SAVE =====
async function save(){

 const res = await supabase.from("matches").insert([{
  competition_id: competition.value,
  season_id: season.value,
  stage_id: stage.value,
  home_team: homeTeam.value,
  away_team: awayTeam.value,
  home_score: Number(homeScore.value),
  away_score: Number(awayScore.value),
  played: true,
  round: 1
 }])

 console.log(res)

 if(res.error){
  alert("Chyba ❌")
 }else{
  alert("Uloženo ✅")
 }

}

</script>

</body>
</html>
