<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Statistiky zápasu</title>

<style>
body{font-family:Arial;background:#f2f2f2;margin:0;}
.wrapper{max-width:1200px;margin:auto;padding:20px;background:white;}
.controls{display:flex;gap:10px;flex-wrap:wrap;}
.controls>*{flex:1;min-width:150px;padding:10px;}
</style>
</head>

<body>

<div class="wrapper">

<h1>Statistiky zápasu</h1>

<div class="controls">
<input type="file" id="fileInput">

<select id="competition"></select>
<select id="season"></select>
<select id="stage"></select>

<select id="homeTeam"></select>
<select id="awayTeam"></select>

<button onclick="saveMatch()">Uložit zápas</button>
</div>

</div>

<script type="module">

import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient(
  "https://qacobodrfsaerxntfui.supabase.co",
  "sb_publishable_eIeO9MihyuQDuNHy60Ubrw_8ZuSKPFU"
)

let loadedLines=[]

// ===== TXT =====
fileInput.onchange = e=>{
 const reader=new FileReader()
 reader.onload=ev=>{
  loadedLines = ev.target.result.split(/\r?\n/)
 }
 reader.readAsText(e.target.files[0])
}

// ===== LOAD =====
async function load(){

 const { data: teams } = await supabase.from("teams").select("*")
 const { data: comps } = await supabase.from("competitions").select("*")
 const { data: seasons } = await supabase.from("seasons").select("*")
 const { data: stages } = await supabase.from("stages").select("*")

 competition.innerHTML = "<option disabled selected>Vyber soutěž</option>"
 season.innerHTML = "<option disabled selected>Vyber sezónu</option>"
 stage.innerHTML = "<option disabled selected>Fáze</option>"
 homeTeam.innerHTML = "<option disabled selected>Domácí tým</option>"
 awayTeam.innerHTML = "<option disabled selected>Hostující tým</option>"

 comps?.forEach(c=>{
  competition.innerHTML += `<option value="${c.id}">${c.name}</option>`
 })

 seasons?.forEach(s=>{
  season.innerHTML += `<option value="${s.id}">${s.name}</option>`
 })

 stages?.forEach(s=>{
  stage.innerHTML += `<option value="${s.id}">${s.name}</option>`
 })

 teams?.forEach(t=>{
  homeTeam.innerHTML += `<option value="${t.id}">${t.name}</option>`
  awayTeam.innerHTML += `<option value="${t.id}">${t.name}</option>`
 })

}

window.addEventListener("load", load)

// ===== SAVE =====
window.saveMatch = async function(){

 if(!loadedLines.length){
  alert("Nahraj TXT")
  return
 }

 if(!competition.value || !season.value || !stage.value || !homeTeam.value || !awayTeam.value){
  alert("Vyplň všechno")
  return
 }

 const hg = Number(loadedLines[16]) + Number(loadedLines[17]) + Number(loadedLines[18])
 const ag = Number(loadedLines[6]) + Number(loadedLines[7]) + Number(loadedLines[8])

 console.log("DATA:", {
  competition: competition.value,
  season: season.value,
  stage: stage.value,
  home: homeTeam.value,
  away: awayTeam.value,
  hg, ag
 })

 const res = await supabase.from("matches").insert([{
  competition_id: competition.value,
  season_id: season.value,
  stage_id: stage.value,
  home_team: homeTeam.value,
  away_team: awayTeam.value,
  home_score: hg,
  away_score: ag,
  played: true,
  stats: loadedLines
 }])

 console.log("INSERT RESULT:", res)

 if(res.error){
  alert("Chyba při ukládání ❌")
 }else{
  alert("Uloženo 👍")
 }

}

</script>

</body>
</html>
