<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Zápisy zápasů</title>

<style>
body{font-family:Arial;background:#f2f2f2;margin:0;}
.wrapper{max-width:1400px;margin:auto;padding:20px;background:white;}

table{
 width:100%;
 border-collapse:collapse;
 margin-top:20px;
}

th,td{
 border:1px solid #ccc;
 padding:8px;
 text-align:center;
}

td:nth-child(2),
td:nth-child(3){
 text-align:left;
}

th{
 background:black;
 color:yellow;
}
</style>
</head>

<body>

<div class="wrapper">

<h1>Zápisy zápasů</h1>

<table>
<thead>
<tr>
<th>Kolo</th>
<th>Domácí</th>
<th>Hosté</th>
<th>Skóre</th>
<th>Soubor</th>
<th>Akce</th>
</tr>
</thead>
<tbody id="matchesTable"></tbody>
</table>

</div>

<script type="module">

import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient(
  "https://qaocbodrflsaerxntfui.supabase.co",
  "sb_publishable_eIeO9MihyuQDuNHy60Ubrw_8ZuSKPFU"
)

let teamsMap = {}
let filesMap = {}

async function load(){

 const { data: teams } = await supabase.from("teams").select("*")
 const { data: matches } = await supabase
  .from("matches")
  .select("*")
  .order("round", { ascending:true })

 teams.forEach(t=> teamsMap[t.id] = t.name)

 render(matches)
}

function render(matches){

 const cont = document.getElementById("matchesTable")
 cont.innerHTML=""

 matches.forEach(m=>{

  let suffix = ""

  if(m.stats){
   const lines = JSON.parse(m.stats)

   if(lines[20] === "1" || lines[20] === "2") suffix = " SN"
   else if(lines[9] === "11" || lines[19] === "11") suffix = " OT"
  }

  cont.innerHTML += `
  <tr>
    <td>${m.round}</td>
    <td>${teamsMap[m.home_team]}</td>
    <td>${teamsMap[m.away_team]}</td>
    <td>${m.home_score ?? "-"} : ${m.away_score ?? "-"}${suffix}</td>

    <td>
      <input type="file" onchange="handleFile(event,'${m.id}')">
    </td>

    <td>
      <button onclick="saveMatch('${m.id}')">Uložit</button>
      <button onclick="resetMatch('${m.id}')">Zrušit</button>
    </td>
  </tr>
  `
 })
}

window.handleFile = function(e, matchId){

 const reader = new FileReader()

 reader.onload = ev=>{
  filesMap[matchId] = ev.target.result.split(/\r?\n/)
 }

 reader.readAsText(e.target.files[0])
}

function calculateScore(lines){

 let ag =
  Number(lines[6]||0) +
  Number(lines[7]||0) +
  Number(lines[8]||0)

 let hg =
  Number(lines[16]||0) +
  Number(lines[17]||0) +
  Number(lines[18]||0)

 const otHome = lines[9]
 const otAway = lines[19]
 const shootout = lines[20]

 let type = "R"

 if(otHome === "11"){ hg++; type="OT" }
 if(otAway === "11"){ ag++; type="OT" }

 if(shootout === "1"){ hg++; type="SN" }
 if(shootout === "2"){ ag++; type="SN" }

 return {hg, ag, type}
}

window.saveMatch = async function(matchId){

 const lines = filesMap[matchId]

 if(!lines){
  alert("Nahraj soubor")
  return
 }

 const res = calculateScore(lines)

 let home_points = 0
 let away_points = 0

 if(res.type === "R"){
  if(res.hg > res.ag){ home_points = 3 }
  else{ away_points = 3 }
 } else {
  if(res.hg > res.ag){
   home_points = 2
   away_points = 1
  } else {
   away_points = 2
   home_points = 1
  }
 }

 const { error } = await supabase
  .from("matches")
  .update({
   home_score: res.hg,
   away_score: res.ag,
   home_points,
   away_points,
   played: true,
   stats: JSON.stringify(lines)
  })
  .eq("id", matchId)

 if(error){
  console.error(error)
  alert("Chyba ❌")
 }else{
  alert("Uloženo 👍")
  load()
 }
}

// 🔥 OPRAVENÝ RESET
window.resetMatch = async function(matchId){

 if(!confirm("Opravdu zrušit zápas?")) return

 const { error } = await supabase
  .from("matches")
  .update({
   home_score: null,
   away_score: null,
   home_points: null,
   away_points: null,
   played: false,
   stats: null
  })
  .eq("id", matchId)

 if(error){
  console.error(error)
  alert("Chyba při mazání ❌")
 } else {
  alert("Zápas zrušen 👍")
  load()
 }
}

load()

</script>

</body>
</html>
