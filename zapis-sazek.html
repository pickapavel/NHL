<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin – Vyhodnocení sázek</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}
body{font-family:'Inter',sans-serif;margin:0;background:#f2f2f2;}
.wrapper{max-width:960px;margin:auto;padding:20px;}
h1{margin-bottom:5px;}
.subtitle{color:#666;margin-bottom:25px;font-size:14px;}
.card{background:white;border-radius:12px;padding:16px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,0.1);}
.cardHeader{font-weight:700;font-size:16px;margin-bottom:12px;color:#0b2a3c;border-bottom:2px solid #e0e0e0;padding-bottom:8px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;}
.betRow{display:grid;grid-template-columns:1.5fr 1fr 1fr 1fr 1fr 1fr;gap:10px;align-items:center;padding:8px 0;border-bottom:1px solid #eee;font-size:14px;}
.betRow:last-child{border-bottom:none;}
.betHeader{font-weight:600;color:#555;font-size:12px;border-bottom:2px solid #ccc;padding-bottom:6px;margin-bottom:4px;}
.badge{display:inline-block;padding:3px 8px;border-radius:20px;font-size:12px;font-weight:600;}
.badge-pending{background:#fff3cd;color:#856404;}
.badge-won{background:#d1e7dd;color:#155724;}
.badge-lost{background:#f8d7da;color:#721c24;}
.btnWon{background:#27ae60;color:white;border:none;border-radius:6px;padding:5px 10px;cursor:pointer;font-weight:600;font-size:13px;}
.btnLost{background:#e74c3c;color:white;border:none;border-radius:6px;padding:5px 10px;cursor:pointer;font-weight:600;font-size:13px;}
.btnWon:hover{background:#219a52;}
.btnLost:hover{background:#c0392b;}
.btnWon:disabled,.btnLost:disabled{opacity:.5;cursor:not-allowed;}
.resolved{color:#999;font-size:13px;font-style:italic;}
.section{margin-bottom:30px;}
.sectionHeader{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:10px;}
.sectionTitle{font-size:20px;font-weight:700;color:#0b2a3c;}
.lockBtn{display:inline-flex;align-items:center;gap:6px;border:none;border-radius:8px;padding:7px 14px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s;}
.lockBtn.open{background:#fff3cd;color:#856404;border:1.5px solid #f0c040;}
.lockBtn.open:hover{background:#ffe69c;}
.lockBtn.locked{background:#f8d7da;color:#721c24;border:1.5px solid #e74c3c;}
.lockBtn.locked:hover{background:#f5c2c7;}
.teamLockBtn{display:inline-flex;align-items:center;gap:5px;border:none;border-radius:6px;padding:4px 10px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s;}
.teamLockBtn.open{background:#eafaf1;color:#1e8449;border:1px solid #27ae60;}
.teamLockBtn.open:hover{background:#d5f5e3;}
.teamLockBtn.locked{background:#fdf2f8;color:#884ea0;border:1px solid #a569bd;}
.teamLockBtn.locked:hover{background:#f5eef8;}
.empty{color:#999;font-style:italic;font-size:14px;padding:10px 0;}
.toast{position:fixed;bottom:20px;right:20px;background:#333;color:white;padding:12px 20px;border-radius:8px;font-size:14px;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:999;}
.toast.show{opacity:1;}
.lock-info{font-size:12px;color:#888;margin-bottom:16px;padding:8px 12px;background:#f8f9fa;border-radius:8px;border-left:3px solid #dee2e6;}
.nav-tabs{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap;}
.nav-tab{padding:8px 18px;border-radius:20px;border:2px solid #c8d8e8;background:white;font-family:'Inter',sans-serif;font-size:13px;font-weight:700;cursor:pointer;color:#1a3a5c;transition:all .15s;}
.nav-tab:hover{background:#dce8f5;}
.nav-tab.active{background:#0b2a3c;color:white;border-color:#0b2a3c;}
.tab-content{display:none;}
.tab-content.active{display:block;}
.subsection-title{font-size:16px;font-weight:700;color:#1a5276;margin:20px 0 10px;padding:8px 12px;background:#e8f4fd;border-radius:8px;border-left:3px solid #2f9ec9;}
@media(max-width:600px){
 .betRow{display:flex;flex-direction:column;align-items:flex-start;gap:4px;padding:10px 0;}
 .betHeader{display:none;}
 .btnWon,.btnLost{width:100%;}
 .sectionHeader{flex-direction:column;align-items:flex-start;}
}
</style>
</head>
<body>
<script src="./ticker.js"></script>
<script src="./menu.js"></script>
<div class="wrapper">
 <h1>Admin – Vyhodnocení sázek</h1>
 <p class="subtitle">Vyhodnocuj pending sázky a uzavírej kategorie či jednotlivé týmy pro další tipování.</p>
 <div class="lock-info">🔒 Uzavřená kategorie nebo tým = hráči na ni nemohou vsadit. Stav se sdílí v reálném čase se stránkou sázek.</div>

 <div class="nav-tabs">
  <div class="nav-tab active" onclick="switchTab('zakladni',this)">📋 Základní část</div>
  <div class="nav-tab" onclick="switchTab('playoff',this)">🏆 Playoff</div>
 </div>

 <div class="tab-content active" id="tab-zakladni">
  <div id="app-zakladni">Načítám...</div>
 </div>
 <div class="tab-content" id="tab-playoff">
  <div id="app-playoff">Načítám...</div>
 </div>
</div>
<div class="toast" id="toast"></div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient(
 "https://qaocbodrflsaerxntfui.supabase.co",
 "sb_publishable_eIeO9MihyuQDuNHy60Ubrw_8ZuSKPFU"
)

let bets=[], players={}, teams={}, stages={}, locks={}

window.switchTab = function(tab, el){
 document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'))
 document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'))
 el.classList.add('active')
 document.getElementById('tab-'+tab).classList.add('active')
}

function catKey(type){ return `cat:${type}` }
function teamKey(type, teamId){ return `team:${type}:${teamId}` }
function isCatLocked(type){ return !!locks[catKey(type)] }
function isTeamLocked(type, teamId){ return !!locks[teamKey(type, teamId)] }
function isLocked(type, teamId){ return isCatLocked(type) || isTeamLocked(type, teamId) }

async function loadLocks(){
 const { data } = await supabase.from("bet_locks").select("*")
 locks = {}
 ;(data||[]).forEach(row => { if(row.locked) locks[row.id] = true })
}

async function setLock(key, value){
 await supabase.from("bet_locks").upsert({ id: key, locked: value, updated_at: new Date().toISOString() })
 locks[key] = value
}

window.toggleCategoryLock = async function(type){
 const key = catKey(type)
 const next = !isCatLocked(type)
 await setLock(key, next)
 render()
 showToast(next ? "🔒 Kategorie uzavřena pro tipování" : "🔓 Kategorie otevřena pro tipování")
}

window.toggleTeamLock = async function(type, teamId){
 const key = teamKey(type, teamId)
 const next = !isTeamLocked(type, teamId)
 await setLock(key, next)
 render()
 showToast(next ? "🔒 Tým uzavřen pro tipování" : "🔓 Tým otevřen pro tipování")
}

async function load(){
 document.getElementById("app-zakladni").innerHTML = "Načítám..."
 document.getElementById("app-playoff").innerHTML = "Načítám..."
 await loadLocks()

 const { data: p } = await supabase.from("players").select("*")
 ;(p||[]).forEach(pl => players[pl.id] = pl)

 const { data: t } = await supabase.from("teams").select("*")
 ;(t||[]).forEach(tm => teams[tm.id] = tm)

 const { data: st } = await supabase.from("stages").select("id,name,season_id")
 ;(st||[]).forEach(s => stages[s.id] = s)

 const { data: b } = await supabase.from("bets_special").select("*").order("created_at",{ascending:false})
 bets = b || []

 render()
}

function getPlayerName(id){ return players[id]?.name||id }
function getTeamName(id){ return teams[id]?.name||id }
function getStageName(stageId){ return stages[stageId]?.name||stageId }

function getTypLabel(type){
 if(type==="winner_regular_season")    return "Vítěz základní části"
 if(type==="nonwinner_regular_season") return "Nevítěz základní části"
 if(type==="last_regular_season")      return "Poslední celek"
 if(type==="winner_playoff_overall")   return "Vítěz playoff"
 if(type==="second_playoff_overall")   return "Finalista (2. místo)"
 if(type==="third_playoff_overall")    return "3. místo playoff"
 if(type?.startsWith("serie_winner_")){
  const stageId = type.replace("serie_winner_","")
  return `Vítěz série — ${getStageName(stageId)}`
 }
 if(type?.startsWith("serie_games_")){
  const stageId = type.replace("serie_games_","")
  return `Počet zápasů — ${getStageName(stageId)}`
 }
 if(type?.startsWith("goals_")){ return `${type.split("_")[1]}+ gólů` }
 return type
}

window.resolve = async function(betId, result){
 document.querySelectorAll(`[data-bet-id="${betId}"]`).forEach(btn => btn.disabled = true)

 const bet = bets.find(b => b.id === betId)
 if(!bet) return

 const { error: betError } = await supabase
  .from("bets_special")
  .update({ status: result === "won" ? "won" : "lost" })
  .eq("id", betId)

 if(betError){ showToast("❌ Chyba při ukládání statusu!"); load(); return }

 const { data: freshPlayer, error: playerError } = await supabase
  .from("players").select("credit").eq("id", bet.player_id).single()

 if(playerError || !freshPlayer){ showToast("❌ Chyba při načítání hráče!"); load(); return }

 if(result === "won"){
  const newCredit = freshPlayer.credit + bet.potential_win
  const { error: creditError } = await supabase
   .from("players").update({ credit: newCredit }).eq("id", bet.player_id)
  if(creditError){ showToast("❌ Chyba při připsání kreditu!"); load(); return }
  await supabase.from("credit_history").insert({
   player_id: bet.player_id,
   type: "won",
   description: `Výhra sázky: ${getTypLabel(bet.type)} — ${getTeamName(bet.target_id)}`,
   amount: bet.potential_win,
   credit_before: freshPlayer.credit,
   credit_after: newCredit,
   bet_id: bet.id,
   source: "bets_special"
  })
 } else {
  await supabase.from("credit_history").insert({
   player_id: bet.player_id,
   type: "lost",
   description: `Prohra sázky: ${getTypLabel(bet.type)} — ${getTeamName(bet.target_id)}`,
   amount: 0,
   credit_before: freshPlayer.credit,
   credit_after: freshPlayer.credit,
   bet_id: bet.id,
   source: "bets_special"
  })
 }

 showToast(result === "won" ? "✅ Výhra připsána!" : "❌ Sázka označena jako prohra.")
 load()
}

function showToast(msg){
 const t=document.getElementById("toast")
 t.innerText=msg; t.classList.add("show")
 setTimeout(()=>t.classList.remove("show"),2500)
}

function renderBetRows(betList){
 if(!betList.length) return `<div class="empty">Žádné sázky.</div>`
 let html = `<div class="betRow betHeader">
  <div>Hráč</div><div>Tip</div><div>Vsazeno</div><div>Možná výhra</div><div>Status</div><div>Akce</div>
 </div>`
 betList.forEach(b=>{
  const statusBadge=`<span class="badge badge-${b.status}">${b.status==="pending"?"Čeká":b.status==="won"?"Výhra":"Prohra"}</span>`
  const tipLabel = b.target_id ? getTeamName(b.target_id) : (b.tip_key||'—')
  const akce=b.status==="pending"
   ?`<button class="btnWon" data-bet-id="${b.id}" onclick="resolve('${b.id}','won')">Výhra</button>
     <button class="btnLost" data-bet-id="${b.id}" onclick="resolve('${b.id}','lost')">Prohra</button>`
   :`<span class="resolved">Vyhodnoceno</span>`
  html+=`<div class="betRow">
   <div>${getPlayerName(b.player_id)}</div>
   <div>${tipLabel}</div>
   <div>${b.amount} Kč</div>
   <div>${Math.round(b.potential_win)} Kč</div>
   <div>${statusBadge}</div>
   <div style="display:flex;gap:6px;flex-wrap:wrap;">${akce}</div>
  </div>`
 })
 return html
}

function renderSection(title, type, filteredBets){
 const catLocked = isCatLocked(type)
 let html = `<div class="section">
  <div class="sectionHeader">
   <div class="sectionTitle">${title}</div>
   <button class="lockBtn ${catLocked?"locked":"open"}" onclick="toggleCategoryLock('${type}')">
    ${catLocked?"🔒 Uzavřeno — klikni pro otevření":"🔓 Otevřeno — klikni pro uzavření"}
   </button>
  </div>`

 if(filteredBets.length===0){
  html+=`<div class="card"><div class="empty">Žádné sázky.</div></div></div>`
  return html
 }

 const byTeam={}
 filteredBets.forEach(b=>{
  const key=b.target_id||"unknown"
  if(!byTeam[key]) byTeam[key]=[]
  byTeam[key].push(b)
 })

 Object.entries(byTeam).forEach(([teamId,teamBets])=>{
  const teamLocked=isLocked(type,teamId)
  const teamOnlyLocked=isTeamLocked(type,teamId)
  const teamLockLabel=catLocked
   ?"🔒 Uzavřeno (celá kategorie)"
   :teamOnlyLocked?"🔒 Uzavřeno — klikni pro otevření":"🔓 Otevřeno — klikni pro uzavření"

  html+=`<div class="card">
   <div class="cardHeader">
    <span>🏒 ${getTeamName(teamId)}</span>
    <button class="teamLockBtn ${teamLocked?"locked":"open"}"
     onclick="toggleTeamLock('${type}','${teamId}')"
     ${catLocked?"disabled":""}>
     ${teamLockLabel}
    </button>
   </div>
   <div class="betRow betHeader">
    <div>Hráč</div><div>Typ</div><div>Vsazeno</div><div>Možná výhra</div><div>Status</div><div>Akce</div>
   </div>`

  teamBets.forEach(b=>{
   const statusBadge=`<span class="badge badge-${b.status}">${b.status==="pending"?"Čeká":b.status==="won"?"Výhra":"Prohra"}</span>`
   const akce=b.status==="pending"
    ?`<button class="btnWon" data-bet-id="${b.id}" onclick="resolve('${b.id}','won')">Výhra</button>
      <button class="btnLost" data-bet-id="${b.id}" onclick="resolve('${b.id}','lost')">Prohra</button>`
    :`<span class="resolved">Vyhodnoceno</span>`
   html+=`<div class="betRow">
    <div>${getPlayerName(b.player_id)}</div>
    <div>${getTypLabel(b.type)}</div>
    <div>${b.amount} Kč</div>
    <div>${Math.round(b.potential_win)} Kč</div>
    <div>${statusBadge}</div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;">${akce}</div>
   </div>`
  })
  html+=`</div>`
 })

 html+=`</div>`
 return html
}

function renderSerieSection(title, type, filteredBets){
 if(!filteredBets.length) return ''
 const catLocked = isCatLocked(type)
 return `<div class="section">
  <div class="sectionHeader">
   <div class="sectionTitle" style="font-size:16px;">${title}</div>
   <button class="lockBtn ${catLocked?"locked":"open"}" onclick="toggleCategoryLock('${type}')">
    ${catLocked?"🔒 Uzavřeno — klikni pro otevření":"🔓 Otevřeno — klikni pro uzavření"}
   </button>
  </div>
  <div class="card">${renderBetRows(filteredBets)}</div>
 </div>`
}

function render(){
 // TAB 1 — Základní část
 const winner    = bets.filter(b=>b.type==="winner_regular_season")
 const nonwinner = bets.filter(b=>b.type==="nonwinner_regular_season")
 const last      = bets.filter(b=>b.type==="last_regular_season")
 const goals     = bets.filter(b=>b.type?.startsWith("goals_"))
 document.getElementById("app-zakladni").innerHTML =
  renderSection("Vítěz základní části","winner_regular_season",winner)+
  renderSection("Nevítěz základní části","nonwinner_regular_season",nonwinner)+
  renderSection("Poslední celek základní části","last_regular_season",last)+
  renderSection("Počet vstřelených gólů","goals_regular_season",goals)

 // TAB 2 — Playoff
 const winnerOverall = bets.filter(b=>b.type==="winner_playoff_overall")
 const secondOverall = bets.filter(b=>b.type==="second_playoff_overall")
 const thirdOverall  = bets.filter(b=>b.type==="third_playoff_overall")
 const serieWinnerTypes = [...new Set(bets.filter(b=>b.type?.startsWith("serie_winner_")).map(b=>b.type))]
 const serieGamesTypes  = [...new Set(bets.filter(b=>b.type?.startsWith("serie_games_")).map(b=>b.type))]

 let playoffHtml = ''
 playoffHtml += renderSection("🏆 Vítěz playoff","winner_playoff_overall",winnerOverall)
 playoffHtml += renderSection("🥈 Finalista (2. místo)","second_playoff_overall",secondOverall)
 playoffHtml += renderSection("🥉 3. místo","third_playoff_overall",thirdOverall)

 if(serieWinnerTypes.length){
  playoffHtml += `<div class="subsection-title">⚔️ Vítězové sérií</div>`
  serieWinnerTypes.forEach(type=>{
   const stageId = type.replace("serie_winner_","")
   playoffHtml += renderSerieSection(`Vítěz série — ${getStageName(stageId)}`, type, bets.filter(b=>b.type===type))
  })
 }

 if(serieGamesTypes.length){
  playoffHtml += `<div class="subsection-title">🎯 Počty zápasů sérií</div>`
  serieGamesTypes.forEach(type=>{
   const stageId = type.replace("serie_games_","")
   playoffHtml += renderSerieSection(`Počet zápasů — ${getStageName(stageId)}`, type, bets.filter(b=>b.type===type))
  })
 }

 if(!winnerOverall.length&&!secondOverall.length&&!thirdOverall.length&&!serieWinnerTypes.length&&!serieGamesTypes.length){
  playoffHtml = `<div class="card"><div class="empty">Žádné playoff sázky.</div></div>`
 }

 document.getElementById("app-playoff").innerHTML = playoffHtml
}

load()
</script>
</body>
</html>
