<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Playoff Extraliga</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}

body{
 font-family:'Inter',sans-serif;
 background:#0a0a0a;
 color:#e8d48b;
 min-height:100vh;
 padding:28px 20px;
}

/* HEADER */
.page-header{
 text-align:center;
 margin-bottom:40px;
 padding-bottom:28px;
 border-bottom:1px solid #2a2200;
 position:relative;
}
.page-header::after{
 content:'';
 position:absolute;
 bottom:-1px;left:50%;transform:translateX(-50%);
 width:120px;height:2px;
 background:linear-gradient(90deg,transparent,#c9a227,transparent);
}

h1{
 font-size:30px;font-weight:800;
 letter-spacing:-.5px;
 color:#f0d060;
 text-shadow:0 0 40px rgba(201,162,39,.25);
 margin-bottom:6px;
}
.subtitle{color:#6b5a20;font-size:13px;letter-spacing:.06em;text-transform:uppercase;}

/* ROUND */
.round{margin-bottom:44px;}
.round-title{
 font-size:10px;font-weight:700;
 letter-spacing:.2em;text-transform:uppercase;
 color:#6b5a20;
 margin-bottom:16px;
 padding-left:2px;
 display:flex;align-items:center;gap:12px;
}
.round-title::after{
 content:'';flex:1;height:1px;
 background:linear-gradient(90deg,#2a2000,transparent);
}

.matches-grid{display:grid;gap:16px;}
.matches-grid.cols-4{grid-template-columns:repeat(4,1fr);}
.matches-grid.cols-2{grid-template-columns:repeat(2,1fr);}
.matches-grid.cols-1{grid-template-columns:1fr;}

/* CARD */
.match-card{
 background:#0f0d00;
 border-radius:14px;
 overflow:hidden;
 border:1px solid #2a2000;
 transition:border-color .2s, box-shadow .2s;
}
.match-card:hover{
 border-color:#c9a227;
 box-shadow:0 0 24px rgba(201,162,39,.08);
}
.match-card.is-final{
 border-color:#c9a227;
 box-shadow:0 0 32px rgba(201,162,39,.12);
}
.match-card.is-bronze{
 border-color:#7a6030;
}

/* CARD HEADER */
.match-header{
 background:#0c0b00;
 padding:10px 14px;
 display:flex;justify-content:space-between;align-items:center;
 border-bottom:1px solid #2a2000;
}
.match-header-label{
 font-size:11px;font-weight:700;
 color:#a07820;letter-spacing:.1em;text-transform:uppercase;
}
.series-state{
 font-size:13px;font-weight:800;
 color:#f0d060;
 background:rgba(201,162,39,.1);
 border:1px solid rgba(201,162,39,.2);
 padding:3px 12px;border-radius:20px;
 letter-spacing:.05em;
}

/* CARD BODY */
.match-body{padding:14px;}

.team-row{
 display:flex;align-items:center;gap:12px;
 padding:10px 12px;border-radius:10px;
 margin-bottom:6px;
 background:#0c0b00;
 border:1px solid #1a1500;
 transition:background .15s;
}
.team-row:last-of-type{margin-bottom:0;}

.team-row.winner{
 background:#1a1400;
 border-color:#c9a227;
}
.team-row.loser{
 opacity:.4;
 filter:grayscale(.3);
}
.team-row.tbd{
 opacity:.3;
}

.team-logo{
 width:38px;height:38px;
 object-fit:contain;
 background:#0a0900;
 border-radius:8px;padding:3px;
 flex-shrink:0;
}
.team-logo-placeholder{
 width:38px;height:38px;
 border-radius:8px;
 background:#1a1500;
 border:1px solid #2a2000;
 flex-shrink:0;
 display:flex;align-items:center;justify-content:center;
 font-size:10px;color:#6b5a20;font-weight:700;
}

.team-info{flex:1;min-width:0;}
.team-name{
 font-size:14px;font-weight:700;
 color:#e8d48b;
 white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.team-name.tbd{color:#4a3a10;font-weight:400;font-style:italic;}
.team-row.winner .team-name{color:#f0d060;}

/* DOTS */
.game-dots{display:flex;gap:4px;margin-top:5px;}
.dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.dot-win{background:#c9a227;}
.dot-loss{background:#3a1a00;}
.dot-empty{background:#1a1500;border:1px solid #2a2000;}

/* SCORE */
.score-num{
 font-size:24px;font-weight:800;
 line-height:1;color:#e8d48b;
}
.score-num.win-color{color:#f0d060;}
.score-num.loss-color{color:#3a2a00;}

/* VS */
.vs-divider{
 text-align:center;font-size:10px;
 color:#3a2a00;font-weight:700;
 letter-spacing:.15em;padding:5px 0;
}

/* STATUS */
.status-badge{
 display:inline-block;
 padding:2px 9px;border-radius:20px;
 font-size:10px;font-weight:700;
 text-transform:uppercase;letter-spacing:.08em;
 margin-right:6px;
}
.status-live{background:#7a1a00;color:#ff8060;animation:pulse 1.5s infinite;}
.status-done{background:#1a1400;color:#c9a227;border:1px solid #3a2a00;}
.status-upcoming{background:#0f0d00;color:#3a2a00;border:1px solid #1a1500;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* FOOTER */
.match-footer{
 padding:10px 14px;
 border-top:1px solid #1a1500;
 display:flex;gap:8px;flex-wrap:wrap;
}
.btn{
 display:inline-flex;align-items:center;gap:5px;
 padding:6px 13px;border-radius:8px;
 font-size:12px;font-weight:600;
 text-decoration:none;border:none;cursor:pointer;
 transition:all .15s;font-family:'Inter',sans-serif;
}
.btn-bet{
 background:linear-gradient(135deg,#c9a227,#a07820);
 color:#0a0800;
}
.btn-bet:hover{
 background:linear-gradient(135deg,#f0d060,#c9a227);
 box-shadow:0 0 14px rgba(201,162,39,.3);
}
.btn-stats{background:#1a1500;color:#a07820;border:1px solid #2a2000;}
.btn-stats:hover{background:#2a2000;color:#c9a227;}
.btn-schedule{background:#1a1500;color:#a07820;border:1px solid #2a2000;}
.btn-schedule:hover{background:#2a2000;color:#c9a227;}

/* TROPHY BADGE */
.trophy-badge{
 display:inline-block;
 background:linear-gradient(135deg,#c9a227,#7a5010);
 -webkit-background-clip:text;
 -webkit-text-fill-color:transparent;
 background-clip:text;
 font-size:18px;margin-right:4px;
}

@media(max-width:900px){
 .matches-grid.cols-4{grid-template-columns:repeat(2,1fr);}
}
@media(max-width:580px){
 .matches-grid.cols-4,.matches-grid.cols-2{grid-template-columns:1fr;}
 body{padding:14px 12px;}
 h1{font-size:22px;}
}
</style>
</head>
<body>

<div class="page-header">
 <h1>⛸ Playoff Extraliga</h1>
 <p class="subtitle">Tipsport Extraliga · Sezóna 2024/25</p>
</div>

<div class="round">
 <div class="round-title">Čtvrtfinále — hraní na 4 výhry</div>
 <div class="matches-grid cols-4" id="qf"></div>
</div>

<div class="round">
 <div class="round-title">Semifinále — hraní na 4 výhry</div>
 <div class="matches-grid cols-2" id="sf"></div>
</div>

<div class="round">
 <div class="round-title">Finálová fáze</div>
 <div class="matches-grid cols-2" id="finals"></div>
</div>

<script>

const LOGO_PATH = "./logos/"

// =====================================================
// DATA – UPRAVUJ ZDE
// =====================================================

const quarterFinals = [
 {
  id:"qf1", label:"Čtvrtfinále 1", status:"upcoming",
  team1:{ name:"?", logo:null, wins:0, games:[] },
  team2:{ name:"?", logo:null, wins:0, games:[] },
 },
 {
  id:"qf2", label:"Čtvrtfinále 2", status:"upcoming",
  team1:{ name:"?", logo:null, wins:0, games:[] },
  team2:{ name:"?", logo:null, wins:0, games:[] },
 },
 {
  id:"qf3", label:"Čtvrtfinále 3", status:"upcoming",
  team1:{ name:"?", logo:null, wins:0, games:[] },
  team2:{ name:"?", logo:null, wins:0, games:[] },
 },
 {
  id:"qf4", label:"Čtvrtfinále 4", status:"upcoming",
  team1:{ name:"?", logo:null, wins:0, games:[] },
  team2:{ name:"?", logo:null, wins:0, games:[] },
 },
]

const semiFinals = [
 {
  id:"sf1", label:"Semifinále 1", status:"upcoming",
  team1:{ name:"Vítěz QF1", logo:null, wins:0, games:[] },
  team2:{ name:"Vítěz QF2", logo:null, wins:0, games:[] },
 },
 {
  id:"sf2", label:"Semifinále 2", status:"upcoming",
  team1:{ name:"Vítěz QF3", logo:null, wins:0, games:[] },
  team2:{ name:"Vítěz QF4", logo:null, wins:0, games:[] },
 },
]

const finalPhase = [
 {
  id:"bronze", label:"O 3. místo", status:"upcoming",
  isBronze:true,
  team1:{ name:"Poražený SF1", logo:null, wins:0, games:[] },
  team2:{ name:"Poražený SF2", logo:null, wins:0, games:[] },
 },
 {
  id:"final", label:"Finále", status:"upcoming",
  isFinal:true,
  team1:{ name:"Vítěz SF1", logo:null, wins:0, games:[] },
  team2:{ name:"Vítěz SF2", logo:null, wins:0, games:[] },
 },
]

// =====================================================
// RENDER
// =====================================================

function dotsHtml(games, perspective){
 let html = '<div class="game-dots">'
 for(let i=0;i<7;i++){
  if(i < games.length){
   const win = perspective==="team1" ? games[i]==="W" : games[i]==="L"
   html += `<div class="dot ${win?"dot-win":"dot-loss"}"></div>`
  } else {
   html += `<div class="dot dot-empty"></div>`
  }
 }
 return html + '</div>'
}

function logoHtml(logo, name){
 if(logo) return `<img class="team-logo" src="${LOGO_PATH}${logo}" alt="${name}">`
 const tbd = name==="?" || name.startsWith("Vítěz") || name.startsWith("Poražený")
 const initials = tbd ? "?" : name.split(" ").map(w=>w[0]).join("").substring(0,2).toUpperCase()
 return `<div class="team-logo-placeholder">${initials}</div>`
}

function statusHtml(status){
 if(status==="live")     return `<span class="status-badge status-live">● Live</span>`
 if(status==="done")     return `<span class="status-badge status-done">✓ Hotovo</span>`
 return `<span class="status-badge status-upcoming">Připravuje se</span>`
}

function winnerOf(match){
 const {team1,team2,status} = match
 if(status!=="done") return null
 if(team1.wins>=4) return "team1"
 if(team2.wins>=4) return "team2"
 return null
}

function teamRowHtml(team, perspective, winner, isTbd){
 const isWinner = winner===perspective
 const isLoser  = winner && winner!==perspective
 const cls = isWinner?"winner":isLoser?"loser":isTbd?"tbd":""
 const scoreColor = isWinner?"win-color":isLoser?"loss-color":""
 return `
  <div class="team-row ${cls}">
   ${logoHtml(team.logo, team.name)}
   <div class="team-info">
    <div class="team-name ${isTbd?"tbd":""}">${team.name}</div>
    ${dotsHtml(team.games, perspective)}
   </div>
   <span class="score-num ${scoreColor}">${team.wins}</span>
  </div>`
}

function matchCardHtml(match){
 const {id,label,status,team1,team2,isFinal,isBronze} = match
 const winner = winnerOf(match)
 const tbd1 = team1.name==="?"||team1.name.startsWith("Vítěz")||team1.name.startsWith("Poražený")
 const tbd2 = team2.name==="?"||team2.name.startsWith("Vítěz")||team2.name.startsWith("Poražený")

 const cardCls = isFinal?"match-card is-final":isBronze?"match-card is-bronze":"match-card"
 const labelIcon = isFinal?"🏆 ":isBronze?"🥉 ":""

 return `
 <div class="${cardCls}">
  <div class="match-header">
   <span class="match-header-label">${labelIcon}${label}</span>
   <div style="display:flex;align-items:center;gap:6px;">
    ${statusHtml(status)}
    <span class="series-state">${team1.wins} : ${team2.wins}</span>
   </div>
  </div>
  <div class="match-body">
   ${teamRowHtml(team1,"team1",winner,tbd1)}
   <div class="vs-divider">· · ·</div>
   ${teamRowHtml(team2,"team2",winner,tbd2)}
  </div>
  <div class="match-footer">
   <a href="index.html" class="btn btn-bet">🎲 Vsadit</a>
   <a href="#" class="btn btn-stats" onclick="alert('Statistiky brzy');return false;">📊 Statistiky</a>
   <a href="#" class="btn btn-schedule" onclick="alert('Rozpis brzy');return false;">📅 Rozpis</a>
  </div>
 </div>`
}

function render(id, matches){
 document.getElementById(id).innerHTML = matches.map(matchCardHtml).join("")
}

render("qf", quarterFinals)
render("sf", semiFinals)
render("finals", finalPhase)

</script>
</body>
</html>
