<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Playoff Extraliga</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}

body{
 font-family:'Inter',sans-serif;
 background:#eef2f7;
 color:#1a1a2e;
 min-height:100vh;
 padding:0 0 40px;
}

/* TOP BAR */
.topbar{
 background:linear-gradient(135deg,#1a3a5c 0%,#0f2340 100%);
 padding:28px 32px 24px;
 margin-bottom:32px;
}
.topbar-inner{
 max-width:1200px;margin:0 auto;
 display:flex;align-items:center;justify-content:space-between;
 flex-wrap:wrap;gap:14px;
}
.topbar h1{
 font-size:26px;font-weight:800;
 color:white;letter-spacing:-.5px;margin-bottom:4px;
}
.topbar p{font-size:13px;color:#7a9cbf;font-weight:500;}
.season-badge{
 background:rgba(255,255,255,.1);
 border:1px solid rgba(255,255,255,.15);
 border-radius:10px;padding:10px 18px;
 font-size:12px;font-weight:700;color:#a8c8e8;
 letter-spacing:.07em;text-transform:uppercase;
}

.content{max-width:1200px;margin:0 auto;padding:0 20px;}

/* ROUND */
.round{margin-bottom:36px;}
.round-header{
 display:flex;align-items:center;gap:14px;
 margin-bottom:14px;
}
.round-label{
 font-size:10px;font-weight:700;
 letter-spacing:.18em;text-transform:uppercase;
 color:#1a3a5c;white-space:nowrap;
 background:#dce8f5;
 padding:5px 14px;border-radius:20px;
}
.round-line{flex:1;height:1px;background:#c8d8e8;}

.matches-grid{display:grid;gap:14px;}
.matches-grid.cols-4{grid-template-columns:repeat(4,1fr);}
.matches-grid.cols-2{grid-template-columns:repeat(2,1fr);}
.matches-grid.cols-1{grid-template-columns:1fr;}

/* CARD */
.match-card{
 background:white;
 border-radius:14px;
 overflow:hidden;
 border:1px solid #c8d8e8;
 box-shadow:0 2px 8px rgba(26,58,92,.07);
 transition:box-shadow .2s,border-color .2s;
}
.match-card:hover{
 box-shadow:0 6px 20px rgba(26,58,92,.13);
 border-color:#a0bcd8;
}
.match-card.is-final{
 border-color:#93c5fd;
 box-shadow:0 4px 16px rgba(59,130,246,.12);
}
.match-card.is-bronze{
 border-color:#fcd34d;
 box-shadow:0 2px 10px rgba(245,158,11,.1);
}

/* CARD HEADER */
.match-header{
 padding:11px 16px;
 display:flex;justify-content:space-between;align-items:center;
 border-bottom:1px solid #e8f0f8;
 background:#f0f6fc;
}
.match-card.is-final .match-header{background:#eff6ff;}
.match-card.is-bronze .match-header{background:#fffbeb;}

.match-header-label{
 font-size:11px;font-weight:700;
 color:#3a6a9c;letter-spacing:.1em;text-transform:uppercase;
}
.match-card.is-final .match-header-label{color:#2563eb;}
.match-card.is-bronze .match-header-label{color:#d97706;}

.header-right{display:flex;align-items:center;gap:8px;}

.series-state{
 font-size:13px;font-weight:800;color:#1a3a5c;
 background:#dce8f5;
 border:1px solid #b8d0e8;
 padding:3px 12px;border-radius:20px;
}

/* STATUS */
.status-badge{
 display:inline-block;
 padding:2px 9px;border-radius:20px;
 font-size:10px;font-weight:700;
 text-transform:uppercase;letter-spacing:.07em;
}
.status-live{background:#fee2e2;color:#dc2626;animation:pulse 1.5s infinite;}
.status-done{background:#d1fae5;color:#059669;}
.status-upcoming{background:#dce8f5;color:#3a6a9c;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* BODY */
.match-body{padding:14px 16px;}

.team-row{
 display:flex;align-items:center;gap:11px;
 padding:10px 12px;border-radius:10px;
 margin-bottom:6px;
 background:#f5f9fd;
 border:1px solid #e0ecf8;
 transition:all .15s;
}
.team-row:last-of-type{margin-bottom:0;}

.team-row.winner{
 background:#f0fdf4;
 border-color:#86efac;
}
.team-row.loser{opacity:.4;}
.team-row.tbd{opacity:.3;}

.team-logo{
 width:36px;height:36px;
 object-fit:contain;background:white;
 border-radius:8px;padding:3px;flex-shrink:0;
 border:1px solid #e0ecf8;
}
.team-logo-placeholder{
 width:36px;height:36px;border-radius:8px;
 background:#dce8f5;flex-shrink:0;
 display:flex;align-items:center;justify-content:center;
 font-size:11px;color:#7aaac8;font-weight:700;
 border:1px solid #c8d8e8;
}

.team-info{flex:1;min-width:0;}
.team-name{
 font-size:14px;font-weight:700;color:#1a2a3c;
 white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.team-name.tbd{color:#b0c8d8;font-weight:400;font-style:italic;}
.team-row.winner .team-name{color:#166534;}

/* DOTS */
.game-dots{display:flex;gap:4px;margin-top:5px;}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.dot-win{background:#22c55e;}
.dot-loss{background:#f87171;}
.dot-empty{background:#d0e4f0;}

/* SCORE */
.score-num{
 font-size:22px;font-weight:800;
 line-height:1;color:#1a3a5c;
 min-width:18px;text-align:center;
}
.score-num.win-color{color:#16a34a;}
.score-num.loss-color{color:#d0e4f0;}

/* VS */
.vs-divider{
 text-align:center;font-size:11px;
 color:#b0c8d8;font-weight:600;
 letter-spacing:.1em;padding:4px 0;
}

/* FOOTER */
.match-footer{
 padding:10px 16px;
 border-top:1px solid #e8f0f8;
 display:flex;gap:7px;flex-wrap:wrap;
 background:#f5f9fd;
}
.btn{
 display:inline-flex;align-items:center;gap:5px;
 padding:6px 13px;border-radius:8px;
 font-size:12px;font-weight:600;
 text-decoration:none;border:none;cursor:pointer;
 transition:all .15s;font-family:'Inter',sans-serif;
}
.btn-bet{
 background:#1a3a5c;color:white;
}
.btn-bet:hover{background:#0f2340;}
.btn-stats{
 background:white;color:#3a6a9c;
 border:1px solid #c8d8e8;
}
.btn-stats:hover{background:#f0f6fc;color:#1a3a5c;}
.btn-schedule{
 background:white;color:#3a6a9c;
 border:1px solid #c8d8e8;
}
.btn-schedule:hover{background:#f0f6fc;color:#1a3a5c;}

@media(max-width:900px){
 .matches-grid.cols-4{grid-template-columns:repeat(2,1fr);}
}
@media(max-width:580px){
 .matches-grid.cols-4,.matches-grid.cols-2{grid-template-columns:1fr;}
 .topbar{padding:20px 16px 18px;}
 .topbar h1{font-size:20px;}
 .content{padding:0 12px;}
}
</style>
</head>
<body>

<div class="topbar">
 <div class="topbar-inner">
  <div>
   <h1>⛸ Playoff Extraliga</h1>
   <p>Tipsport Extraliga · Sezóna 2024/25</p>
  </div>
  <div class="season-badge">🏆 Playoff 2025</div>
 </div>
</div>

<div class="content">

 <div class="round">
  <div class="round-header">
   <span class="round-label">Čtvrtfinále — hraní na 4 výhry</span>
   <div class="round-line"></div>
  </div>
  <div class="matches-grid cols-4" id="qf"></div>
 </div>

 <div class="round">
  <div class="round-header">
   <span class="round-label">Semifinále — hraní na 4 výhry</span>
   <div class="round-line"></div>
  </div>
  <div class="matches-grid cols-2" id="sf"></div>
 </div>

 <div class="round">
  <div class="round-header">
   <span class="round-label">Finálová fáze</span>
   <div class="round-line"></div>
  </div>
  <div class="matches-grid cols-2" id="finals"></div>
 </div>

</div>

<script>

const LOGO_PATH = "./logos/"

// =====================================================
// DATA – UPRAVUJ ZDE
// =====================================================

const quarterFinals = [
 {
  id:"qf1",label:"Čtvrtfinále 1",status:"upcoming",
  team1:{name:"?",logo:null,wins:0,games:[]},
  team2:{name:"?",logo:null,wins:0,games:[]},
 },
 {
  id:"qf2",label:"Čtvrtfinále 2",status:"upcoming",
  team1:{name:"?",logo:null,wins:0,games:[]},
  team2:{name:"?",logo:null,wins:0,games:[]},
 },
 {
  id:"qf3",label:"Čtvrtfinále 3",status:"upcoming",
  team1:{name:"?",logo:null,wins:0,games:[]},
  team2:{name:"?",logo:null,wins:0,games:[]},
 },
 {
  id:"qf4",label:"Čtvrtfinále 4",status:"upcoming",
  team1:{name:"?",logo:null,wins:0,games:[]},
  team2:{name:"?",logo:null,wins:0,games:[]},
 },
]

const semiFinals = [
 {
  id:"sf1",label:"Semifinále 1",status:"upcoming",
  team1:{name:"Vítěz QF1",logo:null,wins:0,games:[]},
  team2:{name:"Vítěz QF2",logo:null,wins:0,games:[]},
 },
 {
  id:"sf2",label:"Semifinále 2",status:"upcoming",
  team1:{name:"Vítěz QF3",logo:null,wins:0,games:[]},
  team2:{name:"Vítěz QF4",logo:null,wins:0,games:[]},
 },
]

const finalPhase = [
 {
  id:"bronze",label:"O 3. místo",status:"upcoming",isBronze:true,
  team1:{name:"Poražený SF1",logo:null,wins:0,games:[]},
  team2:{name:"Poražený SF2",logo:null,wins:0,games:[]},
 },
 {
  id:"final",label:"Finále",status:"upcoming",isFinal:true,
  team1:{name:"Vítěz SF1",logo:null,wins:0,games:[]},
  team2:{name:"Vítěz SF2",logo:null,wins:0,games:[]},
 },
]

// =====================================================
// RENDER
// =====================================================

function dotsHtml(games, perspective){
 let html = '<div class="game-dots">'
 for(let i=0;i<7;i++){
  if(i<games.length){
   const win = perspective==="team1"?games[i]==="W":games[i]==="L"
   html += `<div class="dot ${win?"dot-win":"dot-loss"}"></div>`
  } else {
   html += `<div class="dot dot-empty"></div>`
  }
 }
 return html+'</div>'
}

function logoHtml(logo,name){
 if(logo) return `<img class="team-logo" src="${LOGO_PATH}${logo}" alt="${name}">`
 const tbd = name==="?"||name.startsWith("Vítěz")||name.startsWith("Poražený")
 const initials = tbd?"?":name.split(" ").map(w=>w[0]).join("").substring(0,2).toUpperCase()
 return `<div class="team-logo-placeholder">${initials}</div>`
}

function statusHtml(s){
 if(s==="live")  return `<span class="status-badge status-live">● Live</span>`
 if(s==="done")  return `<span class="status-badge status-done">✓ Hotovo</span>`
 return `<span class="status-badge status-upcoming">Brzy</span>`
}

function winnerOf(match){
 const {team1,team2,status}=match
 if(status!=="done") return null
 if(team1.wins>=4) return "team1"
 if(team2.wins>=4) return "team2"
 return null
}

function teamRowHtml(team,perspective,winner,isTbd){
 const isWinner=winner===perspective
 const isLoser=winner&&winner!==perspective
 const cls=isWinner?"winner":isLoser?"loser":isTbd?"tbd":""
 const scoreColor=isWinner?"win-color":isLoser?"loss-color":""
 return `
  <div class="team-row ${cls}">
   ${logoHtml(team.logo,team.name)}
   <div class="team-info">
    <div class="team-name ${isTbd?"tbd":""}">${team.name}</div>
    ${dotsHtml(team.games,perspective)}
   </div>
   <span class="score-num ${scoreColor}">${team.wins}</span>
  </div>`
}

function matchCardHtml(match){
 const {label,status,team1,team2,isFinal,isBronze}=match
 const winner=winnerOf(match)
 const tbd1=team1.name==="?"||team1.name.startsWith("Vítěz")||team1.name.startsWith("Poražený")
 const tbd2=team2.name==="?"||team2.name.startsWith("Vítěz")||team2.name.startsWith("Poražený")
 const cardCls=`match-card${isFinal?" is-final":isBronze?" is-bronze":""}`
 const icon=isFinal?"🏆 ":isBronze?"🥉 ":""
 return `
 <div class="${cardCls}">
  <div class="match-header">
   <span class="match-header-label">${icon}${label}</span>
   <div class="header-right">
    ${statusHtml(status)}
    <span class="series-state">${team1.wins} : ${team2.wins}</span>
   </div>
  </div>
  <div class="match-body">
   ${teamRowHtml(team1,"team1",winner,tbd1)}
   <div class="vs-divider">vs</div>
   ${teamRowHtml(team2,"team2",winner,tbd2)}
  </div>
  <div class="match-footer">
   <a href="index.html" class="btn btn-bet">🎲 Vsadit</a>
   <a href="#" class="btn btn-stats" onclick="alert('Statistiky brzy');return false;">📊 Statistiky</a>
   <a href="#" class="btn btn-schedule" onclick="alert('Rozpis brzy');return false;">📅 Rozpis</a>
  </div>
 </div>`
}

function render(id,matches){
 document.getElementById(id).innerHTML=matches.map(matchCardHtml).join("")
}

render("qf",quarterFinals)
render("sf",semiFinals)
render("finals",finalPhase)

</script>
</body>
</html>
