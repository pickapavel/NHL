<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Extraliga</title>

<style>
*{box-sizing:border-box}

body{
 font-family:Arial;
 margin:0;
 background:#f2f2f2;
}

.wrapper{
 max-width:1200px;
 margin:auto;
 padding:15px;
 background:white;
}

/* HEADER */
.headerBar{
 display:flex;
 align-items:center;
 justify-content:space-between;
 background:#e9ecef;
 border-radius:12px;
 padding:15px;
 margin-bottom:20px;
}

.headerBar img{height:80px;}

.seasonCard{
 background:#0b2a3c;
 color:white;
 font-size:20px;
 padding:10px 18px;
 border-radius:10px;
}

/* TABULKA */
.standingsCard{
 display:flex;
 align-items:center;
 justify-content:space-between;
 background:#e9ecef;
 border-radius:10px;
 padding:10px;
 margin-bottom:6px;
}

.rank{width:30px;font-weight:bold;text-align:center;}

.teamBlock{
 display:flex;
 align-items:center;
 gap:10px;
 flex:1;
 min-width:0;
}

.logo{
 width:40px;
 height:40px;
 object-fit:contain;
 background:white;
 border-radius:6px;
}

.teamName{
 font-weight:bold;
 white-space:nowrap;
 overflow:hidden;
 text-overflow:ellipsis;
}

.teamStats{font-size:12px;color:#444;}

.pointsBox{
 background:#0b2a3c;
 color:white;
 padding:6px 10px;
 border-radius:8px;
 font-weight:bold;
}

/* MATCH */
.matchRow{
 background:#e9ecef;
 padding:12px;
 margin-bottom:10px;
 border-radius:10px;
}

/* řádek týmu */
.teamLine{
 display:flex;
 justify-content:space-between;
 align-items:center;
 margin-bottom:6px;
}

.teamLeft{
 display:flex;
 align-items:center;
 gap:8px;
 min-width:0;
}

.teamLeft div{
 white-space:nowrap;
 overflow:hidden;
 text-overflow:ellipsis;
 font-weight:bold;
}

.score{
 background:#0b2a3c;
 color:white;
 padding:6px 12px;
 border-radius:8px;
 font-weight:bold;
 min-width:45px;
 text-align:center;
}

/* BUTTONS */
.buttons{
 display:flex;
 gap:8px;
 margin-top:8px;
}

.btn{
 flex:1;
 border:none;
 padding:8px;
 border-radius:6px;
 font-weight:bold;
}

.detailBtn{background:#2f9ec9;color:white;}
.betBtn{background:#27ae60;color:white;}

/* DESKTOP */
@media(min-width:768px){

.matchRow{
 display:grid;
 grid-template-columns:1fr auto 1fr auto;
 align-items:center;
 gap:10px;
}

.teamLine{
 margin:0;
}

.buttons{
 flex-direction:column;
}

}

</style>
</head>

<body>

<div class="wrapper">

<div class="headerBar">
<img src="img/extraliga.jpg">
<div class="seasonCard">Extraliga</div>
</div>

<h2>Tabulka</h2>
<div id="standings"></div>

<h2>Rozpis zápasů</h2>
<div id="schedule"></div>

</div>

<script type="module">

import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient(
  "https://qaocbodrflsaerxntfui.supabase.co",
  "sb_publishable_eIeO9MihyuQDuNHy60Ubrw_8ZuSKPFU"
)

const SEASON_ID = "4b05b50e-cfde-4473-aebe-33495c85a989"

async function load(){

 const { data: seasonTeams } = await supabase
  .from("season_teams")
  .select("team_id")
  .eq("season_id", SEASON_ID)

 const teamIds = (seasonTeams || []).map(t => t.team_id)

 let teams = []
 if(teamIds.length > 0){
  const res = await supabase
   .from("teams")
   .select("*")
   .in("id", teamIds)
  teams = res.data || []
 }

 const { data: matches } = await supabase
  .from("matches")
  .select("*")
  .eq("season_id", SEASON_ID)

 const teamMap = {}
 teams.forEach(t=> teamMap[t.id] = t)

 render(matches || [], teamMap)
 renderTable(matches || [], teamMap, teams)
}

/* TABULKA */
function renderTable(matches, teamMap, teams){

 let table = {}

 teams.forEach(t=>{
  table[t.id] = {team:t.id,b:0,z:0,gf:0,ga:0}
 })

 matches.forEach(m=>{
  if(m.home_score == null || m.away_score == null) return

  const h = table[m.home_team]
  const a = table[m.away_team]

  const hg = Number(m.home_score)
  const ag = Number(m.away_score)

  h.z++; a.z++
  h.gf+=hg; h.ga+=ag
  a.gf+=ag; a.ga+=hg

  if(hg>ag){ h.b+=3 }
  else{ a.b+=3 }
 })

 const arr = Object.values(table).sort((a,b)=> b.b-a.b)

 const cont = document.getElementById("standings")
 cont.innerHTML=""

 arr.forEach((t,i)=>{
  const team = teamMap[t.team]
  if(!team) return

  cont.innerHTML+=`
  <div class="standingsCard">
   <div class="rank">${i+1}</div>

   <div class="teamBlock">
    <img class="logo" src="./logos/${team.logo}">
    <div>
     <div class="teamName">${team.name}</div>
     <div class="teamStats">Skóre ${t.gf}:${t.ga}</div>
    </div>
   </div>

   <div class="pointsBox">${t.b}</div>
  </div>
  `
 })

}

/* MATCH */
function render(matches, teamMap){

 const cont = document.getElementById("schedule")
 cont.innerHTML=""

 matches.forEach(m=>{

  const home = teamMap[m.home_team]
  const away = teamMap[m.away_team]

  const homeScore = m.home_score ?? "-"
  const awayScore = m.away_score ?? "-"

  cont.innerHTML+=`
  <div class="matchRow">

   <div class="teamLine">
    <div class="teamLeft">
     <img class="logo" src="./logos/${home.logo}">
     <div>${home.name}</div>
    </div>
    <div class="score">${homeScore}</div>
   </div>

   <div class="teamLine">
    <div class="teamLeft">
     <img class="logo" src="./logos/${away.logo}">
     <div>${away.name}</div>
    </div>
    <div class="score">${awayScore}</div>
   </div>

   <div class="buttons">
    <button class="btn detailBtn"
     onclick="window.location.href='statistiky-zapasu.html?id=${m.id}'">
     Detail
    </button>

    <button class="btn betBtn"
     onclick="window.location.href='vsad-si.html?id=${m.id}'">
     Vsaď si
    </button>
   </div>

  </div>
  `
 })

}

load()

</script>

</body>
</html>
