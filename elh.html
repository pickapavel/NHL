<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Extraliga U dvou Blbounů</title>

<style>
*{box-sizing:border-box}

body{font-family:Arial;margin:0;background:#f2f2f2;}
.wrapper{max-width:1200px;margin:auto;padding:15px;background:white;}

/* HEADER */
.headerBar{
 background:linear-gradient(135deg,#0b2a3c 0%,#1a5276 100%);
 border-radius:14px;
 padding:18px 24px;
 margin-bottom:24px;
 display:flex;
 align-items:center;
 justify-content:space-between;
 flex-wrap:wrap;
 gap:12px;
}

.headerLeft{display:flex;align-items:center;gap:16px;}

.headerLogo{
 width:64px;height:64px;
 object-fit:contain;
 /* odstraní bílé pozadí u PNG s průhledností */
 mix-blend-mode:lighten;
 flex-shrink:0;
}

.headerTitle{
 font-size:22px;font-weight:800;
 color:white;letter-spacing:-.3px;
 line-height:1.2;
}

.headerBadge{
 background:rgba(255,255,255,.12);
 border:1px solid rgba(255,255,255,.2);
 border-radius:20px;
 padding:6px 16px;
 font-size:12px;font-weight:700;
 color:#a8d4ee;
 letter-spacing:.06em;
 white-space:nowrap;
}

/* SEKCE NADPIS */
.sectionTitle{
 font-size:17px;font-weight:700;
 color:#0b2a3c;
 margin:0 0 12px;
 display:flex;align-items:center;gap:8px;
}
.sectionTitle::after{
 content:'';flex:1;height:2px;
 background:linear-gradient(90deg,#2f9ec9,transparent);
 border-radius:2px;
}

/* TABULKA */
.table-scroll{overflow-x:auto;margin-bottom:28px;}

.standings-table{
 width:100%;border-collapse:collapse;
 font-size:13px;min-width:750px;
}

.standings-table thead tr{background:#0b2a3c;color:white;}

.standings-table thead th{
 padding:10px 8px;text-align:center;
 font-size:11px;font-weight:700;
 letter-spacing:.05em;white-space:nowrap;
}

.standings-table thead th.th-team{text-align:left;padding-left:10px;}

.standings-table tbody tr{
 border-bottom:1px solid #e0e0e0;transition:background .15s;
}

.standings-table tbody tr:hover{background:#f0f4f8;}
.standings-table tbody tr:nth-child(odd){background:#f7f8fa;}
.standings-table tbody tr:nth-child(odd):hover{background:#edf2f7;}

.standings-table tbody td{
 padding:8px 8px;text-align:center;
 color:#333;white-space:nowrap;vertical-align:middle;
}

.td-rating{
 text-align:center;font-size:11px;color:#666;
 font-weight:600;line-height:1.8;padding:6px 6px;width:60px;
}

.td-rank{font-weight:700;color:#0b2a3c;font-size:14px;width:28px;}
.td-team{text-align:left;padding-left:8px;}
.team-cell{display:flex;align-items:center;gap:10px;}

.team-logo{
 width:32px;height:32px;object-fit:contain;
 background:white;border-radius:6px;padding:2px;
 border:1px solid #e0e0e0;flex-shrink:0;
}

.team-name{font-weight:700;font-size:13px;color:#111;}

.points-pill{
 background:#0b2a3c;border-radius:6px;
 padding:4px 10px;display:inline-block;
 min-width:34px;text-align:center;color:white;
 font-weight:800;font-size:14px;
}

.td-score{font-weight:600;color:#333;}
.td-pm{font-weight:600;}
.td-pm.pos{color:#27ae60;}
.td-pm.neg{color:#e74c3c;}
.td-pm.neu{color:#888;}
.td-wins{color:#27ae60;font-weight:700;}
.td-losses{color:#e74c3c;font-weight:700;}
.td-num{color:#555;font-weight:600;}

/* FILTRY */
.filterBar{margin:0 0 16px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
.filterBar select{
 padding:8px 14px;border-radius:8px;border:none;
 font-weight:700;font-size:13px;
 background:#0b2a3c;color:white;cursor:pointer;
}

/* MATCH CARDS */
.matchRow{
 background:white;
 border:1px solid #e0e8f0;
 padding:12px 14px;
 margin-bottom:8px;
 border-radius:12px;
 display:flex;
 flex-direction:column;
 gap:10px;
 box-shadow:0 1px 4px rgba(0,0,0,.06);
 transition:box-shadow .15s;
}

.matchRow:hover{
 box-shadow:0 3px 12px rgba(0,0,0,.1);
 border-color:#b8d0e8;
}

.teamBox{
 display:flex;align-items:center;gap:8px;
 font-weight:700;font-size:14px;color:#1a2a3c;
}

.scoreBox{
 background:#0b2a3c;color:white;
 font-size:18px;font-weight:800;
 padding:6px 10px;border-radius:8px;
 min-width:45px;text-align:center;
}

.middleBox{text-align:center;font-size:12px;}

.periods{
 color:#888;font-size:11px;
 background:#f0f0f0;
 display:inline-block;
 padding:2px 8px;border-radius:10px;
}

.winTag{
 font-size:11px;font-weight:700;color:#fff;
 background:#2f9ec9;padding:3px 8px;
 border-radius:6px;display:inline-block;margin-top:4px;
}

.btn{
 border:none;border-radius:8px;cursor:pointer;
 width:100%;font-weight:700;height:36px;
 display:flex;align-items:center;justify-content:center;
 font-size:13px;gap:5px;transition:all .15s;
}
.detailBtn{background:#1a5276;color:white;}
.detailBtn:hover{background:#0b2a3c;}
.betBtn{background:#27ae60;color:white;}
.betBtn:hover{background:#219a52;}

.btnWrap{display:flex;flex-direction:column;gap:6px;}

.logo{
 width:36px;height:36px;object-fit:contain;
 background:white;padding:2px;border-radius:6px;
 border:1px solid #e0e0e0;
}

.roundTag{
 font-size:10px;font-weight:700;color:#888;
 background:#f0f0f0;padding:2px 8px;
 border-radius:10px;letter-spacing:.05em;
 text-transform:uppercase;
}

@media(min-width:768px){
 .matchRow{
  display:grid;
  grid-template-columns:1fr 80px 160px 80px 1fr 120px;
  align-items:center;
 }
 .homeTeam{grid-column:1;}
 .homeScore{grid-column:2;}
 .middleBox{grid-column:3;}
 .awayScore{grid-column:4;}
 .awayTeam{grid-column:5;justify-content:flex-end;text-align:right;}
 .btnWrap{grid-column:6;}
 .scoreBox{min-width:70px;}
}
</style>
</head>

<body>
<div class="wrapper">

<div class="headerBar">
 <div class="headerLeft">
  <img class="headerLogo" src=".//lokomotiva.png" alt="logo">
  <div class="headerTitle">Extraliga U dvou Blbounů</div>
 </div>
 <div class="headerBadge">⚡ Live tabulka</div>
</div>

<div class="sectionTitle">Tabulka</div>

<div class="table-scroll">
<table class="standings-table">
 <thead>
  <tr>
   <th style="width:60px" title="Rating celkový / forma">⭐🔥</th>
   <th style="width:28px">#</th>
   <th class="th-team">Tým</th>
   <th style="width:60px">Body</th>
   <th>Skóre</th>
   <th title="Vstřelené minus obdržené">+/-</th>
   <th title="Zápasy">Z</th>
   <th title="Výhry">V</th>
   <th title="Prohry">P</th>
   <th title="Výhra po prodloužení">VP</th>
   <th title="Prohra po prodloužení">PP</th>
   <th title="Výhra po nájezdech">VSN</th>
   <th title="Prohra po nájezdech">PSN</th>
  </tr>
 </thead>
 <tbody id="standings"></tbody>
</table>
</div>

<div class="filterBar">
 <select id="teamFilter">
  <option value="all">Všechny týmy</option>
 </select>
 <select id="matchFilter">
  <option value="all">Všechny zápasy</option>
  <option value="played">Jen odehrané</option>
  <option value="unplayed">Jen neodehrané</option>
 </select>
</div>

<div class="sectionTitle">Rozpis zápasů</div>
<div id="schedule"></div>

</div>

<script type="module">

import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient(
 "https://qaocbodrflsaerxntfui.supabase.co",
 "sb_publishable_eIeO9MihyuQDuNHy60Ubrw_8ZuSKPFU"
)

const SEASON_ID = "4b05b50e-cfde-4473-aebe-33495c85a989"
const START_RATING = 1000
const K_OVERALL = 80
const K_FORM = 120

let currentMatchFilter = "all"
let currentTeamFilter  = "all"

function getScore(match, teamId){
 const hg = Number(match.home_score)
 const ag = Number(match.away_score)
 let stats = null
 try{ stats = match.stats ? JSON.parse(match.stats) : null }catch(e){}
 const isSN = stats && (stats[20]==="1"||stats[20]==="2")
 const isOT = stats && !isSN && (stats[9]==="11"||stats[19]==="11")
 const isHome = match.home_team === teamId
 const teamGoals = isHome ? hg : ag
 const oppGoals  = isHome ? ag : hg
 if(teamGoals > oppGoals) return (isSN||isOT) ? 0.75 : 1
 else return (isSN||isOT) ? 0.25 : 0
}

function calculateRatings(allMatches, teams){
 const ratings     = {}
 const formHistory = {}
 const formRatings = {}

 teams.forEach(t=>{
  ratings[t.id]     = START_RATING
  formHistory[t.id] = []
  formRatings[t.id] = START_RATING
 })

 const sorted = [...allMatches].sort((a,b)=>Number(a.round)-Number(b.round))

 sorted.forEach(m=>{
  const h = m.home_team
  const a = m.away_team
  if(!ratings[h]||!ratings[a]) return

  const sH = getScore(m, h)
  const sA = getScore(m, a)

  const rH = ratings[h]
  const rA = ratings[a]
  const eH = 1/(1+Math.pow(10,(rA-rH)/400))
  const eA = 1/(1+Math.pow(10,(rH-rA)/400))
  ratings[h] = Math.round(rH + K_OVERALL*(sH-eH))
  ratings[a] = Math.round(rA + K_OVERALL*(sA-eA))

  function updateForm(teamId, opponentId, score){
   const current   = formRatings[teamId]
   const oppRating = formRatings[opponentId]
   const expected  = 1/(1+Math.pow(10,(oppRating-current)/400))
   const change    = K_FORM*(score-expected)
   formHistory[teamId].push(change)
   if(formHistory[teamId].length>5) formHistory[teamId].shift()
   formRatings[teamId] = Math.round(
    START_RATING + formHistory[teamId].reduce((a,b)=>a+Math.round(b),0)
   )
  }

  updateForm(h, a, sH)
  updateForm(a, h, sA)
 })

 return { ratings, formRatings }
}

document.getElementById("matchFilter").onchange = e=>{
 currentMatchFilter = e.target.value
 load()
}
document.getElementById("teamFilter").onchange = e=>{
 currentTeamFilter = e.target.value
 load()
}

async function load(){

 const { data: seasonTeams } = await supabase
  .from("season_teams").select("team_id").eq("season_id", SEASON_ID)

 const teamIds = (seasonTeams||[]).map(t=>t.team_id)

 let teams = []
 if(teamIds.length>0){
  const res = await supabase.from("teams").select("*").in("id", teamIds)
  teams = res.data || []
 }

 const { data: allMatches } = await supabase
  .from("matches")
  .select("*")
  .not("home_score","is",null)
  .not("away_score","is",null)
  .order("round",{ascending:true})

 const { data: seasonMatches } = await supabase
  .from("matches").select("*").eq("season_id", SEASON_ID)

 const teamMap = {}
 teams.forEach(t=> teamMap[t.id]=t)

 const { ratings, formRatings } = calculateRatings(allMatches||[], teams)

 const tf = document.getElementById("teamFilter")
 if(tf.options.length===1){
  teams.forEach(t=>{
   const opt = document.createElement("option")
   opt.value = t.id
   opt.textContent = t.name
   tf.appendChild(opt)
  })
 }

 let safeMatches = seasonMatches || []
 safeMatches.sort((a,b)=>Number(a.round)-Number(b.round))

 if(currentTeamFilter!=="all"){
  safeMatches = safeMatches.filter(m=>
   m.home_team===currentTeamFilter||m.away_team===currentTeamFilter
  )
 }
 if(currentMatchFilter==="played")   safeMatches=safeMatches.filter(m=>m.played)
 if(currentMatchFilter==="unplayed") safeMatches=safeMatches.filter(m=>!m.played)

 renderTable(seasonMatches||[], teamMap, teams, ratings, formRatings)
 render(safeMatches, teamMap)
}

function renderTable(matches, teamMap, teams, ratings, formRatings){

 let table = {}
 teams.forEach(t=>{
  table[t.id]={team:t.id,b:0,z:0,v:0,p:0,vp:0,pp:0,vsn:0,psn:0,gf:0,ga:0}
 })

 matches.forEach(m=>{
  if(m.home_score==null||m.away_score==null) return
  const h=table[m.home_team]
  const a=table[m.away_team]
  if(!h||!a) return

  const hg=Number(m.home_score)
  const ag=Number(m.away_score)
  h.z++;a.z++
  h.gf+=hg;h.ga+=ag
  a.gf+=ag;a.ga+=hg

  let stats=null
  try{stats=m.stats?JSON.parse(m.stats):null}catch(e){}

  const isSN=stats&&(stats[20]==="1"||stats[20]==="2")
  const isOT=stats&&!isSN&&(stats[9]==="11"||stats[19]==="11")

  if(isSN){
   if(hg>ag){h.vsn++;h.b+=2;a.psn++;a.b+=1}
   else{a.vsn++;a.b+=2;h.psn++;h.b+=1}
  }else if(isOT){
   if(hg>ag){h.vp++;h.b+=2;a.pp++;a.b+=1}
   else{a.vp++;a.b+=2;h.pp++;h.b+=1}
  }else{
   if(hg>ag){h.v++;h.b+=3;a.p++}
   else{a.v++;a.b+=3;h.p++}
  }
 })

 const arr=Object.values(table).sort((a,b)=>{
  if(b.b!==a.b) return b.b-a.b
  return (b.gf-b.ga)-(a.gf-a.ga)
 })

 const tbody=document.getElementById("standings")
 tbody.innerHTML=""

 arr.forEach((t,i)=>{
  const team=teamMap[t.team]
  if(!team) return

  const pm=t.gf-t.ga
  const pmStr=pm>0?`+${pm}`:String(pm)
  const pmClass=pm>0?"pos":pm<0?"neg":"neu"

  const elo  = ratings[t.team]     || START_RATING
  const form = formRatings[t.team] || START_RATING

  const tr=document.createElement("tr")
  tr.innerHTML=`
   <td class="td-rating">⭐ ${elo}<br>🔥 ${form}</td>
   <td class="td-rank">${i+1}</td>
   <td class="td-team">
    <div class="team-cell">
     <img class="team-logo" src="./logos/${team.logo}" alt="${team.name}">
     <div class="team-name">${team.name}</div>
    </div>
   </td>
   <td><span class="points-pill">${t.b}</span></td>
   <td class="td-score">${t.gf}:${t.ga}</td>
   <td class="td-pm ${pmClass}">${pmStr}</td>
   <td class="td-num">${t.z}</td>
   <td class="td-wins">${t.v}</td>
   <td class="td-losses">${t.p}</td>
   <td class="td-num">${t.vp}</td>
   <td class="td-num">${t.pp}</td>
   <td class="td-num">${t.vsn}</td>
   <td class="td-num">${t.psn}</td>
  `
  tbody.appendChild(tr)
 })
}

function render(matches, teamMap){

 const cont=document.getElementById("schedule")
 cont.innerHTML=""

 matches.forEach(m=>{
  const home=teamMap[m.home_team]
  const away=teamMap[m.away_team]
  if(!home||!away) return

  let stats=null
  try{stats=m.stats?JSON.parse(m.stats):null}catch(e){}

  let periods=""
  let tag=""

  if(stats){
   const h1=Number(stats[16]||0)
   const h2=Number(stats[17]||0)
   const h3=Number(stats[18]||0)
   const a1=Number(stats[6]||0)
   const a2=Number(stats[7]||0)
   const a3=Number(stats[8]||0)
   periods=`${h1}:${a1} · ${h2}:${a2} · ${h3}:${a3}`
   const isSN=stats[20]==="1"||stats[20]==="2"
   const isOT=!isSN&&(stats[9]==="11"||stats[19]==="11")
   if(isSN) tag="SN"
   else if(isOT) tag="OT"
  }

  const homeScore=m.home_score??"-"
  const awayScore=m.away_score??"-"
  const played = m.home_score != null

  cont.innerHTML+=`
  <div class="matchRow">
   <div class="teamBox homeTeam">
    <img class="logo" src="./logos/${home.logo}">
    <div>${home.name}</div>
   </div>
   <div class="scoreBox homeScore">${homeScore}</div>
   <div class="middleBox">
    ${played
     ? `<div class="periods">${periods}</div>${tag?`<div class="winTag">${tag}</div>`:""}`
     : `<span class="roundTag">Kolo ${m.round}</span>`
    }
   </div>
   <div class="scoreBox awayScore">${awayScore}</div>
   <div class="teamBox awayTeam">
    <div>${away.name}</div>
    <img class="logo" src="./logos/${away.logo}">
   </div>
   <div class="btnWrap">
    <button class="btn detailBtn"
     onclick="window.location.href='statistiky-zapasu.html?id=${m.id}'">
     📊 Detail
    </button>
    <button class="btn betBtn"
     onclick="window.location.href='vsad-si.html?id=${m.id}'">
     🎲 Vsaď si
    </button>
   </div>
  </div>
  `
 })
}

load()

</script>
</body>
</html>
