<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Extraliga</title>

<style>
*{box-sizing:border-box}

body{
 font-family:Arial;
 margin:0;
 background:#f2f2f2;
}

.wrapper{
 max-width:1200px;
 margin:auto;
 padding:20px;
 background:white;
}

.headerBar{
 display:flex;
 align-items:center;
 justify-content:space-between;
 background:#e9ecef;
 border-radius:12px;
 padding:20px;
 margin-bottom:25px;
}

.headerBar img{
 height:110px;
}

.seasonCard{
 background:#0b2a3c;
 color:white;
 font-size:26px;
 font-weight:bold;
 padding:14px 28px;
 border-radius:10px;
}

.matchRow{
 display:grid;
 grid-template-columns:1fr 70px 220px 70px 1fr 120px;
 align-items:center;
 background:#e9ecef;
 padding:10px;
 margin-bottom:5px;
 border-radius:6px;
 gap:8px;
}

.teamBox{display:flex;align-items:center;gap:10px;font-weight:bold;}
.teamRight{justify-content:flex-end;}

.logo{
 width:50px;height:50px;object-fit:contain;
 background:white;padding:2px;border-radius:6px;
}

.scoreBox{
 background:#0b2a3c;color:white;
 font-size:22px;font-weight:bold;
 padding:8px 0;border-radius:6px;text-align:center;
}

.statsBtn{
 background:#2f9ec9;color:white;border:none;
 padding:8px;border-radius:6px;cursor:pointer;
 width:100%;
}
</style>
</head>

<body>

<div class="wrapper">

<div class="headerBar">
<img src="img/extraliga.jpg">
<div class="seasonCard">Extraliga</div>
</div>

<h2>Rozpis zápasů</h2>
<div id="schedule"></div>

</div>

<script>

// ===== TÝMY =====
const teams = [
 "Sparta","Liberec","Pardubice","Litvínov",
 "Kladno","Budějovice","Vary","Třinec"
]

const logos = {
 "Sparta":"sparta.png",
 "Liberec":"liberec.png",
 "Pardubice":"pardubice.png",
 "Litvínov":"litvinov.png",
 "Kladno":"kladno.png",
 "Budějovice":"budejovice.png",
 "Vary":"vary.png",
 "Třinec":"trinec.png"
}

// ===== ROZPIS =====
const scheduleIndex=[
 [0,1],[3,2],[5,4],[7,6],
 [2,0],[1,3],[6,5],[4,7]
]

const scheduleList=scheduleIndex.map(([h,a])=>[teams[h],teams[a]])

// ===== RATING =====
let ratings={}
teams.forEach(t=>ratings[t]=1000)

// ===== RENDER =====
function render(){

 const cont=document.getElementById("schedule")
 cont.innerHTML=""

 scheduleList.forEach(p=>{

  cont.innerHTML+=`

  <div class="matchRow">

   <div class="teamBox">
    <img class="logo" src="./logos/${logos[p[0]]}">
    ${p[0]} ⭐ ${ratings[p[0]]}
   </div>

   <div class="scoreBox">-</div>

   <div></div>

   <div class="scoreBox">-</div>

   <div class="teamBox teamRight">
    ${p[1]} ⭐ ${ratings[p[1]]}
    <img class="logo" src="./logos/${logos[p[1]]}">
   </div>

   <div>
    <button class="statsBtn">Detail</button>
   </div>

  </div>
  `
 })

}

render()

</script>

</body>
</html>
