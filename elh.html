<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Extraliga</title>

<style>
*{box-sizing:border-box}

body{font-family:Arial;margin:0;background:#f2f2f2;}
.wrapper{max-width:1200px;margin:auto;padding:15px;background:white;}

.headerBar{
 display:flex;
 justify-content:center;
 margin-bottom:20px;
}

.seasonCard{
 background:#0b2a3c;color:white;font-size:22px;
 padding:10px 20px;border-radius:10px;
}

/* TABULKA */
.standingsCard{
 display:flex;align-items:center;justify-content:space-between;
 background:#e9ecef;border-radius:10px;padding:12px;margin-bottom:8px;
}

.rank{width:30px;font-weight:bold;text-align:center;}

.teamBlock{display:flex;align-items:center;gap:10px;flex:1;}

.logo{
 width:45px;height:45px;object-fit:contain;
 background:white;padding:2px;border-radius:6px;
}

.teamInfo{display:flex;flex-direction:column;}
.teamName{font-weight:bold;font-size:14px;}
.teamStats{font-size:12px;color:#444;}

.pointsBox{
 background:#0b2a3c;color:white;font-size:18px;font-weight:bold;
 padding:8px 12px;border-radius:8px;min-width:50px;text-align:center;
}

/* 🔥 FILTRY */
.filterBar{
 margin:15px 0;
 display:flex;
 gap:10px;
 flex-wrap:wrap;
}

.filterBar select{
 padding:8px 12px;
 border-radius:6px;
 border:none;
 font-weight:bold;
 background:#2f9ec9;
 color:white;
 cursor:pointer;
}

/* MATCH */
.matchRow{
 background:#e9ecef;
 padding:12px;
 margin-bottom:8px;
 border-radius:10px;
 display:flex;
 flex-direction:column;
 gap:10px;
}

.teamBox{
 display:flex;
 align-items:center;
 gap:8px;
 font-weight:bold;
 font-size:14px;
}

.scoreBox{
 background:#0b2a3c;color:white;
 font-size:18px;font-weight:bold;
 padding:6px 10px;
 border-radius:6px;
 min-width:45px;
 text-align:center;
}

.middleBox{
 text-align:center;
 font-size:12px;
}

.periods{color:#333;}

.winTag{
 font-size:11px;
 font-weight:bold;
 color:#fff;
 background:#2f9ec9;
 padding:3px 6px;
 border-radius:6px;
 display:inline-block;
 margin-top:3px;
}

.btn{
 border:none;
 border-radius:6px;
 cursor:pointer;
 width:100%;
 font-weight:bold;
 height:38px;
 display:flex;
 align-items:center;
 justify-content:center;
 font-size:14px;
}

.detailBtn{background:#2f9ec9;color:white;}
.betBtn{background:#27ae60;color:white;}

.btnWrap{
 display:flex;
 flex-direction:column;
 gap:6px;
}

/* DESKTOP */
@media(min-width:768px){

.matchRow{
 display:grid;
 grid-template-columns: 1fr 80px 180px 80px 1fr 120px;
 align-items:start;
}

.homeTeam{grid-column:1;}
.homeScore{grid-column:2;}
.middleBox{grid-column:3;}
.awayScore{grid-column:4;}
.awayTeam{grid-column:5; justify-content:flex-end; text-align:right;}
.btnWrap{grid-column:6;}

.scoreBox{min-width:80px;}

}
</style>
</head>

<body>

<div class="wrapper">

<div class="headerBar">
<div class="seasonCard">Extraliga</div>
</div>

<h2>Tabulka</h2>
<div id="standings"></div>

<!-- 🔥 FILTRY -->
<div class="filterBar">

<select id="teamFilter">
<option value="all">Všechny týmy</option>
</select>

<select id="matchFilter">
<option value="all">Všechny zápasy</option>
<option value="played">Jen odehrané</option>
<option value="unplayed">Jen neodehrané</option>
</select>

</div>

<h2>Rozpis zápasů</h2>
<div id="schedule"></div>

</div>

<script type="module">

import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient(
  "https://qaocbodrflsaerxntfui.supabase.co",
  "sb_publishable_eIeO9MihyuQDuNHy60Ubrw_8ZuSKPFU"
)

const SEASON_ID = "4b05b50e-cfde-4473-aebe-33495c85a989"

let currentMatchFilter = "all"
let currentTeamFilter = "all"

document.getElementById("matchFilter").onchange = (e)=>{
 currentMatchFilter = e.target.value
 load()
}

document.getElementById("teamFilter").onchange = (e)=>{
 currentTeamFilter = e.target.value
 load()
}

async function load(){

 const { data: seasonTeams } = await supabase
  .from("season_teams")
  .select("team_id")
  .eq("season_id", SEASON_ID)

 const teamIds = (seasonTeams || []).map(t => t.team_id)

 let teams = []
 if(teamIds.length > 0){
  const res = await supabase
   .from("teams")
   .select("*")
   .in("id", teamIds)
  teams = res.data || []
 }

 const { data: matches } = await supabase
  .from("matches")
  .select("*")
  .eq("season_id", SEASON_ID)

 const teamMap = {}
 teams.forEach(t=> teamMap[t.id] = t)

 // 🔥 naplnění dropdownu týmů
 const tf = document.getElementById("teamFilter")
 if(tf.options.length === 1){
  teams.forEach(t=>{
   const opt = document.createElement("option")
   opt.value = t.id
   opt.textContent = t.name
   tf.appendChild(opt)
  })
 }

 let safeMatches = matches || []
 safeMatches.sort((a,b)=> Number(a.round) - Number(b.round))

 // 🔥 TEAM FILTER
 if(currentTeamFilter !== "all"){
  safeMatches = safeMatches.filter(m =>
   m.home_team === currentTeamFilter ||
   m.away_team === currentTeamFilter
  )
 }

 // 🔥 MATCH FILTER
 if(currentMatchFilter === "played"){
  safeMatches = safeMatches.filter(m => m.played)
 }
 else if(currentMatchFilter === "unplayed"){
  safeMatches = safeMatches.filter(m => !m.played)
 }

 render(safeMatches, teamMap)
 renderTable(matches || [], teamMap, teams)
}

function renderTable(matches, teamMap, teams){

 let table = {}

 teams.forEach(t=>{
  table[t.id] = {
    team:t.id,b:0,z:0,
    v:0,p:0,
    vp:0,pp:0,
    vsn:0,psn:0,
    gf:0,ga:0
  }
 })

 matches.forEach(m=>{
  if(m.home_score == null || m.away_score == null) return

  const h = table[m.home_team]
  const a = table[m.away_team]
  if(!h || !a) return

  const hg = Number(m.home_score)
  const ag = Number(m.away_score)

  h.z++; a.z++
  h.gf+=hg; h.ga+=ag
  a.gf+=ag; a.ga+=hg

  let stats = null
  try{ stats = m.stats ? JSON.parse(m.stats) : null }catch(e){}

  const isSN = stats && (stats[20] === "1" || stats[20] === "2")
  const isOT = stats && !isSN && (stats[9] === "11" || stats[19] === "11")

  if(isSN){
    if(hg>ag){ h.vsn++; h.b+=2; a.psn++; a.b+=1 }
    else{ a.vsn++; a.b+=2; h.psn++; h.b+=1 }
  }
  else if(isOT){
    if(hg>ag){ h.vp++; h.b+=2; a.pp++; a.b+=1 }
    else{ a.vp++; a.b+=2; h.pp++; h.b+=1 }
  }
  else{
    if(hg>ag){ h.v++; h.b+=3; a.p++ }
    else{ a.v++; a.b+=3; h.p++ }
  }

 })

 const arr = Object.values(table).sort((a,b)=>{
  if(b.b!==a.b) return b.b-a.b
  return (b.gf-b.ga)-(a.gf-a.ga)
 })

 const cont = document.getElementById("standings")
 cont.innerHTML=""

 arr.forEach((t,i)=>{
  const team = teamMap[t.team]
  if(!team) return

  cont.innerHTML+=`
  <div class="standingsCard">
   <div class="rank">${i+1}</div>

   <div class="teamBlock">
    <img class="logo" src="./logos/${team.logo}">
    <div class="teamInfo">
     <div class="teamName">${team.name}</div>
     <div class="teamStats">
      Skóre ${t.gf}:${t.ga} | +/- ${t.gf-t.ga} |
      Z ${t.z} | V ${t.v} | P ${t.p} |
      VP ${t.vp} | PP ${t.pp} |
      VSN ${t.vsn} | PSN ${t.psn}
     </div>
    </div>
   </div>

   <div class="pointsBox">${t.b}</div>
  </div>
  `
 })

}

function render(matches, teamMap){

 const cont = document.getElementById("schedule")
 cont.innerHTML=""

 matches.forEach(m=>{

  const home = teamMap[m.home_team]
  const away = teamMap[m.away_team]
  if(!home || !away) return

  let stats = null
  try{ stats = m.stats ? JSON.parse(m.stats) : null }catch(e){}

  let periods = ""
  let tag = ""

  if(stats){
    const h1 = Number(stats[16]||0)
    const h2 = Number(stats[17]||0)
    const h3 = Number(stats[18]||0)

    const a1 = Number(stats[6]||0)
    const a2 = Number(stats[7]||0)
    const a3 = Number(stats[8]||0)

    periods = `(${h1}:${a1}, ${h2}:${a2}, ${h3}:${a3})`

    const isSN = stats[20] === "1" || stats[20] === "2"
    const isOT = !isSN && (stats[9] === "11" || stats[19] === "11")

    if(isSN) tag = "SN"
    else if(isOT) tag = "OT"
  }

  const homeScore = m.home_score ?? "-"
  const awayScore = m.away_score ?? "-"

  cont.innerHTML+=`
  <div class="matchRow">

    <div class="teamBox homeTeam">
      <img class="logo" src="./logos/${home.logo}">
      <div>${home.name}</div>
    </div>

    <div class="scoreBox homeScore">${homeScore}</div>

    <div class="middleBox">
      <div class="periods">${periods}</div>
      ${tag ? `<div class="winTag">${tag}</div>` : ``}
    </div>

    <div class="scoreBox awayScore">${awayScore}</div>

    <div class="teamBox awayTeam">
      <div>${away.name}</div>
      <img class="logo" src="./logos/${away.logo}">
    </div>

    <div class="btnWrap">
      <button class="btn detailBtn"
        onclick="window.location.href='statistiky-zapasu.html?id=${m.id}'">
        Detail
      </button>

      <button class="btn betBtn"
        onclick="window.location.href='vsad-si.html?id=${m.id}'">
        Vsaď si
      </button>
    </div>

  </div>
  `
 })

}

load()

</script>

</body>
</html>
