<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Extraliga</title>

<style>
*{box-sizing:border-box}

body{
 font-family:Arial;
 margin:0;
 background:#f2f2f2;
}

.wrapper{
 max-width:1200px;
 margin:auto;
 padding:15px;
 background:white;
}

/* HEADER */
.headerBar{
 display:flex;
 align-items:center;
 justify-content:space-between;
 background:#e9ecef;
 border-radius:12px;
 padding:15px;
 margin-bottom:20px;
}

.headerBar img{height:80px;}

.seasonCard{
 background:#0b2a3c;
 color:white;
 font-size:22px;
 padding:10px 20px;
 border-radius:10px;
}

/* TABULKA */
.standingsCard{
 display:flex;
 align-items:center;
 justify-content:space-between;
 background:#e9ecef;
 border-radius:10px;
 padding:12px;
 margin-bottom:8px;
}

.rank{
 width:30px;
 font-weight:bold;
 text-align:center;
}

.teamBlock{
 display:flex;
 align-items:center;
 gap:12px;
 flex:1;
}

.logo{
 width:45px;
 height:45px;
 object-fit:contain;
 background:white;
 padding:2px;
 border-radius:6px;
}

.teamInfo{
 display:flex;
 flex-direction:column;
}

.teamName{font-weight:bold;}

.teamStats{
 font-size:12px;
 color:#444;
}

.pointsBox{
 background:#0b2a3c;
 color:white;
 font-size:18px;
 font-weight:bold;
 padding:8px 12px;
 border-radius:8px;
 min-width:50px;
 text-align:center;
}

/* MATCH */
.matchRow{
 display:grid;
 grid-template-columns:1fr 60px 40px 1fr;
 grid-template-areas:
  "home scoreH tagH away"
  "periods periods periods periods"
  "buttons buttons buttons buttons";
 align-items:center;
 background:#e9ecef;
 padding:10px;
 margin-bottom:6px;
 border-radius:6px;
 gap:6px;
}

.teamBox{
 display:flex;
 align-items:center;
 gap:8px;
 font-weight:bold;
}

.teamRight{
 justify-content:flex-end;
}

.scoreBox{
 background:#0b2a3c;
 color:white;
 font-size:18px;
 font-weight:bold;
 padding:6px 0;
 border-radius:6px;
 text-align:center;
}

.periods{
 grid-area:periods;
 text-align:center;
 font-size:12px;
 color:#333;
}

.winTag{
 font-size:12px;
 font-weight:bold;
 color:#fff;
 background:#2f9ec9;
 padding:3px 8px;
 border-radius:8px;
 text-align:center;
}

.emptyTag{min-width:30px;}

.buttons{
 grid-area:buttons;
 display:flex;
 gap:8px;
}

.btn{
 border:none;
 padding:8px;
 border-radius:6px;
 cursor:pointer;
 width:100%;
 font-weight:bold;
}

.detailBtn{background:#2f9ec9;color:white;}
.betBtn{background:#27ae60;color:white;}

/* ===== TABLET ===== */
@media(min-width:768px){

.headerBar img{height:100px;}

.matchRow{
 grid-template-columns:1fr 70px 40px 150px 40px 70px 1fr 120px;
 grid-template-areas:none;
}

.periods{
 grid-area:auto;
}

.buttons{
 grid-area:auto;
 flex-direction:column;
}

}

/* ===== DESKTOP ===== */
@media(min-width:1024px){

.wrapper{padding:20px;}

.matchRow{
 grid-template-columns:1fr 90px 50px 200px 50px 90px 1fr 120px;
}

.scoreBox{font-size:20px;}
.pointsBox{font-size:20px;}

}

</style>
</head>

<body>

<div class="wrapper">

<div class="headerBar">
<img src="img/extraliga.jpg">
<div class="seasonCard">Extraliga</div>
</div>

<h2>Tabulka</h2>
<div id="standings"></div>

<h2>Rozpis zápasů</h2>
<div id="schedule"></div>

</div>

<script type="module">

import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient(
  "https://qaocbodrflsaerxntfui.supabase.co",
  "sb_publishable_eIeO9MihyuQDuNHy60Ubrw_8ZuSKPFU"
)

const SEASON_ID = "4b05b50e-cfde-4473-aebe-33495c85a989"

async function load(){

 const { data: seasonTeams } = await supabase
  .from("season_teams")
  .select("team_id")
  .eq("season_id", SEASON_ID)

 const teamIds = (seasonTeams || []).map(t => t.team_id)

 let teams = []
 if(teamIds.length > 0){
  const res = await supabase
   .from("teams")
   .select("*")
   .in("id", teamIds)
  teams = res.data || []
 }

 const { data: matches } = await supabase
  .from("matches")
  .select("*")
  .eq("season_id", SEASON_ID)

 const teamMap = {}
 teams.forEach(t=> teamMap[t.id] = t)

 const safeMatches = matches || []
 safeMatches.sort((a,b)=> Number(a.round) - Number(b.round))

 render(safeMatches, teamMap)
 renderTable(safeMatches, teamMap, teams)
}

/* TABULKA */
function renderTable(matches, teamMap, teams){

 let table = {}

 teams.forEach(t=>{
  table[t.id] = {
    team:t.id,b:0,z:0,
    v:0,p:0,
    vp:0,pp:0,
    vsn:0,psn:0,
    gf:0,ga:0
  }
 })

 matches.forEach(m=>{
  if(m.home_score == null || m.away_score == null) return

  const h = table[m.home_team]
  const a = table[m.away_team]
  if(!h || !a) return

  const hg = Number(m.home_score)
  const ag = Number(m.away_score)

  h.z++; a.z++
  h.gf+=hg; h.ga+=ag
  a.gf+=ag; a.ga+=hg

  if(hg>ag){ h.v++; h.b+=3; a.p++ }
  else{ a.v++; a.b+=3; h.p++ }

 })

 const arr = Object.values(table).sort((a,b)=> b.b-a.b)

 const cont = document.getElementById("standings")
 cont.innerHTML=""

 arr.forEach((t,i)=>{
  const team = teamMap[t.team]
  if(!team) return

  cont.innerHTML+=`
  <div class="standingsCard">
   <div class="rank">${i+1}</div>

   <div class="teamBlock">
    <img class="logo" src="./logos/${team.logo}">
    <div class="teamInfo">
     <div class="teamName">${team.name}</div>
     <div class="teamStats">
      Skóre ${t.gf}:${t.ga} | Z ${t.z}
     </div>
    </div>
   </div>

   <div class="pointsBox">${t.b}</div>
  </div>
  `
 })

}

/* MATCH */
function render(matches, teamMap){

 const cont = document.getElementById("schedule")
 cont.innerHTML=""

 matches.forEach(m=>{

  const home = teamMap[m.home_team]
  const away = teamMap[m.away_team]
  if(!home || !away) return

  const homeScore = m.home_score ?? "-"
  const awayScore = m.away_score ?? "-"

  cont.innerHTML+=`
  <div class="matchRow">

   <div class="teamBox">
    <img class="logo" src="./logos/${home.logo}">
    <div>${home.name}</div>
   </div>

   <div class="scoreBox">${homeScore}</div>
   <div></div>

   <div class="teamBox teamRight">
    <div>${away.name}</div>
    <img class="logo" src="./logos/${away.logo}">
   </div>

   <div class="periods"></div>

   <div class="buttons">
    <button class="btn detailBtn"
     onclick="window.location.href='statistiky-zapasu.html?id=${m.id}'">
     Detail
    </button>

    <button class="btn betBtn"
     onclick="window.location.href='vsad-si.html?id=${m.id}'">
     Vsaď si
    </button>
   </div>

  </div>
  `
 })

}

load()

</script>

</body>
</html>
