<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Extraliga</title>

<style>
*{box-sizing:border-box}

body{font-family:Arial;margin:0;background:#f2f2f2;}
.wrapper{max-width:1200px;margin:auto;padding:20px;background:white;}

.headerBar{
 display:flex;align-items:center;justify-content:space-between;
 background:#e9ecef;border-radius:12px;padding:20px;margin-bottom:25px;
}

.headerBar img{height:110px;}

.seasonCard{
 background:#0b2a3c;color:white;font-size:26px;
 padding:14px 28px;border-radius:10px;
}

.matchRow{
 display:grid;
 grid-template-columns:1fr 70px 220px 70px 1fr 120px;
 align-items:center;background:#e9ecef;
 padding:10px;margin-bottom:5px;border-radius:6px;gap:8px;
}

.teamBox{display:flex;align-items:center;gap:10px;font-weight:bold;}
.teamRight{justify-content:flex-end;}

.logo{
 width:50px;height:50px;object-fit:contain;
 background:white;padding:2px;border-radius:6px;
}

.scoreBox{
 background:#0b2a3c;color:white;
 font-size:22px;font-weight:bold;
 padding:8px 0;border-radius:6px;text-align:center;
}

.statsBtn{
 background:#2f9ec9;color:white;border:none;
 padding:8px;border-radius:6px;cursor:pointer;width:100%;
}
</style>
</head>

<body>

<div class="wrapper">

<div class="headerBar">
<img src="img/extraliga.jpg">
<div class="seasonCard">Extraliga</div>
</div>

<h2>Rozpis zápasů</h2>
<div id="schedule"></div>

</div>

<script type="module">

import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient(
  "https://qacobodrfsaerxntfui.supabase.co",
  "sb_publishable_eIeO9MihyuQDuNHy60Ubrw_8ZuSKPFU"
)

// ===== RATING =====
let ratings = {}

// ===== LOAD =====
async function load(){

 // načti týmy
 const { data: teams } = await supabase.from("teams").select("*")

 // mapování ID → data
 const teamMap = {}
 teams.forEach(t=>{
  teamMap[t.id] = t
  ratings[t.name] = 1000
 })

 // načti zápasy
 const { data: matches } = await supabase
  .from("matches")
  .select("*")

 console.log("MATCHES:", matches)

 render(matches, teamMap)
}

// ===== RENDER =====
function render(matches, teamMap){

 const cont = document.getElementById("schedule")
 cont.innerHTML=""

 matches.forEach(m=>{

  const home = teamMap[m.home_team]
  const away = teamMap[m.away_team]

  cont.innerHTML+=`

  <div class="matchRow">

   <div class="teamBox">
    <img class="logo" src="./logos/${home.logo}">
    <div>
     ${home.name}
     <div style="font-size:12px;color:#666;">
      ⭐ ${ratings[home.name]}
     </div>
    </div>
   </div>

   <div class="scoreBox">${m.played ? m.home_score : "-"}</div>

   <div></div>

   <div class="scoreBox">${m.played ? m.away_score : "-"}</div>

   <div class="teamBox teamRight">
    <div style="text-align:right">
     ${away.name}
     <div style="font-size:12px;color:#666;">
      ⭐ ${ratings[away.name]}
     </div>
    </div>
    <img class="logo" src="./logos/${away.logo}">
   </div>

   <div>
    <button class="statsBtn"
    onclick="window.location.href='vsad-si.html?id=${m.id}'">
    Detail
    </button>
   </div>

  </div>
  `
 })

}

load()

</script>

</body>
</html>
