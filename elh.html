<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Extraliga U dvou Blbounů</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}
body{font-family:Arial;margin:0;background:#f2f2f2;}
.wrapper{max-width:1200px;margin:auto;padding:15px;background:white;}

.headerBar{background:linear-gradient(135deg,#0b2a3c 0%,#1a5276 100%);border-radius:14px;padding:10px 24px;margin-bottom:24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;}
.headerLeft{display:flex;align-items:center;gap:16px;}
.headerLogo{width:48px;height:48px;object-fit:contain;mix-blend-mode:lighten;flex-shrink:0;}
.headerTitle{font-family:'Rajdhani',sans-serif;font-size:26px;font-weight:700;color:white;letter-spacing:.5px;line-height:1.2;}

.season-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;}
.season-tab{padding:8px 18px;border-radius:20px;border:2px solid #c8d8e8;background:white;font-family:Arial;font-size:13px;font-weight:700;cursor:pointer;color:#1a3a5c;transition:all .15s;}
.season-tab:hover{background:#dce8f5;border-color:#2f9ec9;}
.season-tab.active{background:#0b2a3c;color:white;border-color:#0b2a3c;}

.sectionTitle{font-size:17px;font-weight:700;color:#0b2a3c;margin:0 0 12px;display:flex;align-items:center;gap:8px;}
.sectionTitle::after{content:'';flex:1;height:2px;background:linear-gradient(90deg,#2f9ec9,transparent);border-radius:2px;}

.table-scroll{overflow-x:auto;margin-bottom:28px;}
.standings-table{width:100%;border-collapse:collapse;font-size:13px;min-width:750px;}
.standings-table thead tr{background:#0b2a3c;color:white;}
.standings-table thead th{padding:10px 8px;text-align:center;font-size:11px;font-weight:700;letter-spacing:.05em;white-space:nowrap;}
.standings-table thead th.th-team{text-align:left;padding-left:10px;}
.standings-table tbody tr{border-bottom:1px solid #e0e0e0;transition:background .15s;}
.standings-table tbody tr:hover{background:#f0f4f8;}
.standings-table tbody tr:nth-child(odd){background:#f7f8fa;}
.standings-table tbody tr:nth-child(odd):hover{background:#edf2f7;}
.standings-table tbody td{padding:8px 8px;text-align:center;color:#333;white-space:nowrap;vertical-align:middle;}

.td-rating{text-align:center;font-size:11px;color:#666;font-weight:600;line-height:1.8;padding:6px 6px;width:60px;}
.td-rank{font-weight:700;color:#0b2a3c;font-size:14px;width:52px;white-space:nowrap;vertical-align:middle;}
.rank-wrap{display:inline-flex;align-items:center;gap:4px;}
.move-badge{display:inline-flex;align-items:center;gap:1px;font-size:10px;font-weight:800;line-height:1;}
.move-up .move-arrow{color:#22c55e;}
.move-up .move-num{color:#22c55e;font-size:9px;}
.move-down .move-arrow{color:#ef4444;}
.move-down .move-num{color:#ef4444;font-size:9px;}

.td-team{text-align:left;padding-left:8px;}
.team-cell{display:flex;align-items:center;gap:10px;}
.team-logo{width:32px;height:32px;object-fit:contain;background:white;border-radius:6px;padding:2px;border:1px solid #e0e0e0;flex-shrink:0;}
.team-name{font-weight:700;font-size:13px;color:#111;}
.points-pill{background:#0b2a3c;border-radius:6px;padding:4px 10px;display:inline-block;min-width:34px;text-align:center;color:white;font-weight:800;font-size:14px;}

.td-score{font-weight:600;color:#333;}
.td-pm{font-weight:600;}
.td-pm.pos{color:#27ae60;}
.td-pm.neg{color:#e74c3c;}
.td-pm.neu{color:#888;}
.td-wins{color:#27ae60;font-weight:700;}
.td-losses{color:#e74c3c;font-weight:700;}
.td-num{color:#555;font-weight:600;}

.filterBar{margin:0 0 16px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
.filterBar select{padding:8px 14px;border-radius:8px;border:none;font-weight:700;font-size:13px;background:#0b2a3c;color:white;cursor:pointer;}

@media (max-width: 1400px) {
  #libor { display: none; }
}
 
.match-table{width:100%;border-collapse:collapse;margin-bottom:8px;}
.match-table thead tr{background:#0b2a3c;color:white;}
.match-table thead th{padding:12px 10px;text-align:center;font-size:12px;letter-spacing:.05em;white-space:nowrap;}
.match-table thead th.th-left{text-align:left;}
.match-table tbody tr{border-bottom:1px solid #e8e8e8;transition:background .15s;}
.match-table tbody tr:nth-child(odd) td{background:#f7f8fa;}
.match-table tbody tr:hover td{background:#edf2f7;}
.match-table tbody td{padding:10px 10px;text-align:center;vertical-align:middle;font-size:13px;color:#333;}
.match-table tbody td.td-left{text-align:left;}

.round-badge{display:inline-block;background:#e9ecef;color:#0b2a3c;font-weight:700;font-size:12px;padding:3px 10px;border-radius:20px;min-width:36px;text-align:center;}
.match-logo{width:28px;height:28px;object-fit:contain;background:white;border-radius:5px;padding:2px;border:1px solid #e0e0e0;flex-shrink:0;}
.match-team-cell{display:flex;align-items:center;gap:8px;}
.match-team-name{font-weight:600;font-size:13px;}
.score-cell{display:flex;flex-direction:column;align-items:center;gap:3px;}
.score-badge{display:inline-block;background:#0b2a3c;color:white;font-weight:700;font-size:14px;padding:4px 12px;border-radius:6px;min-width:60px;text-align:center;}
.score-badge.empty{background:#e0e0e0;color:#999;font-weight:400;font-size:13px;}
.result-tag{display:inline-block;font-size:10px;font-weight:700;background:#2f9ec9;color:white;padding:2px 6px;border-radius:4px;}
.periods-small{font-size:11px;color:#888;}
.btn-wrap{display:flex;gap:6px;justify-content:center;}
.btn{display:inline-flex;align-items:center;gap:5px;border:none;border-radius:8px;cursor:pointer;font-weight:700;font-size:13px;padding:8px 14px;transition:all .15s;white-space:nowrap;}
.btn-detail{background:#1a5276;color:white;}
.btn-detail:hover{background:#0b2a3c;}
.btn-bet{background:#27ae60;color:white;}
.btn-bet:hover{background:#219a52;}
.played-row td{background:#f0fdf4 !important;}
.played-row:hover td{background:#e0f7e9 !important;}
.loading{text-align:center;padding:30px;color:#888;font-size:14px;}
</style>
</head>

<body>
<script src="./ticker.js" defer></script>
<script src="./menu.js" defer></script>
<div class="wrapper">

<div class="headerBar">
 <div class="headerLeft">
  <img class="headerLogo" src="./logos/lokomotiva.png" alt="logo">
  <div class="headerTitle">Extraliga U dvou Blbounů</div>
 </div>
</div>

<div class="season-tabs" id="seasonTabs"></div>

<div class="season-tabs" id="subTabs" style="margin-bottom:20px;">
  <button class="season-tab active" onclick="setSubTab('current',this)">📋 Aktuální sezóna</button>
  <button class="season-tab" onclick="setSubTab('history',this)">🏆 Základní část — historické pořadí</button>
</div>

<div id="subCurrent">
<div class="sectionTitle">Tabulka</div>
<div class="table-scroll">
<table class="standings-table">
 <thead>
  <tr>
   <th style="width:60px" title="Rating celkový / forma">⭐🔥</th>
   <th style="width:52px">#</th>
   <th class="th-team">Tým</th>
   <th style="width:60px">Body</th>
   <th>Skóre</th>
   <th title="+/-">+/-</th>
   <th title="Zápasy">Z</th>
   <th title="Výhry">V</th>
   <th title="Prohry">P</th>
   <th title="Výhra po prodloužení">VP</th>
   <th title="Prohra po prodloužení">PP</th>
   <th title="Výhra po nájezdech">VSN</th>
   <th title="Prohra po nájezdech">PSN</th>
  </tr>
 </thead>
 <tbody id="standings"><tr><td colspan="13" class="loading">Načítám...</td></tr></tbody>
</table>
</div>

</div><!-- end subCurrent -->

<div id="subHistory" style="display:none;">
  <div class="sectionTitle">🏆 Historické pořadí — Základní část</div>
  <div class="table-scroll">
    <table class="standings-table" id="historyTable">
      <thead>
        <tr>
          <th style="width:40px">#</th>
          <th class="th-team">Tým</th>
          <th title="Body">Body</th>
          <th title="Zápasy">Z</th>
          <th title="Výhry v základní době">V</th>
          <th title="Prohry v základní době">P</th>
          <th title="Výhra po prodloužení">VOT</th>
          <th title="Prohra po prodloužení">POT</th>
          <th title="Výhra po nájezdech">VSN</th>
          <th title="Prohra po nájezdech">PSN</th>
          <th title="Skóre celkem">Skóre</th>
          <th title="Rozdíl gólů">+/-</th>
          <th title="Průměr gólů na zápas">Průměr G/Z</th>
          <th title="Počet sezón">Sezóny</th>
          <th title="Nejlepší umístění">Nejl. místo</th>
        </tr>
      </thead>
      <tbody id="historyBody"><tr><td colspan="15" class="loading">Načítám...</td></tr></tbody>
    </table>
  </div>
</div>

<div class="filterBar"> <select id="teamFilter"><option value="all">Všechny týmy</option></select>
 <select id="matchFilter">
  <option value="all">Všechny zápasy</option>
  <option value="played">Jen odehrané</option>
  <option value="unplayed">Jen neodehrané</option>
 </select>
</div>

<div class="sectionTitle">Rozpis zápasů</div>
<table class="match-table">
 <thead>
  <tr>
   <th style="width:60px">Kolo</th>
   <th class="th-left">Domácí</th>
   <th class="th-left">Hosté</th>
   <th style="width:160px">Skóre</th>
   <th style="width:220px">Akce</th>
  </tr>
 </thead>
 <tbody id="schedule"></tbody>
</table>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient(
 "https://qaocbodrflsaerxntfui.supabase.co",
 "sb_publishable_eIeO9MihyuQDuNHy60Ubrw_8ZuSKPFU"
)

const DEFAULT_SEASON_ID = "4b05b50e-cfde-4473-aebe-33495c85a989"
const EXTRALIGA_COMPETITION_ID = "5cc76adb-b3e0-404b-9095-7dd4a41edb4e"

let currentSeasonId = DEFAULT_SEASON_ID
let currentStageId  = null
let currentMatchFilter = "all"
let currentTeamFilter  = "all"
const zakladniStageMap = {}

document.getElementById("matchFilter").onchange = e=>{ currentMatchFilter=e.target.value; load() }
document.getElementById("teamFilter").onchange  = e=>{ currentTeamFilter=e.target.value; load() }

async function initSeasons(){
 const {data:seasons}=await supabase.from("seasons").select("*").eq("competition_id",EXTRALIGA_COMPETITION_ID).order("created_at",{ascending:true})
 if(!seasons||!seasons.length) return

 const {data:stages}=await supabase.from("stages").select("id,season_id,name").in("season_id",seasons.map(s=>s.id)).eq("name","Základní část")
 ;(stages||[]).forEach(s=>zakladniStageMap[s.season_id]=s.id)

 const tabsEl=document.getElementById("seasonTabs")
 tabsEl.innerHTML=""
 seasons.forEach(s=>{
  const btn=document.createElement("button")
  btn.className="season-tab"+(s.id===currentSeasonId?" active":"")
  btn.textContent=s.name
  btn.onclick=()=>{
   currentSeasonId=s.id; currentStageId=zakladniStageMap[s.id]||null
   currentTeamFilter="all"; currentMatchFilter="all"
   document.getElementById("matchFilter").value="all"
   const tf=document.getElementById("teamFilter"); tf.innerHTML='<option value="all">Všechny týmy</option>'
   tabsEl.querySelectorAll(".season-tab").forEach(b=>b.classList.remove("active"))
   btn.classList.add("active"); load()
  }
  tabsEl.appendChild(btn)
 })
 currentStageId=zakladniStageMap[currentSeasonId]||null
}

async function load(){
 const {data:seasonTeams}=await supabase.from("season_teams").select("team_id").eq("season_id",currentSeasonId)
 const teamIds=(seasonTeams||[]).map(t=>t.team_id)

 let teams=[]
 if(teamIds.length>0){
  const res=await supabase.from("teams").select("*").in("id",teamIds)
  teams=res.data||[]
 }
 const teamMap={}
 teams.forEach(t=>teamMap[t.id]=t)

 let query=supabase.from("matches").select("*").eq("season_id",currentSeasonId)
 if(currentStageId) query=query.eq("stage_id",currentStageId)
 const {data:seasonMatches}=await query

 const tf=document.getElementById("teamFilter")
 if(tf.options.length===1){
  teams.forEach(t=>{ const o=document.createElement("option"); o.value=t.id; o.textContent=t.name; tf.appendChild(o) })
 }

 let safeMatches=(seasonMatches||[])
 safeMatches.sort((a,b)=>Number(a.round)-Number(b.round))
 if(currentTeamFilter!=="all") safeMatches=safeMatches.filter(m=>m.home_team===currentTeamFilter||m.away_team===currentTeamFilter)
 if(currentMatchFilter==="played") safeMatches=safeMatches.filter(m=>m.played)
 if(currentMatchFilter==="unplayed") safeMatches=safeMatches.filter(m=>!m.played)

 const tableMatches=(seasonMatches||[]).filter(m=>m.home_score!=null&&m.away_score!=null)
 renderTable(tableMatches,teamMap,teams)
 render(safeMatches,teamMap)
}

function renderTable(matches, teamMap, teams){
 let table={}
 teams.forEach(t=>{ table[t.id]={team:t.id,b:0,z:0,v:0,p:0,vp:0,pp:0,vsn:0,psn:0,gf:0,ga:0} })

 matches.forEach(m=>{
  const h=table[m.home_team], a=table[m.away_team]
  if(!h||!a) return
  const hg=Number(m.home_score), ag=Number(m.away_score)
  h.z++;a.z++; h.gf+=hg;h.ga+=ag; a.gf+=ag;a.ga+=hg
  let stats=null
  try{stats=m.stats?JSON.parse(m.stats):null}catch(e){}
  const isSN=stats&&(stats[20]==="1"||stats[20]==="2")
  const isOT=stats&&!isSN&&(stats[9]==="11"||stats[19]==="11")
  if(isSN||isOT){
   if(hg>ag){h.vsn++;h.b+=2;a.psn++;a.b+=1} else{a.vsn++;a.b+=2;h.psn++;h.b+=1}
  }else{
   if(hg>ag){h.v++;h.b+=3;a.p++} else{a.v++;a.b+=3;h.p++}
  }
 })

 const arr=Object.values(table).sort((a,b)=>{
  if(b.b!==a.b) return b.b-a.b
  return (b.gf-b.ga)-(a.gf-a.ga)
 })

 const tbody=document.getElementById("standings")
 tbody.innerHTML=""
 if(!arr.length){ tbody.innerHTML=`<tr><td colspan="13" class="loading">Žádná data.</td></tr>`; return }

 arr.forEach((t,i)=>{
  const team=teamMap[t.team]
  if(!team) return
  const pm=t.gf-t.ga
  const pmStr=pm>0?`+${pm}`:String(pm)
  const pmClass=pm>0?"pos":pm<0?"neg":"neu"
  const elo=team.rating_overall||1000
  const form=team.rating_form||1000

  const prev=team.table_position_prev||0
  const curr=i+1
  let moveHtml=''
  if(prev>0 && prev!==curr){
   const diff=prev-curr
   if(diff>0) moveHtml=`<span class="move-badge move-up"><span class="move-arrow">▲</span><span class="move-num">${diff}</span></span>`
   else       moveHtml=`<span class="move-badge move-down"><span class="move-arrow">▼</span><span class="move-num">${Math.abs(diff)}</span></span>`
  }

  const tr=document.createElement("tr")
  tr.innerHTML=`
   <td class="td-rating">⭐ ${elo}<br>🔥 ${form}</td>
   <td class="td-rank"><span class="rank-wrap"><span>${curr}</span>${moveHtml}</span></td>
   <td class="td-team"><div class="team-cell"><img class="team-logo" src="./logos/${team.logo}" alt="${team.name}"><div class="team-name">${team.name}</div></div></td>
   <td><span class="points-pill">${t.b}</span></td>
   <td class="td-score">${t.gf}:${t.ga}</td>
   <td class="td-pm ${pmClass}">${pmStr}</td>
   <td class="td-num">${t.z}</td>
   <td class="td-wins">${t.v}</td>
   <td class="td-losses">${t.p}</td>
   <td class="td-num">${t.vp}</td>
   <td class="td-num">${t.pp}</td>
   <td class="td-num">${t.vsn}</td>
   <td class="td-num">${t.psn}</td>
  `
  tbody.appendChild(tr)
 })
}

function render(matches, teamMap){
 const cont=document.getElementById("schedule")
 cont.innerHTML=""
 if(!matches.length){ cont.innerHTML=`<tr><td colspan="5" class="loading">Žádné zápasy.</td></tr>`; return }

 matches.forEach(m=>{
  const home=teamMap[m.home_team], away=teamMap[m.away_team]
  if(!home||!away) return
  let stats=null
  try{stats=m.stats?JSON.parse(m.stats):null}catch(e){}
  let periods="",tag=""
  if(stats){
   const h1=Number(stats[16]||0),h2=Number(stats[17]||0),h3=Number(stats[18]||0)
   const a1=Number(stats[6]||0),a2=Number(stats[7]||0),a3=Number(stats[8]||0)
   periods=`${h1}:${a1} · ${h2}:${a2} · ${h3}:${a3}`
   const isSN=stats[20]==="1"||stats[20]==="2"
   const isOT=!isSN&&(stats[9]==="11"||stats[19]==="11")
   if(isSN) tag="SN"; else if(isOT) tag="OT"
  }
  const played=m.home_score!=null
  const tr=document.createElement("tr")
  tr.className=played?"played-row":""
  tr.innerHTML=`
   <td><span class="round-badge">${m.round}</span></td>
   <td class="td-left"><div class="match-team-cell"><img class="match-logo" src="./logos/${home.logo}"><span class="match-team-name">${home.name}</span></div></td>
   <td class="td-left"><div class="match-team-cell"><img class="match-logo" src="./logos/${away.logo}"><span class="match-team-name">${away.name}</span></div></td>
   <td><div class="score-cell">
    <span class="score-badge ${played?"":"empty"}">${played?m.home_score+" : "+m.away_score:"- : -"}</span>
    ${tag?`<span class="result-tag">${tag}</span>`:""}
    ${played&&periods?`<span class="periods-small">${periods}</span>`:""}
   </div></td>
   <td><div class="btn-wrap">
    <button class="btn btn-detail" onclick="window.location.href='statistiky-zapasu.html?id=${m.id}'">📊 Statistiky</button>
    <button class="btn btn-bet" onclick="window.location.href='vsad-si.html?id=${m.id}'">🎲 Vsaď si</button>
   </div></td>
  `
  cont.appendChild(tr)
 })
}

window.setSubTab = function(tab, btn){
  document.querySelectorAll('#subTabs .season-tab').forEach(b=>b.classList.remove('active'))
  btn.classList.add('active')
  document.getElementById('subCurrent').style.display = tab==='current'?'':'none'
  document.getElementById('subHistory').style.display  = tab==='history'?'':'none'
  if(tab==='history') loadHistory()
}

async function loadHistory(){
  const tbody=document.getElementById('historyBody')
  tbody.innerHTML=`<tr><td colspan="15" class="loading">Načítám...</td></tr>`

  const {data:seasons}=await supabase.from('seasons').select('*').eq('competition_id',EXTRALIGA_COMPETITION_ID).order('created_at',{ascending:true})
  if(!seasons||!seasons.length){ tbody.innerHTML=`<tr><td colspan="15">Žádná data.</td></tr>`; return }

  const seasonIds=seasons.map(s=>s.id)
  const {data:stages}=await supabase.from('stages').select('id,season_id,name').in('season_id',seasonIds).eq('name','Základní část')
  const stageIds=(stages||[]).map(s=>s.id)

  const {data:matches}=await supabase.from('matches').select('*').in('stage_id',stageIds).not('home_score','is',null)
  const {data:teams}=await supabase.from('teams').select('*')
  const teamMap={}
  ;(teams||[]).forEach(t=>teamMap[t.id]=t)

  const stageSeasonMap={}
  ;(stages||[]).forEach(s=>stageSeasonMap[s.id]=s.season_id)

  const hist={}
  ;(matches||[]).forEach(m=>{
    const hg=Number(m.home_score),ag=Number(m.away_score)
    let stats=null; try{stats=m.stats?JSON.parse(m.stats):null}catch(e){}
    const isSN=stats&&(stats[20]==="1"||stats[20]==="2")
    const isOT=stats&&!isSN&&(stats[9]==="11"||stats[19]==="11")
    const seasonId=stageSeasonMap[m.stage_id]

    for(const [tid,tg,og,isH] of [[m.home_team,hg,ag,true],[m.away_team,ag,hg,false]]){
      if(!hist[tid]) hist[tid]={tid,b:0,z:0,v:0,p:0,vot:0,pot:0,vsn:0,psn:0,gf:0,ga:0,seasons:new Set(),bestPos:999}
      const t=hist[tid]
      t.z++; t.gf+=tg; t.ga+=og; t.seasons.add(seasonId)
      if(isSN||isOT){
        if(tg>og){t.vsn++;t.b+=2} else{t.psn++;t.b+=1}
      } else {
        if(tg>og){t.v++;t.b+=3} else{t.p++}
      }
    }
  })

  // Spočítej nejlepší umístění z každé sezóny
  seasons.forEach(s=>{
    const sStage=(stages||[]).find(st=>st.season_id===s.id)
    if(!sStage) return
    const sMatches=(matches||[]).filter(m=>m.stage_id===sStage.id)
    const pts={}
    sMatches.forEach(m=>{
      const hg=Number(m.home_score),ag=Number(m.away_score)
      let stats=null; try{stats=m.stats?JSON.parse(m.stats):null}catch(e){}
      const isSN=stats&&(stats[20]==="1"||stats[20]==="2")
      const isOT=stats&&!isSN&&(stats[9]==="11"||stats[19]==="11")
      if(!pts[m.home_team]) pts[m.home_team]=0
      if(!pts[m.away_team]) pts[m.away_team]=0
      if(isSN||isOT){ if(hg>ag){pts[m.home_team]+=2;pts[m.away_team]+=1}else{pts[m.away_team]+=2;pts[m.home_team]+=1} }
      else{ if(hg>ag) pts[m.home_team]+=3; else pts[m.away_team]+=3 }
    })
    const sorted=Object.keys(pts).sort((a,b)=>pts[b]-pts[a])
    sorted.forEach((tid,i)=>{
      if(hist[tid]&&i+1<hist[tid].bestPos) hist[tid].bestPos=i+1
    })
  })

  const arr=Object.values(hist).sort((a,b)=>{
    if(b.b!==a.b) return b.b-a.b
    return (b.gf-b.ga)-(a.gf-a.ga)
  })

  tbody.innerHTML=arr.map((t,i)=>{
    const team=teamMap[t.tid]
    if(!team) return ''
    const pm=t.gf-t.ga
    const pmStr=pm>0?`+${pm}`:String(pm)
    const pmClass=pm>0?'pos':pm<0?'neg':'neu'
    const avg=t.z>0?((t.gf/t.z).toFixed(2)):'—'
    const bestPos=t.bestPos<999?`${t.bestPos}. místo`:'—'
    return `<tr>
      <td class="td-rank">${i+1}</td>
      <td class="td-team"><div class="team-cell"><img class="team-logo" src="./logos/${team.logo}" alt="${team.name}"><div class="team-name">${team.name}</div></div></td>
      <td><span class="points-pill">${t.b}</span></td>
      <td class="td-num">${t.z}</td>
      <td class="td-wins">${t.v}</td>
      <td class="td-losses">${t.p}</td>
      <td class="td-num">${t.vot}</td>
      <td class="td-num">${t.pot}</td>
      <td class="td-num">${t.vsn}</td>
      <td class="td-num">${t.psn}</td>
      <td class="td-score">${t.gf}:${t.ga}</td>
      <td class="td-pm ${pmClass}">${pmStr}</td>
      <td class="td-num">${avg}</td>
      <td class="td-num">${t.seasons.size}</td>
      <td class="td-num">${bestPos}</td>
    </tr>`
  }).join('')
}
  
await initSeasons()
load()
</script>
