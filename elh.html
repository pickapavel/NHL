<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Extraliga</title>

<style>
*{box-sizing:border-box}

body{font-family:Arial;margin:0;background:#f2f2f2;}
.wrapper{max-width:1200px;margin:auto;padding:15px;background:white;}

.headerBar{
 display:flex;
 justify-content:center;
 margin-bottom:20px;
}

.seasonCard{
 background:#0b2a3c;color:white;font-size:22px;
 padding:10px 20px;border-radius:10px;
}

/* ===== FILTRY ===== */
.filterBar{
 display:flex;
 gap:10px;
 flex-wrap:wrap;
 margin-bottom:20px;
}

.filterBar select{
 padding:8px;
 border-radius:6px;
 border:1px solid #ccc;
 font-weight:bold;
}

/* ===== TABULKA ===== */
.standingsCard{
 display:flex;align-items:center;justify-content:space-between;
 background:#e9ecef;border-radius:10px;padding:12px;margin-bottom:8px;
}

.rank{width:30px;font-weight:bold;text-align:center;}

.teamBlock{display:flex;align-items:center;gap:10px;flex:1;}

.logo{
 width:45px;height:45px;object-fit:contain;
 background:white;padding:2px;border-radius:6px;
}

.teamInfo{display:flex;flex-direction:column;}
.teamName{font-weight:bold;font-size:14px;}
.teamStats{font-size:12px;color:#444;}

.pointsBox{
 background:#0b2a3c;color:white;font-size:18px;font-weight:bold;
 padding:8px 12px;border-radius:8px;min-width:50px;text-align:center;
}

/* ===== MATCH ===== */
.matchRow{
 background:#e9ecef;
 padding:12px;
 margin-bottom:8px;
 border-radius:10px;
 display:flex;
 flex-direction:column;
 gap:10px;
}

.teamBox{
 display:flex;
 align-items:center;
 gap:8px;
 font-weight:bold;
 font-size:14px;
}

.scoreBox{
 background:#0b2a3c;color:white;
 font-size:18px;font-weight:bold;
 padding:6px 10px;
 border-radius:6px;
 min-width:45px;
 text-align:center;
}

.middleBox{
 text-align:center;
 font-size:12px;
}

.btn{
 border:none;
 border-radius:6px;
 cursor:pointer;
 width:100%;
 font-weight:bold;
 height:38px;
 display:flex;
 align-items:center;
 justify-content:center;
 font-size:14px;
}

.detailBtn{background:#2f9ec9;color:white;}
.betBtn{background:#27ae60;color:white;}

.btnWrap{
 display:flex;
 flex-direction:column;
 gap:6px;
}

/* DESKTOP */
@media(min-width:768px){

.matchRow{
 display:grid;
 grid-template-columns: 1fr 80px 180px 80px 1fr 120px;
 align-items:start;
}

.homeTeam{grid-column:1;}
.homeScore{grid-column:2;}
.middleBox{grid-column:3;}
.awayScore{grid-column:4;}
.awayTeam{grid-column:5; justify-content:flex-end; text-align:right;}
.btnWrap{grid-column:6;}

.scoreBox{min-width:80px;}

}
</style>
</head>

<body>

<div class="wrapper">

<div class="headerBar">
<div class="seasonCard">Extraliga</div>
</div>

<!-- 🔥 FILTRY -->
<div class="filterBar">

<select id="teamFilter">
<option value="all">Všechny týmy</option>
</select>

<select id="matchFilter">
<option value="all">Všechny zápasy</option>
<option value="played">Jen odehrané</option>
<option value="unplayed">Jen neodehrané</option>
</select>

<select id="homeAwayFilter">
<option value="both">Domácí i venkovní</option>
<option value="home">Jen domácí</option>
<option value="away">Jen venkovní</option>
</select>

</div>

<h2>Tabulka</h2>
<div id="standings"></div>

<h2>Rozpis zápasů</h2>
<div id="schedule"></div>

</div>

<script type="module">

import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient(
  "https://qaocbodrflsaerxntfui.supabase.co",
  "sb_publishable_eIeO9MihyuQDuNHy60Ubrw_8ZuSKPFU"
)

let teamFilter="all"
let matchFilter="all"
let homeAwayFilter="both"

document.getElementById("teamFilter").onchange=e=>{
 teamFilter=e.target.value
 load()
}

document.getElementById("matchFilter").onchange=e=>{
 matchFilter=e.target.value
 load()
}

document.getElementById("homeAwayFilter").onchange=e=>{
 homeAwayFilter=e.target.value
 load()
}

async function load(){

 const { data: teams } = await supabase.from("teams").select("*")
 const { data: matches } = await supabase.from("matches").select("*")

 const teamMap={}
 teams.forEach(t=>teamMap[t.id]=t)

 // 🔥 naplnění filtru týmů
 const tf=document.getElementById("teamFilter")
 if(tf.options.length===1){
  teams.forEach(t=>{
   const o=document.createElement("option")
   o.value=t.id
   o.textContent=t.name
   tf.appendChild(o)
  })
 }

 let filtered = matches

 // ===== FILTRY =====
 if(teamFilter!=="all"){
  filtered = filtered.filter(m=>
   m.home_team===teamFilter || m.away_team===teamFilter
  )

  if(homeAwayFilter==="home"){
   filtered = filtered.filter(m=>m.home_team===teamFilter)
  }

  if(homeAwayFilter==="away"){
   filtered = filtered.filter(m=>m.away_team===teamFilter)
  }
 }

 if(matchFilter==="played"){
  filtered = filtered.filter(m=>m.played)
 }

 if(matchFilter==="unplayed"){
  filtered = filtered.filter(m=>!m.played)
 }

 render(filtered, teamMap)
 renderTable(filtered, teamMap, teams)
}

function renderTable(matches, teamMap, teams){

 let table={}

 teams.forEach(t=>{
  table[t.id]={team:t.id,b:0,z:0,v:0,p:0,vp:0,pp:0,vsn:0,psn:0,gf:0,ga:0}
 })

 matches.forEach(m=>{
  if(!m.played) return

  const h=table[m.home_team]
  const a=table[m.away_team]

  const hg=Number(m.home_score)
  const ag=Number(m.away_score)

  h.z++;a.z++
  h.gf+=hg;h.ga+=ag
  a.gf+=ag;a.ga+=hg

  if(hg>ag){h.v++;h.b+=3}else{a.v++;a.b+=3}
 })

 const arr=Object.values(table).sort((a,b)=>b.b-a.b)

 const cont=document.getElementById("standings")
 cont.innerHTML=""

 arr.forEach((t,i)=>{
  const team=teamMap[t.team]

  cont.innerHTML+=`
  <div class="standingsCard">
   <div class="rank">${i+1}</div>

   <div class="teamBlock">
    <img class="logo" src="./logos/${team.logo}">
    <div class="teamInfo">
     <div class="teamName">${team.name}</div>
     <div class="teamStats">
      Skóre ${t.gf}:${t.ga} | Z ${t.z} | V ${t.v}
     </div>
    </div>
   </div>

   <div class="pointsBox">${t.b}</div>
  </div>
  `
 })
}

function render(matches, teamMap){

 const cont=document.getElementById("schedule")
 cont.innerHTML=""

 matches.forEach(m=>{

  const home=teamMap[m.home_team]
  const away=teamMap[m.away_team]

  cont.innerHTML+=`
  <div class="matchRow">

    <div class="teamBox homeTeam">
      <img class="logo" src="./logos/${home.logo}">
      <div>${home.name}</div>
    </div>

    <div class="scoreBox homeScore">${m.home_score ?? "-"}</div>

    <div class="middleBox"></div>

    <div class="scoreBox awayScore">${m.away_score ?? "-"}</div>

    <div class="teamBox awayTeam">
      <div>${away.name}</div>
      <img class="logo" src="./logos/${away.logo}">
    </div>

    <div class="btnWrap">
      <button class="btn detailBtn"
        onclick="window.location.href='statistiky-zapasu.html?id=${m.id}'">
        Detail
      </button>

      <button class="btn betBtn"
        onclick="window.location.href='vsad-si.html?id=${m.id}'">
        Vsaď si
      </button>
    </div>

  </div>
  `
 })
}

load()

</script>

</body>
</html>
