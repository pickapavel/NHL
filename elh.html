<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Extraliga</title>

<style>
*{box-sizing:border-box}
body{font-family:Arial;margin:0;background:#f2f2f2;}
.wrapper{max-width:1200px;margin:auto;padding:20px;background:white;}

.headerBar{
 display:flex;align-items:center;justify-content:space-between;
 background:#e9ecef;border-radius:12px;padding:20px;margin-bottom:25px;
}
.headerBar img{height:110px;}

.seasonCard{
 background:#0b2a3c;color:white;font-size:26px;
 padding:14px 28px;border-radius:10px;
}

.standingsCard{
 display:flex;align-items:center;justify-content:space-between;
 background:#e9ecef;border-radius:10px;padding:14px;margin-bottom:10px;
}

.rank{width:30px;font-weight:bold;text-align:center;}

.teamBlock{display:flex;align-items:center;gap:14px;flex:1;}

.logo{
 width:50px;height:50px;object-fit:contain;
 background:white;padding:2px;border-radius:6px;
}

.pointsBox{
 background:#0b2a3c;color:white;font-weight:bold;
 padding:10px 16px;border-radius:8px;
}

.matchRow{
 display:grid;
 grid-template-columns:1fr 70px 220px 70px 1fr 120px;
 background:#e9ecef;padding:10px;margin-bottom:5px;border-radius:6px;
}

.scoreBox{
 background:#0b2a3c;color:white;
 font-size:20px;font-weight:bold;text-align:center;
 padding:8px;border-radius:6px;
}
</style>
</head>

<body>

<div class="wrapper">

<div class="headerBar">
<img src="img/extraliga.jpg">
<div class="seasonCard">Extraliga</div>
</div>

<h2>Tabulka</h2>
<div id="standings"></div>

<h2>Rozpis zápasů</h2>
<div id="schedule"></div>

</div>

<script type="module">

import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient(
 "https://qaocbodrflsaerxntfui.supabase.co",
 "sb_publishable_eIeO9MihyuQDuNHy60Ubrw_8ZuSKPFU"
)

async function load(){

 const { data: teams } = await supabase.from("teams").select("*")
 const { data: matches } = await supabase.from("matches").select("*")
 const { data: comps } = await supabase.from("competitions").select("*")

 const extraliga = comps.find(c => c.name === "Extraliga")

 if(!extraliga){
  alert("Extraliga nenalezena")
  return
 }

 const teamMap = {}
 teams.forEach(t=> teamMap[t.id] = t)

 // 🔥 jen extraliga (bez sezóny → aby to fungovalo)
 const elhMatches = matches.filter(m =>
  m.competition_id == extraliga.id
 )

 elhMatches.sort((a,b)=> Number(a.round) - Number(b.round))

 render(elhMatches, teamMap)
 renderTable(elhMatches, teamMap)
}

// ===== TABULKA =====
function renderTable(matches, teamMap){

 let table = {}

 // vytvoř týmy
 matches.forEach(m=>{
  table[m.home_team] = {team:m.home_team,b:0,z:0}
  table[m.away_team] = {team:m.away_team,b:0,z:0}
 })

 matches.forEach(m=>{

  if(m.home_score == null || m.away_score == null) return

  const h = table[m.home_team]
  const a = table[m.away_team]

  h.z++; a.z++

  if(m.home_score > m.away_score) h.b+=3
  else if(m.away_score > m.home_score) a.b+=3
  else{ h.b+=1; a.b+=1 }

 })

 const arr = Object.values(table).sort((a,b)=>b.b-a.b)

 const cont = document.getElementById("standings")
 cont.innerHTML=""

 arr.forEach((t,i)=>{

  const team = teamMap[t.team]

  cont.innerHTML+=`
  <div class="standingsCard">
   <div class="rank">${i+1}</div>
   <div class="teamBlock">
    <img class="logo" src="./logos/${team.logo}">
    <div>${team.name} (Z ${t.z})</div>
   </div>
   <div class="pointsBox">${t.b}</div>
  </div>
  `
 })
}

// ===== ROZPIS =====
function render(matches, teamMap){

 const cont = document.getElementById("schedule")
 cont.innerHTML=""

 matches.forEach(m=>{

  const home = teamMap[m.home_team]
  const away = teamMap[m.away_team]

  if(!home || !away) return

  cont.innerHTML+=`
  <div class="matchRow">
   <div>${home.name}</div>
   <div class="scoreBox">${m.home_score ?? "-"}</div>
   <div></div>
   <div class="scoreBox">${m.away_score ?? "-"}</div>
   <div>${away.name}</div>
  </div>
  `
 })
}

load()

</script>

</body>
</html>
