<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Extraliga</title>

<style>
*{box-sizing:border-box}

body{font-family:Arial;margin:0;background:#f2f2f2;}
.wrapper{max-width:1200px;margin:auto;padding:20px;background:white;}

.headerBar{
 display:flex;align-items:center;justify-content:space-between;
 background:#e9ecef;border-radius:12px;padding:20px;margin-bottom:25px;
}

.headerBar img{height:110px;}

.seasonCard{
 background:#0b2a3c;color:white;font-size:26px;
 padding:14px 28px;border-radius:10px;
}

/* ===== TABULKA ===== */

.standingsCard{
 display:flex;align-items:center;justify-content:space-between;
 background:#e9ecef;border-radius:10px;padding:14px;margin-bottom:10px;
}

.rank{width:30px;font-weight:bold;text-align:center;}

.teamBlock{
 display:flex;
 align-items:center;
 gap:10px;
 flex:1;
 min-width:0;
}

.logo{
 width:45px;height:45px;object-fit:contain;
 background:white;padding:2px;border-radius:6px;
 flex-shrink:0;
}

.teamInfo{
 display:flex;
 flex-direction:column;
 min-width:0;
}

.teamName{
 font-weight:bold;
 white-space:nowrap;
 overflow:hidden;
 text-overflow:ellipsis;
}

.teamStats{font-size:13px;color:#444;}

.pointsBox{
 background:#0b2a3c;color:white;font-size:18px;
 padding:8px 14px;border-radius:8px;
}

/* ===== MATCH DESKTOP ===== */

.matchRow{
 display:grid;
 grid-template-columns:1.5fr 70px 70px 180px 70px 70px 1.5fr 120px;
 align-items:center;
 background:#e9ecef;
 padding:10px;
 margin-bottom:5px;
 border-radius:6px;
 gap:6px;
}

/* týmy */
.teamBox{
 display:flex;
 align-items:center;
 gap:8px;
 font-weight:bold;
 min-width:0;
}

.teamBox div{
 white-space:nowrap;
 overflow:hidden;
 text-overflow:ellipsis;
}

.teamRight{
 justify-content:flex-end;
 text-align:right;
}

/* skóre */
.scoreBox{
 background:#0b2a3c;
 color:white;
 font-size:20px;
 font-weight:bold;
 padding:6px 0;
 border-radius:6px;
 text-align:center;
}

/* SN / OT */
.winType{
 background:#2f9ec9;
 color:white;
 font-size:11px;
 padding:3px 6px;
 border-radius:6px;
 text-align:center;
}

/* třetiny */
.periods{
 text-align:center;
 font-size:13px;
 color:#333;
}

/* tlačítka */
.btn{
 border:none;
 padding:8px;
 border-radius:6px;
 cursor:pointer;
 width:100%;
 margin-top:5px;
 font-weight:bold;
}

.detailBtn{background:#2f9ec9;color:white;}
.betBtn{background:#27ae60;color:white;}

/* ===== MOBILE (NECHÁME) ===== */

@media (max-width: 900px){

.matchRow{
 display:flex !important;
 flex-direction:column;
 gap:8px;
}

.teamBox,
.teamRight{
 justify-content:flex-start !important;
 text-align:left !important;
}

.scoreBox{
 font-size:18px;
 width:60px;
 margin:auto;
}

.periods{
 text-align:center;
 width:100%;
}

.btn{
 width:100%;
 margin:2px 0;
}

}
</style>
</head>

<body>

<div class="wrapper">

<div class="headerBar">
<img src="img/extraliga.jpg">
<div class="seasonCard">Extraliga - 2. sezóna</div>
</div>

<h2>Tabulka</h2>
<div id="standings"></div>

<h2>Rozpis zápasů</h2>
<div id="schedule"></div>

</div>

<script type="module">

import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient(
 "https://qaocbodrflsaerxntfui.supabase.co",
 "sb_publishable_eIeO9MihyuQDuNHy60Ubrw_8ZuSKPFU"
)

const SEASON_ID = "4b05b50e-cfde-4473-aebe-33495c85a989"

async function load(){

 const { data: seasonTeams } = await supabase
  .from("season_teams")
  .select("team_id")
  .eq("season_id", SEASON_ID)

 const teamIds = seasonTeams.map(t=>t.team_id)

 const { data: teams } = await supabase
  .from("teams")
  .select("*")
  .in("id", teamIds)

 const { data: matches } = await supabase
  .from("matches")
  .select("*")
  .eq("season_id", SEASON_ID)

 const teamMap={}
 teams.forEach(t=> teamMap[t.id]=t)

 matches.sort((a,b)=>a.round-b.round)

 render(matches,teamMap)
}

/* ROZPIS */
function render(matches,teamMap){

 const cont=document.getElementById("schedule")
 cont.innerHTML=""

 matches.forEach(m=>{

  const home=teamMap[m.home_team]
  const away=teamMap[m.away_team]

  const homeScore=m.home_score ?? "-"
  const awayScore=m.away_score ?? "-"

  const type = m.shootout ? "SN" : (m.overtime ? "OT" : "")
  const winner = homeScore>awayScore?"home":"away"

  const periods = m.periods || ""

  cont.innerHTML+=`

  <div class="matchRow">

    <div class="teamBox">
      <img class="logo" src="./logos/${home.logo}">
      <div>${home.name}</div>
    </div>

    <div class="scoreBox">${homeScore}</div>

    <div>
      ${(winner==="home" && type)?`<div class="winType">${type}</div>`:""}
    </div>

    <div class="periods">${periods}</div>

    <div>
      ${(winner==="away" && type)?`<div class="winType">${type}</div>`:""}
    </div>

    <div class="scoreBox">${awayScore}</div>

    <div class="teamBox teamRight">
      <div>${away.name}</div>
      <img class="logo" src="./logos/${away.logo}">
    </div>

    <div>
      <button class="btn detailBtn"
        onclick="window.location.href='statistiky-zapasu.html?id=${m.id}'">
        Detail
      </button>

      <button class="btn betBtn"
        onclick="window.location.href='vsad-si.html?id=${m.id}'">
        Vsaď si
      </button>
    </div>

  </div>
  `
 })

}

load()

</script>

</body>
</html>
