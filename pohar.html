<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pohár</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:#eef2f7;min-height:100vh;}
.header{background:linear-gradient(135deg,#0b2a3c 0%,#1a5276 100%);padding:20px 30px;display:flex;align-items:center;gap:16px;margin-bottom:32px;}
.header-logo{width:56px;height:56px;object-fit:contain;mix-blend-mode:lighten;}
.header-title{font-size:22px;font-weight:800;color:white;letter-spacing:-.3px;}
.header-sub{font-size:12px;color:#7ab0cc;font-weight:500;margin-top:3px;text-transform:uppercase;letter-spacing:.06em;}
.wrapper{max-width:1100px;margin:0 auto;padding:0 20px 60px;}
.top-bar{display:flex;align-items:center;gap:16px;margin-bottom:28px;flex-wrap:wrap;}
.season-select{padding:9px 16px;border-radius:20px;border:2px solid #c8d8e8;background:white;font-family:'Inter',sans-serif;font-size:13px;font-weight:700;color:#1a3a5c;cursor:pointer;min-width:220px;}
.season-select:focus{outline:none;border-color:#2f9ec9;}
.phase-tabs{display:flex;gap:8px;flex-wrap:wrap;}
.phase-tab{padding:7px 16px;border-radius:20px;border:2px solid #c8d8e8;background:white;font-family:'Inter',sans-serif;font-size:12px;font-weight:700;cursor:pointer;color:#1a3a5c;transition:all .15s;}
.phase-tab:hover{background:#dce8f5;border-color:#2f9ec9;}
.phase-tab.active{background:#0b2a3c;color:white;border-color:#0b2a3c;}
.phase-tab.completed{border-color:#22c55e;color:#166534;}
.phase-tab.completed.active{background:#166534;color:white;}
.bracket-wrap{overflow-x:auto;padding-bottom:20px;}
.bracket{display:flex;gap:0;align-items:stretch;min-width:max-content;}
.round-col{display:flex;flex-direction:column;min-width:240px;}
.round-header{text-align:center;padding:10px 8px;font-size:11px;font-weight:800;color:#3a6a9c;text-transform:uppercase;letter-spacing:.08em;background:#f0f6fc;border-bottom:2px solid #e0ecf8;border-right:1px solid #e0ecf8;white-space:nowrap;}
.round-matches{display:flex;flex-direction:column;flex:1;justify-content:space-around;padding:12px 0;}
.match-slot{display:flex;flex-direction:column;margin:6px 8px;position:relative;}
.match-card{background:white;border-radius:10px;border:1px solid #c8d8e8;overflow:hidden;box-shadow:0 2px 6px rgba(26,58,92,.06);min-width:224px;}
.match-card.played{border-color:#b8d8e8;}
.match-card.tbd{opacity:.5;}
.match-team{display:flex;align-items:center;gap:8px;padding:7px 10px;border-bottom:1px solid #f0f0f0;}
.match-team:last-child{border-bottom:none;}
.match-team.winner{background:#f0fdf4;}
.match-team.loser{background:#fafafa;}
.match-team-logo{width:22px;height:22px;object-fit:contain;border-radius:4px;flex-shrink:0;}
.match-team-logo-ph{width:22px;height:22px;border-radius:4px;background:#e8f0f8;flex-shrink:0;}
.match-team-name{font-size:12px;font-weight:700;color:#1a2a3c;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.match-team-name.tbd{color:#aaa;font-weight:400;font-style:italic;}
.match-team-score{font-size:13px;font-weight:800;color:#0b2a3c;min-width:20px;text-align:right;}
.match-team-score.winner{color:#166534;}
.match-team.winner .match-team-name{color:#166634;}
.connector-col{width:20px;display:flex;flex-direction:column;flex:1;}
.loading{padding:60px;text-align:center;color:#7ab0cc;font-size:14px;}
.empty{padding:40px;text-align:center;color:#aaa;font-size:14px;}
.legend{display:flex;gap:16px;margin-bottom:16px;flex-wrap:wrap;font-size:12px;color:#6b7a8d;}
.legend-item{display:flex;align-items:center;gap:6px;}
.legend-dot{width:10px;height:10px;border-radius:50%;}
.legend-dot-win{background:#22c55e;}
.legend-dot-pending{background:#c8d8e8;}
.stats-bar{display:flex;gap:16px;margin-bottom:20px;flex-wrap:wrap;}
.stat-box{background:white;border-radius:12px;border:1px solid #c8d8e8;padding:12px 20px;text-align:center;box-shadow:0 2px 6px rgba(26,58,92,.06);}
.stat-val{font-size:22px;font-weight:800;color:#0b2a3c;}
.stat-label{font-size:11px;font-weight:700;color:#7ab0cc;text-transform:uppercase;letter-spacing:.05em;margin-top:2px;}
.phase-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;}
.phase-match-card{background:white;border-radius:12px;border:1px solid #c8d8e8;overflow:hidden;box-shadow:0 2px 8px rgba(26,58,92,.07);}
.phase-match-header{background:#0b2a3c;padding:8px 12px;display:flex;justify-content:space-between;align-items:center;}
.phase-match-header-label{font-size:11px;font-weight:700;color:#7ab0cc;text-transform:uppercase;letter-spacing:.05em;}
.phase-match-round{display:inline-block;background:#f0c040;color:#0b2a3c;font-size:11px;font-weight:800;padding:2px 8px;border-radius:10px;}
.phase-match-body{padding:10px 12px;}
.phase-team-row{display:flex;align-items:center;gap:8px;padding:5px 0;}
.phase-team-row:first-child{border-bottom:1px solid #f0f0f0;padding-bottom:8px;margin-bottom:3px;}
.phase-team-logo{width:24px;height:24px;object-fit:contain;border-radius:4px;flex-shrink:0;}
.phase-team-name{font-size:13px;font-weight:700;color:#1a2a3c;flex:1;}
.phase-team-name.tbd{color:#aaa;font-style:italic;font-weight:400;}
.phase-team-score{font-size:15px;font-weight:800;color:#0b2a3c;}
.phase-team-row.winner .phase-team-name{color:#166534;}
.phase-team-row.winner .phase-team-score{color:#166534;}
.phase-result-badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;margin-top:4px;}
.badge-played{background:#dcfce7;color:#166534;}
.badge-pending{background:#e8f0f8;color:#1a5276;}
.section-title{font-size:17px;font-weight:700;color:#0b2a3c;margin:32px 0 16px;display:flex;align-items:center;gap:8px;}
.section-title::after{content:'';flex:1;height:2px;background:linear-gradient(90deg,#2f9ec9,transparent);border-radius:2px;}
.match-list-cards{display:flex;flex-direction:column;gap:10px;}
.ml-card{background:white;border-radius:12px;border:1px solid #c8d8e8;overflow:hidden;box-shadow:0 2px 6px rgba(26,58,92,.06);}
.ml-card.played{border-color:#b8e8c8;}
.ml-card-header{background:#0b2a3c;padding:7px 14px;display:flex;align-items:center;gap:8px;}
.ml-round-badge{display:inline-block;background:#f0c040;color:#0b2a3c;font-size:11px;font-weight:800;padding:2px 9px;border-radius:10px;white-space:nowrap;}
.ml-phase-badge{display:inline-block;background:rgba(255,255,255,.12);color:#7ab0cc;font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;white-space:nowrap;}
.ml-status{margin-left:auto;font-size:11px;font-weight:700;white-space:nowrap;}
.ml-card-body{padding:10px 14px;}
.ml-teams{display:flex;flex-direction:column;}
.ml-team{display:flex;align-items:center;gap:10px;padding:7px 0;}
.ml-team:first-child{border-bottom:1px solid #f4f4f4;}
.ml-team-logo{width:26px;height:26px;object-fit:contain;border-radius:4px;flex-shrink:0;}
.ml-team-name{font-size:14px;font-weight:600;color:#1a2a3c;flex:1;}
.ml-team-name.winner{font-weight:800;color:#166534;}
.ml-team-score{font-size:16px;font-weight:800;color:#0b2a3c;min-width:24px;text-align:right;}
.ml-team-score.winner{color:#166534;}
.ml-card-footer{padding:8px 14px;border-top:1px solid #f0f0f0;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.ml-periods{font-size:11px;color:#aaa;flex:1;}
.ml-btn{display:inline-flex;align-items:center;gap:4px;border:none;border-radius:8px;cursor:pointer;font-weight:700;font-size:12px;padding:6px 14px;transition:all .15s;white-space:nowrap;}
.ml-btn-stats{background:#1a5276;color:white;}
.ml-btn-stats:hover{background:#0b2a3c;}
.ml-btn-bet{background:#27ae60;color:white;}
.ml-btn-bet:hover{background:#219a52;}
/* Sekce pavouka pro velké turnaje */
.bracket-section{margin-bottom:32px;}
.bracket-section-title{font-size:15px;font-weight:800;color:#0b2a3c;margin-bottom:12px;padding:10px 16px;background:linear-gradient(135deg,#0b2a3c,#1a5276);color:white;border-radius:10px;display:flex;align-items:center;gap:8px;}
.half-tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;}
.half-tab{padding:8px 18px;border-radius:20px;border:2px solid #c8d8e8;background:white;font-family:'Inter',sans-serif;font-size:13px;font-weight:700;cursor:pointer;color:#1a3a5c;transition:all .15s;}
.half-tab:hover{background:#dce8f5;border-color:#2f9ec9;}
.half-tab.active{background:#1a5276;color:white;border-color:#1a5276;}
</style>
</head>
<body>
<script src="./ticker.js"></script>
<script src="./menu.js"></script>

<div class="header">
 <img class="header-logo" src="./logos/lokomotiva.png" alt="">
 <div>
  <div class="header-title">Extraliga U dvou Blbounů</div>
  <div class="header-sub">Pohár — pavouk</div>
 </div>
</div>

<div class="wrapper">
 <div class="top-bar">
  <select class="season-select" id="seasonSelect" onchange="onSeasonChange()">
   <option value="">-- Načítám... --</option>
  </select>
  <div class="phase-tabs" id="phaseTabs"></div>
 </div>

 <div class="legend">
  <div class="legend-item"><div class="legend-dot legend-dot-win"></div> Vítěz / postoupil</div>
  <div class="legend-item"><div class="legend-dot legend-dot-pending"></div> Čeká na odehrání</div>
 </div>

 <div id="halfTabsWrap" style="display:none;">
  <div class="half-tabs" id="halfTabs"></div>
 </div>

 <div id="content"><div class="loading">Načítám...</div></div>

 <div class="section-title">Rozpis zápasů</div>
 <div id="matchList"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
const { createClient } = supabase
const db = createClient(
  "https://qaocbodrflsaerxntfui.supabase.co",
  "sb_publishable_eIeO9MihyuQDuNHy60Ubrw_8ZuSKPFU"
)

const POHAR_COMPETITION_ID = "254d4b5e-cb32-4c44-8b00-3010f895359c"

let allSeasons = []
let allTeams = {}
let currentSeasonId = ""
let currentPhase = 0
let phases = []
let allMatches = []
let seasonTeamCount = 0
let isLargeTournament = false // true pokud >= 64 týmů
let currentHalf = 'all' // 'all', 'left', 'right', 'final'

function getPhaseLabel(tymu, phaseIdx, totalPhases){
  if(tymu === 2)  return "Finále"
  if(tymu === 4)  return "Semifinále"
  if(tymu === 8)  return "Čtvrtfinále"
  if(tymu === 16) return "Osmifinále"
  if(tymu === 32) return "Šestnáctifinále"
  const koloOdKonce = totalPhases - phaseIdx
  if(koloOdKonce === 0) return "Finále"
  if(koloOdKonce === 1) return "Semifinále"
  if(koloOdKonce === 2) return "Čtvrtfinále"
  if(koloOdKonce === 3) return "Osmifinále"
  return `${phaseIdx + 1}. kolo`
}

async function init(){
  const [seasonsRes, teamsRes] = await Promise.all([
    db.from("seasons").select("*, competitions(id,name)").eq("competition_id", POHAR_COMPETITION_ID).order("created_at", {ascending:true}),
    db.from("teams").select("*")
  ])
  allSeasons = seasonsRes.data || []
  ;(teamsRes.data||[]).forEach(t => allTeams[t.id] = t)

  const sel = document.getElementById("seasonSelect")
  sel.innerHTML = ""
  if(!allSeasons.length){
    sel.innerHTML = '<option value="">Žádná sezóna pohár</option>'
    document.getElementById("content").innerHTML = '<div class="empty">Žádná pohárová sezóna.</div>'
    return
  }
  allSeasons.forEach(s => {
    const o = document.createElement("option")
    o.value = s.id
    o.textContent = s.name
    sel.appendChild(o)
  })
  currentSeasonId = allSeasons[allSeasons.length - 1].id
  sel.value = currentSeasonId
  await loadSeason()
}

async function onSeasonChange(){
  currentSeasonId = document.getElementById("seasonSelect").value
  currentPhase = 0
  currentHalf = 'all'
  await loadSeason()
}

async function loadSeason(){
  document.getElementById("content").innerHTML = '<div class="loading">Načítám...</div>'
  document.getElementById("matchList").innerHTML = ""
  document.getElementById("phaseTabs").innerHTML = ""
  document.getElementById("statsBar").innerHTML = ""
  document.getElementById("halfTabsWrap").style.display = "none"

  const [matchesRes, seasonTeamsRes] = await Promise.all([
    db.from("matches").select("*").eq("season_id", currentSeasonId).order("round", {ascending: true}),
    db.from("season_teams").select("team_id").eq("season_id", currentSeasonId)
  ])

  allMatches = matchesRes.data || []
  seasonTeamCount = (seasonTeamsRes.data||[]).length

  if(!seasonTeamCount){
    document.getElementById("content").innerHTML = '<div class="empty">Žádné týmy v této sezóně.</div>'
    return
  }

  isLargeTournament = seasonTeamCount >= 64

  buildPhases(seasonTeamCount)
  buildPhaseTabs()
  buildStatsBar()

  if(isLargeTournament){
    buildHalfTabs()
  }

  render()
}

function buildPhases(teamCount){
  phases = []
  let totalPhases = 0
  let tmp = teamCount
  while(tmp >= 2){ totalPhases++; tmp = Math.floor(tmp/2) }

  let tymu = teamCount
  let kolo = 1
  let phaseIdx = 0
  while(tymu >= 2){
    const zapasu = Math.floor(tymu / 2)
    const koloOd = kolo
    const koloDo = kolo + zapasu - 1
    const phaseMatches = allMatches.filter(m => m.round >= koloOd && m.round <= koloDo)
    const playedCount = phaseMatches.filter(m => m.home_score != null).length
    const label = getPhaseLabel(tymu, phaseIdx, totalPhases - 1)
    phases.push({
      label, roundFrom: koloOd, roundTo: koloDo,
      zapasu, tymu, played: playedCount,
      completed: playedCount === zapasu && zapasu > 0
    })
    kolo += zapasu
    tymu = Math.floor(tymu / 2)
    phaseIdx++
  }
}

function buildPhaseTabs(){
  const bar = document.getElementById("phaseTabs")
  bar.innerHTML = ""

  const all = document.createElement("button")
  all.className = "phase-tab" + (currentPhase === 0 ? " active" : "")
  all.textContent = "🏆 Celý pavouk"
  all.onclick = () => { currentPhase = 0; updateTabs(); render() }
  bar.appendChild(all)

  phases.forEach((p, i) => {
    const btn = document.createElement("button")
    btn.className = "phase-tab" + (p.completed ? " completed" : "") + (currentPhase === i+1 ? " active" : "")
    btn.textContent = (p.completed ? "✓ " : "") + p.label + ` (${p.played}/${p.zapasu})`
    btn.onclick = () => { currentPhase = i+1; updateTabs(); render() }
    bar.appendChild(btn)
  })
}

function buildHalfTabs(){
  const wrap = document.getElementById("halfTabsWrap")
  const bar = document.getElementById("halfTabs")
  bar.innerHTML = `
   <button class="half-tab ${currentHalf==='all'?'active':''}" onclick="setHalf('all')">🏆 Vše</button>
   <button class="half-tab ${currentHalf==='left'?'active':''}" onclick="setHalf('left')">◀ Levý pavouk (1–${seasonTeamCount/2} zápasů)</button>
   <button class="half-tab ${currentHalf==='right'?'active':''}" onclick="setHalf('right')">▶ Pravý pavouk (${seasonTeamCount/2+1}–${seasonTeamCount} zápasů)</button>
   <button class="half-tab ${currentHalf==='final'?'active':''}" onclick="setHalf('final')">🥇 Semifinále & Finále</button>
   <button class="half-tab ${currentHalf==='rozpis'?'active':''}" onclick="setHalf('rozpis')">📋 Rozpis zápasů</button>
  `
  wrap.style.display = "block"
}

window.setHalf = function(half){
  currentHalf = half
  buildHalfTabs()
  render()
}

function renderRozpisZapasu(){
  const cont = document.getElementById("content")

  const allSlots = []
  phases.forEach(phase => {
    for(let i = 0; i < phase.zapasu; i++){
      const roundNum = phase.roundFrom + i
      const m = allMatches.find(x => x.round === roundNum) || null
      allSlots.push({ phase, roundNum, match: m })
    }
  })

  // Rozdělení na odehrané, aktuální (první neodehraný) a budoucí
  const played = allSlots.filter(s => s.match && s.match.home_score != null)
  const pending = allSlots.filter(s => !s.match || s.match.home_score == null)
  const current = pending[0] || null
  const future = pending.slice(1)

  function matchCard(slot, highlight){
    const { phase, roundNum, match: m } = slot
    if(!m){
      return `
       <div class="ml-card" style="${highlight?'border:2px solid #f0c040;box-shadow:0 0 0 4px rgba(240,192,64,.15);':''}">
        <div class="ml-card-header">
         <span class="ml-round-badge">Kolo ${roundNum}</span>
         <span class="ml-phase-badge">${phase.label}</span>
         <span class="ml-status" style="color:#f0c040;">⏳ Čeká na přiřazení</span>
        </div>
        <div class="ml-card-body">
         <div class="ml-teams">
          <div class="ml-team"><div style="width:26px;height:26px;border-radius:4px;background:#e8f0f8;flex-shrink:0;"></div><span class="ml-team-name" style="color:#aaa;font-style:italic;">— TBD —</span></div>
          <div class="ml-team"><div style="width:26px;height:26px;border-radius:4px;background:#e8f0f8;flex-shrink:0;"></div><span class="ml-team-name" style="color:#aaa;font-style:italic;">— TBD —</span></div>
         </div>
        </div>
       </div>`
    }

    const homeT = allTeams[m.home_team]
    const awayT = allTeams[m.away_team]
    if(!homeT || !awayT) return ''

    const isPlayed = m.home_score != null
    const winner = getWinner(m)
    const suffix = m.result_type === "SN" ? "SN" : m.result_type === "OT" ? "OT" : ""
    let stats = null
    try{ stats = m.stats ? JSON.parse(m.stats) : null }catch(e){}
    let periods = ""
    if(stats){
      const h1=Number(stats[16]||0),h2=Number(stats[17]||0),h3=Number(stats[18]||0)
      const a1=Number(stats[6]||0),a2=Number(stats[7]||0),a3=Number(stats[8]||0)
      periods = `${h1}:${a1} · ${h2}:${a2} · ${h3}:${a3}`
    }

    return `
     <div class="ml-card ${isPlayed?"played":""}" style="${highlight?'border:2px solid #f0c040;box-shadow:0 0 0 4px rgba(240,192,64,.15);':''}">
      <div class="ml-card-header">
       <span class="ml-round-badge">Kolo ${m.round}</span>
       <span class="ml-phase-badge">${phase.label}</span>
       ${isPlayed
         ? `<span class="ml-status" style="color:#4ade80;">✓ Odehráno${suffix?" · "+suffix:""}</span>`
         : `<span class="ml-status" style="color:#f0c040;">${highlight?'🎯 Aktuální':'⏳ Čeká'}</span>`
       }
      </div>
      <div class="ml-card-body">
       <div class="ml-teams">
        <div class="ml-team">
         ${homeT.logo ? `<img class="ml-team-logo" src="./logos/${homeT.logo}">` : '<div style="width:26px;height:26px;border-radius:4px;background:#e8f0f8;flex-shrink:0;"></div>'}
         <span class="ml-team-name ${isPlayed&&winner===m.home_team?"winner":""}">${homeT.name}</span>
${isPlayed ? `<span class="ml-team-score ${winner===m.home_team?"winner":""}"><span style="display:inline-flex;align-items:center;justify-content:center;background:#0b2a3c;color:white;font-size:13px;font-weight:800;width:30px;height:30px;border-radius:8px;">${m.home_score}</span></span>` : ""}        </div>
        <div class="ml-team">
         ${awayT.logo ? `<img class="ml-team-logo" src="./logos/${awayT.logo}">` : '<div style="width:26px;height:26px;border-radius:4px;background:#e8f0f8;flex-shrink:0;"></div>'}
         <span class="ml-team-name ${isPlayed&&winner===m.away_team?"winner":""}">${awayT.name}</span>
${isPlayed ? `<span class="ml-team-score ${winner===m.away_team?"winner":""}"><span style="display:inline-flex;align-items:center;justify-content:center;background:#0b2a3c;color:white;font-size:13px;font-weight:800;width:30px;height:30px;border-radius:8px;">${m.away_score}</span></span>` : ""}        </div>
       </div>
      </div>
      <div class="ml-card-footer">
       <span class="ml-periods">${periods}</span>
       ${isPlayed
         ? `<button class="ml-btn ml-btn-stats" onclick="window.location.href='statistiky-zapasu.html?id=${m.id}'">📊 Statistiky</button>`
         : `<button class="ml-btn ml-btn-bet" onclick="window.location.href='vsad-si.html?id=${m.id}'">🎲 Vsaď si</button>`
       }
      </div>
     </div>`
  }

  let html = ''

  if(current){
    html += `<div style="font-size:12px;font-weight:800;color:#f0c040;text-transform:uppercase;letter-spacing:.08em;margin:0 0 10px;">🎯 Aktuální zápas</div>`
    html += matchCard(current, true)
    html += `<div style="height:24px;"></div>`
  }

  if(future.length){
    html += `<div style="font-size:12px;font-weight:800;color:#7ab0cc;text-transform:uppercase;letter-spacing:.08em;margin:0 0 10px;">⏳ Nadcházející zápasy</div>`
    html += `<div class="match-list-cards">`
    future.forEach(s => { html += matchCard(s, false) })
    html += `</div><div style="height:24px;"></div>`
  }

  if(played.length){

function getLargePhases(){
  // Fáze 1 = první kolo (32 zápasů pro 64 týmů)
  // Fáze 2 = druhé kolo (16 zápasů)
  // ...
  // Poslední 2 fáze = Semifinále + Finále+O3.místo → "finálová část"
  const firstPhase = phases[0] // největší fáze
  const halfSize = firstPhase.zapasu / 2 // 16 pro 64 týmů

  // Levý pavouk: kola 1 až halfSize od každé fáze (první polovina zápasů každé fáze)
  // Pravý pavouk: kola halfSize+1 až fáze.zapasu od každé fáze
  // Finálová část: semifinále (4 týmy) a dál

  // Rozděl fáze na "skupinové" a "finálové"
  // Finálové jsou fáze kde tymu <= 4 (semifinále, finále, o3misto)
  const groupPhases = phases.filter(p => p.tymu > 4)
  const finalPhases = phases.filter(p => p.tymu <= 4)

  return { groupPhases, finalPhases, halfSize }
}

function renderLargeTournament(){
  const cont = document.getElementById("content")
  const { groupPhases, finalPhases, halfSize } = getLargePhases()

  if(currentHalf === 'all'){
    // Zobraz vše pod sebou
    let html = ''

    // Levý pavouk
    html += renderHalfBracketHtml(groupPhases, halfSize, 'left', '◀ Levý pavouk')
    html += '<div style="height:24px;"></div>'

    // Pravý pavouk
    html += renderHalfBracketHtml(groupPhases, halfSize, 'right', '▶ Pravý pavouk')
    html += '<div style="height:24px;"></div>'

    // Finálová část
    if(finalPhases.length){
      html += `<div class="bracket-section-title">🥇 Semifinále, Finále & O 3. místo</div>`
      html += renderFinalBracketHtml(finalPhases)
    }

    cont.innerHTML = html

  } else if(currentHalf === 'left'){
    cont.innerHTML = renderHalfBracketHtml(groupPhases, halfSize, 'left', '◀ Levý pavouk')
  } else if(currentHalf === 'right'){
    cont.innerHTML = renderHalfBracketHtml(groupPhases, halfSize, 'right', '▶ Pravý pavouk')
  } else if(currentHalf === 'final'){
    let html = ''
    if(finalPhases.length){
      html += `<div class="bracket-section-title">🥇 Semifinále, Finále & O 3. místo</div>`
      html += renderFinalBracketHtml(finalPhases)
    } else {
      html = '<div class="empty">Finálová část zatím nezačala.</div>'
    }
    cont.innerHTML = html
  }
}

function renderHalfBracketHtml(groupPhases, halfSize, side, title){
  const bracketId = 'bracket-' + side
  let html = `<div class="bracket-section"><div class="bracket-section-title">${title}</div>`
  html += `<div class="bracket-wrap"><div class="bracket" id="${bracketId}">`

  groupPhases.forEach((phase, pi) => {
    const phaseMatches = allMatches.filter(m => m.round >= phase.roundFrom && m.round <= phase.roundTo)
    phaseMatches.sort((a,b) => a.round - b.round)

    let halfMatches, halfRounds
    if(side === 'left'){
      halfMatches = phaseMatches.slice(0, Math.ceil(phase.zapasu / 2))
      halfRounds = Array.from({length: Math.ceil(phase.zapasu / 2)}, (_,i) => phase.roundFrom + i)
    } else {
      halfMatches = phaseMatches.slice(Math.floor(phase.zapasu / 2))
      halfRounds = Array.from({length: Math.floor(phase.zapasu / 2)}, (_,i) => phase.roundFrom + Math.ceil(phase.zapasu/2) + i)
    }

    const zapasu = side === 'left' ? Math.ceil(phase.zapasu / 2) : Math.floor(phase.zapasu / 2)

    html += `<div class="round-col">`
    html += `<div class="round-header">${phase.label}</div>`
    html += `<div class="round-matches">`

    for(let i = 0; i < zapasu; i++){
      const roundNum = halfRounds[i]
      const m = halfMatches[i] || null
      html += `<div class="match-slot">`
      if(!m){
        html += tbdHtml(roundNum)
      } else {
        const winner = getWinner(m)
        const played = m.home_score != null
        const suffix = m.result_type === "SN" ? "SN" : m.result_type === "OT" ? "OT" : "REG"
        const btnHtml = played
? `<div style="display:flex;gap:4px;">
    <button onclick="window.location.href='statistiky-zapasu.html?id=${m.id}'" style="flex:1;border:none;border-radius:0 0 0 8px;cursor:pointer;font-weight:700;font-size:10px;padding:4px;background:#1a5276;color:white;">📊 Statistiky</button>
    <button onclick="window.location.href='vsad-si.html?id=${m.id}'" style="flex:1;border:none;border-radius:0 0 8px 0;cursor:pointer;font-weight:700;font-size:10px;padding:4px;background:#27ae60;color:white;">🎲 Vsaď si</button>
   </div>`          : `<button onclick="window.location.href='vsad-si.html?id=${m.id}'" style="width:100%;border:none;border-radius:0 0 8px 8px;cursor:pointer;font-weight:700;font-size:10px;padding:4px;background:#27ae60;color:white;">🎲 Vsaď si</button>`
        html += `<div class="match-card ${played?"played":""}">
         ${metaHtml(m.round, played, suffix)}
         ${teamHtml(m.home_team, played?m.home_score:null, winner===m.home_team, winner===m.away_team)}
         ${teamHtml(m.away_team, played?m.away_score:null, winner===m.away_team, winner===m.home_team)}
         ${btnHtml}
        </div>`
      }
      html += `</div>`
    }

    html += `</div></div>`
    if(pi < groupPhases.length - 1) html += `<div class="connector-col"></div>`
  })

  html += `</div></div></div>`
  return html
}

   <button onclick="window.location.href='statistiky-zapasu.html?id=${m.id}'" style="display:inline-flex;align-items:center;gap:4px;border:none;border-radius:7px;cursor:pointer;font-weight:700;font-size:11px;padding:4px 10px;background:#1a5276;color:white;">📊 Statistiky</button>
   <button onclick="window.location.href='vsad-si.html?id=${m.id}'" style="display:inline-flex;align-items:center;gap:4px;border:none;border-radius:7px;cursor:pointer;font-weight:700;font-size:11px;padding:4px 10px;background:#27ae60;color:white;">🎲 Vsaď si</button>`
          : `<span class="phase-result-badge badge-pending">Čeká na odehrání</span>
             <button onclick="window.location.href='vsad-si.html?id=${m.id}'" style="display:inline-flex;align-items:center;gap:4px;border:none;border-radius:7px;cursor:pointer;font-weight:700;font-size:11px;padding:4px 10px;background:#27ae60;color:white;">🎲 Vsaď si</button>`
        }
       </div>
      </div>
     </div>`
  }

  html += '</div>'
  cont.innerHTML = html
}

function renderMatchList(){
  const cont = document.getElementById("matchList")
  if(!cont) return

  const allSlots = []
  phases.forEach(phase => {
    for(let i = 0; i < phase.zapasu; i++){
      const roundNum = phase.roundFrom + i
      const m = allMatches.find(x => x.round === roundNum) || null
      allSlots.push({ phase, roundNum, match: m })
    }
  })

  if(!allSlots.length){ cont.innerHTML = '<div class="empty">Žádné zápasy.</div>'; return }

  let html = '<div class="match-list-cards">'

  allSlots.forEach(({ phase, roundNum, match: m }) => {
    if(!m){
      html += `
       <div class="ml-card">
        <div class="ml-card-header">
         <span class="ml-round-badge">Kolo ${roundNum}</span>
         <span class="ml-phase-badge">${phase.label}</span>
         <span class="ml-status" style="color:#f0c040;">⏳ Čeká na přiřazení</span>
        </div>
        <div class="ml-card-body">
         <div class="ml-teams">
          <div class="ml-team"><div style="width:26px;height:26px;border-radius:4px;background:#e8f0f8;flex-shrink:0;"></div><span class="ml-team-name" style="color:#aaa;font-style:italic;">— TBD —</span></div>
          <div class="ml-team"><div style="width:26px;height:26px;border-radius:4px;background:#e8f0f8;flex-shrink:0;"></div><span class="ml-team-name" style="color:#aaa;font-style:italic;">— TBD —</span></div>
         </div>
        </div>
       </div>`
      return
    }

    const homeT = allTeams[m.home_team]
    const awayT = allTeams[m.away_team]
    if(!homeT || !awayT) return

    const played = m.home_score != null
    const winner = getWinner(m)
    const suffix = m.result_type === "SN" ? "SN" : m.result_type === "OT" ? "OT" : ""
    let stats = null
    try{ stats = m.stats ? JSON.parse(m.stats) : null }catch(e){}
    let periods = ""
    if(stats){
      const h1=Number(stats[16]||0),h2=Number(stats[17]||0),h3=Number(stats[18]||0)
      const a1=Number(stats[6]||0),a2=Number(stats[7]||0),a3=Number(stats[8]||0)
      periods = `${h1}:${a1} · ${h2}:${a2} · ${h3}:${a3}`
    }

    html += `
     <div class="ml-card ${played?"played":""}">
      <div class="ml-card-header">
       <span class="ml-round-badge">Kolo ${m.round}</span>
       <span class="ml-phase-badge">${phase.label}</span>
       ${played
         ? `<span class="ml-status" style="color:#4ade80;">✓ Odehráno${suffix?" · "+suffix:""}</span>`
         : `<span class="ml-status" style="color:#f0c040;">⏳ Čeká</span>`
       }
      </div>
      <div class="ml-card-body">
       <div class="ml-teams">
        <div class="ml-team">
         ${homeT.logo ? `<img class="ml-team-logo" src="./logos/${homeT.logo}">` : '<div style="width:26px;height:26px;border-radius:4px;background:#e8f0f8;flex-shrink:0;"></div>'}
         <span class="ml-team-name ${played&&winner===m.home_team?"winner":""}">${homeT.name}</span>
${played ? `<span class="ml-team-score ${winner===m.home_team?"winner":""}"><span style="display:inline-flex;align-items:center;justify-content:center;background:#0b2a3c;color:white;font-size:13px;font-weight:800;width:30px;height:30px;border-radius:8px;">${m.home_score}</span></span>` : ""}        </div>
        <div class="ml-team">
         ${awayT.logo ? `<img class="ml-team-logo" src="./logos/${awayT.logo}">` : '<div style="width:26px;height:26px;border-radius:4px;background:#e8f0f8;flex-shrink:0;"></div>'}
         <span class="ml-team-name ${played&&winner===m.away_team?"winner":""}">${awayT.name}</span>
${played ? `<span class="ml-team-score ${winner===m.away_team?"winner":""}"><span style="display:inline-flex;align-items:center;justify-content:center;background:#0b2a3c;color:white;font-size:13px;font-weight:800;width:30px;height:30px;border-radius:8px;">${m.away_score}</span></span>` : ""}        </div>
       </div>
      </div>
      <div class="ml-card-footer">
       <span class="ml-periods">${periods}</span>
       ${played
? `<button class="ml-btn ml-btn-stats" onclick="window.location.href='statistiky-zapasu.html?id=${m.id}'">📊 Statistiky</button>
   <button class="ml-btn ml-btn-bet" onclick="window.location.href='vsad-si.html?id=${m.id}'">🎲 Vsaď si</button>`         : `<button class="ml-btn ml-btn-bet" onclick="window.location.href='vsad-si.html?id=${m.id}'">🎲 Vsaď si</button>`
       }
      </div>
     </div>`
  })

  html += '</div>'
  cont.innerHTML = html
}

init()
</script>
</body>
</html>
