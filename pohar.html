<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pohár</title>

<style>

*{box-sizing:border-box}

body{
 font-family:Arial;
 margin:0;
 background:#f2f2f2;
}

.wrapper{
 max-width:1300px;
 margin:auto;
 padding:20px;
 background:white;
}

/* HLAVIČKA */

.headerBar{
 display:flex;
 align-items:center;
 justify-content:space-between;
 background:#e9ecef;
 border-radius:12px;
 padding:20px;
 margin-bottom:30px;
}

.headerBar img{
 height:100px;
}

.pageTitle{
 background:#0b2a3c;
 color:white;
 font-size:26px;
 font-weight:bold;
 padding:14px 28px;
 border-radius:10px;
}

/* PAVOUK */

.bracket{
 display:grid;
 grid-template-columns: repeat(4,1fr);
 gap:40px;
 align-items:center;
}

.round{
 display:flex;
 flex-direction:column;
 gap:30px;
}

.roundTitle{
 text-align:center;
 font-weight:bold;
 margin-bottom:10px;
 color:#0b2a3c;
}

/* ZÁPAS */

.match{
 background:#e9ecef;
 border-radius:8px;
 padding:10px;
 box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.team{
 display:flex;
 justify-content:space-between;
 align-items:center;
 padding:6px 8px;
 font-weight:bold;
}

.team + .team{
 border-top:1px solid #ccc;
}

.score{
 background:#0b2a3c;
 color:white;
 padding:3px 8px;
 border-radius:6px;
 font-size:14px;
}

/* FINÁLE */

.finals{
 grid-column:2 / span 2;
 display:flex;
 justify-content:center;
}

.finalMatch{
 width:260px;
 background:#0b2a3c;
 color:white;
 border-radius:10px;
 padding:14px;
 text-align:center;
 font-weight:bold;
}

@media(max-width:900px){

.bracket{
 grid-template-columns:1fr;
}

.finals{
 grid-column:auto;
}

}

</style>
</head>

<body>

<div class="wrapper">

<div class="headerBar">
 <img src="img/extraliga.jpg">
 <div class="pageTitle">Pohár – Playoff</div>
</div>

<div class="bracket">

<!-- ROUND 1 -->

<div class="round">

<div class="roundTitle">Osmifinále</div>

<div class="match">
<div class="team">Sparta <span class="score">3</span></div>
<div class="team">Liberec <span class="score">1</span></div>
</div>

<div class="match">
<div class="team">Pardubice <span class="score">2</span></div>
<div class="team">Třinec <span class="score">4</span></div>
</div>

<div class="match">
<div class="team">Kladno <span class="score">1</span></div>
<div class="team">Litvínov <span class="score">2</span></div>
</div>

<div class="match">
<div class="team">Vary <span class="score">3</span></div>
<div class="team">Budějovice <span class="score">2</span></div>
</div>

</div>

<!-- ROUND 2 -->

<div class="round">

<div class="roundTitle">Čtvrtfinále</div>

<div class="match">
<div class="team">Sparta</div>
<div class="team">Třinec</div>
</div>

<div class="match">
<div class="team">Litvínov</div>
<div class="team">Vary</div>
</div>

</div>

<!-- ROUND 3 -->

<div class="round">

<div class="roundTitle">Semifinále</div>

<div class="match">
<div class="team">Sparta</div>
<div class="team">Litvínov</div>
</div>

</div>

<!-- FINÁLE -->

<div class="finals">

<div class="finalMatch">
Finále<br><br>
Sparta vs Litvínov
</div>

</div>

</div>

</div>

</body>
</html>
